  text: 揭文安公文集卷之十四
  hash: sha256:b6b0f421367402fb677fc8e45857cd415cfea8d61fe838e316aeddba89aa7b1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_014-1a}
body:
  text: 揭曼碩傒斯著門生前進士燮理溥化校録雜文天馬贊皇帝御極之十年七月十八日拂郎國獻天馬身長丈一尺三寸有竒髙六尺四寸有竒昻高八尺有二寸草有一日敕臣周朗貌以為啚草有三日詔臣揭傒斯為之贊贊曰雖乾秉靈惟房降精有産西極神駿難名彼不敢有重譯來庭東踰月窟梁雍是經朝飲大河河伯屏營莫秣大華神靈下迎四踐寒暑爰至工京皇帝臨軒使拜迎稱臣拂郎國邈限西溟蒙化效貢顧歸聖明皇帝謙讓嘉爾逺誠摩于赤墀顧瞻莫矜既稱其德亦貌其形髙尺者六修倍猶贏色應玄武足躡長庚回眸電激頓轡風生卓犖權竒虎視龍騰按啚考式曽未足并周騁八駿徐偃構兵漢駕鼓車炎列中興維帝神聖載籍有徴光武是師穆滿是懲登崇俊良共基太平一進一退為國重輕先人後物萬國咸寧仙茅述豫章之新建黃堂隆道宫道士羅君大年為豫言仙茅事甚異其言曰昔晉之亂有神人許旌陽者出于豫章之境西山之下能以忠孝積功纍行致仙道師事諶母于丹陽之邑黃堂之墟母既授以道要旌陽感之曰吾必歲朝母母曰吾即從此逝矣去汝居南五十里吾有飛茅在焉汝能淂茅處即祠我歲八月一至足矣已而諶母果仙去旌陽還淂茅亦叢生而地亦曰黃堂即建祠祠諶母歲如期往朝之旌陽尋亦仙去其徒歲八月四日具幢蓋儀衛鼓樂奉旌陽像朝母如旌陽存時以為常其後嗣其學者擴其祠為觀𣸪為宫至今行之不衰茅在祠前剪而後生如揚州瓊華不易其處茅具六味能致六飬醎能飬氣辛能飬莭酸能飬筋滑能飬胃甘能飬肉人淂茅煮而飲之可以已疾癘和榮衛延年却老余家距祠百里未嘗至其處然嘗淂茅煮而試之言不虛也夫茅者于易書詩禮春秋傳祭則以縮酒封則以藉立社之土以其物雖薄而用可重也未嘗言能神異如此世稱神仙遺迹竒詭荒誕不可致深詰者以千數而諶母特以茅著稱其師弟子精誠之感不可掩如此夫古之言淂仙者或以服食或以導引不食榖獨稱許旌陽以忠孝積功纍行致仙道蓋足尚矣夫可以動天地感鬼神貫金石亘古今而不泯者惟忠孝為然况其師弟子之間乎然嗣其學守其壇場而無諶許師弟子之心則樵牧殘之牛羊踐之茅雖神能歷千歲而獨存哉因羅之拳拳有感于忠孝云者述以傳之作仙茅述至順三年秋七月日靜虗解閬中蒲瑛粹玉揭其齋靜虗自夜郎走書京師求豫言作靜虗解惟靜為能統天下之至動惟虗為能容天下之至大至動天也至大地也非至動無以見靜之用非至大無以見虗之載惟靜虗衆理出焉萬物生焉故聖人則之君子學成于靜益受于虗非靜虗無以成君子况聖人乎惟聖人為能合靜虗之體致靜虗之用故可以參天地贊化育非靜虗無以成聖人况天地乎惟天淂虗而無不覄也惟地淂靜而無不載也故能運行四時化生萬物而非靜虗無以為天地故體莫大乎靜虗用莫大乎天地是以衆人法君子君子法聖人聖人法天地天地法靜虗靜虗至矣楊椘經字説余與臨江楊君信可友凡十餘年大德七年春遇于武昌居𢾗月淂子湘書以示余余嘉其年弱而志大且甚好學也遂許以女妻之其年夏與余入衡湘冬俱還江西爾後與信可亦時往還而猶未識湘也十年春余訪信可彬溪上出湘拜余且求所以字之余曰冠而字禮也未冠而問字無乃太早計矣乎信可曰湘惟不淂子之言以為式之為患何早計之為患乃問所以名之義信可曰湘之生余適還自湘故以名余曰夫湘楚水之大者也既大其始可不求所以大其終乎夫湘楚之經也吾與若皆楚人也可不求古人之志行古人之道以配湘之經以大于楚乎請字之曰楚經徑者本也本既舉矣末有不從者乎夫日月星辰天之經也長河大嶽地之經也五常三綱人之經也故天之經得則日月軌寒暑時雨暘若萬物以育地之經得則海不波江安流山出器車河出馬圖人之經得則家以寧邦以昌祥瑞並至而天地理矣及夫亂也悉反之朂哉經乎苟聽是言也有不配湘之經而大于楚者乎信可聞而喜曰即君子言雖佐天子經邦理天下可也况楚國乎佘曰未也苟鼓浩蕩而不求其源騖紛萃而不典于學雖欲經于一邦大于一鄉且不得况一國乎又况天下乎朂哉楚經其三復是言也題昔刺史宋啚後右國信副使昔刺史宋啚及君臣賦咏一卷以昔刺公竒偉如此四杖莭使宋豈無一言可紀而敘其事者但責宋不能􅊰和及概稱其奉使不辱而已略不及其使事始末大抵宋之南渡不能復振者夲于張浚抑李綱殺曲端引秦檜檜殺嶽飛父子而終于賈似道之専劉整之叛况天方以數十年不能大混一之天下付之世祖皇帝以主弱臣強之宋豈能以數萬之金幣保區區江南一隅之地哉故宋戰亦亡和亦亡况二者俱不能之耶然非賈似道誤國失信無以正皇元出師之號非劉整之叛無以周知渡江之謀天也整之謀亦非整之謀也陳亮上孝宗封事料敵之言也整夲制置使趙方麾下一小校耳拔之行伍之中用以為將方將死語其子葵曰劉整真將才也然汝不能用我死汝必殺之不殺必為國患方死葵不忍殺竟以瀘州叛元遂用其䇿以滅宋亦天也嗚呼淂人則興失人則亡古今同軌可不監乎若昔刺公之屢使不辱郝文忠之終始不渝偉哉題鄒福詩後右鄒福詩七首鄒福者吾鄉田夫之子也粗讀孝經論語家貧與人傭耕泰㝎元年豫居憂于家其父遣從余給薪水之勞然暇即密自觀書居五年余携至京師會新天子入正大統以文德治天下明年春開奎章閣詳延儒雅講論道德置授經郎以教勳舊大臣弟子之在左右者以國子教授廬陵林希顔及余為之寅入而西出令福守舍乃盡日閉門讀書習字間為小詩及暮則請可否于余余或方􅌒𣣔休或方讀書有會意處或執茟為文章思方屬必輟而告之不使幾微見余懈怠意遂以為常今年秋遷丞藝文曰簡靜無事請問之時益冨矣余適墜馬在告日卧齋閣中福連有所作皆可觀余因取其法度音莭尤近者淂七首為書之仍題其後以志余喜且以為世之世臣大家學士大夫之子弟不知學者之勸余在閣中時福又從林希顏學國書希賢亟稱其可教其所淂淺深余不能知也要亦好上者云爾余𢾗年於文事使令蓋深淂其助焉因并識于此幽憂賦士有甲與乙約為昆弟者乙之兄弗友于弟誣甲與乙婦私以醜之甲念乙為名賢之後且早負氣莭常欲自殺以明無他而母猶存余傷其意為作幽憂賦其詞曰何黯黮而蒙昧兮余不淑而獨當天幽玄而無眹兮匪殺身而孰明懷國恩而未酬兮念余母之弗康聊泯忍以苟生兮庶或察于微茫彼哲人之遺緒兮相凛凛其猶有耿光孰忠貞而罔後兮孰耿介之弗昌既托余以死生兮又事余以兄余既異于禽獸兮其忍為此不良彼固衰薄而不足畏兮乃不念厥祖之明明惟棠棣之韡韡兮或違詩人之所歌兄既不友于弟兮又嫉余以不阿騁淫詞以為鵠兮稱飛文以為羅彼妬之口兮曽奚辭之弗加人獨何心兮弗求其故而肯訛謂蘭􅉅之幽貞兮與蕭艾而同科謂百錬之金以為柔兮指美玉而為瑕乘機抵巇既不遺餘力兮猶恐余顧而有他余髮衰齒就落兮計相存其幾何託寸芳于鄧之林兮投纎鱗于巨海謂𣏌梓之為尤兮妨鱣鯨之所滙余詎知皎皎之為病兮孑孑之所罪黯獨蒙此昏穢兮雖夷齊其猶凂豈昔壯而知自強兮撫中歲而改度匪哲人之孔明兮孰能察夫余之故苟哲人之莫余知兮雖殺身其奚益心怦怦而煩瞀兮哀讒人之罔極彼天地之廣大兮固含垢而隱疾豈松柏之受命兮欎紛糅乎枳棘苟由中以永直兮曽何情之弗獲惟嫉􅎱以甘心兮彌顛倒而狂惑嗟余生之不類兮罹此咎之無由余既恥夫匹夫之為諒兮日與魑魅而為仇幸讒人之無怒兮秪割德而衰修余既內省以不疚兮夫何懼而何憂曰止謗以不辨兮服先哲之攸訓匪成言以自道兮人將誚余以固吝聊抽毫以舒思兮遡南風以解愠上白日之昭昭兮下黃泉之奔迅謂余言之苟無徴兮碩與春氷而澌盡故叔父常軒五府君哀辭嗚呼山巃嵸而崔崒兮翳九原以榛榛望不見夫子兮聽不聞其笑與言風纚纚而不絶兮雲漫漫而彌天日翩翩而赴海兮水咽咽而流川匪美人之淪謝兮余孰為之悁悁惟叔父之堅貞兮謂金石莫與齊其固獨為此春水兮溘朝陽之零露黃河可塞而陸乎昆侖可鏟而夷概夫子之以不可作兮使我心惕而神悲撲摗擁聳而蔽天兮松柏朴而在泥荃蕙羃歷而沉穢兮百草厭浥而楊輝鵉愔愔鎩六翮以投棘兮鴟梟髙舉而天飛犁牛仰望躍踔而長鳴兮驊騮騊駼躑躅靡徙而不肯馳世豈獨無此美人兮悵豫世之日替入始與言言兮反以為戾毁大璞于九逵兮和氏雖死其猶悲傷洞庭震蕩而噴薄兮咸池之音反淪降彼燕石之頑礦兮夫乃珍緹什襲而藏之彼鄭衛之淫哇兮夫乃嚘啾㗲啞而揚之嗚呼悲矣哉余方搆厦屋之巍巍兮何中道而奪此規矩豫方鳴塤箎而會音兮何不留此律呂涕緌緌以沾裳兮心怦怦而煩騖目宛宛而凝望兮愁綿綿而誰語旐翩翩以摩雲兮夫子何不少留夫子終不可以留兮徒使我旦莫欎一而增憂夫子其天飛而地降兮雖欲從之莫知其由嗚呼噫嘻兮我心悠悠九招一首為故嗣漢三十八代天師張留公作維真人之夀命兮敝天地而弗終寧厭濁醜穢兮溘上征乎太空雲繽繽而鱗萃兮先鵉于之溶溶神君紛而下迎兮倏隂陽景從上下莫知所極兮四方曷其所窮仙其歸兮無使豫之忡北斗偃蹇以酌元氣兮四時相推其迭序石有時而泐兮金有時而失固合神一之至真兮豈形氣之能度夫人有此美質兮曾至死而莫悟仙其歸兮導余夫歸處觀世俗之淫巧兮日雕朴而琢淳梟獍呀而狂噬兮謂虎狼之至仁悵投足之無所兮誰獨與豫乎密親雖忠信之足􅑀兮又豈人之能信碩髙舉而遠引兮逝安兮余淪志而合神豈余身之足畏兮竊獨哀此雷霆兮草木何由而發生旱魃熇而夏見兮吾雨不得獲兮冬炎燠而鬱蒸虹霓朝而東涉心怲怲而煩亂兮仙翺翔乎太清仙不歸兮孰風猋而怒越兮玄霧惑乎四維揚旍旗于万里兮鳥縱橫而蔽野兮日崩騰而師鬼啾啾而晝嘷狐狸歲浩蕩而忽暮兮民憂愁而曷夷仙不歸兮孰保順而抵􅐵仙超遙乎恬漠兮豈上帝之攸命即年穀之不熟兮物疵厲而逆性匪聖人顧懷兮焉逹祥而㣧慶仙之歸不歸兮無使我心勞而神病蘅薇藹其樹兮山嶛㟽而幻深泉潺湲而轉石兮交靈禽之好音桂巃嵸而蔽天兮虎長嘯而龍吟仙之歸不歸兮何繚繞而滯淫衣彤霞之襜襜兮布列星以為冠佩長劍之陸離兮駟八鵉之安安海若惙而怛妖兮夔罔竄而莫干仙既有此靈德兮冒不歸憫乎下人昔留矦之純懿乎佐炎漢而興劉惟戒覆以保終兮託赤松而逺逰既載此神裔兮世承烈而紹休帝屢降夫嘉澤兮沛汪􅐮而下流忍獨棄此君兮明不余顧而少留仙其歸兮母使憂祭趙供奉文維延祐元年歲在甲寅十月某朔十日某甲翰林學士承旨程巨夫等謹以清酌柔毛之奠致祭于故翰林應奉趙君景淵之靈謂天至仁仁不可知謂神至明明不可依善者短折賢居冗早孝不獲飬忠志此理之常今胡不爾惟君之生茂懿粹和力乎詩書以成厥家惟君之生㫪容廓深一翺天庠再驟詞林宴笑語言如金如玉期君九霄望君百祿去年一疾咸不能起余哭哭盡哀猶不忍去前後𬒳行省及部使者檄詰責諸郡邑邑三百餘莫不稱允而不及天用以殁悲夫君之卒實至元年十月二十有五日年六十四以明年十二月二十有一日葬所居東北龍唐之原𥘉娶吳氏再娶劉無子以兄之子肇開為之子年六十一乃得子曰性傳女三人長適大都路固安州儒學正劉蒙德次適徐經逺次適蕭信之孫男三夀駿文豹天霓女一銘曰此孳孳稱所施而止于斯彼巍匕兮右見元文類李莭婦傳李莭婦者姓馮氏名淑安字靜君大名人山東亷訪使時之孫胡州録事汝弼之女山隂令東平李如忠之繼室也如忠𥘉娶蒙古氏生子任數歲而卒繼室以馮氏生子任一歲而寡有遺腹子父殁兩月乃生名之曰伏計至東平李及蒙古之族相率至山隂盡取其資及其子任以去馮乃賣欽釧質衣服權立二喪于山隂蕺山下獨携二子廬于墓時年始二十二唯布衣蔬食形嬴苦莭躬織紝為女師以自給居二十餘年教二子皆成學遂遷二喪反喪汶上邑人王毅以中書平章政事在告為親臨其喪而銘其墓齊魯之人聞之莫不咨嗟嘆息有為泣下者李及蒙古之族皆大愧悔羞見馮母子馮視子任反出已子上中書參知政事王士熙侍御史馬祖常禮部尚書孛术魯翀翰林學士吳􅊹集賢學士袁桶奎章閣侍書學士虞集國子司業李端太常博士栁貫輩爭為文章盛誇道之山東浙東群有司交上其事於朝請褒吳焉其子任伏事母極孝皆掾太府有亷直聲而好學不􅌒史氏曰李之𥘉喪也其族及其妻之屬能扶其二喪携其母子返乎汶水之上而撫存之其義孰加焉乃不逺二千里而來直利其財也當時亦豈欲挾其數歲之子以去惡其無名且以二族之人生長鄒魯之邦乃不如一寡婦人哀哉馮氏其亦早有家教乎右見元文類桂陽縣尹范君墓志銘大德中勳臣椘國公之季子帥湖南有所愛椽廬陵范君元亨其強敏之才亷正之莭風動千里人不畏帥而畏元亨時余在長沙𢾗與之遇而不敢一詣門恐溷君也後二十七年會其從子滙于京師則君殁十年矣乃録其行請銘君諱元鎮字元亨其先蜀人今居安福之清化里祖岩生二子皆為太學生季曰景材是為君父君早孤母劉及其兄元方教育之至元二十五年監察御史舉亷能為江西憲椽居五年去之京師辟徽政椽又辟大司徒椽皆不就元貞𥘉䛇求能書金經者君在選中經成輔湖南椽秩滿授瑞州稅使改武岡録事挕綏寧令進郴州桂陽尹纍階承事郎卒官君所至當官而行無所阿避祿入不足則歸賣田宅以給之往往𥘉多忤而後反見知者其行事之尤著者則在帥府有田千户者死其子曰田芑芑幼弱其弟田仁襲其官據其業而奴畜芑芑嘗訴于有司𢾗年不決事上帥府復多石田仁君抱牘方力爭帥怒自左右捽君且下吏梁木壞几壓帥帥乃止田仁恐求援行省權相數日使逮君甚急且諭之曰汝不用汝頭汝來汝愛汝頭勿來皆謂君往必死君竟往極言田仁罪反覆無所顧不能屈乃與芑在武岡氏張氏欺胡氏寡弱占其産倪方户脅張惠以罪取其田皆奪而歸之許文炳兄弟爭財二十年不決召其兄弟涕泣而理喻之許乞罷歸在綏寧王永明誣舒八殺人實藍姓殺之永明伏辜諸洞飢疫大起死者過半下令寬征賦以恤之諸洞嚮化在桂陽民白有盜其牛者蹤迹無所淂方疑所捕二貓嗛牛且鳴號于庭求貓主索之果淂牛立命償其牛而正其罪且桂陽側陋洪給與大縣等民力雕耗一以寬濟之故其卒也民無逺近皆縞素會曰斯人必不至此其危一髮勿藥有喜咸喜相謂必壽且昌云何露電一夕遽亡孰無父母君飬不足孰無妻子君不得育孰無兄弟君不得友孰無朋友君不得守藹藹公侯君至下寮萬物􅉭􅉭君不復朝知君所憾惟此數者命也如斯莫如何也所不必憾秦公內姻棺槨衣衾克周于身凡我同僚其情孔親故鄉雖遙安卧而臻人皆有死豈必牗下官無崇卑在永終譽靈輀將舉落葉如雨率衆哀號永訣千古尚饗揭文安公文集卷之十四
