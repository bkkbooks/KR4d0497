  text: 揭文安公文集卷之十二
  hash: sha256:a7bdf883b78ad6884f781ae7a375439d9bd832d276b4e2b73f2326e23728f2dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_012-1a}
body:
  text: 揭曼一碩傒斯著門生前進士燮理溥化校録碑大元敕賜修堰碑江水出蜀西南徼外東至于岷山而禹導之秦昭王時蜀太守李氷鑿離堆分其江以潅川蜀川蜀以饒自秦歷千數百年所過衝薄蕩嚙大為民害有司歲治隄防百三十三所役兵民多者萬餘人少者千人其下猶𢾗百人人七十日不及七十日雖事治不淂休息不役者三日緡冨屈于資貧屈于力上下交病會其費歲不下七萬緡毫髮出于民十九藏于吏概之出入不足以更費至今上皇帝即位之明年僉四川亷訪司事吉當普巡行周視淂要害之處三十有二餘悉罷之且召灌州判官張弘計曰若甃之石則役可罷民可蘇弊可除胡憚而莫之為弘曰公慮及此此生民之福國家之幸萬世之利也弘請出私錢試以小堰堰成水暴漲堰不動乃具文書會行省及蒙古軍七翼之長郡縣守宰鄉遂之老各陳其便宜皆曰便復禱祠與神約昔鑿離堆以冨川蜀建萬世之利神之功也今水失其道民失其利吏乘其弊若此而神弗之救是神之惠弗終也神克相豫豫治神弗豫相請與神從事卜之吉于是徴工發徒以至元改元十有一月朔肇事于都江堰都江即禹鑿之處分水之源也鹽井關限其西北水西關據其西南江南北皆東行北舊無江氷鑿以辟沫水之害中為都江堰少東為大小釣魚又東跨二江為石門以莭北江之水又東為利民臺臺之東南為侍郎楊栁三堰其水自離堆分流入于南江南江東至鹿角又東至金馬口又東過大安橋入于成都俗稱大皂江江之正源也北江少東為虎頭山為閗雞臺臺有水則尺為之畫凡十有一水及其九其民喜過則憂沒其則則困乃書深淘灘低作堰六字其傍為治水之法皆氷所為也又東為離堆又東過凌虗步雲二橋又東至三石洞釃為二渠其一自上馬騎東流過郫入于成都古謂之內江今府江是也其一自三石洞北流過將軍橋又北過四石洞折而東流過新繁入于成都古謂之外江此氷所穿二江也南江自利民臺有支流東南出萬工堰又東為駱駝又東為碓口繞青城而東鹿角之北涯有渠曰馬灞東流至成都入于南江渠東行二十餘里水決其南涯四十有九歲疲民力以塞之乃自北涯鑿二渠與楊栁渠合東行𢾗十里復與馬灞渠會而渠始安流自金馬口之西鑿二渠合金馬渠東南入于新津江罷藍綻黃水千金白水新興至三利十二堰北江三石洞之東為外應顔上五斗諸堰外應顔上之水皆東北流入外江五斗之水入于馬灞渠皆內江之支流也外江東至崇寧亦為萬工堰堰之支流自北而東為三十六洞過清白堰東入彭漢之間而清白堰水潰其南涯延袤三里餘有司因潰以為堰堰輒壞乃疏其北涯舊渠直流而東罷其堰及三十六洞之役嘉㝎之青神有堰曰鴻化則授成其長吏使底其功應期而畢若成都之九里堤崇寧之萬工堰彭之㻚口豐潤千江石洞濟民羅江馬腳諸堰工未及施而詔亦責長吏及農隙為之諸堰都江及利民臺之役最大侍郎楊栁外應顔上五斗次之鹿角萬工駱駝碓口三利又次之而都江又居大江中流故以鐵萬六千斤鑄為大龜貫以鐵柱而鎮其源以捍其浮槎然後即工諸堰皆甃以山石範鐵以關其中取桐實之油刀麻為絲和石之灰以苴罅漏禦水潦岸善崩者密築江石以護之上植楊栁傍種蔓荆櫛比鱗次賴以為固蓋以數百萬計所至或疏舊渠而導其流以莭民力或鑿新渠以殺其勢以益民用遇水之會則為石門以時啓閉而泄蓄之凡智力所及無不為也𥘉郡縣及兵家共掌都江之政延祐七年其兵官奏請獨任郡縣乃以其民分治下流諸堰廣其增修而大其役民苦之至是復合焉常歲獲水之用僅𢾗月堰輒壞今雖緣渠所置碓磑紡績之處以千萬計四時流轉而無窮其始至都江水深廣莫可測忽有大洲湧出其西南方可𢾗里人淂用事其間入山伐石崩石已滿隨取而足所向皆然蜀故多雨自𥘉役至于工畢無雨雪故力省而功倍而民不知勞若有相之者亦其忠誠所感如此致使天子賜酒之使相望于道省臺勸功之檄不絶于吏所溉六洲十二縣之民皆歌舞焉而下至郡縣上至藩部惡其害已且疾且怨或決三洞之水以潅其次或毁都江之石以害其成撓之百端不拔益固甫越五月大功告成百一恆費民永休享古未有也而吉當普會以監察御史召省臺上其功詔臣傒斯記之于碑臣聞水先五行食首八政九疇所序其次可觀矣夫水者衣食之原也然所以為利亦所以為害在善導之而已禹平水土猶己溺之后稷播種猶已飢之萬世有稱焉是故為政不夲于農不先于水是為不知務不知務是謂冥行之臣李氷一鑿離堆民受其賜吉當普才大而德敏憂深而知逺不枉其道不屈其志臨難忘身為國忘家安于命而勇于義而知所先務故事可立而功可建其在四川若請罷鹽運使司正鹽井之法以去其姦利置安撫使撫四方流寓之民使安其耕鑿及居臺端知無不言言無不合誠國之寶也判官張弘殫智竭慮終始克相其成雖百折而不悔亦今之賢有司乎是役也石工金工皆七百人木工二百五十人徒三千九百人而蒙古軍居其二千糧為石千有竒石之材取于山者百萬有竒石之灰以斥計六萬有竒油半之鐵六萬五千麻五千最其工之直物之賈以緡計四萬九千有竒皆出于民之庸積而在官者餘草萬一千八百緡責灌守以貸于民歲取其息以偹祭祀若淘灘修堰之共仍蠲潅之兵民常所徭役以専其偃事嗚呼後之涖此土者尚永鑒于兹勿怠其政墮其事以為民病以為國家之憂臣拜手稽首而作頌曰鑿離堆兮江勢分川蜀饒兮民忘為秦秦可忘兮國有人何後世兮忘吾民歲伐竹兮歷岩嶅載亂石兮堰江濤堰無功兮民孔勞民孔勞兮天不吊龍伯怒兮江妃笑豈江之為患兮惟人自厚龍莭兮繡衣煒皇皇兮不我遺召龍工兮汝為汝詎知兮豫所期江滔滔兮廣且深黿鼉出沒兮蛟龍晝吟下不可以極兮上若有臨洲澶漫兮江之心吾伐石兮石自摧吾召民兮民子來堰既作兮民無患災此豈豫之功兮神汝哀神洋洋兮功既畢堰永固矣民安佚川蜀饒兮國之實千萬年兮功不失惟帝之力兮臣之職重建濟州會源閘碑皇帝元年夏六月都水丞張侯改作濟州會源閘成明年春二月具功狀遣其屬孟思敬至京師請文勒石惟我元受命㝎鼎幽薊經國體民綏和四海辨方物以定貢賦穿河渠以逸漕度乃改任城縣為濟州以臨齊魯之交據燕吳之衝道汶泗以會其源置閘以分其流西北至安民入于新河埭于臨清地降九十尺為閘十六以達于永濟渠南至沽頭地降百十有六尺為閘十又南入于河北至奉符為閘一以節泗水東北至于兖州為閘一以節汶水而會源之閘制于其中歲益久政日弛弊日滋漕度用弗時先皇帝以為憂延祐六年冬詔以侯兮治東阿始修復舊政誕布新令嚴暴橫之禁杜姦利之門南疏北導靡所寧處明年冬以當代請去弗許行視濟閘峻怒狼悍歲數壞舟楫土崩石泐岌不可持乃伐石區里之山轉木淮海之濵度功即工大改作焉明年皇帝建元至治三月甲戌朔侯朝至于河上率徒相冝導水東行堨其下上而竭其中以儲衆材徹故閘夷拗泓徙其南二十尺降七尺以為基下錯植巨栗如列星貫以長松實以白石概視其地無有所罅漏衡五十尺縱百六十尺八分其縱四為門縱孫其南之三北之一以敵水之奔突震蕩五分其衡二為門容折其三以為兩墉四分其容去其一以為門崇亷其中而翼其外以附于防參兮門縱間于北之二以為門中夾樹石鑿以納懸板五兮門崇去其一以為鑿崇翼之外更為石防以禦水之洄洑衝薄縱皆二百三十尺爰琢爰甃犬牙相入苴以白麻固以白膠磨礲剷磢關以徑鐵崖削砥平混如天成冠以飛梁偃如卧虹越六月十有三日乙卯訖功大會群屬宴于河上以落之工徒咸在旄倪四集酒舉樂作揮鍤決堨艤棹魚貫水平舟行伐鼓歡呼進退間暇其稱侯之功頌侯之德雷動雲合且拜曰聖天子繼志述事不易任以成厥功惟億萬年享天之休是役也以工計石工百六十人木工十人金工五人土工五人徒千四百二十人以材計木萬一百四十有一石五千一百二十有八甓二億一千二百有五十以斤計鐵二萬五千五百麻二千三百石之灰三億三萬三百三十有四以石計粟十二百有五十視他閘三之視舊倍之其出于縣官者鐵若麻木十之七石五之一粟五之三餘一以便冝調度不以煩民此其大較也𥘉侯至之明年凡河之隘者辟之壅者滌之決者塞之拔其藻荇使舟無所底禁其芻牧使防有所固隆其防而廣其址修其石之岩陀穿漏者築其壤之疏惡者延袤贏七百里防之外增為長隄以閼暴漲而河以安流潛為石竇以納積潦而瀕河三郡之田民皆淂耕種又募民采馬藺之實種之新河兩涯以錮其潰沙北自臨清南至彭城東至于陪尾絶者通之欎者斯之為杠九十有八為梁五十有八而挽舟之道無不夷矣乃建分司及會源石佛師莊三閘之署以嚴官守樹河泊龍君祠八故都水少監馬之真兵部尚書李奧魯赤中書斷事官忙速祠三以迎休報勞凡河之所經命藏水以待暍者種樹以待休者遇流莩則男女異葬之餓者為粥以食之死而藏飢而活者𢾗千人是以上知其忠下信其令用克果于兹役也侯亦勤且能矣然古者三載考績三考黜陟幽明故人才淂以自見方世祖皇帝時天清地寧群賢滿朝少監馬公之徒以陳力載勞垂功無窮者慮之逺擇之審任之専也向使侯竟代去雖懷甚忠極智無能究于其聀是亦侯所遇也惟兹閘地最要役最大馬氏之後侯之功為最盛故詳于是碑以告後之人侯名仁仲河南人辭曰昔在至元惟忠武王自南還歸請開河渠自魯涉齊以逹京師河渠既成四海率徔萬世是資朝帆夕檣垂四十年孰慢而墮翼翼張矦受命仁宗號令風馳徴功發徒既滌既修濟閘攸基先雞而興既星而休觸冒炎曦疾者藥之死者槥之奚有渴飢拊循勞徠信賞必罰勿亟勿遲十旬之間遹潰于成智罔或遺洋洋河流中有行舟若遵大逵舳艫相銜罔敢後先亦罔敢稽賢王才侯自北自南顧盻嗟咨曰惟京師為天下本本隆則固惟帝世祖既有南土河渠是務四方之供于千萬里如出跬步聖繼明承命官選材惟侯之遇昔者舟行日不𢾗里今以百𢾗昔者舟行歲不𢾗萬今以億慮惟公乃明惟勇乃成惟亷則怒汶泗之會有截其閘有菀其樹功在國家為在天下永世是度天華萬夀宫碑唐貞元中吉州刺史閻矦隱于城東十五里天嶽山之夫容峯後傳以為仙云其山世為閻氏業子孫世為郡人山高廣可十里俯覽郡中諸山或言古仙人浮丘伯及其弟子王郭二人亦嘗往來其處及稱山中多光怪倐忽變化甚異延祐三年矦諸孫弘毅即其地祠浮丘以其二弟子及侯配廣殿大庭髙門修廊皆合制度又割田廪有道之士以奉祠事明年郡人曽編修巽申為請于玄教大宗師命為天華觀至順元年升為宮明年正一教主三十九代天師加天華萬壽宫并書其顔咸謂君子作始罝具金石刻請為刻辭按廬陵志侯名宷𥘉隱夫容後淂道山東南三十里之洞岩臨江玉笥山志又言承天宫西南十五里南障山葆光觀有吉州閻使君别墅後淂道衡嶽學仙之人固􅉭忽不可知而戎昱集載送吉州閻使君入道詩此尤足徴者浮丘事見列仙傳天下高山絶境類有浮丘遺迹要不可詰然古之士君子負德行方藝不見不用于世或著書立言以傳其道或躬耕採拾以樂其志或依托佛老以寄其迹若此者世多有之後世至有因之以為冨貴利逹之途赫然與王公大人並馳爭先者侯之孫自壯歲抱其才逰京師𢾗被荐不合去最後受知集賢諸學士荐為甘肅儒學副提舉又翩然嘆曰即見用以踰五望六之年馳𢾗千里之地逐尺寸之祿智者不為也曰天華吾故土吾將老焉其猶有乃祖之風與其辭曰瞻天華之岩岩兮前青牛而後玄武乍蜿蜒而回伏兮忽鶱騰而軒翥丹霞爛其高兮白雲縞乎在下俯城郭之鱗蓐兮覽平原之膴膴香城鬱其在望兮乃匡仙之故居枕黑潭之黕淡兮大江淘而右趨步靈皋而造神澳兮顧列仙之攸館浮丘既厭世而髙馳兮閻仙又擯余而不返召青鵉使駕輅兮俾鳯以調笙抗文龍之雲旗兮仍析羽以為旌兾神君之來降兮余將肅其並迎昔孔子之欲乘桴以浮海兮老聃亦度關而西逰知文武之不可作兮道凛乎其莫留何盛世之孔明兮亦高蹈而逺引矧兹邑之巨麗兮乃英賢之所藴君子固難進而易退兮亦因時而顯隱神君既有此靈宫兮曰高明而又􅲞塏山叢叢以四周兮繚青川之凂凂撫下人而顧懷兮歷千歲而猶未改起倚檻而浩歌兮將畢景而靡悔臨江路玉笥山萬夀承天宫碑天下稱大名山在大江之西者三曰匡廬曰閣皂曰玉笥玉笥又為天下絶境按道書及啚志于洞天則太秀法樂于福地則郁木凡為老氏之宫二為觀二十有一而皆統于萬壽承天之宫宫在洞天之西三會峯之下玉澗之上云即梅子真隱處漢𥘉覆箱之麓有觀曰玉梁言𥘉為觀時天降白玉梁因以為名晉永嘉中徙號于此唐之季道士劉潛谷建老君院觀旁曹處明亦建精思院而王處士遂以觀為靈寶院南唐保大中徙靈寶又質議合三院之田復為玉梁觀劉傅陳紹觀王傅丁守玄姚文質曺傅宋懷德汪希聲皆有道者號玉梁八祖宋大中祥符元年賜觀額曰承天宣和𥘉升為宫宫之衆幾六千指為友寮五十餘而唐宋之君𢾗設金籙醮于此故玉笥之名震天下大觀庚寅宫災各出建壇埸以居寮之存者僅十有三靈寶之友曰超燕浩然水竹飬真老君曰智仁玉洞玉山夀玉精思曰清音清隱桐澗道沖雲菴建炎紹興之際管轄劉思齊知宫楊得清始復其宫何道沖何守元繼之宮日以修咸淳中𬋩轄李允一之兄珏為閣門宣贊舍人淂幸上為請以甲乙傳次從之入國朝至元二十六年詔加萬壽承天宫給五品章以允一為夲宫住持提點兼夲路道録與知宫謝景巽謀大新其宫以稱上賜景巽乃種樹積財以待之大德三年𥘉作東西廡而允一卒劉夀翁周源深劉居敬何應仙等繼之皇慶二年壽翁源深建壽春閣主宰三官三殿延祐改元建三門及正紀堂鐘樓齋堂庖庫之屬至順二年居敬應仙建三清殿費以巨萬計居敬及李師周各以私錢五千緡倡之餘皆出諸宫中王寶仙等木惟棟材淂巨檆株于郡人鄧守一餘皆取之謝景巽所手植之者于是棟宇之制金碧之飾象設之嚴莫不度越于前矣又增飯衆之田合新舊為畝萬有竒而宫始大偹君子曰大江之西雖有三大名山惟此山兼洞天福地之重峯有太白雲臺郡玉秦望之屬三十有三壇有太清太一曜明白鶴之屬三十有九臺有東華赤松白雲之屬十有二谷有彤霞卅陽之屬五井有丹砂玉乳醴泉之屬十至若三溪八池七潭六源四塢二十四澗皆勝絶之處髙摩天關勝入地軸載之莫究其名窮之莫極其源雲雨所都雷電所家金芝靈草之所囿神龍異獸之所窟宅天鍾其英地儲其靈磅礴扶輿非遺世絶俗乘虗馭景之士不能遍睹也古今隱居淂道于此計不可𢾗其幸知名者若秦孔丘明等十人漢梅子真梁杜曇永蕭子雲唐羅子房羅公逺謝修通劉道平宋沈鱗毛淂一李思廣之徒三十有八人皆磊落竒傑世不常有其不肯名于世者不知其幾且神禹大聖也漢武英君也言皆嘗應符受籙于此使天下之人披啚志聼逰士談説孰不延頸稽首矯然如在弱水之外信天下之絶境矣而萬壽承天宫實統此山不亦重乎今宫庭之麗不獨可稱上賜又足以稱此山不亦美乎然是宫也興于漢盛于唐燬于宋雖復于南渡又二百餘年以至于今始完且美厥惟艱哉為之後者當何如其繼也今住持提點是宫者通玄沖素明逺法師教門高士何君應仙也宫之浩然堂卲天麟念其修𣸪之難何劉以上諸老之勤請文刻石余與邵然又嘗識何君序已復係以詩詞云大江之西洞庭東三山鼎峙爭長雄玉笥嵯峨與天通千回萬轉重復重十人避秦入山中池飬十魚為九龍九人乘龍上虗空赤帝飛入為九嵕四海照耀何烘隆三疏不救莾賊凶曹瞞欺天塞帝聰玉梁白晝隨靈霳夀春真人抗靈蹤玉壇佳氣常鬱蔥璇題翠羽開神宫九霞照地光熊熊急澗鳴玉相撞舂群峯四合如朝宗承天萬年亮天功太秀幽詭郁木同重岩洞􅊤守鬼工白猿夜唬寶氣衝我欲求之白雲封金闕先生碧兩瞳弟子文詠敬以恭巢雲駕霧留飛屣玄洲長史白玉容八十二口來相從一入不復世莫逄忽而見之若發蒙朱宫玉堂繍簾櫳青童素女清而丰桃花杏花相映紅忽而不見空溟濛或聞玲玲磬與鐘或如金雞曉啼風何劉沈謝𢾗十公遺聲逸響猶渢渢霓旌羽莭何當降霞衣飄飄珮琅璁下與世人哀􅟂恫身為風牧常先鴻上佐皇羲播時雍還淳返朴服孝忠物不疵􅸳年穀豐氣酣飛上三會峯周覽四極摩蒼穹前有天柱如華嵩落日照作金夫容三峯東出號赤松雲臺太白相橫縱群玉金扇逺更濃兩峯相倚如駏蛩𬗋薇高閣𬗋霞沖石橋金柱爭巃嵸長江外抱如白虹束以驚峽轟奔洪千今萬古聲淙淙百神歆集元氣融超凌蓬萊軼崆洞仙來不來我心忡山中有草名碧茸食之千歲顔如童我欲求之不可窮願珮舍景從仙翁𬗋袍白馬來兩騣凶鬯匕奪取神君一尺銅坐閲絶景忘春冬敕賜漢昭烈帝廟碑燕俗廟祀漢昭烈帝關將軍羽及奉蜀郡太守李氷甚虔昭烈關將軍皆涿人今州南十里樓桑村即昭烈故宅其祀昭烈羽冝以鄉里故氷在蜀堰江水以灌民田又鑿石為犀五牛以厭水妖燕無洪河大川歲多暴水故涿之范陽禮智鄉有益者神巫王媪之子也媪為巫五十餘年媪死益襲其業如媪之神遂合所淂施與作昭烈帝及蜀太守廟于其里前遼陽行省平章政事今中政院使哈刺帖木兒相以私錢若干而殿堂門廡象設器物之屬無不偹元統元年九月十日為請于上降香幣以落其成明年三月六日又言之奎章閣侍書學士沙刺班使奏命臣傒斯紀其事于石而上皆從之其不絶人為善之略如此且天子固天下神民之主凡有功烈于民者冝不限以地使天下皆淂尸而祝之以係其尚德慕義之心然臣聞有天地即有鬼神鬼神一隂陽也陽其神隂其鬼陽變而隂化一變一化鬼神之道著矣故傳曰鬼神之為德其盛矣乎謂鬼神能禍福人者無之作善降之百祥作不善降之百殃此鬼神之機而善惡之應皆人所自為也雖古之巫覡禱禳祈禜亦因其人心所感而為之應焉爾所禱非所感而能福人者無之故曰皆人所自為也若昭烈續漢祚于既亡關羽不事賊操而委質劉氏李氷當秦之暴而拯民于溺至今人廟而祀之者豈非為善之應耶亦其所自為也神既以此而受福于千萬世其所以福人者豈肯異于其所受耶嗚呼隂陽也鬼神也極天下為能變化者也福善禍淫而無所容其心人可不知所自為也哉詩曰求福不回此之謂也臣既奉詔謹拜手稽首而著其説𣸪為之詩曰坎坎兮伐鼓掦揚兮合舞神之來兮如雲神之去兮如雨神福我民兮不知民望神兮恐神不來神不來兮心孔悲神之來兮民之依黃屋兮赤旗左諸葛兮右羽飛神在漢兮漢不衰漢雖衰兮神不遺神福我國兮踰漢盛時長戟兮丹轂堰江流兮潅平陸神在蜀兮秦之福禾黍芃芃兮妖孽伏神福我兮如神在蜀涿鹿兮范陽神之合兮煌煌冝君冝臣兮祚靈長五風十雨兮均万方廟孔碩兮荐苾芳神永世兮兹顧享雙莭廟碑皇帝元年江浙行省言漳州萬戶府知事闞文興死其君配王氏死其夫邦人既為之立廟請加褒顯以慰邦人心以為天下後世勸乃下吏部㝎封太常議諡而封闞文興為英毅侯王氏為貞烈夫人廟曰雙莭之廟今右司郎中張侯士弘為吏部侍郎時所力行也新安鄭玉復持張侯命請暴其事于麗牲之石闞文興不知何許人王氏金陵民間女至元十三年從萬戶賈將軍戍漳州十七年八月望劇賊陳釣眼夜率衆為亂殺招討傅全及其一家官軍死者十八九闞文興力戰死其配王氏有美色為賊所執逼汙之紿曰我不幸至此豈敢愛其身碩收葬吾夫然後惟命賊義而許之淂其夫亂尸中置積薪火之遂自躍火中并燒死後十八年府始上其事連帥及部使者以逹行省又九年行省始聞于朝下禮部議部請訪王氏族里旌其門閭收恤其宗親乃以其事付史館事下江浙求之六年無所淂乃用漳守言表其故營曰烈女之坊然無及文興者又二十一年士民之言不已以有今日之請嗚呼二人之死卓卓如此猶歷五十有四年始獲五等之封雙莭之錫且必待張侯贊之人之伏岩藪沉下僚砥名礪操欲聞于天下不亦難矣况𢾗十年之間有司之請朝廷之議皆為王氏止王氏信莫及已闞文興亦詎可少哉天下綰符杖莭擁萬夫之衆鎮千里之地者不知其幾一旦四方有急天子之命未及于境已閉閣稱疾者有矣遂委兵而逃者有矣當是時變起倉卒使闞文興苐守薄書期會之常負妻子踰垣而避之人亦孰淂而議之而臨難忘身見危授命蒙凶威蹈白刃奮萬死不顧之勇死而不悔者何則禍亂作于前忠義激于內不暇擇地而死也至于王氏決死生于俄頃不辱其身烈丈夫有弗逮矣君子曰人皆死于危二人獨死于安皆有苟兔之道而不為也然江浙之請雖堅中書之命雖下微張侯英毅必不侯貞烈之封亦不及而闞之死其君王之死其夫亦豈欲求廟食兾褒寵邀譽于天下哉誠不忍棄君臣夫婦之義焉爾傅全闔門死難有司之請䎐廷之議皆不及者武臣死事國有常典云其詞曰世道升降視綱與常綱常弗紊國乃吉昌仡仡闞矦夙佐戎幕匪矛匪戟而簿書攸記婉婉王姬來嬪于闞夙興夜寐惟警戒是鑒元有南土爰鎮于漳閩山岩岩以海為疆謂國既平謂威德既加弗戒弗偹而內生孽芽盜夜斫營矦亦戰死王姬不辱入火如水五十四年民請弗却廟有新號而封有新爵載念厥𥘉風教未立三綱如此命胡不集唯矦克齊而家而婦克配爾德生雖不融沒有遺則民心孔懷廟食孔宜式著刻辭為臣妾之規龔先生碑自周程朱張氏沒天下一資其書以為富貴利達孔孟之道暗然不明宋末科目極弊之餘用周程朱張氏之書以為學皇元科目復興之後能用周程朱張之書以為教吾郡南昌則有龔先生云先生沒九年其門人朱志孚黃􅛽尹三以狀謁銘其始至也余以憂在告其再至也國方有大故三至而辭益悲志益勤淂師弟子終始之道乃敘其概而銘之先生諱日新字中孚五歲入小學十歲通進士業十五有能聲洪胡氏純饒氏應中吳氏應期始去舊業由周程朱張氏之説以求達夫孔孟至元中以郡太守之招分教進賢日與邑賢士龔君煥講求孔孟之旨使知仁義為重富貴利達為輕而孔孟之道為大邑人翕然師尊之先生八歲時大父成已以户調督輸失期逮至邑潛往候之坐當笞徔容進曰大父耄老家君適有采薪之憂幸少貸當代輸令大驚試以尚書禹貢盤庚諸篇誦説如注令禮而免之父鈞嘗淂暴疾氣己絶咸謂宜遷正寢先生曰必三日乃可時時手注善藥口中翼日忽自蘇又十二年而終婦翁袁大夫漸治宜黃有殺人之舅誣其甥而已證之者先生至邑亷淂實白而正之咸淳𥘉度宗潛藩恩試京師謁陳尚書宜中坐頃賈似道至起避旁舍中賓退尚書曰能一詣此人否對曰不能尚書嗟嘆久之咸淳癸酉復與計偕而國亡矣吳先生疾也日往問焉其沒也無以為哀己葬焉其教人也諄諄不􅌒不達不止嗚呼先生逺矣今之讀周程朱張氏之言者皆是也而先生逺矣沒之日實至治二年八月五日以某年月日葬于某夫人某氏子男三以莊立信太𥘉莊早世孫男五名與竇侍郎禹鈞之子同而亡其侃乃銘之曰道行以天行道以人萬變摩蕩忽而磂磷惟君子人內主外賓彼德于天吾自吾身窮達一揆尊尊親親邈矣先生勒此貞珉嚴先生碑世有朴山易説十四卷宋末吉之太和嚴先生肅所著也咸淳中江丞相萬里馬丞相廷鵉皆好其書為獻之天子徵為祕書省較勘宋亡之歲三月二十有五日亦以疾亡皇慶𥘉余在京師識其曽孫有開有才藝有德行問其世則曰吾之先馮翊人也唐之季袓實為江淮轉運判官遭亂不能歸留居廣陵子可求事江南吳王為尚書僕射同平章事子續又事江南李主亦以門下侍郎同平章事是為懿公遷金陵亂孫美舉家南竄至太和家焉遂為太和嚴氏自懿公後始去干戈事文學自祕書郎常州推官震始登宋慶曆壬午進士迄宋亡為世科之家又一十有八年余在奎章閣遺余書曰昔者嘗獲與子詳吾世家于京惟大父績學篤行著書立言以惠吾後人而墓道之石未列所刻辭敢請按先生字子方曽大父諱光道朝奉郎通判潮州康元之弟也官保義郎淮東制置司幹辦公事大父諱知古父諱起豫娶假氏子男二􅋮父用父孫男四曽孫男若干人女若干人壽六十六墓在縣南之某鄉隆福山之原夫易之道深逺矣世之言易者至衆矣嚴氏之書最晚出致使名宰相獻之天子藏之祕府固有以淂聖人之心乎嚴氏兩世相霸國而轉徙喪亂曽無寧歲積十有餘世乃淂先生以四聖人之心竭四十年之力其書不與國俱盡宜哉先生之被徴召也到官數月即自免去曰吾豈以六十之年而不知其所止乎易曰介于石不終日貞吉言知幾矣銘曰經之全惟易然言之難公淂焉子若孫尚永傳樂􅉌碑余嘗讀老聃氏書至長生久視之説曰此世所謂神仙者非耶又有能以術役鬼神召雷電禱雨晹已疫癘亦曰出老聃氏老聃氏果何道哉廬陵高敏則君者博達深識之士也有所善頥浩先生頥浩先生者郡之安福人也名同寅字惟寅姓陳氏宋咸淳中棄家入清真觀為道士至國朝天下郡縣置道官又置南北道教所以領之其教所號之曰明素葆真大師教門高士以為郡道録即為之不辭厯住沖虛觀梅峯道院所至禱雨暘已疫癘崇棟宇辟土田至于起居飲食莫不與人同也然今年八十矣顔如春花步履飄飄然才如四五十人又善為歌詩一字作不俗下語不知何道以致之及察其所讀書皆老聃氏書也觀行事皆非老聃氏所嘗言者豈守其真而溷其迹耶高敏則君又嘗聞其言曰天地果無終乎則纍纍乎莾蒼之野者何為而有之天地果有終乎則炳而為日月星辰峙而為山嶽流而為河海何為而莫之易也故聖人能其所無終不能存其所有終衆人常𣣔其所有終而不能存其所無終彼纍纍者吾獨且奈何哉今求吾之道者曰老聃氏也求吾之行者曰老聃氏也彼烏知老聃氏者天地存亦存天地終與終天地而有不終者存焉彼又烏知老聃吾方且為樂􅉌以待天地之終也聞有揭子者能言孰為吾使志之高敏則君以告乃為之志而歌曰猗頥浩兮不與我好兮而使余告兮猗賾浩兮不與我期兮而謂余知兮天地廓廓不可以度日月爍爍不可以約吾非老聃安能志斯􅉌之樂大元敕賜正奉大夫江南湖北道肅政亷訪使董公神道碑元統元年十有一月月幾望奎章閣承制學士臣沙刺班召臣傒斯至學士院傳詔命臣撰故正奉大夫江南湖北道肅政亷訪使董公神道碑别敕新南臺治書侍御史臣巙巙書其丈翰林學士承旨臣師敬篆其額臣竊謂自太祖皇帝應天啓運其將相大臣父子孫曽傳百數十年稱名臣者數十人或擁旄杖節出謀發慮佐定海宇或安危靖亂行政施化藩屏國家于外或獻可替否拾遺輔過匡輔政理于內功不絶于信史名不染于罪藉天下庸人婦女皆能稱説者惟董氏而已以臣傒斯獲偹載籍與有榮耀故不敢伏闕辭讓謹按公諱守中字子平世為真定藁城人曽大父龍虎衛上將軍左副元帥知中山府事諱俊大父資德大夫僉書樞密院事典瑞卿諱文忠龍虎公第八子上自天子皆以苐稱父資德大夫御史中丞諱士珍公始入太學簡知世祖召問時政條對詳敏如素習吏事者命之仕則辭年二十二乃以世胄輔內供奉歷尚服院懷慶路判官河南行省理問典瑞丞僉典瑞院事集賢侍讀學士浙東亷訪使湖南湖廣參知政事漢中湖南湖北亷訪使纍階正奉大夫公入官幾四十年最其在官才十有二年以母喪去供奉間居十有七年以尚服院罷解判官間居一年以上怒有司左遷公止懷慶之行間居三年以父憂不果赴理問及辭典瑞丞終制二年以弟守庸為御史舍浙東以疾棄河北皆間居二年遂以至順四年六月朔年六十一薨于家自同大父以下親無不在旁者薨九日葬邑西九門先塋贈某官公之居家與夫人事父母盡其孝遇宗族鄉黨賓客盡其禮馭臧獲盡其恩諸弟妹昏嫁皆取具夫人奩中之資父之澤則以讓其弟大父之澤則以讓其叔父諸子女無適庶視之如一公之居官潮壅揚州金沙河舟楫不通豪民恐奪兩河地數賄有司勿濬有司亦因以為利及公為河南竟濬之河北飢部使者下令盡逐流民之南渡者北歸公盡止而濟之其在湖廣宋以馮文簡公故宅為貢士院在洪山寺傍及宋亡寺燬屋仆碑而有其地公𣸪取以為貢院江西歲給蒙山銀冶糧四萬餘石輸銀三萬五千兩興國龍閣諸山亦多産銀有請色辨蒙山銀者公曰此姦利之民也斥之公方留妻子于鄂赴漢中過汳當國家中興行省大臣留參軍事肅清郡邑以迓新天子多用公計策獨不聽諌止孛羅守潼關關果不守騷動三晉及新天子至召賜白金百兩以為河南亷訪使帥師守武關迄亂定無一人敢窺關者明年天下大飢武昌群豪控諸米商閉糴以徼大利城中斗米至萬錢公適至杖其黨與七十餘人米大賤又輟貢士莊錢入學養士恐以飢廢講刻朱文公戊申封事于南陽書院使學者知格君之道有司受贓聼民誣父妾負財逃妾實與爭溺水死公正有司及誣者罪惟公平生于朝廷無干進之櫝于權門絶私謁之迹又不幸年止中壽故上不能盡公之用下不自竭其志竟如是而止悲哉然臣嘗待罪國史伏讀太祖以來實録及觀董氏家傳朝野所記載詢諸典刑故老董氏之先南征北伐未嘗妄殺一人妄施一政天下𥘉定諸將並解兵柄唯董氏不許以僉樞公寄天子腹心居中者四十年才四遷其官觀公進退可謂無忝乃祖矣公夫人名臣翰林學士承旨王文康公鶚之孫翰林直學士之綱之女勤儉懿愛德為九族師封隴西郡夫人生三男子一女子男轄鉉鑰也姬子女各一人男鐩轄由武偹庫使五遷而僉群玉內司事亷直貞亮為英宗文宗所知及鉉之篤行鑰之好學鐩之修謹皆能守祖父之訓為孝子慈孫龍虎公纍贈推忠翊運效莭功臣太傅諡忠烈僉樞纍贈體仁保德佐運功臣太師諡正獻中丞贈純誠肅政功臣太傅諡清獻階並開府儀同三司勳階上柱國爵皆趙國公銘曰天啓有國篤生賢哲董氏數世終始一莭人謂董氏獨保天迪匪天私董唯以不殺如漢鄼留佐命興劉有舉必賢有謀必酬惟滿溢是戒惟清靜是修又如西平在唐之造功則讓能過則引咎惟善是與惟德是𢡟而子而孫半涆天下王公令僕方騖並駕人惟好德如春在物生生靡窮莫之能敢遏豈彼驕陽焮灼歊蒸歘兮凜秋為寒為氷矧兹董公翼翼其承惟祖考是訓惟德義是經進退用舍與時偕行用不盡材壽不侔德而公之嗇而後之益隱卒豐終為天子之公厚本濬源惟子孫之恭臣拜稽首式掦休風以示趙人以篤世宗趙功可墓志銘余讀太史公書至倉公扁鵲傳嘆曰功之及人深矣然其子孫無傳焉歐陽先生守道所為天和老人碑纍千數百言與龎安常並稱且曰子若孫皆進于學其門户將大又嘆曰子孫之大也其必由學乎天和姓趙氏其始祖三衢人徔趙清獻公官贑上至廬陵家焉三世至榮道盡讓田廬兄弟而自立榮道生慶善慶善生鶚飛是為天和博學善為文章有盛德著書百二十有六卷生四子惠願贑日章日章徔老氏學惠生宋永宋強願生宋文贑生宋庠宋安宋永字儀可宋安字功可以文章齊名號二趙先生儀可嘗三貢于鄉又入太學充博士弟子員宋強亦登進士第為韶化簿尉卒功可雖不及貢他人淂其文輒與貢使宋不亡儀可必不止太學功可必貢且第及科舉復則皆老矣儀可尋沒功可喪明然儀可之文播天下功可謹自晦猶為人所尊尚稱鄉先生泰定三年十有二月乙未功可亦沒明年秋八月其孤靖衰絰走門泣且拜曰我大父則歐陽先生銘其墓而文丞相題其蓋我伯父則翰林學士承旨程公銘其墓而翰林學士承旨趙公書其碑惟先人之葬願併以纍子噫余敢抗諸老哉然獲知功可今二十七年矣其淂辭君生七歲而孤服除而母嫁大父鞠而教之警敏絶人貫穿諸經羅絡百家而為人溫厚純慤和而不同為文疏達雅粹豐而能約其教人也本之以不欺繼之以不􅌒故徔之遊者皆賢子弟其兄死諸孤孑立皆與教育而昏嫁之而見之未嘗不以禮晚歲樓于屋之西偏揭曰吾美蓋感其平生淪落不偶晚得安享太平無去國懷鄉之憂而自幸也自是賦詩飲灑無日不在兹樓矣及其沒也飲酒三日無疾而殁年八十一娶胡氏子男三人初逺靖初客南海二十年父死不及歸逺為新會縣教官卒凡喪紀惟靖而已女一人適張元孫男六宜簡宜晦宜遜宜立宜和宜肅女一人曽孫男女各一人將以閏月二十日葬所居之趙山嗚呼功可已矣余觀靖之為人簡慤嚴重且其為文甚類其父諸子又類歐陽先生所謂大者其在兹乎儀可後易名文家復有神甑之事云銘曰趙昔有甑大比則鳴伯也三應叔果弗靈甑既墜矣天開聖朝昔視為祥今視為妖溫溫君子弗究以老藹藹令德無忝祖考嗟爾振振曰子曰孫念爾祖考允大爾門奔清甫墓志銘安成有士而隱于醫者曰奔氏諱清甫生宋寶祐間九歲而孤即強學自愛視取高科都美官如指掌積勤十二年而國亡科舉廢又連遭大喪征徭風火巨室瓦解乃盡棄其田疇取神農黃帝之書日夜讀之心通理解天授神設以之察脈視疾論生死虛實寒熱雖世業鮮能過之四方無貴賤貧富求者如歸市遂以名醫聞自是聲日起家日𥙿而無推剝糜爛之憂天下立醫學置吏多勸君為之者君不應然學校每賴君以為重君平居孝友凡見父之執母之族必敬之如父母兄深甫貧事其兄如父事其嫂如母撫其子如子從父仲龍老而無家養之終身兄及從父沒以禮葬之徔妹之夫劉才英溺死二孤煢然君為經紀其家同居子姪有他適必謹視其私雖犬承使各得其所故家子弟羇孤淪落旁皇無所歸或館之或食之或衣之曰此名家之子也人以橫逆相加未嘗難焉惟讀書老不釋卷多所編校及科舉𣸪而老矣泰定三年七月淂疾手課程文一通授其子沭浴衣冠語衆曰後三日夜半吾當死及期而卒年七十二將以沒之明年九月庚申葬郭北順安鄊印山之原孤元凱令其子中冷以書謁銘君之先汴人七世祖仕能事宋徽宗為侍禁靖康之亂從隆祐太后南幸至安成家焉仕能生成甫成甫生逸孝宗時舉直言極諌科逸生成莭郎子英子英生普州安居尉士同士同生志學是為君之父君三娶皆劉氏子男三元方元凱元中元方本趙氏子從母歸奔故冒奔氏興元中世醫學惟元凱業儒文多竒女三長適鄉貢進士劉辰發之子尚賓次許適倪剛大孫男五長中冷業進士有聲餘方向學女二惟君少孤能勇自樹立既食于醫能為善不􅌒又力以詩書教子孫沒猶不忘以進士業勵其後且其明足以知死生之故有合于君子之道宜淂銘銘曰猗民之生汨汩營營為之禮樂以防其情為之藥石以和其形民猶蚩蚩弗念厥生善為政者不失其經善為方者不喪其平惟以保其真嗟嗟奔卿子孫其興處士楊君墓志銘豫章先生熊氏以六經教授東湖之上燕晉齊魯關陕之士皆不逺數千里受業門下去即掇高科都顯官立盛名至有閉户窮經甘白首而不屈者郡人楊綬又獨嶄然群弟子中其讀書務求大意不棘棘章句其為文鉤玄抉幽非博學識字不能讀然反覆沉欎固將就平易而未及者其力行敦六行明五教邪説不能亂世好不能惑恆居無雜言盛暑必冠帶與人交必敬為人謀必忠不以利害枉其道不以毁譽屈其志三試進士三見默不易其所好熊先生深愛之同學亦皆以為不能及熊先生沒常忽忽不自聊然益奮于學有一日千里之勢至順二年四月二十日年三十八竟以疾卒君子莫不傷之且曰使不死吾輩皆當出其下明年夏其孤某年月日葬于某以狀介父之執至京師請銘按楊氏其先聞世家五世祖顯壽徙豫章遂為南昌辟邪里人顯壽生文質文質生炳及開慶己未進士撫州金溪主簿會龍炳無子以會龍次子惟善為之後娶信州鉛山主簿胡庭桂女生君君字宗敬早孤能服勤母教又淂名師友以成之故所至有過人者惟人之生也命之修短懸于天學之成否係于人是以君子之學常恐志未畢而年不待也孜孜勉勉死即已矣若楊君者不亦深可哀耶君娶揭氏生二子成允成彥二女尚幼銘曰梗楠豫章為棟梁兮璆琳琅玕為圭璋兮才而短折君子之傷兮揭文安公文集卷之十二
