  text: 掲文安公文集卷之十二
  hash: sha256:04d4715ed6f55927fe313b266572137354829975ef8b08714b4b9141cba090bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_012-1a}
body:
  text: 掲曼一碩傒斯著門生前進士爕理溥化校録碑大元勅賜脩堰碑江水出蜀西南徼外東至于岷山而禹導之秦昭王時蜀太守李氷鑿離堆分其江以潅川蜀川蜀以饒自秦歴千数百年所過衝薄蕩嚙大為民害有司歲治隄防百三十三所役兵民多者萬餘人少者千人其下犹𢾗百人人七十日不及七十日雖事治不淂休息不役者三日緡冨屈于貲貧屈于力上下交病㑹其費歲不下七萬緡毫髮出于民十九藏于吏㮣之出入不足以更費至今上皇帝即位之明年僉四川亷訪司事吉當普廵行周視淂要害之䖏三十有二餘悉罷之且召灌州判官張弘計曰若甃之石則役可罷民可蘓弊可除胡惮而莫之爲弘曰公慮及此此生民之福國家之幸萬世之利也弘請出私錢試以小堰堰成水暴漲堰不動乃具文書㑹行省及蒙古軍七翼之長郡縣守宰郷遂之老各陳其便宜皆曰便復禱祠与神約昔鑿離堆以冨川蜀建萬世之利神之功也今水失其道民失其利吏乗其弊若此而神弗之救是神之惠弗終也神克相予予治神弗予相請與神從事卜之吉于是徴工發徒以至元改元十有一月朔肇事于都江堰都江即禹鑿之處分水之源也塩井関限其西北水西関據其西南江南北皆東行北舊無江氷鑿以辟沬水之害中為都江堰少東為大小釣魚又東跨二江為石門以莭北江之水又東為利民䑓䑓之東南為侍郎楊栁三堰其水自離堆分流入于南江南江東至鹿角又東至金馬口又東過大安橋入于成都俗称大皂江江之正源也北江少東為虎頭山為閗鳮䑓䑓有水則尺為之畫凡十有一水及其九其民喜過則憂沒其則則困乃書深淘灘低作堰六字其傍為治水之法皆氷所為也又東為離堆又東過凌虗歩雲二橋又東至三石洞釃為二渠其一自上馬騎東流過郫入于成都古謂之内江今府江是也其一自三石洞北流過将軍橋又北過四石洞折而東流過新繁入于成都古謂之外江此氷所穿二江也南江自利民䑓有支流東南出萬工堰又東為駱駝又東為碓口繞青城而東鹿角之北涯有渠曰馬㶚東流至成都入于南江渠東行二十餘里水决其南涯四十有九歲疲民力以塞之乃自北涯鑿二渠與楊栁渠合東行𢾗十里復與馬㶚渠㑹而渠始安流自金馬口之西鑿二渠合金馬渠東南入于新津江罷藍綻黄水千金白水新興至三利十二堰北江三石洞之東為外應顔上五斗諸堰外應顔上之水皆東北流入外江五斗之水入于馬㶚渠皆内江之支流也外江東至崇寕亦為萬工堰堰之支流自北而東為三十六洞過清白堰東入彭漢之間而清白堰水潰其南涯延袤三里餘有司因潰以為堰堰輙壊乃疏其北涯舊渠直流而東罷其堰及三十六洞之役嘉㝎之青神有堰曰鴻化則授成其長吏使底其功應期而畢若成都之九里堤崇寕之萬工堰彭之㻚口豊潤千江石洞濟民羅江馬脚諸堰工未及施而詔亦責長吏及農隙為之諸堰都江及利民臺之役最大侍郎楊栁外應顔上五斗次之鹿角萬工駱駝碓口三利又次之而都江又居大江中流故以鉄萬六千斤鋳為大亀貫以鉄柱而鎮其源以捍其浮槎然後即工諸堰皆甃以山石範鉄以関其中取桐寔之油刀麻為絲和石之灰以苴罅漏禦水潦岸善崩者宻築江石以䕶之上植楊栁傍種蔓荆櫛比鱗次頼以為固盖以數百萬計所至或疏舊渠而導其流以莭民力或鑿新渠以殺其势以益民用遇水之㑹則為石門以時啟閉而泄蓄之凡智力所及無不為也𥘉郡縣及兵家共掌都江之政延祐七年其兵官奏請獨任郡縣乃以其民分治下流諸堰廣其増脩而大其役民苦之至是復合焉常歲獲水之用僅𢾗月堰輙壊今雖縁渠所置碓磑紡績之䖏以千萬計四時流轉而無穷其始至都江水深廣莫可測忽有大洲湧出其西南方可𢾗里人淂用事其間入山伐石崩石已滿随取而足所向皆然蜀故多雨自𥘉役至于工畢無雨雪故力省而功倍而民不知劳若有相之者亦其忠誠所感如此致使天子賜酒之使相望于道省臺勸功之檄不絶于吏所溉六洲十二縣之民皆歌舞焉而下至郡縣上至藩部悪其害已且疾且怨或决三洞之水以潅其次或毁都江之石以害其成撓之百端不㧞益固甫越五月大功告成百一恒費民永休享古未有也而吉當普㑹以監察御史召省臺上其功詔臣傒斯記之于碑臣聞水先五行食首八政九畴所序其次可覌矣夫水者衣食之原也然所以爲利亦所以爲害在善導之而已禹平水土犹己溺之后稷播種犹已飢之萬世有稱焉是故爲政不夲于農不先于水是爲不知務不知務是謂冥行之臣李氷一鑿離堆民受其賜吉當普才大而徳敏憂深而知逺不枉其道不屈其志臨难忘身爲國忘家安于命而勇于義而知所先務故事可立而功可建其在四川若請罷塩運使司正塩井之法以去其奸利置安撫使撫四方流寓之民使安其耕鑿及居臺端知無不言言無不合誠國之宝也判官張弘殚智竭慮終始克相其成雖百折而不悔亦今之賢有司乎是役也石工金工皆七百人木工二百五十人徒三千九百人而蒙古軍居其二千粮為石千有竒石之材取于山者百萬有竒石之灰以斥計六萬有竒油半之鉄六萬五千麻五千最其工之直物之賈以緡計四萬九千有竒皆出于民之庸積而在官者餘廿萬一千八百緡責灌守以貸于民歲取其息以偹祭祀若淘滩脩堰之共仍蠲潅之兵民常所徭役以専其偃事嗚呼後之涖此土者尚永鍳于兹勿怠其政墮其事以為民病以為國家之憂臣拜手稽首而作頌曰鑿離堆兮江势分川蜀饒兮民忘為秦秦可忘兮國有人何後世兮忘吾民歲伐竹兮歴岩㠂載乱石兮堰江涛堰無功兮民孔劳民孔劳兮天不吊龍伯怒兮江妃咲豈江之為患兮惟人自厚龍莭兮繡衣煒皇皇兮不我遺召龍工兮汝為汝詎知兮予所期江㴞滔兮廣且深鼋鼉出沒兮蛟龍晝吟下不可以極兮上若有臨洲澶漫兮江之心吾伐石兮石自摧吾召民兮民子來堰既作兮民無患菑此豈予之功兮神汝哀神洋洋兮功既畢堰永固矣民安佚川蜀饒兮國之寔千萬年兮功不失惟帝之力兮臣之職重建濟州㑹源牐碑皇帝元年夏六月都水丞張侯改作濟州㑹源牐成明年春二月具功状遣其属孟思敬至京師請文勒石惟我元受命㝎鼎幽薊經國体民綏和四海辨方物以定貢賦穿河渠以逸漕度乃改任城縣為濟州以臨齊魯之交據燕吴之衝道汶泗以㑹其源置牐以分其流西北至安民入于新河埭于臨清地降九十尺為牐十六以達于永濟渠南至沽頭地䧏百十有六尺為牐十又南入于河北至奉符為牐一以節泗水東北至于兖州為牐一以節汶水而㑹源之牐制于其中歲益乆政日弛弊日滋漕度用弗時先皇帝以為憂延祐六年冬詔以侯兮治東阿始脩復舊政誕布新令嚴暴横之禁杜奸利之門南疏北導靡所寕䖏明年冬以當代請去弗許行視濟牐峻怒狼悍歲数壞舟楫土崩石泐岌不可持乃伐石區里之山轉木淮海之濵度功即工大改作焉明年皇帝建元至治三月甲戌朔侯朝至于河上率徒相冝導水東行堨其下上而竭其中以儲衆材徹故牐夷拗泓徙其南二十尺降七尺以爲基下錯植巨栗如列星貫以長松实以白石㮣視其地無有所罅漏衡五十尺縦百六十尺八分其縦四爲門縦孫其南之三北之一以敵水之奔突震蕩五分其衡二爲門容折其三以爲两墉四分其容去其一以爲門崇亷其中而翼其外以附于防参兮門縱間于北之二以爲門中夹樹石鑿以納懸板五兮門崇去其一以爲鑿崇翼之外更爲石防以禦水之洄洑衝薄縦皆二百三十尺爰琢爰甃犬牙相入苴以白麻固以白膠磨礲剷磢関以劲鉄厓削砥平混如天成冠以飛梁偃如卧虹越六月十有三日乙夘訖功大㑹群属宴于河上以落之工徒咸在旄倪四集酒舉楽作揮鍤决堨艤棹魚貫水平舟行伐鼓歡呼進退間暇其称侯之功頌侯之徳雷動雲合且拜曰聖天子継志述事不易任以成厥功惟億萬年享天之休是役也以工計石工百六十人木工十人金工五人土工五人徒千四百二十人以材計木萬一百四十有一石五千一百二十有八甓二億一千二百有五十以斤計鉄二萬五千五百麻二千三百石之灰三億三萬三百三十有四以石計粟十二百有五十視他牐三之視舊倍之其出于縣官者鉄若麻木十之七石五之一粟五之三餘一以便冝調度不以煩民此其大較也𥘉侯至之明年凡河之隘者辟之壅者滌之决者塞之㧞其藻荇使舟無所底禁其芻牧使防有所固隆其防而廣其阯修其石之岩陁穿漏者築其壌之疏悪者延袤贏七百里防之外増為長隄以閼暴漲而河以安流潜為石竇以納積潦而瀕河三郡之田民皆淂耕種又募民采馬藺之寔種之新河两涯以錮其潰沙北自臨清南至彭城東至于陪尾絶者通之欎者斯之為杠九十有八為梁五十有八而挽舟之道無不夷矣乃建分司及㑹源石佛師荘三牐之署以嚴官守樹河泊龍君祠八故都水少監馬之真兵部尚書李奥魯赤中書断事官忙速祠三以迎休報劳凡河之所經命藏水以待暍者種樹以待休者遇流莩則男女異葬之餓者為粥以食之死而藏飢而活者𢾗千人是以上知其忠下信其令用克果于兹役也侯亦勤且能矣然古者三載考績三考黜陟幽明故人才淂以自見方世祖皇帝時天清地寕群賢滿朝少監馬公之徒以陳力載劳垂功無穷者慮之逺擇之審任之専也向使侯竟代去雖懐甚忠極智無能䆒于其聀是亦侯所遇也惟兹牐地最要役最大馬氏之後侯之功為最盛故詳于是碑以告後之人侯名仁仲河南人辭曰昔在至元惟忠武王自南還帰請開河渠自魯渉齊以逹京師河渠既成四海率徔萬世是資朝颿夕檣垂四十年孰慢而墮翼翼張矦受命仁宗號令風馳徴功發徒既滌既脩濟牐攸基先鳮而興既星而休觸冐炎曦疾者薬之死者槥之奚有渇飢拊循劳徕信賞必罰勿亟勿遅十旬之間遹潰于成智㒺或遺洋洋河流中有行舟若遵大逵舳艫相衘㒺敢後先亦㒺敢稽賢王才侯自北自南頋盻嗟咨曰惟京師為天下本本隆則固惟帝世祖既有南土河渠是務四方之供于千萬里如出跬歩聖繼明承命官選材惟侯之遇昔者舟行日不𢾗里今以百𢾗昔者舟行歲不𢾗萬今以億慮惟公乃明惟勇乃成惟亷則怒汶泗之㑹有截其牐有菀其樹功在國家為在天下永世是度天華萬夀宫碑唐貞元中吉州刺史閻矦隐于城東十五里天嶽山之夫容峯後傳以為仙云其山世為閻氏業子孫世為郡人山高廣可十里俯覧郡中諸山或言古仙人浮丘伯及其弟子王郭二人亦嘗徃来其䖏及称山中多光怪倐忽变化甚異延祐三年矦諸孫弘毅即其地祠浮丘以其二弟子及侯配廣殿大庭髙門修廊皆合制度又割田廪有道之士以奉祠事明年郡人曽編脩巽申為請于玄教大宗師命為天華覌至順元年陞為宮明年正一教主三十九代天師加天華萬寿宫并書其顔咸謂君子作始罝具金石刻請為刻辞按庐陵志侯名宷𥘉隠夫容後淂道山東南三十里之洞岩臨江玉笥山志又言承天宫西南十五里南障山葆光覌有吉州閻使君别墅後淂道衡嶽學仙之人固􅉭忽不可知而戎昱集載送吉州閻使君入道詩此尤足徴者浮丘事見列仙傳天下高山絶境類有浮丘遺跡要不可詰然古之士君子負徳行方藝不見不用于世或著書立言以傳其道或躬耕採拾以楽其志或依托佛老以寄其跡若此者世多有之後世至有因之以為冨貴利逹之途赫然与王公大人並馳争先者侯之孫自壮歲抱其才逰京師𢾗被荐不合去最後受知集賢諸學士荐為甘肅儒學副提舉又翩然嘆曰即見用以踰五望六之年馳𢾗千里之地逐尺寸之禄智者不為也曰天華吾故土吾将老焉其犹有乃祖之風與其辞曰瞻天華之岩岩兮前青牛而後玄武乍蜿蜒而囬伏兮忽鶱騰而軒翥丹霞爛其高兮白雲縞乎在下俯城郭之鱗蓐兮覧平原之膴膴香城鬰其在望兮乃匡仙之故居枕黒潭之黕淡兮大江淘而右趋步靈皐而造神澳兮頋列仙之攸舘浮丘既厭世而髙馳兮閻仙又擯余而不返召青鵉使駕輅兮俾鳯以調笙抗文龍之雲旗兮仍析羽以為旌兾神君之来降兮余将肅其並迎昔孔子之欲乗桴以浮海兮老聃亦度関而西逰知文武之不可作兮道凛乎其莫㽞何盛世之孔明兮亦高蹈而逺引矧兹邑之鉅䴡兮乃英賢之所藴君子固难進而易退兮亦因時而顯隐神君既有此灵宫兮曰高明而又􅲞塏山樷樷以四周兮繚青川之凂凂撫下人而頋懐兮歴千歲而犹未改起倚檻而浩歌兮将畢景而靡悔臨江路玉笥山萬夀承天宫碑天下称大名山在大江之西者三曰匡廬曰閣皂曰玉笥玉笥又為天下絶境按道書及啚志于洞天則太秀法楽于福地則郁木凡為老氏之宫二為覌二十有一而皆統于萬寿承天之宫宫在洞天之西三㑹峯之下玉澗之上云即梅子真隐䖏漢𥘉覆箱之麓有覌曰玉梁言𥘉為覌時天降白玉梁因以為名晋永嘉中徙號于此唐之季道士刘潜谷建老君院覌旁曹䖏明亦建精思院而王䖏士遂以覌為靈宝院南唐保大中徙靈宝又貭議合三院之田復爲玉梁覌刘傅陳紹覌王傅丁守玄姚文貭曺傅宋懐徳汪希聲皆有道者號玉梁八祖宋大中祥符元年賜覌額曰承天宣和𥘉陞爲宫宫之衆幾六千指爲友寮五十餘而唐宋之君𢾗設金籙醮于此故玉笥之名震天下大覌庚寅宫灾各出建壇埸以居寮之存者僅十有三灵宝之友曰超燕浩然水竹飬真老君曰智仁玉洞玉山夀玉精思曰清音清隐桐澗道冲雲菴建炎紹興之際管轄刘思齊知宫楊得清始復其宫何道冲何守元継之宮日以脩咸淳中𬋩轄李允一之兄珏為閤門宣賛舍人淂幸上為請以甲乙傳次從之入囯朝至元二十六年詔加萬寿承天宫給五品章以允一為夲宫住持提點兼夲路道録與知宫謝景巽謀大新其宫以称上賜景巽乃種樹積財以待之大徳三年𥘉作東西廡而允一卒刘夀翁周源深刘居敬何應仙䓁継之皇慶二年寿翁源深建寿春閣主宰三官三殿延祐改元建三門及正紀堂鐘楼齋堂庖庫之属至順二年居敬應仙建三清殿費以鉅萬計居敬及李師周各以私錢五千緡倡之餘皆出諸宫中王宝仙䓁木惟棟材淂巨檆株于郡人鄧守一餘皆取之謝景巽所手植之者于是棟宇之制金碧之餙象設之嚴莫不度越于前矣又増飯衆之田合新舊為畝萬有竒而宫始大偹君子曰大江之西雖有三大名山惟此山兼洞天福地之重峯有太白雲䑓郡玉秦望之属三十有三壇有太清太一曜明白鶴之属三十有九䑓有東華赤松白雲之属十有二谷有彤霞卅陽之属五井有丹砂玉乳醴泉之属十至若三溪八池七潭六源四塢二十四澗皆勝絶之䖏髙摩天関勝入地軸載之莫䆒其名窮之莫極其源雲雨所都雷電所家金芝灵草之所囿神龍異獸之所窟宅天鍾其英地儲其灵磅礴扶輿非遺世絶俗乗虗馭景之士不䏻徧睹也古今隐居淂道于此計不可𢾗其幸知名者若秦孔丘明䓁十人漢梅子真梁杜曇永䔥子雲唐羅子房羅公逺謝脩通刘道平宋沈鱗毛淂一李思廣之徒三十有八人皆磊落竒傑世不常有其不肯名于世者不知其幾且神禹大聖也漢武英君也言皆尝應符受籙于此使天下之人披啚志聼逰士談說孰不延頸稽首矯然如在弱水之外信天下之絶境矣而萬寿承天宫寔統此山不亦重乎今宫庭之䴡不獨可称上賜又足以称此山不亦美乎然是宫也興于漢盛于唐燬于宋雖復于南渡又二百餘年以至于今始完且美厥惟艰㢤為之後者當何如其継也今住持提點是宫者通玄冲素明逺法師教門高士何君應仙也宫之浩然堂卲天麟念其脩𣸪之难何刘以上諸老之勤請文刻石余與邵然又嘗識何君序已復係以詩詞云大江之西洞庭東三山鼎峙争長雄玉笥嵯峨与天通千廻萬轉重復重十人避秦入山中池飬十魚為九龍九人乗龍上虗空赤帝飛入為九嵕四海照耀何烘隆三疏不救莾賊凶曹瞞欺天塞帝聪玉梁白晝随靈霳夀春真人抗灵蹤玉壇佳氣常欝葱璇題翠羽開神宫九霞炤地光熊熊急澗鳴玉相撞舂群峯四合如朝宗承天萬年亮天功太秀幽詭郁木同重岩洞􅊤守鬼工白猿夜唬宝氣衝我欲求之白雲封金闕先生碧两瞳弟子文詠敬以㳟巣雲駕霧留飛蹝玄洲長史白玉容八十二口来相從一入不復世莫逄忽而見之若發蒙朱宫玉堂繍簾櫳青童素女清而丰桃花杏花相映紅忽而不見空溟濛或聞玲玲磬与鐘或如金鳮暁啼風何刘沈謝𢾗十公遺聲逸响犹渢渢霓旌羽莭何當降霞衣飄飄珮琅璁下与世人哀􅟂恫身為風牧常先鴻上佐皇羲播時雍還淳返朴服孝忠物不疵􅸳年穀豊氣酣飛上三會峯周覧四極摩蒼穹前有天柱如華崧落日炤作金夫容三峯東出號赤松雲䑓太白相横縦群玉金扇逺更濃两峯相倚如駏蛩𬗋薇高閣𬗋霞冲石橋金柱争巃嵸長江外抱如白虹束以驚峡轟奔洪千今萬古聲淙淙百神歆集元氣融超凌蓬莱軼崆峒仙来不来我心忡山中有艸名碧茸食之千歲顔如童我欲求之不可穷願珮舎景從仙翁𬗋袍白馬来两騣凶鬯匕奪取神君一尺銅坐閲絶景忘春冬勅賜漢昭烈帝庙碑燕俗庙祀漢昭烈帝関将軍羽及奉蜀郡太守李氷甚䖍昭烈関将軍皆涿人今州南十里楼桑村即昭烈故宅其祀昭烈羽冝以郷里故氷在蜀堰江水以灌民田又鑿石為犀五牛以厭水妖燕無洪河大川歲多暴水故涿之范陽礼智鄉有益者神巫王媪之子也媪爲巫五十餘年媪死益襲其業如媪之神遂合所淂施与作昭烈帝及蜀太守庙于其里前遼陽行省平章政事今中政院使哈刺帖木児相以私錢若干而殿堂門廡象設器物之属无不偹元統元年九月十日爲請于上降香幣以落其成明年三月六日又言之奎章閣侍書學士沙刺班使奏命臣傒斯紀其事于石而上皆従之其不絶人爲善之畧如此且天子固天下神民之主凡有功烈于民者冝不限以地使天下皆淂尸而祝之以係其尚徳慕義之心然臣聞有天地即有鬼神鬼神一隂陽也陽其神隂其鬼陽変而隂化一変一化鬼神之道著矣故傳曰鬼神之為徳其盛矣乎謂鬼神能祸福人者無之作善降之百祥作不善降之百殃此鬼神之机而善悪之應皆人所自為也雖古之巫覡祷禳祈禜亦因其人心所感而為之應焉尔所祷非所感而能福人者無之故曰皆人所自為也若昭烈續漢祚于既亾関羽不事賊操而委貭刘氏李氷當秦之暴而拯民于溺至今人庙而祀之者豈非為善之應耶亦其所自為也神既以此而受福于千萬世其所以福人者豈肯異于其所受耶嗚呼隂陽也鬼神也極天下為䏻変化者也福善祸淫而無所容其心人可不知所自為也㢤詩曰求福不囬此之謂也臣既奉詔謹拜手稽首而著其說𣸪為之詩曰坎坎兮伐鼓掦揚兮合舞神之来兮如雲神之去兮如雨神福我民兮不知民望神兮恐神不来神不来兮心孔悲神之来兮民之依黄屋兮赤旂左諸葛兮右羽飛神在漢兮漢不衰漢雖衰兮神不遺神福我國兮踰漢盛時長㦸兮丹轂堰江流兮潅平陸神在蜀兮秦之福禾黍芃芃兮妖孽伏神福我兮如神在蜀涿鹿兮范陽神之合兮煌煌冝君冝臣兮祚灵長五風十雨兮均万方庙孔碩兮荐苾芳神永世兮兹頋享双莭庙碑皇帝元年江浙行省言漳州萬戸府知事闞文興死其君配王氏死其夫邦人既為之立庙請加褒顯以慰邦人心以為天下後世勸乃下吏部㝎封太常議謚而封闞文興為英毅侯王氏為貞烈夫人庙曰双莭之庙今右司郎中張侯士弘為吏部侍郎時所力行也新安鄭玉復持張侯命請暴其事于䴡牲之石闞文興不知何許人王氏金陵民間女至元十三年從萬戸賈将軍戍漳州十七年八月望劇賊陳釣眼夜率衆為乱殺招討傅全及其一家官軍死者十八九闞文興力戦死其配王氏有美色為賊所執逼汙之紿曰我不幸至此豈敢爱其身碩收塟吾夫然後惟命賊義而許之淂其夫乱屍中置積薪火之遂自躍火中并焼死後十八年府始上其事連帥及部使者以逹行省又九年行省始聞于朝下礼部議部請訪王氏族里旌其門閭收卹其宗親乃以其事付史舘事下江浙求之六年無所淂乃用漳守言表其故营曰烈女之坊然無及文興者又二十一年士民之言不已以有今日之請嗚呼二人之死卓卓如此犹歴五十有四年始獲五䓁之封双莭之錫且必待張侯賛之人之伏岩藪沉下僚砥名礪操欲聞于天下不亦难矣况𢾗十年之間有司之請朝廷之議皆為王氏止王氏信莫及已闞文興亦詎可少㢤天下綰符杖莭擁萬夫之衆鎮千里之地者不知其幾一旦四方有急天子之命未及于境已閉閣称疾者有矣遂委兵而迯者有矣當是時変起倉卒使闞文㒷苐守薄書期㑹之常負妻子踰垣而避之人亦孰淂而議之而臨难忘身見危授命蒙凶威蹈白刄奮萬死不頋之勇死而不悔者何則祸乱作于前忠義激于内不暇擇地而死也至于王氏决死生于俄頃不辱其身烈丈夫有弗逮矣君子曰人皆死于危二人獨死于安皆有苟兔之道而不為也然江浙之請雖堅中書之命雖下㣲張侯英毅必不侯貞烈之封亦不及而闞之死其君王之死其夫亦豈欲求庙食兾褒寵邀譽于天下㢤誠不忍棄君臣夫媍之義焉尔傅全闔門死难有司之請䎐廷之議皆不及者武臣死事囯有常典云其詞曰世道升䧏視綱与常綱常弗紊國乃吉昌仡仡闞矦夙佐戎幕匪矛匪㦸而簿書攸記婉婉王姬来嬪于闞夙興夜寐惟警戒是鍳元有南土爰鎮于漳閩山岩岩以海為疆謂國既平謂威德既加弗戒弗偹而内生孽芽盗夜斫营矦亦戦死王姬不辱入火如水五十四年民請弗却庙有新號而封有新爵載念厥𥘉風教未立三綱如此命胡不集唯矦克齊而家而媍克配尔德生雖不融沒有遺則民心孔懐庙食孔宜式著刻辞為臣妾之規龔先生碑自周程朱張氏没天下壹資其書以為富貴利達孔孟之道闇然不明宋末科目極弊之餘用周程朱張氏之書以為學皇元科目復興之後能用周程朱張之書以為教吾郡南昌則有龔先生云先生没九年其門人朱志孚黄􅛽尹三以状謁銘其始至也余以憂在告其再至也國方有大故三至而辞益悲志益勤淂師弟子終始之道乃叙其㮣而銘之先生諱日新字中孚五歳入小學十歳通進士業十五有能聲洪胡氏純饒氏應中吴氏應期始去舊業由周程朱張氏之説以求達夫孔孟至元中以郡太守之招分教進賢日与邑賢士龔君煥講求孔孟之旨使知仁義為重富貴利達為輕而孔孟之道為大邑人翕然師尊之先生八歳時大父成已以户調督輸失期逮至邑潜徃候之坐當笞徔容進曰大父耄老家君適有采薪之憂幸少貸當代輸令大驚試以尚書禹貢盤庚諸篇誦説如注令礼而免之父鈞嘗淂暴疾氣己絶咸謂宜遷正寝先生曰必三日乃可時時手注善藥口中翼日忽自蘓又十二年而終媍翁袁大夫漸治宜黄有殺人之舅誣其甥而已証之者先生至邑亷淂寔白而正之咸淳𥘉度宗潜藩㤙試京師謁陳尚書宜中坐頃賈似道至起避旁舍中賓退尚書曰䏻一詣此人否对曰不䏻尚書嗟嘆乆之咸淳癸酉復与計偕而国亡矣吴先生疾也日往問焉其没也無以為哀己塟焉其教人也諄諄不􅌒不達不止嗚呼先生逺矣今之讀周程朱張氏之言者皆是也而先生逺矣没之日寔至治二年八月五日以某年月日塟于某夫人某氏子男三以荘立信太𥘉荘早世孫男五名与竇侍郎禹鈞之子同而亡其侃乃銘之曰道行以天行道以人萬変摩盪忽而磂磷惟君子人内主外賓彼德于天吾自吾身穷達一揆尊尊親親邈矣先生勒此貞珉嚴先生碑世有朴山易説十四卷宋末吉之太和嚴先生肅所著也咸淳中江丞相萬里馬丞相廷鵉皆好其書為献之天子徵為秘書省較勘宋亾之歳三月二十有五日亦以疾亡皇慶𥘉余在京師識其曽孫有開有才藝有德行問其世則曰吾之先馮翊人也唐之季袓实為江淮轉運判官遭乱不䏻帰留居廣陵子可求事江南吴王為尚書僕射同平章事子續又事江南李主亦以門下侍郎同平章事是為懿公遷金陵乱孫美舉家南竄至太和家焉遂為太和嚴氏自懿公後始去干戈事文學自秘書郎常州推官震始登宋慶暦壬午進士迄宋亾為世科之家又一十有八年余在奎章閣遺余書曰昔者嘗獲與子詳吾世家于京惟大父績學篤行著書立言以惠吾後人而墓道之石未列所刻辞敢請按先生字子方曽大父諱光道朝奉郎通判潮州康元之弟也官保義郎淮東制置司幹辦公事大父諱知古父諱起予娶叚氏子男二􅋮父用父孫男四曽孫男若干人女若干人壽六十六墓在縣南之某郷隆福山之原夫易之道深逺矣世之言易者至衆矣嚴氏之書最晚出致使名宰相献之天子藏之秘府固有以淂聖人之心乎嚴氏両世相覇國而轉徙䘮乱曽無寕歳積十有餘世乃淂先生以四聖人之心竭四十年之力其書不与國俱盡宜哉先生之被徴召也到官数月即自免去曰吾豈以六十之年而不知其所止乎易曰介于石不終日貞吉言知幾矣銘曰經之全惟易然言之难公淂焉子若孫尚永傳樂􅉌碑余嘗讀老聃氏書至長生乆視之説曰此世所謂神仙者非耶又有䏻以術役鬼神召雷電祷雨晹已疫癘亦曰岀老聃氏老聃氏果何道哉廬陵高敏則君者博達深識之士也有所善頥浩先生頥浩先生者郡之安福人也名同寅字惟寅姓陳氏宋咸淳中棄家入清真覌為道士至國朝天下郡縣置道官又置南北道教所以領之其教所號之曰明素葆真大師教門高士以為郡道録即為之不辞厯住冲虚覌梅峯道院所至祷雨暘已疫癘崇棟宇辟土田至于起居飲食莫不与人同也然今年八十矣顔如春花步履飄飄然纔如四五十人又善為歌詩一字作不俗下語不知何道以致之及察其所讀書皆老聃氏書也覌行事皆非老聃氏所嘗言者豈守其真而溷其迹耶高敏則君又嘗聞其言曰天地果無終乎則纍纍乎莾蒼之野者何為而有之天地果有終乎則炳而為日月星辰峙而為山嶽流而為河海何為而莫之易也故聖人䏻其所無終不䏻存其所有終衆人常𣣔其所有終而不䏻存其所無終彼纍纍者吾獨且柰何哉今求吾之道者曰老聃氏也求吾之行者曰老聃氏也彼烏知老聃氏者天地存亦存天地終与終天地而有不終者存焉彼又烏知老聃吾方且為樂􅉌以待天地之終也聞有揭子者䏻言孰為吾使志之高敏則君以告乃為之志而歌曰猗頥浩兮不与我好兮而使余告兮猗賾浩兮不与我期兮而謂余知兮天地廓廓不可以度日月爍爍不可以約吾非老聃安䏻志斯􅉌之樂大元勅賜正奉大夫江南湖北道肅政亷訪使董公神道碑元統元年十有一月月幾望奎章閣承制學士臣沙刺班召臣傒斯至學士院傳詔命臣撰故正奉大夫江南湖北道肅政亷訪使董公神道碑别勅新南臺治書侍御史臣巙巙書其丈翰林學士承㫖臣師敬篆其額臣窃謂自太祖皇帝應天啟運其将相大臣父子孫曽傳百数十年称名臣者数十人或擁旄杖節出謀發慮佐定海宇或安危靖乱行政施化藩屏國家于外或献可替否拾遺𥙷過匡輔政理于内功不絶于信史名不染于罪藉天下庸人媍女皆䏻称説者惟董氏而已以臣傒斯獲偹載籍与有荣耀故不敢伏闕辞譲謹按公諱守中字子平世為真定藁城人曽大父龍虎衞上将軍左副元帥知中山府事諱俊大父資德大夫僉書樞宻院事典瑞卿諱文忠龍虎公第八子上自天子皆以苐称父資德大夫御史中丞諱士珍公始入太學簡知世祖召問時政條对詳敏如素習吏事者命之仕則辞年二十二乃以世胄𥙷内供奉歴尚服院懐慶路判官河南行省理問典瑞丞僉典瑞院事集賢侍讀學士浙東亷訪使湖南湖廣參知政事漢中湖南湖北亷訪使累階正奉大夫公入官幾四十年最其在官才十有二年以母䘮去供奉閒居十有七年以尚服院罷觧判官閒居一年以上怒有司左遷公止懐慶之行閒居三年以父憂不果赴理問及辞典瑞丞終制二年以弟守庸為御史舍浙東以疾棄河北皆間居二年遂以至順四年六月朔年六十一薨于家自同大父以下親無不在旁者薨九日塟邑西九門先茔贈某官公之居家与夫人事父母盡其孝遇宗族郷党賓客盡其礼馭臧獲盡其恩諸弟妹昏嫁皆取具夫人奩中之資父之澤則以譲其弟大父之澤則以譲其叔父諸子女無適庶視之如一公之居官潮壅揚州金沙河舟楫不通豪民恐奪両河地数賄有司勿濬有司亦因以爲利及公爲河南竟濬之河北飢部使者下令盡逐流民之南渡者北帰公盡止而濟之其在湖廣宋以馮文簡公故宅爲貢士院在洪山寺傍及宋亾寺燬屋仆碑而有其地公𣸪取以爲貢院江西歳給蒙山銀冶粮四萬餘石輸銀三萬五千両㒷國龍閣諸山亦多産銀有請色辨蒙山銀者公曰此奸利之民也斥之公方㽞妻子于鄂赴漢中過汳當國家中㒷行省大臣留參軍事肅清郡邑以迓新天子多用公計策独不聽諌止孛羅守潼関関果不守騷動三晋及新天子至召賜白金百両以爲河南亷訪使帥師守武関迄乱定無一人敢窺関者明年天下大飢武昌群豪控諸米商閉糴以徼大利城中斗米至萬錢公適至杖其党与七十餘人米大賤又輟貢士荘錢入學養士恐以飢廢講刻朱文公戊申封事于南陽書院使學者知格君之道有司受賍聼民誣父妾負財迯妾实与争溺水死公正有司及誣者罪惟公平生于朝廷無干進之櫝于权門絶私謁之迹又不幸年止中壽故上不䏻盡公之用下不自竭其志竟如是而止悲哉然臣嘗待罪國史伏讀太祖以来寔録及覌董氏家傳朝野所記載詢諸典刑故老董氏之先南征北伐未嘗妄殺一人妄施一政天下𥘉定諸将並觧兵柄唯董氏不許以僉樞公寄天子腹心居中者四十年才四遷其官覌公進退可謂無忝乃祖矣公夫人名臣翰林學士承㫖王文康公鶚之孫翰林直學士之綱之女勤儉懿爱德為九族師封隴西郡夫人生三男子一女子男鎋鉉鑰也姬子女各一人男鐩鎋由武偹庫使五遷而僉群玉内司事亷直貞亮為英宗文宗所知及鉉之篤行鑰之好學鐩之脩謹皆䏻守祖父之訓為孝子慈孫龍虎公累贈推忠翊運効莭功臣太傅謚忠烈僉樞累贈體仁保徳佐運功臣太師謚正獻中丞贈純誠肅政功臣太傅謚清献階並開府儀同三司勲階上柱國爵皆趙國公銘曰天啟有國篤生賢哲董氏数世終始一莭人謂董氏獨保天廸匪天私董唯以不殺如漢鄼留佐命㒷劉有舉必賢有謀必酬惟滿溢是戒惟清静是修又如西平在唐之造功則譲䏻過則引咎惟善是与惟德是𢡟而子而孫半涆天下王公令僕方騖並駕人惟好德如春在物生生靡穷莫之能敢遏豈彼驕陽焮灼歊蒸歘兮凜秋為寒為氷矧兹董公翼翼其承惟祖考是訓惟德義是經進退用舍与時偕行用不盡材寿不侔德而公之嗇而後之益隱卒豊終爲天子之公厚本濬源惟子孫之恭臣拜稽首式掦休風以示趙人以篤世宗趙功可墓誌銘余讀太史公書至倉公扁鵲傳嘆曰功之及人深矣然其子孫無傳焉歐陽先生守道所爲天和老人碑累千数百言与龎安常並称且曰子若孫皆進于學其門户将大又嘆曰子孫之大也其必由學乎天和姓趙氏其始祖三衢人徔趙清献公官贑上至廬陵家焉三世至荣道盡譲田廬兄弟而自立荣道生慶善慶善生鶚飛是為天和博學善為文章有盛德著書百二十有六卷生四子惠愿贑日章日章徔老氏學惠生宋永宋強愿生宋文贑生宋庠宋安宋永字儀可宋安字功可以文章齊名號二趙先生儀可嘗三貢于郷又入太學充博士弟子員宋強亦登進士第為韶化簿尉卒功可雖不及貢他人淂其文輙与貢使宋不亾儀可必不止太學功可必貢且第及科舉復則皆老矣儀可尋没功可䘮明然儀可之文播天下功可謹自晦犹為人所尊尚称郷先生泰定三年十有二月乙未功可亦没明年秋八月其孤靖衰絰走門泣且拜曰我大父則歐陽先生銘其墓而文丞相題其盖我伯父則翰林學士承㫖程公銘其墓而翰林學士承㫖趙公書其碑惟先人之塟願併以累子噫余敢抗諸老哉然獲知功可今二十七年矣其淂辞君生七歳而孤服除而母嫁大父鞠而教之警敏絶人貫穿諸經羅絡百家而為人温厚純慤和而不同為文䟽達雅粹豊而䏻約其教人也本之以不欺継之以不􅌒故徔之㳺者皆賢子弟其兄死諸孤孑立皆与教育而昏嫁之而見之未尝不以礼晩歳楼于屋之西偏揭曰吾美盖感其平生淪落不偶晚得安享太平無去國懐郷之憂而自幸也自是賦詩飲洒無日不在兹楼矣及其没也飲酒三日無疾而殁年八十一娶胡氏子男三人初逺靖初客南海二十年父死不及歸逺為新㑹縣教官卒凡䘮紀惟靖而已女一人適張元孫男六宜簡宜晦宜遜宜立宜和宜肅女一人曽孫男女各一人将以閏月二十日塟所居之趙山嗚呼功可已矣余覌靖之為人簡慤嚴重且其為文甚類其父諸子又類歐陽先生所謂大者其在兹乎儀可後易名文家復有神甑之事云銘曰趙昔有甑大比則鳴伯也三應叔果弗灵甑既墜矣天開聖朝昔視為祥今視為妖温温君子弗䆒以老藹藹令德無忝祖考嗟尔振振曰子曰孫念尔祖考允大尔門奔清甫墓誌銘安成有士而隱于醫者曰奔氏諱清甫生宋宝祐間九歳而孤即強學自爱視取高科都美官如指掌積勤十二年而國亾科舉廢又連遭大䘮征徭風火巨室瓦解乃盡棄其田疇取神農黄帝之書日夜讀之心通理解天授神設以之察脉視疾論生死虚实寒熱雖世業鮮能過之四方無貴賤貧富求者如歸市遂以名醫聞自是声日起家日𥙿而無推剥糜爛之憂天下立醫學置吏多劝君爲之者君不應然學校每頼君以爲重君平居孝友凡見父之執母之族必敬之如父母兄深甫貧事其兄如父事其嫂如母撫其子如子從父仲龍老而無家養之終身兄及從父没以礼塟之徔妹之夫劉才英溺死二孤㷀然君爲經紀其家同居子姪有他適必謹視其私雖犬承使各得其所故家子弟覉孤淪落旁皇無所帰或舘之或食之或衣之曰此名家之子也人以横逆相加未尝难焉惟讀書老不释卷多所編校及科舉𣸪而老矣㤗定三年七月淂疾手課程文一通授其子沭浴衣冠語衆曰後三日夜半吾當死及期而卒年七十二将以沒之明年九月庚申塟郭北順安鄊印山之原孤元凱令其子中冷以書謁銘君之先汴人七世祖仕能事宋徽宗為侍禁靖康之乱從隆祐太后南幸至安成家焉仕能生成甫成甫生逸孝宗時舉直言極諌科逸生成莭郎子英子英生普州安居尉士同士同生志學是為君之父君三娶皆刘氏子男三元方元凱元中元方本趙氏子從母帰奔故冐奔氏㒷元中世醫學惟元凱業儒文多竒女三長適郷貢進士刘辰發之子尚賓次許適倪剛大孫男五長中冷業進士有聲餘方向學女二惟君少孤䏻勇自樹立既食于醫䏻爲善不􅌒又力以詩書教子孫没犹不忘以進士業勵其後且其明足以知死生之故有合于君子之道宜淂銘銘曰猗民之生汨汩营營爲之礼楽以防其情爲之藥石以和其形民犹蚩蚩弗念厥生善爲政者不失其經善爲方者不䘮其平惟以保其真嗟嗟奔卿子孫其興䖏士楊君墓誌銘豫章先生熊氏以六經教授東湖之上燕晋齊魯関陕之士皆不逺数千里受業門下去即掇高科都顯官立盛名至有閉户穷經甘白首而不屈者郡人楊綬又独嶄然群弟子中其讀書務求大意不棘棘章句其爲文鉤玄抉幽非博學識字不䏻讀然反覆沉欎固将就平易而未及者其力行敦六行明五教邪說不䏻乱世好不䏻惑恒居無雜言盛暑必冠帶与人交必敬爲人謀必忠不以利害枉其道不以毁譽屈其志三試進士三見黙不易其所好熊先生深爱之同學亦皆以為不䏻及熊先生没常忽忽不自聊然益奮于學有一日千里之勢至順二年四月二十日年三十八竟以疾卒君子莫不傷之且曰使不死吾輩皆當出其下明年夏其孤某年月日塟于某以状介父之執至京師請銘按楊氏其先聞世家五世祖顯寿徙豫章遂為南昌辟邪里人顯寿生文貭文貭生炳及開慶己未進士撫州金谿主簿㑹龍炳無子以㑹龍次子惟善為之後娶信州鉛山主簿胡庭桂女生君君字宗敬早孤䏻服勤母教又淂名師友以成之故所至有過人者惟人之生也命之脩短懸于天學之成否係于人是以君子之學常恐志未畢而年不待也孜孜勉勉死即已矣若楊君者不亦深可哀耶君娶揭氏生二子成允成彦二女尚㓜銘曰梗楠豫章為棟梁兮璆琳琅玕為珪璋兮才而短折君子之傷兮揭文安公文集卷之十二
