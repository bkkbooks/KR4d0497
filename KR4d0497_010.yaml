body:
  text: 揭曼碩傒斯著門生前進士燮理溥化校録記冨州重修學記上御經筵之明年夏六月濟南姚侯來為富州以舍菜禮見于先聖先師祝曰惟夫子之道參天地配日月用中罔敢知而用中實生齊魯之交密邇夫子之訓欽承明命來守是州今之州古千乘之國也敢不敬恭朝夕惟夫子之訓是承顧瞻廟學摧陋弗稱曰余之責也會教授清江陳明之繼至議與志合明年秋大修孔子廟仍其舊者惟殿若明倫中庸二堂江山秀傑樓惟一改作而有加規制必裁就法度出入必限由正途凡為屋幾七十楹又刻銅為七十二弟子及諸賢像以嚴祀事鑿半池其前倣古頖宫侯載經載度是董是勞吏忘其私工勸其勤涉冬徂春用告厥成而命傒斯為之記在至元二十有三年升豐城縣為冨州以河東陳侯元凱為之尹時科舉廢十有五年矣士失其業民墜其教盜賊滿野竟𢾗十里不聞雞犬聲陳侯大懼遂修孔子廟建小學日集文儒故老講求治要悉資以為政不𢾗月境內大治知所務也今科舉既復亦十有三年而侯實來當天下文明人復其業猶皇皇焉汲汲焉以興學校明教化為先務者其守同其志亦同也夫兼有天下父師之責者君也承君之志行君之化者宰相與太守也宰相布于上太守奉于下故人之生也為之學校以教之設科以舉之必使士有恆業民有恆志然使聖人之道可明賢材可得而治可成也古之有天下者莫盛于唐虞三代而不能去學校廢選舉以為治秦能去之廢之二世而亡雖然君子之學視學校為汙隆以科舉為去就亦異乎夫子之教矣若夫善學聖人者在畎𤱔則行乎畎𤱔在魚鹽版築則行乎魚鹽版築豈待學校之教而科舉之勸哉然世亦豈能皆伊傅其人而不為之教與勸也此上之志而侯所以力行之者况上方親御講筵詳求聖人之治愚雖不敏願與學孔子者共勉之侯亷愼簡正不畏盛名而人敬畏之蓋賢守云金州學記皇元制治舉法周孔玄徼絶壤同風鄒魯一郡一邑必謹學校以為教基在仁宗時太子太傅長史郭侯履治靖五年俗興民和克信其道泰定元年春移二于全全居湖南九郡之極地小而岩風氣啙窳郡西湘山又稱無量夀佛入滅之所世奉遺骸奔走萬姓而夫子之廟荒圯穿漏曾莫顧者罷軟者以民勞為解貪墨者以廪薄為辭講誦不興荐祼無所侯至會缺太守侯總學事教授黃潤以為請于是侯率僚佐倡于上士民勸于下明年二月即工前清湘長法黑進拜元侯知邑士鄧桂能狀命董其事遂斬木隂谷伐石陽崖食功傭力民不知役太守何公潤繼至朝勸夕勞休威並行及期而廟成乃易夫子十哲像分祠先儒及賢守于講堂之左右翼門序軒陛以次咸畢又辟廟南廢地為杏壇三成以擬闕里建明堂四檻以館諸生既告成于廟教授謁告還江西會豫廬陵曰郭侯每以不得君記為恨敢請乃述其事且俾告于有衆昔靖之鄙為群僚劫以自附者八百餘家𢾗自請吏吏不能討而王賦之供不敢怠遑及郭侯為守天子出使督兵討之八百餘家咸在夷滅侯以死爭乃去刑書復為齊民侯非力能生之也以其民恪遵魏文靖公之教知有君臣之分雖為虜而王共不闕故也全之四境盡為中邦又密邇周元公之里父傳子習皆聖人之道民之情性豈獨異乎夫殫財浚力以奉無益未必蒙福耕田鑿井以服聖賢之教未必被禍且一絲一粟得以飬生送死又使父子有親君臣有義夫婦有别長幼有序朋友有信君子登于俊選野人免于刑僇果何憚而不為哉亦教化使之然耳為民上者曷敢不敬學在郡治之隂鳯凰山之陽宋紹興十三年之所遷也東南諸山秀麗竒詭湘灌灕水合流其下蓋為一郡之勝云泰定四年八月丁􅕀記舒城縣龍眠書院記治民之道使民知禮義而已使民知禮義先示其所尚而已民知所尚則知所向方哉廬陵舒城長燮理溥化用湖廣舉首取泰定四年進士第得兹邑首理學政咸用其學以教導民民始益知人之所以為貴儒之所以為重而復知所以飬生而送死居二年曰民其可教矣乎于是又治地邑東得李公伯時龍眠山庒故基于東禪寺東舒王祠西嘗沒于寺者據山川之會想昔賢之逰處乃會其祿入募工度功作書院以奉先聖先師以為出治立教之本不踰時而成凡殿堂門廡齋舍庖庫及李公之祠為屋三十有六楹以其面龍眠之山端麗竒峻能出雲雨膏澤天下榜之曰龍眠書院且示不忘李公之故而邑賢者范鳯瑞割田二百𤱔以供祭飬既告成于廟遂立之師進諸生而教之凡民有來觀者必勸之以學是時上既撥亂集大命兵革未息飢疫未復郡縣長吏能以荒政自任且不足遑知禮樂之教哉而舒城勸分則出粟之家惟恐後民之強暴子弟一有弗若則父兄長老切責詬怒惟恐見絶于長吏休休焉方日以興學為事舒之民卒無一人携離轉徙者長吏豈獨賢民得其所以生者也舒著于春秋故山有春秋之山水有舒水始入于隨後并于楚其民勇而好義非獨舒為然楚之地皆然故楚常為強國最後宋室南遷賴其民蔽遮江淮幾二百年然當時民雖欲為學其可得乎自國家有宋民不知兵者五十餘載又有好文之君繼出而學校之教鬱而不興仁義之政尼而不行飬生者不得盡其歡喪死者不得究其禮此非上之過長吏之責也今吾君既卑爾以賢長吏一以詩書禮義覺爾民民亦知所尚乎若曰升其堂􅞽其器設其牲齊而行其典禮如是而已此事聖人之疏莭也非作書院意也舒之人尚其朂哉李公名公麟邑人博學好古舉進士歷刪定及檢法官未老致仕蘇文忠黃文莭二人嘗過其山莊故合祠于堂之北是役也建始于天曆三年之春工畢而改元至順縣學之明倫堂亦其所建也是歲冬十月朔記涿州孔子廟禮器記古者祭器犧象罍洗登豆之屬皆以木簠簋籩篚之屬皆以竹後世懼其速朽也不能以時易也範之以銅取便于有司而古先聖王之制僅存其名號焉耳惟涿州孔子廟器皆上陶殘缺苦窳將事者耻焉觀者議焉有司莫以異泰定四年秋廬陵曹君明則來領教事始白于有司馳𢾗千里還廬陵範銅以易之及有事于先聖先師齊肅秩粟昔之耻者誠敬之心生焉昔之議者慢易之心泯焉逺邇來觀俯仰嘆玩雖非古先聖王之制有不暇計于是州太守命范陽令杜肅府而藏之屬奎章閣授經揭傒斯文而志之或曰範金非古也其亦必有所受矣胡莫之或改以從古也禮有損益器有冝然况世所寶三代彛鼎罍斚尊卣之屬皆範銅為之也皆自天子至于公卿大夫所作以貽子孫者也雖不可盡信然其來固已久矣謂範銅之非禮古人亦且為歟彼皆欲為長久計也皆欲為法于後世者也且觚不觚固非觚矣謂木之觚為觚金之觚為非觚可乎學至于孔子可謂知禮矣然逄掖于魯章甫于宋舍麻冕而從純非歟必以古為是而今非則涿之用陶蓋有虞氏之所上也以木以竹皆非禮也而可乎夫敬者禮之本器者敬之輿也嚴其器所以存乎禮也而耻焉而議焉則敬何由生禮何由行歟故泥乎古者不足以適今膠乎器者不足以言禮故記曰禮從冝傒斯曰祭器者所以交于神明者也非飲食之謂也苟知禮之本矣雖從冝可也嗚呼曹君其可謂逹于禮乎是器也有司其謹藏而時出之仍刻其目于左方增城三皇廟記三皇古無廟唐天寶中始置祀以春秋配以勾􅉭祝融風后力牧五代宋並因之國朝始詔天下以郡縣皆立廟以醫者主祠建學置吏設教一視孔子廟學大德三年太常言三皇開天建極創物垂範為萬世帝王傳道之首今太醫院請以黃帝臣俞跗桐君鬼臾區岐伯之屬十大名醫視孔子十哲配享廟廷是欲以三皇為醫家專門之􅳊非禮經冝從唐制中書下禮部議議如太常至大元年中書又以湖廣行省言如太醫院所請配享事下禮部議請以十名醫視孔廟諸大儒列祀兩廡遂著為令廣州之增城未置廟歲春秋有司設主寄祀叢祠中至順二年秋九月旴江左祥由翰林從事廣州香山縣尹潮州路經歷以奉議大夫治增城既新孔子廟學于城西沖霄門外之故址而以舊學為三皇廟學壞撓者易之隘者闢之漫漶缺漏者塗塈而黝堊之自殿堂徂門凡為屋五十有二㨕巍焉煥焉如𥘉建然後三皇之祀始尊醫學之教始行夫以醫家專祠三皇非古制然猶足見國家尊古聖仁賢重民命如此有司知守國家常制修其祭禮嚴其教道竭其所職而已他非敢置議醫家既得專祀三皇可謂甚尊寵矣而輒漫其祀事怠其學政不知民命之所以重所謂失禮之中重失禮焉其咎大矣凡居是者可不慎哉左君闓疏平恕所至有善政且知所先務是役也能窮其力以贊其成者醫學教諭鄧友益也南雄路儒學教授李顯以左君之命請記乃為之書建都水分監記會通河成之四年始建都水分監于東阿之景德鎮掌凡河渠􅄵閘之政令以通朝貢􅒩天下實京師地高平則水疾泄故為堨以蓄之水積則立機引繩以挽其舟之下上謂之􅄵地下迤則水疾涸故為防以莭之水溢則純起懸板以通其舟之往來謂之閘皆置吏以司其飛挽啓閉之莭而聼其獄訟焉雨潦將降則命積土壤具畚鍤以偹奔軼衝射水將涸則發徒以導淤閼塞崩潰而時巡行周視以察其用命而賞罰之故監之責重以煩延祐六年秋九月河南張侯仲仁以歷佐詹事翰林太醫三院皆能其官且周知河渠事選任都水丞冬十有一月分司東阿詔凡河渠之政母襲故狃私母泹勢怛威惟冝適從敢有撓法亂政雖天子使五品以上以名聞其下隨以輕重論刑母有所貸侯北自永濟渠南至河東極汶泗之源滯疏決防凡千九百餘所咸底于理退即所署治文書庳冗儉陋吏側立無所援告于衆曰豫承命來此惟恪恭是啚願以函丈之室制千里之政役徒百工何所受職下走群吏何所聽令鄉遂之老州邑之長何所稟政荆揚益兖豫𢾗千里共億之吏何所視禁山戎島夷遐徼絶域朝貢之使何所為禮朝廷重使何所止舍乃會財于庫協謀于吏攻石寫材為堂于故署之西偏隅隩廓深周阿崇穹藻繢之麗文不勝質几席之美物不踰軌左庖右庫整密峻完前列吏舍于兩廂次樹洺魏曹濮三役之肆于重門之內後置使客之館皆環拱內向有翼有嚴外臨方池長堤隱虹又折而西逹于大逵高栁布隂周垣繚城遐邇縱觀仰愕俯嘆其言曰惟侯明慎周敏于公罔私故役大而民弗知功成而監益尊監益尊而政益行斯河渠之利永世攸賴爰稽在昔自丞相忠武王建議于江表𥘉平之日少監馬之貞奏功于海內一家之時自時厥後分治于兹者鮮不著勤焯勞載于簡書而公署之役乃以待侯非樂侈其名以夸其民所以正官守肅上下崇本而立政也誠冝為而不敢後惟國家一日不可去河渠之利河渠之政一日不可授非其人若侯者其人矣是役也首事于侯至之明年某月日卒事于至治元年某月日合內外之屋餘八十楹是歲九月朔具官揭傒斯為之記安福州東嶽廟記五嶽自古皆秩祀于天子而東嶽獨為天下宗今郡縣不置廟則以為闕延祐四年冬吉安路安福州逹魯花赤瞻思丁始建東嶽廟于城東門外之秀嶺知州郭恢台等協其謀佐吏及州民之樂善者相其財地利材艮工胥勸功明年秋廟成重門復殿高廣麗深翼以列祠七十有二象設嚴畏軒陛崇隆上巢飛雲下瞰湍瀨旁引群山俯視井屋朝陽夕隂如神往來稚耄男女蟻行而上俯視拜跪如臨父母復伐石為橋曰秀川而屋其上六楹以逹望走刋木為亭曰一覽以休逰觀而命道士姚某守之民大悅又明年秋州人前肇慶路濓溪書院山長彭德昌請紀于石夫東嶽魯望而廟于兹從民志也民不知善而惟神之依惑也苟政不平歲不成欲事神得乎福善禍淫天有常道事神治民國有常禮禮不可黷道不可誣靡屆弗至者神無感不通者誠誠神合而福祿降惟君子能之若夫修典常正國俗則國家之事而君子之心具官揭傒斯記浮雲道院記余方竊祿周行進不能有禆于時退不能自訟其過而客有言浮雲道院之事者乃起而四顧茫然自失渺然若天地無所容客之言曰吾所居郡曰廬陵邑曰永豐是為歐陽文忠公之鄉吾之里在雞山之陽鷲溪之濵山川深厚草木濃麗其人秀而多壽弦誦之聲溢于四境耕種之民交于四野時危代易干戈所不加焉水旱疾疫盜賊所不入焉人無甚冨亦無甚貧吾劉氏族居三百有十二年矣環吾里𢾗百家無異姓良田𢾗百頃未嘗去劉氏冠昏喪祭必以禮共給公上必以時無金玉狗馬之殃無高爵重祿之禍各食其力各守其常吾雖客逰四方而心安之泰定四年秋吾歸自河南乃闢園𢾗𤱔種桑柘三百株枳若橘皆千株木實之脂可食可燭俗號山茶又曰木子樹者七百株茶五百株桃李雜果松竹之屬又稱是歲先疇之入雖不足以自給計𢾗年之後葉者實者脂者萌可茹材可器者可薪者各效其用則吾春秋之事朝夕之共宗族鄉黨賔客之奉可不具而足矣吾又有兄弟子姪𢾗十人承祖父之訓皆頗知學足為保家之主天之所以與我者亦既厚矣復何求哉乃築室四楹其中為藏修之所取孔子不義而冨且貴于我如浮雲之語榜曰浮雲道院又為五言詩二十餘萹書之璧間暇則命子姪歌以為樂客有愛而和之者不敢辭有録而傳之者不敢止行藏用舍一聽于天夫聖人之與衆人欲冨貴而惡貧賤非甚相逺也而聖人不求得其所不可必得不求去其所不可必去安其所安樂其所樂從吾所好而已衆人則不然必求得所不可必得必求去其所不可必去險在前而不顧危在後而不知早夜以孳孳死而後已于是聖人始如天地日月亘萬古而不可跋及衆人穰穰忽而為虎忽而為鼠忽而為蟲沙其去聖人何啻千萬里吾非敢希聖人能少異于衆人無忝于前人斯亦足矣乃歌曰浮雲兮悠悠忽而逝兮乍留吾安歸兮孔丘又歌曰悠悠兮浮雲來無迹兮去無垠吾安歸兮義與仁歌畢余請書以為記客名鶚字楚竒其學以六經為主其文以義理為本其詩近陶柳之間其大父蓋壽至百三歲云天曆二年六月九日揭傒斯記撫州靈感廟記臨川西南行九十里有山巍然而高大隆然如波濤蔽于一州者曰連珠之山有谷焉蒼峭深窈若與世隔谷之口有寺焉名如其山南唐升元中肉齒和尚曰智通者嘗居之入谷𢾗十步有廟焉曰靈感之廟宋慶元四年所賜額也天曆兄年寺住持如海知事從善改作大殿五間丹楹藻井崇阿飛甍湧殿壁為海潮慶雲之狀仰燭承塵俯鏡廣庭自夏徂秋遂底于成神享其祀人樂其功明年介豫女兄之夫陳君用清請豫記按啚志其地𥘉有古杉一株常聞笙簫之聲飛繞其上杉下有泉人汲而禱之能蘇旱而愈疾一日神附童子語及夢告肉齒和尚曰我朱森秀才也兄弟三人皆隱于此汝廟祀吾當福汝民乃伐杉為三神像冠服形類一如所夢者廟而祀之揭靈著響餘二百年至景定三年始得封為淨感淨應淨佑三真人余謂神有曰朱者株也森者杉也秀才者美木也兄弟三人者三乃木之所以生也蓋木德之鍾木主仁故為善不為惡為祥不為咎而能大庇斯民也其兹山之靈也歟山非神不立神非山不留惟兹山與天地無窮兹神亦與山為無窮其必與我元相為無窮也然非兹殿不足以壯神之居以稱此山敢不敬志其事焉於乎爾民其益務為善毋使見棄于神哉天曆三年夏四月朔揭傒斯記胡氏園趣亭記豫章胡叔俊以高才碩學隱居進賢官溪之上治乃祖西園築亭其間而逰息之以東南先朝陽而夕隂冝木果而樹桃李梨栗南為正陽之方冝芳華而列種海棠松竹者貫歲寒而後凋故以植乎西北中又雜植梅𢾗十株曰梅松竹之友也今皆蔚然為林矣若菊若牡丹芍藥之屬叢生而可愛皆列于亭之左右以便觀賞合而名其亭曰園趣其出入之途在正東近所居也海棠之西有二池央道鑿小渠引水經其所居以入于東池渠之上古木參天其先􅳊所手植也東池之外又為大池春夏泛溢可以舟楫池之北為堂八楹以為子弟講肄之所又北為堂六楹以館賔客又北為重屋六楹以藏纍世之書此其園外之事又所以為成趣之本叔俊治家有法臨事有斷凡公上之共必先之故呌囂之吏不及于門田園山林之務必擇子弟之賢僮僕之良者各受其成以治之故叢脞之政不嬰于懷子孫之教必隆禮厚幣聘良師友以訓之而日就月將之功又足以樂其志此外非祭祀賔客慶弔之事不得關説日坐亭上與園丁野老論農圃之要除其榛穢修其經術疏其流泉時其灌溉觀其華實之生成閲隂陽之變化以察夫消息盈虛之理而忘其世慮客至則觴咏嘯歌或風乎松竹之間或綸乎清池之上雲山煙水交錯乎指顧之間而園中之趣雖萬鍾之祿不與易也是故志定者不遷理逹者不惑事治則情逸心曠則境融雖崇臺纍榭竒芳異物之觀名姬淑媛哀絃急管之奉惡足並語哉叔俊于是不可及矣其子棣請豫記之為序其説俾歸刻于亭之上楊氏忠莭祠記廬陵楊氏作忠莭祠者何昔金人犯宋沿江諸郡皆望風奔潰其先忠襄公邦乂以建康通判𬒳執罵賊死韓托胄専國擅兵文莭公萬里以寶謨閣學士家居聞之三日不食死故合而祀之也中祀建康通判贈通奉大夫存者何嘗以直抗蔡京為楊氏忠義開先也别祀廣東經略使長孺吏部郎官孫孖同知崑山州事學文者何經略仁聲義實風槩天下在廣東三歲祿入七萬緍盡以代民輸丁租不持一錢去吏部闓通敏惠奉法循理為時良臣崑山好德尚義能以私錢復文莭故居割田百𤱔以建祠事皆克紹先烈者也天下楊氏皆祖漢太尉震廬陵之楊則自蜀徙蓋太尉之孫唐國子祭酒膳從橲宗幸蜀而居眉者之後也自秦漢之後有天下卓然有三代之風者宋而已方其盛時歐陽文忠公以古文正天下之宗明王道之本及其衰也楊忠襄胡忠簡以大義折敵國之氣奮中興之運當其亡也文丞相斬首燕市終三百年火德之祚為萬世亡國之光而皆出于廬陵何其盛哉夫卓然可繼三代者宋也然夏之亡以桀之暴殷之亡以紂之虗又以湯武繼之冝其東征西怨無思不服惟周以弱亡與宋同然周之東遷亦有楊忠襄胡忠簡乎周之亡亦有文丞相乎是能使周之亂亡猶有愧于宋者楊忠襄胡忠簡文丞相也文丞相之死豈非有忠襄文莭為之標準乎不然何又出于廬陵也忠襄不可及己至若文莭年六十餘已懸車告老將二十載矣聞一權臣擅國遂至餓死使在文丞相時當何如哉故廬陵若歐陽氏楊氏胡氏文氏又有身致乾祐之治若周文忠氏皆國家之元氣也而歐陽氏又廬陵之元氣乎崑山之子元正請記忠節祠故并及之嗚呼觀楊氏祠則廬多賢之故楊氏人物之盛宋三百年飬士之效亦可見已世好言士無益于國可乎元正亦楊氏之賢子孫也由太常奉祀為江西行省屬祠成于大德七年記作于元統二年孝通廟記臨江新淦之上遊有鎮曰峽江鎮有龍母祠曰孝通之廟古祠在今德慶之悅城鎮峽江受吉贑南安諸水又豪啇大賈之所會兩山如束水勢湍悍歲𢾗壞舟楫必有嘗受神賜于嶺海之間而分祠於此以厭水患然不可考矣凡舟楫上下水旱疾疫必禱焉至大二年鎮民唐文夀既倡義以敞其樓延祐改元王友忠復新其殿至元二年丙子之夏余扈從上都廬陵龍立忠始介臨江孔思濟及其郡人李源請志麗牲之石夫作于始封之廟則有唐宋之碑今作于分祠必槩見神之始末俾乞靈者知所本也按唐李景休趙令則碑神為秦溫氏之媪漁于程溪淂巨卵藏于家生七龍五雄二雌從而豢之鱗角既具乃放之江媪日候江次龍輒荐嘉魚于媪若致飬焉者始皇帝聞之召媪媪行中流龍挾舟而還媪死鄰人􅌾之程之左澨絳水之濵後有衰麻而杖哭諸墓且惡其迫潮汐也一夕大雷電遷之髙岡鄉人祠之始此自唐天祐歷宋由永安郡夫人五命為崇靈濟福妃五龍子皆爵徹侯二龍女皆夫人額曰永濟改曰孝通大觀二年所賜也夫物于天地莫神于龍有功于天地莫大于龍故其德配乾為鱗蟲之長出入變化不可測度媪非産龍徒以豢育之恩生則荐鱗食以飬之死則為衰麻以喪之遷宅兆以寧之學士大夫之子孫有所不能而龍能之則知忠孝之大莭又莫過于龍也龍之德其至矣乎夫龍潛于深淵之中待時而動所以感雷電降雨澤鼓濤浪摧崖裂石皆龍之能事也而謂善覆舟溺人非龍之心也有違孝悖忠賊仁害義自絶于天者適與之遭耳宋之時吾里有孫先生伯溫者攝象州守部餉襄淮巢湖大風濤幾覆舟先生朝服拜于舟龍若出答拜水上風立止龍之佑助善人如此苟為善龍有弗佑之者乎由是觀之人之遇覆溺者非龍也人也福善禍淫天之道求福不回人之道天人之際龍知之矣媪以慈致龍之孝廟食千五百餘載龍其可誣矣乎敢書以告乞靈者至元二年丙子六月甲辰記後二年已卯乃求重書刻之石集賢直學士朝列大夫揭傒斯志易州定興縣城隍廟記城隍神天下通祀或有天子封或無封其垣屋器服一擬于王者雖有強毅聰察之吏不敢廢水旱疾疫必禱焉易之定興廟于邑之西南隅制古而地僻大木蔽虧莓墻蘚砌黮然雲興肅焉風行過者悸心入者易慮而禱亦輒應屋之撓壞缺漏以時葺之無所改作而垣獨完于是邑人張伯祥等因翰林從事杜德逺謁記勒石夫山川之蓄都邑之會民物之富精合氣融動必有神神者隂陽之至德禍福之樞機也躰之則應感之則通非有待于祠祀尸祝祠祀尸祝古人所以事神非神之本也後世殫財力竭智慮黷法亂制求以事神神其享之乎惟兹廟侈不陵莭儉不失度庶幾能以禮事神者冝祭享而民寧然記者所以著始末敘因革今皆無所于考獨記其事神之有禮也延佑三年夏四月癸酉翰林國史院編修官揭傒斯記揭文安公文集卷之十
