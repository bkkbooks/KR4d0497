front:
  text: 掲文安公全集卷之七
  hash: sha256:80398abcc16bbca9a105a5553a46f995f0fa5b9838f1d8103f2c8184a762be76
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_007-1a}
body:
  text: 掲曼碩傒斯着門生前進士爕理溥化校録書上李秦公書五月吉日豫章掲傒斯謹再􅕥奉書平章國公閣下夫士志爲上時次之位次之農不以水旱怠其耕啇不以寒暑輟其負販故能致千金之産登百榖扵場况士之志扵道者乎不逄于今必顯于後有其時有其位道行于天下天也無其時無其位道不行扵天下亦天也君子無與焉故士之所患者志不立道不明不敢計其時與位也因其時求其位以行其道此士之志也而不敢必乎天也士茍志于道生乎今之丗可謂得其時矣然猶徃徃以不得其位為患其信之不篤而𣣔必于天者從而為言之曰上之人不能用夫士且怨且憤嗚呼過矣嘗觀夫用舍之際矣或一人薦之而百人沮之不能使之不用且大明其道扵天下或百人舉之而一人抑之卒罷而㱕至老死而無聞夫一人至寡也百人至多也用舍䌓焉而無所容于力非天也耶上之人苟能知其力之所至不能奪天之所與不能卑天之所不與賢者進而用之不賢者退而黜之不置一毫踈戚爱憎薄厚之心于其間惟以國家得人爲務如是而猶有不信乎道上猶有遺才之恨者未之聞也抑又嘗觀士之志立矣道明矣得其時與位矣而不能見知于其君道終莫能以行雖行而不逺噫何其道之難行也耶伏惟閤下學冨而徳廣志動而行寔不以摧困折辱而易其莭不以冨貴顯榮而改其度尊為天子之舊學信為天子之腹心位崇乎公相功施乎社稷名聲昭乎四海可謂得其時與位而道信行矣又力能進退天下之士而無一毫踈戚薄厚爱憎之心置其間一務于為國而得人天下之士莫不顒顒然厲其志修其道以待時之用已然以一人之明籠天下之士豈能保其果無遺才耶亦舉其所知倡于其上而已耳僕少貧粗襲祖父業年十五六即挾其所有奔走衣食于四方乗驚湍絶峻崿觸冐乎炎埃雨雪之間或過午而未食或既夕而猶邁人情物態之變風俗政化之異夲末逆順之由盖偹嘗而畢覧之矣至于國家内外之体𥙷偏救弊之術亦嘗求其說而􅍄慮之矣然未始敢以告之人者踈逺鄙賤之士雖告而不信徒取詬病焉耳既無上下之援可自取爵位而力行之又無知已之人可相告語事苟利于時不必由已出然終黙黙自悼行年三十有九蠢然而無聞近始因縁親戚計可無旅食之憂遂自豫章附舟五千里而至京師雖童僕不敢携一人恐重以累諸人也凡平生寓之目属之耳軆于身藏于心不敢以告之人者閣下皆已行之矣其未行者必次弟而行之僕何敢踰涯越分而進以貽教玉人之譏夫翰林皆極天下之選不以愚不肖過相薦引私窃自幸事茍有集庶幾由是而至扵可為之地以自見其平生之所志萬一不然亦可藉手以㱕曰吾嘗獲薦于翰林矣吾嘗獲登李公之門矣益厲其志修其道垂之簡帙傳之子孫樂夫天之所以命我者用之舍之不敢求必扵天也惟閣下少垂察焉傒斯恐懼再拜與尚書右丞相書傒斯再􅕥尚書右丞相閣下僕聞因衆者可以顯立功忘已者可以廣得賢千尺之松不蔽其根者獨立無輔也森木之林鳥獸群聚者衆材咸濟也是故自用無朋專𣣔無成得衆者昌寡助者亾此賢愚同智古今一軌者也易曰㧞茅茹以其彚征吉夫㤗之爲卦君子道長之時也君子當道長之時其進猶必引其類則吉是進而不引其類雖當㤗之時猶㓙也人方安居暇食若無事于賢一旦風飛雲㑹加之百官之上立扵庙堂之内以数尺之身任天下之責方寸之心関天下之慮雖有周孔之智賁育之勇未聞能獨成其功也此僕與閣下不能無情伏惟閣下聦明強毅卓犖弘大誦聖人之書行古人之爲政知王道之本好賢有虚已之寔生民之所仰望君子之所依㱕又當天子鋭精求治之時身住䁀鉉之寄以求治之時當鼎鉉之地而生民有仰望之情君子有依㱕之心誠閣下垂名立功報國顯親之秋也然方今進賢用能之當否在閣下冨民理財之能否在閣下斟酌庻務之宜否在閣下天子之所属寄生民之所責望在閣下其任亦甚重且難矣夫上有宰相下有参佐百官而獨責任于閣下者以閣下明王道識治体知夲末之所先後經權之所異宜也此春秋所以責偹于賢者耳由今觀之孰若一上下齊彼已旁羅俊乂廣攬英賢因其材而分任而坐居其成功則功可大名可乆福可致而禍可消也不然一身且未知所計况為朝廷計㦲然鳯凰鸑鷟非凢木可棲絶竒異能非常調可致懸千金之賞不患無徙木之人市千里之骨何憂無絶足之馬誠能推誠折莭激昻鼓舞則士必樂為用士樂為用何功不成且進賢者非所以市私恩也將以佐天子理萬民也忠以出之信以行之忠信之人天必佑之母患乎賢之不為用但盡其求賢之道而已牛之肯綮逄庖丁之刄則觧木之盤錯遇匠石之斤則離母患乎事之難行但盡其用賢之道而已然進一君子則君子之類應任一小人則小人之類應此善敗禍福之由亦不可不審且慎也惟閣下察焉傒斯再􅕥荅胡汲仲書傒斯頓首汲仲簿公執事傒斯比猥以陋薄之見汎浮之辞凟冐于執事意甚悔之既無及已連月滯留于外不得朝夕訪問不圖宏大更枉還荅又以俗迫雨坐山疃者連甸不得上謝知執事于我何如哉然賢者之待不肖不肖之望于賢者皆不可謂之無意也茍有忠告則肝胆相呈心口相宣不當蓄嫌畏挾蒙背若市井塗路之人也故復有所祈不敢黙黙遂止以執事好古之敏信道之篤知足以知之勇足以行之可謂魁傑特達出群之士至扵啇畧人物言論風采頗若無人来書有云爲衆所推謬當斯文之託僕窃以爲過矣夫衰周之世文武㡬墜孔子以天縦之聖出爲天下萬世之宗且曰十室之邑必有忠信其自居者好學而已孟子當戦國之時闢楊墨排縱横揭孔氏之道而明之若掃穢翳開日月之光䟽百川益河海之深及其辯也曰不得已今幸與執事居休明之世吾道光盛賢士軰出禮樂非甚崩大壊際天所覆莫不順軌雖有孔孟猶不當驁然自任畧無辞譲之色使執事所學之道所居之世誠當孔孟之任必待後世之人推尊而光顯之不當自道若此且以執事自䖏為何如時哉今年夏見青田陸如山謂執事自許直継孟子非知道之士不能為是言者犹或不識執事所言之㫖由今而言則信有之矣夫孔孟大聖也大賢也當斯文之託者若孔孟可矣而孔子曰攻乎異端斯害也已孟子曰能言距楊墨者聖人之徒也然每與執事啇論則甚尊信佛老氏至𣣔合三氏而為一則當斯文之託者道固應如是耶此皆甚不可者也或謂執事有師道而無友道誠知言哉傳曰雖有周公之才之羙使驕且吝其餘不足觀也已此之謂也来書又云前乎千古聖賢相傳之道由詩若文而知後乎千古亦将由詩若文而知今之道予讀其言而悲之自漢以來継述之文多可讀之文少夫道有夲文有体尊卑小大長短踈戚華實正偽截乎若天地山川之不可相陵昭乎若日月星辰之不可相踰離乎若飛潜動植之不可相移惟適當而已耳近見執事序黃成性文章言辞夸大皆非事實其所称舉皆公卿大臣之事非學道在下者所冝言抑亦自任之素不知其言之過也且文者古聖賢不淂已者之所託也而今丗行道之士不惟其事尚𣣔託之此而垂後不亦甚可悲夫僕之才不足以知執事僕之言不足以暁左右所以聞之父師之訓有與執事戾者聊為僣越申言之前之言敢以為執事之忠後之言敢以為執事之望尚兾致之用以幸學者以示来世則大碩也優柔之教敢不敬承聞将就天台之闕不知何時㝎行當于江滸一别與䔥維斗書傒斯再􅕥諭徳䔥公閣下僕性分麄謬昏戇絶不通時亊與人交不計隆薄能否輙以古道相期待俗下詬病日甚不止終不愧悔今復妄有謁扵閣下焉惟天生賢哲常曠数百載不一二見及有其人或又廢扵庸主格扵説忌盡扵懦怯畏慎弗克卒其大業僕甚痛之自来京師目覩耳聼口誦心語惟公全才學冨義精仁􅍄謙譲克謹去就有莭名與實侔位與徳称有古大賢之風束帛之聘累光丘園每䀻必増其秩每召必優其禮其尊徳樂道右賢尚能崇信慕向若漢高帝之扵四皓可謂隆矣然四皓不出則已一出則能割至尊之爱㝎天下之本建萬丗之名脩然而来浩然而㱕来不見其所難去不見其所窮何其𥙿哉且今天下非漢髙之草創皇太子聦明仁孝過扵惠帝上親信篤爱無高帝之惑溺昔之儲貳不得與國家之政今則無所不領冝若公者知無不言言無不從然天下之賢士未振者不聞有所舉天下之政令有闕者不聞有所陳愔愔黙黙日以懐去為務又不能借一亊决去就使天下有識之士蹀足搤􅒆裵徊四頋而失望僕誠愚鄙未逹其故抑尝㪯之而未用陳之而未行邪則去就可以兆矣道行扵天下謂之達道不行扵天下謂之窮孟子曰窮則獨善其身逹則兼善天下今公居逹之時行窮人之事猶所未喻且天之生斯人也豈徒𣣔寵荣其身體利澤其子孫而已亦𣣔使生民之有知也公誠能高卧空山逺引遐􅗲則為巣許務㳙之徒為可嚴陵魯連之徒亦可雖𣣔驂風駟霞談詭變眩如偓佺安期羡門盧敖徐福之徒亦可今業已出矣食其禄而居其位矣何乃若是恝恝邪竊為公計莫若攄肝瀝胆激昻慷慨極論天下之賢士求當今政令之得失典章文物之損益君儲切身之急務䟽而陳之苟其説行則從容可為二䟽之事不行則掛冠神武拂東而西矣上不負朝廷之知下不觖天下之望天下之士莫不想望風㮣咨嗟嘆息曰䔥公真賢矣哉朝廷之尊賢下士必自公始則公進為國家之荣退為斯道之隆生為萬全之人没有無窮之名不亦休乎又不得已則引年謝疾而去耳或曰公不得已而𧺫而身冐大名𬒳至㤙夙夜戦掉兢慄猶懼不持若夫進賢𥙷過則揆諌之司吾所軄者轉廸是宜且言之而中則吾之㱕未可期言而不中則僇辱所㱕况若公者進退語黙必有其時豈庸𥪡賤走所能察識哉僕益惑焉夫公之出䖏非若彼旅進旅退之人旅進旅退之人雖千萬不足為天下輕重公實有萬世之繫焉不可不暴白扵天下後世使之有則也念之念之時不再矣僕近行河済之間有過而歌者曰我行河濟兮瞻彼泰山聖人之才不待兮我道孔艱進不汝信兮退即汝諼河兮濟兮道靡靡兮乃撫栧送而和之曰㤗山巍巍吾其跂而河水瀰瀰吾其濟而聖人雖逺吾斯軌而因録其詞并書以献惟公念生才之難邅時之不易憫斯民之無知貸狂瞽之不察視中道而導之㱕幸甚幸甚傒斯再􅕥掲文安公全集卷之七終
