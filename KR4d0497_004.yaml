  text: 揭文安公全集卷之四
  hash: sha256:c1dff09a65ad7754b3f213c471a1ab2002c0902230be2cac6856a32410b1870a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_004-1a}
body:
  text: 揭曼碩徯斯著門生前進士燮理溥化校録所藏逺山圖蒼蒼兮逺山飛瀑兮潺潺思王孫兮未還蒼蒼兮逺巘飛瀑兮偃蹇思王孫兮未返白石之上青松之間上有飛雲下有流泉悵王孫兮留連留連兮何極望青山兮使豫太息太息兮豫獨思王孫兮如玉題陳氏松巢圗雲英英兮承宇松庚庚兮在户問此何所兮廬山之隂大江之滸雲可衣兮松可巢君何為兮不來豫何為兮延佇山則有薇水則有魚君歸來兮豫與女同居題新安許氏蘭秀軒蘭生兮深谷潄流泉兮蔭喬木緑葉兮披披玉幹兮紫㽔植之兮堂下播芳馨兮菲菲菲菲兮掦揚思君子兮髙堂縆琴瑟兮會友嘉肴苾兮薦芳襲芳兮佩秀宜君子兮多壽桂林歌贈明秀才逺望兮桂林鬱蒼蒼兮窈深去無期羌君子兮勞我思皎皎兮明月桂偃蹇兮不可掇矌蕩蕩兮啇風發君思我兮湖南憲使盧學士移病歸潁舟次武昌辱問不肖姓名先奉寄三首大德七年昔賢懷出處到處非一端冥冥鹿門東陵園千載有其人常在羈旅間跂豫𣣔從之路危不可干晨興命徒旅驅車出重門此睇嵩洛原浮雲數千里悵然迥我轅東風起空郊草色一何鮮百鳥縱橫逰孤鵠摩可寫短意誰能傳岧岧椘王臺泯泯湘水碧湘水深客客本金閨人觀風戾南國漠然忽遐斊抗志箕頴迹榮華衆所趍智者審損益嶔崟狐兔穴泱漭風雨色常恐衣上塵汗我林下石重華仰海宇夔􅾽易為力去去君勿遲憧憧孰云識我本耕牧𥪡結廬章江涘微生屬休明世尚猶典禮驚飈卷飛轍寥落從此始三年江漢春萬事隨逝水既昧理生術𣸪慚逰方旨豈無青山歸亦有桑與梓何為苦留滯眷眷存君子君子諒不然東臯畢耘耔黃鵠山聽雨淂清字玄扃息深構虗館含餘清瀟灑松上來瑟縮花間鳴遙兼夜析警細與寒更并懷親感仳别撫物愧生成土思浩方殷春聲耿逾明幸及朋知好逹此旦暮情北首非窮轅南山夢歸耕何言託豪素聊用欵平生贈别李時毅淂南樓姢姢臨古戍晃晃辭煙樹寒通雲夢深白映蒼梧暮胡床看愈近椘酒愁難駐雁背𣣔成霜林梢𥘉泫露故人明夜泊相望㝎何處且照東湖歸行送歸州去送薑尚志淂官後携新妾歸省淹薄徂年歲離别忽在兹寒城落木後虗館殘鐘時家在雙井上心隨孤鴻飛落日布帆逺青山尊酒移蒼茫倚閭情愴恍零雨詩託身名教中固應慎其儀志尚既不殊情鍾自成悲昔見已雲晚再會良無期濯足彭髙堂歸鶴髮喜垂涕兒童問牽衣野老借檄看鄰女隔墻窺田園各成熟松竹一在眼雞黍相提携翻知在家樂不恨為官遲放浪乘化遷何用世俗知遊禪林寺喜淂昌上人靈皋懷獨往危軒泊間寂偶與塵事違况值禪林客深苔剝修玉輕霏淡凝碧敻見飛鳥還靜聞寒溜滴空明會真賞漂流見良覿常恐心迹乖無由展平昔奉陪憲使程公遊麻原第三谷宴藏書山房白雪樓時三月三日明公富暇豫勝日懷登臨蹀躞驄馬行窈窕幽人心懸崖響晴雨奔流濯春隂雲門轉絶壑畫橋貫長林拂石慨往運聞鐘知古音耆松有百圍突嶂踰萬尋小憩釣魚臺聿瞻華子岑捫蘿入縹眇側􆁍凌蕭森白雪百尺樓下有孤猿吟𥘉筵俯曽顛微風散危襟語笑信忘我觥籌浩難任豈不念永留惘然歸思深送雷山人逰山髙人雨中至􅌽我逰山作自非冥寂徒孰遣紛華落方春乃發軔殘雪猶映薄隨雲度神臯披煙望靈嶽晞沐朝陽谷照影清氷壑淹留皆隱淪往還必恬漠惟應樵與牧時逢淂竒藥歸來雖未期鬢髮終如昨送孫志言逺逰志士逰四海豈拘名利牽孫子三十餘懷策靡遑安仰視流光馳千歲俄頃間青青鏡中髮閉閣守丘園昔者限南北放浪徒空言曠然六合中何為惜飛翻晨裝既云具良友咸在門依依别老親悃悃語弟昆出門即萬里回首惟浮雲豈無骨肉念身負天地恩白日出東峰緑樹遍平原歡會良未期佇情何由宣出處各努力還歸觀所敦贈髤者黃生髤飾肇有虞大朴已雕刓紛紛百代下巧密何多端黃金間毫髮文螺錯斕斒竹樹冠臺殿祥雲隨鳯鵉五采𬒳牀几豈獨匜與􅐻坐使圭璧暗所好移所觀黃氏檀良工出入三十年馳譽必名流迎致皆上官美賈一朝起群工那敢班藝絶誠足貴古道何由還送管録事赴東平走筆作十月燕地凍原野何蕭條征車臨長途行子去中朝濟濟同舍生載酒集河橋子當撫婺矛牙行役在晨朝脫葉辭髙林散漫復風飈離鴻别杜渚嘹唳空曽霄一觴不盡傾何處相招邀東魯非逺邦録事非冗僚矧宅夫子地餘風諒非遙眷言懋殊績夙夕佇嘉招廬山郭數授數相覓不見忽聞歸省却赴官雲南奉寄五言一首為别以答碩交之意蕪謬忝詞館晨出歸恆夕親交猶自踈况乃未嘗覿誤蒙君子賞驅車數見覓暮見門間題中夜猶怵惕反愧應門子時奉氷玉色云何心所歡萬里西南役終乖携手好同是思親客過家君已先淹泊誰復識東風動楊桞河水流不息何以展所懷中心若金石和酬馬伯庸供奉史館間題見示二首隂沉閟華館窈窕冝芳樹秋日透清輝晨飈翼輕霧飛文盡威鳳擢質皆振鷺平生寡儔匹及此同散聚云胡感羇逰對酒恆不御羡君躡髙弟早聼傳臚句時從鴛鴻似縱轡驊騮路紬史吾豈堪讀書君不誤飛葉滿京華青松臨廣筵連翩集軒蓋卓犖皆時賢青松豈不髙衆草自芊芊感此理文翰恆恐迷所先搜獵殘缺間終歲不成編矯情或傷直含辭非取妍宣尼萬世標斯道庶昭宣元功既森列群策咸牽聫終焉懼非才申旦長惕然重送曽應奉及周鄒諸君子晨興戒徒旅行子即長路天衢風雨過升陽在髙樹發軔東南門解擢紛往緒廽瞻彤庭闕倣佛玉堂署遺榮誠所難勇退無枉步聫翩數君子意氣更相慕文采掩春華清言敵朝露超遙去留迹曽何吝情素懿此昌時明各有丘園趣熊英德哀辭靈飈戒先路疊鼓中夜發旌旐揚廣衢輀車出城闥素緌紛前逝疏麻森後列岡岡迷據依營營會精魄流雲冥飛蓋平野一何濶慟哭積水濱哀歌青林樾翔鳥為廽薄我馬如顧秣農夫釋耒嘆行子憑蹊惻共隱善人喪矧承君子列平居異山隴纍别兼歲月規戒晞暮齡歡燕中道歇時哲衆所屬六十非短折撫物自傷摧瞻望猶慌愡南轅懌歸斾北首悽往筏千春䮬岑趾藹餘篇帙宿草日已深聲客閟幽泬雜詩五首東風吹百草沿路一時生繁桃與夭杏遍野復盈城東鄰宰肥牛西里按新聲孰不乘時節為樂快心情平明出南郭登髙望帝京大哉山河固喟然獨撫􅈾社日玄鳥至入我髙堂飛舊泥幸未拆新泥復相依豈徒安爾身復欲長其兒言語嬌且間上下遞差池勿因秋風起相逐忽還歸嚶鳴出深谷草木皆華滋昨日悲嚴霜爛熳揚光輝雞鳴車馬動日暮交橫馳賤士錦鞍韉貧女金裳衣各碩得所欲及此艷陽時青青孤生松髙出浮雲中下無嘉樹林上有萬里風俯視原上草秀色何豐茸自顧豈不髙獨立難為容常恐木根蠧委此蒿與蓬城南有名園車馬何喧喧緑池夾髙栁百草朝且鮮平明集髙臺日暮不能還美酒百壼少農厨豈論錢麗服羅四座急管應繁絃燕歌􅌂成行趙舞交蹁躚但得主人顧陋質自成妍還過舊逰處池館謾依然寓興五首壽大宗師吳古稱神仙人乃自秦漢間由來英雄士重己輕人寰子房遇黃石取履非所艱一朝從赤松髙風安可攀後千載獨立當玄關昔有安期生本是漢竒士髙視群雄間竊鄙蒯徹計學道滄海上却粒咀元氣一食如瓜棗金石焉足貴超凌八極外洞達無始際時從王子喬吹笙下逰戲咄爾燕齊人宿留安可致方朔起平原髙志凌紫氛上書三千牘長揖萬乘君淪迹寄中朝髙爵固非群繾綣緣世主諧笑匡國均三食王母桃不受王母嗔髙風軼萬代誰歟繼清塵伯陽閔宗周西度函谷關誰令守關者再拜希一言斂容為之陳文字至五千聊因令尹啓本𣣔使之傳煌煌百代下繼者良獨難赤松隱崑崙廣成在空同德為王母歸道與軒轅通既枉赤水駕時欵玄圃宫先天本非始後天亦無終自非玄德人誰能躡竒蹤雨中作孟夏涼風來吹我羅裳衣此服豈不稱炎暑方及期婉戀庭中花煌煌有光輝自信好顔色何能與時違冥心元化勿為後世嗤送旌德劉大火流坤維西風集庭柯積潦不歸壑浮雲鬱嵳峩山東擁盜賊浙右疲征料嶺外兵不解湘南及干戈郡縣無良材平人嬰禍羅宓氏彈鳴琴言遊亦弦歌劉子宰旌德為治當如何題淵明撫松圖抱拙辭下邑曠然獲所安孤松臨廣園聊且共􅐻桓清晨散逰策日入自當還霜露不相貸時物倐殊觀兹植焉所貴昔為聖者嘆題趙子昂寒翠啚石潤欲生雲山寒疑有雨髙林葉盡脫低篁緑堪數因知靜者要更覺王孫苦小草枯樹根茸茸欲華豫𥘉至京師和答友人病中見示志士輕離别貧賤事多違秋風車馬中故人髙臥時逺客江南至塵土滿素衣既申離合情中多勞苦辭歡笑未幾何感歎已乘之𣣔及田里事復恐疾疢滋亹亹流景遷榆桞各變衰偃息寄一室朝夕終在兹委運復何言人生信可疑我獨何為者日出暮來歸重餞何太虗雞鳴曉色動行人出南郭徘徊望車馬飛雪何漠漠巨野四面平中路凄以索黃狐超客過驚鴟向人落結軫赴悲笳凝酸屬哀角時逢古人迹因究平生學廽首睇關山低心望蓬藿離合兩不期思懷獨難托贈洪參軍兄弟洪氏起遼海流章耀八紘孝友根世學忠貞自天成入為帝羽儀出秉國鈞衡洋洋髙門居濟濟羅公卿籍甚澄與瀾玉質金為聲析理貫秋豪摛藻豔春晴朝趨承明內暮進賢友生衣錦絡尚絅穆然含粹精靈風非求知出為世所驚竒璞隱昆岫采充清廟英堯湯攬群才聖道日光明豈惟殷膚敏祼將在周京蒼天雖云髙乃心此黎氓君臣兩不易相期底隆平君德貴并包臣道戒驕盈立賢必無方拔茅思彚征朂哉敬厥終兩賢信國楨送馮尊師還嶽陽馮公住天嶽夙抱丹霞賞結構何威巍連延瞰髙爽飛縈帶遙甸周覽春決􅐯日落長沙明風廽洞庭響事因多病簡道與流年長郡邑費招邀賢豪畢知奬翳然庭中樹宴坐寂餘想流雲時縱橫幽弄自來往還因採靈藥相覿稽神壤悵望忽言歸川塗日修廣題山水卷梢梢雲木動藹藹煙峰亂逺浦引歸橈雙崖臨絶岸方思隱淪客𣣔結漁樵伴水濶山更遙幽期空汗漫題清江黃氏池亭亭名玉壼氷新亭環碧池池水何漾深偶携塵外似薄言此窺臨惴惴若有畏憑憑如弗任既抱執盈念仍懷履薄心白日麗清暉微風在逺林洞逹忽無際徵明諧素襟還君玉如意理我雲門琴三月晦日送春淂詩字變化無終極形氣遞推移昨日名園中徂春忽在兹曄曄華林彩繁隂緑成帷從結逰女懷祗增志士悲况此客行子風水積川坻撫壯思始榮臨芳念將衰安知盛長後不有堅凝時俯瞰江水流仰與東風期各言早還歸母勞東山詩題陳椽菊􅏙逹士隨所適迹異心恆素時從府中歸問菊松下路𥘉欣碧叢長復愛繁英布灌以古井泉申之九秋露有酒共斟酌無人還獨步結意常恐非留􅌚輒忘暮髙天遙澄穆平川淡容與落日明歸禽踈籬繞蒼樹懷芳諒為美居榮豈云慕矯首今何時孤雲為誰去題蘆鴈四首江湖處處非况汝一身微如何却欲下只合更髙飛自不作雙飛沙頭呌向誰碧天無限好何處不堪隨朝飛自作行夜宿更成雙誰能如此鳥和月占秋江寒就江南暖飢就江南飽莫道江南惡須道江南好題李陵送蘇武圖三首一與故人别死生寧𣸪親休言典屬國猶淂畫麒麟今朝送漢莭迢遞入秦關惟有沙埸夢相隨匹馬還慘淡河梁路參差塞上山誰言是死别日夜望生還題風煙雪月四梅圗逍遙芳樹下解后寒花發立盡晚來風明朝恐成雪髙花開幾點淡靄拂成衣遙瞻應不見相對尚依稀年年霜雪裏得見此花開此花元不管一任雪霜催玉樹臨風好更于明月宜空山冷相照未必有人知題牧羊啚求牧既已得敗羣還復去白晝捫蝨眠清風滿髙樹題草蟲啚二首傾陽朝莫同忘憂歲年改蜂蝶耶得知側翹方采采有竹不必多有豆當自熟坐看蜻蜓輩日晏紛相逐再題二首種藥都防憂滋蘭總為春青蛙與蜥蜴何用亦紛紛直莭冝彌堅弱蔓弱空纏微霜一夕降蚱蜢亦悽然題石頭和尚草庵啚青天不可量好風亦無價試覔庵中人蕭然古松下題何尊師畫牛啚啚惟一牛並無坡岸草樹人物之屬莫是度關者寧非喘月時茫然天地內誰問復誰知題柯慱士為方叔髙所畫墨竹蒼蒼四君子意氣侵雲端六月不敢近蕭蕭風露寒丘氏南陵月磯亭明月滿灣崎先生獨釣時漁人渾未識惟恐白鷗知題四梅啚一兼松竹一兼雪月一兼水仙山􅈨一兼蘭與芝小徑蒼松側踈籬翠竹間相逄如有約久立不知還亂蘂逺難分寒香近却聞何人心與迹於此可同羣誰將配水仙更𣣔比山􅈨試問花知否臨風笑不言芝草黃金色蘭心紫玉㽔忽從花下見可恨不同時送阿英童歸揚氏弱女年十三兩年失母慈看􅕥阿婆去憶著𥘉生時野鴨詞野鳴雙雙沒輕鷗兩兩浮人生亦如此那有别離憂題雪竹𥘉霽啚已奮尚離披連朝𬒳壓欹虛心與直莭唯有太陽知題蒲萄翠實肥𥘉熟瓊漿迸𣣔流向來為酒者一斗慱涼州
