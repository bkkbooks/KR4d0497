  text: 揭文安公全集卷之二
  hash: sha256:5b1c6ca5b3d38783c1cb89924c88acefa8d2475bcec74c72d25b841d8639d2f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_002-1a}
body:
  text: 揭曼碩傒斯著門生前進士燮理溥化校録獻張平章天歷肇玄朔坤輿集皇靈汴蔡既榛夷南海淪炎精圗書入天府將帥功業成寶玉被親懿茅土列公卿庶類奮休祥羣賢基太平明公紹鴻烈文采敵華聲出入三十年愓然心靡寧論兵體安危攬轡思澄清矧宅股肱地夙夜在王庭名高德益難位隆貴匪輕聖心誠弘格臣節美戰兢唐虞登夔臯堯舜猶日升周召竭師保成康措王刑昌明願同濟援筆播芳馨題祝道士龍虎山先天觀圗聞説先天觀重重絶壁環鳥啼青澗裏花落白雲間稚子能長嘨居人識大還洞門無處認唯有水潺湲二貞詩關右有姬氏者父子皆早世姑趙婦張皆以年二十五而寡守節不嫁作二貞詩關右有姬氏父子早棄捐孀婦奉寡姑誓死各芳年膏沭誰復理羅𥜗委篋間辛苦事蠶繅祭祀亦靡愆父母既莫奪媒妁徒空言鳬堆安所施幣玉視如煙寧與枯瘁沒不為歡樂存婉婉桃李花春鳥何翩翩萬物各知時姑婦獨纍然史館獨坐地敻天逾近風髙午尚寒虛庭松子落欹檻菊花乾撫卷俱千古憂時有萬端寂寥麟父茟才薄欲辭官周侍制致樂堂詩有堂渠渠在番之區維周壽母式燕以娛渠渠有堂在番之陽維周壽母式燕以康斯堂何有有蘭有芷垂佩蕊蘂維周之子斯堂何有有蘭有蓀垂佩申申維周之孫曰蒸曰嘗孔時且具維甘維旨承于壽母母曰寧只福祿凝只升斯堂只我心平只母曰嘉只福祿遐只升斯堂只我心和只馬氏􅑐溪啚何處幽􅑐下復有清溪㵼霧氣散長林湍聲落平野石冝白烏憩樹想玄猿把誰獨此安居居人云姓馬山水啚幽人無世事髙卧謝浮名山崦晴時出溪流盡處行還聞有漁釣相問扣柴荆不掃門前路莓苔滿地生送道士薛玄卿歸江東知君此去漸難招只在人間已廓寥市上有時逢賣藥山頭何處覓吹簫仙􅑐花落溪流滿鬼谷雲開樹影遙未必故山安隱逸海天涼月夜蕭蕭大明殿退朝和周待制巍巍道德拱羲皇濟濟威儀陋漢光日射龍丈宫女扇風傳雞舌侍臣香中宵景氣浮雙闕下界歡謡動八荒詞館小臣何以報皇圖聖壽與天長祖生詩浦城孝子身姓祖自憐性命如糞土生才五歲遭亂離有母更𬒳官軍虜零丁二十八春秋母縱淂生何處求天地茫茫明月恨江山漠漠白雲愁忽淂母書驚母在看書未盡淚先流書云流落河南縣河南踏遍無由見唐州境上忽相逢白髮蕭蕭霜滿面誰知喜極情轉悲傍人更問𥘉别時千生萬死到今日始為母子東南歸東南迢遞閩山路入門猶記階前樹居人傳説盡相看雞黍提携竟朝暮祖生母子真可憐少壯離别老大還同時鄊井𬒳兵者幾人骨肉能生全願生母子長壽考四海升平永相保孤雌行為郾城莭婦作有鳥有鳥雌雄相追哺雛未飽鳴且飛雛未長雄乃死子亦隨朝朝暮暮唯孤雌長林廣野風日美步步不敢離故棲燕雀搖揚差復池廽身側腦遞相欺誰憐孤雌心到死終不移更有許州郾城徐氏母一生抱恨守空閨燕氏救兄詩千金之子不死市椘人竟殺陶朱子生者可殺死可生千金為重骨肉輕誰謂平陽有燕氏傾家乃出而兄死弟再有兄兄見弟里閭驚嗟官吏喜鳴呼安淂天下之吏亷且循庶政如水無冤民送華尊師以天壽莭奉詔祀武當靈時嚴漢祠神峰標椘甸羽人丹丘伯承詔馳嘉薦華渚曜玉虹條風舞玄燕長淮雨中㵼􅔬嶽雲間獻涉旬歷峻址梯空答弘願授簡香始升揭虔帝如眷天清翼軫動地肅玄武見飛響逈更聞竒祥靜逾絢是中有真侶蚤接諸方授胼胝負畚鍤鑿翠蓄雷電金芝産齋房矞雲冠巖殿祈褫無歲年會莭方紛衍既協時君降又樂明祀遍聖歷齊堪輿豐澤周宇縣還歸報天子獨往奚所羡真侶謂張真人有道行送馬雍古御史撫喻河西我皇屬憂顧君子得安居孟春風且寒遺子以修途四牡何翩翩廽首睇神都我懷正紆􅓹殽函忽巳踰積雪𬒳長巒萎者何時蘇巋彼蓮花峰上出浮雲衢白日皎以縣下視若玄墟煙塵起西北原野無定株行者中顧懷居者念其廬黃河􅍅東流乃自昆崘渠四海豈不曠切若䏎與膚親賢逺讒人古以致康娛君子誠多才乃用在馳驅秦隴阻關塞歲月浩已徂鞠躬盡明義足為世所模送周山人之遼東物變風已暄庭虛雪猶在每與君子違偏驚歲年改名山先夢到靈藥隨方采明日望行人雲槎隔遼海李宫人琵琶引鄠縣亢主簿言有李宮人者善琵琶至元十九年以良家子入宫得幸上比之昭君至大中入事興聖宫比以足疾乃得賜歸侍母給內俸如故因亢且乞詩于余遂作李宫人琵琶引其辭曰茫茫青冢春風裏歲歲春凨吹不起傳得琵琶馬上聲古今只有王與李李氏昔在至元中少小辭家來入宮一見世皇稱藝絶珠歌翠舞忽如空君王豈為紅顔惜自是衆人彈不得玉觴未舉樂乍停一曲便覺千金值廣寒殿裏月流輝太液池頭花發時舊曲半存猶解譜新聲萬變總相宜三十六年如一日長得君王賜顔色形容漸改病相尋獨抱琵琶空歎息興聖宫中愛更深承恩始得遂歸心時時尚被宫中召強理琵琶絃上音琵琶轉調聲轉澀堂上慈親還佇立回看舊賜滿床頭落花飛絮春風急題上都崇真宫陳真人屋壁李學士所畫墨竹走茟作玉京灤水上仙館白雲鄉虛壁數竿竹清風生滿堂微吟弄寒影靜坐佇幽香有客仍無事淡然方兩忘集賢大學士趙國公王開府慶八十應制昭代雍熙日詞林賦頌時紫宸丹詔出甲第五雲垂𥙿廟青宫裏王公玉樹枝朝趨陪綺甪夕侍接龍夔際會真難及飛騰巳在兹暴公𥘉繍斧方叔更藩維霜簡驚風裁天官肅羽儀還迎代邸入竟𬒳漢文知位望躋三少權衡俯百司每蒙天黼黻直許國蓍龜鳯吹廣寒殿龍舟太液池羽觴春侍宴玉座夜觀碁德業前賢繼辭華後進推髙情睎廣受餘事擬徴圭全趙山河富瀛洲日月遲九卿看綵服八帙表厖眉皇覽逢𥘉度殊恩介壽祺黃封中使出玉食尚饔移國老陳嘉慶李韓公作序羣工播盛辭禮非前代有施及老臣宜福祿何人並忠貞百歲期聖心誠念舊政用作臣規陵陽牟景陽以名祖父之子孫負竒材徑氣而與世抹摋自合州教授入掾翰林一語不合竟棄去不顧以詩為别竒璞刖之媒娥眉妬之具悄悄君子心皇皇百王度髙風集大木日夜如吼怒不畏枝葉殘但恐本根蠧曉登榮臺上天地一何巨白日光未吐羣星爛無數仙人五雲車縹眇玉清路區區隂陽忠可望那可遇忽聞金鑾客歲暮仍南去不得與之同頓足毛髮𥪡結羊腸詞正月十六好風光京師女兒結羊賜焚香再拜禮神畢剪𥿄九道尺許長撚成對綰雙雙結心有所祈口難説為輪為鐙恆苦多忽作羊腸心自别鄰家女兒聞㧾至未辨吉凶憂且畏須臾結罷起送神滿座􅌚欣雜憔悴但願年年逢此日兒結羊腸神降吉劉承旨父大司徒邢國公慶九十應制聖主尊賢遂及親邢公盛事更無倫身躋九帙曈方碧兒過耆年鬢未銀鳩杖乍頒寧畏噎龍章洊拜欲忘身上公建土山河富光祿分壺雨露頻析木天清雲五色梁園花發月重輪錫宴梁氏園三宫寵錫驚殊數四座稱觴半老臣瑞錦斕斒迎化日兼金條脫照芳春素煙冉冉晴熏上白雪冷冷艷曲新先世勳庸歸琬琰名家父子映冠紳三槐已驗移居日五栁翻如寄傲人澗底桃花曽閲世枕中鴻寶自頥神詞臣𣣔繼莊生作才薄何堪論大椿小孤山次韻小孤山前一廽盻蒼然始識孤山面隔江疊嶂開翠屏絶壁浮雲飄素練憶昔𥘉蒙翰林聘􅋈棹探竒不知􅌒捫蘿陟級至絶頂目極神開氣為變大江東滙彭蠡來晝夜崩騰奔海甸笳鼓遙聞日月動帆檣忽度乾坤轉舟人不識造物竒但趣急趂南風便蚤悟微官七載縛底用區區厭貧賤深窗冷壁守編摩何異揚雄困雕篆重來勝地歲云暮短景催人疾於箭天昏一火明山半石底猶疑有雷電彭郎磯下寒浪湧坐客正説龍君傳人生可喜還可憐世事堪違不堪戀明朝匡廬復入眼雖有此境何由羡武城先生獨好事名山每恨逰難偏豐城客子無一錢但當作詩乞如碩贈别曽編修歸廬陵􅌾學士兄孟冬涼風厲謁告歸廬陵阿兄在九原歲暮豈遑寧兄昔事武皇海內希英聲意氣動人主文采何從橫時事一朝異長揖去躬耕令弟紹芳猷榮足在承明如何奄忽間南北隔死生方舟發京國日落煙霧青萬感緣中來愓焉如有懲羈臣戀魏闕一夕魂九升君子恩義重况此骨肉情情深不可忘悠悠道路長山川日夕改我行殊未夾稍出燕兾都巳􅍱齊魯疆髙天圍四野悵望但茫茫道傍多古墳塋域遞相當荒草吹北風日夕下牛羊不知何代人于此閲興亡自古既有死誰獨免摧傷死者雖所同私懷詎能巳塗路猶感傷况我兄與弟世俗日衰謝常懼莫能起生者忽若遺誰復哀其死念昔賢哲人一一去為鬼詩書捐篋笥采采當路子掞藻厠明庭幸與君子同矧在弱冠年巳獲承其風家本聖門後孝友世所隆何意手足親一别曠音容及我南歸日舟揖復相從皎皎寒日高冥冥厲征鴻落帆滄江際渺然忽西東努力慎所託無為謾勞躬寄題臨川西澗范氏寓居蟾塘塘更西幽澗總堪題流水花間住孤禽竹裏啼石稜苔自合山徑樹相齊久客成真隱故園應已迷尋舍弟將至東牢宿野店歲暮尋我弟山行兩舍餘入雲攀磴道落日及村墟茅店溪邊冷松林石上踈如逢武陵客風景未應殊贈王郎王郎楚狂士意氣飛秋霜讀書一萬卷下筆數千行冨貴視浮雲况肯矜文章十五恥閭里掉臂辭故鄉夜宿東海月朝買西州航瞋目王公前結客少年場一飲或一石一醉或一觴寧揖屠狗人不與俗士當千金不易笑歲暮單衣裳阮籍在窮途英聲連四方鵉鵠有時鎩反愧燕雀翔世無劇孟交不及青樓倡燕趙如花人翠𬒮黃金璫不識豪俊士空媚癡與狂王郎逺過我坐我枯藜床終夕無酒飲撫髀歌慨慷平明别我去極目空茫茫沈逸人東觀招飲山館野館青山下晴軒積雨餘招尋蒙逺客寂寞愧間居空翠沾杯冷殘雲度谷虛從兹結朋好隨處問何如畫鴨春草細還生春雛飬漸成茸茸毛色起應解自呼名題聶氏陶軒開軒南山下日對南山雲青松俯前楹秋菊被中園翳翳修竹林清泉出其間歲晏農務息銜杯樂餘間時從鄰曲遊共稱稼穡難逹人貴知已俗士多所牽以兹謝簮􅌧委心此南軒列植既敷榮佳興日以繁讀書數兒子餘事焉足言送塗雲章訪舊武昌卻入京師垂雲厲驚風萬重摩高圓蟠泥鼓巨浪豈願九重淵毛生入楚庭頴脫俄頃間粲粲一公子長嘨起丘樊朝辭豫章臺暮過匡廬山大帆割鸚鵡極目空波瀾黃鵠錦𫀆仙吹笙紫霞端相顧一笑粲青春滿南天黃金築髙臺更覺郭隗賢聨翩樂劇輩相逐入幽燕平明九門開劍佩踰五千豈無一字薦傾倒平生言東風杏華開待我薊門前歸舟汀洲春草遍風雨獨歸時大舸中流下青山兩岸移鴉啼木郎廟人祭水神祠波浪爭掀舞艱難久自知小孤山曉發和蔡思敬䪨日落霞明錦浪翻崖傾石峭白雲間乾坤上下雄孤柱巴蜀東南壯此關神物夜移風動地仙舟曉度月漫山回瞻絶頂登臨處空翠冥濛杳靄間大信晚泊呈舟中諸公千家楊桞江當門東梁西梁兩岸蹲連檣大艦集日昏樅金伐鼓海上聞小江更出采石後前人立功後人守大信花采石酒陌上相逢莫廽首白楊河看月白楊河上看眀月昔人曽見今人别茅屋數家河上村化作三山白銀闕波平風靜棹歌來萬頃沖融鏡面開今夜江南憶逰子空瞻雲漢上昭回茫茫萬里燕齊路北斗從橫泰階曙黃河東逝月西流眀日南風過洪去歌風臺和李提舉韻萬乘東歸火德開漢皇曽此宴髙臺沛中父老謳歌入海內英雄倒載回湯沭空餘清泗在風雲猶似翠華來穹碑立斷蒼煙上靜閲人間幾劫灰題嚴陵獨釣啚何事玄纁入里閭羊裘暫脫就安車空令太史驚同寢猶把狂奴視報書一出聊為天子重諸公莫道故人踈朝廷自足中興士且放桐江著老漁題鼯鼠食瓜啚種瓜中園豫亦勤止瓜長而實汝則殘止雖則殘止豫敢汝仇天實汝生豫將何仇汝食之甘既肆既間實之食矣無傷豫根根存而微唯豫之窮根盛而實惟乃之功坐信州仙源觀徐尊師乃玄教大宗師張開府之弟子也玄霜搗罷世都遺葛屨蕉衫太古姿天上真人開府日山中仙子閉門時空林雨過金芝老深谷雲寒白鶴飢萬里馳書為永别盧敖何處定相期送蔡思敬還豫章有懷遼陽李提舉來日能同去不同獨携别恨向秋風眼看亂葉渾無㝎心與浮雲併一空黃獨山中歸自斸玉梅溪上夢先通莫嗤留滯京華者更有遼陽送斷鴻孔林啚詩并序集賢待制周侯能修禮于孔林侍讀學士商公啚之史官揭傒斯詩詠之峩峩尼山蔽于魯邦篤生聖人維民之綱尼山之下有洙有泗有蔚孔林在泗之涘維彼聖人教之誘之凡厥有氏則而效之維彼聖人覆之載之凡厥有民敬而愛之既誦其言亦𬒳其服孰秣其馬于林之側既誦其言亦履其武孰秣其馬于林之下六轡既同周侯之東荐之侑之聖人之宫其音洋洋其趨蹌蹌其臨皇皇聖人允臧商氏啚之式昭其敬載瞻載思罔不由聖壽櫟山詩一首為英真人生朝作壽檪山其里山名峨峨壽檪山􅐓洞雲錦溪百里空翠合諸峰南斗齊卧斫月窟桂坐聽槫桑雞臨深測地軸升髙徑天倪隂崖覆瓊蘂陽岡敷紫荑縣泉聒空響飛樹凌風嘶側畏猿鳥墮幽恐渙人迷兹山不自髙與人作丹梯赤松棲其東王􅔬憩其西浮丘前捧擁安期後提携神君領天宫出入黃金閨梅花照羽袂天書函紫泥歸期指松檪千歲猶未稽餐和飬靈源伏智掃荒蹊木公與金丹大笑彭鏗低壽王副樞七帙懸車兩府稀五朝遺老百僚師寒梅看足行吟處舊史評來坐歎時身退已將心共逺名高轉覺世堪遺且陪嘉客霑春酒政待武公歌抑詩李將軍歌一首送李天民赴邵武軍口巡檢李將軍材且武儒冠換得兜鍪去身疑南極老人星氣食隂山雪毛虎雕弧白馬金僕姑天地昂昂此丈天五十方為求盜使人生何用苦詩書寄言卲武諸官長不是尋常一腐儒時中書以吏部儒選貟多有十年不得調者奏以為閩廣諸道巡撿然多非其人而天民式稱是選老人星其常自喻題桃源啚并序江左飛虎山南十里有桃源者劉王二尊師所辟也臨江范亨文為之記余為賦五言詩十七韻桃源非一處龍虎畫難同內外關踰鐡高低石作叢黃幡青劍北紫蓋白雲東蟾形當霄逈蛾眉抱月弓六峯名千重藏曲折四面削虛空地户吟風黑天池浴日紅雪霜翻濺瀑雷雨㵼崩洪暗識猿啼逺晴聞鳥語工危龕三井祕絶澗九橋通江合仙巗怒山連鬼谷雄劉王開闢後秦晉有無中時見看桃侣頻逢採藥翁丹台寒漠漠琳宇氣熊熊濟勝非無具緣源恐莫窮煙霞俄變滅草樹杳蘢蔥四序何勞志羣疑倘擊蒙誰言武陵近十里上清宮送人歸豫章積雨霽徂夏故人今日歸手持毛生檄身著萊公衣玉樹桂秋月丹荑掦曉暉東湖徐孺子應怪久相違送王留守宣慰荆湖舟楫連檣出薊丘弓刀千騎入荆州歌翻郢雪寒暄變恩逐岷波日夜流雲雨暝連神女宅山川晴徺仲宣樓豈無賢士堪招隱應向鹿門深處求題張尊師畫晨登翠微天氣穆清白雲覆谷飛露垂纓孤猿逺響衆鳥嚶鳴牽蘿涉澗穿石度陘半􅑐華氣萬􅊤松聲神宫漠漠靈戶熒熒投隂迹影叩寂求譍素髮老人笑而相迎弗問弗承悟彼長生玄玉流液瑶草結英浩浩奔泉出與川平宛彼下人望我􅑐扃送播州楊宣慰歸藩祗奉綸言出夜郎恭陳壤奠入明光嘉名宣賜黃麾外大宴恩陪玉座傍天仗影移低日月宫懸聲動下鵉皇三呼拜舞君王德永共藩臣守四方雙旌遙指洞庭西千乘聫翩度五溪龍乕親軍兼使莭犬狼諸獠入封提光昭廟祏恩波逺風動藩維禮秩躋北望五雲髙魏闕亦知憂顧在黔黎寄題括蒼王氏東野二亭耕雨時雨布嘉澤羣物盡欣豫晨興集童僕東野從所務鴶鵴應候鳴鸝黃翔髙樹衆草萋以出流潦𬒳行路黽勉勤微躬寧𣸪當世慮羲農不我待沮溺諧所慕食力隨齊民常恐負空素眷言狗兹道卒此言歲莫心逺窮居豈余志無營得長間醫翳三𤱔宅傾樂彼南山灌木何蒼蒼雲烏相往還已絶嬰世念况接仁里歡但碩黍稌登春酒恆慰顔羲和緩其轡萬物悠然安寒夜作踈星凍霜空流月􅊜林薄虛館人不眠時聞一葉落送唐尊師祠武當龍衮分香下絳霄羽衣承詔出清朝星臨翼軫南垂濶神降虛危北極遙金殿壓雲開紫氣玉臺和月合笙蕭蕃釐更為吾皇祝下國時豐雨露饒送詹尊師歸廬山香爐峰色紫生煙一入京華路杳然雲碓秋聞舂藥水雨犁春臥種芝田書慿海鶴來時寄劍自潭蛟去後懸忽報歸期驚倦容獨淹微祿負中年贈淳貞子蕩蕩白玉京超超淳貞子十一求神仙服事丘與李嵩洛三十載結茅白雲裏餐是暘谷霞飲是上池水鬼神莫能識百念吹不起一朝忽騰化徑去不可遮飛駟服五龍角巾搖三花朝發扶桑國暮宿河漢槎朝食千歲桃暮食五色爪長揖青牛君髙歌渡流沙還憩金陵邸調笑許史家日食五侯鯖安淂厭胡麻春風長安陌落日邯鄲道迎人上青天送人入秋草竦身八極外天地忽亦老寄謝區中人全真以為寶孤松萹夀王大學士大地凍𣣔裂孤松髙穆清橫睨泰華嵩俯察蓬與瀛天風四浩蕩身與元氣并根深本自固霜雪空峥嶸白晝甘露降半夜朝陽舟飛枝蔭扶桑徑氣摩欃搶羣鳯所託命百鳥徒嘲鳴冥冥廣寒宫丹桂亦虛生八萬四千人何時月常盈維此天一柱千歲所飬成自非堯舜君工垂焉敢徴漢武作建章千門照西京掄材當此時餘柯了棟楹天地既有此未必終無情蒼蒼歲寒心永世仰堅貞過何淂之先生故居五首可憐古井門外依舊鍾樓屋西何處髙吟痛飲黃花翠竹都迷先生有詩云一井當門凍寒光照四鄰又我住東街比鐘樓在屋西心事巢由以上文章陶阮之間千古髙墳保下白雲明月青山軋軋機聲日莫依依楊桞春柔膝下中郎小女曽聽唱我髙郵先生常喜余髙郵城詩相見即呼高郵城來每相對酒酣則朗誦數遍頭上鳥紗分贈篋中縞楮相酬不道别時長别誰知愁是真愁延祐五年冬十月余南歸以中材一假見贈豫以白楮𬒳報之别時殊黯然也且手書其三代召字授豫若有所屬然也屋上青天未老門前白日常新他日咎夔稷禼安知不是斯人送談仲章歸長沙君家雲陽下忽向雲陽歸行路有南北看山無是非三湘廽鴈盡孤劍白虹飛亦欲投簮去從君采蕨薇我我亭詩并序殷仲堪答桓溫曰我與我周旋久寧作我冝春黃元瑜取以名其亭曰我我為賦詩一首我遊于袁于龍之干有淵間間有環言言有構桓桓維集之安我居我處我笑我語有翼其所而敢豫侮我植孔嘉我構孔華曽莫之迎而莫我多彼馳者子亦孔勞矣既我覯矣亦莫我逑矣嗟殷氏之老猶弗桓是友我不我友將誰歸咎溫溫其和瀏瀏其清藹藹其芳煥煥其明嗟維古之人尚或豫聼送鄭司獄歸衢州却赴調京師壯年執戟事明君一日上書天下聞不恨棲遲百僚底猶堪激烈萬人羣爛柯山逺廽孤棹析木天清望五雲盡説于公有隂德掉頭相别大江濆題山水野艇來無數山橋渡有三寒雲依古寺落木帶羸驂廽首重重變幽尋處處堪平生雙眼力江北𣸪江南題御馬圖朱纓金絡轡黃帕錦鞍韉神間意更逸𥘉下赤墀前題山暉啚為劉尊師作陵岑育神秀草木咸光晶每覽靈景異變態如有情內掩乍如羃飄浮忽相縈熊熊轉空曲奕奕連增城中有幽人居燕坐朝玉京窮隂亦朝徹無月恆夜明碧桃千歲花金芝四時榮猶疑地愛寶隨物弄華英題臨江同知問流民事迹江北流民七十口三十餘年在江表朋凶結惡四百餘白刃差差歷村保崩騰所向如投空白晝攫金都市中頃由南昌入豐邑反賂守者為先容長官坐堂寇入室妻子莫逃况金帛豈無鄊民敢相敵長官一揮翻辟易臨江二守亷且武手縛其渠散其伍豈惟鄊民淂安堵鄰境聞之皆鼓舞其渠在獄伍四歸大府上功民俗熙乃知一念敬厥職萬事至難皆可為人民社稷我所有安得坐視如雞狗人在雞狗猶愛之民社豈在雞狗後請君看取臨江守寄題朱氏真村堂深居魏亭北悃愊自無華風俗似太古生涯如小家飲醇猶恐過衣帛向疑奢相與鄰人異詩書有五車送人從軍妙年好文仍好武一旦從軍氣如虎彎弓已作滿月圖拔劍更逐廽風舞悲笳四起旌斾愁蒼山偃蹇黃雲浮陳前手繫降王􅖪馬上仍懸猛將頭復仇義大身命小順天將軍古來少一戰功成六合清不用黃金印如斗題淵明歸去來啚清江皮使君治南恩有惠政一日自免去而歸老焉廬陵王實𥘉賞其髙莭以淵明歸去來啚求中朝學士大夫賦詩還以為夀僕用其意賦五言一首吏事久見牽山澤曠逰盤兹辰理還策乃得從所歡悠悠川塗􅒯忽已造郊園風景一不異鄰曲皆舊觀童稚識人情奔走向我前荒草雖誕漫松菊了不干眷焉循初服常恐負昔言入室多美酒步庭嘉樹繁曠然心神舒誰謂世路難出處各有道既倦當知還方春農事興念之每忘餐貴賤豈不殊樂此農圃安堯舜垂衣裳巢許箕潁間漢祖除暴秦黃綺在商顔彼皆賢逹士今古胡不然永與簪組辭婆娑養餘年昔聞陶彭澤今見皮南恩千歲仰髙軌兹圖良足歎送李都事赴湖廣省幕堂堂李通甫起家掌邦憲直氣橫九秋神明激雷電再登蘭臺上愛國心靡轉時當至治末有位日兢戰崩騰五華山鑿翠起臺殿執筆佐御史力諫明且辨斧鑕已在前獨立目不眴駸尋國多故災異周八埏君復贊宣政赤手握銓選守法踰天官反得官長怨我皇奮江漢撥亂啓天眷乾坤再開闢日月重昭絢磊落收羣材疏戚共登薦君名一朝起亦作丞相掾丹心益傾竭婉畫勒替獻好惡古難同禍福巧相禪天子憂南紀藩宣必時彥下逮曹屬微簡選亦精練君得南省佐聞者盡驚羡傴僂辭闕庭飄搖出畿甸餞送盈路衢懇􅍁陳志願去年天下旱窮蹙無貴賤賑恤當及時本末須并見方春農事興不廢乃為善又聞南中賊憑陵及州縣黎獠本吾民撫綏在方面恩信足以懷逼迫使生變況我聖天子轍迹昔所遍勗哉籌策良無使空蹂踐京城雨初過草樹鬱蔥蒨喬木多蚤鶯髙堂有新燕煩辭君勿誚君歌我其抃
