front:
  text: 掲文安公全集補遺
  hash: sha256:2a5a2f5c4695cff3b4ac47cd67e687e25e1ef6d767b19c8b6e0ffdad200f313a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_015-1a}
body:
  text: 飲張氏别墅楚國多才俊張家好弟兄出門湖水碧留客野堂清微雨鳴疎竹寒煙覆古城園人隔畦語歳莫此中行不寐呈何太虚隙月斜依壁窗風細著人飄零知命晚牢落夢家頻斷鴈何曽定鳴雞不肎晨何郎詩句好萬里獨相親趙道士山水圖悄愴寒山曉凄迷野水昏長橋通古寺小艇背衡門路盡雙松上雲生亂石根如行南嶽莫遥見祝融尊送人之淮東扁舟何處客此地飽經過彭蠡江聲合揚州月色多天低知近海地濶欲横河自是吾生拙如君定若何送林彦廣南鎮行香昔年同事文皇帝出入千門萬戸中漢閣圖書觀毎徧周家祀典學皆通鼎湖忽送飛龍去石鼓空歌我馬同今日圅香南鎮去還㝷禹穴酹西風贈呉主一幷序曹南吳主一妙年力學能文章尤工隷書近自豫章以職事至京師過予劇談竟曰忘去忽以别告令人惘然詩以奉送國朝分􅊢誰最長趙虞姚蕭范與楊趙公温温蔡中郎虞公格格由鐘梁姚蕭二公撼中邦豈以筆法窺漢唐蕭守髙尚姚文章范公清遒不敢當縱横石經兀老蒼楊侯起家自洛陽華山之碑早擅塲旁出㨗入無留藏曹南呉氏俊且良古意䬃䬃浮匡箱商盤周鼎儼作行刓圭削鋭伏景光宜伸而縮圓使方外若椎魯中堅强趨新騖巧紛披猖欲辨輙止心孔傷金陵皇象劒㦸張中山夏丞鼎獨扛二碑分法古所藏􅊢多分少須精詳君方妙年進莫量更入二篆君無雙近者吾甥有陳岡昔師楊氏今頡頏見之為道安毋忘登薊丘作閑登薊丘望西北削諸峯轉覺天地肅因悲霜露濃雲間何處笛日落滿城鐘自笑栖遲者惟堪學老農和張太一秋興二首蓬萊宫闕赤囘䦨龍虎神君禹歩寛朝嚥日華當食榖夜迎天仗識鳴鑾露飛仙掌金莖凍月滿玄都玉珮寒遥想西齋清似水吟詩聽到漏聲殘太行遥接帝王州西北連山際海稠鶴下静依仙館夕鴈啼高挾塞垣秋側身天地渾如寄偷眼風雲總是浮應笑白頭京國裏長年百慮更千憂送張真人歸上清閉户京城晝嬾開𥘉聞北覲却南囘馮夷擊鼓乘龍出王子吹笙跨鶴來嚢裏天書明日月匣中神劍閟風雷囘瞻魏闕紅雲擁應在山中看蚤梅送客省冷副使歸豫章覲省始違山林賞復作遠遊客忽興慈母念辭帝云京國楊柳河上春飄然就行役聞者爲驚喜朋儔皆嘆息昔依禁樹枝今戀山巔柏世俗更推蕩日月如有廹歸鴈羣響哀遥雲孤飛白都門一樽酒落景淡行色以我留滯心送君南征翮和傅與礪近日何多念頻年不肎還河流無故道春色是他山棐几看雲凭衡門罷月闗無情寒與暑偏解鑄衰顔硯山詩幷序山石出靈壁其大不盈尺高半之隔絶澗前後五十五峰東南有飛磴横出方平可二寸許鑿以為硯號曰硯山在唐巳有名後歸於李後主主亡歸於宋米芾元章刻其下𫐠所由來甚詳宋之季歸於天台戴運使覺民後又歸其族人宰相賈似道求之弗與攜持兵亂間寢處與俱乃獲全大都太乙崇福宫張真人本戴氏子今年春貽書得之請予賦詩其辭曰何年靈壁一拳石五十五峰不盈尺峰峰相向如削鐡祝融紫蓋前後列東南一泓尤可愛白晝玄雲生霮䨴在唐已著羣玉賦入宋更受元章拜天台澒洞雲海連戴氏藏之餘百年䕶持不涴權貴手離亂獨與身俱全帝旁真人乗紫霞尺書招之若還家隂崖洞壑寒谽谺宛轉細路通裦斜崑崙蓬萊與方壺坐卧相對神仙居硬黄從寫黃庭帖汗青或抄鴻寳書秦淮咽咽金陵道此物幸不隨秋草願君谷神長不老淨几明窗永相保山水卷稍稍雲木動藹藹煙峰亂逺浦引歸橈雙崖臨絶岸方思隱淪客欲結漁樵伴水濶山更遥幽期空汗漫送李掾自北囘歸省長沙因簡趙宣慰張徵士吕宗二判官萬里風沙斷三湘日夜流名成親白首歲莫客扁舟黄鵠延歸思丹楓替别愁眼穿廻處鴈心静狎餘鷗細雨黄陵廟殘陽杜若洲漸深桑梓敬翻畏友朋留送逺慚羈旅臨分憶舊游鐘聲衡岳曙帆影洞庭秋風壤通蠻徼煙霞拂帝丘交歌明月市傾斾壓雲樓訪菊逢徵士行瓜識故侯為言憔悴客敝盡黑貂裘望葛市有懐故人盧子儀以附他舟不得上岸相見予往赴主一書院時盧實送予至長沙今經其里不一造門能無憾乎至樊口作順流無風江更急歲莫歸人浩難縶所思只隔江上邨亂樹參差不容入憶昨扁舟雲夢觸熱千里能相送我來悵望竟空還一樽知是何年共樊山蒼蒼赤壁莫武昌對岸黄州路連聲大笑櫓如飛回頭獨送孤雲去黄鶴山聽雨得清字玄扃息深構虚館含餘清瀟灑松上來瑟縮花間鳴遥兼夜柝警細與寒更幷懐親感離别撫物媿生成土思浩方殷春聲耿逾明幸及朋知好逹此旦莫情北展非窮轅南山夢歸耕何言託毫素聊與欵平生過族姪東面雲山有草堂下臨池水即滄浪草侵古道莓苔滑花壓頽垣薜荔香毎訪所親皆異物始驚為客乆殊鄉仲容兄弟賢相映更為吾宗足感傷銅儀宋沈存中所鑄法像坤儀重來從汴水遷飛龍纏四極黄道界中天望絶秋毫永循環太古前荒臺明月夜應有淚潺湲重餞李九時毅賦得南樓月娟娟臨古戍晃晃辭煙樹寒通雲夢深白映蒼祠莫胡床看逾近楚酒愁難駐鴈背欲成霜林梢初泫露故人明夜泊相望定何處且照東湖歸行送歸舟去出三洪峽積水羣山裏行舟亂石間地偏疑隔世峽怒欲藏闗獨鳥啼深樹斜陽下急灘千憂逢一快未覺此生孱題邢先輩西壁山水圖邢家蒼蒼西屋壁萬壑千峰動寒色大江忽轉天地囘浮雲孤飛日月白参差樓觀照林紅松檜淒迷起朔風崑崙蓬萊不可到赤城白帝遥相通賤子平生尚竒偉南極衡湘北幽冀復從大駕卜灤京始投邢君多意氣君昔扈從戎馬間少壮不知行路難月明飲馬長城窟雪深射虎祁連山萬里歸來太平日坐我江山憂百失平明萬騎出天門又駕官車就行役送玄上人清江古鎮封谿道靈峰寺中玉泉好靈峰上人天上歸親見六龍天上飛湧金門外潮來去曽是錢唐江上住十里松風六月寒夢寐猶思徑山路自參天目老禅師始信靈峰路不迷却被無端徵詔起等閑來徃不曽知黄河萬里從西下吕梁百步如奔馬歸去山中問玉泉應向海門㴱處瀉大駕既還獨候驛傳未得和陳真人見示供奉闗山逺淹留日月長鄉書迷楚越鄰笛亂伊凉秋水流成字晴雲去作行寸心縣帳殿應似鴈隨陽楚山秋晚山人何處抱琴歸遥想樓臺隔翠微老樹風生舟正泊空江日落鴈初飛豈無賦客能招隐亦有漁翁醉息機一幅秋光舒復卷誰敎塵土涴人衣和歐陽南陽月夜思二首月出照中園鄰家猶未眠不嫌風露冷看到樹隂圓天清照逾近夜乆月將逺牆東雙白楊秋聲隔窗滿
