body:
  text: 揭曼碩傒斯著門生前進士燮理溥化校録饒隱君墓志銘臨川饒國華卒之明年其孤得正馳書京師請銘曰先子且屬纊曰吾生無所成名沒必得故人揭君銘余十五年前過臨川遭國華于道要余至舍行二三里至太原之谷其山四高環合如城中有良田美木水聲淙淙與禽鳥之聲相亂坐豫屋西别墅悠然之亭諸子玉立觴酌屢行復徘徊濯清釣雪諸軒亭之間花氣襲衣竹隂滿地使人冷然忘歸為留一日而去自是嘗一再過之不謂奄然死矣悲夫君早孤事母鄭孝謹為人端重和粹好讀春秋左氏傳能通諸史始末重賓客樂施豫浮沉鄉里與時高下及諸子既長皆讀書有守定持其家乃泛大江浮雪夢弭楫漢水之上入鹿門求龎公遺迹登峴首訪羊公墮淚之碑于是扁舟東下觀六朝故都泝彭蠡而還方謀厯齊魯燕趙之郊而不待矣鳴呼遽如是而已乎君長余一歲耳余雖生何益忍不銘君哉君諱應舉其先南豐人曽祖志通祖宗父文祖配吳氏子男三得正得貞益女二長劉次適余孫男一瑞生女一君卒以至順元年十月七日年五十八葬以某年月日墓在某原君嘗𣣔買書數千卷割田建義孰以教鄉里子弟未遂而沒是尚在後之人銘曰不角而勝不求而足悠然太原之谷庸非斯人之福蕭景能墓志銘泰定三年九月五日廬陵蕭祥嘉景能以疾卒將瘞矣其妻之兄鄉貢進士劉性粹衷告所知揭傒斯曰女弟之夫蕭祥嘉生而甚賢不幸年草六以殁生而無所成名殁無以表顯于世女弟甚哀之願得為之銘庶幾為不沒也敢請問其善狀則曰祥嘉少有志操嘗以古人自期篤學好問未嘗有子弟過父早喪事其母劉生母張及二兄畫禮與人交和易簡諒言必可復諸經皆通大義諸子史方術百家皆能提其綱領其要雖進士程文未嘗苦學下茟輒出人上尤喜為歌詩以漢魏晉為宗下此惟陳子昻李太白韋應物以為稍近于古長短句則曰周美成秦少遊薑堯章吾師也又多藏三代彞鼎罍洗漢魏金石刻唐宋名人圗畫墨迹之屬客至賦詩彈琴圍碁賭酒連日夜不厭平居焚香默坐不知斯世為何如時其父在京師為翰林曺承旨勛及其弟監察御史都賢所知聞其學薦充博士弟子員念其母不果行湖廣行省舉茂材籍教官中亦不就不知者往往誚其濶迂弗顧也沒之日弔者皆為之慟以為使不即死學不至古人不止必且舉進士否亦必不肯睢盱噂沓以媒其身以辱其親此女弟之所甚哀而願銘之也幸終賜之銘夫良人者婦人之所天也不幸不與偕老愛之而不改哀之而不忘古有之矣未有能圗不朽于金石又有賢如粹衷者能成其志敢不述而銘曽祖超祖子貴父均衝以賑粟致位贑州平凖庫使漢陽府漢川縣河濼使俄以近臣薦授奉訓大夫瀋陽王傳府斷事官尋以例罷娶劉氏繼亦劉氏即粹衷之妹也皆無子有女二人次則君沒始生以兄之孫繼善為之後葬以卒之明年某月日墓在某鄉某原有文集三卷藏于家銘曰生惟古兮是求沒追古兮與遊嗟今古之人兮不使之子而少留鄭隱君墓碣士莫貴于知禮然貧而知禮易富而知禮難富者驕吝之原禍福之樞也故貧而知禮不失其身富而知禮不失其家豫章之新建侯溪里鄭君季明其富而知禮者乎君字明仲兄弟三人君為仲叔父蚤世以為叔父後然實未嘗去父母之側其習詩禮執孝友甚謹父母嘗曰爾雖為叔父後他日分財固不爾殊也及父母終兄弟異財𣣔出分君辭曰夫既有所受矣卒辭而兄弟情好益篤事其兄如父視兄弟之子如子每食一人未至筯不先舉人不知其異㸑也與人交必誠必信稱人之善人不以為諂折人之過人不以為怨簡而周直而和臨事無留難吾直也􅢖摧山倒海之勢不以為撓吾詘也雖蜂蠆之毒莫之或攖人有園田雖接壤未嘗敢利將不守猶委曲扶持之必不守乃倍賈償之人有患難必肯救之人有忿爭必理解之歲豐必積粟以偹水旱歲飢必不貴糶以先鄉里年踰四十即獨處一室或與二子同寢齋閣以督其學褒衣博帶望之翼然知為古之有禮者會歲賔興語親故曰先子在宋固嘗試補博士弟子員矣而降年不永弗終厥志余雖老敢忘之乎遂躬率子弟使試有司尚繼先志至治二年秋七月淂末疾五日而沒是月十一日也年七十有六十有二月草日葬邑之盡忠鄉華表峰之麓後六年乃以龔先生道原所為狀請銘余自徔太史後執論撰之事多矣富而好禮未有若龔先生所陳者可不為之銘君之先徙自臨川曽大父珉大父璇父文富所後父曰夢彂配夏氏先十二年卒子男二元升元麒女一適熊元恭孫男四大同大觀許州定孫女五長適夏肅次許適揭頑閭曽孫男二顯孫虎生銘曰物之隆封必崇家之豐禮必恭殖有禮天所視貽孫子視所履噫吾其跂而楊隱君叔芳墓志銘清江楊天芳字叔芳抱疾且十載將沒自志其墓曰世無昌黎公誰知我者蓋自傷也沒且葬其子觀奉乃祖之命來請銘余雖不足追蹤古人不可謂不知君者忍不銘以慰其父若子之悲乎其世曽大父諱必通大父諱允成父名辰龍皆為儒其容秀整清峻進退有度其行事親孝不妄交母聶氏喪致客𢾗羣其學以禮義為夲博而不雜其文黎司業立武李舍人珏吳學士澄皆稱道之其配㷱氏其子觀其女長適甘惟逸仲適蕭鑑季適黃升其生至元丙子十月二月草有七日其沒延祐甲寅九月十日其葬泰定四年十月某日邑之茂材鄉鍾山其葬處也嗚呼君負高才生盛時又有科舉可以取祿位沒猶拳拳焉恨無昌黎公託其名不亦大可哀耶銘曰父甚慈老而哭其子子甚賢弱而喪其父沒十有四年始復于土祖孫依依兮尚其歸輔楊隱君叔宏墓志銘弘農楊氏遍天下多賢而好文其世居清江之水南者傳至宋登仕郎允成新塗杯山巡檢應斗皆負竒才實學不獲志以沒為當世所恨而杯山君有子曰繼孫字叔宏甫知學即慨然以歎穆然以思題其讀書之室曰學軒曰吾之學將何學乎學吾先世之所學而已先世之學果何學乎學為聖人之事而已聖人之事果何學乎忠君孝親敬兄友弟皆聖人之事也吾富貴利達之不知遑恤他為于是朝夕是軒身益修家益齊鄉邑之譽益歸而君子皆謂楊氏之必興矣年五十三竟奄然以死天道竟如何哉君孝友和𥙿好賓客能為詩不求甚工往往道人意中事其學守家法娶張氏子四人心方直方義方正方皆修飾謹篤孫四神明顯貴方力學君生以宋咸淳八年壬申九月十有三日卒以元泰定二年乙丑七月草有五日葬以天曆二年己已四月九日墓在邑之茂材鄉升平里小溪山之原銘曰人知其學天知其命命與學違我則有定嗟叔宏甫學乃其性而命之微孰敢不敬甘景行墓銘豐城甘君諱果字景行早以群學諸生受業熊先生朋來之門及長好為詩至元之末與邑人蔡黻熊坦等十人結社龍澤山中方是時國家取士非一途或以藝或以資或以功或以法律其最上者以文章荐可立置館閣然皆不好唯以治田園躬考養奉喪祭給公上禮賓客恤貧乏暇則讀書教子而已天曆至順之間天下大旱蝗民相食天子下詔賑粟五百石以上與秩有差三百石召旌其門君出粟或賑或貸或為粥以食日所活以百計而不受賞未幾家人失火尺椽不留人皆弔之笑曰昔有非有今無夲無君何弔焉新搆既定以至元改元十有二月八日卒年六十七將以某年月日葬于某其友熊君椅以書致其孤之意請銘君之先丹陽人南唐時有曰徔矩者為豐城兵馬銓轄因家焉其子稹在宋𥘉為監察御史稹孫令詢始居邑東功曺山下之滎陽之里逮君蓋十五世云曽大父文昭大父應欽父一清宋登仕郎君兄弟四人君次居三兄日槃日矩弟曰栗娶周氏生子熹燮繼黃氏生三子堅垕塤他姬子二圻丁生丁為兄槃後余與君居同邑生後先才五歲常讀書君之詩慕君之詩慕君之為人而未及識今竟不可復識矣而得銘君墓幸已銘曰世貴以位君以德義世富以利君以施惠龍澤之山高與天連君去不回君詩在焉故榮祿大夫陕西等處行中書省平章政事呂公墓志銘陕西等處行中書省平章政事呂公賜還之六年薨三月而葬未葬旬有五日請銘公諱天禖字吉卿世家遼東之咸平今為燕人曽大父諱元仕金為監軍太祖建帝號之八年以其衆北歸徔光猷皇后弟入事上承光寵者餘二十載大父諱惠堅及夫人董氏以順聖皇后媵臣為皇子北安王保傅能恭慎純慤得幸上殁諡恂恪父諱合刺亷直多巧思為𥘉建金玉局使奏釋所獲宋間諜鉗􅎂輸作者及渡江所俘童男皆教以工事世守其業厯工部侍郎尚書將作使中書參知政事拜大司徒獨立不阿權臣阿合馬𢾗欲害之不能幸哥誣陷丞相安童則力為之辨焉天子心膂沒贈金紫光祿大夫諡忠惠生五男子公次居四兄天麟天祐皆至大司徒至元草有九年公徔忠惠公入見上即以公可大任忠惠方選將作僚屬上詔用公忠惠不可遂以奉訓大夫同知異樣總𬋩府事奏免所負金帛甚夥成宗時自祕書監為將作使八年人未嘗見豪髮私進集賢侍讀學士遷大都留守兼少府非上共必節雖權貴莫敢干以私至大之末擢河東山西道肅政亷訪使以母老辭改禮部尚書又以母憂去數詔起固辭後四年用為夀福院使乃起仁宗四年上思其祖父勳勞嘉其誠篤特拜集賢大學士與聞國政自奉訓大夫至是六遷為榮祿大夫每議論朝廷之上慷慨切直不為詭隨大臣多不便之遂稱疾家居泰定之際關陕連歲大旱父子相食死徙者十九文宗即位䛇起公為陕西等處行中書省平章政事以撫其民公曰民急矣即日就道晝夜兼行及到官宣布天子德意發楮幣百萬緡米萬斛命有司賑之公乃齋不食三日以哀籲天其言曰天𣣔降大癘干民民乃能力作佐國家以事天地神祇臣老不能力作佐國家以事天地神祇而受天子命以撫寧其民民有罪宜悉加臣身毋久亢旱以殺吾民天乃大雨一雨五日是歲大熟民始稍稍有復業者至順二年冬以疾奏乞還京詔許之父老聞之相聚而哭于庭曰凡吾民之有今日者皆公之賜也故吾民得公則生不得則死公何忍遽棄吾民而歸也復大哭公力疾厚撫喻之強留至明年出關未至京上數問李平章至否既至入見上上迎勞之曰朕久不見卿思卿甚勤聞卿在關中天格其誠民𬒳其澤凡使關陕還者皆誦卿之德良用嘉歎故召卿還因賜之酒且曰卿病愈當大用卿公稽首謝曰臣素無行能陛下寄以方面常懼弗稱况敢當大任乎至元三年春月三日公疾始將屬纊且戒令薄葬屬子孫世世以忠孝報國言訖而薨年七十將以四月三日葬城西岡子原先塋惟吕氏自公之曽大父帥衆歸國今百草有五年矣世以忠謹事上父兄繼參大政繼以大司徒開府至公四世蓋謙讓亷退如漢萬石君家既間居十有餘年及以關中之飢起公則如救水火其憂國愛民之志為何如也臨終猶以薄葬忠孝為屬嗚呼賢哉公娶曹氏生大都人匠總𬋩府達魯花赤某同知異樣總𬋩府事延夀而卒繼鞏氏無子卒繼康里氏有子曰野仙他姬子二曰大都孛羅孫男四曰靈童今宿衛士曰悟篤思不華完者帖木兒伯顔帖木兒銘曰自古為國罔不以臣豈曰以臣維老成人而無老成何以為國如彼蒙叟冥行擲埴蒼蒼者天胡不恣遺瞻彼晨星日既烜之嗟嗟呂氏世忠世厚孰謂伊人弗與國夀望而不見聼而不聞國豈無人而公不存我觀四方飢饉荐臻孰與濟之如公在秦公既逝矣不我作矣雖不我作無忘國矣有子有孫有繹其承罔子之塋公其永寧奉議大夫平江路嘉定州知州甘公士亷墓志銘宋建隆二年江南李主遷都南昌其臣有甘徔矩者以丹陽兵徔開寶中子禎遂以列侯居豐城李主入宋乃為宋人禎生宗宗生十子其一曰椐居邑中後三百餘年有諱朝舉字士亷者沉鷙亷敏以功業自許會朝廷以法律治天下其故人官嶺南乃往求為群吏得輔韶州太守信其亷郡吏服其能部使者聞之辟以為椽居久之遷海北海北方大治威嚴任煩苛君一裁以正海帥獲諸叛黎無輕重皆下獄當死君閲其獄出脅從者五百餘人民為立祠廣西帥思得強明吏以自佐復辟椽其府尋丁父艱服闋還府藤容二州山猺為亂佐元帥萬奴擊之帥聞民多與猺通𣣔盡殺之君力諌不可且曰民居近猺猺暴其民吏不能制姑徔猺保妻子以待官軍也今𣣔并罪其民而誅之是驅民以資猺也若舍民而專事討猺民必并力而誅猺破可必矣帥徔之即督兵進擊其酋聞之果大恐自縳詣轅門降不戰而定帥及部使者交上其功不報遷南湖復以母憂去泰定𥘉起椽湖廣行省時高昌王行平章事問疑彂難辨答如響大器重之秩滿朝廷遣使與南臺監察御史銓廣選首用為廣西帥府經厯蓋嶺海之間歲荐飢賓栁慶逺諸猺為冦亂不止故選任之也既下車廣儲偹簡郵傳省征斂以養兵息民居歲餘請討諸猺事聞䛇遣湖廣行省平章劉脫歡總河南浙江西湖廣四省兵四萬人討之君迓境上固言攻討之䇿必自近始近者服則逺者自徔今近而狂猘莫若古縣猺栁州皂洞首李氏者有衆數千夲吾撞義兵強徑可用而有司貪暴激使為亂今大軍甫至至則以古縣猺責之威亂方張遣一信義素孚者招之必至計日而滅古縣之猺滅諸逺猺必自解而歸劉愎諌自用不聼未幾誘至李首及其親黨六人皆下獄皂衆聞之大怒殺桞州萬户與諸猺不可制矣劉駐兵數年卒無功至順二年春詔班師君亦以病滿三月謝歸而廣西部使者馮麟鄉舉治最湖南部使者管不八舉才任風憲元統元年調官京師授奉議大夫平江路嘉定州知州兼勸農事命未下而卒是歲七月念四日也得年五十五其甥曽利用護喪南歸子九成等以至元四年二月八日葬廣豐鄉食祿里邵坊之原夏九成以南安路總𬋩府照磨鄭德中所為狀請銘曽祖諱露祖諱發父諱叔良贈承直郎龍興路總𬋩府判官母聶氏贈恭人娶于氏封恭人子男三長即九成將仕佐郎韶州路樂昌縣主簿兼尉次九思南寧軍史次九萬女一適楊修惟君與余同里而君仕越余仕燕邈然不相聞蓋草餘年矣泰定三年余試進士湖廣君實以行省椽馳驛迓余始二見後八年余任藝文監丞君調官京師始再見不謂見不數月而君竟以喪歸可哀也哉銘曰堂堂其英烈烈其聲有言必徴有施必行懷抱利器惟所剸治弗顧以畏有倫有義鄉黨非戚嶺海非疏爾毁爾譽我亷我愚以公為忠以守為考以勤為政以肅為教出無所資入無所歸生一布韋沒一布韋有臣如此弗考以死何以銘之清白遺子故贈奉訓大夫滕卅知州飛騎尉追封滕縣男文君墓銘大傅掾吳文溫介新深州判官周紀致其外舅武昌治中文君淵之辭曰淵早賴祖父之訓起田里習國書由國子生歷髙郵鹽官兩郡教授􅊭江平凖行用庫使湖卅録事溧陽州判官吳縣尹知昌國州武昌治中凡七遷其官致位五品幸無大闕在昌國時朝廷推恩贈先父奉訓大夫滕州知州飛騎尉追封滕縣男母追封滕縣君淵今年六十有七矣亦既請老于上不知當復幾何年而先君墓道未有所表夙夜是懼敢請紀文溫皆滕人文溫又文氏壻問滕州君所為狀則曰滕州君之為人也勤儉朴素既辱在田野不得列名仕版效才當時渾渾乎若無異于常人也然里中緩急苟所有無不應其求其家人或以他辭拒輒詬曰苐碩我常有何淂不與人共之若等將舉無求于天地間耶吾知滕卅君者如此復問淵為政何若曰在潥陽時卅民蔡有一孫為某寺僧他惟一僧居孫上計去是僧其孫即淂為主寺未有間會有以博訐于卅者賂訐者楮幣千緡令引僧又許賂君千五百緡淵疑之亷得實又知同列皆受賂明日故晚出出則獄已具吏抱牘請輔署淵不可厯問皆稱實無僧訐者具服僧得免在昌國獲海冦數十其渠言奉化卅尚十餘人具言某人居某所歷歷可畫如所指移奉化捕之悉械送無遺淵察之皆畏慎慈順人也必非盜乃使皂卒易服詐為所獲盜歷引群盜辨之言非盜人人同且各言某盜為某狀此名是而人非亦人人同詰其渠果挾仇誣之也悉縱之繼又舉最于吳吾知淵之為政者如此然後知滕卅君之為德人滕舟君之冝有後而淵又能推孝以為忠而紀文溫且善志人之志余淂以為名滕州君諱順字某父諱郁世為滕州滕縣人君以某年月日卒年若千以某月日葬縣東北胡山漷水之間洪村之原縣君丘氏子男四曰某某某季淵也孫男若千人女三壻即文溫餘未行銘曰不曰髙乎積壤成山張而為屏翰翕而為重關不曰深乎積流成河蒸而為雲雨鼓而為濤波一人重義百世蒙利一人好善百世錫羡有髙者胡有深者漷文氏積之百世允鑠逸士徐君墓志銘吾鄉之士以好善為貴不辱為榮父賢子孝兄友弟敬纍數萬世而不厭者有隱溪徐氏溪出所居之東龍澤山中即其祖漢孺子讀書之處溪之上有諱輿字德載者尤徐氏之賢者幼而篤學長而更事外圎而內方上敬而下順不遺邇不忘逺不矜小智不忽小善急人之難憫人之窮勇與義俱不待勉強後至元五年三月草有六日年五十四竟以疾終姻族茹悲閭里增歎載念國𥘉盜起鄉境其祖友諒奮義庇民萬死一生執其羣醜室家相慶世保子孫厥父以莊承忠襲厚年將八帙好德弗諼冝􅈾敬養遽哭乃子天道悠邈實竊惑焉然有四子文箱楫駟檢身力學將世其美孫支擢秀一男六女依依膝下足慰目前將以十月已酉葬佛嶺之盧岡其弟珏狀其行請銘余昔嘗聞君有美地卜葬者睨焉卜宅者規焉因以與之不以為德嘗市大木築室將伐貪夫徇利造辭以爭因以讓之不以為弱心有所嫉人因毁之事有所仇人因短之日為佞諛終身薄之最其善行斯可銘已其配吳氏蓋先十二年卒銘曰隱之水弓其流沄沄爰掬衆芳于溪之濆匪以娛人于以怡親親今獨來身去為墳親匪獨來亦有諸孫諸孫日長親日以老墳今惟新忽焉宿草我思其人隱溪之道惟德之行惟善是寶有才弗用身之隱也有德弗報命之殞也展矣若人邦之彥也逸士陳君墓志銘逸士陳君諱殷字嘉靖世居豫章之豐城故色晉雷煥掘劍處曰營塘里里故家莫尚陳氏陳氏之賢莫尚嘉靖其曽大父亨大父世興父應軾皆事髙尚而家範齊肅如素官君少孤母王教育之年十五而天下易代辟地母家因受學舅氏慱覽強記尤好讀梁太子統文選故下茟為文章皆有規矩事定而歸始與世相酬酢應機合變動無遺䇿伯氏嘉謀每讓其能才與學躋德與年長宗族鄉黨咸屬望焉伯氏蚤世撫孤育幼如見伯氏田園第宅中歲載斥乃法朱氏家禮改作先祠冬至以少牢祠始祖春秋祀先祖悲哀泗如見所祭凶年飢歲發廩賑貸不待勸分新知舊好交際以義不事姑息晚重構所居堂署曰樂善大書其門曰當平世遂安居以示終焉之志元統復改至元之歲正月朔旦又大書其兩楹曰行仁自孝悌始起家在勤儉中以垂訓子孫三月草日以疾卒年七十三且屬纊子若姪皆涕泣固求一言以自克乃瞪目而言曰可以終身行之者和而已遂卒三年九月庚申葬折桂鄉祿城里其配王氏墓南又明年其孤植以所親熊君椅所為狀請銘余嘗聞君嘗有奴死仇家者仇大恐祈哀于門君曰吾豈以此報仇者謝去之又有啇糴粟誤持賈羸而君弗知啇頃自覺與其徒更相怨君聞故得實曰吾豈以此為利者立還之君蓋盛德人也足以法于後世矣君娶王氏為婦為母內外皆儀之先二十年卒得年四十二繼雷氏亦有淑德先三年卒得年六十四子男三果迪植果為伯氏後迪先九年卒孫男三伯庸伯寧受生女四曽孫男二普奴德奴女一銘曰時俗之日墮兮忠厚之日衰兮嗟若人而天不憗遺豫倀倀其何之已而已而庶其後之可期兮何先生墓志銘至順二年夏詔以集賢大學士全公嶽柱平章江西行省事秋具書幣遣使帥撫州太守即隱所聘孫先生轍何先生中而孫不起何先生既至以為龍興郡學東湖宗濓二書院賔師明年春與其子渡江逰西山主丁氏夏六月二十有三日以疾卒丁氏為具棺斂命其子為位受吊諸大夫士皆會哭後三日子成孫奉柩以歸明年十月十有三日葬邑之清原妣夫人唐氏之兆其門人李肅以狀至京師請銘于先生所與逰者揭傒斯曰何先生海內故人執論撰之事而相知深者惟子舍子無冝銘者噫余以兄事之者蓋三十餘年矣余不銘誰宜銘先生諱中字太虛一字飬正世為撫卅樂臣宦族曽祖諱詵伯祖諱夢龍父諱天聲登宋咸淳辛未進士苐官至主管刑工部架閣文字以才略與伯兄兵部郎中時齊名文丞相建都督府皆置幕下先生少穎拔以古學自任天下載籍靡不貫穿藏書萬卷皆手自校讎廣平程公巨夫清河元公明善負天下知人之鑒皆器遇之至大𥘉二公及栁城姚公燧東平王公構皆在朝遂北入京師以文章自通會諸權臣用事內外翕翕居兩月天大雪竟不别而去歸與諸門弟子講易詩書春秋大江之西同郡吳先生澄號天下儒宗又為中表兄然每推讓不敢置弟子列積所著書曰易髏象二卷書傳輔遺十卷通鑑綱目測海二卷通書問一卷䪨輔疑一卷六書綱領一卷輔校六書故三十一卷知非堂藁十卷支頥録二卷薊丘述逰録一卷其門人潘懋類聚刻之先生之學可謂弘肆深博矣然生世六十有八年連蹇愁悴者十八九書幣一入谷而客死三百里外不知天之恝然于斯人者獨何哉豈其多學善著書亦天之所忌邪此固窮士之所自託者吾不知其何故先生娶陳氏有三男子曰長孫在孫成孫四女嫁士族孫男一人銘曰夫容之髙吾其跂而鰲溪之深吾其厲而先生之沒曷其起而靖逸處士熊公墓志銘集賢所號靖逸處士熊公豫章豐城善源里人也諱召子字南翁少豫章先生朋來十二歲先生世與公連墻以居後家郡中先生每歸里必舍公所公至郡中必舍先生所兄弟自為知已公博覽載藉好論古今事如生其時性抗直辨是非枉直如别黑白雖大官豪吏一語失度即靣折語琅琅不少衰然卒如公言人有言論失實舉措無節于名義或有所闕必詬辱之人亦莫之敢怨退自悔艾而已蓋皆出乎正也故鄉之人依之以為安視之以為去就雖紛爭辨訟可一言而解公早以儉勤起家而以儉勤終身不少易其常後至元五年十有一月十六日卒年八十三將以十二月十八日葬冨城鄉交陽之原其諸孫請銘謹系之曰曽大父諱海大父諱英父諱誠孫娶雷氏生子男二雅先十九年死盜京先五年以疾卒女二長適范希驥次適范世隆繼黃氏孫男三克愛績嗣祖克愛早世無子以嗣祖為之後女六曽孫男二長即嗣祖次普福女二玄孫男一長夀公之葬實與子京同其兆云嗚呼余與公居相鄰世相好情義之相與殆未有過于吾二家者然自余竊祿于朝不相見者動十餘歲余間每一書還公必杖䇿詣門訪出處余書中亦往往問公安否蓋迹雖疏而情則至親也又聞余未還時公數向人言吾苐得與揭曼碩一見而死吾不恨矣吾當忍死待之及余還即買羊載酒躬相慶勞其喜見顔色猶親子姪不知余之不肖何能得此于公也其亦以先世之故與公未沒前一日余猶及坐公榻前相與劇論當世事不知竟為永訣也悲夫銘曰鬱交陽兮窈深結重雲兮愁隂望君子兮不見渺千古兮傷心傷心兮何極鄉誰歸兮里誰式孫既子兮子又孫承惠澤兮其無斁劉先生墓志銘吉之永新儒師劉先生諱友益字益友是為清江公非先生九世孫曽祖諱宗信父諱縡世以家學為邑人師父剛嚴介特獨立無朋而以先生為之子故少與物忤先生少好學貧不能淂書從里之多書者借而讀之朝借暮易暮借朝易窮晝夜讀不絶聲過目輒記間為人慵書以給膏火父母憐而禁止之乃掃别室羃窗户竟夕危坐默誦如是數年貫穿六經包羅百氏至天文地志律曆象數山川聮落都縣廢置皆可指畫而談毫髮無遺也宋之仁鄉里豪猾並起為亂與伯兄真長從弟人暐皆遇害先生絶而復蘇飢困踰年乃卜築髙山之間殿門著書不與世接以聖人之志莫大于春秋繼春秋之迹莫尚于通鑑綱目凡司馬氏冝書而未書者朱子書之冝正而未正者朱子正之恐朱子之意不白于天下後世乃著通鑑綱目書法五十九卷蓋厯三十年而後成天曆中邑進士馮君翼翁傳其書至京師國子先生得之大驚曰昔者王道衰而春秋作春秋隱而綱目興書法不作綱目之義又將微矣故聖賢之述作雖殊所以扶天綱立人極一也遂録副在官俾六館諸生傳習之至順三年三月三日昧爽先生疾作猶正衣冠危坐至午而卒年八十五以某月日葬邑之禾山鄉大豐之原娶陳氏繼假氏子男三矩衡莭皆克紹先業孫男十曽孫男一又明年夏馮君調官京師矩具狀介以請銘馮君曰先生外和而內剛外通而內介言簡而要不迂濶于事其誨人也諄諄善誘白鬚丹頰神情蕭然真有道者嗚呼若先生者苟見于用當何如哉銘百圍之木不為斧柯蹄涔之水不為江河元有天下先生在野先生在野志在天下百世之上先生此心百世之下先生此心先生不作山髙水深劉福墓志銘廬陵劉福字孟介五歲好學日記千言不知有童子之樂父母每憐之十歲聞科舉行即大喜忘晝夜廢寢食搜獵經史旁入捷出務為無所不知聞有學出已上便往與交聞有大人先生便往質其所疑祈寒極暑不懈人亦莫不樂告之以道然一資以為進士之文如是數年學大進雖宿學有不逮又恨以年不得試于有司或曰今天下州郡以國書設教官可淂遂因言者求之三年而後得然卒不好數數語人曰吾不能取一苐為父母榮不數為人聞有以進士及第者輒俯首終日食則嘆寢則寱語父母曉之百端終不釋或又曰子欲為甚可隱年以即事世若此多不可數乃瞋目訶曰子教我以欺君耶去然怏怏日益甚父母及其從父皆以為憂鄉先逹劉嶽申彭士奇羅曽深愛之亦皆以為憂未幾果得疾疾且革猶手不釋卷未嘗就床第泰㝎三年十有二月八日嘔血死將死嘆曰吾生不在科舉後沒不在科舉前命也然世必有知我者銘我得銘吾不恨矣言絶而卒卒年二十四明年夏余至廬陵其父及其從父偕其友以銘請嗟夫忍不銘哉惟古者士生八歲入小學十五入大學而教之必時故傳曰春秋教以禮樂冬夏教以詩書又曰春誦夏絃秋學禮冬讀書因其時順其氣協之以隂陽動靜之樂和之以藏修遊息之莭以成其學由司徒大樂正以登于天子而爵祿之故人無夭禮而器可閎也今也教之不以其時學之不由其序及為之選舉則又限之以年歲使奇才英鋭出類拔萃之士恆欎欎而不得竟伸其志愚鹵鄙陋者或偷慢優遊得以玩歲愒時此劉孟介至于嘔血而死也雖命焉其志有足悲者乃志而銘之使其英邁勃勃之氣常得以振頑奮懦為有志之所深恤也曽祖紹明祖惠可父國瑞母曠氏娶歐陽氏無子女一人方七歲以沒之明日葬里西溪之上太平原銘曰名不建兮心不摧身不待兮時不來吾銘汝弓吁可哀吾讀吾書齋銘惟皇降衷萬物偹我或昏以迷或岐而左煌煌六藉如日麗天由之斯聖睎之則賢而倀何之而思孔悲孰之子歸而有餘師伊豫云遘蕭氏克有日就月將誰掖誰誘曰諺有之吾讀吾書亦既從政惟書之劬吾書伊何匪聖弗讀成已成物惟日不足于以名齋于以表志凡百君子尚迪弗替孝友堂銘孝首百行友列五常為仁之夲為政之綱學由兹始行由此推善由兹長慶由此基是以孝友著乎讀書君子述之為世之模不求父慈而責子孝不求弟恭而責兄友父無不是其責在子弟有不恭或自兄始子知盡孝敢望父慈兄知盡友弟恭敢期父無不慈弟無不恭惟孝惟友克誠于中一有弗誠必致怨尤日復一日化為冦仇范則有匡堆則有行而况為人敢不自強孝盡生慈友恭亦爾孝慈友恭百世之祉子復為父子必紹之弟復為兄弟必效之父父子子兄兄弟弟惟贑孫氏以克永世何以克之勝私窒𣣔家為一人族為一俗既貴弗驕既冨有禮一家興仁里為之美蘇子説剛乃祖是敬子孫孝友鄂國是命我作銘詩式篤爾慶神之聼之有永無竟潭心齋銘金溪洪君王純其先府君號碧潭遂取翰林學士吳先生賦碧潭詩語名其齋曰潭心為之銘曰出下出泉混混其源流而為川瀦而為淵淵淵其淵潭潭其碧含星為珠沉月為璧其止非息其應不留溶溶而春湛湛而秋觀靜于動知靜之用用無不周若未嘗動觀動于靜知動之靜廓乎省容表裏交映惟淵之深又名曰潭視潭之碧于彼潭心思無邪齋銘為學至難莫微于思一出一入或公或私其思伊何曰誠而已思有弗誠毫釐千里其誠伊何恐懼戒慎莫顯乎微莫見乎隱暗室屋漏上帝是臨一動之微敢有弗欽誦詩三百一言以蔽曰思無邪乃義之至熊氏力行而以名齋俯仰周旋涵泳聖涯大而化之堯舜執中朂哉思乎罔或弗恭讀書處銘古者讀書學之一事力行是務記誦其次苟非讀書孰稽古典讀而弗學去聖逾逺古之讀書于以明道今之讀書資以為暴生皆厚也遷乃去之人不知學若之何其其書伊何易書詩禮春秋茟削日星埀紀秦漢以前傳注未立學必專門難學易入秦漢以後濓洛並起著述紛紜易學難至學之而至匪由他人學而弗至何有于身其學伊何由蒙而聖灑掃應對窮理盡性毫釐靡間德乃日新一日復禮天下歸仁羲皇之上唐虞之際若友其人若共其治動之斯應為乃有功三綱既立五典克從求之非艱具在方册行之非艱中道勿畫欲知詩書于此其處趙氏行之名齋其寓既修于身復齊其家始施于邦如玉靡瑕好正嫉邪崇夲抑末制財以寬用刑以活擴而充之儀于天朝惟是正人萬世之標我作銘詩以規以頌凡厥讀書朂哉體用忍恕堂銘古之學者有紀有倫忍以㝎性恕以求仁維忍伊何存仁存禮維恕伊何推人以已忍為恕用恕為忍基凡忍之道維恕之思忍不由恕宿怨藏怒維忍而恕母我母固以聖而忍耕稼陶漁以賢而忍九世同居苟不思恕亦豈克久舜有大焉為孝之首有美袁氏兄弟怡怡合堂以居忍恕是師我田我廬先君之有我兄我弟先君之子惟忍惟恕維德之力子子孫孫永保勿失方寸間銘察日月于孤竹之竅寄天地于秋毫之杪萬物皆偹吾不知其多一物不留吾不見其少是曰方寸間者臨通衢俯深沼外有幽花芳草之植內有圖書瑟琴之繞容坐客十數而有餘閲朝暮萬變而未了吾方以為大人猶以為小是未能逰乎方寸之表也
