body:
  text: 卷之一詩臨川女夏五月武昌舟中張君壽隱居送趙履道虞叔常寄題壽安堂留别盧學士黃尊師高軒衡山縣曉渡瀟湘八景圗瀟湘夜雨逺浦帆歸煙寺晚鐘洞庭秋月平沙落雁漁村晚照山市晴嵐江天暮雪以事如武昌女兒浦歌送尹十六送黃五舅貧交行曉坐别武昌南康夜泊春日七首夢雨夢武昌逰麻姑山雲關飛練亭湧雪亭三峽橋麻姑壇懷盧學士病夜得程翰林消息歸故園二首山行寄題東臯園亭宿梁安峽送趙仲逺山莊晚立哭王十雨述三首春暮間居長風沙夜泊何郎失鏡詞贈青城矦尊師贈友曉出順承門京城間居八首去婦詞四友詩賦雙陸泊安慶漁父髙郵城濟州𥘉度楊栁青謡雜詩四首柏堂詩卷之二詩獻張平章題先天觀圖二貞詩史館獨坐致樂堂詩馬氏巖溪圗山水圗送道士薛玄卿大明殿退朝祖生詩孤雌行燕氏救兄詩送華尊師送馬雍古送周山人李宫人琵琶引題墨竹王開府八十别牟景陽結羊腸詞劉大司徒九十小孤山贈别曽編修題范氏寓居尋舍弟贈王郎山水圗送道士薛玄卿大明殿退朝祖生詩孤雌行燕氏救兄詩送華尊師送馬雍古送周山人李宫人琵琶引題墨竹王開府八十别牟景陽結羊腸詞劉大司徒九十小孤山贈别曽編修題范氏寓居尋舍弟贈王郎沈逸人招飲畫鴨題聶氏陶軒送塗雲章歸舟小孤山曉發大信晚泊白楊河看月歌風臺題嚴陵獨釣鼯鼠食瓜圗哭徐尊師送蔡思敬孔林圗詩壽檪山詩壽王樞密李將軍歌題桃源圗送人歸豫章送王留守題張尊師畫送楊宣慰寄題耕雨亭寄題心逺亭寒夜作送唐尊師送詹尊師贈淳貞子孤松篇過何得之故居五首送談仲章我我亭詩送鄭司獄題山水題御馬圗題山暉圗題流民事迹寄題真村堂送人從軍題淵明歸去來圗卷之三詩題明皇出逰圗畫鷹題棄官學道詩登祝融峰送何太虛南歸憶昨四首題白翎雀題園趣亭題文瑞圗題復明詩卷同人下直賦賦海上雲吳子高悼亡秋夜作張子高歸成都題淵明歸興圗寄題寧壽道院題宋好古墨竹雲錦溪棹歌七首御書雪林應制胡虔汲水蕃部圗辛澄蓮花觀音杜節婦詩韓滉土星像曹將軍下􅵝馬圗韓幹馬宋徽宗宴蔡京圖送祕書李道濟送全平草題青山白雲圖桃花鸚鵡趙孝子題衛青印真陽詩贈連尊師贈項錬詩送祐上人送蘇尊師寄題張齊公廟題白翎雀寄題菊庒題霜鍾琴送王伯楯題鍾秀園題皆春堂謝項子虛周氏水木清華亭題虛舟送毛真人蘇志道哀詩題溪居圗寄題湖山堂夢先帝賜橘花寄題鄭氏菊庒題四清圗題蘭秀軒夢題墨梅寄題暖翠亭二首寄題長春亭題春蘭秋蕙四首題讀書亭送蕭教授送張郎中送聶太祝題看雨軒題清虛館吳歌送人歸吳中卷之四詩續所藏逺山圗題陳氏松巢圗桂林歌湖南憲使盧學士移病歸潁舟次武昌辱問不肖姓名先奉寄三首大德七年黃鵠聼雨贈别李時毅送薑尚志逰禪林寺逰麻原苐三谷送雷山人送孫志言贈髤者黃生送管録事寄别郭教授和馬伯庸二首重送曽應奉諸君子熊英德哀詞雜詩五首寓興五首雨中作送劉旌德題淵明撫松圗趙子昂寒翠圗𥘉至京答友人重餞何太虗贈洪參軍兄弟送馮尊師題山水卷題玉壺氷亭三月晦日題陳椽菊徑題蘆鴈四首李陵蘇武圗風煙雪月四梅圗題牧羊圗題草蟲圗二首再題草蟲二首題草庵圗題畫牛題何博士墨竹邱氏月磯亭題四梅圗送阿英野鴨詞題雪竹𥘉霽題蒲萄卷之五詩續飲酒萹從他痛詞吳歌贈許道士題小蓬萊黃母吳氏挽歌送墨工潘生送純真子還山漁樵問答圗題劉商觀奕圗題雙龍圗題玉笥少題禱雨詩卷畫鷹送張使君題春龍聽雷圗蔡氏四適堂題山水圗送黃判官和十二辰詩發臨湘得風聞西師捷二首漢荼陵矦廟泉水嶺作二首北樓雪後聞熊從嘔血亡待潮題吳越王手帖卷之六制表齊國公諡忠衮張榮追封濟南王仍諡忠衮制妻齊國夫人宋氏追封濟南王夫人制諸王忽都答兒追封雲安王諡忠武制諸王羅今觸追封保寧王諡昭義制申命三十九代天師張嗣成制進至大聖德頌表皇太后加尊號監修國史府賀表天壽節監修國史府賀表元旦翰林國史院賀皇太后表天壽節代蒙古國子監賀表上再節位奎章閣賀表奎章閣賀正表册皇太子奎章閣賀表聖節賀表奎章閣賀表藝文監賀表藝文監賀表卷之七書上李秦公書與尚書右丞相書答胡伋仲書與蕭維斗書卷之八序吳清寧文集序豐水續志序蕭孚有詩序孔氏譜序重修揭氏族譜序送劉旌德序通鑑綱目書法序范先生詩序書王鼎翁文集序城南宴集詩後序送胡伯友拜孔林序送張椽序送陳文學序贈醫士湯伯高序夷白先生集序純德先生梅西集序送陳叔永南歸序送族子時益赴南康主簿序送李克俊赴長興州同知序送劉真叟赴廣東憲幕詩序宋史論序卷之九序送劉以德赴化州學正序送張都事序送藝林庫提點畢申逹棄官歸飬詩序送也速答兒赤序沇溪先生文集序無底書囊序臨江路張同知自然頌序送欒元溥序送彭仲賓赴水巡檢序卷之十記富州重修學記一全州學記舒城縣龍眠書院記涿州孔子廟禮器記增城三皇廟記建都水分監記安福州東嶽廟記浮雲道院記撫州靈感廟記胡氏園趣亭記楊氏忠節祠記孝通廟記易州定興縣城隍廟記卷之十一記廬江縣學明倫堂記靖州廣德書院記廣州增城縣學記陟亭記善餘堂記進德堂記常州通真觀修道記袁州宜春縣逢溪山聖壽寺記廬陵縣丞馮君修造記昭勇廟巷雪樓記法印寺記沖玄觀記彭州學記卷之十二碑墓志大元敕賜修堰碑重建濟州會源閘碑天華萬壽宫碑臨江路玉笥山萬壽承天宫碑敕賜漢昭烈帝廟碑雙節廟碑龔先生碑嚴先生碑樂邱碑敕賜正奉大夫江南湖北道肅政廉