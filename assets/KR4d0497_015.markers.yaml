  - {type: variant, offset: 2020, length: 0, content: '', WYG: 委曲扶持之必不守乃倍價償之人有患難必身救之人有忿爭必理解之嵗豐必積粟以備水旱嵗饑必不貴糶以先鄉里年踰四十即獨處一室或與二子同寢齋閣以督其學褒衣博帶望之翼然知為古之有禮者會嵗賓興語親故曰先子在宋固嘗試補博士弟子員矣而降年不永弗終厥志余雖老敢忘之乎遂躬率子弟使試有司尚繼先志至治二年秋七月得末疾五日而殁是月十一曰也年七十有六十有二月二十日葬邑之盡忠鄉華表峯之麓後六年乃以龔先生道原所為狀請銘余自從太史後執論撰之事多矣富而好禮未有若龔先生所陳者可不為之銘君之先徙自臨川曽大父珉大父璇父文富所後父曰夢發配夏氏先十二年卒子男二元昇元麒女一適熊元恭孫男四大同大觀許州定孫女五長適夏肅次許適揭頑閭曽孫男二顯孫虎生銘曰物之隆封必崇家之豐禮必恭殖有禮天所視貽孫子視所履噫吾其跂而楊隠君叔芳墓誌銘清江楊天芳字叔芳抱疾且十載將沒自誌其墓曰世無昌黎公誰知我者葢自傷也沒且葬其子觀奉乃祖之命來請銘余雖不足追蹤古人不可謂不知君者忍不銘以慰其父若子之悲乎其世曾大父諱必通大父諱允成父名辰龍皆為儒其容秀整清峻進退有度其行事親孝不妄交母聶氏䘮致客數郡其學以禮義為本博而不雜其文黎司業立武李舍人珏呉學士澄皆稱道之其配熊氏其子觀其女長適甘惟逸仲適蕭鑑季適黄升其生至元丙子十有二月二十有七日其沒延祐甲寅九月十日其葬泰定四年十月某日邑之茂材鄉鍾山原其葬處也嗚呼君負髙才生盛時又有科舉可以取禄位沒猶拳拳焉恨無昌黎公託其名不亦大可哀耶銘曰父甚慈老而哭其子子甚賢弱而䘮其父沒十有四年始復于土祖孫依依兮尚其歸輔楊隠君叔宏墓誌銘𢎞農楊氏遍天下多賢而好文其世居清江之水南者傳至宋登仕郎允成新塗杯山巡檢應斗皆負奇才實學不獲志以沒為當世所恨而杯山君有子曰繼孫字叔宏甫知學即慨然以歎穆然以}
