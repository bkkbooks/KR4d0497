  - {type: variant, offset: 2023, length: 0, content: '', WYG: 之原銘曰人知其學天知其命命與學違我則有定嗟叔宏甫學乃其性而命之微孰敢不敬甘景行墓銘豐城甘君諱果字景行早以郡學諸生受業熊先生朋來之門及長好為詩至元之末與邑人蔡黻熊坦等十人結社龍澤山中方是時國家取士非一途或以藝或以資或以功或以法律其最上者以文章薦可立置館閣然皆不好唯以治田園躬孝養奉䘮祭給公上禮賓客䘏貧乏暇則讀書教子而已天厯至順之間天下大旱蝗民相食天子下詔賑粟五百石以上與秩有差三百石旌其門君出粟或賑或貸或為粥以食日所活以百計而不受賞未幾家人失火尺椽不留人皆弔之笑曰昔有非有今無本無君何弔焉新構既定以至元改元十有二月八日卒年六十七將以某年月日葬于某其友熊君椅以書致其孤之意請銘君之先丹陽人南唐時有曰從矩者為豐城兵馬鈐轄因家焉其子稹在宋初為監察御史稹孫令詢始居邑東功曹山之下榮場之里逮君葢十五世云曽大父文昭大父應欽父一清宋登仕郎君兄弟四人君次居三兄曰槃曰榘弟曰栗娶周氏生子熹燮繼黄氏生三子堅垕塤他姬子二圻丁生丁為兄槃後余與君居同邑生後先才五嵗常讀君之詩慕君之為人而未及識今竟不可復識矣而得銘君墓幸已銘曰世貴以位君以徳義世富以利君以施惠龍澤之山髙與天連君去不回君詩在焉故榮禄大夫陜西等處行中書省平章政事吕公墓誌銘陜西等處行中書省平章政事吕公賜還之六年薨三月而葬未葬旬有五日請銘公諱天禖字吉卿世家遼東之咸平今為燕人曽大父諱元仕金為監軍太祖建帝號之八年以其衆北歸從光獻皇后弟入事上承光寵者餘二十載大父諱惠堅及夫人董氏以順聖皇后媵臣為皇子北安王保傅能恭慎純慤得幸上沒諡恂恪父諱哈喇廉直多巧思為初建金玉局使奏釋所獲宋間諜鉗􅎂輸作者及渡江所俘童男皆教以工事世守其業歴工部侍郎尚書將作使中書㕘知政事拜大司徒獨立不阿權臣阿哈瑪特數欲害之不能僧格誣陷丞相安圗則力為之辨為天子心膂沒贈金紫光禄大夫諡忠惠生五男子公次居四兄天麟天祐皆至大司徒至元二十有九年公從忠惠公入見上即以公可大任忠惠方選將作僚屬上詔用公忠惠不可遂以奉訓大夫同知異樣摠管府事奏免所負金帛甚夥成宗時自秘書監為將作使八年人未嘗見毫髮私進集賢侍讀學士遷大都留守兼少府非上共必節雖權貴莫敢干以私至大之末擢河東山西道肅政廉訪使以母老辭改禮部尚書又以母憂去數詔起固辭後四年用為夀福院使乃起仁宗四年上思其祖父勲勞嘉其誠篤特拜集賢大學士與聞國政自奉訓大夫至是六遷為榮禄大夫每議論朝廷之上慷慨切直不為詭隨大臣多不便之遂稱疾家居泰定之際關陜連嵗大旱父子相食死徙者十九文宗即位詔起公為陜西等處行中書省平章政事以撫其民公曰民急矣即日就道晝夜兼行及到官宣布天子徳意發楮幣百萬緡米萬斛命有司賑之公乃齋不食三日以哀籲天其言曰天欲降大癘于民民乃能力作佐國家以事天地神祇臣老不能力作佐國家以事天地神祇而受天子命以撫寧其民民有罪宜悉加臣身毋久亢旱以盡殺吾民天乃大雨一雨五日是嵗大熟民始稍稍有復業者至順二年冬以疾奏乞還京詔許之父老聞之相聚而哭於庭曰凡吾民之有今日者皆公之賜也故吾民得公則生不得則死公何忍遽棄吾民而歸也復大哭公力疾厚撫喻之强留至明年出關未至京工數問李平章至否既至入見上上迎勞之曰朕久不見卿思卿甚勤聞卿在關中天格其誠民被其澤凡使關陜還者皆誦卿之徳良用嘉歎故召卿還因賜之酒且曰卿病愈當大用卿公稽首謝曰臣素無行能陛下寄以方面常懼弗稱況敢當大任乎至元三年春三月三日公疾殆將屬纊且戒令薄葬屬子孫世世以忠孝報國言訖而薨年七十將以四月三日葬城西岡子原先塋惟吕氏自公之曽大父帥衆歸國今百二十有五年矣世以忠謹事上父兄繼㕘大政繼以大司徒開府至公四世益謙讓廉退如漢萬石君家既閒居十有餘年及以關中之饑起公則如救水火其憂國愛民之志為何如也臨終猶以薄葬忠孝為屬嗚呼賢哉公娶曹氏生大都人匠摠管府達嚕噶齊某同知異様摠管府事延夀而卒繼鞏氏無子卒繼康里氏有子曰額森他姬子二曰大都博囉孫男四曰靈童今宿衞士曰烏魯斯布哈諤勒哲特穆爾巴延特穆爾銘曰自古為國罔不以臣豈曰以臣惟老成人而無老成何以為國如彼䝉叟㝠行擿埴蒼蒼者天胡不憗遺瞻彼晨星日既烜之嗟嗟吕氏世忠世厚孰謂伊人弗與國夀望而不見聴而不聞國豈無人而公不存我觀四方饑饉薦臻孰與濟之如公在秦公既逝矣不我作矣雖不我作無忘國矣有子有孫有繹其承岡子之塋公其永寧奉議大夫平江}
