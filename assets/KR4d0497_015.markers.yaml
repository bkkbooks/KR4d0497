  - {type: variant, offset: 2018, length: 1, content: 寐, WYG: 弭楫漢水之上入鹿門求龎公遺迹登峴首訪羊公墮淚之碑於是扁舟東下觀六朝故都泝彭蠡而還方謀歴齊魯燕之郊而不待矣嗚呼遽如是已乎君長余一嵗耳余雖生何益忍不銘君哉君諱應舉其先南豐人曽祖志通祖宗父文祖配呉氏子男三得正得真益女二長適劉次適余孫男一瑞生女一君卒以至順元年十月七日年五十八葬以某年月日墓在某原君嘗買書數千卷割田建義塾以教鄉里子弟未遂而殁是尚在後之人銘曰不角而勝不求而足悠然大原之谷庸非斯人之福蕭景能墓誌銘泰定三年九月五日廬陵蕭祥嘉景能以疾卒將葬矣其妻之兄鄉貢進士劉性粹衷告所知揭傒斯曰女弟之夫蕭祥嘉生而甚賢不幸年二十六以殁生而無所成名殁無以表顯於世女弟甚哀之願得為之銘庶幾為不殁也敢請問其善狀則曰祥嘉少有志操常以古人自期篤學好問未嘗有子弟過父早䘮事其母劉生母張及二兄盡禮與人交和易簡諒言必可復諸經皆通大義諸子史方術百家皆能提其綱領其要雖進士程文未嘗苦學下筆出輒人上尤喜為歌詩以漢魏晉為宗下此惟陳子昻李太白韋應物以為稍近於古長短句則曰周美成秦少游姜堯章吾師也又多藏三代彞鼎罍洗漢魏金石刻唐宋名人圖畫墨蹟之屬客至賦詩彈琴圍棋賭酒連日不厭平居焚香黙坐不知斯世為何如時其父在京師為翰林曹承旨勛及其弟監察御史都賢所知聞其學薦充博士弟子員念其母不果行湖廣行省舉茂材籍教官中亦不就不知者往往誚其闊迂弗顧也沒之日弔者皆為之慟以為使不即死學不至古人不止必且舉進士否亦必不肯睢盱噂沓以媒其身以辱其親此女弟之所甚哀而願銘之也幸終賜之銘夫良人者婦人之所天也不幸不與偕老愛之而不改哀之而不忘古有之矣未有能圖不朽於金石又有賢如粹衷者能成其志敢不述而銘曽祖超祖子貴父均衡以賑粟致位贑州平準庫使漢陽府漢川縣河濼使俄以近臣薦授奉訓大夫瀋陽王傳府㫁事官尋以例罷娶劉氏繼亦劉氏即粹衷之妹也皆無子有女二人次則君沒三月始生以兄之孫繼善為之後葬以卒之明年某月日墓在某鄉某原有文集三卷藏於家銘曰生惟古兮是求沒追古兮與游嗟今古之人兮不使之子而少留鄭隠君墓士莫貴於知禮然貧而知禮易富而知禮難富者驕吝之原禍福之樞也故貧而知禮不失其身富而知禮不失其家豫章之新建侯溪里鄭君季明其富而知禮者乎君字明仲兄弟三人君為仲叔父早世以為叔父後然未嘗去父母之側其習詩禮執孝友甚謹父母嘗曰爾為叔父後他日分財固不爾殊也及父母終兄弟異財欲出分君辭曰夫既有所受矣卒辭而兄弟情好益篤事其兄如父視兄弟之子如子每食一人未至筯不先舉人不知其異爨也與人交必誠必信稱人之善人不以為諂折人之過人不以為怨簡而周直而和臨事無留難吾直也雖摧山倒海之勢不以為撓吾詘也雖蜂蠆之毒莫之或攖人有園田雖接壤未嘗敢利將不守}
