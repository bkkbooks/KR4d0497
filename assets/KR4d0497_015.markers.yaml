  - {type: variant, offset: 291, length: 4, content: 人惘然詩, WYG: 子名已注簡記千秋常山下豪傑一揮涕題羅稚川所畵臨川羅益謙溪居圖迢遞臨川郡泱漭元獻里溪上君子廬閉户青林裏連山烟景晏斷岸寒沙靡日暮孤舟還荒村隔流水寄題武寛則湖山堂祝融九千七百丈六月飛雪灑洞庭攸輿學者武寛則石鼓齋中窮六經氣横瀟湘波浪白思入嵩華烟雲青四千餘里到京國倒揷五色鳯皇翎河西猛將今太尉一見握手坐黄庭立呼愛子俾受業豈獨汝學我亦聽猨肩虎頭日侍側長刀大劍羅青熒動陳忠義破肝膽衆目睒䁑開心扄丈夫乘遇豈偶爾縱不我聽我則寜嗟予官冷材力薄每辱竒俊哀竛竮天晴風静輙過我如病得瘥醉得醒不為湖山勞夢寐不為富貴疲心形始知卓識出天性豈彼狗苟蠅營營方今䕫皋滿廊廟洪恩屢降無濫刑長材用世何不可大夫列卿如拾螢君如得位立行志慎勿學我空星星我今老矣何所稱白雲深谷寒烟汀十月十八日夜南郊齋宿夢先帝召見便殿手賜橘花一枝有感而作淚盡烏號不可攀傳宣忽降白雲間天花拜舞君王賜夢斷齋廬月滿壇寄題上饒鄭氏菊莊上饒多隐者鄭氏善為方移居倪陽里種菊今成莊近取徧呉楚逺求至帝鄉品類百十餘顔色不可常溉}
