  - {type: variant, offset: 1782, length: 1, content: 亂, WYG: 爛醉來君從何處看棋囘髙山流水元同調明月清風不用媒江上栁早先摧天上鴈正裴徊富貴何如歌一曲功名争似酒三杯我但負薪君但釣百年誰喜復誰哀題劉商觀奕圖李伯時臨蘇子瞻䟦茅君彦刻劉商畵手神運筆龍眠臨之如已出不知弈者何代人雖無名姓若有神神凝志定萬縁息觀者亦復遺秋春松風吹衣}
  - {type: page-break, offset: 1782, content: '', id: KR4d0497_WYG_005-5a, image: WYG1208/WYG1208-0196a.png}
  - {type: variant, offset: 1784, length: 0, content: '', WYG: 泉響朱草樷生玉芝長眉陽仙客最相知更託茅君寄心賞題所翁雙龍圖為寅上人作雙龍畵擘𤣥淵開萬物顛倒隨雲雷龍公被髪向空冩身是真龍非畵者鐵作鬚鬛玉作鱗電出兩目雲繞身偶然㑹合此何處仰面向天天不嗔世}
  - {type: page-break, offset: 1784, content: '', id: KR4d0497_WYG_005-5b, image: WYG1208/WYG1208-0196b.png}
  - {type: variant, offset: 1785, length: 7, content: 地偏疑隔世峽怒, WYG: 眩轉空形影倐忽變化那能省髙僧説法夜來聴誰道相逢非夢境斗牛蒼蒼風雨暮泉阿豈識延平路當時縱無雷煥與張華未必終藏不飛去題玉笥山邵道士所藏宋方奉使贈劉道士紫帽山人方孚若臨江謫居亦行樂二十四磵縁源行三十三峯看月明奉使不愧蘇子卿招隐更遇劉佺平劉郎彈琴震金石方公作歌酒和墨一時意氣傾座人千載風流寄仙籍兩公一去無消息竹下松間盡行跡遺墨蕭條鎻白雲山中嵗嵗桃華春宋金徃事無勞問夜夜虚壇候子真題彭尊師禱雨詩卷道人役雷如小兒顛倒鬼物愁蛟螭祈晴得晴雨得雨身不勝衣膽如虎東通呉越北淮漢到處逢人憂水旱手提豐嵗與疲甿金帛盈庭未曽看閩山疊疊躋金峯蘄山樷樷碧玉宫洗劍長留雙澗月彈琴尚憶萬松風大臣無端薦天子十年留滯京華裏悠悠扈從春復秋歸心已逐東流水去年天下旱且蝗流殍滿道無人藏安得君等遍八荒不使水旱憂堯湯題春龍聴雷圖雷馮神龍興雲雲行雨施四海清雷之震神龍奮雲行雨施四海潤雷之令神龍聽雲行雨施四海慶聖君在上賢臣在下我無事而觀化蔡氏四適堂君不見車轆轆長安陌上争馳逐朝出遊暮還宿問何所得榮與辱又不見或漁于淵或樵于山或耕或牧其心和且閒我}
