  - {type: variant, offset: 329, length: 2, content: 公撼, WYG: 清曰軒轅彌明偶然吟石鼎狂怪使人驚遂令韓吏部至今妄得狂怪名于嗟乎軒轅彌明三清曰玉川子忍窮吟月蝕天髙叫欲死獨對烹茶婢白頭赤脚老無齒于嗟乎玉川子四清曰林和靖周程明聖學韓范輔王政獨對玉梅花山色湖光耿相映于嗟乎林和靖題新安許氏蘭秀軒蘭生兮深谷潄流泉兮蔭喬木緑葉兮披披玉榦兮紫蕤植之兮堂下播芳馨兮菲菲菲菲兮揚揚思君子兮髙堂縆琴瑟兮㑹友嘉肴苾兮薦芳襲芳兮佩秀宜君子兮多壽夢顯墨梅霜空㝠㝠江水暮江上梅花千萬樹無端折得一枝歸一雙蝴蝶相隨飛寄題永豐劉氏暖翠亭孤亭萬竹}
