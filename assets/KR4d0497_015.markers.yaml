  - {type: variant, offset: 2012, length: 0, content: '', WYG: 有山巍然而高大隆然如波濤蔽於一州者曰連珠之山有谷焉蒼峭深窈若與世隔谷之口有寺焉名如其山南唐昇元中肉齒和尚曰智通者甞居之入谷數十歩有廟焉曰靈感之廟宋慶元四年所賜額也天歴元年寺住持如海知事從善改作大殿五間丹楹藻井崇阿飛甍湧殿壁為海潮慶雲之狀仰燭承塵俯鏡廣庭自夏徂秋遂底於成神享其祀人樂其功明年介予女兄之夫陳君用清請予記按圖志其地初有古杉一株常聞笙簫之聲飛繞其上杉上有泉人汲而禱之能蘇旱而愈疾一日神附童子語及夢告肉齒和尚曰我朱森秀才也兄弟三人皆隠於此汝廟祀吾當福汝民乃伐杉為三神象冠服形類一如所夢者廟而祀之揭靈著饗餘二百年至景定三年始得封為凈感凈應凈佑三真人余謂神有曰朱者株也森者杉也秀才者美木也兄弟三人者三乃木之所以生也蓋木德之種木主仁故為善不為惡為祥不為咎而能大庇斯民也其兹山之靈也歟山非神不立神非山不㽞惟兹山與天地無窮兹神亦與山為無窮其必與我元相為無窮也然非兹殿不足以壯神之居以稱此山敢不敬志其事焉於乎而民其益務為善毋使見棄於神哉天歴三年夏四月朔揭傒斯記胡氏園趣亭記豫章胡叔俊以高才碩學隠居進賢官溪之上治乃祖西園築亭其間而㳺息之以東南先朝陽而夕隂宜木果而樹李梨栗為正陽方之宜芳華而列種海棠}
