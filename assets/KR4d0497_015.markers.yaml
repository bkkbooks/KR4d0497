  - {type: variant, offset: 2009, length: 1, content: 住, WYG: 巢飛雲下瞰湍瀬旁引羣山俯視檻井朝陽夕隂如神往來稚耋男女蛾行而上俯視拜跪如臨父母復伐石為橋曰秀川而屋其上六楹以達望走刋木為亭曰一覧以休游觀而命道士姚某守之民大悦又明年秋州人前肇慶路亷溪書院山長彭德昌請紀於石夫東嶽魯望而廟於兹從民志也民不知善而惟神之依惑也苟政不平歳不成欲事神得乎福善禍淫天有常道事神治民國有常禮禮不可黷道不可誣靡届弗至者神無感不通者誠誠神合而福禄降惟君子能之若夫修典常正國俗則國家之事而君子之心具官揭傒斯記浮雲道院記余方竊禄周行進不能有禆於時退不能自訟其過而客有言浮雲道院之事者乃起而四顧茫然自失渺然若天地無所容客之言曰吾所居郡曰廬陵邑曰永豐是為歐陽文忠公之鄉吾之里在雞山之陽鷲溪之濵山川深厚草木濃麗其人秀而多壽絃誦之聲溢於四境耕種之民交於四野時危代易干戈所不加焉水旱疾疫盗賊所不入焉人無甚冨亦無甚貧吾劉氏族居三百有十二年矣環吾里數百家無異姓良田數百頃未甞去劉氏冠昏䘮祭必以禮共給公上必以時無金玉狗馬之殃無高爵重禄之禍各食其力各守其常吾雖客逰四方而心安之泰定四年秋吾歸自河南乃闢園數畆種桑柘三百株枳若橘皆千株木實之脂可食可燭俗號山茶又曰木子樹者七百株茶五百株桃李雜果松竹之屬又稱是歳先疇之入雖不足以自給計數年之後葉者實者脂者萌可茹材可噐者可薪者各效其用則吾春秋之事朝夕之共宗族鄉黨賔客之奉可不具而足矣吾又有兄弟子姪數十人承祖父之訓皆頗知學足為保家之主天之所以與我者亦既厚矣復何求哉乃築室四楹其中為藏修之所取孔子不義而冨且貴於我如浮雲之語榜曰浮雲道院又為五言詩二十餘篇書之壁間暇則命子姪歌以為樂客有愛而和之者不敢辭有録而傳之者不敢止行藏用舎一聽於天夫聖人之與衆人欲富貴而惡貧賤非甚相逺也而聖人不求得其所不可必得不求去其所不可必去安其所安樂其所樂從吾所好而已衆人則不然必求其所不可必得必求去其所不可必去險在前而不顧危在後而不知早夜孳孳死而后已於是聖人始如天地日月亘萬古而不可䟦及衆人穰穰忽而為虎忽而為鼠忽而為蟲沙其去聖人何啻千萬里吾非敢希聖人能少異於衆人無忝於前人斯亦足矣乃歌曰浮雲兮悠悠忽而逝兮乍㽞吾安歸兮孔丘又歌曰悠悠兮浮雲來無迹兮去無垠吾安歸兮義與仁歌畢余請書以為記客名鶚字楚奇其學以六經為主其文以義理為本其詩近陶柳之間其大父葢壽至百三歳云天歴二年六月九日揭傒斯記撫州靈感廟記臨川西南行九}
