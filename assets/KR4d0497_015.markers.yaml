  - {type: variant, offset: 1970, length: 0, content: '', WYG: 張文憲公之門文憲公噐之稍不及之即以書詗先生十歳而孤惟母育養之而母性方嚴聲色不少假先生亦強學力行事母極孝自為子弟以至没齒人未甞見其過踈髯廣顙眉目聳秀癯然若不勝衣居碧山之下萬竹之間竹間有泉甘冽不竭每清風徐至幅巾藜杖臨於泉上望之若仙早從大人先生㳺如鄉之翰林學士徐公經孫戸部郎官李公義山臨江蕭左史山則監察御史泰來兵部侍郎徐公卿孫廬陵秘書監丞歐陽公守道湖南安撫使李公芾每與言論引據經史慷慨激烈風概凛然故莫不折節下之晚歳教授鄉里凡經指授皆尚氣節不碌碌隨人後望而知為揭先生門人平生所讀書皆手自編校其所論著必以扶樹世道為本此書特其聞見緒餘猶鑿鑿精實如此况其他哉元貞元年冬十有二月寢疾明年正月十四日早作沐浴易衣冠謁先祠畢還坐堂上手為書數通别親故賦五言詩八句示其子載且戒之毋以釋老汙我端坐而没後三十有六年其嗣子將刻是書以傳而命傒斯為之序臨風開卷灑灑若睹其風儀歴歴若聞其平生之言而終}
