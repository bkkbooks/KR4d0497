  - {type: variant, offset: 1778, length: 0, content: '', WYG: 雄間竊鄙蒯徹計學道滄海上却粒咀元氣一食如𤓰棗金石焉足貴超凌八極外洞逹無始際時從王子喬吹笙下遊戯咄爾燕齊人宿留安可致方朔起平原髙志凌紫氛上書三千牘長揖萬乘君淪跡寄中朝髙爵固非羣繾綣縁世主諧笑匡國均三食王母桃不受王母嗔髙風軼萬代誰歟繼清塵伯陽閔衰周西度函谷闗誰令守闗者再拜希一言斂容為之陳文字至五千聊因令尹啟本欲使之傳煌煌百代下繼者良獨難赤松隐崑崙廣成在空同德為王母歸道與軒轅通既枉赤水駕時欵𤣥圃宫先天本非始後天亦無終自非𤣥德人誰能躡竒蹤雨中作孟夏凉風來吹我羅裳衣此服豈不稱炎暑方及期婉婉庭中花煌煌有光輝自信好顔色何能與時違㝠心委元化勿為後世嗤送劉旌德大火流坤維西風集庭柯積流不歸壑浮雲鬰嵳峩}
  - {type: page-break, offset: 1778, content: '', id: KR4d0497_WYG_004-10a, image: WYG1208/WYG1208-0190a.png}
  - {type: page-break, offset: 1778, content: '', id: KR4d0497_WYG_004-10b, image: WYG1208/WYG1208-0190b.png}
  - {type: variant, offset: 1779, length: 0, content: '', WYG: 東擁盗賊淛右疲征科嶺外兵不解湘南及干戈郡縣無良材平人嬰禍羅宓氏彈鳴琴言游亦弦歌劉子宰旌德為治當如何題淵明撫松圖抱拙辭下邑曠然獲所安孤松臨廣園聊且共盤桓清晨散遊䇿日入自當還霜露不相貸時物倐殊觀兹植焉所貴昔為聖者嘆題趙子昻寒翠圖石潤欲生雲山寒疑有雨髙林葉盡脱低篁緑堪數因知静者要更覺王孫苦小草枯樹根茸茸欲華予初至京師和答友人病中見示志士輕離别貧賤事多違秋風車馬中故人髙卧時逺客江南至塵土滿素衣既申離合情中多勞苦辭歡笑未幾何感嘆已乗之欲及田里事復恐疾疢滋亹亹流景遷榆栁各變衰偃息寄一室朝夕終在兹委運復何言人生信可疑我獨何為者日出暮來歸重錢何太虚鷄鳴曉色動行人出南郭裴徊望車馬飛雪何漠漠巨野四面平中路凄以索黄狐超客過驚鴟向人落結軫赴悲笳凝酸屬哀角時逢古人跡因究平生學迴首睇闗山低心望蓬霍離合兩不期思懐獨難託贈洪參軍兄弟洪氏起遼海流章耀八紘孝友根世學忠貞自天成入為帝羽儀出秉國鈞衡洋洋髙門居濟濟羅公卿籍甚澄與瀾玉質金為聲析理貫秋豪摛藻艷春晴朝趨承明内暮進賢友生衣錦務尚絅穆然含粹精靈鳯非求知出為世所驚竒璞隐崐岫采充清廟英堯湯攬羣才聖道日光明豈惟殷膚敏祼將在周京蒼天雖云髙乃心此黎氓君臣兩不易相期底隆平君德貴并包臣道戒驕盈立賢必無方㧞茅思彚征朂哉敬厥終兩賢信國楨送馮尊師還岳陽馮公住天岳夙抱丹霞賞結構何威巍連延瞰髙爽飛縈帯遥甸周覽春泱漭日落長沙明風迴洞庭響事因多病簡道與流年長郡邑費招邀賢豪畢知奬翳然庭中樹宴坐寂餘想流雲時縱横幽弄自來徃還因採靈藥相覿稽神壤悵望忽言歸川塗日脩廣題山水卷梢梢雲木動藹藹烟峯亂逺浦引歸橈雙厓臨絶岸方思隠淪客欲結漁樵伴水濶山更遥幽期空汗漫題清江黄氏池亭亭名玉壺氷新亭環碧池池水何漾深偶携塵外侣薄言此窺臨惴惴若有畏憑憑如弗任既抱執盈念仍懐履薄心白日麗清暉微風在逺林洞逹忽無際澂明諧素襟還君玉如意理我雲門琴三月晦日送春得詩字變化無終極形氣遞推移昨日名園中徂春忽在兹􅁮􅁮華林彩繁陰緑成帷徒結遊女懐秪増志士悲况此客行子風水積川坻撫壯思始榮臨芳念將衰安知盛長後不有堅凝時俯瞰江水流仰與東風期各言早還歸毋勞東山詩題陳掾菊逕逹士隨所適跡異心恒素時從府中歸問菊松下路初欣碧樷長復愛繁英布灌以古井泉申之九秋露有酒共斟酌無人還獨歩結意常恐非留懽輙忘暮髙天遥澄穆平川澹容與落日明歸禽踈籬繞蒼樹懐芳諒為美居榮豈云暮矯首今何時孤雲為誰去題蘆鴈四首江湖處處非况汝一身微如何却欲下只合更髙飛自不作雙飛沙頭叫向誰碧天無限好何處不堪隨朝飛自作行夜宿更成雙誰能如此鳥和月占秋江寒就江南暖飢就江南飽莫道江南惡須道江南好題李陵送蘇武圖一與故人别死生寜復親休言典屬國猶得畵麒麟今朝送漢節迢遞入秦闗惟有沙場夢相隨匹馬還慘澹河梁路參差塞上山誰言是死别日夜望生還題風烟雪月四梅圖逍遥芳樹下解后寒花發立盡晚來風明朝恐成雪髙花開幾㸃澹靄拂成衣遥瞻應不見相對尚依稀年年霜雪}
