  - {type: variant, offset: 288, length: 2, content: 别告, WYG: 磐石宗重以分省寄憶昔大德末成廟方厭世桓桓忠獻王功大更多智武皇既踐阼宫闕始清悶越邸矜微勞寵極心乃異國有社稷臣䜛巧惑聰睿遂輟股肱任徃重藩屏繫有威如雷霆有恩若元氣畊鑿比中土什伍相錯置士忘逺戍苦民見太平治道路無拾遺商旅畢懐惠忠獻一朝沒武皇亦遐棄駸尋延祐中權相擢天位磨牙吮人血掉尾恣狂猘戕賊骨肉親迫逐見危墜天人共震怒降灾及兹地大雪深丈餘人馬相枕斃重為朝廷憂夙夜靡寜志除吏超五等聞者盡驚避蘇公拜郎中即日辭九陛厚禄非所榮髙爵非所貴彼民亦天民安得皆坐視兼程到官所發廩急周濟死者何嗟及存者再生遂閭閻漸蘇息竭力補黥劓飛書九重天請為兵民備募粟實塞下慎忽憚勞費天子賜問勞名王致金幣至今頼長䇿當時已多忌如何方賜環及國竟長逝都人走相哭行子為歔欷崩騰翔風迅慘淡浮雲曳蒼松㧞其根黄鵠鎩其趐幸哉有}
