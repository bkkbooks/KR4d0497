  - {type: variant, offset: 2017, length: 0, content: '', WYG: 時其飢渴吏無奸欺民不告勞故其成功敏而無怨言夫為政不難毋輕民力而已傳曰不傷財不害民又曰節用而愛人使民以時夫節用故不傷以時故不害惟君力行之故其為政平易明信民歌頌焉大德中金華胡君長孺分教盱江攝録事視其屋懔然壓曰是將病吾民矣不踰月而新之或曰此非攝職也君笑而不言嗟乎惟君子為能憂民之憂樂民之樂况馮君身居其任者乎雖然有二君之心之才則可不然均為怨府矣豈必廬陵哉醫學教授嚴君壽逸剛正人也美其事請書於石以示後之為政者且以見郡之能使人也君字彦達濮人歴宜春高安彭澤三縣皆有名昭勇廟卷雪樓記呉折衝將軍西陵太守寧既與周瑜魯肅吕蒙陸遜之徒並立大功世廟食興國之東六十里富池之口龍光山之下後千餘年宋有天下録前代忠臣義士復賜將軍爵一命而公再命而王七命而數物備號其廟曰昭勇門曰表忠而將軍之靈以益著自始封百七十有八年而建樓於廟之北名曰卷雪又百十有二年而燬於景定元年之兵又六十有三年為皇元至治之二年祠官九宫山道姜守夷與里人劉舜元及其徒子如淵爰謀爰度筮日庀事即樓故基為屋八楹中為重屋六楹崇七尋有半仍命曰卷雪之樓左顧舒蒲之渚右據黄龍之灣前俯大江後控衡廬北望長淮之外以天為際方其驚風忽起白浪晝立天低地昂川谷吐吞則思將軍之在呉也威名動山岳謀慮出鬼神奮百騎而曺瞞夜驚戰孤軍而張遼早却臨夏口而黄祖授首搤益陽而闗侯退師指􅔉城而朱張擒入夷陵而曺仁破何其忠且勇也及夫風霽浪攝上下一碧長空冥冥白鳥孤没則思將軍之既没也三國為墟五運迭興南北紛紜或離或合將軍猶以餘忠遺惠隂隲下民馮大江而揚靈儼南面以顧享又何仁也登斯樓也豈不念曰以區區之呉而有江表數州之地僅足以抗蜀魏將軍一輸其忠而廟食百世况戴天履地美衣豐食倓然臣子於今之世者乎故君子立功立事必思以顯當世而垂無極斯樓之作亦非徒欲觀濤浪窮勝概而已葢所以勸忠也以三子興復之心而屬余記不可以不書神姓甘氏字興覇巴郡臨江人累號為昭毅武惠遺愛靈顯王云法印寺記豐水之東鳯池之西有寺曰泉林宋治平三年改賜法印木有豫章楓楮松栢之茂水有錢塘美泉之注脩竹萬箇崇墉百堵自江禅師至濟十有二傳而中微自覺昇至心日十傳而復振初昇偕其從德之廣慈撫廢虚圖前規起嘉泰訖開禧力復舊貫德再傳曰繼澄始買飯衆之田十畆有奇澄之徒慧明復得田二十畆以為長明燈供宋律寺觀母買民田而明以高行絶學善為方主翰林學士徐公經孫禮部尚書雷公宜中故得請長明燈至於今不廢明之徒永慶慶之徒祖榮復廣田百畆而寺之計益滋又三傳是為心日心日既嗣百廢修舉效獻力者争盡其用大德六年重覆佛殿祠后土殿東先師及諸長者殿西明年重覆三門又明年兩廡及庫庾庖湢皆撤而新之皇慶元年建法堂四楹中奉觀音大士延祐六年樓於堂之北東上庋佛書下列僧寮明年又樓於堂之東南虚中以為齋堂其東以館賓客若山門若縣鐘之樓方程材度地而申為之自大德以來凡所修營或資於人或出乎已皆日之孫福權之力也權既能盡瘁以成其祖及其師圓照之志而權之徒惟勝復能屈身貿易佐匠計勝之徒宏易日誦華嚴歸質田以相權之功是皆儒門所謂孝子慈孫者也方今上自京師下逮郡邑致崇極於佛者莫不因物產之盛慿國家之力猶恒若不及况泉林不仰縣官不資常住振法基於未墜紹宗緒於無窮者乎宜為刻辭著在金石其辭曰佛入中國餘二千載厥象伊皇高視六合横敷四海其流湯湯河汾著書佛乃聖人教則西方明明我朝並建三氏奄有萬國列刹相望照地燭天前無古昔割腴錫衎跨州連縣寶衣玉食式名休祥保合太和孰臻其極懿此泉林扶顛持危僻在東湖畢力殚慮祇率乃事有抗厥初廣殿重樓高壯䆳嚴弗儉弗踰瀏瀏清泉落落長松樂是幽居有詵其徒有秩其儀趾德濟美羣經在几鐘鼓在虡以祝天子永遵其道傳燈經祖以作教軌冲元觀記皇慶二年春二月始作冲元觀夏六月觀成實在富州之南第三十七福地豐山之陽五里所雕峯之下因黄氏之故祠也西南維黄氏世盛宋慶元初朋黨論起朝奉郎幹辦行在諸司審計司瀛進讜議十二篇歴詆外戚韓侂胄蠧國亂政天下誦其名嘉定初以壽終其子通直郎知衡州常寧縣直方𦵏於峯之南雙井原因建祠曰雙井菴命始豐之仙林觀道士靈寶大師賜紫歐陽某奉祠事且約世守之未㡬常寧之夫人徐氏卒𦵏峯之東白竹原亦建祠曰白竹菴皇慶二年常寧四世孫征東儒學副提舉司自雙井菴延禮聶爰靜主之師至即撤舊祠闢地為觀不數月而工畢飛殿壯麗高廣䧺深門廡端直庖廩完固飛雲之樓矗其西黄氏及后土氏之祠翼其東文梁藻井之制雲房齋廬之次煌扈於其内鐘鼓之聲笙磬之音鏜􅝅乎其外於是晝霧出楹夕溜殷砌悦栢拒冬長松無夏神君仙人儵忽往來山川不改其舊而十倍故祠矣請名曰冲元之觀又甞與其師歐陽維新買田五頃有奇至是盡歸於觀以養學徒奉釐事君子曰惟不貪故能忘其利惟不私故能成其功忘利而有成功非信道而勇於立者不能也使聶君不為老而為孔氏得志當世所至宜何如黄氏其知人矣延祐七年春征東之子尚敬尚忠請伐石紀功因推道德之端極内外之辨而為之辭以授其徒黄晞平孫誠則等刻之其辭曰猗歟邈哉五千之文上探無始下酌黄軒達性立命執經御權剛柔存亡進退後先糠粃天下道德之源𤣥門既闢教道滋盛水旱疾疫禱祠禳禜一呼一吸一動一靜奔走雷風鬼神受令上好下效此求彼應乃道之文匪道之性志士長往獨善其身鍊形制魄守精馭神蝉蛻宇内飛翔天津匪道之隆乃道之屯孰行罔至孰用罔治蕭曺以臣漢文以帝慈儉為寶敦樸是貴雖慙三五終邁七制迨於我元總攬萬國國既殊俗治亦異術既尊素王亦兼老釋或齊以禮或道以德化成天下立治之極豫章南境豐城故邑崇崇始豐神明所集跂彼雕岑雲蒸霧濕有屋渠渠有阯岌岌偉哉聶君有此駿功黄氏以祠老氏以宫居有所養學有所宗敬哉學人罔或不恭執德之恒守道之中祈天永命萬世攸同彭州學記蜀彭州孔子廟學燬於兵九十餘載有司偹位因弊承簡春秋有事綿蕝行禮治具弗張民習於野至治中太守劉隆畏上威德思本政教爰謀爰度廼復其舊而教養之道猶闕今太守則曰興學而不知教養與無學同於是縮濫節浮舉俸稱貸月計其息墾廢辟荒時值嘉榖歳取其入以具祭養以為經常合凡民子弟之俊秀者三十人立師以教故入其廟則棟宇䧺麗禮樂備舉聖師洋洋不動而應入其學則堂字修㓗弦誦洋溢民吏觀感不令而化其文學姓某㳂牒京師請紀金石乃告之曰惟蜀與宋終始聲教淪洽民心固結故國朝用兵積數十年乃克有定土著之姓十亡七八五方之俗更為賔主治者狃聞襲見以遺風舊俗為可鄙前言往行為可陋至有鴻儒宿學林潜谷逝其道莫聞况復有知學校哉故學校與道興廢上不知學則失其教下不知學則失其政學校廢政事失治道微矣而彭前守克興後守克承繼善趾美作民父母諸生其有思乎夫蜀學有揚䧺文有相如治有文翁諸葛下迨唐宋羣儒迭興徽言懿行著在簡册舎疵取醇使合孔子之道父以教子兄以教弟朋友相講里巷相習以翼聖人之治則蜀之人父父子子君君臣臣劒閣無所用其闗瞿塘無所用其險必自彭始諸生朂之毋負諸守之意與聖天子之望元統二年八月日記文安集卷十一欽定四庫全書文安集卷十二元揭傒斯撰碑大元勅賜脩堰碑江水出蜀西南徼外東至于岷山而禹導之秦昭王時蜀太守李氷鑿離堆分其江以灌川蜀川蜀以饒自秦歴千數百年所過衝薄蕩囓大為民害有司嵗治隄防百三十三所役兵民多者萬餘人少者千人其下猶數百人人七十日不及七十日雖事治不得休息不役者三日一緡富屈于資貧屈于力上下交病會其費嵗不下七萬緡毫髮出於民十九藏於吏槩之出入不足以更費至今上皇帝即位之明年僉四川廉訪司事吉當普巡行周視得要害之處三十有二餘悉罷之且召灌州判官張𢎞計曰若甃之石則役可罷民可蘇弊可除胡憚而莫之為𢎞曰公慮及此此生民之福國家之幸萬世之利也𢎞請出私錢試以小堰堰成水暴漲堰不動乃具文書會行省及䝉古軍七翼之長郡縣守宰鄉遂之老各陳其便宜皆曰便復禱祠與神約昔鑿離堆以富川蜀建萬世之利神之功也今水失其道民失其利吏乗其弊若此而神弗之救是神之惠弗終也神克相予予治神弗予相請與神從事卜之吉于是徵工發徒以至元改元十有一月朔肇事于都江堰都江即禹鑿之處分水之源也鹽井關限其西北水西關據其西南江南北皆東行北舊為氷鑿以辟沫水之害中為都江堰少東為大小釣魚又東跨二江為石門以節江北之水又東為利民臺臺之東南為侍郎楊柳三堰其水自離堆分流入于南江南江東至鹿角又東至金馬口又東過大安橋入于成都俗稱大皁江江之正源也北江少東為虎頭山為鬭雞臺臺有水則尺為之畫凡十有一水及其九其民喜過則憂沒則困乃書深淘凌低作堰六字其傍為治水之法皆氷所為也又東為離灘又東過凌虚步雲二橋又東至三石渠釃為二渠其一自上馬騎東流過郫入于成都古謂之内江今府江是也其一自三石洞北流過將軍橋又北過四石洞折而東流過新繁入于成都古謂之外江此氷所穿二江也南江自利民臺有支流東南出萬工堰又東為駱駝又東為雄口繞青城而東鹿角之北涯有渠曰馬灞東流至成都入于南江渠東行二十餘里水決其南涯四十有九嵗疲民力以塞之乃自北涯鑿二渠與楊柳渠合東行數十里復與馬壩渠會而渠始安流自金馬口之西鑿二渠合金馬渠東南入于新津江罷藍綻黄水千金白水新至至三利十二堰北江三石洞之東為外應顔上五斗諸堰外應顔上之水皆東北流入外江五斗之水入于馬壩渠皆内江之支流也外江東至崇寧亦為萬工堰堰之支流自北而東為三十六洞過清白堰東入彭漢之間而清白堰水潰其南涯延袤二里餘有司因潰以為堰堰輒壞乃疏其北涯舊渠直流而東罷其堰及三十六洞之役嘉定之青神有堰曰鴻化則授成其長吏使底其功應期而畢若成都之九里隄崇寧之萬工堰彭之堋口豐潤千江石洞濟民羅江馬脚諸堰工未及施而詔亦責長吏及農隙為之諸堰都江及利民臺之役最大侍郎楊栁外應顔上五斗次之鹿角萬工駱駝碓口三利又次之而都江又居大江中流故以鐵萬六千觔鑄為大龜貫以鐵柱而鎮其源以捍其浮槎然後即工諸堰皆甃以山石範鐵以關其中取桐實之油刀麻為絲和石之灰以苴罅漏禦水潦岸善崩者宻築江石以䕶之上植楊栁傍種蔓荆櫛比鱗次賴以為固葢以數百萬計所至或疏舊渠而導其流以節民力或鑿新渠以殺其勢以益民用遇水之會則為石門以時啓閉而泄蓄之凡智力所及無不為也初郡縣及兵家共掌都江之政延祐七年其兵官奏請獨任郡縣乃以其民分治下流諸堰廣其増脩而大其役民苦之至是復合焉常嵗獲水之用僅數月堰輒壊今雖縁渠所置碓磑紡績之處以千萬計四時流轉而無窮其始至都江水深廣莫可測忽有大洲湧出其西南方可數里人得用事其間入山伐木崩石已滿隨取而足所向皆然蜀故多雨自初役至于功畢無雨雪故力省而功倍而民不知勞若有相之者亦其忠誠所感如此致使天子賜酒之使相望於道省臺勸功之檄不絶於吏所溉六州十二縣之民咸歌舞焉而下至郡縣上至藩部惡其害己且疾且怨或決三洞之水以灌其次或毁都江之石以害其成撓之百端不拔益固甫越五月大功告成百一恒費民永休享古未有也而吉當普㑹以監察御史召省臺上其功詔臣傒斯記之于碑臣聞水先五行食首八政九疇所序其次可觀矣夫水者衣食之原也然所以為利亦所以為害在善導之而已禹平水土猶已溺之后稷播種猶已飢之萬世有稱焉是故為政不本于農不允于水是為不知務不知務是謂冥行之臣李氷一鑿離堆民受其賜吉當普才大而徳敏憂深而知逺不枉其道不屈其志臨難忘身為國忘家安于命而勇于義而知所先務故事可立而功可建其在四川若請罷鹽運使司正鹽井之法以去其奸利置安撫使撫四方流寓之民使安其耕鑿及居臺端知無不言言無不合誠國之寳也判官張𢎞殫智竭慮終始克相其成雖百折而不悔亦今之賢有司乎是役也石工金工皆七百人木工二百五十人徒三千九百人而䝉古軍居其二千糧為石千有奇石之材取于山者百萬有奇石之灰以斤計六萬有奇油半之鐵六萬五千麻五千最其工之直物之賈以緡計四萬九千有奇皆出于民之庸積而在官者餘二十萬一千八百緡責灌守以貸於民嵗取其息以備祭祀若淘灘脩堰之共仍蠲灌之兵民常所徭役以專其堰事嗚呼後之涖此土者尚永鑒于兹勿怠其政隳其事以為民病以為國家之憂臣拜手稽首而作頌曰鑿離堆兮江勢分川蜀饒兮民忘為秦秦可忘兮國有人何後世兮忘吾民嵗伐竹兮歴巖㠂載亂石兮堰江濤堰無功兮民孔勞民孔勞兮天不弔龍伯怒兮江妃笑豈江之為患兮惟人自厚龍節兮繡衣煒皇皇兮不我遺召龍工兮汝為汝詎知兮予所期江滔滔兮廣且深黿鼉出沒兮蛟龍晝吟下不可以極兮上若有臨洲澶漫兮江之心吾伐石兮石自摧吾召民兮民子來堰既作兮民無患菑此豈予之功兮神汝哀神洋洋兮功既畢堰永固兮民安佚川蜀饒兮國之實千萬年兮功不失惟帝之力兮臣之職重建濟州會源牐碑皇帝元年夏六月都水丞張侯改作濟州會源牐成明年春二月具功狀遣其屬孟思敬至京師請文勒石惟我元受命定鼎幽薊經國體民綏和四海辨方物以定貢賦窮河渠以逸漕渡乃改任城縣為濟州以臨齊魯之交據燕呉之衝道汶泗以會其源置牐以分其流西北至安民入于新河埭于臨清地降九十尺為牐十六以達于永濟渠南至沽頭地降百十有六尺為牐十又南入于河北至奉符為牐一以節汶水而㑹源之牐制于其中嵗益久政日弛弊日滋漕渡用弗時先皇帝以為憂延祐六年冬詔以侯分治東阿始脩復舊政誕布新令嚴暴横之禁杜奸利之門南疏北導靡所寧處明年冬以當代請去弗許行視濟牐峻怒狠悍嵗數壞舟楫土崩石泐岌不可持乃伐石區里之山轉木淮海之濱度功即工大改作焉明年皇帝建元至治三月甲戌朔侯朝至于河上率徒相宜導水東行竭其下上而堨其中以儲衆材徹故牐夷㘭泓徙其南二十尺降七尺以為基下錯植巨栗如列星貫以長松實以白石槩視其地無有所罅漏衡五十尺縱百六十尺八分其縱四為門縱孫其南之三北之一以敵水之奔突震蕩五分其衡二為門容折其三以為兩墉四分其容去其一以為門崇廉其中而翼其外以附于防參分門縱間于北之二以為門中夾樹石鑿以納懸板五分門崇去其一以為鑿崇翼之外更為石防以禦水之洄洑衝薄縱皆二百三十尺爰琢爰甃犬牙相入苴以白麻固以白膠磨礲剷磢關以勁鐵厓削砥平混如天成冠以飛梁偃如臥虹越六月十有三日乙卯訖功大會羣屬宴于河上以落之二徒咸在旄倪田集酒舉樂作揮鍤決堨艤棹魚貫水平舟行伐鼓歡呼進退閒暇其稱侯之功頌侯之徳雷動雲合且拜曰聖天子繼志述事不易任以成厥功惟億萬年享天之休是役也以功計石工百六十人木工十人金工五人土工五人徒千四百二十人以材計木萬一百四十有一石五千一百二十有八甓二億一千二百有五十以觔計鐵二萬五千五百麻二千三百灰三億三萬三百三十有四以石計粟十二百有五十視他牐三之視舊倍之其出于縣官者鐵若麻木十之七石五之一粟五之三餘一以便宜調度不以煩民此其大較也初侯至之明年凡河之溢者辟之壅者滌之決者塞之拔其藻荇使舟無所底禁其芻牧使防有所固隆其防而廣其阯脩其石之巖陁穿漏者築其壤之疏惡者延袤七百里防之外増為長隄以閼暴漲而河以安流潛為石竇以納積潦而瀕河三郡之田民皆得耕種又募民采馬藺之實種之新河兩涯以錮其潰沙北自臨清南至彭城東至于陪尾絶者通之鬱者厮之為杠九十有八為梁五十有八而挽舟之道無不夷矣乃建分司及㑹源石佛師莊三牐之署以嚴官守樹河泊龍君祠八故都水少監馬之真兵部尚書李奥魯赤中書㫁事官忙速祠三以迎休報勞凡河之所經命藏水以待暍者種樹以待休者遇流莩則男女異塟之餓者為粥以食之死而藏飢而活者嵗數千人是以上知其忠下信其令用克果于兹役也侯亦勤且能矣然古者三載考績三考黜陟幽明故人才得以自見方世祖皇帝時天清地寧羣賢滿朝少監馬公之徒得以陳力載勞垂功無窮者慮之逺擇之審任之專也向使侯竟代去雖懐甚忠極智無能究于其職是亦侯所遇也惟兹牐地最要役最大馬氏之後侯之功為最盛故詳于是碑以告役之人侯名仁仲河南人辭曰昔在至元惟忠武王自南還歸請開河渠自魯涉齊以達京師河渠既成四海率從萬世是資朝颿夕檣垂四十年孰慢而隳翼翼張侯受命仁宗號令風馳徵工發徒既滌既修濟牐攸基先雞而興既星而休觸冒炎曦疾者藥之死者槥之奚有渴飢拊循勞徠信賞必罰勿亟勿遲十旬之間遹潰于成智罔或遺洋洋河流中有行舟若遵大逵舳艫相銜罔敢後先亦罔敢稽賢王才侯自北自南顧盼咨嗟曰惟京師為天下本本隆則固惟帝世祖既有南土河梁是務四方之供于千萬里如出跬步聖繼明承命官選材惟侯之遇昔者舟行日不數里今以百數昔者舟行嵗不數萬今以億慮惟公乃明惟勇乃成惟廉則恕汶泗之㑹有截其牐有菀其樹功在國家名在天下永世是度天華萬夀宫碑唐貞元中吉州刺史閻侯隠于城東十五里天嶽山之芙蓉峯後傳以為仙云其山世為閻氏業子孫世為郡人山髙廣可十里俯覽郡中諸山或言古仙人浮丘伯及其弟子王郭二人亦嘗往來其處及稱山中多光怪倐忽變化甚異延祐三年侯諸孫𢎞毅即其地祠浮丘以其二弟子及侯配廣殿大庭髙門修廊皆合制度又割田廩有道之士以奉祠事明年郡人曽編修㢲申為請于𤣥教大宗師命為天華觀至順元年陞為宫明年正一教主三十九代天師加天華萬夀宫并書其顔咸謂君子作始宜具金石刻為刻辭按廬陵志侯名寀初隠芙蓉後得道山東南三十里之洞巖臨江玉笥山志又言承天宫西南十五里南障山葆光觀有吉州閻使君别墅後得道衡嶽學仙之人固芒忽不可知而戎昱集載送吉州閻使君入道詩此尤足徵者浮丘事見列仙傳天下髙山絶境類有浮丘遺跡要不可詰然古之士君子負徳行才藝不見用于世或著書立言以傳其道或躬耕採拾以樂其志或依托佛老以寄其跡若此者世多有之後世至有因之以為富貴利達之途赫然與王公大人並馳爭先者侯之孫自壯嵗抱其才遊京師數薦不合去最後受知集賢諸學士薦為甘肅儒學副提舉又翩然嘆曰即見用以踰五望六之年馳數千里之地逐尺寸之禄智者不為也且天華吾故土吾將老焉其猶有乃祖之風與辭曰瞻天華之巖巖兮前青牛而後𤣥武乍蜿蜒而回伏兮忽騫騰而軒翥丹霞爛其髙兮白雲縞乎在下俯城郭之鱗蓐兮覽平原之膴膴香城鬱其在望兮乃匡仙之故居枕黒潭之黕淡兮大江淘而右趨步靈臯而造神澳兮顧列仙之攸館浮丘既厭世而髙馳兮閻仙又擯余而不返召青鸞使駕輅兮俾鳯以調笙抗文龍之雲旗兮仍析羽以為旌冀神君之來降兮余將肅其並迎孔子欲乗桴浮海兮老􅅨亦度關而西遊知文武之不可作兮道凛乎其莫留何盛世之孔明兮亦髙蹈而逺引矧兹邑之鉅麗兮乃英賢之所緼君子固難進而易退兮亦因時而顯隠神君既有此靈宫兮曰髙明而又爽塏山叢叢以四周兮繚青川之浼浼撫下人而顧懐兮歴千嵗而猶未改起倚檻而浩歌兮將畢景而靡悔臨江路玉笥山萬夀承天宫碑天下稱大名山在大江之西者三曰匡廬曰閣皁曰玉笥玉笥又為天下絶境按道書及圖志于洞天則太秀法樂于福地則都木凡為老氏之宫二為觀二十有一而皆統于萬夀承天之宫宫在洞天之西三會峯之下玉澗之上云即梅子真隠處漢初覆箱之麓有觀曰玉梁言初為觀時天降白玉梁因以為名晉永嘉中徙號於此唐之季道士劉潛谷建老君院觀旁曹處明亦建精思院而王處士遂以觀為靈寳院南唐保大中徙靈寳文質議合三院之田復為玉梁觀劉傳陳紹規王傳丁守𤣥姚文質曹傳宋懐徳汪希聲皆有道者號玉梁八祖宋大中祥符元年賜觀額曰承天宣和初陞為宫宫之衆幾六千指為友寮五十餘而唐宋之君數設金籙醮于此故玉笥之名震天下大觀庚寅宫災各出建壇場以居寮之存者僅十有三靈寳之友曰超燕浩然水竹養真老君曰仁智玉洞玉山夀玉精思曰清音清隠桐澗道沖雲庵建炎紹興之際管轄劉思齊知宫楊得清始復其宫何道沖何守元繼之宫日以修咸淳中管轄李允一之兄珏為閤門宣贊舍人得幸上為請以甲乙傳次從之入國朝至元二十六年詔加萬夀承天宫給五品章以允一為本宫住持提㸃兼本路道録與知宫謝景㢲謀大新其宫以稱上賜景㢲乃種樹積財以待之大徳三年初作東西廡而允一卒劉夀翁周源深劉居敬何應仙等繼之皇慶二年夀翁源深建夀春閣主宰三官三殿延祐改元建三門及正紀堂鐘樓齋堂庖庫之屬至順二年居敬應仙建三清殿費以鉅萬計居敬及李師周各以私錢五千緡倡之餘皆出諸宫中王實仙等木惟棟材得巨檆株于郡人鄧守一餘皆取之謝景㢲所手植之者于是棟宇之制金碧之飾象設之嚴莫不度越于前矣又増飯衆之田合新舊為畝萬有奇而宫始大備君子曰雖有三大名山惟此山兼洞天福地之重峯有太白雲臺君王秦望之屬三十有三壇有太清太一曜明白鶴之屬三十有九臺有東華赤松白雲之屬十有二谷有彤霞丹陽之屬五井有丹砂玉乳醴泉之屬十至若三溪八池七潭六源四塢二十四澗皆勝絶之處髙摩天關勝入地軸載之莫究其名窮之莫極其源雲雨所都雷電所家金芝靈草之所囿神龍異獸之所窟宅天鍾其英地儲其靈磅礴扶輿非遺世絶俗乗虚馭景之士不能徧睹也古今隠居得道於此計不可數其幸知名者若秦孔丘明等十人漢梅子真梁杜曇永蕭子雲唐羅子房羅公逺謝修通劉道平宋沈鱗毛得一李思廣之徒三十有八人皆磊落奇傑世不常有其不肯名于世者不知其幾且神禹大聖也漢武英君也言皆嘗應符受籙于此使天下之人披圖志聴游士談說孰不延頸稽首矯然如在弱水之外信天下之絶境矣而萬夀承天宫實統此山不亦重乎今宫庭之麗不獨可稱上賜又足以稱此山不亦美乎然是宫也興于漢盛于唐燬于宋雖復于南渡又二百餘年以至于今始完且美厥惟艱哉為之後者當何如其繼也今住持提㸃是宫者通𤣥沖素明逺法師教門髙士何君應仙也宫之浩然堂邵天麟念其修復之難何劉以上諸老之勤請文刻石余與邵然又嘗識何君序已復係以詩辭云大江之西洞庭東三山鼎峙爭長雄玉笥嵯峩與天通千迴萬轉重復重十人避秦入山中池養十魚為九龍九人乘龍上虚空赤帝飛入為九􅉄四海照耀何烘隆三疏不救莽賊凶曹瞞欺天塞帝聰玉梁白晝隨靈霳夀春真人抗靈蹤玉壇佳氣常鬱葱璇題翠羽開神宫九霞照地光熊熊急澗鳴玉相撞舂羣峯四合如朝宗承天萬年亮天功太秀幽詭都木同重巖洞壑守鬼工白猿夜啼寳氣衝我欲求之白雲封金闕先生碧兩弟子文詠敬以恭巢雲駕霧留飛蹤𤣥洲長史白玉容八十二口來相從一入不復世莫逢忽而見之若發蒙朱宫玉堂繡簾櫳青童素女清而丰桃花杏花相映紅忽而不見空冥濛或聞玲玲磬與鐘或如金雞曉啼風何劉沈謝數十公遺聲逸響猶渢渢霓旌羽節何當降霞衣飄飄珮琅􅋛下與世人哀癏恫身為風牧嘗先鴻上佐皇羲播時雍還淳返樸服孝忠物不疵癘年穀豐氣酣飛上三會峯周覽四極摩蒼穹前有天柱如華嵩落日照作金芙蓉三峯東出號赤松雲臺太白相横縱羣玉金扇逺更濃兩峯相倚如驅蛩紫㣲髙閣紫霞沖石橋金柱爭巃嵸長江外抱如白虹束以驚峽轟奔洪千金萬古聲淙淙百神歆集元氣融超凌蓬萊軼崆峒仙來不來我心忡山中有草名碧茸食之千嵗顔如童我欲求之不可窮願珮含景從仙翁紫袍白馬來兩􅎸奪取神君一尺銅坐閱絶景忘春冬勅賜漢昭烈帝廟碑燕俗廟祀漢昭烈帝關將軍羽及秦蜀郡太守李氷甚虔昭烈關將軍皆涿人今州南十里樓桑邨即昭烈故宅其祀昭烈羽宜以鄉里故氷在蜀堰江水以灌民田又鑿石為五犀牛以厭水妖燕無洪河大川嵗多暴水故涿之范陽禮智鄉有益者神巫王媪之子也媪為巫五十餘年媪死益襲其業如媪之神遂合所得施與作昭烈帝及蜀太守廟于其里前遼陽行省平章政事今中政院使哈喇特穆爾相以私錢若千而殿堂門廡象設器物之屬無不備元統元年九月十日為請于上降香幣以落其成明年三月六日又言之奎章閣侍書學士實喇卜使奏命臣傒斯紀其事於石而上皆從之其不絶人為善之畧如此且天子固天下神民之主凡有功烈于民者宜不限以地使天下皆得尸而祝之以係其尚徳慕義之心然臣聞有天地即有鬼神鬼神一陰陽也陽其神陰其鬼陽變而陰化一變一化鬼神之道著矣故傳曰鬼神之為徳其盛矣乎謂鬼神能禍福人者無之作善降之百祥作不善降之百殃此鬼神之機而善惡之應皆人所自為也雖古之巫覡禱禳祈禜亦因其人心所感而為之應焉爾所禱非所感而能福人者無之故曰皆人所自為也若昭烈續漢祚于既亡關羽不事賊操而委質劉氏李氷當秦之暴而拯民於溺至今人廟而祀之者豈非為善之應耶亦其所自為也神既以此而受福于千萬世其所以福人者豈肯異於其所受耶嗚呼陰陽也鬼神也極天下為能變化者也福善禍淫而無所容其心人可不知所自為者乎詩曰求福不回此之謂也臣既奉詔謹拜手稽首而著其說復為之詩曰坎坎兮伐鼓揚揚兮合舞神之來兮如雲神之去兮如雨神福我民兮不知民望神兮恐神不來神不來兮心孔悲神之來兮民之依黄屋兮赤旂左諸葛兮右羽飛神在漢兮漢不衰漢雖衰兮神不遺神福我國兮踰漢盛時長㦸兮丹轂堰江流兮灌平陸神在蜀兮秦之福禾黍芃芃兮妖孽伏神福我民兮如神在蜀涿鹿兮范陽神之合兮煌煌宜君宜臣兮祚靈長五風十雨兮均萬方廟孔碩兮薦苾芳神永世兮兹顧享雙節廟碑皇帝元年江浙行省言漳州萬户府知事闞文興死其君配王氏死其夫邦人既為之立廟請加褒顯以慰邦人心以為天下後世勸乃下部定封太常議諡而封闞文興為英毅侯王氏為貞烈夫人廟曰雙節之廟今右司郎中張侯士𢎞為吏部侍郎時所力行也新安鄭玉復持張侯命請暴其事於麗牲之石闞文興不知何許人王氏金陵民間女至元十三年從萬户賈將軍戍漳州十七年八月望劇賊陳釣眼夜率衆為亂殺招討傅全及其一家官軍死者十八九闞文興力戰死其配王氏有美色為賊所執逼汙之紿曰我不幸至此豈敢愛其身願収葬吾夫然後唯命賊義而許之得其夫亂屍中置積薪火之遂自躍火中并燒死後十八年府始上其事連帥及部使者以達行省又九年行省始聞於朝下禮部議部請訪王氏族里旌其門閭収䘏其宗親乃以其事付史館事下江浙求之六年無所得乃用漳守言表其故營曰烈女之坊然無及文興者又二十有一年士民之言不已以有今日之請嗚呼二人之死卓卓如此猶歴五十有四年始獲五等之封雙節之錫且必待張侯贊之人之伏巖藪沈下僚砥名礪操欲聞於天下不亦難矣況數十年之間有司之請朝廷之議皆為王氏止王氏信莫及矣闞文興亦詎可少哉天下綰符杖節擁萬夫之衆鎮千里之地者不知其㡬一旦四方有急天子之命未及於境已閉閤稱疾者有矣遂委兵而逃者有矣當是時變起倉卒使闞文興苐守簿書期㑹之常負妻子踰垣而避之亦孰得而議之而臨難忘身見危授命䝉凶威蹈白刃奮萬死不顧之勇死而不悔者何則禍亂作于前忠義激于内不暇擇地而死也至於王氏决死生於俄頃不辱其身烈丈夫有弗逮矣君子曰人皆死於危二人獨死於安皆有苟免之道而不為也然江浙之請雖堅中書之命雖下微張侯英毅必不侯貞烈之封亦不及而闞之死其君王之死其夫亦豈欲求廟食冀褒寵邀譽於天下哉誠不忍棄君臣夫婦之義焉耳傅全闔門死難有司之請朝廷之議皆不及者武臣死事國有常典云其辭曰世道升降視綱與常綱常弗紊國乃吉昌仡仡闞侯夙佐戎幕匪矛匪㦸而簿書攸記婉婉王姬來嬪于闞夙興夜寐惟警戒是鑒元有南土爰鎮於漳閩山巖巖以海為疆謂國既平謂威徳既加弗戒弗備而内生孽芽盜夜斫營侯亦戰死王姬不辱入火如水五十四年民請弗却廟有新號封有新爵載念厥初風教未立三綱如此命胡不集唯侯克齊而家而婦克配爾徳生雖不融沒有遺則民心孔懐廟食孔宜式著刻辭為臣妾之規龔先生碑自周程朱張氏沒天下壹資其書以為富貴利達孔孟之道闇然不明宋末科目極弊之餘用周程朱張氏之書以為教吾郡南昌則有龔先生云先生沒九年其門人朱志孚黄希尹三以狀謁銘其始至也余以憂在告其再至也國方有火故三至而辭益悲志益勤得師弟子終始之道乃叙其槩而銘之先生諱日新字中孚五嵗入小學十嵗通進士業十五有能聲從胡氏純饒氏應中呉氏應期始去舊業由周程朱張氏之說以求達夫孔孟至元中以郡太守之招分教進賢日與邑賢士龔君煥講求孔孟之㫖使知仁義為重富貴利達為輕而孔孟之道為大邑人翕然師尊之先生八嵗時大父成已以户調督輸失期逮至邑潛往候之坐當笞從容進曰火父耋老家君適有采薪之憂幸少貸當代輸令大驚試以尚書禹貢盤庚諸篇誦説如注令禮而免之父鈞嘗得暴疾氣已絶咸謂宜遷正寢先生曰必三日乃可時時手注善藥口中翌日忽自蘇又十二年而終婦翁袁大夫漸治宜黄有殺人之舅誣其甥而已證之者先生至邑廉得實白而正之咸淳初度宗潛藩恩試京師謁陳尚書宜中坐頃賈似道至起避旁舍中賓退尚書曰能一詣此人否對曰不能尚書嗟嘆久之咸淳癸酉復與計偕而國亡矣呉先生疾也日往問焉其沒也無以為哀已塟焉其教人也諄諄不倦不達不止嗚呼先生逺矣今之讀周程朱張之言者皆是也而先生逺矣沒之日實至治二年八月五日以某年月日葬於某夫人某氏子男三以莊立信太初莊早世孫男五名與竇侍郎禹鈞之子同而亡其侃乃銘之曰道行以天行道以人萬變摩盪忽而淄磷惟君子人内主外賓彼徳於天吾自吾身窮達一揆尊尊親親邈矣先生勒此貞珉嚴先生碑世有樸山易說十四卷宋未吉之太和嚴先生肅所著也咸淳中江丞相萬里馬丞相廷鸞皆好其書獻之天子徵為秘書省校勘宋亡之嵗三月二十有五日亦以疾亡皇慶初余在京師識其曽孫有開有才藝有徳行問其世則曰吾之先馮翊人也唐之季祖實為江淮轉運判官遭亂不能歸留居廣陵子可求事江南呉王為尚書僕射同平章事子續又事江南李主亦以門下侍郎同平章事是為懿公遷金陵亂孫美舉家南竄至太和家焉遂為太和嚴氏自懿公後始去干戈事文學自秘書郎常州推官震始登宋慶厯壬午進士迄宋亡為世科之家又一十有八年余在奎章閣遺余書曰昔者常獲與子詳吾世家于京惟大父積學篤行著書立言以惠我後人而墓道之石未列所刻辭敢請按先生字子方曾大父諱光道朝奉郎通判潮州康元之弟也官保義郎淮東制置司幹辨公事大父諱知古父諱起予娶段氏子男二驤文用文孫男四曽孫男若干人女若干人夀六十六墓在縣南之某鄉隆福山之原夫易之道深逺矣世之言易者至衆矣嚴氏之書最晚出致使名宰相獻之天子藏之秘府固有以得聖人之心乎嚴氏兩世相霸國而轉徙䘮亂曽無寧嵗積十有餘世乃得先生以四聖人之心竭四十年之力其書不與國俱盡宜哉先生之被徵召也到官數月即自免去曰吾豈以六十之年而不知其所止乎易曰介于石不終日貞吉言知幾矣銘曰經之全惟易然言之難公得焉子若孫尚永傳樂丘碑余嘗讀老􅅨氏書至長生久視之説曰此世所謂神仙者非耶又有能以術役鬼神召雷電禱雨暘已疾癘亦曰出老􅅨氏老􅅨氏果何道哉廬陵髙敏則君者博達深識之士也有所善頤浩先生頤浩先生者郡之安福人也名同寅字惟寅姓陳氏宋咸淳中棄家入清真觀為道士至國朝天下郡縣置道官又置南北道教所以領之其教所號之曰明素葆真大師教門髙士以為郡道録即為之不辭歴住沖虚觀梅峯道院所至禱雨暘已疫癘崇棟宇辟土田至于起居飲食莫不與人同也然今年八十矣顔如春花步履飄飄然纔如四五十人又善為歌詩一字不作俗下語不知何道以致之又察其所讀書皆老􅅨氏書也其行事皆非老􅅨氏所嘗言者豈守其真而溷其迹耶髙敏則君又常聞其言曰天地果無終乎則纍纍乎莽蒼之野者何為而有之天地果有終乎則炳而為日月星辰峙而為山嶽流而為河海何為而莫之易也故聖人能存其所無終而不能存其所有終衆人常欲存其所有終而不能存其所無終彼纍纍者吾獨且奈何哉今求吾之道者曰老􅔶氏也求吾之行者曰老􅅨氏也彼烏知老􅅨者天地存亦存天地終與終天地而有不終者存焉彼又烏知老􅅨吾方且為樂丘以待天地之終也聞有揭子者能言孰為我使志之髙敏則君以告乃為之志而歌曰猗頤浩兮不與我好兮而使余告兮猗頤浩兮不與我期兮而謂余知兮天地廓廓不可以度日月爍爍不可以約吾非老􅅨安能志斯丘之樂大元勅賜正奉大夫江南湖北道肅政廉訪使董公神道碑元統元年十有一月月幾望奎章閣承制學士臣實喇卜召臣傒斯至學士院傳詔命臣撰故正奉大夫江南湖北道肅政廉訪使董公神道碑别勅新南臺治書侍御史臣巙巙書其文翰林學士承旨臣師敬篆其額臣竊謂自太祖皇帝應天啟運其將相大臣父子孫曽傳百數十年稱名臣者數十人或擁旄杖節出謀發慮佐定海宇或安危靖亂行政施化藩屏國家于外或獻可替否拾遺補過匡救政理于内功不絶于信史名不染於罪籍天下庸人婦女皆能稱説者惟董氏而已以臣傒斯獲備載籍與有榮耀故不敢伏闕辭讓謹按公諱守中字子平世為真定藁城人曽大父龍虎衞大將軍左副元帥知中山府事諱俊大父資徳大夫僉書樞密院事典瑞卿諱文忠龍虎公第八子上自天子皆以第稱父資徳大夫御史中丞諱士珍公始入太學簡知世祖召問時政條對詳敏如素習吏事者命之治仕則辭年二十二乃以世胄補内供奉歴尚服院懐慶路判官河南行省理問典瑞丞僉典瑞院事集賢侍讀學士浙東廉訪使河南湖廣㕘知政事漢中湖南湖北亷訪使累階正奉大夫公入官㡬四十年最其在官才十有二年以母䘮去供奉閒居十有七年以尚服院罷解判官閒居一年以上怒有司左遷公止懷慶之行閒居三年以父憂不果赴理問及辭典瑞丞終制二年以弟守庸為御史舍浙東以疾棄河北皆閒居二年遂以至順四年六月朔年六十一薨於家自同大父以下親無不在傍者薨九日葬邑西九門先塋贈某官當公之居家與夫人事父母盡其孝遇宗族鄉黨賓客盡其禮馭臧獲盡其恩諸弟妹婚嫁皆取具夫人奩中之資父之澤則以讓其弟大父之澤則以讓其叔父諸子女無適庶視之如一公之居官潮壅揚州金沙河舟楫不通豪民恐奪兩河地數賄有司勿濬有司亦因以為利及公為河南竟濬之河北饑部使者下令盡逐流民之南渡者北歸公盡止而濟之其在湖廣宋以馮文簡公故宅為貢士院在洪山寺傍及宋亡寺毁屋撲碑而有其地公復取以為貢院江西嵗給䝉山銀治糧四萬餘石右輸銀三萬五千兩興國龍閣諸山亦多産銀有請色辨䝉山銀者公曰此奸利之民也斥之公方留妻子於鄂赴漢中過汳當國家中興行省大臣留㕘軍事肅清郡邑以迓新天子多用公計䇿獨不聴諫止孛羅守潼關關果不守騷動三晉及新天子至召賜白金百兩以為河南廉訪使帥師守武關迄亂定無一人敢窺關者明年天下大饑武昌郡豪控諸米商閉糴以徼大利城中斗米至萬錢公適至杖其黨與七十餘人米大賤又輟貢士莊錢入學養士恐以飢廢講刻朱文公戊申封事于南陽書院使學者知格君之道有司受賍聴民誣父妾負財逃妾實與爭溺水死公正有司及誣者罪惟公平生於朝廷無干進之牘於權門絶私謁之迹又不幸年止中夀故上不能盡公之用下不自竭其志竟如是而止悲哉然臣嘗待罪國史伏讀太祖以來實録及觀董氏家傳朝野所記載詢諸典刑故老董氏之先南征北伐未嘗妄殺一人妄施一政天下初定諸將並解兵柄唯董氏不許以僉樞公寄天子腹心居中者四十年才四遷其官觀公進退可謂無忝乃祖矣公夫人名臣翰林學士承旨王文康公鶚之孫翰林直學士之綱之女勤儉懿愛徳為九族師封隴西郡夫人生三男子一女子男鎋鉉鑰也姬子女各一人男鐩鎋由武備庫使五遷而僉羣玉内司事廉直貞亮為英宗文宗所知及鉉之篤行鑰之好學鐩之脩謹皆能守祖父之訓為孝子慈孫龍虎公累贈推忠翊運効節功臣太師諡正獻中丞贈純誠肅政功臣太傅諡清獻階並開府儀同三司勲皆上柱國爵皆趙國公銘曰天啟有國篤生賢哲董氏數世終始一節人謂董氏獨保天迪匪天私董唯以不殺如漢酇留佐命興劉有舉必賢有謀必酬惟滿是戒清靜是脩又如西平在唐之造功則讓能過則引咎惟善是與惟善是懋而子而孫半於天下王公令僕方騖並駕人惟好徳如春在物生生靡窮莫之敢遏豈彼驕陽焮灼歊蒸欻兮凜秋為寒為氷矧兹董公翼翼其承惟祖考是訓惟徳義是經進退用舍與時偕行用不盡材夀不侔徳而公之嗇而後之益隠卒豐終為天子之公厚本濬源惟子孫之恭臣拜稽首式揚休風以示趙人以篤世忠趙功可墓誌銘余讀太史公書至倉公扁鵲傳歎曰功之及人深矣然其子孫無傳焉及觀歐陽先生守道所為天和老人碑累千數百言與龎安常並稱且曰子若孫皆進于學其門户將大又歎曰子孫之大也其必由學乎天和姓趙氏其姓祖三衢人從趙清獻公官贑上至廬陵家焉三世至榮道盡讓田廬兄弟而自立榮道生慶善慶善生鶚飛是為天和博學善為文章有盛徳著書百二十有六卷生四子惠愿戅日章日章從老氏學惠生宋永宋强愿生宋文戅生宋庠宋安宋永字儀可宋安字功可以文章齊名號二趙先生儀可嘗三貢於鄉又入太學克博士弟子員宋强亦登進士第為韶州仁化簿尉卒功可雖不及貢他人得其文輒與貢使宋不亡儀可必不止太學功可必貢且第及科舉復則皆老矣儀可尋沒功可䘮明然儀可之文播天下功可謹自晦猶為人所尊尚稱鄉先生太定三年十有二月乙未功可亦殁明年秋八月其孤靖衰絰走門泣且拜曰我大父則歐陽先生銘其墓而文丞相題其蓋我伯父則翰林學士承旨程公銘其墓而翰林學士承旨趙公書其碑惟先人之葬願併以累子噫余敢抗諸老哉然獲知功可今二十七年矣其得辭君生七嵗而孤服除而母嫁大父鞠而教之警敏絶人貫穿諸經羅畧百家而為人温厚純慤和而不同為文疏達雅粹豐而能約其教人也本之以不欺繼之以不倦故從之游者皆賢子弟其兄死諸孤孑立皆與教育而婚嫁之而見之未嘗不以禮晚嵗樓於屋之西偏揭曰吾美葢感其平生淪落不偶晚得安享太平無去國懐鄉之憂而自幸也自是賦詩飲酒無日不在兹樓矣及其殁也飲酒三日無疾而殁年八十一娶胡氏子男三人初逺靖初客南海二十年父死不及歸逺為新㑹教官卒凡䘮紀維靖而已女一人適張元孫男六宜簡宜晦宜遜宜立宜和宜肅女一人曽孫男女各一人將以閏月二十日葬所居之趙山嗚呼功可已矣余觀靖之為人簡慤嚴重且其為文甚類其父諸子又類歐陽先生所謂大者其在兹乎儀可後易名文家復有神甑之事云銘曰趙昔有甑大比則鳴伯也三應叔果弗靈甑既墜矣天開聖朝昔視為祥今視為妖温温君子弗究以老藹藹令徳無忝祖考嗟爾振振曰子曰孫念爾祖考允大爾門奔清甫墓誌銘安成有士而隠於醫者曰奔氏諱清甫生宋寳祐間九嵗而孤即强學自愛視取髙科都美官如指掌積勤十二年而國亡科舉廢又連遭大䘮征徭風火巨室瓦解乃盡棄其田疇取神農黄帝之書日夜讀之心通理解天授神設以之察脈視疾論生死虚實寒熱雖世業鮮能過之四方無貴賤富貧求者如歸市遂以名醫聞自是聲日起家日裕而無推剥麋爛之憂天下立醫學置吏多勸君為之者君不應然學校每賴君以為重君平居孝友凡見父之執母之族必敬之如父母兄深甫貧事其兄如父事其嫂如母撫其子如子從父仲龍老而無家養之終身兄及從父沒又以禮葬之從妹之夫劉才英溺死二孤㷀然君為經紀其家同居子姪有他適必謹視其私雖犬豕使各得其所故家羈孤淪落旁皇無所歸或館之或食之或衣之曰此名家之子也人以横逆相加未嘗難焉惟讀書老不釋卷多所編校及科舉復而老矣泰定三年七月得疾手課程文一通授其子沐浴衣冠語衆曰後三日夜半吾當死及期而卒年七十二將以沒之明年九月庚申葬郭北順安鄉印山之原孤元凱命其子中泠以書謁銘君之先汴人七世祖仕能事宋徽宗為侍禁靖康之亂從隆祐太后南幸至安城家焉仕能生成甫成甫生逸孝宗時舉直言極諫科逸生成節郎子英生普州安居尉士同士同生志學是為君之父君三娶皆劉氏子男三元方元凱元中元方本趙氏子從母歸奔故冒奔氏興元中世醫學惟元凱業儒文多奇女三長適鄉貢進士劉辰發之子尚賓次適倪剛大孫男五長中冷業進士有聲餘方向學女二惟君少孤能勇自樹立既食于醫能為善不倦又力以詩書教子孫沒猶不忘以進士業勵其後且其明足以知死生之故有合於君子之道宜得銘銘曰猗民之生汨汨營營為之禮樂以防其情為之藥石以和其形民猶蚩蚩弗念厥生善為政者不失其經善為方者不爽其平惟以保其真嗟嗟奔卿子孫其興處士楊君墓誌銘豫章先生熊氏以六經教授東湖之上燕晉齊魯關陜之士皆不逺數千里受業門下去即掇髙科都顯官立盛名至有閉户窮經甘白首而不屈者郡人楊綬又獨嶄然羣弟子中其讀書務求大意不棘棘章句其為文鉤𤣥抉幽非博學識字不能讀然反覆沈鬱固將就平易而未及者其力行敦六行明五教邪說不能亂世好不能惑恒居無雜言盛暑必冠帶與人交必敬為人謀必忠不以利害枉其道不以毁譽屈其志三試進士三見黜不易其所好熊先生深愛之同學亦皆以為不能及熊先生沒常忽忽不自聊然益奮於學有一日千里之勢至順二年四月二十日年三十八竟以疾卒君子莫不傷之且曰使不死吾輩皆當出其下明年夏其孤某年月日葬於某以狀介父之執至京師請銘按楊氏其先本世家五世祖顯夀徙豫章遂為南昌辟邪里人顯夀生文質文質生炳及開慶己未進士撫州金谿主簿會龍炳無子以會龍次子惟善為子後娶信州鉛山主簿胡庭桂女生君君字宗敬早孤能服勤母敎又得名師友以成之故所至有過人者惟人之生也命之脩短懸于天學之成否係于人是以君子之學嘗恐志未畢年不待也孜孜勉勉死即已矣若楊君者不亦深可哀耶君娶揭氏生二子成允成彦二女尚幼銘曰梗楠豫章為棟梁兮璆琳瑯玕為珪璋兮才而短折君子之傷兮文安集卷十二欽定四庫全書文安集卷十三元揭傒斯撰銘饒隠君墓誌銘臨川饒國華卒之明年其孤得正馳書京師請銘曰先子且屬纊曰吾生無所成名沒必得故人揭君銘余十五年前過臨川遭國華於道要余至舍行二三里至大原之谷其山四髙環合如城中有良田美木水聲淙淙與禽鳥之聲相亂坐予屋西别墅悠然之亭諸子玉立觴酌屢行復裵徊濯清釣雪諸軒亭之間花氣襲衣竹陰滿地使人泠然忘歸為留一日而去自是嘗一再過之不謂奄然死矣悲夫君早孤事母鄭孝謹為人端重和粹好讀春秋左氏傳能通諸史始末重賓客樂施予浮沈鄉里與時髙下及諸子既長皆讀書有守足持其家乃泛大江浮雲}
