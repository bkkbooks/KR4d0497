  - {type: variant, offset: 1771, length: 0, content: '', WYG: 送江尚志得官後携新妾歸省淹薄徂年嵗離别忽在兹寒城落木後虚館殘鐘時家在雙井上心隨孤鴻飛落日布帆逺青山尊酒移蒼茫倚閭情愴怳零雨詩託身名敎中固應慎其儀志尚既不殊情鍾自成悲昔見已云晚再㑹良無期濯足彭蠡瀦省侍髙堂歸鶴髪喜垂涕兒童問牽衣野老借檄看隣女隔墻窺田園各成熟松竹䕃菊籬淳俗一在眼鷄黍相提携翻知在家樂不恨為官遲放浪乘化遷何用世俗知遊禪林寺喜得昌上人靈臯懐獨徃危軒泊閒寂偶與塵事違况值禪林客深苔剥修玉輕霏澹凝碧夐見飛鳥還静聞寒溜滴空明㑹真賞漂流見良覿常恐心跡乖無由展平昔奉陪憲使程公遊麻源第三谷宴藏書山房白雲樓時三月三日明公當暇豫勝日懐登臨蹀躞驄馬行窈窕幽人心縣厓響晴雨犇流濯春陰雲門轉絶壑畵橋貫長林掃石慨徃運聞鐘知古音耆松有百圍突嶂踰萬尋小憇釣魚臺聿瞻華子岑捫蘿入縹緲側逕凌蕭森迢迢百尺樓下有孤猿吟初筵俯曽顛微風散危襟語笑信忘我觥籌浩難任豈不念永留惘然歸思深送雷山人遊山髙人雨中至邀我遊山作自非㝠寂子肯耐紛華落方春迺發軔殘雪猶映薄隨雲度神臯披烟望靈嶽晞沐朝陽谷照影清水壑淹留皆隐淪徃還必恬漠惟應樵與牧時逢得竒藥歸來雖未期鬢髪終如昨送孫志言逺遊志士遊四海豈拘名利牽孫子三十餘懐䇿靡遑安仰視流光馳千嵗俄頃間青青鏡中髪閉閤守丘園昔者限南北放浪徒空言曠然六合中何為惜飛翻晨裝既云具良友咸在門依依别老親悃悃語弟昆}
