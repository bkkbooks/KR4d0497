  - {type: variant, offset: 48, length: 0, content: '', WYG: 舟中諸公千家楊栁江當門東梁西梁兩岸蹲連檣大艦集日昏摐金伐鼓海上聞小江更出采石後前人立功後人守大信花采石酒陌上相逢莫迴首白楊河㸔月白楊河上㸔明月昔人曾見今人别茅屋數家河上村化作三山白銀闕波平風靜棹歌來萬傾冲融鏡面開今夜江南憶㳺子空瞻雲漢上昭囬茫茫萬里燕齊路北斗從横泰階曙黄河東逝月西流明日南風過洪去歌風臺和李提舉韻萬里東歸火徳開漢王曾此宴髙臺沛中父老謳歌入海内英雄倒載回湯沐空餘清泗在風雲猶似翠華來穹碑立斷蒼烟上靜閲人間幾刼灰題嚴陵獨釣圖何事𤣥纁入里閭羊裘暫脱就安車空令太史驚同寢猶把狂奴視報書一出聊為天子重諸公莫道故人踈朝廷自足中興士且放桐江著老􅈄題鼯䑕食瓜圖種瓜中園予亦勤止瓜長而實汝則殘止雖則殘止予敢汝仇天實汝生予將何仇汝食之甘既肆既閑實之食矣無傷予根根存而微惟予之窮根盛而實惟乃之功哭信州僊源觀徐尊師乃𤣥教大宗師張開府之弟子也𤣥霜搗罷世都遺葛屨蕉衫太古姿天上真人開府日山中仙子閉門時空林雨過金芝老深谷雲寒白鶴饑萬里馳書為永别盧敖何處定相期送蔡思敬還豫章有懷遼陽李提舉來日能同去不同獨攜别恨向秋風眼㸔亂葉渾無定心與浮雲併一空黄獨山中歸自斸玊梅溪上夢先通莫嗤留滯京華者更有遼陽送斷鴻孔林圖詩集賢待制周侯能修禮於孔林侍讀學士商公圖之史官掲傒斯詩之峩峩尼山蔽于魯邦篤生聖人維民之綱尼山之下有洙有泗有蔚孔林在泗之涘維彼聖人教之誘之凡厥有民則而傚之維彼聖人覆之載之凡厥有民敬而愛之既誦其言亦被其服孰秣其馬于林之側既誦其言亦履其武孰秣其馬于林之下六轡既同周侯之東薦之侑之聖人之宫其音洋洋其趨蹌蹌其臨皇皇聖人允藏商氏圖之式昭其敬載瞻載思罔不由聖壽櫟山詩一首為呉真人生朝作壽櫟山其里山名峨峨壽櫟山澒洞雲錦溪百里空翠合諸峰南斗齊卧斮月窟桂坐聽榑桑雞臨深測地軸升髙徑天倪隂厓覆瓊蘂陽岡敷紫荑懸泉聒空響飛樹淩風嘶側畏猨鳥墮幽恐漁人迷兹山不自髙與人作丹梯赤松棲其東王喬憩其西浮丘前捧擁安期後提攜神君領天官出入黄金閨梅花照羽袂天書函紫泥歸期指松櫟千嵗猶未稽飡和養靈源伏智埽荒蹊木公與金母大笑彭鏗低壽王副樞七秩懸車兩府稀五朝遺老百僚師寒梅㸔足行唫處舊史評來坐嘆時身退已将心共逺名髙轉覺世難遺且陪嘉客霑春酒政待武公歌抑詩李將軍歌一首送李天民赴邵武軍口巡檢李将軍材且武儒冠換得兠鍪去身疑南極老人星氣食隂山雪毛虎雕弧白馬金僕姑天地昻昻此丈夫五十方為求盜使人生何用苦詩書寄言邵武諸官長不是尋常一腐儒時中書以吏部儒選員多有十年不得調者奏以為閩廣諸道廵檢然多非其人而天民式稱是選老人星其常自喻文安集卷二欽定四庫全書文安集卷三元掲傒斯撰題明皇出遊圖應制明皇八駿争馳道還是開元是天寶長安花發萬年枝不識韶華醉中老奎章閣下文書静冕旒端拱唐虞聖此圖莫作等閒看萬古君王作金鏡畫鷹文梁五色絛秋髙意氣豪怒張兩目直霄漢豈與短翮翔蓬蒿妖狐晝作猛虎嘷騶虞并與神麟逃嗟爾飽食心空勞題張使君棄官學道詩卷至元天子朝萬國任丘使君謝病歸門前未罷車馬客身上已著朝真衣致君堯舜在豪傑洗耳巢由何是非棲雲觀裏青松樹惟有白雲終日飛登祝融峯贈星上人洞庭南桂嶺北衡山連延瀟岸黒中有祝融如結鬟嵯峨七十二峯間祝融不自知千山萬山自迴環迴環面面芙蓉起祝融正在芙蓉裏儼如天仙朝紫皇千官百辟遥相望半夜每瞻東海日六月常飛滿樹霜龍拏鳯攫熊虎躑雲山霧滅何時極我來正值太平時時有山僧似疇昔憑髙一覽四海空草間培塿安足雄盤盤羅漢臺翕翕炎帝宫復恐九天上視我猶井中朔風日夜相騰蹙谷老崖堅松栢秃古來鐵丸盡飃揚山上至今猶版屋山僧勸我歌我歌徒自傷天下五岳嵩中央此山與我俱南疆我今三十始一見北望中原天更長送}
