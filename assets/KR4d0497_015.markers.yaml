  - {type: variant, offset: 2098, length: 1, content: 闗, WYG: 文維延祐元年嵗在甲寅十月某朔十日某甲翰林學士承旨程鉅夫等謹以清酌柔毛之奠致祭于故翰林應奉趙君景淵之靈謂天至仁仁不可知謂神至明明不可依善者短折賢居冗卑孝不獲養忠不獲施謂為數邪數理而已賢必尊榮善必夀祉孝必終養忠必行志此理之常今胡不爾惟君之生茂懿粹和力乎詩書以承厥家惟君之生舂容廓深一翺天庠再驟辭林讌笑語言如金如玉期君九霄望君百禄去年一疾勢不能起余曰斯人必不止此其危一髮勿藥有喜咸喜相謂必夀且昌云何露電一夕遽亡孰無父母君養不足孰無妻子君不得育孰無兄弟君不得友孰無友朋君不得守藹藹公侯君止下僚萬物芒芒君不復朝知君所憾惟此數者命也如斯莫如何也所不必憾秦公内姻棺槨衣衾克周於身凡我同僚其情孔親故鄉雖遙安臥而臻人皆有死豈必牖下官無崇庳在永終譽靈輀將舉落葉如雨率衆哀號永訣千古尚饗文安集卷十四文安集補遺桂陽縣尹范君墓誌銘大徳中勲臣楚國公之季子帥湖南有所愛掾廬陵范君元亨其强敏之才廉正之節風動千里人不畏帥而畏元亨時余在長沙數與之遇而不敢一詣門恐溷君也後二十七年㑹其從子匯於京師則君歿十年矣乃録其行請銘君諱元鎮字元亨其先蜀人今居安福之清化里祖巖生二子皆為太學生季曰景材是為君父君早孤母劉及其兄元方敎育之至元二十五年監察御史舉廉能為江西憲掾居五年去之京師辟徽政掾又辟大司徒掾皆不就元貞初詔求能書金經者君在選中經成補湖南掾秩滿授瑞州税使改武岡録事攝綏寧令進郴州桂陽尹累階承事郎卒官君所至當官而行無所阿避禄入不足則歸賣田宅以給之往往初多忤而後反見知者其行事之尤著者則在帥府有田千户者死其子曰田芑芑幼弱其弟田仁襲其官據其業而奴畜芑芑長愬於有司數年不决事上帥府復多右田仁君抱牘方力爭帥怒目左右捽君且下吏梁木壊幾壓帥帥乃止田仁恐求援行省權相數日使逮君甚急且喻之曰汝不用汝頭汝來汝愛汝頭勿來皆謂君往必死君竟往極言田仁罪反覆無所顧不能屈乃與芑在武岡時張氏欺胡氏寡弱占其産倪萬户脅張惠以罪取其田皆奪而歸之許文炳兄弟爭財二十年不决召其兄弟涕泣而理喻之許乞罷歸在綏寧王永明誣舒八殺人實藍姓殺之永明伏辜諸峒饑疫大起死者過半下令寛徵賦以恤之諸峒嚮化在桂陽民白有盗其牛者蹤跡無所得方疑所捕二猫嗛牛耳鳴號於庭求猫主索之果得牛立命償其牛而正其罪且桂陽側陋供給與大縣等民力彫耗一以寛濟之故其卒也民無逺近皆縞素㑹哭哭盡哀猶不忍去前後被行省及部使者檄詰責諸郡邑邑三百餘莫不稱允而不及大用以歿悲夫君之卒實至治元年十月二十有五日年六十四以明年十二月二十有一日葬所居東北龍唐之原初娶呉氏再娶劉無子以兄之子肇開為之子年六十一乃得子曰性傳女三人長適大都路固安州儒學正劉蒙徳次適徐經逺次適蕭信之孫男三夀駿文豹天霓女一銘曰此孳孳稱所施而止於斯彼巍巍兮闕右見元文類李節婦傳李節婦者姓馮氏名淑安字靜君大名人}
