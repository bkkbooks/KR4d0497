  - {type: variant, offset: 2002, length: 0, content: '', WYG: 謂之牐皆置吏以司其飛輓啓閉之節而聼其獄訟焉雨潦將降則命積土壤具畚揷以備奔軼冲射水將涸則發徒以道淤閼塞崩潰時而廵行周視以察其用命不用命而賞罰之故監之責重以煩延祐六年秋九月河南張侯仲仁以歴佐詹事翰林太醫二院皆能其官且周知河渠事選任都水丞冬十有一月分司東阿詔凡河渠之政毋襲故狃私毋沮勢怛威惟宜適從敢有撓法亂政雖天子使五品以上以名聞其下隨以輕重論刑毋有所貸侯北自承濟渠南至河東極汶泗之源滯䟽决防凡千九百餘所咸底於理退即所署治文書庫冗儉陋吏側立無所爰告於衆曰予承命來此惟恪恭是圖顧以函丈之室制千里之政役徒百工何所受職下走羣吏何所聽令鄉遂之老州邑之長何所禀政荆揚益兖豫數千里共億之吏何所視禁山戎島夷遐徼絶域朝貢之使何所為禮朝廷重使何所止舎乃㑹財於庫協謀於吏攻石選材為堂於故署之西偏隅隩廓深周阿崇穹藻繢之麗文不勝質几席之美物不踰矩左庖右整宻峻完前列吏舎於兩廂次樹洺魏曺濮三役之肆於重門之内後置使客之館皆環拱内向有翼有嚴外臨方池長堤隠虹又折而西達於大逵高柳布隂周垣繚城遐邇縱觀仰愕俯嘆其言曰惟侯明慎周敏于公罔私故役大而民弗知功成而監益尊監益尊而政益行斯河渠之利永世攸頼爰稽在昔自丞相忠武王建議於江表初平之日少監馬之貞奏功於海内一家之時自時厥後分治於兹者鮮不著勤焯勞載於簡書而公署之役乃以待侯非樂侈其名以夸其民所以正官守肅上下崇本而立政也誠冝為而不敢惟國家一日不可}
