  - {type: variant, offset: 2100, length: 0, content: '', WYG: 東廉訪使時之孫湖州録事汝弼之女山陰令東平李如忠之繼室也如忠初娶蒙古氏生子任數嵗而卒繼室以馮氏生子仕一嵗而寡有遺腹子父歿兩月乃生名之曰伏訃至東平李及蒙古之族相率至山陰盡取其資及其子任以去馮乃賣釵釧質衣服權立二䘮於山陰蕺山下獨攜二子廬於墓時年始二十二唯布衣蔬食羸形苦節躬織紝為女師以自給居二十餘年教二子皆成學遂遷二䘮反葬汶上邑人王毅以中書平章政事在告為親臨其䘮而銘其墓齊魯之人聞之莫不咨嗟歎息有為泣下者李及䝉古之族皆大愧悔羞見馮母子馮視子任反出己子上中書參知政事王士熙侍御史馬祖常禮部尚書富珠哩翀翰林學士呉澂集賢學士袁桷奎章閣侍書學士虞集國子司業李端太常博士柳貫輩爭為文章盛誇道之山東浙東羣有司交上其事於朝請褒異焉其子仕伏事母極孝皆掾太府有廉直聲而好學不倦史氏曰李之初䘮也其族及其妻之屬能扶其二䘮携其母子返乎汶水之上而撫存之其義孰加焉乃不}
