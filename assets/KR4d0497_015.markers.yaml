  - {type: variant, offset: 53, length: 1, content: 斜, WYG: 送上供茶諸生講罷仍番直學士吟成每自誇五載光陰如過客九疑無處望重華題李安中白翎雀白翎雀白翎雀每見灤河河上飛平生未識百禽性不敢籠向江南歸寄題胡氏園趣亭日與世情逺學人聊治生畦蔬多品類樹果各生成野老過偏數山禽近不驚詩書吾所好農圃也須明題文瑞圖并序常德之龍陽居多蜀士祠事梓潼君甚嚴祠前有池曰景星咸淳癸酉蓮兩葉並蒂者六劉初登進士第延祐甲寅兩花並蒂孫以忠登第天厯己巳花如甲寅城東三雅湖蓮復三花並蒂哈喇丹獲獨步迪音馮天澤聨貢而獲獨步迪音登第好事者冩以為圖邀余賦詩蓮花復蓮葉並蒂更連莖並葉已不見三花兩花更有情如何與人作嘉瑞偏向龍陽水底生龍陽家事梓潼君花花葉葉梓潼神好在龍陽士汝但讀書更績文為花為葉汝莫論題南頓孔氏復明詩卷失明非有故復明還自然方其失明時萬事俱棄捐外雖無所睹内則常淵淵如未嘗有目不喜亦不憐如明入地中明未嘗不全逍遥天地内如在天地先不助亦不忘一氣自周旋不敢計此生敢計時序遷剥乃復之始自坤還至乾忽如浮雲散還我蒼蒼天昔非果失之今亦固有焉如何孔氏家母子仁且賢先後俱失明其復皆十年十者數之終如月晦必圓養之固有道何疾非所痊願言永保之母或忽此篇奉同柯博士甘内掾下直賦暮出閶闔門解鞍坐前庭泠泠草露白華月隔林生蟋蟀奮哀響鴻鴈流遺聲常恐芳景晏不知寒節并萬物肅將斂孤懐徒自盈捉衿激長謡棲泊諒難徴賦得海上雲送良上人歸徑山蕩蕩無邊涯悠悠何所之孤飛若有意羣徃更無疑稍拂扶桑樹還經若木枝迎陽成五色乗陰忽四垂作態離仍合多情去却追因風過别島和月下蓬池且任從龍去寜知到岸時惟應學空者澹泊與相期呉子髙悼亡歸岳陽都門落葉滿遊子去京畿忽聽離鸞操遥逐秋鴻飛愁霜曉入鏡淚雨夕沾衣烟樹黄河岸風帆采石磯平沙迴𣺌漫寒宇曖熹微客心閒轉切鄉書近却稀夢聞兒女泣行將童僕}
