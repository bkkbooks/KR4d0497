  - {type: variant, offset: 1987, length: 6, content: 上歸親見六龍, WYG: 下以郡縣皆立廟以醫者主祠建學置吏設教一視孔子廟學大德三年太常言三皇開}
  - {type: page-break, offset: 1987, content: '', id: KR4d0497_WYG_010-9a, image: WYG1208/WYG1208-0236a.png}
  - {type: variant, offset: 1994, length: 4, content: 上飛湧金, WYG: 建極創物垂範為萬世帝王傳道之首今太醫院請以黄帝臣俞跗桐君鬼臾區岐伯之屬十大名醫視孔子十哲配享廟廷是欲以三皇為醫家專門之祖非禮經宜從唐制中書下禮部議議如太常至大元年中書又以湖廣行省言如太醫院所請配享事下禮部議請以十名醫視孔廟諸大儒列祀兩廡遂著為令廣州之増城未置廟歳春秋有司設主寄祀叢祠中至順二年秋九月旴江左祥由翰林從事廣州香山縣尹湖州路經歴以奉議大夫治増城既新孔子廟學於城西冲霄}
  - {type: page-break, offset: 1994, content: '', id: KR4d0497_WYG_010-9b, image: WYG1208/WYG1208-0236b.png}
  - {type: variant, offset: 2000, length: 1, content: 潮, WYG: 之故址而以舊學為三皇廟壊撓者易之隘者闢之漫漶缺漏者塗塈而黝堊之自殿堂徂門凡為屋五十有二楹巍焉煥焉如初建然後三皇之祀始尊醫學之教始行夫以醫學專祠三皇非古制然猶足以見國家尊古聖仁賢重民命如此有司知守國家常制修其祭禮嚴其教道竭其所職而已他非敢置議醫家既得專祀三皇可謂甚尊寵矣而輒慢其祀事怠其學政不知民命之所以重所謂失禮之中重失禮焉其咎大矣凡若是者可不慎哉左君闓䟽平恕所至有善政且知所先務是役也能究其力以贊其成者醫學教諭鄧友益也南䧺路儒學教授李顯以左君之命請記乃為之書建都水分監記㑹通河成之四年始建都水分監於東阿之景德鎮掌凡河渠壩牐之政今以通朝貢漕天下實京師地高平則水疾泄故為堨以蓄之水積則立機引繩以輓其舟之下上謂之壩地下迤則水疾涸故為防以節之水溢則繩起懸板以通其舟之往}
  - {type: page-break, offset: 2000, content: '', id: KR4d0497_WYG_010-10a, image: WYG1208/WYG1208-0236c.png}
