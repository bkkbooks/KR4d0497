  - {type: variant, offset: 46, length: 1, content: 寐, WYG: 已生材無定所一物孰非已皇天仁且廣君道亦如此我思古唐虞當日誰共理巢由伏箕潁園綺居商顔洗耳甘自潔茹芝竟不還三傑足為理五臣安可攀髙尚誠所貴孔轍奚獨環吾聞有隠淪多在衡霍間飯牛腹長饑百結淒以寒懷寳羞自獻邈然老空山脉脉我所思彭氏躡遐蹤婉婉若處子未曾出房櫳相望四千里踰年闕相從五月君寄書九月逹京中我書欲報君書到歳已窮豈不懷繾綣無由覿君容参差天際雲縹緲乗朔風羽翼不吾施翩彼南飛鴻君有髙世行我無適時功天命人得違出處諒非同栢堂詩并序栢堂為劉母熊夫人作也夫人有淑徳年二十五而寡守志不嫁有子曰觀又賢作堂以奉其母請名於太史氏謂之栢堂而作是頌鬱彼北堂言樹其栢其栢嶷嶷維木之特栢之始生于彼髙陵雨露其凝金石其貞栢之既成鳯臆鸞膺言樹斯庭霜雪是憑雪霜浩浩其栢矯矯有美君子而弗偕老其葉欒欒其節桓桓其居安安永世式觀我堂既構我栢既茂天錫眉壽保艾爾後文安集卷一欽定四庫全書文安集巻二元掲傒斯撰獻張平章天厯肇𤣥朔坤輿集皇靈汴蔡既榛夷南海淪炎精圖書入天府将帥功業成寳玉被親懿茅土列公卿庻類奮休祥羣賢基太平明公紹鴻烈文采敵華聲出入三十年惕然心靡寧論兵軆安危攬轡思澄清矧宅股肱地夙夜在王庭名髙徳益難位隆責匪輕聖心誠𢎞裕臣節美戰兢唐虞登夔臯堯舜猶日升周召竭師保成康措王刑昌明願同濟援筆播芳馨題祝道士龍虎山先天觀圖聞説先天觀重重絶壁環鳥啼青澗裏花落白雲間樵子能長嘯居人識大還洞門無處認唯有水潺湲二貞詩關右有姬氏父子皆蚤世姑趙婦張皆以年二十五而寡守節不嫁作二貞詩關右有姬氏父子皆棄捐孀婦奉寡姑誓死各芳年膏沐誰復理羅襦委篋間辛苦事蠶繅祭祀亦靡愆父母既莫奪媒妁徒空言鳬鴈安所施幣玉視如烟寧與枯瘁没不為歡樂存婉婉桃李花春鳥何翩翩萬物各知時姑婦獨纍然史館獨坐地夐天逾近風髙午尚寒虚庭松子落欹檻菊花乾撫卷俱千古憂時有萬端寂寥麟父筆才薄欲辭官周待制致樂堂詩有堂渠渠在番之區維周壽母式燕以娯渠渠有堂在番之陽維周壽母式燕以康斯堂何有有蘭有芷垂佩蘂蘂維周之子斯堂何有有蘭有蓀垂佩申申維周之孫曰烝曰嘗孔時且具維甘維㫖承于壽母母曰寧只福禄凝只升斯堂只我心平只母曰嘉只福禄遐只升斯堂只我心和只馬氏巖溪圖何處幽巖下復有清溪㵼霧氣散長林湍聲落平野石宜白鳥憇樹想𤣥猨把誰獨此安居居人云姓馬山水圖幽人無世事髙臥謝浮名山崦晴時出溪流盡處行還聞有漁釣相問扣柴荆不掃門前路莓苔滿地生送道士薛𤣥卿歸江東知君此去漸難招只在人間已廓寥市上有時逢賣藥山頭何處覔吹簫仙巖華落溪流滿鬼谷雲開樹影遙未必故山安隠逸海天凉月夜蕭蕭大明殿退朝和周待制巍巍道徳拱羲皇濟濟威儀陋漢光日射龍文宫女扇風傳鷄舌侍臣香中霄景氣浮雙闕下界歡謡動八荒詞館小臣何以報皇圖聖夀與天長祖生詩浦城孝子身姓祖自憐性命如糞土生纔五歳遭亂離有母更被官軍虜零丁二十八春秋母縱得生何處求天地茫茫明月恨江山漠漠白雲愁忽得母書驚母在㸔書未盡淚先流書云流落河南縣河南蹋遍無由見唐州境上忽相逢白髪蕭蕭霜滿面誰知喜極情轉悲旁人更問初别時千生萬死到今日始為母子東南歸東南迢逓閩山路入門猶記階前樹居人傳説盡相㸔鷄黍提攜竟朝暮祖生母子真可憐少壯離别老大還同時鄉井被兵者㡬人骨肉能生全願生母子長壽考四海升平永相保孤雌行為郾城節婦作有鳥有鳥雌雄相追哺雛未飽鳴且飛雛未長雄乃死子亦隨朝朝暮暮唯孤雌長林廣野風日美歩歩不敢離故棲燕雀搖颺差復池迴身側腦遞相欺誰憐孤雌心到死終不移更有許州郾城徐氏母一生抱恨守空閨燕氏救兄詩千金之子不死市楚人竟殺陶朱子生者可殺死可生千金為重骨肉輕誰謂平陽有燕氏傾家乃出而兄死弟再有兄兄見弟里閭驚嗟官吏喜嗚呼安得天下之吏廉且循庻政如水無寃民送華尊師以天壽節奉詔祀武當靈畤嚴漢祠神峰標楚甸羽人丹丘伯承詔馳嘉薦華渚曜玉虹條風舞𤣥燕長淮南中瀉喬嶽雲間獻渉旬歴峻阯梯空答𢎞願授簡香始升掲䖍帝如眷天清翼軫動地肅𤣥武見飛響迥更聞竒祥靜逾絢是中有真侣蚤接諸方援胼胝負畚鍤鑿翠蓄雷電金芝産齋房璚雲冠巖殿祈禱無歳年㑹節方紛衍既協時君降又樂明祀徧聖厯齊堪輿豐澤周㝢縣還歸報天子獨徃奚所羡真侣謂張真人有道行送馬雍古御史撫喻河西我皇屬憂顧君子得安居孟春風且寒遣子以脩途四牡何翩翩迴首睇神都我懐正紆鬱殽函忽已踰積雪被長巒萎者何時蘇巋彼蓮花峰上出浮雲衢白日皦以懸下視若𤣥墟煙塵起西北原野無定株行者中顧懷居者念其廬黄河洶東流乃自崑崙渠四海豈不曠切若肌與膚親賢逺讒人古以致康娯君子誠多材乃用在馳驅秦隴阻關塞嵗月浩已徂鞠躬盡明義足為世所模送周山人之遼東物變風已暄庭虚雪猶在每與君子違偏驚嵗年改名山先夢到靈藥隨方采明月望行人雲槎隔遼海李宫人琵琶引鄠縣亢主簿言有李宫人者善琵琶至元十九年以良家子入宫得幸上比之昭君至大中入事興聖宫比以足疾乃得賜歸侍母給内俸如故因亢且乞詩於余遂作李宫人琵琶引其辭曰茫茫青塜春風裏歳歳春風吹不起傳得琵琶馬上聲古今只有王與李李氏昔在至元中少小辭家來入宫一見世皇稱藝絶殊歌翠舞忽如空君王豈為紅顔惜自是衆人弹不得玉觴未舉樂未停一曲便覺千金值廣寒殿裏月流輝太液池頭花發時舊曲半存猶解譜新聲萬變總相宜三十六年如一日長得君王賜顔色形容漸改病相尋獨抱琵琶空歎息興聖宫中愛更深承恩始得遂歸心時時尚被宫中召強理琵琶絃上音琵琶轉調聲中澁堂上慈親還佇立回㸔舊賜滿牀頭落花飛絮春風急題上都崇真宫陳宫人屋壁李學士所畵墨竹走筆作玊京灤水上仙館白雲鄉虚壁數竿竹清風生滿堂微吟弄寒影靜坐佇幽香有客仍無事淡然方兩忘集賢大學士趙國公王開府慶八十應制昭代雍熈日詞林賦頌時紫宸丹詔出甲第五雲垂裕廟青宫裏王公玉樹枝朝趨陪綺甪夕侍接龍䕫際㑹真難及飛騰已在兹暴公初繡斧方叔更藩維霜簡驚風采天官肅羽儀還迎代邸入竟被漢文知位望躋三少權衡俯百司每䝉天黼黻直許國蓍龜鳯龡廣寒殿龍舟太液池羽觴春侍宴玉座夜觀碁徳業前賢繼辭華後進推髙情睎廣受餘事擬徴珪全趙山河富瀛洲日月遲九卿㸔采服八袠表龎眉皇覧逢初度殊恩介壽祺黄封中使出玉食尚饔移國老陳嘉慶李韓公作序羣公播盛辭禮非前代有施及老臣宜福禄何人並忠貞百嵗期聖心誠念舊政用作臣規陵陽牟景陽以名祖父之子孫負竒材勁氣而與世不偶自台州教授入掾翰林一語不合竟棄去不顧以詩為别竒璞刖之媒蛾眉妬之具悄悄君子心皇皇百王度髙風集大木日夜如吼怒不畏枝葉殘但恐本根蠧曉登榮臺上天地一何巨白日光未吐羣星爛無數仙人五雲車縹緲玊清路區區隂陽中可望那可遇忽聞金鑾客嵗暮仍南去不得與之同頓足毛髪豎結羊腸詞正月十六好風光京師女兒結羊腸焚香再拜禮神畢剪紙九道尺許長撚成對綰雙雙結心有所祈口難説為輪為鐙恒苦多忽作羊腸心自别鄰家女兒聞蹤至未辨吉凶憂且畏須臾結罷起送神滿座懽忻雜顦顇但願年年逢此日兒結羊腸神降吉劉承㫖父大司徒邢國公慶九十應制聖主尊賢遂及親邢公盛事更無倫身躋九袠瞳方碧貌過耆年鬢未銀鳩杖乍頒寧畏噎龍章洊拜欲忘身上公建土山河富光禄分壺雨露頻析木天清雲五色梁園花發月重輪錫宴梁氏園三宫寵錫驚殊數四座稱觴半老臣瑞錦斕斒迎化日兼金條脱照芳春素烟冉冉晴熏上白雪泠泠艶曲新先世勲庸歸琬琰名家父子映冠紳三槐已驗移居日五柳翻如寄傲人澗底桃花曽閲世枕中鴻寳自頤神詞臣欲繼莊生作才薄何堪論大椿小孤山次韻小孤山前一迴盼蒼然始識孤山面隔江疊嶂開翠屏絶壁浮雲飄素練憶昔初䝉翰林聘艤棹探竒不知倦捫蘿渉級至絶頂目極神開氣為變大江東滙彭蠡來晝夜崩騰犇海甸笳鼓遙聞日月動帆檣忽度乾坤轉舟人不識造物竒但趣急趂南風便蚤悟微官七載縛底用區區厭貧賤深忩冷壁守編摩何異揚雄困雕篆重來勝地嵗云暮短景催人疾如箭天昏一火明山半石底猶疑有雷電彭郎磯下寒浪湧坐客正説龍君傳人生可喜還可憐世事堪違不堪戀明朝匡廬復入眼雖有此境何由羡武城先生獨好事名山每恨遊難徧豐城客子無一錢但當作詩乞如願贈别曾編修歸廬陵葬學士兄孟冬凉風厲謁告歸廬陵阿兄在九原嵗暮豈遑寧兄昔事武皇海内希英聲意氣動人主文采何從横時事一朝異長揖去躬耕令弟紹芳猷榮足在承明如何奄忽間南北隔死生方舟發京國日落烟霧青萬感縁中來惕焉如有懲羇臣戀魏闕一夕魂九升君子恩義重况此骨肉情情深不可忘悠悠道路長山川日夕改我行殊未央稍出燕冀都已涉齊魯疆高天圍四野悵望但茫茫道傍多古墳塋域遞相當荒草吹北風日夕下牛羊不知何代人於此閲興亡自古既有死誰獨免摧傷死者雖所同私懐詎能已塗路猶感傷况我兄與弟世俗日衰謝常懼莫能起生者忽若遺誰復哀其死念昔賢哲人一一去為鬼詩書捐篋笥采采當路子掞藻厠明廷幸與君子同矧在弱冠年已獲承其風家本聖門後孝友世所隆何意手足親一别曠音容及我南歸日舟楫復相從皦皦寒日高㝠㝠厲征鴻落帆滄江際𣺌然忽西東努力慎所托無為謾勞躬寄題臨川西磵范氏寓居蟾塘塘更西幽澗總堪題流水花間住孤禽竹裏啼石稜苔自合山徑樹相齊久客成真隐故圍應已迷尋舍弟將至東牢宿野店嵗暮尋我弟山行兩舍餘入雲攀磴道落日及村􅇕茅店溪邊冷松林石上踈如逢武陵客風景未應殊贈王郎王郎楚狂士意氣飛秋霜讀書一萬卷下筆數千行富貴視浮雲况肯矜文章十五恥閭里掉臂辭故鄉夜宿東海月朝買西州航瞋目王公前結客少年場一飲或一石一醉或一觴寧揖屠狗人不與俗士當千金不易笑歳暮單衣裳阮籍在窮途英聲連四方鸞翮有時鎩反愧燕雀翔世無劇孟交不及青樓倡燕趙如花人翠袂黄金璫不識豪俊士空媚癡與狂王郎逺過我坐我枯藜牀終夕無酒飲撫髀歌慨慷平明别我去極目空茫茫沈逸人東觀招飲山館野館青山下晴軒積雨餘招尋䝉逺客寂寞愧閒居空翠沾盃冷殘雲度谷虚從兹結朋好隨處問何如畫鴨春草細還生春雛養漸成茸茸毛色起應解自呼名題聶氏陶軒開軒南山下日對南山雲青松俯前楹秋菊被中園翳翳脩竹林清泉出其間嵗晏農務息銜盃樂餘閒時從隣曲㳺共稱稼穡難逹人貴知已俗士多所牽以兹謝簮紱委心此南軒列植既敷榮佳興日以繁讀書教兒子餘事焉足言送涂雲章訪舊武昌郤入京師垂雲厲驚風萬里摩髙圓蟠泥鼓巨浪豈顧九重淵毛生入楚庭穎脱俄頃間粲粲徐公子長嘯起丘樊朝辭豫章臺暮宿匡廬山大帆掛鸚鵡極目空波瀾黄鵠錦袍仙吹笙紫霞端相顧一笑粲青春滿南天黄金築髙臺更覺郭隗賢聨翩劇孟輩相逐入幽燕平旦九門開劍佩踰五千豈無一字薦傾倒平生言東風杏花開待我薊門前歸舟汀洲春草徧風雨獨歸時大舸中流下青山兩岸移鴉啼木郎廟人祭水神祠波浪爭掀舞艱難乆自知小孤山曉發和蔡思敬韻日落霞明錦浪翻厓傾石峭白雲閒乾坤上下雄孤柱呉蜀東南壯此關神物夜移風動地仙舟曉渡月漫山回瞻絶頂登臨處空翠冥濛杳靄間大信晚泊}
