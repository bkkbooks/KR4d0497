  - {type: variant, offset: 1772, length: 0, content: '', WYG: 門即萬里囘首惟浮雲豈無骨肉念身負天地恩白日出東峯緑樹徧平原歡㑹良未期佇情何由宣出處各努力還歸觀所敦贈髤者黄生髤飾肇有虞太樸已雕刓紛紛百代下巧宻何多端黄金間毫髪文螺錯斕斒竹樹冠臺殿祥雲隨鳯鸞五采被牀几豈獨匜與盤坐使圭璧暗所好移所觀黄氏擅良工出入}
  - {type: page-break, offset: 1772, content: '', id: KR4d0497_WYG_004-5b, image: WYG1208/WYG1208-0187d.png}
  - {type: variant, offset: 1773, length: 2, content: 洪峽, WYG: 十年馳譽必名流迎致皆上官美賈一朝起羣工那敢班藝絶誠足貴古道何由還送管録事赴東平走筆作十月燕地凍原野何蕭條征車臨長途行子去中朝濟濟同舍生載酒集河橋子當撫㷀嫠行役在晨朝脱葉辭髙林散漫復風飈離鴻别枉渚嘹唳空層霄一觴不盡傾何處相招邀東魯非逺邦録事非冗僚矧宅夫子地餘風諒非遥眷言懋殊績夙夕佇嘉招廬山郭敎授數相覔不見忽聞歸省却赴官雲南奉寄五言一首為别以答願交之意蕪謬忝詞館晨出歸恒夕親交猶自踈况乃未嘗覿誤蒙君子賞驅車數相覔暮見門間題中夜猶怵惕反愧應門子時奉氷玉色云何心所懽萬里西南役終乖携手好同是思親客過家君已先淹泊誰復識東風動楊栁河水流不息何以展所懐中心著金石和酬馬伯庸供奉史館閒題見示二首陰沈悶華館窈窕宜芳樹秋日透清輝晨飈翼輕霧飛文盡威鳯擢質皆振鷺平生寡儔匹及此同散聚云胡咸羇遊對酒恒不御羡君躡髙第早聽傳臚句時從鴛鴻侣縱轡驊騮路紬史吾豈堪讀書君不誤飛葉滿京華青松臨廣筵連翩集軒葢卓犖皆時賢青松豈不髙衆草自芊芊感此理文翰恒恐迷所先蒐獵殘缺間終嵗不成編矯情或傷直含辭非取妍宣尼萬世標斯道庶昭宣元功既森列羣䇿咸牽聨終焉懼非才申旦長惕然重送曽應奉及周鄒諸君子晨興戒徒旅行子即長路天衢風雨過升陽在髙樹發輛東南門解櫂紛徃緒迴瞻彤庭闕彷彿玉堂署遺榮誠所難勇退無枉歩聨翩數君子意氣更相慕文采掩春華清言敵朝露超遥去留迹曽何悋情素懿此昌明時各有丘園趣熊英德哀辭靈飈戒先路疊鼓中夜發旌旐揚廣衢輀車出城闥素緌紛前逝䟽麻森後列罔罔迷據依營營㑹精魄流雲㝠飛葢平野一何濶慟哭}
