  - {type: variant, offset: 2014, length: 0, content: '', WYG: 乎松竹之間或綸乎清池之上雲山烟水交錯乎指顧之間而園中之趣雖萬鍾之禄不與易也是故志定者不遷理達者不惑事治則情逸心曠則境融雖崇䑓累榭奇芳異物之觀名姬淑媛哀絃急管之奉惡足並語哉叔俊於是不可及矣其子棣請予記之為序其說俾刻於亭楊氏忠節祠記廬陵楊氏作忠節祠者何昔金人侵宋沿江諸郡皆望風奔潰其先忠襄公邦爻以建康通判被執大罵死韓侂胄專國擅政柄文節公萬里以寶謨閣學士家居聞之三日不食死故合而祀之也中祀建康通判贈通奉大夫存者何甞以直抗蔡京為楊氏忠義開先也别祀廣東經畧使長孺吏部郎官孫子同知崑山州事學文者何經畧仁聲義實風槩天下在廣東三歳禄入七萬緡盡以代民輸丁租不持一錢去吏部闓通敏惠奉法循理為時良臣崑山好德尚義能以私錢復文節故居割田百畆以建祠事皆克紹先烈者也天下楊氏皆祖漢太尉震廬陵之楊則自蜀徙葢太尉之孫唐國子祭酒膳從僖宗幸蜀而居眉者之後也自秦漢之後有天下卓然有三代之風者宋而已方其盛時歐陽文忠公以古文正天下之宗明王道之本及其衰也楊忠襄胡忠簡以大義折敵國之氣奮中興之運當其亡也文丞相斬首燕市終三百年火德之祚為萬世亡國之光而皆出於廬陵何其盛哉夫卓然可繼三代者宋也然夏之亡以桀之暴殷之亡以紂之虐又以湯武繼之宜其東征西怨無思不服惟周以弱亡與宋同然周之東遷亦有楊忠襄胡忠簡乎周之亡亦有文丞相乎是能使周之亂亡猶有愧於宋者楊忠襄胡忠簡文丞相也文丞相之死豈非有忠襄文節為之標凖乎不然何又出於廬陵也忠襄不可及已至若文節年六十餘已懸車告老將二十載矣聞一權臣擅國遂至餓死使在文丞相時當何如哉故廬陵若歐陽氏楊氏胡氏文氏又有身致乾淳之治若周文忠氏皆國家之元氣也而歐陽氏又廬陵之元氣乎崑山之子元正請記忠節祠故并及之嗚呼觀楊氏祠則廬陵多賢之故楊氏人物之盛宋三百年養士之效亦可見已世好言士無益於國可乎元正亦楊氏之賢子孫也由太常俸祀為江西行省屬祠成於大德七年記作於元統二年孝通廟記臨江新淦之上㳺有鎮曰峽江鎮有龍母祠曰孝通之廟古祠在今德慶之悦城鎮峽江受吉贑南安諸水又豪商大賈之所㑹兩山如束水勢湍悍嵗數壊舟楫必有甞受神賜於嶺海之間而分祠以厭水患然不可考矣凡舟楫上下水旱疾疾必禱焉至大二年鎮民廣文壽既倡義以敞其樓延祐改元王友忠復新其殿至元二年丙子之夏余扈從上都廬陵龍立忠始介臨江孔思濟及其郡人李源請志麗牲之石夫作於始封之廟則有唐宋之碑今作於分祠必槩見神之始末俾乞靈者知所本也按唐李景休趙令則碑為秦温氏之媪漁於程溪得巨卵藏於家生七龍五䧺二雌從而豢之鱗角既具乃放之江媪日候江次龍輙薦魚於媪若致養焉者始皇帝聞之召媪媪行中流龍挟舟而還媪死鄰人𦵏之程之左澨絳水之濵後有衰麻而杖哭諸墓且惡其廹潮汐也一夕大雷電遷之高岡鄉人祠之始此自唐天祐歴宋由永安郡夫人五命為崇靈濟福妃五龍子皆爵徹侯二龍女皆夫人額曰永濟改曰孝通大觀二年所賜也夫物於天地莫神於龍有功於天地莫大於龍故其德配乾為鱗蟲之長出入變化不可測度媪非產龍徒以豢育之恩生則薦鱗食以養之死則為衰麻以䘮之遷宅兆以寧之學士大夫之子孫有所不能而龍能之則知忠孝之大節又莫過於龍也龍之德其至矣乎夫龍潜於深淵之中待時而動所以感雷電降雨澤鼓濤浪摧崖裂石皆龍之能事也而謂善覆舟溺人非龍之心也有違孝悖忠賊仁害義自絶於天者適與之遭耳宋之時吾里有孫先生伯温者攝象州守部饟襄淮渡巢湖大風濤㡬覆舟先生朝服拜於舟龍若出答拜水上風立止龍之佑助善人如此苟為善龍有弗佑之者乎由是觀之人之遇覆溺者非龍也人也福善禍淫天之道求福不回人之道天人之際龍知之矣媪以慈致龍之孝廟食千五百餘載龍其可誣矣乎敢書以告乞靈者至元二年丙子}
