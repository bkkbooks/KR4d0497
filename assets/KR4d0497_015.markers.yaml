  - {type: variant, offset: 1968, length: 0, content: '', WYG: 送劉真叟赴廣東憲幕詩序淮西有賢士曰劉君真叟初從諸生間有能諸聲至大初部使按行至郡其掾方端甫剛直亷正人也雅知人聞君名即言部使者命有司貢焉將用為掾㑹有令君以南士罷僉事鄭公善明獨深惜其才不得用君方閉門讀書大肆於學將就試有司延祐七年春鄭公持節南海道遇故掾張信卿語劉君甚悉召與俱君歎曰士為知己用用不用命也吾不可以負鄭公乃杖䇿踰梅闗下韶水不逺二千里往從之適余遇於章江之上諸士友為詩以艶其行復請余序所由來然余觀劉君以粹德實學長才修名政恐區區一掾不足以辱劉君而鄭公能知人如此能下士如此劉君固不得辭是行也夫公卿下士可以觀其政矣君子見賢人出可以占其時矣故余不以劉君受知鄭公為喜而以鄭公能知人下士為喜不以劉君得一掾為喜而以賢人君子出應其時為喜劉君勉乎哉余望子於青雲之上復繫以詩曰新裁桂楫發龍舒南度梅闗謁使車霜氣春隨五色筆虹光夜入滿船書天涵聖澤鯨波澹雨洗蠻荒瘴霧虛日晏從容蓮幕裏知君隨地有安居宋史論序傳曰五帝異樂三王不相襲禮聖人非惡同而好異也勢不能也是故聖人執經以達道君子因時勢以立業經有定位權無常勢變化消息與時皆極知此則可以明古今之故而制當世之務矣集賢大學士樞宻院使大梁王公歴觀先儒論前史之得失必責以五帝三王之事乃本司馬氏通鑑作歴代論史一本陳均宋編年備要作宋史論凡十數萬言不為甚高之論而求中行之實不務辭藻之富而求理義之當執經達權得易隨時之義彰善黜惡有春秋責備之法所以求當於古人垂訓於將來也而於宋論尤加詳焉其稱太祖之得天下也無異前代而能建過唐之祚接繼堯之統者立國以仁設教以儒此有道之長也所深惜者太祖無婁敬之臣太宗有魯桓之行神宗首用王安石以啓宗室衰削之深根哲宗起章惇徽宗任蔡京以致播遷之極辱高宗為中興之主而李綱張浚廢痼宗澤憂死岳飛殺黄潜善汪伯彥秦檜之徒彚征旅進更為腹心拒絶和之議棄恢復之㡬甘宴安於窮陬忘祖宗之大恥孝宗既非剛明之主徒聲北伐之辭寧宗之疾委柄侂胄理宗之立歸德彌逺羣邪輻輳善類日消不顧唇齒之謀竊取復讎之美馴至度宗權歸似道欺君敗國卒至覆亡三黨之禍成於三變四凶之毒繼於五鬼反覆小人之情狀痛悼君子之椓䘮讀之千載之下猶當拊膺扼腕流涕而永歎也至論其家法規制人才文物則薄唐而陋漢南北並國則帝宋而黜金以王欽若収濕榖蠲旱租放逋責吕惠卿却西夏丁謂經制施黔雖小人猶有所取趙普修私怨韓琦刺義勇司馬光改助役范純仁復青苗劉摯等議調停文彥博吕大防主回河冦凖薦丁謂張浚抑李綱殺曲端引秦檜雖君子而猶有所憾若此之類不可殚陳皆矯然出於羣思衆見之中嶷然立於大公至正之表所謂聖人復起不易吾言矣嗚呼讀詩書而不知經權之道時勢之宜孔子曰雖多亦奚以為夫國以賢興以諛衰君以忠安以忌危何自古人主之悟者恒鮮也以公文學行藝才識噐度直内而方外憂國如憂家身事五朝位歴二府䧺名碩望將五十年猶以餘忠遺智託之空言使天下後世之為人君為人臣者知所龜鑑而為宋成書者亦有所折衷焉雖然今天下之望於公者其止是哉敢書以為宋史論序文安集卷八欽定四庫全書文安集卷九元揭傒斯撰序送劉以德赴化州學正序學校非三代之教久矣然猶幸學校未廢儒者知有所依歸况窮荒遐徼使無學校安知有所謂聖人之教哉故學校者教化之原而人心之所係也我元建國餘六十載矣崇儒之意非不至興學之令非不加俊造之士非不舉而用之而猶未能浸淫乎三代之教者旬宣之道未盡亷恥之化未興詬病之風未除也職教之徒擁腫腆䏰孳孳焉䂓錙銖計升斗是急使夤縁之吏間窺隙伺日相與為欺安敢望有三代之教哉幸而學無廩稍又幸而遇賢有司又幸而近大府或知所自愛此外所甚大幸者教官能自賢能自賢或不遇有司又不能以自立若今廬陵劉君以德所得化州者廩稍之有無有司之賢否不可知既不近於大府而逺在數千里外然俗無美惡地無逺近教之化之在我而已况君有學有行家足以自給稍得一賢守令自拔於上他日五嶺之外窮海之濵有善教者必自君始愛之慎之吾將洗耳於北闕之下送張都事序天子既建奎章閣置大學士二人侍書學士二人承制學士二人供奉學士二人參書二人非甞任省䑓翰林及名進士不得居是官明年増置大學士二人典籖二人典籖秩從六品初命英宗龍飛進士第一人台哈巴哈兼善丞相掾張景先希哲為之希哲尋去為禮部主事又以丞相掾張中立惟正繼之居一年兼善拜南䑓監察御史惟正以遷江西行省都事天下之選莫重於省䑓或由省䑓入為閣官或由閣官出居省䑓則閣官之選與省䑓等而又必天子親擢之惟正一歳中兩被擢皆得天子所重地其日夜求所以稱塞固宜余與惟正同僚同與修皇朝經世大典惟正無一言不及於仁義無一事不致其精詳余常謂惟正居職任事無不及者江西號繁劇難治然繁劇在郡縣無在行省行省苟得其人雖使郡縣皆務為簡靜猶反掌耳江西難治莫甚吉安然以前江西亷訪使馮君輔今揚州總管納懐治之政未甞不行訟未甞不簡吏民未甞不心恱誠服非惟不能欺至不忍欺是故為政係其人不係其地而君輔納懐之在郡也上之人惡其異已也沮之抑之不遺餘力卒不能安其身以去江西之政日益弊民日益困加之以饑饉重之以疾癘有司恬然莫之恤者果誰為之耶故天下郡縣不患無賢守令患上之人不能正其好惡以示其嚮方公其衡鑑以别其淑慝扶其善類以激昂其志氣耳故行省者郡縣之標凖也苟標不正凖不平欲其影之直鈞石之和得乎今惟正之佐江西也以平章全公之簡重亷正惟正之精實謹敏相與存大體略細故先人而後已使君子得以行其道小人無以騁其姦民之有瘳也必矣惟正敬之勉之其毋忘天子親擢之意他日有論奎章人物曰惟正惟正則僕也與有榮耀焉送藝林庫提㸃畢申達棄官歸養詩序世言忠孝不兩立忠孝亦有二乎見於事君謂之忠見於事親為之孝人見其孝也而不知有忠之道存焉曰孝而已矣人見其忠也而不知有孝之道存焉曰忠而已矣一行非孝非忠也一念非忠非孝也天地之大也日月之明也人物之衆也其可感而通者莫疾乎忠與孝也雖庸人孺子一行其孝而風俗為之變世之行政施化有弗能焉雖孱卒賤𨽻一行其忠而天地為之重世之守職任事有弗及焉况身為名父之令子聖天子之賢臣者乎一出一處豈無所係哉藝林庫提㸃樵隠君兼才德之名懐忠孝之實昔者天子既奪其養而寘之藝林矣君不以筦庫為卑而怠其事又命攝授經而列於奎章矣君不以師道為尊而貪其榮一旦棄官歸養如孤雲之遇飄風瞬息而不可留也雖賁育之勇不能過焉濟南之士豈無所動其心哉即使君日居朝廷之上奉一職效一官其忠亦如是止耳今退居庭闈之間盡甘㫖之奉謹温凊之禮父母樂之鄉黨稱之使天下聞者父以教其子兄以訓其弟相率而歸於孝弟之化以相隆平之治其為忠也不亦大乎故君子處亦一忠孝出亦一忠孝烏可岐而二之哉昔親之壯也而不知事其君是不孝於親者也親既老矣而不知事其親是不忠於君者也天下豈有不忠之孝不孝之忠哉則樵隠君之出處交得其道矣君行矣余欲歸養而無所用吾情焉車既膏馬既秣凡工為文辭者皆詩以送之而奎章閣承制學士李公命余為之序送伊蘇達爾齊序自科舉廢而天下學士大夫之子弟不為農則為工為商自科舉復而天下武臣氓𨽻之子弟皆為士為儒非昔之人無聞知而今之人獨賢也顧在上之人所以導之者何如耳國家臣妾萬邦南北為一餘六十年而教化不興風俗日壊奸宄屢作者任法律而務財用也仁宗皇帝赫然奮起賔興天下賢能而用之雖刀筆筐箧之末并欲傳之於士天下孰不釋耒耜而談詩書投干戈而從筆硯行之二十餘年孔孟之道卒未能大洽於天下者仁宗皇帝在位日淺得人未衆作養之士未成新荑稚蘖不足以勝夫深根固蒂牛羊日夜又從而牧之信道篤者類指為迂濶稍出芒角為國家分憂者盡格之下位急功利者遂從而彌縫附㑹覬旦夕之餘景而不知已為他人所銜轡矣自是法律愈重儒者愈輕羣然鼓簧謂士不足用科舉無補於國計不罷不止嗚呼果孰為國計哉至元初從軍襄樊有察爾齊者哈喇婁人也以功為千夫長察爾齊傳圖嚕罕圖嚕罕傳圖琳台三世皆戍建昌而三世皆賢圖琳之子伊蘇達爾齊從郡人李宗哲學進士業有聲今年夏從其婦翁増城左君至京師拜余程文憲公故宅貎粹而氣和才清而志鋭他日必為名進士然君子之學非所以為冨貴利達之媒也所以進其德而達其才者也故其學不止於為進士夫文以制治武以定亂法律以輔治財用以立國皆君子之事所當學者且文武非兩途也用之制治則文用之定亂則武非文之外有武武之外有文也法律非不任也任之以為輔治之具非為治之本也財用非不務也生之有道而用之有節非瘠民以肥國也故君子之學也用以致其君則為堯舜之君用以治其民則為堯舜之民非徒學以自别於農工商賈而已國家養之必以其道待之必以其誠任之必盡其才非徒用以竊任賢之名而已然學在我養不養用不用非所計也而用不用實闗天地之否㤗國家之盛衰吾道之通塞此君子之所憂不敢計焉者子歸第務學焉勿以科舉廢興為去就當天下任者倘有仁人之心不忍坐視淪胥於苛暴慘刻必有為國家計者也幸勉旃毋自畫沇溪先生文集序豐城文物之盛自漢徐孺子以高士之節讀書龍澤山中為太守所禮唐王中丞以風后力牧之望㽞滯江湖為詩人所嘆至宋彬彬不可勝載矣而黄氏居沇溪之上相望數世以文章學術顯名天下葢自柳州公始公諱得禮字執中由元祐三年進士三遷而為柳州推官年三十九以卒其享年少其歴官未乆故其行事不能大暴於天下觀其遺文則可得而論矣公之詩沉鬱䧺健有矯齊梁晚唐之意公之文辯博閎大有憂天下之心蓋當國家盛時其氣渾其政平故其發於文也和而莊直而不遷至若論唐大宗遺憾於魏徴有恥不及其臣之失牛李之禍罪在德裕不能以公滅私陽城愛弟不娶甘棄父子兄弟夫婦之大倫為素隠行怪其志於世為何如也紹興初公之𤣥孫原編其遺藁得詩九十二長短句五史論十雜著九拾遺詩二長短句一及附録四首離為四卷至淳祐中其子脩紀始刻之已而燬於兵今公七世孫璧將復刻焉而屬余為之序惟黄氏由金華徙豐城蓋數百餘年矣訖宋之世登進士第者十有三人而公之子吏部郎中次山公之孫禮部尚書疇若為最顯其行事則載之國史其文章則吏部三餘集尚書竹坡集世多有之故不復論無底書囊序無底書囊二卷故族父竹泉先生所著之書也先生諱垚翁字汝和世為豫章豐城人父諱涇伯父諱士林皆受學}
