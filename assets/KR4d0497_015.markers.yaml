  - {type: variant, offset: 68, length: 1, content: 夢, WYG: 落俱為實賤妾在空閨志願從此畢題内府畵四首應制韓滉土星像五行土居中百獸牛有功土行降為神騎牛白髪翁有土復有牛惟神賜年豐誰知韓滉意政與皇心同曹將軍下槽馬圖曹霸畵馬真是馬宛頸相摩槽櫪下卓犖權竒果如此豈有世上無知者朱絲不是凡馬韁天閑十二皆龍驤曽從天子平四方畵圖彷彿餘驪黄華山之陽春草長韓幹馬韓幹畵出曹將軍幹惟畫肉猶逼真昻藏囘顧欲飛去老奚安知馬有神想當此馬未畫時朝刷呉越莫燕秦頓轡長鳴風動地不數驊騮與騏驥當時用舍那知許粉墨蕭條尚雄武千金駿骨何足論萬世長留羣玉府宋徽宗成平殿曲宴蔡京圗御畫御記東京諸蔡滿周行延福成平樂未央十畝松篁籠玉殿九霄風露濕霓裳君臣契合同堯舜禮樂光華邁漢唐明日圖成仍作記千秋留與監興亡送秘書李道濟赴峽州幕蓬萊道山芸閣裏赤甲白鹽蓮幕中十載同朝君獨去三年佐政我難同大河水滿中宵雨鉅野樹凉清曉風夷陵江頭幾日到迎親應先南飛鴻奉送全平章赴江西聖主恩南土明公起集賢直期凋瘵後共致太平年金虎分符重文龍賜服鮮權綱兼將相標格近神仙天地三江外星辰北極邊丹心齊出處素志在陶甄請述江南事都非大德全但徼扶弱美竟坐抑强偏無復同憂樂徒令舞智權平疇吹渤澥暗室仗戈鋋貪虣明相訓忠良黙自憐民心隨日壊世態與時遷况復兵饑接仍聞疫癘纒誅求殊未巳蟊賊轉相挻若擬寛憂顧先須解倒懸乆饑寜擇食多病但求痊一語堪懲勸微機足轉旋已知平似水更道直於弦遥想聞公志渾如望嵗然九重天上别百丈霧中牽日月明金節山河入畵船四方初息馬五月正鳴蟬豐樂田多黍生香濼有蓮岱宗標魯地廬嶽壓湖天水怪收崩浪山靈掃瘴烟歡呼麟鳯出踴躍吏民先笳鼓趨雄鎮旌旗覆廣川下車和氣應袖手頌聲延膏雨侵淮甸仁風扇海壖忠貞真世篤調燮有}
