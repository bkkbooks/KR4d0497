  - {type: variant, offset: 5, length: 0, content: '', WYG: 書文安}
  - {type: variant, offset: 6, length: 3, content: 補遺飲, WYG: 卷一元揭傒斯撰臨川女我本朱氏女住在臨川城家世事趙氏業惟食農耕五嵗父乃死天復令我盲莫知朝與昏所依母與兄母兄日困窮何以資我身一朝聞密言與盲出東門阿母送我出阿兄抱我行不見所向途但聞風雨聲行行五里餘忽有呼兄名兄乃棄我走客前撫我言我與趙世親復與汝居鄰聞汝即赴死扶服到河濱我身盡沾濡不復知我身汝但與我歸養汝不記年涔涔遵旋路咽咽還入城城中盡驚問戚促不能言望門喚易衣恐我身致患再呼我母來汝勿憂飢寒汝但與盲居保汝母女全我母為之泣我鄰為之歎喜我生來歸疑我能再明况得與母居不異我父存我今已十三温飽兩無營我母幸康强不知兄何行我母本慈愛我兄亦艱勤所驅病與貧遂使移中情當日不知死今日豈料生我死何足憾我生何足榮所恨天地生不如主翁仁誰能為此徳婁公名起莘夏五月武昌舟中觸目兩髯背立鳴雙㯭短蓑開合滄江雨青山如龍入雲去白髪何人並沙語船頭放歌船尾和篷上雨鳴篷下坐推篷不省是何鄉但見雙雙白鷗過}
  - {type: page-break, offset: 6, content: '', id: KR4d0497_WYG_001-1b, image: WYG1208/WYG1208-0151b.png}
  - {type: page-break, offset: 6, content: '', id: KR4d0497_WYG_001-2a, image: WYG1208/WYG1208-0151c.png}
