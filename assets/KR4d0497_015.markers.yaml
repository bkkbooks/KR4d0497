  - {type: variant, offset: 2031, length: 0, content: '', WYG: 之號非劉整之叛無以周知渡江之謀天也整之謀亦非整之謀也陳亮上孝宗封事料敵之言也整本制置使趙方麾下一小校耳拔之行伍之中用以為將方將死語其子葵曰劉整真將才也然汝不能用我死汝必殺之不殺必為國患方死葵不忍殺竟以瀘州叛元遂用其䇿以滅宋亦天也嗚呼得人則興失人則亡古今同軌可不監乎若昔刺公之屢使不辱郝文忠之終}
  - {type: variant, offset: 2032, length: 4, content: 信靈峰路, WYG: ''}
  - {type: variant, offset: 2037, length: 3, content: 迷却被, WYG: 渝偉哉題鄒福詩後右鄒福詩七首鄒福者吾鄉田夫之子也粗讀孝經論語家貧與人傭耕泰定元年子居憂於家其父遣從余給薪水之勞然暇即宻自觀書居五年余攜至京師會新天子入正大統以文徳治天下明年春開奎章閣詳延儒雅講論道徳置授經郎以教勲舊大臣弟子之在左右者以國子教授廬陵林希顔及余為之寅入而酉出令福守舍乃盡日閉門讀書習字間為小詩及暮則請可否于予余或方倦欲休或方讀書有會意處或執筆為文章思方屬必輟而告之不使幾微見余懈怠意遂以為常今年秋遷丞藝文日簡靜}
