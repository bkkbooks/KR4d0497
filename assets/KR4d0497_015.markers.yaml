  - {type: variant, offset: 2050, length: 2, content: 曽知, WYG: 見夫人兮聴不聞其笑與言風纚纚而不絶兮雲漫漫而彌天日翩翩而赴海兮水咽咽而流川匪美人之淪謝兮余孰為之悁悁惟叔父之堅貞兮謂金石莫與齊其固胡獨為此春氷兮溘朝陽之零露}
  - {type: substitution, offset: 2052, original: 黄, replacement: 黃, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20825}}
  - {type: variant, offset: 2054, length: 0, content: '', WYG: 可塞而陸兮崑崙可鏟而夷慨夫子之不可以作兮使我心怵而神悲樸樕擁聳而蔽天兮松栢仆而在泥荃蕙羃䍥而沉穢兮百草厭浥而揚輝鸞愔愔鎩六翮以投棘兮鴟鴞髙舉而天飛犂牛仰空躍踔而長鳴兮驊騮騊駼躑躅靡徙而不肯馳世豈獨無此美人兮悵予世之日替入始與余言兮出反以為戾毁大璞於九逵兮和氏雖死其猶悲傷洞庭震蕩而噴薄兮咸池之音反淪降彼燕石之頑礦兮夫乃珍緹什襲而藏之彼鄭衞之淫哇兮夫乃嚘啾㗲啞而揚之嗚呼悲矣哉予方搆厦屋之巍巍兮何中道而奪此規矩予方鳴塤箎而會音兮何不留此律吕涕緌緌以沾裳兮心怦怦而煩騖目宛宛而凝望兮愁綿綿而誰語旐翩翩以摩雲兮夫子何不少留夫子終不可以留兮徒使我旦暮鬱壹而增憂夫子其天飛而地降兮雖欲從之莫知其由嗚呼噫嚱兮我心悠悠九招一首為故嗣漢三十八代天師張留公作維真人之夀命兮敝天地而弗終寧厭濁醜穢兮溘上征乎太空雲繽繽而鱗萃兮先鸞羽之溶溶神君紛而下迎兮儵陰陽而景從上下莫知所極兮四方曷其所窮仙其歸兮無使予之忡北斗偃蹇以酌元氣兮四時相推其迭序石有時而泐兮金有時而失固合純一之至真兮豈形器之能度夫人有此美質兮曽至死而莫悟仙其歸兮導余夫歸處觀世俗之淫巧兮曰雕樸而琢淳梟獍呀而狂噬兮謂虎狼之至仁悵投足之無所兮誰獨與予乎密親雖忠信之足憑兮又豈人之能信願髙舉而逺引兮逝安闕兮余淪志而合神豈余身之足畏兮竊獨哀此闕雷霆兮草木何由而發生旱魃熇而夏見兮吾闕雨不得穫兮冬炎燠而鬱蒸虹霓朝而東陟闕心怲怲而煩亂兮仙翺翔乎太清仙不歸兮孰闕風颮而怒越兮𤣥霧惑乎四維揚旍旂於}
