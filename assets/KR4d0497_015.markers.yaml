  - {type: variant, offset: 1777, length: 0, content: '', WYG: 濱哀歌青林樾翔鳥為迴薄我馬如顧秣農夫釋耒嘆行子憑蹊惻共隐善人䘮矧承君子列平居異山隴累别兼嵗月規戒晞暮齡歡燕中道歇時哲衆所屬六十非短折撫物自傷摧瞻望猶慌惚南轅懌歸斾北首悽徃筏千春驥岑趾流藹餘篇帙宿草日已深聲容閟幽泬雜詩東風吹百草沿路一時生繁桃與夭杏徧野復盈城東隣宰肥牛西里按新聲孰不乗時節為樂快心情平明出南郭登髙望帝京大哉山河固喟然獨撫膺社日𤣥鳥至入我髙堂飛舊泥幸未拆新泥復相依豈徒安爾身復欲長其兒言語嬌且閒上下遞差池勿因秋風起相逐忽還歸嚶鳴出深谷草木皆華滋昨日悲嚴霜爛漫揚光輝鷄鳴車馬動日暮交横馳賤士錦鞍韀貧女金裳衣各願得所欲及此艷陽時青青孤生松髙出浮雲中下無嘉樹林上有萬里風俯視原上草秀色何豐茸自顧豈不髙獨立難為容常恐本根蠧委此蒿與蓬城南有名園車馬何喧喧緑池夾髙栁百草朝且鮮平明集髙臺日暮不能還美酒百壷少豐厨豈論錢麗服羅四座急管應繁絃燕歌儼成行趙舞交蹁躚但得主人顧陋質自成妍還過舊遊處池館謾依然寓興五首夀呉大宗師古稱神仙人乃自秦漢間由來英雄士重已輕人寰子房遇黄石取履非所艱一朝從赤松髙風安可攀我生後千載獨立當𤣥闗昔有安期生本是漢竒士髙視}
