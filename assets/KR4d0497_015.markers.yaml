  - {type: variant, offset: 44, length: 0, content: '', WYG: 可忘年盧學士奉㫖南祀海嶽繇鍾陵相别聞尚宿留㑹稽有懷奉寄鍾陵一分手㡬日過錢唐五日山隂路千峰海上凉烟霞含景氣草木識天香夙昔經行處風深轉不忘病夜素壁深藏獨客身桃枝薑胯只為鄰極慙供給煩賢友尚恐傳聞及老親蛬響戒寒相應起燭花連夜為誰新多情造物真豪縱盡力相驅病與貧得程翰林揚州消息皇明屬休期側席佇貞良游麟既集藪鳴鳯亦在岡君子乗時興出餞何輝光車馬塞江介笳鼓凝羽觴時秋風雨交四顧野茫茫晨鉦激中流飛斾忽異方蓄思遵旋軌浮雲紛北翔道路間邦畿草木隕寒霜晷景倐易流悲來但徊徨君懷經綸憂我負灾疾妨鶱沉固異趣情誼結中腸居下衆所夷在賤誰不忘宛緬廣陵翰胡獨置我傍鬰悒憎愁思投袂睇莽蒼自顧匪茅茹委跡任空墻淵淵賢逹心悢悢情内傷歸故園新居落成後作親老身仍苦家貧歳更凶掄材斤斧後發地草萊中面勢㸔前跡歡呼集衆功聊存今日意敢望昔時同漂轉何多歳艱難且定居隣人供菜菓穉子進詩書稍覺牛羊逺兼知蔓草除此園三百載亦復返吾初山行稍出羣山復渉溪溪光山色冷相輝青裙獨踞溪邊石不顧行人自濯衣寄題馮掾東臯園亭時雨散繁緑緒風滿平原興言慕君子退食在丘園出應當世務入詠幽人言池流澹無聲畦蔬蔚葱芊髙林麗陽景羣山若浮烟好鳥應候鳴新聲和且閒時與文士俱逍遥農圃間理逹自知簡情忘可避喧庻云保貞和歳暮委周旋宿梁安峽夢故室有感時還盱江梁安峽裏杜䳌啼絶壁蒼蒼北斗低雲氣倒連山影合石稜斜鬬浪聲齊南風盡日迎歸客落月空江夢故妻一室十人分數郡百年幾處候晨鷄送趙仲逺甌寜仍為令尹去如送武夷仙舊政閩人説新詩海客傳度關風散暑下瀬月依船不奪循良意因知幕府賢山莊晚立有懷舍姪沆督穫臨川䔩䔩黄桑葉蒼蒼白竹峰居人争野碓歸客背村鐘路暗縁溪濕山寒著霧濃阿咸收稻未辛苦闕相從哭王十良仲深谷可為陵大海可為田唯有死者窮無由覩青天千古黄壤間萬古黄泉下精神與時息形質隨日化日落朝復生月缺望已盈不知死者别何時見形聲悲哉復悲哉已矣復已矣我友初五人今焉忽成四死者不復見生者别離多人生如春花美好知幾何欲為生者歡須念死者苦死生日相尋歡樂如糞土雨述三篇江南臈月天未雪居者單衣行苦熱連山郡邑瘴盡行豈獨嶺南與閩越逋民穰穰度閩山十人不見一人還明知地惡去未巳可憐生死相追攀近聞閩中瘴大作不間村原與城郭全家十口一朝空忍飢種稻無人穫共言海上列城好地冷風清若蓬島不見前年東海頭一夜潮來跡如埽冬來一晴四十日三日南風當有雪不知閩嶺今何如念我故人書斷絶劍南判官心所親甌寧大夫政有神腐儒多事浪憂喜安得貽書兩故人春暮閒居寄城西程漢翁十五韻迢迢曾城阿峨峨鳯凰山下有隠淪士能為淮漢言兩日一寓音五日一承顔每談經濟事恒及離亂間言辭多忼愾文字少凋殘不歎東逝川但憶南山田寜與無心遊不受衆目憐褰衣必峻崿散歩亦名園舒卷信在襟蕭寂固所安經春僒疾痗撫時增懦孱羣書亂藥裹髙卧掩荆關蹇余屬乆要朝詣常暮還醜劣愧高情焉知君所觀日出衆鳥語蒼岑滿樓端申章寫深誼謭薄何由宣長風沙夜泊長風沙風沙不斷行人嗟行人嗟柰君何南風正髙北風起大船初灣小船喜移船更近大船頭不獨風沙夜可憂但祝行人好心事長江何處是安流茅屋参差數株栁時平尚置官軍守青裙老嫗詫鮮魚白髪殘兵賣私酒魚賤可買酒可沽他人心事知如何何郎失鏡詞團團如月不曾虧家人親置枕中時朝朝將正頭上幘時時攜鑷鬢邊絲古文宛轉何人造失來始覺今難討街頭不値半緡錢古銅終較今銅好向人不敢再三尋客裏空疑同舍心萬里相隨一朝别夜夜還瞻天上月贈青城侯尊師次人韻聞説名山采藥蹤多從雲去少人逢蜀江春老歸難定燕谷寒來望轉濃案上僊經新長蠧匣中雄劍舊降龍不知少日尋真處還在青城第幾峰贈友天道有恒運君子蹈其常時物自熈洽庻心亦惟康鄙人寡慮思沴氣冐隂陽霜霰中夏零焉得不摧傷先聖有遺訓血氣戒方剛懿彼老氏言舌齒分存亡反躬實明哲觀色屢廻翔正徳詎云害率欲乃非祥勿謂曐空明不足輸景光勿謂徑寸莖不足載春芳推餘暨昏朝懷哉安能忘曉出順承門有懷大虗歩出城南門悵望江南路前日風雪中故人從此去京城閒居雜言八首都城列萬雉樓觀切飛霞太液深蕩潏廣寒髙嵯峨重譯踰萬國流聲竟四遐既寵瑰異才復保勛舊家忠厚企行葦明照徹羲娥永惟皇上徳世世襲亨嘉冀北多良馬漁陽多壯士馬休伏槽􅌴壯士習農器桑棗竟中州朝貢四方至外無烽燧警内有耳目寄逍遥放良時歡樂永不替濟濟從臣内赫赫公與侯伊昔從我皇守邊瀚海頭荷戈十餘載力戰如己憂寸䇿無遺用長智少淹留勞多必重賞功大靡輕酬意氣相傾動恩深身若浮天子乗六龍垂衣臨九州茅土亘河山甲第隘莊馗四海仰光耀出入擁華騶富貴欲如此寵禄信難侔從軍亦云苦眷言享斯丘朝從獵城南暮從獵城北白馬喻飛翰輕裘如膏澤塵起如獸駭風髙如鳥疾隻箭落雙鶖千金出俄刻歸來拜恩寵樂飲過一石僮奴增意氣賔客改顔色常恐文逹士輕薄多瑕擿髙門臨廣衢秋風上荆棘朔土髙且厚民生勁而彊榆栁雖弱質生植益繁昌桃李大於拳棗栗充餱糧誰謂苦寒地百物莫得傷青青雲夢竹宿昔傲雪霜移植於此庭不如芥與楊竹性豈有改由來非本鄉𦕈𦕈寒門士客途困臺城上無公卿故下無舊友朋裘褐不自蔽藿食空營營四顧烖沴餘但聞號苦聲日負道徳懿敢懷軒冕榮節食慎所欲聊以厚我生髙歩覽九州誰獨無與親同室不相喻矧彼途路人誘訹更驅迫巧詐日眩真共美為善樂莫知與善鄰未足保厥躬已謂貽子孫一言易為義一恩易為仁世無魯東叟何以慰心神衆飈驚野草日夜委鮮腴嗟哉白楊樹髙髙淩𤣥虗朝遊車馬中夕息思故廬塵衿難為潔野性非京都貧賤不自保焉能戀簮裾頼有死與生可齊賢與愚去婦詞并序江東有一士子留都下三年適娶一貴人女為妻乆乃知其已有妻子矣一夕逃去因託去婦為之詩非徒欲傳其事抑以示風戒云爾輕合鮮義終苟容希禮遇逺結萬里昏多為才名誤始與君結好不知君有婦有女嫁他人俱懐託遲暮青青牆下草生死牆下路姢姢道傍華零落無處所女子失其身何以保貞素既乖百年意百年誰能度對鏡空悲唶中心良難訴浮萍難為託一木無兩附棄舊屬新歡新歡漸成故寧當中路析莫被他人去寧老阿母傍不受他人妬騰身出房闥兩絶無復顧所願嫁他人甘心西山樹四友詩并序四友者廣信王庭鈺良仲李商弼良佐武昌盧廷鸞子儀同里熊坦從正也李亡已七年餘亦亡二三年余索居京師毎夕夢寐與四友相接傷其皆賢而無夀又與予篤好迺作四友詩一以志余哀一以槩見其平生云李得年二十三盧二十九熊三十四王四十有九王兄負竒偉十四已應門倉卒遘閔凶盗賊蔽丘原衰絰從伯父慷慨安其人豪横劇狼虎瞋目莫敢干降心相欵宻共稱孺子賢時應州縣役調笑官長尊酬接雖靡盬講習日多聞激烈忠憤際委曲禮法間時平俗益康放志農圃言有集曰圃課浮湖感龍變嘗汎彭蠡見龍見遂肆意墨龍悟觧夐絶陟巘思鳶鶱古笛振哀鐵清琴繁素絃每傷古人逝迸淚尊酒前與我初識面已誓為弟昆雖謂天不仁中路遂離分寥寥昻山阿黝黝硯井泉賔客一以散託夢與招魂嘉木不叢生猶為造化欺繁霜凋其葉震風蕩其枝利蟲齧其根飢禽啄其皮豈無雨露滋不得干雲霓李氏年弱冠博通三氏詞援毫㨗飛電吐氣裂豹螭信如海上潮直若琴上絲朗如九秋月温比三春暉志在躋聖賢寧復顧所私一悟生滅理天地忽若遺君卒時一日晨興有數道人叩門謁求作白蓮庵記君援筆而就大為得意有頃忽奄然坐逝父母聞而趨哭之迎謂父母曰某兄弟幸多死生命也勿以為憂既瞑一道人撫其背曰檀越檀越生好處生好處復瞪目視道人厲聲曰佛法本無生滅卒癸夘二月也􅌾時衆轝出城初不能勝忽輕如羽顔回蚤聞道短折非所悲茫茫後死者中夜獨漣洏武昌故舊中盧生亦竒傑雄才傲當世髙誼凌白日貧賤有相知富貴莫能折冠葢如雲霧而獨與余宻大徳七年夏予有長沙役臨河與余分攬袂乆嗚咽知心託生死誰能此離别千里竟相從風浪復炎熱青天入杯酒歌嘯中夜激便欲乗滄溟超遙送華髪行行亦云至終當與君拆捨棹即長途惆悵如永訣謂余平生懷時俗莫能逹學不追古人終不願有室還聞起分教小邑傍蕭瑟始為賢者哀那知遽淪没樊山罷歡讌赤壁空流月佇立想音形音形一何濶親友日凋謝况我情所鍾熊子三十餘亦在九原中髙才祇促齡積善適為凶天道不可依人命如飛蓬夢寐常相見烱若生相從亦知心不異矧復里閈同始君掾韶學我心實忡忡歸來已三年微疾竟永終薄禄不救飢一官非髙崇獨令君子亡碧血冷秋風鄰曲恩愛絶山川談笑空名家失金匱樗櫟入公宫誰復繼粹温徒用相舂容千秋瓘山路繚繞劍池東賦雙陸三五對參差髙呼得采時猶疑雙出早毎恨獨歸遲散地偏難入全功或誤竒極知妨日力聊足審安危泊安慶時再北逰夜泊淮西郡寒生客子衣酒家臨岸閉野燒暎江飛雲盡月初出潮平風漸微前年城下路此際正南歸漁父夫前撤網如飛輪婦後搖艫青衣裙全家託命烟波裏扁舟為屋鷗為鄰生男已解安貧賤生女已得供炊爨天生網罟作田園不教衣食㸔人面男大還娶􅈄家女女大還作􅈄家婦朝朝骨肉在眼前年年生計大江邊更願官中減征賦有錢沽酒供醉眠雖無餘羡無不足何用世上千鍾禄髙郵城髙郵城城何長城上種麥城下種桑昔日鐵不如今為耕種場但願千萬年盡四海外為封疆桑隂隂麥茫茫終古不用城與隍濟州初度辭家計日逢初度遲日暄風在帝京曉起慈親望天北行行初泊濟州城楊栁青謡楊栁青青河水黄河流兩岸葦籬長河東女嫁河西郎河西燒燭河東光日日相迎葦檐下朝朝相送葦籬傍河邊病叟長迴首送兒北去還南走昨日臨清賣葦囬今日販魚桃花口連年水旱更無蠶丁力夫徭百不堪惟有河邊守墳墓數株髙樹曉相参雜詩四首寄彭通復日月麗中天列宿爛昭昭河漢髙且深烏鵲以為橋寒霜昨夜降時菊委嘉苖地勢西北雄終歳皆風飈𤣥工宰萬物時至有榮消常恐光景遲不得與逍遥區區九州内横從數千里誰設山與河愚者分表裏京師天下本萬國赴如水珠犀從南來狗馬由西止浩浩荆呉船日夜}
