  - {type: variant, offset: 1965, length: 1, content: 玄, WYG: 黄判官歸江西西辭夜郎國北上邯鄲道方厭東華塵又説黄平好黄平遥遥度五溪五溪更在洞庭西十年世事浮雲裏一日孤舟萬里歸桃花流水孤舟客白髮青山五色衣堂上慈親稱夀處堂前新婦拜姑時隣人邀種南山豆野老同尋北谷芝人生出處須經意富貴悠悠差是非和劉修撰十二辰詩掘鼠可以充飢飯牛可以待時何須入穴求虎子更學狡兎三穴為我生誤逐攀龍者嵗蛇冉冉那堪把又無筋力騎快馬日射黄羊陰山下空餘野性獼猴同但求歸作祝鷄翁柴門狗吠閉閣睡萬事渾如牧猪戯發臨湘得風臨湘縣前江水流葫盧沽酒大如舟莫道天風不相待一時吹上岳陽樓聞西師㨗口號二首聞道西南掃蟻封何時雨露洗妖兇必行徃代羈縻䇿肯倚窮荒戰伐功萬里春風送㨗書千年王氣拱皇居越裳白雉應頻入浪泊飛鳶正念渠漢茶陵侯廟髙帝安劉慮未危賈生可恨不同時長沙更有囘旋地千載荼陵無古祠泉子嶺作已過泉子嶺頭路荒甸茫茫碧草乾日落不收牛馬亂青烟起處是營盤金衣翠帽路傍女蹋足連聲駕犢車車下晝眠車上宿每逢水草便為家北樓雪後酒醒獨吟幾㸃微雲翳曉晴半峯殘雪隔江明小樓獨對春城北酒醒匡牀聞鵲聲聞熊從嘔血亡碧血凝秋萬事空此生無復一尊同到家又近重陽節應是哭君風雨中待潮扁舟夜閣寒沙際欹枕待潮紅日髙無數征帆背人去海門何處水滔滔題吳越王答周克儉謝賜物及陳事宜狀手帖呉越山川畫不如古今人物半能書從容霸國君臣禮猶見錢王翰墨餘文安集卷五欽定四庫全書文安集卷六元揭傒斯撰制表金紫光禄大夫山東行尚書省兵馬都元帥知濟南府事特封濟南公致仕贈効忠宣力佐命功臣榮禄大夫司徒柱國追封齊國公謚忠襄張榮加贈推忠宣力正義佐命功臣太師開府儀同三司上柱國追封濟南王仍謚忠襄制朕纂承基緒每思創業之惟艱褒䘏勲勞常恐推恩之未至况山東諸侯之起皆天下良將之䧺既盡厥忠宜豐其報某官沈㡬先物遺愛在人方保有齊民已知真主之受命及歸我太祖歴事累朝而致身秣馬南征則孱金亡走拔劒東指則逆璮就擒握兵柄者餘四十年未甞妄殺臨軍陣者凡數百戰動必有功故詔有張相之稱而世任元戎之寄雖列土之封猶及於懸車之日而漏泉之澤未究於葢棺之餘况在爾孫復為朕使或守藩維於外或司喉舌於中世篤忠貞人推謹慎是用因爾山川之履増爾勲號之崇秩既陟於三公爵仍超於五等乃爾自致非朕敢私於戱紫綬金章尚念初來之日丹書鐵劵永膺異姓之王神其有知服此加命可妻齊國夫人宋氏進封濟南王夫人制昔國有東諸侯既封於濟今朕嗣大歴服申爵以王載求齊體之賢宜與從夫之典故某官妻宋氏早以令德相其良人舉五十萬衆以歸朝歴三百餘戰而盡節分茅胙土傳及子孫襲組彯纓布列中外皆爾相成於警戒用能共濟於艱難是用錫爾鄉閭貴其爵號以篤爾後以報爾前於戲翟茀魚軒尚服異恩於永世虎頭燕頷從懐舊將於當年其廸爾家以贊皇國可諸王呼圖克岱爾追封雲安王謚忠武制昔我世祖親定雲安命九王以鎮之將百年於兹矣乃者國家多故邊圉失宜健將驕王遂據城而稱亂陳師鞠旅方下詔以討平粤有忠烈之臣乃在伯叔之籍爰申褒䘏以慰死生故呼圖克岱爾沉鷙有謀剛勇獨斷三世藩輔蔚為磐石之宗一心朝廷不忘社稷之計方天厯之反正而逺人之未思中慶則巴古要盟即飛章而上變烏撒則僇余既叛先率衆以抗鋒見危而奮不顧身力戰而繼之以死報已後矣朕甚憫焉雖析爵以列侯王何禆地下仍賜錢以給妻子式表予哀嗚呼為子必孝為臣必忠既克承於我祖無言不酧無德不報尚永顧于爾邦魂而有知服此休命可諸王羅羅岱追封保寧王謚昭義制臨戰陳而思孝必有勇功於板蕩以盡忠斯無愆義往在諸父羅羅岱世鎮南詔心貫上蒼適嬰天厯之兵獨戰羅䧺之境力竭而援不至兄死而弟亦隨山川以之興悲日月為之動色有宗王而盡節宜諸將之同心遂使叛亡無不爼醢非褒䘏之獨後屬内外之多虞故疇爾庸超五等而命爵載考爾行詔百世以易名申錫緡錢以給家屬所以昭國典所以勸逺臣噫得猛士以守四方孰如同姓明俊德以親九族尚監異恩可申命三十九代天師張嗣成制朕惟老􅆅度函谷關未始忘於天下留侯從赤松子豈果棄於人間式啓聖人神道設教之門遂任天子為民請福之寄主其法者代有功焉不逺而朝宜新厥命翊元崇德正一教主嗣漢三十九代天師太元輔德體仁應道大真人主領三山符籙掌江南道教知集賢院道教事張嗣成神明之裔道德之宗自爾祖之遇世皇蓋有天意洎乃父之於仁廟益簡帝心雖有道之長實係聖明之世而無為之治庶聞清靜之風誕播元休屢昭靈應卿既克承於後朕亦丕勞爾先往者海水為災再免黔黎於昏墊近而天時作慝三致雨雪之感通功成弗居禮宜有報噫神仙以忠孝為本尚毋愧於傳賢帝王以天地為心曷敢忘於敬德見所帯職號悉如故進至大聖德頌表皇帝福䕃裏江南布衣臣揭傒斯言恭惟正月七日皇太子暨丞相百僚耆耋等以皇帝陛下出撫邊陲入繼大統豐功盛德高出千古握符御極冝獲徽稱即日詣大明殿册上尊號十有一日躬事太室獲瑞雪之應二月十有三日詔告天下覃告中外天人協慶日月増華凡具性情莫不欣戴冝形歌頌以達和氣臣傒斯誠惶誠懼頓首頓首臣聞古者聖人之謌莫先於詩故聖主賢臣有大功顯行必載之詠歌使天下曉然知君臣之所趨德化之所由見善而遷聞義而起去之萬里如立其朝後之萬世如生其時所以事神保民無右於此故有虞命䕫以教之周制太師以掌之君臣朝燕必有賦郊廟薦享必登謌蓋詩之為道誦其辭無鈎棘叢雜之繁聆其音有往來䟽數之節玩其義有優柔沈藴之㫖其感於人也易其入於人也深乖沴之氣可變而為祥風甘雨姦回之行可化而為忠鯁貞良是以聖人尚之故雖反覆典謨訓誥之文不若歌明良之賡康衢擊壤之謡周南召南之什下至農野婦豎一闗其耳熈熈灝灝想見其治漢魏以來騷人賦客時時間作雖不能盡追古道其抒情蓄志可興可觀斯義緜緜庶㡬未冺聖明之世尤所宜聞欽惟統天繼聖欽文英武大章孝皇帝陛下道凖天地德䋲祖考惠澤周乎無間威稜疊乎八表舉前王未究之禮叙洪範載錫之疇孝弟足以厚黎民剛明足以制萬㡬見賢如已能聞諌如已出去惡如薙草芥好善如嗜飲食允文允武赫赫巍巍冝其克集大勲君臨天下載膺顯册彰厥大猷而耆俊如雲良士如林必有振發毫楮鋪張洪業為一代之盛典若微臣者曽何足云然想像於丘岑畎畆之中不若覩快於輦轂之下繼漏於筐箧刀筆之末不若聲諸詠歌之間近可以風動四方逺可以流耀無窮臣自揆才薄迹微無以補益毫髮幸因覉旅獲際盛明謹譔聖德頌一篇繕寫投進雖不足以加天下之大日月之明載之簡牘傳之天下亦可以見聖明德化之所由也臣無任瞻天樂聖激切屏營之至謹奉表以聞臣傒斯誠惶誠懼頓首頓首謹言皇太后加尊號監脩國史府賀表延祐二年聖主尊親稽先朝之盛典慈闈進號備昭代之徽稱寶册載膺瑶圖永固中賀欽惟儀天興聖慈仁昭懿壽元全德泰寧福慶皇太后陛下德全坤厚功底泰寧福莫大於多祥兩開帝業慶莫隆於至養咸戴母儀式兼崇極之名益衍昌明之祚臣某等久塵台鼎叨總國書興聖春融幸仰陪於大禮含飴日永願丕贊於鴻猷天壽節監修國史府賀表一人有慶節肇紀於重三萬壽無疆位永垂於九五乾坤薦祉朝野騰歡中賀慶惟皇帝陛下道大德純功崇業廣舉賢能興學校天下文明異章服同車書海内率俾允極尊親之孝益隆致治之基臣某等任忝國鈞職嚴金匱蓬萊宫殿幸依日月之光河洛圖書丕纉皇王之統元旦翰林國史院賀皇太后表延祐三年天子當陽八表奉夏時之厯皇闈獻歲萬年稱元日之觴雲氣蓬萊春風宇宙中賀欽惟尊號陛下德含坤育運啓泰亨推福慶以致崇日星顯號溥慈仁而洽治雨露羣生隂教修而母道隆孝理彰而聖功逺臣某等欣逢盛旦忝綴周行玉署日和願播思齊之美瑶圖天廣永居長樂之尊天壽節代蒙古國子監賀表延祐三年一人受命適符上已之辰萬歲稱觴載協壽星之紀照臨所被慶抃惟均中賀欽惟皇帝陛下德猶日中養以天下暨聲教於四海俗美風淳舞干羽於兩階河清嶽晏益體乾剛之用式隆震夙之祥臣某等學守國書班聫胄監龍顔日角仰瞻穆穆之光鶴筭龜齡俯效綿綿之祝上再即位奎章閣賀表天厯二年六龍啟運飛躍得聖人之時萬象趨新變化合太平之應普天之下如日再中中賀欽惟皇帝陛下剛健粹精聰明神武霜露洊更而不失其正乾坤再造而不居其功惟其有帝堯帝舜之聖仁乃能行祖甲祖庚之揖讓慎徽五典則崇孝友以率先表章六經則進儒雅以為本皆天理人心之至當必明君義辟而後知宜厯數之在躬雖同體而不易况祖宗之大統豈違道所可求是以踐阼之初甘露卿雲諸福畢至及夫明詔之下扶桑若木萬姓歡呼允長馭於權綱斯永保夫社稷臣某等叨聫延閣適際清朝羲畫禹疇願闡皇王之秘虞韶殷輅丕昭禮樂之隆奎章閣賀正表天厯三年大人有造治隆揖讓之餘正月始和慶協發生之妙車書萬國干羽兩階中賀欽惟皇帝陛下道接百王統承三正達夫郊社之禮禘甞之義躬致其嚴觀乎天地之德日月之明益躋於聖是用格於上下莫不歸其照臨臣某等忝惠西清依光北極君臣父子永敦天秩之常禮樂詩書誕播皇風之盛册皇太子奎章閣賀表重明麗正作離咸仰於皇文一索得男出震允冝於主噐既䟽封於元土爰正位於青宮所以繫人心所以本天下欽惟尊號陛下敬隆郊廟德洽乾坤當春秋鼎盛之時建宗社靈長之計惟聰明可以正百辟俾綜樞機惟元良可以貞萬邦足副儲貳重以羣臣之固請聿遵累聖之宏規然監國撫軍教尤資於四輔而問安視膳禮必謹於三朝式養聖功用光帝業臣某等屢陪大慶思賛清時迎春日之載陽益臻泰道瞻前星之有耀永固皇家聖節賀表陽德方亨喜太平之有象聖人在宥宜仁壽之咸臻八表同歸萬年惟永中賀欽惟皇帝陛下誕敷文德克纉武功既尊祖以配天比隆三代乃立嫡以主噐用貞萬邦允昭仁智之端是皆長久之道臣某等叨陪清燕莫賛聖明多壽多男徒切華封之祝是彛是訓願敷皇極之言奎章閣賀表聖人繼體再昭揖讓之隆天下歸仁大慰平成之望慶綿宗社光被華夷欽惟尊號陛下德秉純乾業承富有妙天人之協賛允厯數之攸歸惟上有成康之君下有周召之臣而内獲臯䕫之佐則外獲唐虞之治苟日躋於聖敬咸世篤於忠貞臣某等職忝西清光被北闕經邦論道自有弼於鴻猷養老尊賢豈無禆於昭代藝文監賀表明繼明聖繼聖所以固皇圖長以長賢以賢所以公天下一人有慶萬國歡心中賀欽惟尊號陛下仰之如天就之如日體兩朝之揖讓有丕丕基開萬世之隆平惟明明后此祖宗之深望亦臣庶之所期臣某等地切泰階恩聫文苑周為師而召為保德兾邁於成康稷教穡而契教倫治永躋於堯舜藝文監賀表一人受命適嚴踐阼之儀百辟在廷已舉尊親之典孝先天下慶衍皇圖中賀欽惟皇太后陛下徳濟艱難功成警畏每念鴻圖之重獨深燕翼之謀申揖讓於中興父而又子導繼承於成命長亦惟賢宜膺至養之隆永極徽稱之盛臣某等名慚藝苑身際熙朝長樂怡愉願宻扶於聖治大明照耀庶丕闡於皇猷藝文監賀表成命以長惟天以啓聖人南面受朝不日而尊大母愛敬之至神明所歸中賀欽惟尊號陛下如日東升以天下養雖任寄伊霍之重足以發皇明必治資任姒之賢有以基王化尚致怡愉之樂式彰孝弟之風臣某等學愧前修職嚴内監仰陪大禮時已際於風雲共戴皇猷壽永齊於天地文安集卷六欽定四庫全書文安集卷七元揭傒斯撰書上李秦公書五月吉日豫章揭傒斯謹再拜奉書平章國公閣下夫士志為上時次之位次之農不以水旱怠其耕商不以寒暑輟其負販故能致千金之產登百榖于場况士之致於道者乎不逢於今必顯於後有其時有其位道行於天下天也無其時無其位道不行於天下亦天也君子無與焉故士之所患者志不立道不明不敢計其時與位也因其時求其位以行其道此士之志也而不敢必乎天也士苟志於道生乎今之世可謂得其時矣然猶往往以不得其位為患其信之不篤而欲必於天者從而為之言曰上之人不能用夫士且怨且憤嗚呼過矣甞觀夫用舎之際矣或一人薦之而百人阻之不能使之不用且大明其道於天下或百人舉之而一人抑之卒罷而歸致老死而無聞夫一人至寡也百人至多也用舎繫焉而無所容於力非天也耶上之人苟能知其力之所至不能奪天之所與不能畀天之所不與賢者進而用之不賢者退而黜之不置一毫踈戚愛憎薄厚之心於其間惟以國家得人為務如是而猶有不信乎道上猶有遺才之恨者未之聞也甞觀士之志立矣道明矣得其時與位矣而不能見知於其君道終莫能以行雖行而不逺噫何其道之難行也耶伏惟閣下學冨而德廣志勤而行實不以摧困拆辱而易其節不以冨貴顯榮而改其度尊為天子之舊學信為天子之腹心位崇乎公相功施乎社稷名聲昭乎四海可謂得其時與位而道信行矣又力能進退天下之士而無一毫踈戚薄厚愛憎之心置其間一務於為國而得人天下之士莫不顒顒然厲其志修其道以待時之用已然以一人之明籠天下之士豈必能保其固無遺才耶亦舉其所知倡於其上而已耳僕少貧粗襲祖父業年十五六即挾其所有奔走衣食於四方乗驚湍絶峻崿觸冒乎炎埃雨雪之間或過午而未食或既夕而猶邁人情物態之變風俗政化之異本末逆順之由葢備甞而畢覽之矣至於國家内外之體補偏救弊之術亦甞求其説而熟慮之矣然未始敢以告之人者踈逺鄙賤之士雖告而不信徒取詬病焉耳既無上下之援可自取爵位而力行之又無知己之人可相告語事苟利於時不必由已出然終黙黙自悼行年三十有九蠢然而無聞近始因縁親戚計可無旅食之憂遂自豫章附舟五千里而至京師雖童僕不敢携一人恐重以累諸人也凡平生寓之目屬之耳體於身藏於心不敢以告之人者閣下皆已行之矣其未行者必次苐而行之僕何敢踰涯越分而進以貽教玉人之譏夫翰林皆極天下之選不以愚不肖過相薦引私竊自幸事苟有集庶㡬由是而至於可為之地以自見其平生之所志萬一不然亦可藉手以歸曰吾甞獲薦於翰林矣吾甞獲登李公之門矣益厲其志修其道垂之簡帙傳之子孫樂夫天之所以命我者用之舎之不敢求必於天也惟閣下少垂察焉傒斯恐懼再拜與尚書右丞相書傒斯再拜尚書右丞相閣下傒聞因衆者可以顯立功忘已者可以廣得賢千尺之松不蔽其根者獨立無輔也森木之林鳥獸羣聚者衆材咸濟也是故自用無朋專欲無成得衆者昌寡助者亡此賢愚同智古今一軌者也易曰㧞茅茹以其彚征吉夫泰之為卦君子道長之時也君子當道長之時其進尤必引其類則吉是進而不引其類雖當泰之時猶㓙也人方安居暇食若無事於賢一旦風飛雲㑹加之百官之上立於廟堂之内以數尺之身任天下之責方寸之心闗天下之慮雖有周孔之智賁育之勇未聞能獨成其功也此僕與閣下不能無情伏惟閣下聰明強毅卓犖宏大誦聖人之書行古人之事為政知王道之本好賢有虛已之實生民之所仰望君子之所依歸又當天子鋭精求治之時身任鼎鉉之寄以求治之時當鼎鉉之地而生民有仰望之情君子有依歸之心誠閣下垂名立功報國顯親之秋也然方今進賢用能之當否在閣下冨民理財之能否在閣下斟酌庶務之冝否在閣下天子之所属寄生民之所責望在閣下其任亦甚重且難矣夫上有宰相下有參佐百官而獨責任於閣下者以閣下明王道識治體知本末之所先後經權之所異宜也此春秋所以責備於賢者耳由今觀之孰若一上下齊彼已旁羅俊乂廣覽英賢因其材而分任之而坐居其成功則功可大名可久福可致而禍可銷也不然一身且未知所計况為朝廷計哉然鳯凰鸑鷟非凡木可棲絶奇異能非常調可致懸千金之賞不患無徙木之人市千里之骨何憂無絶足之馬誠能推誠折節激昂鼓舞則士必樂為用士樂為用何功不成且進賢者非所以市私恩也將以佐天子理萬民也忠以出之信以行之忠信之人天必祐之毋患乎賢之不為用但盡其求賢之道而已牛之肯綮逢庖丁之刄則觧木之盤錯遇匠石之斤則離毋患乎事之難行但盡其用賢之道而已進一君子則君子之類應任一小人則小人之類應此善敗禍福之由不可不審且慎也惟閣下察焉傒斯再拜答胡汲仲書傒斯頓首汲仲簿公執事傒斯比猥以陋薄之見汎浮之辭凟冒於執事意甚悔之既無及已連月滯留於外不得朝夕訪問不圖宏大更枉還答又以俗廹雨坐山疃者連旬不得上謝知執事於我如何哉然賢者之待不肖不肖之望於賢皆不可謂之無意也苟有忠告則肝胆相呈心口相宣不當蓄嫌畏挾蒙背若市井塗路之人也故有所祈不敢黙黙遂止以執事好古之敏信道之篤知足以知之勇足以行之可謂魁傑特達出羣之士至於商畧人物言論風采頗若無人來書有云為衆所推謬當斯文之託僕竊以為過矣夫衰周之世文武㡬墜孔子以天縱之聖出為天下萬世之宗且曰十室之邑必有忠信其自居者好學而已孟子當戰國之時闢楊墨排縱横揭孔氏之道而明之若掃穢翳開日月之光䟽百川益河海之深及其辯也曰不得已今幸與執事居休明之世吾道光盛賢士軰出禮樂非甚崩大壊際天所覆無不順軌雖有孔孟猶不當驁然自任畧無辭讓之色使執事所學之道所居之世誠當孔孟之任必待後世之人推尊而光顯之不當自道若此且以執事自處為何如時哉今年夏見青田陸如山謂執事自許直繼孟子非知道之士不能為是言者猶或不識執事所言之㫖由今而言則信有之矣夫孔孟大聖也大賢也當斯文之託者若孔孟可矣而孔子曰攻乎異端斯害也已孟子曰能言距楊墨者聖人之徒也然每與執事商論則甚尊信佛老氏至欲合三氏而為一則當斯文之託者道固應如是乎此皆甚不可者也或謂執事有師道而無友道誠知言哉傳曰如有周公之才之美使驕且吝其餘不足觀也已此之謂也來書又云前乎千古聖賢相傳之道由詩若文而知後乎千古亦將由詩若文而知今之道予讀其言而悲之自漢以來繼述之文多可讀之文少夫道有本文有體尊卑大小長短踈戚華實正偽截乎若天地山川之不可相陵昭乎若日月星辰之不可相踰離乎若飛潜動植之不可相移惟適當而已耳近見執事序黄成性文章言辭夸大皆非事實其所稱舉皆公卿大臣之事非學道在下者所宜言抑亦自任之素不知其言之過也且文者古聖賢不得已者之所託也而今世行道之士不惟其事尚欲託之此而垂後不亦甚可悲夫僕之才不足以知執事僕之言不足以曉左右所以聞之父師之訓有與執事戾者聊為僣越申言之前言敢以為執事之忠後之言敢以為執事之望尚冀致之用以幸學者以示來世則大願也優柔之教敢不敬承聞將就天台之闕不知何時定行當於江滸一别與蕭維斗書傒斯再拜論德蕭公閣下僕性分麄謬昏戅絶不通時事與人交不計隆薄能否輙以古道相期待俗下詬病日甚不止終愧悔今復妄有謁於閣下焉惟天生賢哲常曠數百載不一二見及有其人或又廢於庸主格於讒忌盡於懦怯畏慎弗克卒其大業僕甚痛之自來京師目覩耳聽口誦心語惟公全才學冨義精仁熟謙讓克謹去就有節名與實侔位與德稱有古大賢之風束帛之聘累光丘園每聘必増其帙每召必優其禮其尊德樂道右賢尚能崇信慕向若漢高帝之於四皓可謂隆矣然四皓不出則已一出則能割至尊之愛定天下之本建萬世之名翛然而來浩然而歸來不見其所難去不見其所窮何其裕哉且今天下非漢髙之草創皇太子聰明仁孝過於惠帝上親信篤愛無高帝之惑溺昔之儲貳不得與國家之政今則無所不領冝若公者知無不言言無不從然天下之賢士未振者不聞有所舉天下之政令有闕者不聞有所陳愔愔黙黙日以懐去為務又不能借一事决去就使天下有識之士蹀足㩜掔裴徊四顧而失望僕誠愚鄙未達其故抑嘗舉之而未用陳之而未行邪則去就可以兆矣道行於天下謂之達道不行於天下謂之窮孟子曰窮則獨善其身達則兼善天下今公居達之時行窮之事尤所未喻且天之生斯人也豈徒欲寵榮其身體利澤其子孫而已亦欲使生民之有知也公誠能高卧空山逺引遐陬則為巢許務涓之徒可為嚴陵魯連之徒亦可雖欲驂風駟霞談詭變眩如偓佺安期羨門盧敖徐福之徒亦可今業已出矣食其禄而居其位矣何乃若是恝恝邪竊為公計莫若攄肝瀝胆激昂慷慨極論天下之賢士求當今政令之得失典章文物之損益君儲切身之急務䟽而陳之苟其說行則從容可為二䟽之事不行則掛冠神武拂衣而去矣上不負朝廷之知下不觖天下之望天下之士莫不想望風槩咨嗟太息曰蕭公真賢矣哉朝廷之尊賢下士必自公始則公進為國家之榮退為斯道之隆生為萬全之人没有無窮之名不亦休乎又不得已則引年謝病而去耳或曰公不得已而起而身冒大名被至㤙夙夜戰掉兢慓猶懼不持若夫進賢補過則揆諫之司吾所職者輔廸是宜且言之而中則吾之歸未可期言而不中則僇辱所歸况若公者進退語黙必有其時豈庸豎賤走所能察識哉僕益惑焉夫公之出處非若彼旅進旅退之人旅進旅退之人雖千萬不為天下輕重公實有萬世之繫焉不可不暴白於天下後世後世使之有則也念之念之時不再矣僕近行河濟之間有過而歌者曰我行河濟兮瞻彼泰山聖人之不待兮我道孔艱進不汝信兮退即汝諼河兮濟分道靡靡兮乃撫栧送而和之曰泰山巍巍吾其跂而河水瀰瀰吾其濟而聖人雖逺吾斯軌而因録其詞并書以獻惟公念生才之難遭時之不易憫斯民之無知貸狂瞽之不察視中道而導之歸幸甚幸甚傒斯再拜文安集卷七欽定四庫全書文安集卷八元揭傒斯撰序呉清寧文集序廬陵代為文獻之邦自歐公始而天下為之歸溪作而江西為之變故江漢被文王之化無思犯禮華周感杞妻之哭而變國俗其所感雖殊而人心之變一也溪没一十有年學者復靡然棄哀怨而趨和平科舉之利誘之也永新呉清寧以英妙之年際休明之運方䇿名進士而獨好古文已可謂豪傑之士矣然方今以明經取士所謂程文又皆復乎古以其所好固無害於所求也讀清寧五七言詩已清潤明快古賦已瀏亮純雅記序已宛委有法而予竊有獻焉清寧廬陵人也姑以廬陵言之歐公天下之宗也百世之師也冝以為歸溪衰世之作也然其評詩數百年之間一人而已獨非子之師乎因二公之盛浚六經之源益溯而求之海内之名必歸子矣豐水續志序王順伯修豐水志之六十有三年邑陞為富州又二十有五年李君肖翁典鄉校居五年乃輯淳祐以來城池人物時政之蹟及前志所未備者為續志六卷條敷類析窮蒐極簡將以垂信方來惟東南物產豫章為下故班孟堅曰物之所有取之不足以更費蓋自古然矣是書於貢賦之變未甞不再三深致其意使為政者少有仁恕必能戚焉有動乎中思復其舊其於政教所書必録其善而遺其不善此居其鄉不非其大夫之意亦作志者之法也君以碩學粹德起文獻之家居儒師之位祠先賢尊景行育人才無所不用其道猶惓惓是書而豈徒哉後之君子尚求李君之志蕭孚有詩序廬陵蕭氏世為達官為能臣至臨江從事煖有復以政事稱而其季弟孚有乃以能詩聞夫為政與詩同心欲其平也氣欲其和也情欲其真也思欲其深紀綱欲明法度欲齊而温柔敦厚之教常行其中也孚有之詩韋出也讀蘇州韋公之詩如單父之琴武城之絃歌不知其政之化而俗之遷也海内之學韋者吾識二人焉涿郡盧處道臨川呉仲谷處道有爵位於朝有聲名在天下其氣完故獨得其深厚而時發以簡齋仲谷隠者也其氣孤故獨得其幽茂踈淡而時振以岑參崔正言今復得孚有焉孚有生文獻之家襲冨貴之業而性情温厚辭氣閒雅故其為詩周旋俯仰舉相似焉此非獨善學韋也亦居相似而性相近也使他日推以為政民有不忍欺者蕭氏之未艾於此可卜焉予聞其師劉君桂翁亦深造於韋豈其固有所自耶孔氏譜序孔氏世家一卷其派之在江西而顯者是為臨江三孔孔之子孫曰克已者是為先聖五十五世孫由江西不逺千里拜曲阜陵廟且因以考訂其譜牒而收其所未續者傒斯得與觀焉於是悚然敬肅然懼進而告之曰凡天下之受姓命氏未有非聖賢之後者也凡有尊祖敬宗之心未有不知重其譜牒者也然徒知重其譜牒而不知求夫尊祖敬宗之實猶無譜牒也猶非其子孫也而况孔子之世家乎夫孔子魯之陪臣也去年千七百有餘歲矣天下至今誦其書講其道祀之以天子之禮樂戴之如天地仰之如日月親之如父母者果何以致是乎衢路庸衆尋常之人一有不合於孔子之教者猶得指而議之而况其子孫乎其為孔子之子孫亦難矣故籠天下之陸海不足以為其冨極天下之爵禄不足以為其貴窮天下之奇珍異噐不足以為其寶其可富可貴可寳者在聞乃祖之道而凡學孔子者猶必是為務而况其子孫乎夫譜其譜者尊祖之噐也道其道者尊祖之實也敬之勉之勿徒抱其虛噐而號於衆曰吾先聖之子孫也吾懼其有議其後者矣子其慎之天歴二年二月丁酉後學揭傒斯敬書重修揭氏族譜序揭氏稱漢安道侯之後者我桂陽府君據夾漈通志而言也旴江之族與我同出乃祖楚司揭氏汝寧之族則又祖漢陽信侯三者政未知所定也旴江與豐城之始祖兄弟也今豐城稱始祖為旴江府君誤矣唐乾寧二年僕射鎮以敗上官逢之功加銀青光禄大夫持節袁州諸軍事守袁州刺史兼御史大夫上柱國有勞績於袁子孫世居袁於豫章旴江為近且我始祖府君其名政與僕射類豈其兄弟遭五季之亂遂㪚處諸郡耶是未可知也然吾先世之䧺文盛德在宋由進士而入者科不乏人自足著白於無窮又豈敢重貽拜汾陽之譏大德中族兄允中合諸譜而修之今則以寧兄復續而廣之讀此者油然孝弟之心凄然霜露之感必有不待喻而興者凡我子子孫孫尚敬之哉送劉旌德序凡為進士有謁於予者余必有以告之余亦忝進士之名也至於廬陵劉君粹衷余知己也方擢高科拜新安之命而去余乃未有以告之粹衷亦以憂不果上今再調宣之旌德宰而終不有以告之何也粹衷之所受學皆賢師所與游皆良友所言皆仁義道德之懿所行皆孝弟忠信之實舉於卿而無忝選於有司而無慚余不及則有之矣未有能過之者誠無以告之也然上之取士先德行次經學次文藝次政事其法甚叙其道甚備歴二十餘年非不久累七科之士非不多而天下政煩教弛民情壅塞風俗不興上之澤不下流日甚一日其故何哉豈學無賢師游無良友以仁義道德為虛説以孝弟忠信為曲行特竊其言以取禄位非有躬行之實歟豈猜賢忌能者尚多懐奸挾詐者益衆附之則安冨尊榮違之則貧賤憂辱雖儒者亦委而從之歟抑𤨏𤨏州縣上廹大府震以不仁之威壓以非理之勢雖欲自竭有所不能雖能有所不容者歟抑任小者不可以謀大任輕者不可以圖重守一官則治一官居一職則治一職非宰相不足以變天下之化易天下之俗雖更七科柄用者尚寡歟夫何儒者之無益於國也非儒者之無益於國也不能盡儒者之用焉耳今粹衷之為旌徳也有君子之譽挾進士之號居一邑之長寄百里之命得於已者有躬行之實待於人者無越分之望是非聽乎理屈伸由乎道乗饑渴之餘反貪暴之風政教之流必浩浩乎若奔川東注風俗之變必靡靡乎若長風偃草儒者之效吾睹之有日矣余何以告之雖然粹衷所治一邑耳由一邑而天下是在天子與宰相能用不能用耳勉哉粹衷無畫乎世之不能容不能知不能用也通鑑綱目書法序孔子因魯史作春秋以為萬世之法朱子因司馬氏通鑑作綱目以正百王之綂此天地之經君臣之義而聖賢之心也世之言春秋者自公羊榖梁左氏以下無慮數十家而義猶有所未明疑猶有所未觧者魯史不可復見且聖人之制作也後之羽翼六經者宜莫如朱子猶不敢言春秋然綱目之作非深得聖賢之㫖者不能也故朱子不言春秋而知春秋者莫如朱子世之言綱目亦無慮數十家既有春秋為之義例又有諸史可以究其始末且去朱子之世為未逺而又有親及其門者然言愈煩而義愈宻非深得朱子之意如朱子之知春秋者不能言也能言未有若廬陵劉氏綱目書法者其辭則公羊榖梁其義則春秋而其志則朱子也古之有天下者莫若舜禹湯武然湯有慚德武未盡善舜禹之後得天下者莫如漢曺氏親受漢禅威加中國卒不能奪諸葛孔明漢賊之分元魏據有中國行政施化卒不能絶區區江左之晋而繼之此萬世之至公而不可易焉者而猶或易之此綱目不得不繼春秋而作此書法不得不為綱目而發也此朱子之志也劉氏諱友益字益友遭宋訖録閉門讀書既深於經復長於史其為此書㡬三十年寸寸而較銖銖而積微詞隠義高見特識既足以啓發千載而中有無窮之憂余故曰非深知朱子之意如朱子之知春秋者不能言能言未有若劉氏綱目書法者而又曰此朱子之志也於乎後之覽是書者尚求其志哉天厯二年六月十日序范先生詩序范先生者諱梈字德機臨江清江人也少家貧力學有文章工詩尤好為歌行年三十餘辭家北逰賣卜燕市見者皆驚異之相語曰此必非賣卜者已而為董中丞所知召置館下命諸子弟皆受學焉由是名動京師遂薦為左衞教授遷翰林國史院編修官與浦城楊載仲宏蜀郡虞集伯生齊名而余亦與之遊伯生甞評之曰楊仲宏詩如百戰健兒范德機詩如唐臨晋帖以余為三日新婦而自比漢廷老吏也聞者皆大笑余獨謂范德機詩以為唐臨晉帖終未廹真今故改評之曰范德機詩如秋空行雲暗雨卷雷縱横變化出入無朕又如空山道者辟糓學仙疲骨崚嶒神氣自若又如豪鷹掠野獨鶴呌羣四顧無人一碧萬里差有可彷彿耳晚尤工篆𨽻呉興趙文敏公曰范德機漢𨽻我固當避之若其楷法人亦罕及其居官廉直門不受私謁歴佐海北江西閩海三憲府三棄官養母天下稱之甞一拜應奉翰林文字而有閩海之命不果行至順元年年五十九卒其詩道之傳廬陵楊中得其骨郡人傅若金得其神皆有盛名其生平交友之善終始不變者郡人熊輈也楊中將刻其詩命其子繼文請序為書其始末如此嗚呼若德機者可謂千載士矣楊中字伯允傅若金字與礪熊輈字敬輿詩凡若干卷書王鼎翁文集序余舊聞宋太學生廬陵王鼎翁作生祭文丞相文每嘆曰士生於世不幸當國家破亡之時欲為一死而無可死之地又作為文章以望其友為萬世立綱常其志亦可悲矣然當是時文丞相興師勤王非不知大命已去天下已不可為廢數十萬生靈為無益誠不忍坐視君父之滅亡而不救其死國之志固已素定必不待王鼎翁之文而後死使文丞相不死雖百王鼎翁亦末如之何况一王鼎翁耶且其文見不見不可知而大丈夫從容就義之意亦有衆人所不能識者近從其邑劉省吾得王鼎翁集始見所謂生祭文丞相文既歴陳其可死之義又反復古今所以死節之道激昂奮發累千五百餘言大意在速文丞相死國使文丞相志不素定一讀其文稍無苟活之心不即伏劒必自經於溝瀆豈能間闗顛沛至於見執又坐燕獄數年百計屈之而不可然後就刑都市使天下之人共覩於青天白日之下曰殺宋忠臣文丞相何其從容若此哉故文丞相必死國必不係王鼎翁之文其文見不見又不可知而鼎翁之志則甚可悲矣即鼎翁居文丞相之地亦豈肯低首下心含垢忍辱立他人之朝廷乎鼎翁德之粹學之正才之䧺詩文之奇古則劉㑹孟先生言之備矣茲不復論獨論文丞相之心與鼎翁之志云爾城南宴集詩後序京師天下游士之滙其適然覯晤為千載談者之資定百世通家之本代有之矣或以情附或以義感或以言求其取友雖岐苟軌於道均可以著簡書而託子孫也城南兹集得朋之義蓋備焉以僕愚戅亦俾在列肴核維旅酒醑惟㫖威儀有數長㓜有節舉盞更屬以親以友比往風後若勸若懲雜以談諧終歸雅則殘月既墮白露在庭觴酌未闌賦詩斯舉飲者既不知其醉而不飲者若素嗜焉賔既不知其主而主者亦自忘焉居而殊方出乃合轍新知舊好脗然靡間則斯㑹也不已難乎白頭如新傾蓋如故昔聞其語今見其人特未知所以資千載本百世者果安在耳廬山鄭君直卿既序其㑹集之詳於前余復申其交友之樂於後君子所命不敢廢焉送胡伯友拜孔林序胡某伯友吾鄉之賢而秀者也好學而篤志甞謂吾受夫子罔極之㤙欲一拜孔林而不獲焉至順三年夏以職事上計京師過任城距曲阜九十里欲往不可得及竣事將還告予曰吾必一至孔林遂所願焉幸有以教我予進而告之曰夫能使我知所以為人之道而盡心焉者夫子之教也此所謂罔極之恩也服夫子之教盡為人之道所以報夫罔極之㤙也非必造其居里謁其林廟而後為盡報夫子之道譬之其親其生養之盡其樂其没也葬之盡其禮祭之盡其誠其服於身也惟父母之訓是承可為真孝子矣其養也葬也祭也其服於身也悉反是曰必一造其親之墓而致其哀焉得謂之孝子矣乎其事聖人也亦然非聖人之學不學非聖人之言不言非聖人之行不行其服於身也悉反是而歲必一至孔林而展其禮焉得謂聖人之徒矣乎吾既知所以為聖人之教所以為人之道吾盡吾知而行吾所知其報夫子罔極之㤙孰大於是舎是人必謂要譽於鄉黨朋友而已夫讀聖人之書求聖人之學能思其罔極之恩必求其居里謁其林廟斯過人亦逺矣雖然吾子其勉之秋八月六日揭傒斯序送張掾序張君用以吏起南陽歴澧州升憲府一旦又掾於監察之庭君用亦榮矣而余竊有言焉夫今之號稱風憲者下而肅政上而䑓察皆朝廷耳目之寄四海生民之命以伐姦立善扶網振紀其為職任而得揚揚言天下得失抉智巧之所諱避莫如監察御史得與監察御史執簡牘必可否持是非又莫若為其掾則㞐其任者其責不既重矣乎以至重之責而惟招人毫髪之不慎報其草芥之私顧以售其黜陟之威以逞快其欲心其為害亦大矣然君用之為人高明果毅人也公而忘私人也夫高明則情無不察果毅則事無不斷公則理無不得持是以往何憂其不名之立功之成哉然余竊又有獻焉傳曰宥過無大刑故無小又曰舉直錯諸枉能使枉者直故以小善而掩大惡則為惡者滋以小過而棄大善則為善者懼舉不當賢罰不及罪謂之不任故君子平其心而直其氣思其職而竭其力樂其效不計其報君用其慎之哉君行見吾故人朱仲章亦稱高明果毅公而忘私人也其為我謝焉送陳文學序新授靖州㑹同縣文學旴江陳君將行而通國之人皆笑之巧者笑之以拙愚者笑之以狂彊者笑之以不奮揚弱者笑之以不自愛其身其言曰繇旴而靖水陸行㡬三千里高如梯蒼天深若航大海穿虎豹摩虬龍又何必弊弊焉為一文學哉君方趣裝具糗糧倓然若不聞覔覔然笑且咍行有日矣告余别余曰人之笑子者衆矣子無以人之笑而自䘮也人之笑子者不知子者也人之笑子者官卑而地遐也不聞笑子之學也夫文學雖卑王官也㑹同雖僻小王邑也吾守王官居王邑食王禄而行吾之道夫何不可之有子行矣其篤爾行謹爾言敬爾儀毋蔽爾私毋徇爾財求其可事者事之可友者友之可教者教之以無替王官尼王化竭吾職而已又安知官之卑地之遐乎且子方盛年而親未老政自樹立之日苟可以行其道雖寒荒窮髮之外將不暇顧况㑹同哉子行矣勉旃善自樹立官卑地遐非子之病也今之笑子者將拜子矣贈醫氏湯伯高序楚俗信巫不信醫自三代以來為然今為甚凡疾不計久近淺深藥一入口不效即屏去至於巫反覆十數不效不悔且引咎痛自責殚其財竭其力卒不效且死乃交責之曰是醫之誤而用巫之晚也終不一語加咎巫故功恒歸於巫敗恒歸於醫效不效巫恒受上賞而醫輙後焉故醫之稍欲急於利信於人又必假邪魅之候以為容雖上智鮮不惑甚而沅湘之間用人以祭非鬼求利益被重刑厚罰而不怨悔而巫之祸盤錯深固不觧矣醫之道既久不勝於巫雖有良醫且不得施其用以成其名而學者曰以怠故或曠數郡求一良醫不可致烏乎其先王之道不明歟何巫之禍至此也人之得終其天年不其幸歟吾里有徐先生若虛者郡大姓也年十五舉進士即謝歸業醫人有一方之良一言之善必重幣不逺數百里而師之以必得乃止歴數十年其學大成著易簡歸一數十卷辨疑補漏博約明察通徹融敏咸謂古人復生其治以脉不以證無富貴貧賤不責其報信而治無不效其不治必先知之惟一用巫乃去不顧自是吾里之巫稍不得專其巧矣余行數千里莫能及間一遇焉又止攻一門擅一技而已無兼善之者來旴江得湯伯高該明靜深不伐不矜深有類於徐余方憂巫之禍醫之道不明坐視民命之天閼而莫救而愛高學之有類於徐且試之輙效故并書巫醫之行利害及徐之本末以贈之嗟夫使世之醫皆若虛伯高信之者皆吾里之人巫其能乆勝矣乎伯高名垚自號常靜處士若虛名棪聞廬山有郭氏號南寄者亦有名夷白先生集序靖州史君郭履以外舅夷白先生鄭氏所著須堂集若干卷請序於豫章揭傒斯序曰莆田鄭氏自夾漈先生以博學聞天下其後百餘年有夷白先生夷白先生早孤窮學於林臯父先生林臯父先生大奇之年十五六即棄去日縱飲博豪游市肆間林先生患之一日適過林先生門先生出遇之召閉齋閣中數月日夜切責詬辱遂大感悔悉謝絶游從研極經史下至百家外説無所不渉放筆為文厓崩崖豁幽詭變眩赫然如臨百萬之兵謀勇㨗出宋末以鄉賦與計偕不第大臣薦有史才得召試史館去之淮漢間與諸健帥豪士游氣益横厲多憾激慷慨之言入國朝辟聘交至杜門不起著古易觀玩等書探聖人之㣲立後世之的子孫賔客相對竟日聞一語輙汗下其學行大抵類夾漈先生或謂其詩文之奇古過之悲夫世復有奇偉博達之士若夷白先生者乎使先生所遭皆合乎志少盡其用則英光盛烈不與古人飛馳於汗簡哉而林臯父先生亦不冺然於世交稱道之矣顧以是託余不亦重可歎哉先生名鉞字偉節云純德先生梅西集序純德先生郭君諱隚字德基長樂人也世以明經顯號書橱郭家父正子宋名進士好春秋著春秋傳論由是治春秋者多師郭氏春秋先生少孤母林教育之長通六經尤長於易著易述治易者復師郭氏易而素尚高潔登山臨水雅歌投壺賔饌無虛日酒酣為文下筆不少休每一篇出爭相傳冩皆效其體閩中居士莫敢與比先生亦未甞少自矜衍人有一善稱之不極不置故人樂出其下初補太學生宋亡居鄉教授至元中以遺逸起家三為郡文學所至相賀以為得師先生之文益高道益尊而亦以是終焉閩之賢者黄監簿仲元論先生曰動靜可識近乎時人不絶俗近乎知奬士成名近乎仁其有道者與鄭國史鉞曰先生之文流出肺腑詩有開元元和風致長短句妙處逼秦晏今翰林學士承㫖程公亷問閩海時尤相雅愛亦曰其談經明白統貫不刻鑿以為異其詩若文和平沉深不琢鏤以為工其為人踈通慷忼謹簡易直不矯亢以為高其為子為父孝以慈其與人交彌久而孚益逺而不可忘蓋先生之質全於天先生之文粹於學不求敬而人敬之不求愛而人愛之不求知而人知之不求傳而人傳之烏乎此所以為先生也耶皇慶二年夏先生之子履由太子太傅府長史出知靖州其行也集先生之詩若文若干卷曰梅西集屬余序余能序先生之文耶然余樂其人慕其道好其文庶㡬可以託不冺遂序之純德其門生故友之所謚云是歲六月朔豫章揭傒斯序送程叔永南歸序翰林程公以儒術起家出入三朝徳盛望隆為國名臣為江南第一今天子即位加恩近臣佩相印者以百數惟公屹然嶽立不倚不阿繇是名日登天子以為有大臣體特超遷三官追贈其考妣官其一子同知南豐州事賜七品服於是寵榮至矣咸以為宜而公惕然踖然如不勝人益以為難南豐君行且有日又屬禁時不得奉尊酒冩萬里之懐乃為之辭曰君為郢公之孫翰林公之子日連衽結鞅而來者非名卿大臣則高人俊士凡修齊經濟之道進退揖讓之節忠孝亷恪之本冝皆飫聞而熟見之矣君藉旴南豐旴屬邑今雖别為州猶鄉邦也凡地之險易民之情偽務之緩急得失亦素講而深喻之矣君又才高而識逺氣和而節下機未發而彀釋聲未振而響應以之剸繁劇解盤錯事上而接下莫不宜惬吾惡能言之君見巷列之樹乎其初也既宜其地而封植之矣又灌以液之援以周之剔其蠧而時視之靡不曰吾將夏息其隂冬取其材以成室屋矣而往往不相待焉幸而後之人愛而有之否則撒其藩垣肆其狂馳牛馬觸劘樵牧扳援先披其枝後撥其根見者傷嗟聞者憤惋不亦悲夫人之積德累行食勤衣苦逺者數十世近者百數十年所以厚其子孫厥惟艱哉故周公有鴟鴞之遺魯人貽閟宫之頌誠知機搆之難承繼之甚不一也今若君之家者亦已寡矣而君又將有民社之寄焉夫世降不古者亦已久矣吏民之憸巧豪横之伺候利誘之蕩泊臧獲之貪黷驕慢小有不誡則祖宗為辱不亦甚可畏哉伐柯伐柯其則不逺能如翰林之於郢公則善矣雖然吾何以為君言哉位已髙而意益下官已大而心益小禄已厚而慎不取此孫叔所以治楚也以是三者而行之以誠亦庶乎其善也敢書以引送族子時益赴南康主簿序古者内自御史府諸監寺外及郡縣皆置主簿内掌印勾檢稽失外闗録諸事省署文書今惟縣置之然得與令丞列坐聮署相可否闗决事其職乃與令等令曰可主簿曰不可不可行也主簿曰可令曰不可不可行也凡獄訟期㑹署文書又必自主簿始以次至於丞若令主簿不可即尼不行令雖尊亦有所不得專者故令主簿必惟其人族子時益性亷而平氣和而清好友行於家忠孝著於宗族鄉黨通經學古敏而能下甞以國書教授臨江上下交稱其賢今又主簿南康吾知必得其職矣然子雖賢令非其人則不能以行令賢郡太守佐非其人亦將有所不行余聞新邑令則蔣君也余甞與之友讀書習律和一平恕賢令也郡太守趙公余亦甞接言論於朝好古博雅賢守也其佐幕則一君為元僚一君以憲掾起家亷直明慎賢佐也余知之最有年夫令賢郡守佐又賢子雖有不及猶將容之况以子之賢乎余不獨為子之幸實為南康民之幸吾聞南康有八百毒龍不深潜逺逝則將化其德而從之矣古者主簿之職勾稽得其當猶有去為御史為卿監令僕者子其朂之送李克俊赴長興州同知序夫今之所謂善政者亦曰亷而已矣亷非為政之極而為政必自亷始惟亷則欲必寡欲寡必公公則不匱然天下皆知亷之為貴也而莫知為之何也禄薄而任重内不足以給其妻子外不足以應其誅求孰能不為之動哉設有一人焉則自以為度越恒人且萬萬矣遂乃傲大府慢同列奴視胥吏而草芥其民及夫怨怒並興禍釁交作又自咎曰亷不可為如此人亦曰亷不可為如此於是改行易節售私騁欲波蕩而火焮亷恥之道無遺矣不敗不知夫如是政何由善民何由生哉故知貴亷而能保其名者恒求一二於千萬也吾獨於河東李君克俊之貳長興也躍然為之善君之先人是為集賢侍讀學士􅆒歴中外餘四十年天下號為能臣凡為政之道必講之有素君又饜飫於詩書沉酣於禮義其平易足以近民長興又為浙右上腴食公田之入足以自給也他日稱亷循者實於君有望焉夫亷者固君子之事也不可以多}
