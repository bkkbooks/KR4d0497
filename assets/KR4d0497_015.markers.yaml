  - {type: variant, offset: 64, length: 3, content: 命晚牢, WYG: 道世途難御書雪林二字賜趙中丞應制聖主揮毫臨秘閣親臣執法坐崇臺祥雲五色從天下彩鳯雙飛映日來政欲清如林上雪已聞聲奮地中雷君臣千載明良㑹咫尺微垣接上台題胡䖍汲水蕃部圖應制沙磧茫茫塞草平沙泉下馬滿囊盛曽於王㑹圖中見真向天山雪外行聖徳只今包宇宙邊庭隨處樂農畊生綃半幅唐人筆留與君王駐逺情題辛澄蓮華觀音像應制至人不可測宴坐青蓮華珠纓被玉體白豪貫彤霞從何得此相來置玉皇家杜節婦詩結髪事夫子長言兩相期語宴方婉孌生死遽分離室中無長子堂上無翁姑生計日蕭條誰能心不渝良馬不亂羣仁鳥不亂行昔者為夫婦今忍遂相忘生為董家女死作杜家婦安能若流水東流復西注春秋陳時祀蘋藻宿所供一朝祭無主焉得不忡忡灼灼庭中花}
  - {type: page-break, offset: 64, content: '', id: KR4d0497_WYG_003-9a, image: WYG1208/WYG1208-0176a.png}
