  - {type: variant, offset: 1978, length: 0, content: '', WYG: 東舒王祠西甞沒於寺者據山川之㑹想昔賢之游處乃㑹其禄入募工度功作書院以奉先聖先師以為出治立政之本不踰時而成凡殿堂門廡齋舎庖庫及李公之祠為屋三十有六楹以其面龍眠之山端麗奇峻能出雲雨膏澤天下榜之曰龍眠書院且示不忘李公之故而邑賢范鳯瑞割田二百畆以供祭養既告成於廟遂立之師進諸生而教之凡民有來觀者必勸之以學是時上既撥亂集大命兵革未息飢疫未復郡縣長吏能以荒政自任且不足遑知禮樂之教哉而舒城勸分則出粟之家惟恐後民之強暴子弟一有弗若則父兄長老呵責詬怒惟恐見絶於長吏休休焉方日以興學為事舒之民卒無一人携離轉徙者長吏豈獨賢民得其所以生者也舒著於春秋故山有春秋之山水有舒水始入於隨後并於楚其民勇而好義非獨舒為然楚之地皆然故楚常為強國最後宋室南遷頼其民蔽遮江淮㡬二百年然當時民雖欲為學其可得乎自國家有宋民不知兵者五十餘載又有好文之君繼出而學校之教欎而不興仁義之政尼而不行養生者不得盡其歡䘮死者不能究其禮此非上之過長吏之責也今吾君既畀爾以賢長吏一以詩書禮義覺爾民民亦知所尚乎若曰升其堂敶其噐設其牲齊而行其典禮如是而已此事聖人之䟽節也非作書院意也舒之人尚其朂哉李公名公麟邑人博學好古舉進士歴删定及檢法官未老致仕蘇文忠黄文節二人嘗過其山莊故合祠於堂之北是役也建始於天厯三年之春工畢而改元至順縣學之明倫堂亦其所建也是歳冬十月朔記涿州孔子廟禮器記古者祭噐犧象罍洗登豆之屬皆以木簠簋籩篚之屬皆以竹後世懼其速朽也不能以時易也範之以銅取便於有司而古先聖王之制僅存其名號焉耳惟涿州孔子廟噐皆尚陶殘缺苦窳將事者恥焉觀者議焉有司莫以異泰定四年秋廬陵曺君明則來領教事始白於有司馳數千里還廬陵範銅以易之及有事於先聖先師齊肅秩栗昔之恥者誠敬之心生焉昔之議者慢易之心冺焉逺邇來觀俯仰嘆玩雖非古先聖王之制有不暇計於是州太守命范陽令杜肅府而藏之屬奎章閣授經揭傒斯文而志之或曰範金非古也其亦必有所受矣胡莫之或改以從古也禮有損益噐有宜然况世所寶三代彛鼎罍斚尊卣之屬皆範銅為之也皆自天子至於公卿大夫所作以貽子孫者也雖不可盡信然其來固已久矣謂範銅之非禮古人亦且為歟彼皆欲為長久計也皆欲為法於後世者也且觚不觚固非觚矣謂木之觚為觚金之觚為非觚可乎學至於孔子可謂知禮矣然逢掖於魯章甫於宋舎麻冕而從純非歟必以古為是而今非則涿之用陶葢有虞氏之所尚也以木以竹皆非禮也而可乎夫敬者禮之本噐者敬之輿也嚴其噐所以存乎禮也而恥焉而議焉則敬何由生禮何由行歟故泥乎古者不足以適今膠乎噐者不足以言禮故記曰禮從宜傒斯曰祭噐者所以交於神明者也非飲食之謂也苟知禮之本矣雖從宜可也嗚呼曺君其可謂達於禮矣是噐也有司謹藏而時出之仍刻其目於左方増城三皇廟記三皇古無廟唐天寶}
