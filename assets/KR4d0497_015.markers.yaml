  - {type: variant, offset: 1971, length: 0, content: '', WYG: 不可作矣嗚呼悲夫謹序其槩如上至順三年七月日序臨江路張同知自然頌序自然道之極也因而品節之聖人之教也老莊明自然而不可入於聖人故儒者所弗道河南張侯之貳臨江也其言曰是其所是非其所非是非非有於我也賞所當賞刑所當刑刑賞非有於我也皆自然之道也行之三年政果有聞遂名其所居之室曰自然其民之賢而文者陳宗元倡其友前鄉貢進士易方猷等若干人為之頌而請余序夫張侯因自然之道而為之政不騁奇以取名宗元等因自然之政而為之頌不溢美以為説惟不騁奇故民得遂其性而樂其業不溢美故文得盡其辭而信於逺皆可嘉也且以張侯之賢而得宗元以為之氓必能導之以親親長長之義使侯之政易行以宗元之賢而得張侯以為之上必能後其奔走力役之征使元之教益申是又皆可賀也惟其知自然是以合自然是為張侯自然頌序送燮元溥序廬州舒城長燮元溥泰定四年進士也元溥蒙古人名燮理布哈無氏姓故人取名之首字加其字之上若氏姓云者以便稱謂今天下之通俗也元溥治舒城亷敏明恕見許於士君子賑飢興學有㤙惠予民時郡縣吏初到官㕘所部必舉元溥以為勸余甞載其槩於龍眠書院記中今遷撫之樂安其民慕亷吏思惠政與舒民同又多文而好學易以禮義化然撫五縣皆無公田之入可以自養非痛自節縮去冗食之人鮮能自固者况元溥名進士人望之也尤深責之也尤嚴决不敢以他吏自恕自易其常今天下所共聞知者海南治公田之入十倍常賦民不堪命遂起而益擁衆數萬破州略縣賊殺將吏屠戮士民兵連禍結數年不解為朝廷之憂彼有田而賦之不以其道害猶如此况當天下兵飢疫癘之後誅求割剥之餘民力耗竭之極又無田而殘民以逞將無海南之事乎此吾與元溥所深憂而極慮者而天下行之若素漠然不以為意吾不知其何心也嗟夫元溥士不為仕則已仕則必盡其道毋貽父祖之羞為天下後世之僇笑也送彭仲寶赴水北廵檢序臨川彭仲寶以温厚之德深潛之學雅正之文佐修皇朝經世大典於奎章閣以㤙借授衢州龍㳺水北寨廵檢將行謂余曰余儒者也釋爼豆而弓刀非素所從事也非所從事而從事焉去親逺且困不可久也以去親逺困不可久從事於非所從事如曠官何曰天下治以禮讓為郛郭而莫能破以詩書為甲胄而莫能入以仁義為干櫓而莫能犯故守之以謹勅之士而有餘天下亂髙城深池不為固長刀大劍不為利強弓致矢不為威故守之以熊虎之將而不足今天下之民涵㤙而沐化好善而惡惡安耕而忌戰争者五六十年雖有強王叛將屈強於數千里之外不過馳一介之使手數寸之革即縛致闕下視區區狗偷鼠竊曽蚍蜉蠛蠓之不若是故夷城塞塹束兵卷甲偃然有萬億年固安之勢君以數十里之地善惡不掩乎耳強弱不逃乎目是非不惑乎心輕裘緩帶足以坐}
