  - {type: variant, offset: 55, length: 2, content: 壁窗, WYG: 竊慕漆園放誰云潘岳非乗濤慣下險迴江望若圍武昌未易到更向岳陽歸秋夜作露下氣逾肅月髙寒欲流落葉階前樹踈鐘城北樓衰年對急景歸心臨暮秋當世非無意才薄徒淹留進士張于髙得邛州判官歸成都邛竹山前負弩迎去年曽是一書生天寒劍閣猶車馬雪滿繩橋正甲兵即恐徴求民力竭莫將憂患客心并六千餘里闗河路不盡深期逺别情題陶淵明歸興圖家貧無酒飲聊欲試弦歌去家百餘里邈若異山河江上日多}
