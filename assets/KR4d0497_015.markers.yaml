  - {type: variant, offset: 2005, length: 3, content: 錢唐江, WYG: 役也首事於侯至之明年某月日卒事於至治元年某月日合内外之屋餘八十楹是歳九月朔具官揭傒斯為之記安福州東嶽廟記五嶽自古皆秩祀於天子而東嶽獨為天下宗今郡縣不置廟則以為闕延祐四年冬吉安路安福州達嚕噶齊哈喇丹始建東嶽廟於城東門外之秀嶺知州郭恢台等協其謀佐吏及州民之樂善者相其財地利材良工胥勸功明年秋廟成重門複殿高廣麗深翼以列祠七十有二象設嚴畏軒陛崇隆}
