  - {type: variant, offset: 2021, length: 1, content: 徑, WYG: 題其讀書之室曰學軒曰吾之學將何學乎學吾先世之所學而已先世之學果何學乎學為聖人之事而已聖人之事果何學乎忠君事親敬兄友弟皆聖人之事也吾富貴利達之不知遑恤他為於是朝夕是軒身益脩家益齊鄉邑之譽益歸而君子皆謂楊氏之必興矣年五十三竟奄然以死天道竟如何哉君孝友和裕好賓客能為詩不求甚工往往道人意中事其學守家法娶張氏子四人徳方直方義方正方皆脩飭謹篤孫四神明顯貴方力學君生以宋咸淳八年壬申九月十有三日卒以元泰定二年乙丑七月二十有五日葬以天厯二年己巳四月九日墓在邑之茂材鄉升平里小溪}
