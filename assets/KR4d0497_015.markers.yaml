  - {type: variant, offset: 287, length: 0, content: '', WYG: 如遺塵湖龍井雲間上鳯曲鸞歌月下龡香逐蘅薇深更入氣交梨棗静偏宜南屏風雨平坡雪争似山中夢覺時南屏山在上都南七十里嵗扈從至上都夏秋居焉平坡在大都西四十里西山之上冬春居焉葢皆所掌秘祠所在故中憲大夫嶺北行省左右司郎中蘇公志道哀詩蘇公廊廟姿推擇起為吏論議動引經舉措必由義惟時方大旱謂咎在寃滯决獄天乃雨凶年化豐嵗流聲滿山西憲府立羅致慨慷平生懐遂佐直指使受命安邊鄙正色行使事邊臣既威服使亦免顛躓六曹收雄材兩府資逺器激昻天下事徃徃見謀議十載拘掾曹彌年困文字雖云富匡賛豈足盡材藝一命厠省僚鈎稽得深弊銓選班爵冗出入錢榖細並縁出多門穿穴肆姦利有如水上萍驅去還復至因風一披蕩蹔得免䝉翳再命主賊曹持平獨丕蔽恒求情中實動究法外意功罪必誅賞善惡俱惕厲三命參宥宻令聞益昭晰和林跨大漠肇造此根柢東際瀚海頭西控流沙裔北窮陰山外南掎兩都勢連營列萬里倉庾千萬計鎮}
