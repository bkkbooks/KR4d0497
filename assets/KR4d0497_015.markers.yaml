  - {type: variant, offset: 2024, length: 0, content: '', WYG: 嘉定州知州甘公士廉墓誌銘宋建隆二年江南李主遷都南昌其臣有甘從矩者以丹陽兵從開寳中子禎遂以列侯居豐城李主入宋乃為宋人禎生宗宗生十子其一曰椐居邑中後三百餘年有諱朝舉字士廉者沈鷙廉敏以功業}
  - {type: variant, offset: 2025, length: 0, content: '', WYG: 許會朝廷以法律治天下其故人官嶺南乃往求為郡吏得補韶州太守信其廉郡吏服其能部使者聞之辟以為掾居久之遷海北海北方大治威嚴任煩苛君一裁以正海帥獲諸叛黎無輕重皆下獄當死君閱其獄出脅從者五百餘人民為立祠廣西帥思得强明吏以自佐復辟掾其府尋丁父艱服闋還府藤容二州山猺為亂佐元帥萬奴擊之帥聞民多與猺通欲盡殺之君力諫不可且曰民居近猺猺暴其民吏不能制姑從猺保妻子以待官軍也令欲并罪其民而誅之是驅民以資猺也若舍民而專事猺民必并力而誅猺破可必矣帥從之即督兵進擊其酋聞之果大恐自縛詣轅門降不戰而定帥及部使者交上其功不報遷湖南復以母憂去泰定初起掾湖廣行省時髙昌王行平章問疑發難辨答如響大器重之秩滿朝廷遣使與南臺監察御史銓廣選首用為廣西帥府經歴葢嶺海之間嵗薦饑賓栁慶猺為冦亂不止故選任之也即下車廣儲待簡傳省征歛以養兵息民居嵗餘請討諸猺事聞詔遣湖廣行省平章劉脱歡總河南浙江江西湖廣四省兵四萬人討之君迓境上固言攻討之䇿必自近始近者服則逺者自從今近而狂猘莫若古縣猺栁州皁洞首李氏者有衆數千本吾撞義兵强勁可用而有司貪暴激使為亂今大軍甫至至則以古縣猺責之威亂方張遣一信義素孚者招之必至可計日而滅古縣之猺滅諸逺猺必自解而歸劉愎諫自用不聴未幾誘至李首及其親黨六人皆下獄皁衆聞之大怒殺柳州萬户與諸猺不可制矣劉駐兵數年卒無功至順二年春詔班師君亦以病滿三月謝歸而廣西部使者馮麟卿舉治最湖南部使者管不八舉才任風憲元統元年調官京師授奉議大夫平江路嘉定州知州兼勸農事命未下而卒是嵗七月二十四日也得年五十五其甥曽利用䕶䘮南歸子九成等以至元四年二月八日葬廣豐鄉食禄里邵坊之原夏九成以南安路總管府照磨鄭徳中所為狀請銘曽祖諱露祖諱發父諱叔良贈承直郎龍興路總管府判官母聶氏贈恭人娶于氏封恭人子男三長即九成將仕佐郎韶州路樂昌縣主簿廉尉次九思南寧軍史次九萬女一適楊脩惟君與余同里而君仕越余仕燕邈然不相聞葢二十餘年矣泰定三年余試進士湖廣君實以行省掾馳驛迓余始一見後八年余任藝文監丞君調官京師始再見不謂見不數月而君竟以䘮歸可哀也哉銘曰堂堂其英烈烈其聲有言必徵有施必行懷抱利器惟所剸治弗顧以畏有倫有義鄉黨非戚嶺海非疏爾毁爾譽我廉我愚以公為忠以守為孝以勤為政以肅為教出無所資入無所歸生一布韋沒一布韋有臣如此弗考以死何以銘之清白遺子故贈奉訓大夫滕州知州飛騎尉追封滕縣男文君墓銘太傅掾呉文温介新深州判官周紀致其外舅武昌治中文君淵之辭曰淵早賴父祖之訓起田里習國書由國子生歴髙郵鹽官兩郡教授平江平凖行用庫使湖州録事溧陽州判官呉縣尹知昌國州武昌治中凡七遷其官致位五品幸無大􅏱在昌國時朝廷推恩贈先父奉訓大夫滕州知州飛騎尉追封滕縣男母追封滕縣君淵今年六十有七矣亦既請老于世不知當復幾何年而先君墓道未有所表夙夜是懼敢請紀文温皆滕人文温又文氏壻問滕州君所為狀則曰滕州君之為人也勤儉樸素既辱在田野不得列名仕版效才當時渾渾乎若無異於常人也然里中緩急苟有所請無不應其求其家人或以他辭拒輒詬曰苐願我常有何得不與人共之若等將舉無求於天地間耶吾知滕州君者如此復問淵為政何若曰在溧陽時州民蔡有一孫為某寺僧他惟一僧居孫上計去是僧其孫即得為主寺未有間會有以博訐于州者賂訐者楮幣千緡令引僧又許賂君千五百緡淵疑之廉得實又知同列皆受賂明日故晚出出則獄已具吏抱牘請補署淵不可歴問皆稱實無僧訐者具服僧得免在昌國獲海冦數十其渠言奉化州尚十餘人具言某人居某所歴歴可畫如所指移奉化捕之悉械送無遺淵察之皆畏慎慈順人也必非盜乃使皁卒易服詐為所獲盜歴引羣盜辨之言非盜人人同且各言某盜為某狀此名是而人非亦人人同詰其渠果挾仇誣之也悉縱之繼又舉最於呉吾知淵之為政者如此然後知滕州君之為徳人滕州君之宜有後而淵又能推孝以為忠而紀文温且善志人之志余得以為銘滕州君諱順字某父諱郁世為滕州滕縣人君以某年月日卒年若干以某月日葬縣東北胡山漷水之間洪邨之原縣君丘氏子男四曰某某某季淵也孫男若干人女三壻即文温餘未行銘曰不曰髙乎積壤成山張而為屏翰翕而為重關不曰深乎積流成河蒸而為雲雨鼓而為濤波一人重義百世䝉利一人好善百世錫羨有髙者胡有深者漷文氏積之百世允鑠逸士徐君墓誌銘吾鄉之士以好善為貴不辱為榮父賢子孝兄友弟敬累數世而不厭者有隠溪徐氏溪出所居之東龍澤山中即其祖漢孺子讀書之處溪之上有諱輿字徳載者尤徐氏之賢者幼而篤學長而更事外圓而内方上敬而下順不遺邇不忘逺不矜小智不忽小善急人之難憫人之窮勇與義俱不待勉强後至元五年三月二十有六日年五十四竟以疾終婣族茹悲閭里増歎載念國初盜起鄉境其祖友諒奮義庇民萬死一生執其羣醜室家相慶世保子孫厥父以莊承忠襲厚年將八袠好徳弗諼宜膺敬養遽哭乃子天道悠邈實竊惑焉然有四子文箱楫駟檢身力學將世其美孫支擢秀一男六女依依膝下足慰目前將以十月己酉葬佛嶺之盧岡其弟珏狀其行請銘余昔嘗聞君有美地卜葬者睨焉卜宅者規焉因以與之不以為徳嘗市大木築室將伐貪夫徇利造辭以爭因以讓之不以為弱心有所嫉人因毁之事有所仇人因短之目為佞諛終身薄之最其善行斯可銘已其配呉氏葢先十二年卒銘曰隠之水兮其流沄沄爰匊衆芳于溪之濆匪以娱人于以怡親親今獨來身去為墳親匪獨來亦有諸孫諸孫日長親日以老墳今惟新忽焉宿草我思其人隠溪之道惟徳之行惟善是寳有才弗用身之隠也有徳弗報命之殞也展矣若人邦之彦也逸士陳君墓誌銘逸士陳君諱殷字嘉靖世居豫章之豐城故邑晉雷煥掘劒處曰營塘里里故家莫尚陳氏陳氏之賢莫尚嘉靖其曽大父亨大父世興父應軾皆事髙尚而家範齊肅如素宦君少孤母王氏教育之年十五而天下易代辟地母家因受學舅氏博學强記尤好讀梁太子統文選故下筆為文章皆有規矩事定而歸始與世相酬酢應機合變動無遺䇿伯氏嘉謀每讓其能才與學躋徳與年長宗族鄉黨咸屬望焉伯氏早世撫孤育幼如見伯氏田園第宅中嵗載斥乃法朱氏家禮改作先祠冬至以少牢祠始祖春秋祀先祖悲哀涕泗如見所祭凶年饑嵗發廩賑貸不待勸分新知舊好交際以義不事姑息晚重構所居堂署曰樂善大書其門曰當平世遂安居以示終焉之志元統復改至元之嵗正月朔旦又大書其兩楹曰行仁自孝悌始起家勤儉中以垂訓子孫三月二十日以疾卒年七十三且屬纊子若姪皆涕泣固求一言以自克乃瞪目而言曰可以終身行之者和而已遂卒三年九月庚申葬折桂鄉禄城里其配王氏墓南又明年其孤植以所親熊君椅所為狀請銘余嘗聞君嘗有奴死仇家者仇大恐祈哀于門君曰吾豈以此報仇者謝去之又有商糴粟誤持賈嬴而君弗知商頃自覺與其徒更相怨君聞故得實曰吾豈以此為利者立還之君葢盛徳人也足以法於後世矣君娶王氏為婦為母内外皆儀之先二十年卒得年四十二繼雷氏亦有淑徳先三年卒得年六十四子男三果迪植果為伯氏後迪先九年卒孫男三伯庸伯寧受生女四曽孫男二普奴徳奴女一銘曰時俗之日墮兮忠厚之日衰兮嗟若人而天不憗遺予倀倀其何之已而已而庶其後之可期兮何先生墓誌銘至順二年夏詔以集賢大學士全公嶽除平章江西行省事秋具書幣遣使帥撫州太守即隠所聘孫先生轍何先生中而孫不起何先生既至以為龍興郡學東湖宋濂二書院賓師明年春與其子渡江遊西山主丁氏夏六月二十有三日以疾卒丁氏為具棺殮其命子為位受弔諸大夫士皆㑹哭後三日子成孫奉柩以歸明年十月十有三日葬邑之清原妣夫人唐氏之北其門人李肅以狀至京師請銘於先生所與遊者揭傒斯曰何先生海内故人執論撰之事而相知深者惟子舍子無宜銘者噫余以兄事之者葢三十餘年矣余不銘誰宜銘先生諱中字太虚一字養正世為撫州樂安官族曽祖諱詵伯祖諱夢龍父諱天聲登宋咸淳辛未進士第官至主管刑工部架閣文字以才畧與伯兄兵部郎中時齊名文丞相建都督府皆置幕下先生少頴拔以古學自任天下載籍靡不貫穿藏書萬卷皆手自校讎廣平程公鉅夫清河元公明善負天下知人之鑒皆器遇之至大初二公及栁城姚公燧東平王公構皆在朝遂北入京師以文章自通會諸權臣用事内外翕翕居兩月天大雪竟不别而去歸與諸門弟子講易書詩春秋大江之西同郡呉先生澄號天下儒宗又為中表兄然每推讓不敢置弟子列積所著書曰易類象一卷書傳補遺十卷通鑑綱目測海二卷通書問一卷韻補疑一卷六書綱領一卷補校六書故三十一卷知非堂槀十卷支熙録二卷薊丘述遊録一卷其門人潘懋類聚刻之先生之學可謂𢎞肆深博矣然生世六十有八年連蹇愁悴者十八九書幣一入谷而客死三百里外不知天之恝然於斯人者獨何哉豈其多學善著書亦天之所忌邪此固窮士之所自託者吾不知其何故先生娶陳氏有三男子曰長孫在孫成孫四女嫁士族孫男十人銘曰夫容之髙吾其跂而鰲溪之深吾其厲而先生之沒曷其起而靖逸處士熊公墓誌銘集賢所號靖逸處士熊公豫章豐城善源里人也諱召子字南翁少豫章先生朋來十二嵗先生世與公連牆以居後家郡中先生每歸里必舍公所公至郡中必舍先生所兄弟自為知己公博覽載籍好論古今事如生其時性抗直辨是非枉直如别黑白雖大官豪吏一語失度即面折語琅琅不少衰然卒如公言人有言論失實舉措無節于名義或有所闕必詬辱之人亦莫之敢怨退自悔艾而已葢皆出乎正也故鄉之人倚之以為安視之以為去就雖紛爭辨訟可一言而解公早以儉勤起家而以儉勤終身不少易其常後至元五年十有一月十六日卒年八十三將以十二月十八日葬富城鄉交陽之原其諸孫請銘系之曰曽大父諱海大父諱英父諱誠孫娶雷氏生子男二雅先十九年死盜京先五年以疾卒女二長適范希驥次適范世隆繼黄氏孫男二克愛績克愛早世無子以嗣祖為之後女六曽孫男二長即嗣祖次普福女二𤣥孫男一長夀公之葬實與子京同其兆云嗚呼余與公居相隣世相好情義之相與殆未有過於吾二家者然自余竊禄於朝不相見者動十餘嵗余間每一書還公必杖䇿詣門訪出處余書中亦往往問公安否葢跡雖疏而情則至親也又聞余未還時公數向人言吾苐得與揭曼碩一見而死吾不恨矣吾當忍死待之及余還即買羊載酒躬相慶勞其喜見顔色猶親子姪不知余之不肖何能得此於公也其亦以先世之故與公未沒前一日余猶及坐公榻前相與劇論當世事不知竟為永訣也悲夫銘曰鬱交陽兮窈深結重雲兮愁陰望君子兮不見渺千古兮傷心傷心兮何極鄉誰歸兮里誰式孫既子兮子又孫承惠澤兮其無斁劉先生墓誌銘吉之永新儒師劉先生諱友益字益友是為清江公非先生九世孫曽祖諱宗信父諱繹世以家學為邑人師父剛嚴介特獨立無朋而以先生為之子故少與物忤先生少好學貧不能得書從里之多書者借而讀之朝借暮易暮借朝易窮晝夜讀不絶聲過目輒記間為人傭書以給膏火父母憐而禁止之乃掃别室羃牕戸竟坐黙誦如是數年貫穿六經包羅百氏至天文地志律厯象數山川聨落郡縣廢置皆可指畫而談毫髪無遺也宋之亡鄉里豪猾並起為亂與伯兄真長從弟人暐皆遇害先生絶而復蘇饑困踰年乃卜築髙山之間杜門著書不與世接以聖人之志莫大於春秋繼春秋之迹莫大於通鑑綱目凡司馬氏冝書而未書者朱子書之冝正而未正者朱子正之恐朱子之意不白於天下後世乃著通鑑綱目書法五十九卷葢歴三十年而後成天厯中邑進士馮君翼翁傳其書至京師國子先生得之大驚曰昔者王道衰而春秋作春秋隠而綱目興書法不作綱目之義又將微矣故聖人之述作雖殊所以扶天綱立人極一也遂録副在官俾六館諸生傳習之至順三年三月三日昧爽先生疾作猶正衣冠危坐至午而卒年八十五以某月日葬邑之禾山鄉大豐之原娶陳氏繼段氏子男三矩衡節皆克紹先業孫男十曽孫男一又明年夏馮君調官京師矩具狀介以請銘馮君曰先生外和而内剛外通而内介言簡而要不迂濶於事其誨人也諄諄善誘白鬚丹頰神情蕭然真有道者嗚呼若先生者苟見於用當何如哉銘曰百圍之木不為斧柯蹄涔之水不為江河元有天下先生在野先生在野志在天下百世之上先生此心百世之下先生此心先生不作山髙水深劉福墓誌銘廬陵劉福字孟介五嵗好學日記千言不知有童子之樂父母每憐之十嵗聞科舉行即大喜忘晝夜廢寢食蒐獵經史旁入㨗出務為無所不知聞有學出己上便往與交聞有大人先生便往質其所疑祈寒極暑不懈人亦莫不樂告之以道然一資以為進士之文如是數年學大進雖宿學有不逮又限以年不得試於有司或曰今天下州郡以國書設教官可得遂因言者求之三年而後得然卒不好數數語人曰吾不能取一第為父母榮不數為人聞有以進士及第者輒俯首終日食則嘆寢則寤語父母曉之百端終不釋或又曰子欲為甚可隠年以即事世若此多不可數乃瞋目訶曰子教我以欺君耶去然怏怏日益甚父母及其從父皆以為憂鄉先達劉嶽申彭士奇羅曽深愛之亦皆以為憂未幾果得疾疾且革猶手不釋卷未嘗就牀泰定三年十有二月八日嘔血死將死歎曰吾生不在科舉後沒不在科舉前命也然世必有知我者銘我得銘吾不恨矣言絶而卒卒年二十四明年夏余至廬陵其父及其從父偕其友以銘請嗟夫忍不銘哉惟古者士生八嵗入小學十五入大學而教之必時故傳曰春秋教以禮樂冬夏教以詩書又曰春誦夏絃秋學禮冬讀書因其時順其氣協之以陰陽動靜之道和之以藏脩游息之節以成其學由司徒大學正以登於天子而爵禄之故人無夭札而器可閎也今也教之不以其時學不以其序及為之選舉則又限之以年嵗使奇才英銳出類拔萃之士恒鬱鬱而不得竟伸其志愚鹵鄙陋者或媮慢優游得以玩嵗愒時此劉孟介至於嘔血而死也雖命焉其志有足悲者乃志而銘之使其英邁勃勃之氣常得以振頑奮懦為有志之所深恤也曽祖紹明祖惠可父國瑞母曠氏娶歐陽氏無子女一人方七嵗以沒之明日葬里西溪之上太平原銘曰名不建兮心不摧身不殞兮時不來吾銘汝兮吁可哀吾讀吾書齋銘惟皇降衷萬物備我或昏以迷或岐而左煌煌六籍如日麗天由之斯聖希之則賢而倀何之而思孔悲孰之子歸而有餘師伊予云遘蕭氏克有日就月將誰掖誰誘曰諺有之吾讀吾書亦既從政惟書之劬吾書伊何匪聖弗讀成已成物惟日不足于以名齋于以表志凡百君子尚迪弗替孝友堂銘孝首百行友列五常為仁之本為政之綱學由兹始行由此推善由兹長慶由此基是以孝友著乎詩書君子述之為世之模不求父慈而責子孝不求弟恭而責兄友父無不是其責在子弟有不恭或自兄始子知盡孝敢望父慈兄知盡友弟恭敢期父無不慈弟無不恭惟孝惟友克誠於中一有弗誠必致怨尤日復一日化為冦仇范則有匡雁則有行而況為人敢不自强孝盡生慈友恭亦爾孝慈友恭百世之祉子復為父子必紹之弟復為兄弟必效之父父子子兄兄弟弟惟贑孫氏以克永世何以克之勝私窒欲家為一人族為一族既貴弗驕既富有禮一家興仁里為之美蘇子説剛乃祖是敬子孫孝友鄂國是命我作銘詩式篤爾慶神之聴之有永無竟潭心齋銘金溪洪君王純其先府君號碧潭遂取翰林學士呉先生賦碧潭詩語名其齋曰潭心為之銘山下出泉混混其源流而為川瀦而為淵淵淵其淵潭潭其碧含星為珠沈月為璧其止非息其應不留溶溶而春湛湛而秋觀靜於動知靜之用用無不周若未嘗動觀動於靜知動之靜廓乎有容表裏交映惟淵之深又名曰潭視潭之碧于彼潭心思無邪齋銘為學至難莫微于思一出一入或公或私其思伊何曰誠而己思有弗誠毫釐千里其誠伊何恐懼戒慎莫顯乎微莫見乎隠暗室屋漏上帝是臨一動之微敢有弗欽誦詩三百一言以蔽曰思無邪乃義之至熊氏力行而以名齋俯仰周旋涵泳聖涯大而化之堯舜執中朂哉思乎罔或弗恭讀書處銘古者讀書學之一事力行是務記誦其次苟非讀書孰稽古典讀而弗學去聖逾逺古之讀書於以明道今之讀書資以為暴生皆厚也遷乃去之人不知學若之何其其書伊何易書詩禮春秋筆削日星垂紀秦漢以前傳注未立學必專門難學易入秦漢以後濂洛並起著述紛紜易學難至學之而至匪由他人學而弗至何有於身其學伊何由䝉而聖灑埽應對窮理盡性毫釐靡間徳乃日新一日復禮天下歸仁羲皇之上唐虞之際若友其人若共其治動之斯應為乃有功三綱既立五典克從求之非艱其在方册行之非艱中道勿畫欲知詩書於此其處趙氏行之名齋其寓既脩於身復齊其家始施於邦如玉靡瑕好正嫉邪崇本抑末制財以寛用刑以活擴而充之儀於天朝惟是正人萬世之標我作銘詩以規以頌凡厥讀書朂哉體用忍恕堂銘古之學者有紀有倫忍以定性恕以求仁維忍伊何存仁存禮維恕伊何推人以己忍為恕用恕為忍基凡忍之道惟恕之思忍不由恕宿怨藏怒惟忍而恕毋我毋固以聖而忍耕稼陶漁以賢而忍九世同居苟不思恕亦豈克久舜有大焉為孝之首有美袁氏兄弟怡怡合堂以居忍恕是師我田我廬先君之有我兄我弟先君之子惟忍惟恕維徳之實子子孫孫永保勿失方寸間銘察日月於孤竹之竅寄天地于秋毫之杪萬物皆備吾不知其多一物不留吾不見其少是曰方寸間者臨通衢俯深沼外有幽花芳草之植内有圖書琴瑟之繞容坐客十數而有餘閱朝暮萬變而未了吾方以為大人猶以為小是未能遊乎方寸之表也文安集卷十三欽定四庫全書文安集卷十四元揭傒斯撰雜文天馬贊皇帝御極之十年七月十八日拂郎國獻天馬身長丈一尺三寸有奇髙六尺四寸有奇昻髙八尺有二寸二十一日勅臣周朗貌以為圖二十三日詔臣揭傒斯為之贊贊曰惟乾秉靈惟房降精有産西極神駿難名彼不敢有重譯來庭東踰月窟梁雍是經朝飲大河河伯屏營莫秣大華神靈下迎四踐寒暑爰至上京皇帝臨軒使拜迎稱臣拂郎國邈限西溟䝉化效貢願歸聖明皇帝謙讓嘉爾遠誠摩于赤墀顧瞻莫矜既稱其徳亦貌其形髙尺者六脩倍猶贏色應𤣥武足躡長庚回眸電激頓轡風生卓犖權奇虎視龍騰按圖考式曽未足并周騁八駿徐偃構兵漢駕鼔車炎劉中興維帝神聖載籍有徵光武是師穆滿是懲登崇俊良共基太平一進一退為國重輕先人後物萬國咸寧仙茅述豫章之新建黄堂隆宫道士羅君大年為予言仙茅事甚異其言曰昔晉之亂有神人許旌陽者出於豫章之境西山之下能以忠孝積功累行致仙道師事諶母於丹陽之邑黄堂之墟母既受以道要旌陽感之曰吾必嵗朝母母曰吾即從此逝矣去汝居南五十里吾有飛茅在焉汝能得茅處即祠我嵗八月一至足矣而諶母果仙去旌陽還得茅亦叢生而地亦曰黄堂即建祠祠諶母嵗如期往朝之旌陽尋亦仙去其徒嵗八月四日具幢蓋儀衞豉樂奉旌陽像朝母如旌陽存時以為常其後嗣其學者擴其祠為觀復為宫至今行之不衰茅在祠前翦而後生如揚州瓊華不易其處茅具六味能致六養鹹能養氣辛能養節酸能養筋滑能養胃甘能養肉人得茅煮而飲之可以已疾癘和榮衞延年却老余家距祠百里未嘗至其處然嘗得茅煑而試之言不虚也夫茅著於易書詩禮春秋傳祭則以縮酒封則以藉立社之土以其物雖薄而用可重也未嘗言能神異如此世稱神仙遺蹟奇詭荒誕不可深致詰者以千數而諶母特以茅著稱其師弟子精誠之感不可揜如此夫古之言得仙者或以服食或以導引不食穀獨稱許旌陽以忠孝積功累行致仙道葢足尚矣夫可以動天地感鬼神貫金石亘古今而不泯者惟忠孝為然況其師弟子之間乎然嗣其學守其壇場而無諶許師弟子之心則樵牧踐之牛羊踐之茅雖神能歴千嵗而獨存哉因羅之拳拳有感於忠孝云者述以傳之作仙茅述至順三年秋七月靜虚解閬中蒲瑛粹玉揭其齋靜虚自夜郎走書京師求予言作靜虚解惟靜為能統天下之至動惟虚為能容天下之至大至動天也至大地也非至動無以見靜之用非至大無以見虚之載惟靜虚衆理出焉萬物生焉故聖人則之君子學成於靜益受于虚非靜虚無以成君子況聖人乎惟聖人為能合靜虚之體致靜虚之用故可以}
