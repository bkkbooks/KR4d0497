  - {type: variant, offset: 7, length: 0, content: '', WYG: 兩蒿蓬子孫分散盡空有牛羊蹤羃䍥楊栁枝䝉茸春草齊夭夭誰家婦采桑臨路岐零露沾其裳蛛絲卷其衣樹髙身苦弱蠶饑行復遲辛苦事姑嫜宿昔減容輝見者皆歎息此心知獨誰良人日暮至醉問爾何為啁啁田間雀啄啄常不給春水日已深網羅復相及既無養生具日夕湯火急}
  - {type: page-break, offset: 7, content: '', id: KR4d0497_WYG_001-8a, image: WYG1208/WYG1208-0154c.png}
  - {type: variant, offset: 8, length: 7, content: 才俊張家好弟兄, WYG: 謝雲間禽無為自羈縶祝融九千丈瀟湘地底流洶湧洞庭野崩騰江漢秋上有飛仙人身披紫雲裘昔者嘗相遇緲若乗丹丘同歌黄鶴渚共醉岳陽樓思之忽不見獨立悵悠悠我有琅玕草欲贈江東客}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 道路長卷袂空歎息靈苖世所尚良士余所惜神仙無千年耿耿誰復識五歳能讀書十歳能賦詩十五事逺逰三十無所為既􅆾俯仰責復為鄰里欺生計日已踈世態多瑕疵煌煌金張門徒𨽻皆光輝日宴賔客集軒車如風馳一笑擲千金片言委黄泥齊生獨抱琴來徃何迤迤夢兩離阿英十二能辟纑阿牛五歳貪讀書辟纑成縷無人識讀書有志令人惜汝父飄零汝母休吾親雖健俱白頭雨聲斷道風驚屋阿婆獨抱諸孫哭夢武昌黄鶴樓前鸚鵡洲夢中渾似昔時逰蒼山斜入三湘路落日平鋪七澤流鼓角沈雄遥動地帆檣髙下亂維舟故人雖在多分散獨向南池看白鷗遊麻姑山五首并序}
  - {type: page-break, offset: 17, content: '', id: KR4d0497_WYG_001-8b, image: WYG1208/WYG1208-0154d.png}
  - {type: page-break, offset: 17, content: '', id: KR4d0497_WYG_001-9a, image: WYG1208/WYG1208-0155a.png}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 北憲使程公閒居盱上二年矣五月二十日詔拜翰林學士又十日公與使者及諸客同遊麻姑山輒以覽厯所止賦詩五首雲關君子荷初服思至若無榮穆穆芳雨散悠悠蒼山行危關擁霧黒飛衢緣雲青苔蘚滑如積杉松窅㝠㝠時逢負苓翁忽聞流}
  - {type: page-break, offset: 18, content: '', id: KR4d0497_WYG_001-9b, image: WYG1208/WYG1208-0155b.png}
  - {type: variant, offset: 19, length: 2, content: 碧留, WYG: 聲舉足向益髙矯然欲遐征徒𨽻各忘倦矧彼髙人情飛練亭神工擲天紳挂之兩崖間萬古輸不盡誰能測其端勢割山石愁氣挾草木寒安得天風吹繫彼日月還麻姑緑雲髪黝黝長不殘湧雲亭泉源出地底仰向雲中行擘厓㵼千丈亂石皆騰獰風霆日夜急雨雪虚空明不有神物扶兹山應乆傾噴薄側飛鳥砰鍧愁百靈仙家信為好喧聒何由平三峽橋兩山束飛梁下塹不測淵誰開萬尋鐵逗此無窮泉淙淙輥空曲洶洶投奔川陽光下照之忽作龍騰天常恐桑田變中有瞿唐舡麻姑壇嵯峨仙都觀遙望丹霞天後有千歳松前有百頃田風日夏颯沓烟雲晝葱芊羣彦一時集安知非列仙持觴起相醻罷琴抗髙言天道信悠邈人情何拘攣靈君不可致落景詎少延仰雖慙㝠㝠俯實憂元元主人顧坐}
