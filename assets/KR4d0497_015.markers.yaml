  - {type: variant, offset: 1781, length: 0, content: '', WYG: 人苒苒掉臂還明年獻墨奎章閣却與朱氏分朝班武岡扶丘山紫府延夀宫宋張真人守静所居也至今禱雨暘輙應其徒純真子饒君禮誠延祐中入京師為今𤣥教大宗師吳公所知居太乙延福宫十五年將南還山中詩以送之洞庭之南扶丘之山綿連九疑控百蠻昔在嘉定之世真人張氏隠居學道於其間祈晴即晴祈雨即雨犇走郡縣勞躋攀鋤雲架霧開紫府采芝種术留朱顔夜驅猛虎守庭户晝役鬼物除榛菅真人乗雲上天去但有青鸞白鶴長徃還雲霆尚與司豐艱爾來一百五十嵗弟子饒君通道氣一住京華十五年太乙宫中獨超異不求逸少冩黄庭欲逐浮丘攬香袂南望悽其憶故宫黄河日與夢俱東河流到海不復返故宫長在白雲中天地無停機日月無淹軌歸去來白雲裏題漁樵問答圖我在孤}
  - {type: page-break, offset: 1781, content: '', id: KR4d0497_WYG_005-4a, image: WYG1208/WYG1208-0195c.png}
