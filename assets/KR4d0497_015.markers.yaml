  - {type: variant, offset: 58, length: 0, content: '', WYG: 浩浩水増波門前五栁樹繁蔭日婆娑秫田已成收歸計當如何寄題傅尊師兄弟所作寜壽道院鍾榮之山千萬峯琵琶塵湖相疊重兩翁入谷起臺殿半夜空山聞鼓鐘猛虎時逢澗邊石飛龍却是雲間松黄庭書罷人難見鴻寶披殘手自封度壑采芝隨鹿跡登厓望日躡雲蹤已知塵世惟堪笑不是神人定少逢辟榖有方桃更美圍碁無地橘相容但餘一念封人祝未與人間萬事慵二月朔日雪中題歐陽少監所藏宋好古畵竹晨朝下延閣貽我翠琅玕微霜著節勁}
