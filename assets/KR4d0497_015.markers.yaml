  - {type: variant, offset: 1780, length: 0, content: '', WYG: 得見此花開此花元不筦一任雪霜催玉樹臨風好更於明月宜空山冷相照未必有人知題牧羊圖求牧既已得敗羣還復去白晝捫蝨眠清風滿髙樹題草蟲圖二首傾陽朝莫同忘憂嵗年改蜂蝶那得知側翹方采采有竹不必多有荳當自熟坐看蜻蜓輩日晏紛相逐再題二首種藥都防憂滋蘭總為春青蛙與蜥蜴何用亦紛紛直節直彌堅弱蔓弱空纒微霜一夕降蚱蜢亦悽然題石頭和尚草庵圖青天不可量好風亦無價試覔庵中人蕭然古松下題何尊師畵牛圖圖惟一牛並無坡岸草樹人物之屬莫是度闗者寜非喘月時茫然天地内誰問復誰知題柯博士為方叔髙所畵墨竹蒼蒼四君子意氣侵雲端六月不敢近蕭蕭風露寒丘氏南陵月磯亭明月滿灣碕先生獨釣時漁人渾未識惟恐白鷗知題四梅圖一兼松竹山礬一兼水仙一兼雪月芝草一兼蘭與小徑蒼松側疏籬翠竹間相逢如有約乆立不知還亂蘂逺難分寒香近却聞何人心與迹於此可同羣誰將配水仙更欲比山礬試問花知否臨風笑不言芝草黄金色蘭心紫玉㽔忽從花下見可恨不同時送阿英童歸揚氏弱女年十三兩年失母慈看拜阿婆去憶着初生時野鴨詞野鴨雙雙沒輕鷗兩兩浮人生亦如此那有别離憂題雪竹初霽圖已奮尚離披連朝被壓欹虚心與直節唯有太陽知題蒲萄翠實肥初熟瓊漿迸欲流向來為酒者一斗博凉州文安集卷四欽定四庫全書文安集卷五元掲傒斯撰飲酒篇悼亡後作昨日飲酒酒苦薄今日飲酒必不樂未知明日還如何枝上落花能許多胡蝶飛飛春草草對語黄鸝清且好有酒有酒且莫沽庭前獨宿鴛鴦雛從他痛辭并序江少虞類苑載開寶中金陵人修故營得石記𨽻書從他痛凡數百字末復云不為石子盡更書千萬箇從他痛未幾王師渡江余謂此必埋恨者非渡江䜟也作從他痛辭石可絶恨不滅日月雖光明不照石上情情深化作秦淮水水流成血波濤起流入東方大海中風吹復向秦淮裏秦淮裏深復深土囓石上字字字痛連心痛連心從他痛秦淮水空相送除是相逢話痛時始是此心無恨期吳歌一首送張清夫提舉征東校官先還呉中呉中女兒白如華呉江燕燕拂波斜呉中魚肥米可束夫君無事乆忘家夫君自别呉江水聲名籍籍京華裏家家屏幛待新詞日日王侯置酲醴呉中之居不可踰京華之樂天下無髙官厚禄不願有上疏乞官還海隅秋風髙吹燕山樹扁舟且向吳中去呉中兒女白如玉看着新袍入華屋贈許道士廬山道士許自然二十武當學飛仙白雲㝠㝠不可見天際時聞清嘯傳虎將乳子共遊戯龍化老人同食眠無求始悟身非患有道方知世可捐忽聞賣藥入都市便欲乗風凌紫烟紫烟之中曠邈邈下視人世真堪憐爾曹齷齪塵埃下何日南山歸種田題見心李公小蓬萊媧皇狡獪弄餘智手揷神山滄海裏不敎寸碧落人間弱水更環三萬里何人摶土為此竒太乙真人謫仙子芙蓉為舟桂為楫碧玉連環白雲履山根植棗漸如𤓰山頭種玉今成髓平生九州視一豪秦皇漢武空勞勞山林㝠杳百鳥號明月飛出琴聲髙黄母呉氏挽歌新安之水清且深深深如見黄母心新安之水髙且烈烈烈如見黄母節母也不幸早嫠居三十未有二十餘六十餘載一日如子又能孝孫詩書嗟母之德靡不宜人歌不足國旌之爾今死矣歸何時新安之山可鏟而夷新安之水可陸而馳黄母之德不可思送墨工潘生還臨江豫章朱氏以墨名直與郭玘争豪英臨江潘氏得墨法乃自柯山翁彦卿朱氏親承天子詔墨入奎章獨稱妙潘氏近日來京師羣公得之惟恐後潘云吾墨猶草草盡藝為之當更好明年此際來京師始知吾墨堪為寶東風蕩蕩吹燕山}
