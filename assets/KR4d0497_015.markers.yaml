  - {type: variant, offset: 51, length: 1, content: 隙, WYG: 南歸窮秋乍到深冬别來只俄然去忽然學士已分修史禄道人特送賣丹錢單車欲發無三日幾處同行可百年積雪堅氷愁客路徐州城下便通船憶昨四首天厯年中秘閣開授經新拜育羣才宫門待漏常先到講席收書每後囘召試時蒙天語勞分題不待侍臣催滿頭白雪丹心在太液池邊只獨來宫草葱茸禁樹齊日趨延顥對凝暉朝迎歩輦花間立暮送囘鑾栁下歸碧殿東浮蒼巘合金河北引玉泉肥幾迴𢎞慶門前路春氣濛濛欲濕衣己巳羣儒映璧奎端陽侍燕寶慈西線分學士親臣送詩賜皇姑御手題注酒含春瑶露重承塵轉午錦雲低日斜共出西門道既醉猶能散馬蹄奎章分署隔窻紗不斷香風别殿花留守日頒中賜果宣徽}
  - {type: page-break, offset: 51, content: '', id: KR4d0497_WYG_003-3a, image: WYG1208/WYG1208-0173a.png}
