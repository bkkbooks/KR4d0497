  - {type: variant, offset: 2056, length: 2, content: 從西, WYG: 兮闕鳥縱横而蔽野兮日崩騰而出師鬼啾啾而晝嘷闕狐狸嵗浩蕩而忽莫兮民憂愁而曷夷仙不歸兮孰保順而抵嚱仙超遥乎恬漠兮豈上帝之攸命既年穀之不熟兮物疵癘而逆性匪聖人之顧懷兮焉達祥而𦙍慶仙之歸不歸兮無使我心勞而神病蘅薇藹其樹芳兮山嶛㟽而窈深泉潺湲而轉石兮交靈禽之好音桂巃嵸而蔽天兮虎長嘯而龍吟仙之歸不歸兮何繚繞而滯淫闕衣彤霞之襜襜兮布列星以為冠佩長劒之陸離兮駟八鸞之安安海若惙而怛妖兮䕫罔竄而莫干仙既有此靈徳兮曷不歸憫乎}
