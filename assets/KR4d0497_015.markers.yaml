  - {type: variant, offset: 279, length: 6, content: 予劇談竟曰忘, WYG: 吾父倘有知髪解鞍自墮俄至一墳前鞍墮髪自解開墳見前和題字宛猶在既見父姓名痛絶心始安函骨陳野祭禽鳥聲為酸隣老四面來驚歎未曽有相帥報縣官縣官駭之乆即日上大府大府咸異之次第聞中朝行子正南馳行子行且傷哭踴如初䘮路遥山川阻何時至故鄉故鄉既云至塟祭無違禮母子永不離萬事若流水聞者盡稱孝見者皆感泣期爾百嵗昌望爾百禄集兒今一無願願母長不老嵗嵗父墳前灑飯墳上草題姑蘇陸友仁所藏衛青印白玉蟠螭小篆文姓名識得衛將軍衛將軍今何在白草茫茫古時塞將軍功業漢山河江南陸郎古意多廬山連尊師求真陽詩乆諾而未作也一夕夢中得之因書以贈稽天之浸不可滅焦石之烈不可絶香爐峯頭按羽節滿山桃花滿湖月贈項鍊師吾聞有一士邈在呉越間騎虎滄海上茹芝天台山年約四十餘七星布其冠燕趙雖曠絶倐忽一徃還樵子常見之徑去不可攀又聞好賣藥徃徃在市闤疾者得寸匕立欲生羽翰吾常慕其人咫尺限河闗道書讀萬過不如一承顔弱志揜昏氣卑卑逐王官何為浪自苦食息於人寰送鄉人祐上人從師歸當陽學道玉泉寺從師天子都流年春事半歸路客帆孤山勢遥連蜀江聲不入呉故園如可到種芋有遺區送蘇尊師歸茅山華陽隠居者聞復有蘇仙時向梅花下髙枕石頭眠劍匣出飛電琴心流暗泉閒來京闕下夜夜夢雲邊寄題張齊公廟東安猛將張齊公十八奪父軍囚中至元召募起亡命父子南伐收竒功酒酣一躍馬上立㧞劍四顧犇雷風十年轉戰江漢上萬里直挽安南弓乾清坤夷四海一勲在旗常心帝室身封萬户傳子孫誓不偷生汙天秩天下豐盛大德年天子明聖宰相賢小臣劉深射功利上疏自薦能開邊鬼方寡婦號八百嫂叔操戈自争國劉深一言取大官逺帥官軍臨險阨五溪運糧數萬家哭聲震動湖南北發徒開道徑折節既勤其民大求索斗量金珠谷量馬谿壑之欲安可塞此時張公亦在行捐軀力諫皆莫克折節薄險伏四起劉深夜遁張公死鳥飛不度山川愁坐看英雄化為鬼乃知自古守邊鄙大忌邀功貴寜敉張公廟食東海頭劉深梟首蠻烟裏張公世為忠孝門劉深萬年穢青史兩家同死不同心試與題詩作臣軌寄題楊敎授菊莊歸人種菊處乃在東海涯幽香發清真正色間竒葩百種猶未愜千株寜足多寒分石橋月晴通赤城霞特起表陰戺羅生騁陽阿門巷掩蒿莱荒徑絶經過飲露咀其英孰知年嵗遐番陽蕭性淵攜其祖將領所愛唐琴號霜鐘者還自和林求詩六月三日午門宣赦後作嵩州昔有蕭將軍讀書學劍天下聞南隨龍馬渡江去尚有孤琴傳子孫孤琴云是唐人斵昔日軍中自行樂至今猶存殺伐聲一鼓哀風振寥廓將軍之孫才且良文能作賦武蹶張秦皇城下飲白馬祈連山中射白狼時平好文不好武抱琴却歎儒衣誤昭王臺上看青春彭郎磯頭夢歸路日長史館幽且閒正冠拂琴為我彈京城六月日如火霜鐘半夜鳴空山南風自有虞廷操可惜同心不同調捐琴决眼望青天今日天門有新詔送王伯循編修赴南臺御史朝辭禁苑暮南臺驄馬翩翩道路開佐邑已知為治最經邦正頼濟時才人情好惡非相逺民力凋殘實可哀鵰鶚秋天須搏擊郊原恐有鳯麟來寄題鄴下樊氏鍾秀園鄴都雄地里樊氏好園林庭户花陰合池臺樹色深佳時惟飲酒永日自彈琴車馬如相訪流泉可洗心題廖氏皆春堂時清日月明心和寒暑平東風扇萬物華開語流鸎農興水泉動蠶起桑柘榮牛羊被原隰麟鳯在郊坰少者擊壤歌老者鼓腹行不知天壤内何物異吾生常願天子聖四海無苛征夔龍滿廊廟簫韶歌九成大熱疾勢危甚項君子虚視之一藥而起為賦五言一首為謝天臺項子虚乃是列仙儔賣藥都市中疑是韓伯休欲見不可得不見忽相求神清骨秀聳蒼松倚丹丘又如霜空月下照千丈流時有揭子者卧病城南陬馳徃施寸匕大暑生清秋人言死復生仰視行雲浮長揖忽不見思之生白頭周氏敖山驛水木清華亭周家亭子敖山上斷隴連岡紫翠開晴日巻簾幽鳥下微風倚柱白雲來松間漁艇時俱放竹外樵歌晚獨囘咫尺紅塵車馬地已知弱水限蓬萊題趙照磨虚舟刳木作孤舟乗風到處遊寜求觸無怒政用載能浮歸共唯明月行隨只白鷗浩然江海上何懼復何憂送毛真人還龍虎山手綰銀章主秘祠翩然歸}
