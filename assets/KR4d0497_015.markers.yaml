  - {type: variant, offset: 2013, length: 0, content: '', WYG: 竹者貫歳寒而後凋故以植乎西北中又雜植梅數十株曰松竹之友也今皆蔚然為林矣若菊若牡丹芍藥之屬叢生而可愛皆列於亭之左右以便觀賞合而名其亭曰園趣其出入之途在正東近所居也海棠之西有二池夾道鑿小渠引水經其所居以入於東池渠之上古木參天其先祖所手植也東池之外又為大池春夏泛溢可以舟楫池之北為堂八楹以為子弟講肄之所又北為堂六楹以館賔客又北為重屋六楹以藏累世之書此其園外之事又所以為成趣之本叔俊治家有法臨事有斷凡公上之共必先之故叫囂之吏不及於門田園山林之務必擇子弟之賢僮僕之良者各受其成以治之故叢脞之政不嬰於懐子孫之教必隆禮厚幣聘良師友以訓之而日就月將之功又足以樂其志此外非祭祀賔客慶弔之事不得闗說日坐亭上與園丁埜老論農圃之要除其榛穢脩其經術䟽其流泉時其灌溉觀其華實之生成閲隂陽之變化以詧夫消息盈虛之理而忘其世慮客至則觴咏嘯歌或}
