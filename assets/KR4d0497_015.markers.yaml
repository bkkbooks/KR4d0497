  - {type: line-break, offset: 0, content: '', id: KR4d0497_SBCK_015-1a02}
  - {type: indent, offset: 0, content: 　　, id: KR4d0497_krp_015-bkkind1}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 君壽先生鵠山隠居當日自期顔杲卿莫年羞見魯諸生膝兼多病終難屈身為長愁視轉輕日晏典衣留客醉雨餘開户㸔兒耕淮雲楚樹晴如掃卧送年年江水聲送趙履道虞叔常還江右趙子我同里虞郎我同年手折武昌栁送上西江船買魚沽酒燒荻鞭夜下西塞寒山前西塞山碧如苔君今去㡬時來東風花開春水漲待君黄鶴磯頭望君庾公樓上寄題九江義門陳}
  - {type: page-break, offset: 2, content: '', id: KR4d0497_WYG_001-2b, image: WYG1208/WYG1208-0151d.png}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 壽安堂匡廬之隂彭蠡涯七百餘載真良家宋御書表其門曰真良家冲和鬱勃吹不散飛落南山萱草花往時冠葢如流水撞鐘鼎食三萬指詔書十度復租庸每嵗朝廷仍貸米父慈子孝則四方紀淨綱明照閭里蓬萊水淺昆明空天開地闢元氣通張公百忍澤未竭王母千年桃始紅南山築堂三百歩翠竹屯雲森玉樹忠厚必有神明扶淳樸自是期頥具方瞳緑鬢紅氍毹春酒摇蕩香扶踈公侯子孫始必復日為太夫人起居正月十二日尋盧學士船至漢口留詩為}
  - {type: page-break, offset: 3, content: '', id: KR4d0497_WYG_001-3a, image: WYG1208/WYG1208-0152a.png}
  - {type: page-break, offset: 3, content: '', id: KR4d0497_WYG_001-3b, image: WYG1208/WYG1208-0152b.png}
  - {type: variant, offset: 4, length: 1, content: 墅, WYG: 晴江澹微瀾洩雲在層巘參差連舫出散漫羣鷗逺始知遵漢廣遙睇髙斾卷懷賢每忘賤臨流亦忘蹇蒼茫景将入窈𦕈春猶淺新知遽相違餘悰何由展黄尊師髙軒觀鵞因留宿開軒南嶽下世事未曾聞落葉常疑雨方池半是雲偶尋騎鶴侣來此看鵞羣一夜潺湲裏秋光得細分衡山縣曉渡古縣依江次輕輿落岸隈鳥衝行客過山向野船開近嶽皆雲氣中流忽雨來何時還到此明月照沿洄題王山仲所藏瀟湘八景圖卷走筆作瀟湘夜雨涔涔暗江樹荒荒}
  - {type: page-break, offset: 4, content: '', id: KR4d0497_WYG_001-4a, image: WYG1208/WYG1208-0152c.png}
  - {type: 'kr:newline', offset: 5, content: '

      ', id: KR4d0497_krp_015-bkkkrnewl2}
  - {type: line-break, offset: 5, content: '', id: KR4d0497_SBCK_015-1a03}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 天路稳繋渡頭船莫放流下去逺浦帆歸㝠㝠何處來小樓江上開長恨風帆色日日誤郎囘煙寺晚鐘朝送山僧去莫喚山僧歸相喚復相送山露濕人衣洞庭秋月顥氣自澄穆碧波還蕩漾應有淩風人吹􅅇君山上平沙落雁天寒關塞逺水落洲渚闊已逐夕陽低還向黄蘆沒漁村晚照定從海底出且向平沙照漁網未全收漁舟還下釣山市晴嵐近樹參差出行人取次多板橋雙路口此世幾迴過江天暮雪孤舟三日住不見有人家昏昏竹籬處却恐是梅華以事蹔如武昌發臨川江轉欲無路山迴忽似圍客程秋共逺物色晚多疑稍稍沙鷗集葱葱野樹稀武昌今夜夢定有故人知女兒浦歌女兒浦前湖水流女兒浦前過湖舟湖中日日多風浪湖邊人人還白頭大孤山前女兒灣大孤山下浪如山山前日日風和雨山下舟輕自往還送尹十六善叟謁告歸茶陵㑹𦵏賢兄處士十韻八嵗賴賢兄未埋猶望生旋聞日下𦵏敢戀世間榮得告如無及嚴期况有程意長看路短義重覺身輕鄉樹迎船出江雲入暮横望山占驛堠聽鴈作城更但使能臨穴猶堪畧慰情死生今古異去住别離并尚足醻知已非貪美俗評匆匆不可盡迴首各沾纓送黄五舅得武陵校官還辰州寓居省侍寧上山頭種禾黍莫向他鄉作羈旅山田得雨尚有年他鄉顦顇何人憐一身千里家何在全家更在沅湘外獨樹鷄鳴楓葉飛荒村鴈沒蘆花碎親在窮邊望子還子在長途衣復單居無寸田出無僕明年作音佐官當食禄貧交行驅車渉廣川揚帆陟崇丘結交四海内中道多愆尤朔風厲苦節獨鶴横九州朝拂三島樹夕過五城樓兩翅偶寒影曠然何所求登髙臨大江日暮萬里流時哉䟽鑿人八年忘外留出必益稷俱歸與䕫龍儔進退兩不疑功成垂千秋萬事日相敓恩情若雲浮吾心苟不渝反覆安足仇自非天地外何能獨忘憂曉坐張先生朝陽軒朝日照髙樹幽人方啓關蕭寥塵外事風葉滿窻間别武昌欲歸常恨遲將行反愁遽殘年念骨肉乆客多親故佇立望江波江波正東注南康夜泊聞廬阜鐘聲廬山三百寺何處扣曾雲宿鳥月中起歸人湖上聞入空應更迥近瀑正難分遙想諸僧定香爐上夕熏春日雜言七首日月朝朝新何物能獨乆常恐天與地變化亦已朽東風闖然來茫茫浩無首起視桃李樹晱艷一非舊如何揚子雲泯然空自守朝出城西門孤墳何穹窿雄狐竄其西脩蛇出其東云昔有狂士七尺才且雄平生無所頼屠狗涉春冬一朝際風雲身貴位益崇死生好惡間咄唶生秋風氣驕日憑陵家}
