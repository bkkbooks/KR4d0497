  - {type: variant, offset: 1972, length: 2, content: 封谿, WYG: 之何曠官之足懼哉吾惟憂其所不憂慮其所不慮備其所不備仁言而義動雖守數十城可也何有於數十里哉仲寶以為然遂書以贈之文安集卷九欽定四庫全書文安集卷十元掲傒斯撰記冨州重修學記上御經筵之明年夏六月濟南姚侯來為富州以舍菜禮見於先聖先師祝曰惟夫子之}
