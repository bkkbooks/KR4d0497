  - {type: variant, offset: 1975, length: 2, content: 靈峰, WYG: 參天地配日月用中罔敢知而用中實生齊魯之交宻邇夫子之訓欽承明命來守是州今之州古千乗之國也敢不敬恭朝夕惟是顧瞻廟學摧陋弗稱曰余之責也㑹教授清江陳明之繼至議與志合明年秋大修孔子廟仍其舊者惟殿若明倫中庸二堂江山秀傑樓惟一改作而有加規制必裁就法度出入必限由正途凡為屋幾七十二楹又刻銅為七十二弟子及諸賢像以嚴祀事鑿半池其前倣古泮宫侯載經載度是董是勞吏忘其私工勸其勤涉冬徂春用告厥成而命傒斯為之記在至元二十有三年陞豐城縣為富州以河東陳侯元凱為之尹時科舉廢十有五年矣士失其業民墜其教盜賊滿野竟數十里不聞雞犬聲陳侯大懼遂修孔子廟建小學日集文儒故老講求治要悉資以為政不數月境内大治知所務也今科舉既復亦十有三年而侯實來當天下文明人復其業猶皇皇焉汲汲焉以興學校明教化為先務者其守同其志亦同也夫兼有天下父師之責者君也承君之志行君之化者宰相與太守也宰相布於上太守奉於下故人之生也為之學校以教之設科以舉之必使士有恒業民有恒志然後聖人之道可明賢材可得而治可成也古之有天下者莫盛於唐虞三代而不能去學校廢選舉以為治秦能去之廢之二世而亡雖然君子之學視學校為汚隆以科舉為去就亦異乎夫子之教矣夫善學聖人者在畎畆則行乎畎畆在魚鹽版築則行乎魚鹽版築豈待學校之教科舉之勸哉然世豈能皆伊傅其人哉而不為之教與勸也此上之志而侯所以力行之者况上方親御講筵詳求聖人之治愚雖不敏願與學孔子者共勉之侯亷慎簡正不為盛名而人敬畏之葢賢守云全州學記皇元制治舉法周孔元徼絶壤同風鄒魯一郡一邑必謹學校以為教基在仁宗時太子太傅府長史郭侯履治靖五年俗興民和克信其道泰定元年春移貳於全全居湖南九郡之極地小而嚴風氣啙窳郡西湘山又稱無量壽佛入滅之所世奉遺骸奔走萬姓而夫子之廟荒圯穿漏曽莫顧者罷輭者以民勞為解貪墨者以廩薄而辭講誦不興薦祼無所侯至㑹缺太守侯總學事教授黄潤以為請於是侯率僚佐倡於上士民勸於下明年二月即工前清湘長法赫進拜元侯知邑士鄧桂能狀命董其事遂斬木隂谷伐石陽崕食功傭力人不知役太守何公潤繼至朝勸夕勞休威並行及期而廟成乃易夫子十哲像分祠先儒及賢守於講堂之左右翼門序軒陛以次咸畢又辟廟南廢地為杏壇三成以擬闕里建明倫堂四檻以館諸生既告成於廟教授謁告還江西㑹予廬陵曰郭侯每以不得君記為恨敢請乃述其事且俾告於衆昔靖之鄙為羣獠刼以自附者八百餘家數自請吏吏不能討而王賦之供不敢怠遑及郭侯為守天子出使督兵討之八百餘家咸在夷㓕侯以死争乃去刑書復為齊民侯非力能生之也以其民恪遵魏文靖公之教知有君臣之分身雖僻䖏而王共不闕故也全之四境盡為中邦又宻邇周元公之里父傳子習皆聖人之道民之情性豈獨異乎夫殚財浚力以奉無益未必蒙福耕田鑿井以服聖賢之教未必被禍且一絲一粟得以養生送死又使父子有親君臣有義夫婦有别長㓜有序朋友有信君子登於俊選野人免於刑僇果何惮而不為哉亦教化使之然耳為民上者曷敢不敬學在郡治之陰鳯凰山之陽宋紹興十三年之所遷也東南諸山秀麗奇詭湘灌灕水合流其下蓋為一郡之勝云泰定四年八月丁亥記舒城縣龍眠書院記治民之道使民知禮義而已使民知禮義先示其所尚而已民知所尚則知所向方哉廬陵舒城長燮理溥化用湖廣舉首取泰定四年進士第得兹邑首理學政咸用其學以教道民民始益知人之所以為貴儒之所以為重而復知所以養生而送死居二年曰民其可教矣乎於是又治地邑東得李公伯時龍眠山莊故基於東禪}
