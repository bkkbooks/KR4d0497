  - {type: variant, offset: 278, length: 0, content: '', WYG: 自念不見父兒死無歸時乃有曽老者徃昔與父善言汝父死處濱州利津縣徒跣二千里薄言至利津朱琪張文輩一一陳所因死以某年月塟以某木棺姓名某所題近在城南端城南冡纍纍翳然榛莽中極目千萬塜能誰識其蹤行哭七日餘欲死不得所生者無由知死者豈能語解髪繫馬鞍負之墳墳}
