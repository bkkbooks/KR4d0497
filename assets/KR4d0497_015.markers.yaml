  - {type: variant, offset: 2027, length: 3, content: 目老禅, WYG: 地贊化育非靜虚無以成聖人況天地乎惟天得虚而無不覆也惟地得靜而無不載也故能運行四時化生萬物而非靜虚無以為天地故體莫大乎靜虚用莫大乎天地是以衆人法君子君子法聖人聖人法天地天地法靜虚靜虚至矣楊楚經字説余與臨江楊君信可友凡十餘年大徳七年春遇於武昌居數月得子湘書以示余余嘉其年弱而志大且甚好學也遂許以女妻之其年夏與余入衡湘冬俱還江西爾後與信可亦時往還而猶未識湘也十年春余訪信可郴溪上出湘拜余且永所以字之余曰冠而字禮也未冠而問字無乃太早計矣乎信可曰湘惟不得子之言以為式之為患何早計之為患乃問所以名之義信可曰湘之生余適還自湘故以名余曰夫湘楚水之大者也既大其始可不求所以大其終乎夫湘楚之經也吾與若皆楚人也可不求古人之心行古人之道以配湘之經以大於楚乎請字之曰楚經經者本也本既舉矣末有不從者乎夫日月星辰天之經也長河大嶽地之經也五常三綱人之經也故天之經得則日月軌寒暑時雨暘若萬物以育地之經得則海不波江安流山出器車河出馬圖人之經得則家以寧邦以昌祥瑞並至而天地理矣及夫亂也悉反之朂哉經乎苟聴是言也有不配湘之經而大於楚者乎信可聞而喜曰即君之言雖佐天子經邦理天下可也況楚國乎余曰未也苟豉浩蕩而不求其源騖紛萃而不典於學雖欲經於一邦大於一鄉且不得況一國乎又況天下乎朂哉楚經其三復是言也題昔刺使宋圖後右國信副使昔刺使宋圖及君臣賦咏一卷以昔刺公奇偉如此四杖節使宋豈無一言可紀而叙其事者但責宋不能講和及槩稱奉使不辱而已畧不及其使事始末大抵宋之南渡不能復振者本於張浚抑李綱殺曲端引秦檜檜殺岳飛父子而終於賈似道之專劉整之叛況天方以數千年不能大混一之天下付之世祖皇帝以主弱臣强之宋豈能以數萬之金幣保區區江南一隅之地哉故宋戰亦亡和亦亡況二者俱不能之耶然非賈似道誤國失信無以正皇元出}
