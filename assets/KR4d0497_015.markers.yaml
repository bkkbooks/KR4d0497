  - {type: variant, offset: 2059, length: 7, content: 吕梁百步如奔馬, WYG: 人闕昔留侯之純懿兮佐炎漢而興劉惟戒覆以保終兮託赤松而逺遊既載此神裔兮世承烈而紹休帝屢降夫嘉澤兮恩汪濊而下流忍獨棄此明君兮不余顧而少留仙其}
