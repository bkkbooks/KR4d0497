  - {type: variant, offset: 59, length: 1, content: 著, WYG: 霧入林寒欹枝偏稱逺壓葉更宜攅孤石覆逾潤横波晴不乾况兹春雪裏相對五雲端誤當裁汗簡誰擬截漁竿惟應湘浦上歸共幽}
  - {type: page-break, offset: 59, content: '', id: KR4d0497_WYG_003-7b, image: WYG1208/WYG1208-0175b.png}
  - {type: variant, offset: 61, length: 2, content: 飄零, WYG: 觀雲錦溪棹歌七首雲錦溪中雲錦鮮好在髙秋八月天西蜀錦江那得似西湖緑水更須憐纔過浮石是藍溪溪上青山髙復低山中泉是溪中水尋源直到華山西藍溪南去到藍州水底嶄嶄石不流迴望朱宫雲霧裏白雲深處更髙樓宫前棃浦白茫茫岸上人家不似墻能到此中還有幾行人莫厭棹歌長揚金橋望玉真臺臺下橋頭人徃來崇文宫裏看華去安仁縣裏賣薪囘挹僊亭下薛公橋紛紛抵暮更連朝唯有橋西楊與栁無情長繫木蘭橈溪上層層雲錦山垂楊盡處是龍灘不是孤舟來逆上何人}
