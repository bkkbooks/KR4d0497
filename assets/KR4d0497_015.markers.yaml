  - {type: variant, offset: 2041, length: 1, content: 端, WYG: 事請問之時益富矣余適墜馬在告日臥齋閣中福連有所作皆可觀余因取其法度音節尤近者得七首為書之仍題其後以志余喜且以為世之世臣大家學士大夫之子弟不知學者之勸余在閣中時福又從林希顔學國書希顔亟稱其可教其所得淺深余不能知也要亦好上者云爾余數年於文事使令葢深得其助焉因并識於此幽憂賦士有甲與乙約為昆弟者乙之兄弗友於弟誣甲與乙婦私以醜之甲念乙為名賢之後且早負氣節常欲自殺以明無他而母猶存余傷其意為作幽憂賦其辭曰何黤黮而蒙昧兮余不淑而獨當天幽𤣥而無朕兮匪殺身而孰明懷國恩而未酬兮念余母之弗康聊泯忍以苟生兮庶或察於微茫彼哲人之遺緒兮相凜凜其猶有耿光孰忠貞而罔後兮孰耿介之弗昌既托余以死生兮又事余以兄余既異於禽獸兮其忍為此不良彼固衰薄而不足畏兮乃不念厥祖之明明惟棠棣之韡韡兮或違詩人之所歌兄既不友於弟兮又嫉余以不阿騁淫辭以為鵠兮構飛文以為羅彼妬之口兮曽奚辭之弗加人獨何心兮弗求其故而肯訛謂蘭茝之幽貞兮與蕭艾而同科謂百鍊之金以為柔兮指美玉而為瑕乗機觝巇既不遺餘力兮猶恐余顧而有他余髮衰齒就落兮計相存其幾何託寸芳于鄧之林兮投纖鱗於巨海謂杞梓之為尤兮妨鱣鯨之所匯余詎知皦皦之為病兮孑孑之所罪黯獨䝉此昏穢兮雖夷齊其猶凂豈昔壯而知自强兮撫中嵗而改度匪哲人之孔明兮孰能察夫余之故苟哲人之莫余知兮雖殺身其奚益心怦怦而煩瞀兮哀讒人之罔極彼天地之廣大兮固含垢而隠疾豈松栢之受命兮鬱紛糅乎枳棘苟由中以求直兮曾何情之弗獲惟嫉媢以甘心兮彌顛倒而狂惑嗟余生之不類兮罹此咎之無由余既恥夫匹夫之為諒兮日與魑魅而為仇幸讒人之無怒兮秖割徳而衰脩余既内省以不疚兮夫何懼而何憂曰止謗以不辨兮服先哲之攸訓匪成言以自道兮人將誚余以固吝聊抽毫以舒思兮遡南風以解愠上白日之昭昭兮下黄泉之奔迅謂余言之苟無}
