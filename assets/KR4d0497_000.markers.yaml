  - {type: variant, offset: 36, length: 28, content: 黄尊師高軒衡山縣曉渡瀟湘八景圗瀟湘夜雨逺浦㠶歸烟寺晚鐘洞, WYG: 總修遼金宋三史卒於官追封豫章郡公謚文安事蹟具元史本傳傒斯與虞集范梈楊載齊名其文章叙事嚴整語簡而當凡朝廷大典冊及碑版之文多出於其手一時推為鉅製獨於詩則清麗婉轉别饒風韻與其文如出二手然神骨秀削寄託自深要非嫣紅姹紫徒矜姿媚者所可比也虞集嘗目其詩如三日新婦而自目所作如漢}
