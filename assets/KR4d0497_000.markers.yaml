  - {type: variant, offset: 212, length: 266, content: 閑居八首去婦詞四友詩賦㕠陸泊安慶漁父髙郵城濟州𥘉度楊栁青謡雜詩四首栢堂詩卷之二詩獻張平章題先天觀圖二貞詩史舘獨坐致楽堂詩馬氏巖溪圗山水圗送道士薛玄卿大明殿退朝祖生詩孤雌行燕氏救兄詩送華尊師送馬雍古送周山人李宫人琵琶引題墨竹王開府八十别牟景陽結羊腸詞劉大司徒九十小孤山贈别曽編修題范氏寓居尋舍弟贈王郎山水圗送道士薛玄卿大明殿退朝祖生詩孤雌行燕氏救兄詩送華尊師送馬雍古送周山人李宫人琵琶引題墨竹王開府八十别牟景陽結羊腸詞劉大司徒九十小孤山贈别曽編修題范氏寓居尋舍弟贈王郎沈逸人招飲畫鴨題聶氏陶軒送涂雲章歸舟小孤山曉發大信晚泊白楊河㸔月歌, WYG: 南門遥望江南路前日}
