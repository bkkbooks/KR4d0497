  - {type: variant, offset: 614, length: 678, content: 來圗卷之三詩題明皇出逰圗畫鷹題棄官學道詩登祝融峰送何太虛南歸憶昨四首題白翎雀題園趣亭題文瑞圗題復明詩卷同人下直賦賦海上雲吴子高悼亡秋夜作張子高歸成都題淵明歸興圗寄題寕壽道院題宋好古墨竹雲錦溪棹歌七首御書雪林應制胡䖍汲水蕃部圗辛澄蓮花觀音杜節婦詩韓滉土星像曹将軍下􅵝馬圗韓幹馬宋徽宗宴蔡京圖送秘書李道濟送全平草題青山白雲圖桃花鸚鵡趙孝子題衛青印真陽詩贈連尊師贈項錬詩送祐上人送蘓尊師寄題張齊公庙題白翎雀寄題菊庒題霜鍾琴送王伯楯題鍾秀園題皆春堂謝項子虛周氏水木清華亭題虛舟送毛真人蘓志道哀詩題溪居圗寄題湖山堂夢先帝賜橘花寄題鄭氏菊庒題四清圗題蘭秀軒夢題墨梅寄題暖翠亭二首寄題長春亭題春蘭秋蕙四首題讀書亭送蕭教授送張郎中送聶太祝題㸔雨軒題清虛舘吴歌送人歸呉中卷之四詩續所藏逺山圗題陳氏松巢圗桂林歌湖南憲使盧學士移病歸潁舟次武昌辱問不肖姓名先奉寄三首大徳七年黄鵠聼雨贈别李時毅送姜尚志逰禅林寺逰麻原苐三谷送雷山人送孫志言贈髤者黄生送管録事寄别郭教授和馬伯庸二首重送曽應奉諸君子熊英德哀詞雜詩五首寓興五首雨中作送劉旌德題淵明撫松圗趙子昂寒翠圗𥘉至京答友人重餞何太虗贈洪參軍兄弟送馮尊師題山水卷題玉壺氷亭三月晦日題陳椽菊逕題蘆鴈四首李陵蘓武圗風烟雪月四梅圗題牧羊圗題草䖝圗二首再題草䖝二首題草庵圗題畫牛題何博士墨竹邱氏月磯亭題四梅圗送阿英野鴨詞題雪竹𥘉霽題蒲萄卷之五詩續飲酒萹從他痛詞吴歌贈許道士題小蓬莱黄母呉氏挽歌送墨工潘生送純真子還山漁樵問答圗題劉商觀奕圗題㕠龍圗題玉笥少題禱雨詩卷畫鷹送張使君題春龍聴雷圗蔡氏四適堂題山水圗送黄判官和十二辰詩發臨湘得風聞西師㨗二首, WYG: 乃割裂}
