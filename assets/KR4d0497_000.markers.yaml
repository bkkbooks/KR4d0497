  - {type: indent, offset: 145, content: 　, id: KR4d0497_krp_000-bkkind39}
  - {type: variant, offset: 145, length: 0, content: '', WYG: 半驅車踏月華寄語旁人休大笑詩成端的向誰誇且題其後曰今日新婦老矣是二人雖契好􅇰深而甲乙間乃兩不相下考楊維禎竹枝詞序曰掲曼碩文章居虞之次如歐之有蘇曽其殆定論乎顧嗣立元詩選載傒斯詩題曰秋宜集今未見焦竑國史經籍志載徯斯集一卷今亦未見此本凡詩四卷又續集二巻制表書序記碑誌雜文八卷乃其門人錫喇布哈原作爕理􅄎化今改正所編錫喇布哈字元普泰定四年進士第九卷有送錫元普序即其人也所編雖不足盡傒斯之著作然師弟相傳}
