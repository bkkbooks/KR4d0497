  - {type: variant, offset: 1619, length: 313, content: 畵鷹文梁五色絛秌髙意氣豪怒張两目直霄漢豈與短翮翔蓬蒿妖狐畵作猛虎嘷騶虞并與神麟逃嗟爾飽食心空劳送張使君棄官學道至元天子朝萬國任丘使君謝病㱕門前未罷車馬客身上已着朝真衣致君尭舜在豪傑洗耳巣由何是非棲雲觀裏青松樹唯有白雲終日飛番易䔥性渊携其祖将領所爱唐琴號霜鐘者還自和林求詩六月三日五門宣赦後作嵩州昔有䔥将軍讀書學劍天下聞南随龍馬渡江去尚有孤琴傳子孫孤琴云是唐人斵昔日軍中自行楽至今猶存殺伐聲一鼓哀風振寥廓将軍之孫才且良文能作賦武蹶張秦皇城下改白馬祈連山中射白狼時平好文不好武抱琴却歎儒衣誤昭王䑓上㸔青春彭郎矶頭夢歸路日長史館幽且闲正冠拂琴為我弹京城六月日如火霜鐘半亱鳴空山南風自有虞廷操可惜同心不同調捐琴抉眼望青天今日天門有新詔, WYG: ''}
