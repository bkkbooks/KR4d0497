front:
  text: 掲文安公全集卷之五
  hash: sha256:ac2acf333da7fa4b6ff6998a45ec6d1464b417326c5038e2630b3f3106caa882
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_005-1a}
body:
  text: 掲曼碩傒斯著門生前進士爕理溥化校録飲酒萹悼亡後作昨日飲酒酒苦薄今日飲酒必不楽未知明日還如何枝上落花能許多胡蝶飛飛春草草對語黄鸝清且好有酒有酒且莫沽庭前獨宿鴛鴦雛從他痛辭并序江少虞類苑載開寳中金陵人脩故塋得石記隷書從他痛凡累百字末復云不為石子盡更書千萬箇從他痛未幾王師渡江余謂此必埋恨者非渡江䜟也作從他痛辭石可絶恨不滅日月雖光明不照石上情情深化作秦淮水水流成血波涛起流入東方大海中風吹復向秦淮裏秦淮裏深復深土齧石上字字字痛連心痛連心從他痛秦淮水空相送除是相逢話痛時始是此心無恨期吴歌一首送張清夫提㪯征東校官先還吴中吴中女児白如華吴江燕燕拂波斜吴中魚肥米可束夫君無事乆忘家夫君自别吴江水聲名籍籍京華裏家家屏幛待新詞日日王侯置醇醴吴中之君不可踰京華之楽天下無高官厚禄不願有上䟽乞官遼海隅秋風高吹燕山樹扁舟且向吴中去吴中児女白如玉㸔着新𫀆入華屋贈許道士廬山道士許自然二十武當學飛僊白雲冥冥不可見天際時聞清嘨傳虎将乳子共㳺戯龍化老人同食眠無求始悟身非患有道方知世可捐忽聞賣薬入都市便𣣔乘風凌紫烟紫烟之中曠邈邈下視人世真堪憐爾曹齷齪塵埃下何日南山㱕種田題李見心小蓬䒹媧皇狡獪弄餘智手挿神仙滄海裏不教寸碧落人間弱水更環三萬里何人搏土爲此竒太乙真人謫僊子芙蓉爲舟桂爲楫碧玉連環白雲履山根植枣漸如瓜山頭種玉今成髄平生九州視一豪秦皇漢武空勞勞山林冥杳百鳥號明月飛出琴聲高黄母吴氏挽歌新安之水清且深深深如見黄母心新安之水髙且烈烈烈如見黄母莭母也不幸早婺居三十未有二十餘六十餘載一日如子又能孝孫詩書嗟母之徳靡不冝人歌不足國旌之爾今死矣歸何時新安之山可鏟而夷新安之水可陸而馳黄母之徳不可思送墨工潘生還臨江豫章朱氏以墨名直與郭玘争豪英臨江潘氏得墨法乃自柯山翁彦卿朱氏親承天子詔墨入奎章獨称妙潘氏近日来京師群公得之惟恐後潘云吾墨犹草草盡藝為之當更好明年此際来京師始知吾墨堪為寳東風蕩蕩吹燕山行人髯髯掉臂還明年獻墨奎章閣却與朱氏分朝班武岡扶丘山紫府延夀宫宋張真人守静所居也至今禱雨暘輙應其徒純真子饒君礼誠延祐中入京師為今玄教大宗師吴公所知居太乙延福宮十五年将南還山中詩以送之洞庭之南扶丘之山緜連九疑控百蛮昔在嘉㝎之世真人張氏隐居學道於其間祈晴即晴雨即雨犇走郡縣劳躋攀鋤雲架霧開紫府采芝種术留朱顔夜驅猛虎守庭户晝役鬼物除榛菅真人乗雲上天去但有青鵉白鶴長徃還雲霆尚與司豊艱尔来一百五十歲弟子饒君通道氣一住京華十五年太乙宫中獨超異不求逸少冩黄庭𣣔逐浮丘攬香袂南望悽其憶故宫黄河日與夢俱東河流到海不復返故宫長在白雲中天地無停機日月無淹軌歸去来白雲裏題漁樵問荅啚我在孤舟爛醉来君從何䖏㸔碁囬高山流水元同調明月清凨不用媒江上柳早先摧天上鴈正裵徊冨貴何如歌一曲功名争似酒三杯我但負薪君但釣百年誰喜復誰哀題劉商觀奕啚李伯時臨蘇子瞻䟦茅君彦刻劉商画手神運茟龍眠臨之如已出不知奕者何代人雖無名姓若有神神凝志㝎萬縁息觀者亦復遺秋春松凨吹衣石泉响朱草樷生玉芝長眉陽仙客㝡相知更託茅君寄心賞題陳所翁双龍啚為寅上人作䨇龍畫擘玄渊開萬物顛倒随雲雷龍公𬒳髪向空下身是真龍非畫者鐵作鬚鬛玉作鱗電出兩目雲繞身偶然會合此何䖏仰面向天天不嗔世间眩轉空形影倐忽変化那能省高僧説法夜来聴誰道相逄非夢境斗牛蒼蒼風雨暮泉阿豈識延平路當時縱無雷煥與張華未必終蔵不飛去題玉笥山邵道士所藏米方奉使贈劉道士紫㡌山人方孚若臨江謫居亦行楽二十四磵縁源行三十三峰㸔月明奉使不愧蘇子卿招隱更遇劉佺平劉郎弹琴震金石方公作歌酒和墨一時意氣傾座人千載風流寄仙籍両公一去無消息竹下松間畵行跡遺墨䔥條銷白雲山中歳歳桃華春宋金徃事無劳問夜夜虚壇候子貢題彭尊師禱雨詩卷道人役雷如小兒顛倒鬼物愁蛟螭祈晴得晴雨得雨身不勝衣膽如虎東通吳越北淮漢到䖏逢人憂水旱手提豊歲與疲甿金帛盈庭未曽看閩山叠叠躋金峰蔪山樷樷碧玉宮洗劍長留双澗月弹琴尚憶萬松風大臣無端薦天子十年留滯京華裏悠悠扈從春復秋㱕心已逐東流水去年天下旱且蝗流殍滿道無人藏安淂君等遍八荒不使水旱憂堯湯畵鷹文梁五色絛秌髙意氣豪怒張两目直霄漢豈與短翮翔蓬蒿妖狐畵作猛虎嘷騶虞并與神麟逃嗟爾飽食心空劳送張使君棄官學道至元天子朝萬國任丘使君謝病㱕門前未罷車馬客身上已着朝真衣致君尭舜在豪傑洗耳巣由何是非棲雲觀裏青松樹唯有白雲終日飛番易䔥性渊携其祖将領所爱唐琴號霜鐘者還自和林求詩六月三日五門宣赦後作嵩州昔有䔥将軍讀書學劍天下聞南随龍馬渡江去尚有孤琴傳子孫孤琴云是唐人斵昔日軍中自行楽至今猶存殺伐聲一鼓哀風振寥廓将軍之孫才且良文能作賦武蹶張秦皇城下改白馬祈連山中射白狼時平好文不好武抱琴却歎儒衣誤昭王䑓上㸔青春彭郎矶頭夢歸路日長史館幽且闲正冠拂琴為我弹京城六月日如火霜鐘半亱鳴空山南風自有虞廷操可惜同心不同調捐琴抉眼望青天今日天門有新詔題春龍聴雷啚雷馮神龍興雲行雨施四海清雷之震神龍奮雲行雨施四海潤雷之令神龍聴雲行雨施四海慶聖君在上賢臣在下我無事而觀化蔡氏四適堂君不見車轆轆長安陌上争馳逐朝出逰暮還宿問何所得荣與辱又不見或漁于渊㦯樵于山或耕或牧其心和且閒我𣣔從之生羽翰豊之東麗之陽有羙一人大溪之旁水竹兮䔥蕭雲木兮蒼蒼弹鳴琴兮不下堂禾在囷薪在屋黄雞皮白魚腹嘉客来新酒􅍄君之楽兮惟日不足題邢先軰西壁山水啚邢家蒼蒼西屋壁萬壑千厓動寒色大江忽轉天地廽浮雲孤飛日月白參差楼殿照林紅松檜悽迷𧺫朔風崑崙蓬莱不可到赤城白帝遥相通賤子平生尚奇偉南極衡湘北幽冀復從大駕上滦京始接邢君多意氣君昔扈從戎馬間少壮不知行路難月明飲馬長城窟雪深射虎祁連山萬里㱕来太平日坐我江山百憂失平明萬騎出天门又駕官車就行役送黄判官㱕江西西辞夜郎囯北上邯莭道方厭東華塵又説黄平好黄平遥遥度五溪五溪更在洞庭西十年世事浮雲裏一日孤舟萬里㱕桃花流水孤舟客白髮青山五色衣堂上慈親称壽䖏堂前新婦􅕥姑時隣人􅌽種南山豆野老同尋北谷芝人生出䖏須經意富貴悠悠差是非和劉修撰十二辰詩掘䑕可以充飢飯牛可以待時何須入穴求虎子更斈狡鬼三穴為我生誤逐攀龍者歲蛇冉冉那堪把又無筋力騎快馬日射黄羊隂山下空餘野性猕猴同但求㱕作祝雞翁柴门狗吠閉閣睡萬事渾如牧猪戲發臨湘得風臨湘縣前江水流茅廬沽酒大如舟莫道天風不相待一時吹上岳陽楼聞西師㨗口號二首聞道西南掃蟻封何時雨露洗妖兇必行徃伐羈縻䇿㫖倚窮荒戦伐功萬里春風送㨗書千年王氣拱皇居越裳白雉應頻入浪泊飛鳶正念渠漢茶陵侯廟髙帝安劉慮未危賈生可恨不同時長沙更有囬旋地千載荼陵無古祠泉水嶺作已過泉子嶺頭路荒甸茫茫碧草乹日暮不収牛馬乱青烟起䖏是營盤金衣翠㡌路傍女蹋足連聲駕犢車車下畫眠車上宿每逄水草便為家北楼雪後酒醒獨吟幾點微雪翳暁晴半峰殘雪隔江明小楼獨對春城北酒醒匡牀聞鵲聲聞熊從嘔血亡碧血凝秋萬事空此生無復一尊同到家又近重陽莭應是哭君風雨中待潮扁舟夜閣寒沙際欹枕待潮紅日髙無数征㠶背人去海門何䖏水滔㴞題吴越王荅周克儉謝賜物及陳事冝状手帖吴越山川畫不如古今人物半能書從容覇國君臣禮猶見錢王翰墨餘掲文安公全集卷之五
