front:
  text: 揭文安公全集卷之五
  hash: sha256:dc520412bf24147193ef33f8dc7c45c1a7962bfd3f8f5bdef3accbb59684bffd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_005-1a}
body:
  text: 揭曼碩傒斯著門生前進士燮理溥化校録飲酒萹悼亡後作昨日飲酒酒苦薄今日飲酒必不樂未知明日還如何枝上落花能許多胡蝶飛飛春草草對語黃鸝清且好有酒有酒且莫沽庭前獨宿鴛鴦雛從他痛辭并序江少虞類苑載開寶中金陵人修故塋得石記隸書從他痛凡纍百字末復云不為石子盡更書千萬箇從他痛未幾王師渡江余謂此必埋恨者非渡江讖也作從他痛辭石可絶恨不滅日月雖光明不照石上情情深化作秦淮水水流成血波濤起流入東方大海中風吹復向秦淮裏秦淮裏深復深土齧石上字字字痛連心痛連心從他痛秦淮水空相送除是相逢話痛時始是此心無恨期吳歌一首送張清夫提舉征東校官先還吳中吳中女兒白如華吳江燕燕拂波斜吳中魚肥米可束夫君無事久忘家夫君自别吳江水聲名籍籍京華裏家家屏幛待新詞日日王侯置醇醴吳中之君不可踰京華之樂天下無高官厚祿不願有上疏乞官遼海隅秋風高吹燕山樹扁舟且向吳中去吳中兒女白如玉看著新𫀆入華屋贈許道士廬山道士許自然二十武當學飛仙白雲冥冥不可見天際時聞清嘨傳虎將乳子共遊戲龍化老人同食眠無求始悟身非患有道方知世可捐忽聞賣藥入都市便𣣔乘風凌紫煙紫煙之中曠邈邈下視人世真堪憐爾曹齷齪塵埃下何日南山歸種田題李見心小蓬䒹媧皇狡獪弄餘智手插神仙滄海裏不教寸碧落人間弱水更環三萬里何人搏土為此竒太乙真人謫仙子芙蓉為舟桂為楫碧玉連環白雲履山根植棗漸如瓜山頭種玉今成髓平生九州視一豪秦皇漢武空勞勞山林冥杳百鳥號明月飛出琴聲高黃母吳氏挽歌新安之水清且深深深如見黃母心新安之水髙且烈烈烈如見黃母莭母也不幸早婺居三十未有二十餘六十餘載一日如子又能孝孫詩書嗟母之德靡不冝人歌不足國旌之爾今死矣歸何時新安之山可鏟而夷新安之水可陸而馳黃母之德不可思送墨工潘生還臨江豫章朱氏以墨名直與郭玘爭豪英臨江潘氏得墨法乃自柯山翁彥卿朱氏親承天子詔墨入奎章獨稱妙潘氏近日來京師群公得之惟恐後潘云吾墨猶草草盡藝為之當更好明年此際來京師始知吾墨堪為寶東風蕩蕩吹燕山行人髯髯掉臂還明年獻墨奎章閣却與朱氏分朝班武岡扶丘山紫府延夀宫宋張真人守靜所居也至今禱雨暘輒應其徒純真子饒君禮誠延祐中入京師為今玄教大宗師吳公所知居太乙延福宮十五年將南還山中詩以送之洞庭之南扶丘之山綿連九疑控百蠻昔在嘉㝎之世真人張氏隱居學道於其間祈晴即晴雨即雨奔走郡縣勞躋攀鋤雲架霧開紫府采芝種术留朱顔夜驅猛虎守庭户晝役鬼物除榛菅真人乘雲上天去但有青鵉白鶴長往還雲霆尚與司豐艱爾來一百五十歲弟子饒君通道氣一住京華十五年太乙宫中獨超異不求逸少寫黃庭𣣔逐浮丘攬香袂南望悽其憶故宫黃河日與夢俱東河流到海不復返故宫長在白雲中天地無停機日月無淹軌歸去來白雲裏題漁樵問答啚我在孤舟爛醉來君從何處看碁回高山流水元同調明月清凨不用媒江上柳早先摧天上鴈正裴徊冨貴何如歌一曲功名爭似酒三杯我但負薪君但釣百年誰喜復誰哀題劉商觀奕啚李伯時臨蘇子瞻跋茅君彥刻劉商畫手神運茟龍眠臨之如已出不知奕者何代人雖無名姓若有神神凝志㝎萬緣息觀者亦復遺秋春松凨吹衣石泉響朱草叢生玉芝長眉陽仙客最相知更託茅君寄心賞題陳所翁雙龍啚為寅上人作雙龍畫擘玄淵開萬物顛倒隨雲雷龍公𬒳髮向空下身是真龍非畫者鐵作鬚鬛玉作鱗電出兩目雲繞身偶然會合此何處仰面向天天不嗔世間眩轉空形影倐忽變化那能省高僧説法夜來聽誰道相逄非夢境斗牛蒼蒼風雨暮泉阿豈識延平路當時縱無雷煥與張華未必終藏不飛去題玉笥山邵道士所藏米方奉使贈劉道士紫帽山人方孚若臨江謫居亦行樂二十四澗緣源行三十三峰看月明奉使不愧蘇子卿招隱更遇劉佺平劉郎彈琴震金石方公作歌酒和墨一時意氣傾座人千載風流寄仙籍兩公一去無消息竹下松間畫行迹遺墨蕭條銷白雲山中歲歲桃華春宋金往事無勞問夜夜虛壇候子貢題彭尊師禱雨詩卷道人役雷如小兒顛倒鬼物愁蛟螭祈晴得晴雨得雨身不勝衣膽如虎東通吳越北淮漢到處逢人憂水旱手提豐歲與疲氓金帛盈庭未曽看閩山疊疊躋金峰蔪山叢叢碧玉宮洗劍長留雙澗月彈琴尚憶萬松風大臣無端薦天子十年留滯京華裏悠悠扈從春復秋歸心已逐東流水去年天下旱且蝗流殍滿道無人藏安淂君等遍八荒不使水旱憂堯湯畫鷹文梁五色絛秋髙意氣豪怒張兩目直霄漢豈與短翮翔蓬蒿妖狐畫作猛虎嘷騶虞并與神麟逃嗟爾飽食心空勞送張使君棄官學道至元天子朝萬國任丘使君謝病歸門前未罷車馬客身上已著朝真衣致君堯舜在豪傑洗耳巢由何是非棲雲觀裏青松樹唯有白雲終日飛番易蕭性淵携其祖將領所愛唐琴號霜鐘者還自和林求詩六月三日五門宣赦後作嵩州昔有蕭將軍讀書學劍天下聞南隨龍馬渡江去尚有孤琴傳子孫孤琴云是唐人斫昔日軍中自行樂至今猶存殺伐聲一鼓哀風振寥廓將軍之孫才且良文能作賦武蹶張秦皇城下改白馬祈連山中射白狼時平好文不好武抱琴却歎儒衣誤昭王臺上看青春彭郎磯頭夢歸路日長史館幽且間正冠拂琴為我彈京城六月日如火霜鐘半夜鳴空山南風自有虞廷操可惜同心不同調捐琴抉眼望青天今日天門有新詔題春龍聽雷啚雷馮神龍興雲行雨施四海清雷之震神龍奮雲行雨施四海潤雷之令神龍聽雲行雨施四海慶聖君在上賢臣在下我無事而觀化蔡氏四適堂君不見車轆轆長安陌上爭馳逐朝出逰暮還宿問何所得榮與辱又不見或漁于淵或樵于山或耕或牧其心和且間我𣣔從之生羽翰豐之東麗之陽有美一人大溪之旁水竹兮蕭蕭雲木兮蒼蒼彈鳴琴兮不下堂禾在囷薪在屋黃雞皮白魚腹嘉客來新酒􅍄君之樂兮惟日不足題邢先輩西壁山水啚邢家蒼蒼西屋壁萬壑千崖動寒色大江忽轉天地廽浮雲孤飛日月白參差樓殿照林紅松檜悽迷起朔風崑崙蓬萊不可到赤城白帝遙相通賤子平生尚奇偉南極衡湘北幽冀復從大駕上灤京始接邢君多意氣君昔扈從戎馬間少壯不知行路難月明飲馬長城窟雪深射虎祁連山萬里歸來太平日坐我江山百憂失平明萬騎出天門又駕官車就行役送黃判官歸江西西辭夜郎國北上邯莭道方厭東華塵又説黃平好黃平遙遙度五溪五溪更在洞庭西十年世事浮雲裏一日孤舟萬里歸桃花流水孤舟客白髮青山五色衣堂上慈親稱壽處堂前新婦􅕥姑時鄰人􅌽種南山豆野老同尋北谷芝人生出處須經意富貴悠悠差是非和劉修撰十二辰詩掘鼠可以充飢飯牛可以待時何須入穴求虎子更學狡鬼三穴為我生誤逐攀龍者歲蛇冉冉那堪把又無筋力騎快馬日射黃羊隂山下空餘野性獼猴同但求歸作祝雞翁柴門狗吠閉閣睡萬事渾如牧豬戲發臨湘得風臨湘縣前江水流茅廬沽酒大如舟莫道天風不相待一時吹上嶽陽樓聞西師捷口號二首聞道西南掃蟻封何時雨露洗妖凶必行往伐羈縻䇿旨倚窮荒戰伐功萬里春風送捷書千年王氣拱皇居越裳白雉應頻入浪泊飛鳶正念渠漢茶陵侯廟髙帝安劉慮未危賈生可恨不同時長沙更有回旋地千載荼陵無古祠泉水嶺作已過泉子嶺頭路荒甸茫茫碧草乾日暮不收牛馬亂青煙起處是營盤金衣翠帽路傍女踏足連聲駕犢車車下畫眠車上宿每逄水草便為家北樓雪後酒醒獨吟幾點微雪翳曉晴半峰殘雪隔江明小樓獨對春城北酒醒匡牀聞鵲聲聞熊從嘔血亡碧血凝秋萬事空此生無復一尊同到家又近重陽莭應是哭君風雨中待潮扁舟夜閣寒沙際欹枕待潮紅日髙無數征帆背人去海門何處水滔滔題吳越王答周克儉謝賜物及陳事冝狀手帖吳越山川畫不如古今人物半能書從容霸國君臣禮猶見錢王翰墨餘揭文安公全集卷之五
