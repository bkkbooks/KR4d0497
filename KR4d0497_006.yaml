front:
  text: 揭文安公全集卷之六
  hash: sha256:fc0ae52fc75ac09293cb0bc6a0608ddca29b7441994c7b8089db21dc9eb02bfb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_006-1a}
body:
  text: 揭曼碩傒斯著門生前進士燮理溥化校録制金紫光祿大夫山東行尚書省兵馬都元帥知濟南府事特封濟南公致仕贈效忠宣力佐命功臣榮祿大夫司徒柱國追封齊國公諡忠襄張榮加贈推忠宣力正義佐命功臣太師開府儀同三司上柱國追封濟南王仍諡忠襄制朕纂承基緒每思創業之惟艱褒恤勳勞常恐推恩之未至况山東諸侯之起皆天下良將之雄既盡厥忠冝豐其報某官沈幾先物遺愛在人方保有齊民已知真主之受命及歸我太祖歷事纍朝而致身秣馬南征則孱金亡走拔劍東指則逆壇就擒握兵柄者餘四十年未嘗妄殺臨軍陳者凡數百戰動必有功故詔有張相之稱而世任元戎之寄雖列土之封猶及于懸車之日而漏泉之澤未究於蓋棺之餘况在爾孫復為朕使或守藩維於外或司喉舌於中世篤忠貞人推謹慎是用因爾山川之履增爾勳號之崇秩既陟于三公爵仍超於五等乃爾自致非朕敢私於戲紫綬金章尚念𥘉來之日丹書鐵劵永膺異姓之王神其有知服此加命可妻齊國夫人宋氏進封濟南王夫人制昔國有東諸侯既封于濟今朕嗣大歷服申爵以王載求齊體之賢冝與從夫之典故某官妻宋氏早以令德相其良人舉五十萬衆以歸朝歷三百餘戰而盡莭分茅胙土傳及子孫襲組彯纓布列中外皆爾相成於警戒用能共濟於艱難是用錫爾鄉貴其爵號以篤爾後以報爾前於戲翟茀魚軒尚服異恩於永世虎頭燕頷從懷舊將於當年其迪爾家以贊皇國可諸王忽都答兒追封雲安王諡忠武制昔我丗祖親定雲安命九王以鎮之將百年于兹矣乃者國家多故邉圄失宜健將驕王遂據城而稱亂陳師鞠旅方下詔以討平粵有忠烈之臣乃在伯叔之籍愛申褒恤以慰死生故忽都答兒沉􅋧有謀剛勇獨斷三世藩輔蔚為磐石之宗一心朝廷不忘社稷之計方天曆之反正而逺人之未思中虔則伯忽要盟即飛章而上變鳥撒則僇余既叛先率衆以抗鋒見危而奮不顧身力戰而繼之以死報已後矣朕甚憫焉雖析爵以列侯王何禆地下仍賜錢以給妻子式長豫哀鳴呼為子必孝為臣必忠既克承于我祖無言不酬無德不報尚永顧于爾邦魂而有知服此休命可諸王羅今䚟追封保寧王諡昭義制臨戰陳而思孝必有勇功於板蕩以盡忠斯無愆義往在諸父羅羅䚟丗鎮南詔心貫上蒼適嬰天曆之兵獨戰羅雄之境力竭而援不至兄死而弟亦隨山川以之興悲日月為之動色有宗王而盡節冝諸將之同心遂便叛亡無不爼醢非褒恤之獨後屬內外之多虞故疇爾庸超五等而命爵載考爾行詔百世以易名申錫緡錢以給家屬所以昭國典所以勸逺臣噫得猛士以守四方孰如同姓明俊德以親九族尚監異恩可申命三十九代天師張嗣成制朕惟老𥅆度函谷關未始忘於天下留侯從赤松子豈果棄於人間式啓聖人神道設教之門遂任天子為民請福之寄主其法者代有功焉不逺而朝冝新厥命翊元崇德正一教主嗣漢三十九代天師太玄輔德體仁應道大真人主領三山符籙掌江南道教知集賢院道教事張嗣成之裔道德之宗自爾祖之遇丗皇蓋有天意泊乃父之於仁廟益簡帝心雖有道之長實係聖明之主而無為之治庶聞清靜之風誕播玄休屢昭靈應卿既克承于後朕亦丕勞爾先往者海水為災再免黔黎于昏墊近而天時作慝三致雨雪之感通功成弗居禮冝有報噫神仙以忠孝為本尚丗愧於傳賢帝王以天地為心曷敢忘于敬德見所帶職號悉如故進至大聖德頌表皇帝福蔭裏沍南布衣臣揭傒斯言恭惟正月七日皇太子暨丞相百僚耆耋等以皇帝陛下出撫邉陲入繼大統豐功盛德髙出千古握符御極冝獲徽稱即日詣大明殿册上尊號十有一日躬事太室獲瑞雪之應二月十有三日詔告天下覃恩中外天人協慶日月增華凡具性情莫不欣戴宜形歌頌以逹和氣臣傒斯誠惶誠懼頓首頓首臣聞古者聖人之歌莫先于詩故聖主賢臣有大功顯行必載之詠歌使天下曉然知君臣之所趨德化之所由見善而遷聞義而起去之萬里如立其朝後之萬丗如生其時所以事神保民無右於此故有虞命夔以教之周置太師以掌之君臣朝燕必有賦郊廟薦享必登䛴蓋詩之為道誦其辭無鈞棘叢雜之繁聆其音有往來疏數之節玩其義有優柔沈藴之旨其感於人也易其入于人也深乖沴之氣可變而為祥風甘雨姦回之行可化而為忠鯁貞良是以聖人尚之故雖反復典謨訓誥之文不若歌明良之賡康衢擊壤之謡周南召南之什下至農野婦監一關其耳熙熙灝灝想見其治漢魏以采騷人賦客時時間作雖不能盡追古道其抒情蓄志可興可觀斯義綿綿庶幾未泯聖明之丗尤所冝聞欽惟統天繼聖欽文英武大章孝皇帝陛下道凖天地德繩祖考惠澤周乎無間威稜疊乎八表學前王未究之禮敘洪範載錫之疇孝弟足以厚黎民剛明足以制萬幾見賢如已能聞諌如己出惡惡如剃草芥好善如嗜飲食允文允武赫赫巍巍冝其克集大勳君臨天下載膺顯册彰厥大猷而耆俊如雲良士如林必有振發毫楮鋪張洪業為一代之盛典若微臣者曽何足云然想像于丘岑畎畝之中不若覩快于輦轂之下繼漏于筐篋刀筆之末不若聲諸詠歌之間近可以風動四方逺可以流耀無窮臣自揆才薄迹微無以輔益毫髮幸因羇旅獲際盛明謹撰聖德頌一篇繕寫投進雖不足以加天地之大日月之明載之簡牘傳之天下亦可以見聖明德化之所由也臣無任瞻天樂聖激切屏營之至謹奉表以聞臣傒斯誠惶誠懼頓首頓首謹言皇太后加尊號監修國史府賀表延祐二年聖主尊親稽先朝之盛典慈闈進號傋昭代之徽稱寶册載􅈾瑶圖永固中賀欽惟儀天興聖慈仁昭懿壽元全德泰寧福慶皇太后陛下德全神厚功底泰寧福莫大于多祥兩開帝業慶莫隆于至飬咸戴母儀式兼崇極之名益衍昌明之祚臣某等久塵台鼎叨總國書興聖春融幸仰陪于大禮含飴日永願丕贊於鴻猷天夀莭監修國史府賀表一人有慶節肇紀于重三萬夀無疆位永乘于九五乾坤薦祉朝野騰歡中賀慶惟皇帝陛下道大德純功崇業廣舉賢能興學校天下文明異章服同車書海內率俾允極尊親之孝益隆致治之基臣某等任忝國鈞職嚴金匱蓬菜宫殿幸依日月之光河圖洛書丕纘皇王之統元旦翰林國史院賀皇太后表延祐三年天子當陽八表奉夏時之曆皇闈獻歲萬年稱元旦之觴雲氣蓬菜春風宇宙中賀欽惟尊號陛下德含坤育運啓泰亨推福慶以致崇日星顯號溥慈仁而協治雨露羣生隂教修而母道隆孝理彰而聖功逺臣某等欣逄盛旦忝綴周行玉署日和碩播思齊之美瑶圖天廣永居長樂之尊天夀莭代蒙古國子監賀表延祐三年一人受命適符上已之辰萬歲稱觴載協壽星之紀照臨所𬒳慶抃惟均中賀欽惟皇帝陛下德猶日中飬以天下暨聲教于四海俗美風淳舞干羽于兩階河清嶽晏益體乾剛之用式隆震夙之祥臣某等學守國書班聫胄監龍顔日角仰瞻穆穆之光鶴算龜齡俯效綿綿之祝上再即位奎章閣賀表天曆二年六龍啓運飛躍得聖人之時萬象趨新變化合太平之應普天之下如日再中中賀欽惟皇帝陛下剛健粹精聰明神武霜露􅥐更而不尖其正乾坤再造而不居其功惟其有帝堯帝舜之聖仁乃能行祖甲祖庚之揖讓慎徽五典則崇孝友以率先表章六經則進儒雅以為本皆天理人心之至當必明君義辟而後知冝曆數之在躬雖同體而不易况祖宗之大統豈違道所可求是以踐阼之𥘉甘露卿雲諸福畢至及夫明詔之下扶桑若木萬姓歡呼允長馭於權網斯永保夫社稷臣某等叨聮延閣適際清朝羲畫禹疇碩闡皇王之祕虞韶殷輅丕昭禮樂之隆奎章閣賀正表天曆三年大人有造治隆揖讓之餘正月始和慶協發生之妙車書萬國干羽兩階中賀欽惟皇帝陛下道接百王統承三正逹夫郊社之禮禘嘗之義躬致其嚴觀乎天地之德日月之明益躋于聖是用格于上下莫不歸其照臨臣某等恭惠西清依光北極君臣父子永敦天秩之常禮樂詩書誕播皇風之盛册皇太子奎章閣賀表重明麗正作離咸仰於皇文一索得男出震允冝於主器既疏封於玄土爰正位於青宮所以繫人心所以本天下欽惟尊號陛下敬隆郊廟德裕乾坤當春秋鼎盛之時建宗社靈長之計惟聰明可以正百辟俾綜樞機惟元良可以貞萬邦足副儲二重以群臣之固請聿遵纍聖之宏規然監國撫軍教尤資于四輔而問安視膳禮必謹于三朝式飬聖功用光帝業臣某等婁陪大慶思贊清時迎春日之載陽益臻泰道瞻前星之有耀永固皇家聖莭賀表陽德方亨喜太平之有象聖人在宥宜仁夀之咸臻八表同歸萬年惟永中賀欽惟皇帝陛下誕敷文德克纘武功既尊祖以配天比隆三代乃立嫡以主器用貞萬邦允昭仁智之端是皆長久之道臣某等叨陪清燕莫贊聖明多夀多男從切華封之祝是彛是訓碩敷皇極之言奎章閣賀表聖人繼體再昭揖讓之隆天下歸仁大慰平成之望慶綿宗社光𬒳華夷中賀欽惟尊號陛下德秉純乾業承富有妙天人之協贊允曆數之攸歸惟上有成康之君下有周召之臣而內獲皋夔之佐則外獲唐虞之治荀日躋于聖敬咸丗篤于忠貞臣某等職忝西清光依北闕經邦論道自有弼於鴻猷飬老尊賢豈無俾于昭代藝文監賀表明繼明聖繼聖所以固皇圖長以長賢以賢所以公天下一人有慶萬國􅌚心中賀欽惟尊號陛下仰之如天就之如日體兩朝之揖讓有丕丕基開萬丗之隆平惟明明后此祖宗之深望亦臣庶之所期臣某等地切泰階恩聮文苑周為師而召為保德兾邁于成康稷教穡而契教倫治永躋于堯舜藝文監賀表一人受命適嚴踐阼之儀百辟在廷已舉尊親之典孝先天下慶衍皇闈中賀欽惟皇太后陛下德濟艱難功成警威每念鴻圖之重獨深燕翼之謀申揖讓于中興父而又子導繼承于成命長亦惟賢宜膺至飬之隆永極徽稱之盛臣某等名慚藝苑身際熙朝長樂怡愈碩密扶于聖治大明照耀庶丕闡于皇猷藝文監賀表成命以長惟天以啓聖人南面受朝不日而尊大母愛敬之至神明所歸中賀欽惟尊號陛下如日東升以天下飬雖任寄伊霍之重足以發皇明必治資任姒之賢有以基王化尚致怡愈之樂式彰孝弟之風臣某等學愧前修職嚴內監仰陪大禮時已際於風雲共戴皇猷夀永齊于天地揭文安公全集卷之六
