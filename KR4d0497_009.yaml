front:
  text: 掲文安公文集卷之九
  hash: sha256:57be424d1732e6ff8fb8c2148875d7078cb3021aa7c931237b1e32b5e52dd3a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_009-1a}
body:
  text: 掲曼碩傒斯著門生前進士爕理溥化校録序送劉以徳赴化州學正序學校非三代之教乆矣然猶幸學校未廢儒者知有所依歸况窮荒遐􅗲使無學校安知有所謂聖人之教哉故學校者教化之原而人心之所係也我元建國餘六十載矣崇儒之意非不至興學之令非不加俊造之士非不舉而用之而猶未能浸淫乎三代之教者旬宣之道未盡亷耻之化未興詬病之風未除也軄教之徒擁腫腆䏰孳孳焉䂓錙銖計升斗是急使並縁之吏間窺隙伺日相與為欺安敢望有三代之教哉幸而學無廪稍又幸而遇賢有司又幸而近大府或知所自愛此外所甚大幸者教官能自賢能自賢或不遇有司又不能以自立若今廬陵劉君以徳所得化州者廪稍之有無有司之賢否不可知既不近于大府而逺在𢾗千里外然俗無美悪地無逺邇教之化之在我而已况君有學有行家足以自給稍得一賢守令自㧞于上他日五嶺之外窮海之濵有善教者必自君始爱之慎之吾将洗耳于北闕之下送張都事序天子既建奎章閣置大學士二人侍書學士二人承㫖學士二人供奉學士二人參書二人非嘗任省䑓翰林及名進士不得居是官明年增置大學士二人典籖二人典籖從六品𥘉命英宗龍飛進士第一人泰不華兼善丞相椽張景先􅛽哲為之希哲尋去為禮部主事又以丞相椽張中立惟正繼之居一年兼善拜南䑓監察御史惟正亦遷江西行省都事天下之選莫重于省臺或由省臺入為閣官或由閤官出居省臺則閣官之選與省臺䓁而又必天子親擢之惟正一歲中两𬒳擢皆得天子所重地其日夜求所以稱塞固冝余與惟正同僚同與脩皇朝經世史之大典惟正無一言不及于仁義無一事不致其精祥余尝謂惟正居軄任事無不及者江西號繁劇難治然繁劇在郡縣無在行省行省苟得其人雖使郡縣皆務為簡静猶反掌耳江西難治莫甚吉安然以前江西亷訪使馮君輔今揚州揔𬋩納懐治之政未嘗不行訟未嘗不簡吏民未嘗不心悅誠服非惟不能欺至不忍欺是故為政係其人不係其地而君輔納懐之在郡也上之人悪其異己也沮之抑之不遺餘力卒不能安其身以去江西之政日益弊民日益困加之以飢饉重之以疾癘有司恬然莫之恤者果誰為之耶故天下郡縣不患無賢守令患上之人不能正其好悪以示其嚮方公其衡鑑以别其淑慝挟其善類以激昂其志氣耳故行省者郡縣之標凖也苟標不正凖不平欲其影之直鈞石之和得乎今惟正之佐江西也以平章全公之蕳重亷正惟正之精寔謹敏相與存大体略細故先人而後己使君子得以行其道小人無以聘其奸民之有瘳也必矣惟正敬之勉之其毋忘天子親擢之意他日有論奎章人物曰惟正惟正則僕也與有榮耀焉送藝林庫提點畢申逹棄官歸飬詩序世言忠孝不两立忠孝亦有二乎見于事君謂之忠見于事親為之孝人見其孝也而不知有忠之道存焉曰孝而已矣人見其忠也而不知有孝之道存焉曰忠而已矣一行非孝非忠也一念非忠非孝也天地之大也日月之明也人物之衆也其可感而通者莫疾乎忠與孝也雖庸人孺子一行其孝而風俗為之變世之行政施化有弗能焉雖孱卒賤􅊢一行其忠而天地為之動世之守職任事有弗及焉况身為名父之令子聖天子之賢臣者乎一出一處豈無所係哉藝林庫提點樵隐君兼才徳之名懐忠孝之寔昔者天子既奪其飬而寘之藝林矣君不以莞庫爲早而怠其事又命攝授經而列于奎章矣君不以師道爲尊而貪其荣一旦棄官歸飬如孤雲之遇飄風瞬息而不可㽞也雖賁育之勇不能過焉濟南之士豈無所動其心哉即使君日居朝廷之上奉一軄效一官其忠亦如是止耳今退居庭闈之間盡甘㫖之奉謹温清之禮父母樂之鄉党稱之使天下聞者父以教其子兄以訓其弟相率而歸于孝弟之化以相隆平之治其爲忠也不亦大乎故君子處亦一忠孝出亦一忠孝烏可岐而二之哉昔親之壮也而不知事其君是不孝于親者也親既老矣而不知事其親是不忠于君者也天下豈有不忠之孝不孝之忠哉則樵隐君之出處交得其道矣君行矣余欲歸飬而無所用吾情焉車既膏馬既秣凡工爲文辭者皆詩以送之而奎章閣承㫖學士李公命余爲之序送也速荅児赤序自科舉廢而天下學士大夫之子弟不為農則為工為啇是科舉復而天下武臣氓􅊢之子弟皆為士為儒非昔之人無聞知而今之人獨賢也頋在上之人所以㝷之者何如耳國家臣妾萬邦南邦為一餘六十年而教化不興風俗日壊奸宄屡作者任法律而務財用也仁宗皇帝赫然奮起賔興天下賢能而用之雖刀筆筐箧之末并欲傳之于士天下孰不释未耜而談詩書投干戈而從筆硯行之二十餘年孔孟之道卒未能大洽于天下者仁宗皇帝在位日淺得人未衆作飬之士未成新荑稚蘖不足以勝夫深根固蔕牛羊日夜又從而牧之信道篤者類指為迂濶稍出芒角為國家分憂者盡格之下位急功利者遂從而彌縫附㑹覬旦夕之餘景而不知已為他人所銜轡矣自是法律重􅚨者愈輕群然鼓簧謂士不足用科舉無𥙷于國計不罷不止烏乎果孰為國計哉至元𥘉從軍㐮樊有抄児赤者合禄魯人也以功為千夫長抄児赤傳秃魯罕秃魯罕傳秃林台三世皆戍建昌而三世皆賢秃林之子也速荅児赤從郡人李宗哲學進士業有聲今年夏從其婦翁増城左君至京師拜余程文憲公故宅貌粹而氣和才清而志銳他日必為明進士然君子之學非所以為冨貴利逹之謀也所以進其徳而逹其才者也故其學不止于為進士夫文以制治武以定亂法律以輔治財用以立國皆君子之事所當學者且文武非两途也用之制治則文用之定亂則武非文之外有武武之外有文也法律非不任也任之以為輔治之具非為治之本也財用非不務也生之有道而用之有莭非瘠民以肥國也故君子之學也用以致其君則爲尭舜之君用以治其民則爲尭舜之民非徒學以自别于農工啇賈而已國家飬之必以其道待之必以其誠任之必盡其才非徒用以窃任賢之名而已然學在我飬不飬用不用非所計也而用不用寔関天地之否泰國家之盛衰吾道之通塞此君子之所憂不敢計焉者子㱕第務學焉勿以科舉廢興爲去就當天下任者倘有仁人之心不忍坐視淪胥于苛暴慘刻必有爲國家計者也幸勉旃母自畫沇溪先生文集序豊城文物之盛自漢徐孺子以高士之莭讀書龍澤山中為太守所禮唐王中丞以風后刀牧之望㽞滯江湖為詩人所歎至宋彬彬不可勝載矣而黄氏居沇溪之上相望𢾗世以文章學術顯名天下盖自栁州公始公諱得禮字執中由元祐三年進士三遷而為栁州推官年三十九以卒其享年少其歴官未乆故其行事不能大暴于天下觀其遺文則可得而論矣公之詩沉蔚雄徤有矯齊梁晚唐之意公之文辯博宏大有憂天下之心盖當國家盛時其氣渾其政平故其發于文也和而荘直而不遷至若論唐太宗遺憾于魏徴有耻不及其臣之失牛李之祸罪在徳𥙿不䏻以公滅私陽城爱弟不娶甘棄父子兄弟夫媍之大倫為索隐行怪其志于世為何如也紹興𥘉公之玄孫愿編其遺稿得詩九十二長短句五史論十雜著九拾遺詩二長短一及附録四首離為四卷至淳祐中其子脩紀始刻之已而燬于兵今公七世孫壁将復刻焉而属余為之序惟黄氏由金華從豊城盖𢾗百餘年矣訖宋之世登進士第者十有三人而公之子吏部郎中次山公之孫禮部尚書疇若為最顯其行事則載之國史其文章則吏部三餘集尚書竹坡集世多有之故不復論無底書囊序無底書囊二卷故族父竹泉先生所著之書也先生諱壵翁字汝和世為豫章豊城人父諱泾伯父諱士林皆受學清江張文憲公之門文憲公噐之稍不及門即以書詗先生十歲而孤惟毋教育之而母性方嚴聲色不少假先生亦強學力行事母極孝自為子弟以至沒齒人未嘗見其過疎髯廣顙眉目聳秀癯然若不勝衣居碧山之下萬竹之間竹間有泉甘冽不竭每清風徐至幅巾藜杖臨于泉上望之若仙蚤從大人先生逰如郷之翰林學士徐公經孫户部郎官李公義山臨江蕭左史山則監察御史泰来兵部侍郎徐公卿孫廬陵秘書監丞歐陽公守道湖南安撫使李公芾每典言論引據經史慷慨激烈風㮣凛然故莫不折莭下之晚歲教授郷里凡經指授皆尚氣莭不碌碌随人後望而知爲掲先生門人平生讀書皆手自編校其所論著必以扶樹世道爲本此書特見聞見緒餘猶鑿鑿積寔如此况其他哉元貞元年冬十有二月寝疾明年正月四日蚤作沐浴易衣冠謁先祠畢還坐堂上手爲書𢾗通别親故賦五言詩八句示其子載且戒之曰母以释老汙我端坐而没後三十有六年其嗣子将刻是書以傳而命傒斯爲之序臨風開卷􅎈􅎈若睹其風儀歴歴若聞其平生之言而終古不可作矣嗚呼悲夫謹序其㮣如上至順三年七月日序臨江路張同知自然頌序自然道之極也因而品莭之聖人之教也老荘明自然而不可入于聖人故儒者所弗道河南張侯之貳臨江也其言曰是其所是非其所非是非非有于我也賞所當賞刑所當刑刑賞非有于我也皆自然之道也行之三年政果有聞遂名其所居之室曰自然其民之賢而文者陳宗元倡其友前郷貢進士易方猷等若干人爲之頌而請余序夫張侯因自然之道而爲之政不騁竒以取名宗元䓁因自然之政而爲之頌不溢美以為說惟不騁竒故民得遂其性而樂其業不溢美故文得盡其辭而信于逺皆可嘉也且以張侯之賢而得宗元以為之氓必能導之以親親長長之義使侯之政易行以宗元之賢而得張侯以為之上必能後其奔走力役之征使元之教益申是又皆可賀也惟其知自然自以合自然是為張侯自然頌序送爕元溥序廬州舒城長爕元溥泰定四年進士也元溥䝉古人名爕理普化無氏姓故人取名之首字加其字之上若氏姓云者以便稱謂今天下之通俗也元溥治舒城亷敏明恕見許于士君子賑飢興學有恩惠予民時郡縣吏𥘉到官參所部必舉元溥以爲勸余尝載其槩于龍眠書院記今遷撫之樂安其民慕亷吏思惠政與舒民同又多文而好學易以禮義化然撫五縣皆無公田之入可以自飬非痛自莭縮去其穴食之人鮮能自果者况元溥名進士人望之也尤深責之也尤嚴决不敢以他吏自恕自易其常今天下所共聞知者海南治公田之八十倍常賦民不堪命遂起爲盗擁衆𢾗萬破州略縣賊殺将吏屠戮士民兵連祸結𢾗年不觧爲朝廷之憂彼有田而賦之不以其道害猶如此况當天下兵飢疫癘之後誅求割剥之餘民力耗竭之極又無田而殘民以逞将無海南之事乎此吾與元溥所深憂而極慮者而天下行之若素漠然不以爲意吾不知其何心也嗟夫元溥士不爲仕則已仕則必盡其道母貽父祖之羞爲天下後世之僇咲也送彭仲寳赴水廵撿序臨川彭仲寳以温厚之徳深潜之學雅正之文佐脩皇朝經世大典于奎章閣以恩借授衢州龍㳺水北寨廵檢将行謂余曰余儒者也释爼豆而弓刀非素所從事也非素所從事而從事焉去親逺且困不可乆也以去親逺困不可乆從事于非所從事如曠官何曰天下治禮譲為郛郭而莫能破以詩書為甲胃而莫能入以仁義為干櫓而莫能犯故守之以謹勅之士而有餘天下亂高城深池不為固長刀大劍不為利強弓劲矢不為威故守之以熊虎之将而不足今天下之民􅉼㤙而沐化好善而悪悪安耕而忌戦争者五六十年雖有強王叛将屈強于𢾗千里之外不過馳一介之使手𢾗寸之革即縛之闕下視區區狗偷䑕窃曽蚍蜉蠛蠓之不若是故夷城塞塹束兵卷甲偃然有萬億年固安之势君以𢾗十里之地善悪不掩乎耳強弱不逃乎目是非不惑乎心輕裘緩帯足以坐鎮之何曠官之足惧哉吾惟憂其所不憂慮其所不慮偹其所不偹仁言而義動雖守𢾗十城可也何有于𢾗十里哉仲寳以為然遂書以贈之掲文安公文集卷之九
