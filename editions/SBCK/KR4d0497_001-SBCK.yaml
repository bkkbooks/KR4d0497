front:
  text: 揭文安公全集􅃃之一
  hash: sha256:eda06860a363c9a93749bfc1fcc92745b9d99de46fcf8a1fa8152acd4d9c3bc0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_001-1a}
body:
  text: 揭曼碩傒斯著門生前進士爕理溥化校録臨川女我本朱氏女住在臨川城家世事趙氏業惟食農耕五􅀊父乃死天復令我盲莫知朝與昏􅀁依母與兄母兄日困窮何以資我身一朝聞宻言與盲出東門阿母送我出阿兄抱我行不見所向途但聞風雨聲行行五里餘忽有呼兄名兄乃棄我走客前撫我言我與趙世親復與汝居鄰聞汝即赴死扶服到河濵我身盡沾濡不復知我身汝但與我歸飬汝不記年涔涔遵旋路咽咽還入城城中盡驚問戚促不能言望門喚易衣恐我身致患再呼我母來汝勿􅁨飢寒汝但與盲居保汝母女全我母為之泣我鄰為之歎喜我生來歸疑我能再明兄得與母居不異我父存我今已十三温飽兩無营我母幸康強不知兄何行我母本慈爱我兄亦艱勤􅀁驅病與貧遂使移中情當日不知死今日豈料生我死何足憾我生何足榮􅀁恨天地生不如主翁仁誰能為此德娄公名起莘夏五月武昌舟中觸目两髯背立鳴㕠㯭短簑開合滄江雨青山如龍入雲去白髪何人並沙語􅂳頭放歌􅂳尾和篷上雨鳴篷下坐推篷不省是何鄉但見㕠㕠白鷗􅂈張君壽先生鵠山隱居當日自期顔杲卿莫年羞見魯諸生􅂰兼多病終難屈身為長愁視轉輕日晏典衣留客醉雨餘開户㸔兒耕淮雲楚樹晴如掃卧送年年江水聲送趙􅂂道虞叔常還江右趙子我同里虞􅀰我同年手折武昌桞送上西江􅂳買魚沽酒燒荻鞭夜下西塞寒山前西塞山碧如苔君今去㡬時来東風花開春水漲待君黄鶴磯頭望君庾公楼上􅀉題九江義門陳氏壽安堂匡廬之隂彭蠡涯七百餘載真良家宋御書表其門曰真良家冲和欝勃吹不散飛落南山萱草花徃時冠葢如流水撞鐘􅂦食三萬指詔書十度復租庸每􅀊朝廷仍貸米父慈子孝則四方紀净綱明照閭里􅅾莱水淺昆明空天開地闢元氣通張公百忍澤未竭王母千年桃始紅南山築堂三百步翠竹屯雲森玉􅀣忠厚必有神明扶淳樸自是期頥具方瞳緑鬢紅氍毹春酒揺蕩香扶踈公矦子孫始必復日爲太夫人起居正月十二日尋盧學士􅂳至漢口留詩爲别晴江澹微瀾曵雲在曽巘参差連舫出散漫羣鷗逺始知遵漢廣遥睇高斾卷懐賢毎忘賤臨流亦􅁯􅏝蒼􅃼景将入􅆼渺春猶淺新知遽相違餘悰何由展黄尊師髙軒􅀚鵝因留宿開軒南嶽下世亊未曽聞落葉常疑雨方池半是雲偶尋􅀐鶴侣來此㸔鵝羣一夜潺湲裏秋光得細分衡山縣曉渡古縣依江次輕輿落岸隈鳥衝行客􅂈山向野􅂳開近嶽皆雲􅂔中流忽雨來何時還到此明月照沿洄題王山仲􅀁藏瀟湘八景圗􅃃赱茟作瀟湘夜雨涔涔暗江􅀣􅂽􅂽椘天路稳繋渡頭􅂳莫放流下去逺浦帆歸􅄀㝠何䖏来小楼江上開長恨風帆色日日誤􅀰囬烟寺晚鐘朝送山僧去莫喚山僧歸相喚復相送山露􅊜人衣洞庭秋月顥氣自澄穆碧波還蕩􅃞􅀿有凌風人吹笛君山上平沙落㕍天寒関塞逺水落洲渚濶已逐夕陽低還向黄蘆没漁村晚照㝎從海底出且向平沙照漁􅃠未全収漁舟還下釣山市晴嵐近􅀣参差出行人取次多板橋㕠路口此世㡬廽􅂈江天暮雪􅀌舟三日住不見有人家昏昏竹籬䖏却􅂲是梅華以事蹔如武昌􅀤臨川江轉欲無路山廽忽似圍客程秋共逺物色晚多疑稍稍沙鷗集忽忽野􅀣稀武昌今夜夢定有故人知女兒浦歌二首女兒浦前湖水流女兒浦前􅂈湖舟湖中日日多風浪湖邉人人還白頭大􅀌山前女兒湾大孤山下浪如山山前日日風和雨山下舟􅂳自徃還送尹十六善叟謁告歸荼陵㑹􅁙賢兄䖏士十韵八􅀊頼賢兄未埋猶望生旋聞日下塟敢恋世間榮淂告如無及嚴期况有程意長㸔路短義重斍身輕鄉􅀣迎􅂳出江雲入莫橫望山占驛堠聴雁作城更但使能臨穴猶堪略慰情死生今古異去住别離并尚足酧知已非貪羙俗評忽忽不可盡廽首各沾纓送黄五舅得武陵校官還辰州寓居省侍寕上山頭種禾􅁰莫向他鄉作羈旅山田得雨尚有年他鄉顦顇何人憐一身千里家何在全家更在沅湘外獨􅀣雞鳴楓葉飛􅂽村㕍没蘆花碎親在窮邊望子還子在長途衣復单居無寸田出無傼明年作音佐官當食禄貧交行驅車涉廣川􅀭帆陟崇丘結交四海内中道多愆尤朔風厲苦莭獨鶴横九州朝拂三島􅀣夕􅂈五城楼两翅偶寒影曠然何􅀁求登高臨大江日莫萬里流時哉䟽鑿人八年􅁯外留出必益稷俱歸與䕫龍儔進退两不疑功成垂千秋萬亊日相􅟃恩情􅀂雲浮吾心苟不渝反覆安足仇自非天地外何能独忘􅁨曉坐張先生朝陽軒朝日照高􅀣幽人方啓関蕭寥塵外亊風葉滿􅆤間别武昌欲歸常恨遲􅀅行反愁遽殘年念骨􅁏乆客多親故佇立望江波江波正東注南康夜泊聞廬阜鐘聲廬山三百寺何䖏扣曽雲宿鳥月中起歸人湖上聞入空應更逈近瀑正難分遥想諸僧定香爐上夕熏春日雜言七首日月朝朝新何物能獨乆常恐天與地変化曶已朽東風闖然来茫茫浩無首起視桃李樹晱艶一非舊如何楊子雲泯黙空自守朝出城西門孤墳何穹窿雄狐竄其西修虵出其東云昔有狂士七尺才且雄平生無所頼屠狗渉春冬一朝際風塵身貴位益崇死生好惡間咄唶生秋風氣驕日憑陵家國两嵩蓬子孫分散盡空有牛羊踪􅇈歴楊栁枝􅂪茸春草齊夭夭誰家婦采桑臨路岐零露沾其裳蛛絲􅃃其衣樹髙身苦弱􅁞飢行復遲辛苦事姑嫜宿昔减容輝見者皆歎息此心知獨誰良人日暮至醉問尔何為啁啁田間雀啄啄常不給春水日已􅀷網羅復相及既無飬生具日夕湯火急多謝雲間禽無為自覊縶祝融九千丈瀟湘地底流洶湧洞庭野崩騰江漢秋上有飛仙人身披紫雲裘昔者嘗相遇渺若乗丹丘同􅁔黄鶴渚共醉岳陽楼思之忽不見獨立悵悠悠我有琅玕草欲贈江東客岀門道路長􅃃􅃑空歎息靈苗世所尚良士余所惜神仙無千年耿耿誰復識五􅀊能讀書十􅀊能賦詩十五事逺逰三十無所為既乖俯仰責復為鄰里欺生計日已踈世態多瑕疵煌煌金張門徒􅊢皆光輝日晏賓客集軒車如風馳一笑擲千金片言委黄汎齊生獨􅈽瑟来徃何逶迤夢两雏阿英十二能辟纑阿牛五􅀊貪讀書辟纑成􅈁無人識讀書有志令人惜汝父飄零汝母休吾親雖徤俱白頭雨聲断道風驚屋阿婆獨􅈽諸孫􅂘夢武昌黄鶴楼前鸚鵡洲夣中渾似昔時逰蒼山斜入三湘路落日平鋪七澤流鼓角沉雄遥動地㠶檣髙下乱維舟故人雖在多分散独向南池㸔白鷗逰麻姑山五首并序湖北憲使程公間居盱上二年矣五月二十日詔詔拜翰林學士又十日公與使者及諸客同逰麻姑山輙以覧歴所止賦詩五首雲関君子荷􅀄服㤙至􅀂無榮穆穆芳雨散悠悠蒼山行危関擁霧黒飛術緑雲青苔蘚􅉸如積杉松窅􅁳冥時逢􅀒苓翁忽聞流水声舉足向益髙矯然欲遐征徒􅊢各忘倦矧彼髙人情飛練亭神工擲天紳挂之两崖間萬古輸不盡誰能測其端势割山石愁氣挟草木寒安得天風吹繋彼日月還麻姑緑雲髪􅉳黝長不殘湧雪亭泉源出地底仰向雲中行擘厓㵼千犬亂石皆騰獰風霆日夜急雨雪虚空明不有神物扶兹山應乆傾噴薄側飛鳥砰鍧愁百靈仙家信為好喧䀨何由平三峡橋两山束飛橋下塹不測渊誰開萬㝷鐡逗此無窮泉淙淙輥空曲􅍅􅍅投奔川陽光下照之忽作龍騰天常恐桑田変中有瞿塘船麻姑壇嵯峨仙都觀遥望丹霞天後有千􅀊松前有百頃田風日夏颯烟雲晝葱芊羣彦一時集安知非列仙持觴起相醻罷琴抗髙言天道信悠邈人情何拘挛靈君不可致落景詎少延仰雖慙􅁳􅁳俯寔憂元元主人顧坐客此中可􅁯年盧學士奉㫖南祀海嶽繇鍾陵相别聞尚宿㽞㑹稽有懐奉􅀉鍾陵一分手幾日過錢唐五日山隂路千峰海上凉烟霞含景氣草木識天香夙昔經行䖏風深轉不􅁯病夜素壁深􅈧獨客身桃枝薑胯只為鄰極慙供給煩賢友尚恐􅀓聞及老親蛬響戒寒相􅀿起烛花連夜為誰新多情造物真豪縱盡力相驅病與貧得程翰林楊州消息皇明属休期側席佇貞良㳺麟既集薮鳴鳯亦在岡君子乘時興出餞何輝光車馬塞江介笳鼓凝羽觴時秋風雨交四顧野茫茫晨鉦􅈭中流飛斾忽異方蓄思遵旋􅁤浮雲紛北翔道路間􅀖畿草木隕寒霜畧景倐易流悲来但􅆦徨君懐經綸􅁨余􅀒灾疾妨騫沉固異趣情􅁩結中膓居下衆所夷在賤誰不忘宛緬廣陵翰胡獨置我傍鬰悒増愁思投袂睇莾蒼自顧匪茅茹委跡任空墻淵淵賢逹心悢悢情内傷歸故園新居落成後作親光身仍苦家貧􅀊更㓙掄材斤斧後􅀤地艸菜中面势㸔前跡􅂬呼集衆功􅂓存今日意敢望昔時同漂轉何多􅀊艰難且定居隣人供菜菓穉子進詩書稍覺牛羊逺兼知蔓草除此園三百載亦復返吾􅀄山行稍出羣山復渉溪溪光山色冷相輝青􅅂獨踞溪邉石不顧行人自濯衣􅀉題馮掾東臯園亭時雨散繁緑緒風滿平原興言慕君子退食在丘園出應當世務入詠幽人言池流澹無聲畦􅂼蔚䓤芊髙林䴡陽景羣山􅀂浮烟好鳥應􅀱鳴新音和且閒時與文士俱消揺農圃春理逹自知簡情忘可避喧庶云保貞和􅀊暮委周旋宿梁安峽夢故室有感時還旴江梁安峽裏杜鵑啼絶壁蒼蒼北斗低雲氣倒連山影合石稜斜闘浪声齊南風盡日迎歸客落月空江夢故妻一室十人分数郡百年幾䖏候晨鷄送趙仲逺赴晚寕仍為令尹去如送武夷仙舊政閩人説新詩海客傳度関風搬署下瀬月依船不奪循良意應知幕府賢山荘晚立有懐舎姪沆督穫臨川䔩䔩黄桑葉蒼蒼白竹峰居人争野碓歸客背村鐘路暗縁溪􅊜山寒著霧濃阿咸収稻未辛苦闕相􅀙􅂘王十良仲深谷可為陵大海可為田唯有死者窮無由􅀚青天千古黄壌間萬古黄泉下精神與時息形貭隨日化日落朝復生月缺望已盈不知死者别何時見形声悲哉復悲哉已矣復已矣我友􅀄五人今焉忽成四死者不復見生者長别離人生如春花美好知幾何欲為生者歡復念死者苦死生日相尋歡樂如糞土雨述三篇江南臈月天未雪居者單衣行苦热連山郡邑瘴盡行豈獨嶺南與閩越逋民攘攘度閩山十人不見一人還明知地􅁖去未已可憐生死相追攀近聞闽中瘴大作不間村原與城郭全家十口一朝空忍飢種稲無人穫共言海上列城好地冷風清􅀂蓬島不見前年東海頭一夜潮来跡如掃冬来一晴四十日三日南風當有雪不知閩嶺今何如念我故人書断絶劍南判官心所親甌寕大夫政有神腐儒多事浪􅁨喜安得貽書兩故人春莫閒居􅀉城西程漢翁十五韵迢迢曽城阿峨峨鳯凰山下有隠淪士能為淮漢言两日一寓音五日一承顔毎談經済事恒及離乱間言辞多忼愾文字少凋殘不歎東逝川但憶南山田寕與無心逰不受衆目憐褰衣必峻崿散歩亦名園舒卷信在􅁭蕭寂固􅀁安經春僒疾痗撫時增懦孱羣書乱薬裹髙卧掩荆関蹇余属乆要朝詣常暮還醜劣愧髙情焉知君􅀁觀日出衆鳥語蒼岑滿楼端申章冩深􅁩謭薄何由宣長風沙夜泊長風沙風沙不断行人嗟行人嗟奈君何南風正髙北風起大􅂳􅀄湾小􅂳喜移􅂳更近大􅂳頭不独風沙夜可􅁨但祝行人好心事長江何䖏是安流茅屋叁差数株栁時平尚置官軍守青裙老嫗詫鮮魚白􅄠殘兵賣􅀻酒魚賤可買酒可沽他人心事知何如何􅀰失鏡詞團團如月不曽􅉻家人親置枕中時朝朝将正頭上幘時時携鑷鬢邉絲古文宛轉何人造失来始斍今難討街頭不直半緡錢古銅終較今銅好向人不敢再三尋客裏􅆰疑同舍心萬里相隨一朝别夜夜還瞻天上月贈青城侯尊師次人韵聞說名山采薬蹤多從雲去少人逢蜀江春老㱕難定燕谷寒來望轉濃案上仙經新長蠧匣中雄劍舊降龍不知少日尋真䖏還在青城第㡬峰贈友天道有恒運君子蹈其常時物自熈洽庻心亦惟康鄙人寛慮思殊氣冐隂陽霜霰中夏零焉得不摧傷先聖有遺訓血氣戒方剛懿彼老氏言舌歯示存亡反躬寔明哲撫已增忼慷正徳詎云割率欲乃非祥勿謂壘􅆰明不足輸景光勿謂徑寸莖不足載春芳推餘暨所闕懐㢤安􅀎忘曉出順承門有懐太虗歩出城南門悵望江南路前日風雪中故人從此去京城間居襍言八首都城列萬雉楼觀並飛霞太液深蕩潏廣寒高嵯峨重譯踰萬國流聲竟四遐既􅃂瑰異才復保勛舊家忠厚跂行葦明照徹羲娥永惟皇上徳世世襲亨嘉冀北多良馬漁陽多壮士馬休伏槽􅇫壮士習農噐桑枣竟中州朝貢四方至外無烽燧警内有耳目􅀉消揺放良時􅂬楽永不替濟濟􅀙臣内赫赫公與侯伊昔􅀙我皇守􅁁瀚海頭荷戈十餘載力戰如巳􅁨寸䇿無遺用長智少淹㽞劳多必重賞功大靡􅁿酬意氣相傾動㤙深身􅀂浮天子乘六龍垂衣臨九州茅土亘河山甲第隘荘馗四海仰光耀出入擁華騶富貴歘如此寵禄信難侔􅀙軍亦云苦眷言享斯丘朝􅀙獵城南暮􅀙獵城北白馬喻飛翰􅁿裘如膏泽塵起知獸駭風高驗鳥疾􅃗箭落㕠鶖千金出俄刻㱕來拜恩􅃂楽飲􅂈一石僮奴增意氣賓客改顔色常恐文法士􅁿薄多瑕擿髙門臨廣衢秋風上荆􅁄朔土高且厚民生劲而彊榆桞雖弱質生植益繁昌桃李大於拳枣栗充餱糧誰謂苦寒地百物莫得傷青青雲夢竹宿昔傲雪霜移植扵此庭不如芥與楊竹性豈有改由来非本鄉􅆌眇寒門士客途燕薊城上無公卿故下無舊友朋裘褐不自蔽藿食空營營四頋烖沴餘但聞號􅂘聲日􅀒道徳懿敢懐軒冕榮節食慎􅀁欲聊以厚我生高歩覧九州誰獨無與親同室不相喻矧彼途路人誘詘更驅廹巧詐日􅅭真共美為善樂莫知與善鄰未足保厥躬已謂貽子孫一言易為義一㤙易為仁世無魯東叟何以􅇺心神哀飈驚野草日夜委鮮腴嗟㢤白楊􅀣高高凌􅀇虚朝逰車馬中夕息思故廬塵衿難為潔野性非京都貧賤不自保焉􅀎恋簮裾頼有死與生可齊賢與愚去婦詞江東有一士子留都下三年適娶一貴人女為妻乆乃知其已有妻子矣一夕逃去因託去婦為之詩非徒欲傳其事抑以示風戒云爾輕合鮮義終苟容希禮遇逺結萬里昏多為才名誤始與君結好不知君有婦有女嫁他人俱懐託遲莫青青墻下草生死墻下路娟娟道傍華零落無䖏􅀁女子失其身何以保貞素既乖百年意百年誰能度對鏡空悲喑中心良難訴浮萍難為託一木無両附棄舊属新􅂬新歡漸成故寕當中路折莫被他人去寕老阿母傍不受他人妬騰身岀房闥両絶無復頋􅀁願嫁他人甘心西山􅀣四友詩四友者廣信王庭鈺良仲臨川李商弼良佐武昌盧廷鵉子儀同里熊坦􅀙正也李亡已七年餘亦亡二三年余索居京師毎夕夣寐與四友相接傷其皆賢而無夀又與余篤好乃作四友詩一以志余哀一以㮣見其平生云李得年二十二盧二十九熊二十四王四十有九三兄􅀒竒偉十四已應門倉卒遘閔㓙盗賊蔽丘原衰絰􅀙伯父慷慨安其人豪横劇狼虎瞋目莫敢干䧏心相欵宻共稱孺子賢時􅀿州縣役調笑官長尊酬接雖靡盬講習日多聞激烈忠憤際委曲禮法間時平俗益康放志農圃言有集曰圃課浮湖感龍変嘗汎彭蠡見龍見遂肆意墨龍悟觧夐絶陟巘忽鳶騫古笛振哀鐵清琴敏素絃毎傷古人逝迸淚尊酒前與我􅀄識面己誓為弟昆誰謂天不仁中路遂離分寥寥昻山阿􅉳黝硯井泉賔客一以散託夢與招䰟嘉禾不叢生猶為造化欺繁霜凋其葉震風傷其枝利虫齧其根飢禽啄其皮豈無雨露滋不得干雲霓李氏年弱冠博通三氏詞援毫㨗飛電吐􅂔裂豹螭信如海上潮直􅀂琴上絲朗如九秋月温比三春暉志在躋聖賢寕復頋􅀁私一悟生㓕理天地忽若遺君卒時一日晨興有数道人叩門求作白蓮庵記君援筆而就大爲得意有頃忽奄然坐逝父母聞而趍􅂘之迎謂父母曰某兄弟幸多死生命也勿以爲􅁨既瞑一道人撫其背曰檀樾檀樾生好䖏生好䖏復瞪目視道人厲声曰佛法本無生􅌍遂卒癸邜二月也葬時衆轝出城􅀄不􅀎勝忽輕如羽顔回早聞道短折非􅀁悲􅃼􅃼後死者中夜獨漣洏武昌故舊中盧生亦竒傑雄才傲當世高誼凌白日貧賤有相知富貴莫能折冠盖如雲霧而獨與余宻大徳七年夏予有長沙役臨河與余分攬􅃑乆鳴咽知心託生死誰能此離别千里竟相􅀙風波復炎􅀬青天入杯酒􅁔嘯中夜激便欲乘滄溟迢遥送華髪行行亦云至終當与君析捨棹即長途惆悵知永訣謂余平生懐時俗莫能逹學不追古人終不願有室還聞起分数小邑傍蕭瑟始爲賢者哀那知􅃍淪没樊山罷􅂬讌赤壁空流月佇立想音形音形一何濶親友日凋謝况我情􅀁鍾熊子三十餘亦在九原中高才祇促齡積善適爲㓙天道不可依人命如飛蓬夢寐常相見烱􅀂生相􅀙亦知心不異矧復里閈同始君椽韶學我心寔忡忡歸来已三年微疾竟永終薄禄不救飢一官非高崇獨令君子亡碧血冷秋風鄰曲㤙爱絶山川談笑空名家失金匱樗櫟入公宫誰復継粹温徒用想舂容千秋瑶山路繚繞劒池東賦㕠陸三五對参差高呼得采時猶疑㕠出早毎恨独歸遲散地偏難入全功或誤竒極知妨日力聊足審安危泊安􅂟時再北游夜泊淮西郡寒生客子衣酒家臨岸閉野燒映江飛雲盡月􅀄岀潮平風漸微前年城下路此際正南歸漁父夫前撒􅃠如飛輪婦復揺櫓青衣裙全家託命烟波裏扁舟爲屋鷗爲鄰生男已解安貧賤生女已得供炊㸑天生􅃠􅅈作田園不教衣食㸔人面男大還娶􅘋家女女大還作􅘋家婦朝朝骨􅁏在眼前年年生計大江􅁁更願官中减征賦有錢沽酒供醉眠雖無餘羡無不足何用世上千鍾禄高郵城高郵城城何長城上種麦城下種桑昔日鐡不如今爲耕種塲但願千萬年盡四海外爲封疆桑隂隂麦􅃼􅃼終古不用城與隍濟州􅀄度辭家計日逢􅀄度遲日暄風在帝京曉起慈親望天北行人􅀄泊濟州城楊桞青謡楊桞青青河水黄河流両岸葦籬長河東女嫁河西􅀰河西燒燭河東光日日相迎葦檐下朝朝相送葦籬傍河􅁁病叟長􅅆首送兒北去還南走昨日臨清賣葦囘今日販魚􅊝花口連年水旱更無蚕丁力夫徭百不堪惟有河􅁁守墳墓數株高樹曉相参雜詩四首􅀉彭通復日月麗中天列宿爛昭昭河漢高且深鳥鵲以為橋寒霜昨夜䧏時菊委嘉苗地􅀔西北雄終歳皆風飈玄工宰萬物時至有榮消嘗恐光景馳不得與消揺區區九州内横縱数千里誰設山與河愚者分表裏京師天下本萬國赴如水珠犀􅀙南来狗馬由西止浩浩荆吴􅂳日夜行不已生材無定􅀁一物孰非已皇天仁且廣君道亦如此我思古唐虞當日誰共理巢由伏箕潁園綺居商顔洗耳甘自潔茹芝竟不還三傑足為理五臣安可攀高尚誠􅀁貴孔轍奚独環吾聞有􅀮淪多在衡霍間飯牛腹長飢百結凄以寒懐寳羞自獻邈然老空山脉脉我􅀁思彭氏躡遐踪婉婉􅀂處子未曽岀房櫳相望四千里踰年闕相􅀙五月君􅀉書九月逹京中我書欲報君書到歳已窮豈不懐繾綣無由覿君容参差天際雲縹緲乘朔風羽翼不吾施翩彼南飛鴻君有高世行我無適時功天命人得違岀䖏諒非同栢堂詩栢堂為劉母熊夫人作也夫人有淑徳年二十五而寡守志不嫁有子曰􅀚又賢作堂以奉其母請名扵太史氏謂之栢堂而作是頌欎彼北堂言􅀣其栢其栢嶷嶷維木之特栢之始生于彼高陵雨露其凝金石其貞栢之既成鳯臆鸞􅈾言􅀣斯庭霜雪是慿霜雪浩浩其栢矯矯有美君子而弗偕老其葉欒欒其節桓桓其居安安永世式􅀚我堂既構我栢既茂天錫眉夀保艾爾後
