body:
  text: 掲曼碩傒斯著門生前進士爕理􅄎化校録記冨州重􅁱學記上御經筵之明年夏六月濟南姚侯来為富州以舍菜禮見于先聖先師祝曰惟夫子之道参天地配日月用中㒺敢知而用中寔生齊魯之交宻邇夫子之訓欽承明命来守是州今之州古千乗之國也敢不敬恭朝夕惟夫子之訓是承頋瞻廟學摧陋弗稱曰余之責也㑹教授清江陳明之継至議與志合明年秋大􅁱孔子廟仍其舊者惟殿若明倫中庸二堂江山秀傑楼惟一改作而有加規制必裁就法度出入必限由正途凡為屋幾七十楹又刻銅為七十二弟子及諸賢像以􅃊祀事鑿半池其前倣古頖宫侯載􅀴載度是董是勞吏􅁯其私工􅂆其勤渉冬徂春用告厥成而命傒斯為之記在至元二十有三年陞豊城縣為冨州以河東陳侯元凱為之尹時科舉廢十有五年矣士失其業民墜其教盗賊滿野竟􅂾十里不聞鷄犬聲陳侯大懼遂􅁱孔子廟建小學日集文儒故老講求治要悉資以為政不􅂾月境内大治知􅀁務也今科舉既復亦十有三年而侯寔来當天下文明人復其業猶皇皇焉汲汲焉以興學校明教化為先務者其守同其志亦同也夫兼有天下父師之責者君也承君之志行君之化者宰相與太守也宰相布于上太守奉于下故人之生也為之學校以教之設科以舉之必使士有恒業民有恒志然使聖人之道可明賢材可得而治可成也古之有天下者莫盛于唐虞三代而不能去學校廢選舉以為治秦能去之廢之二世而亡雖然君子之學視學校為汙隆以科舉為去就亦異乎夫子之教矣􅀂夫善學聖人者在􅅵􅅕則行乎􅅵􅅕在魚塩版築則行乎魚塩版築豈待學校之教而科舉之􅂆哉然世亦豈能皆伊傅其人而不為之教與􅂆也此上之志而侯􅀁以力行之者况上方親御講筵詳求聖人之治愚雖不敏願與學孔子者共勉之侯亷愼簡正不畏盛名而人敬畏之盖賢守云金州學記皇元制治舉法周孔􅀇徼絶壌同風鄒魯一郡一邑必謹學校以為敎基在仁宗時太子太傅長史郭侯􅂂治靖五年俗興民和克信其道㤗定元年春移􅏗于全全居湖南九郡之極地小而岩風氣啙窳郡西湘山又稱無量夀佛入㓕之􅀁世奉遺骸奔走萬姓而夫子之廟荒圯穿漏曾莫頋者罷輭者以民勞為觧貪墨者以廪薄為辭講誦不興荐祼無􅀁侯至㑹缺太守侯搃學事教授黄潤以為請于是侯率僚佐倡于上士民􅂆于下明年二月即工前清湘長法黒進拜元侯知邑士鄧桂能状命董其事遂斬木隂谷伐石陽崖食功傭力民不知役太守何公潤􅁇至朝􅂆夕勞休威並行及期而廟成乃易夫子十哲像分祠先儒及賢守于講堂之左右翼門序軒陛以次咸畢又辟廟南廢地爲杏壇三成以擬闕里建明堂四檻以舘諸生既告成于廟教授謁告還江西㑹予廬􅁜曰郭侯每以不得君記爲恨敢請乃述其事且俾告于有衆昔靖之鄙爲群僚刼以自附者八百餘家􅂾自請吏吏不能討而王賦之供不敢怠遑及郭侯為守天子出使督兵討之八百餘家咸在夷滅侯以死争乃去刑書復為齊民侯非力能生之也以其民恪遵魏文靖公之教知有君臣之分雖為虜而王共不闕故也全之四境盡為中􅀖又宻邇周元公之里父傳子習皆聖人之道民之情性豈獨異乎夫殚財浚力以奉無益未必􅀩福耕田鑿井以服聖賢之教未必被祸且一􅁝一粟得以飬生送死又使父子有親君臣有義夫婦有别長㓜有序朋友有信君子登于俊選野人免于刑僇果何惮而不為哉亦教化使之然耳為民上者曷敢不敬學在郡治之隂鳯凰山之陽宋紹興十三年之􅀁遷也東南諸山秀䴡竒詭湘􅈅灕水合流其下盖為一郡之勝云泰定四年八月丁􅕀記舒城縣龍眠書院記治民之道使民知禮義而已使民知禮義先示其􅀁尚而已民知􅀁尚則知􅀁向方哉廬􅁜舒城長爕理􅄎化用湖廣舉首取泰定四年進士第得兹邑首理學政咸用其學以教導民民始益知人之􅀁以為貴儒之􅀁以為重而復知􅀁以飬生而送死居二年曰民其可教矣乎于是又治地邑東得李公伯時龍眠山庒故基于東禅寺東舒王祠西尝没于寺者據山川之㑹想昔賢之逰䖏乃會其禄入募工度功作書院以奉先聖先師以為出治立敎之本不踰時而成凡殿堂門廡齋舍庖庫及李公之祠為屋三十有六楹以其面龍眠之山端䴡竒峻能出雲雨膏澤天下榜之曰龍眠書院且示不􅁯李公之故而邑賢者范鳯瑞割田二百􅅕以供􅀕飬既告成于廟遂立之師進諸生而教之凡民有来􅀚者必􅂆之以學是時上既撥亂集大命兵革未息飢疫未復郡縣長吏能以荒政自任且不足遑知禮樂之教哉而舒城􅂆分則出粟之家惟恐後民之強暴子弟一有弗若則父兄長老切責詬怒惟恐見絶于長吏休休焉方日以興學為事舒之民卒無一人携離轉徙者長吏豈獨賢民得其􅀁以生者也舒著于春秋故山有春秋之山水有舒水始入于随後并于楚其民勇而好義非獨舒為然楚之地皆然故楚常為強國最後宋室南遷頼其民蔽􅃒江淮幾二百年然當時民雖欲為學其可得乎自國家有宋民不知兵者五十餘載又有好文之君􅁇出而學校之教欝而不興仁義之政尼而不行飬生者不得盡其􅂬喪死者不得究其禮此非上之􅂈長吏之責也今吾君既􅂌爾以賢長吏一以詩書禮義􅁴爾民民亦知􅀁尚乎若曰升其堂􅞽其􅄊設其牲齊而行其典禮如是而已此事聖人之疏莭也非作書院意也舒之人尚其朂哉李公名公麟邑人博學好古舉進士歴刪定及檢法官未老致仕蘓文忠黄文莭二人尝􅂈其山荘故合祠于堂之北是役也建始于天暦三年之春工畢而改元至順縣學之明倫堂亦其􅀁建也是􅀊冬十月朔記􅃰州孔子廟禮噐記古者􅀕噐犧象罍洗登豆之属皆以木簠簋籩篚之属皆以竹後世惧其速朽也不能以時易也範之以銅取便于有司而古先聖王之制僅存其名號焉耳惟􅃰州孔子廟噐皆上陶殘缺苦窳􅀅事者耻焉􅀚者議焉有司莫以異泰定四年秋廬􅁜曹君明則来領教事始白于有司馳􅂾千里還廬􅁜範銅以易之及有事于先聖先師齊肅秩粟昔之耻者誠敬之心生焉昔之議者慢易之心冺焉逺邇来􅀚俯仰嘆玩雖非古先聖王之制有不暇計于是州太守命范陽令杜肅府而藏之属奎章閣授􅀴掲傒斯文而志之或曰範金非古也其亦必有􅀁受矣胡莫之或改以從古也禮有損益噐有冝然况世􅀁寳三代􅃔􅂦罍斚尊卣之属皆範銅為之也皆自天子至于公卿大夫􅀁作以貽子孫者也雖不可盡信然其来固已乆矣謂範銅之非禮古人亦且為欤彼皆欲為長乆計也皆欲為法于後世者也且觚不觚固非觚矣謂木之觚為觚金之觚為非觚可乎學至于孔子可謂知禮矣然逄掖于魯章甫于宋舍麻冕而從純非欤必以古為是而今非則􅃰之用陶盖有虞氏之􅀁上也以木以竹皆非禮也而可乎夫敬者禮之本噐者敬之輿也􅃊其噐􅀁以存乎禮也而耻焉而議焉則敬何由生禮何由行欤故泥乎古者不足以􅆘今膠乎􅄊者不足以言禮故記曰禮從冝傒斯曰􅀕􅄊者􅀁以交于神明者也非飲食之謂也苟知禮之本矣雖從冝可也嗚呼􅈠君其可謂逹于禮乎是􅄊也有司其謹藏而時出之仍􅈓其目于左方增城三皇廟記三皇古無廟唐天寳中始置祀以春秋配以勾􅉭祝融風后力牧五代宋並因之國朝始詔天下以郡縣皆立廟以醫者主祠建學置吏設教一視孔子廟學大徳三年太常言三皇開天建極創物垂範為萬世帝王傳道之首今太醫院請以黄帝臣俞跗桐君􅄦􅁷區岐伯之属十大名醫視孔子十哲配享廟廷是欲以三皇為醫家專門之􅳊非禮􅀴冝從唐制中書下禮部議議如太常至大元年中書又以湖廣行省言如太醫院􅀁請配享事下禮部議請以十名醫視孔廟諸大儒列祀兩廡遂著為令廣州之増城未置廟􅀊春秋有司設主􅀉祀叢祠中至順二年秋九月旴江左祥由翰林從事廣州香山縣尹潮州路􅀴歴以􅆢議大夫治増城既新孔子廟學于城西冲霄門外之故址而以舊學為三皇庙學壊撓者易之隘者闢之漫漶缺漏者􅂗塈而黝堊之自殿堂徂門凡為屋五十有二㨕巍焉煥焉如􅀄建然後三皇之祀始尊醫學之教始行夫以醫家專祠三皇非古制然猶足見國家尊古聖仁賢重民命如此有司知守國家常制􅁱其􅀕禮􅃊其教道竭其􅀁軄而已他非敢置議醫家既得專祀三皇可謂甚尊􅃂矣而輙漫其祀事怠其學政不知民命之􅀁以重􅀁謂失禮之中重失禮焉其咎大矣凡居是者可不慎哉左君闓疏平恕􅀁至有善政且知􅀁先務是役也能窮其力以賛其成者醫學教諭鄧友益也南雄路儒學教授李􅂋以左君之命請記乃為之書建都水分監記㑹通河成之四年始建都水分監于東阿之景徳鎮掌凡河渠􅄵牐之政令以通朝貢􅒩天下寔京師地高平則水疾泄故為堨以蓄之水積則立機引䋲以輓其舟之下上謂之􅄵地下迤則水疾涸故為防以莭之水溢則純起懸板以通其舟之徃来謂之牐皆置吏以司其飛輓啟閉之莭而聼其獄訟焉雨潦􅀅降則命積􅁟壌具畚鍤以偹奔軼衝射水将涸則􅀤徒以導淤閼塞崩潰而時廵行周視以察其用命而賞罰之故監之責重以煩延祐六年秋九月河南張侯仲仁以歴佐􅉟事翰林太醫三院皆能其官且周知河渠事選任都水丞冬十有一月分司東阿詔凡河渠之政母襲故狃私母泹􅀔怛威惟冝􅆘從敢有撓法亂政雖天子使五品以上以名聞其下随以􅁿重論刑母有􅀁貸侯北自永濟渠南至河東極汶泗之源滯疏决防凡千九百餘􅀁咸底于理退即􅀁署治文書庳冗儉陋吏側立無􅀁援告于衆曰予承命來此惟恪恭是啚願以函丈之室制千里之政役徒百工何􅀁受軄下走群吏何􅀁聴令郷遂之老州邑之長何􅀁禀政荆揚益兖豫􅂾千里共億之吏何􅀁視禁山戎島夷遐徼絶域朝貢之使何􅀁為禮朝廷重使何􅀁止舍乃㑹財于庫恊謀于吏攻石冩材為堂于故署之西偏隅隩廓深周阿崇穹藻繢之麗文不勝貭几席之美物不踰􅁤左庖右庫整宻峻完前列吏舍于两廂次􅀣洺魏􅈠濮三役之肆于重門之内後置使客之舘皆環拱内向有翼有􅃊外臨方池長堤隐虹又折而西逹于大逵高栁布隂周垣繚城遐邇縱􅀚仰愕俯嘆其言曰惟侯明慎周敏于公㒺私故役大而民弗知功成而監益尊監益尊而政益行斯河渠之利永世攸賴爰稽在昔自丞相忠武王建議于江表􅀄平之日少監馬之貞奏功于海内一家之時自時厥後分治于兹者鮮不著勤焯劳載于簡書而公署之役乃以待侯非樂侈其名以夸其民􅀁以正官守肅上下崇本而立政也誠冝爲而不敢後惟國家一日不可去河渠之利河渠之政一日不可授非其人若侯者其人矣是役也首事于侯至之明年某月日卒事于至治元年某月日合内外之屋餘八十楹是􅀊九月朔具官掲傒斯爲之記安福州東嶽廟記五嶽自古皆秩祀于天子而東嶽獨爲天下宗今郡縣不置廟則以爲闕延祐四年冬吉安路安福州逹魯花赤瞻思丁始建東嶽廟于城東門外之秀嶺知州郭恢台䓁恊其謀佐吏及州民之樂善者相其財地利材艮工胥􅂆功明年秋廟成重門􅃨殿高廣䴡深翼以列祠七十有二象設􅃊畏軒陛崇隆上巢飛雲下瞰湍瀬旁引群山俯視井屋朝陽夕隂如神徃來稚耄男女蟻行而上俯視拜跪如臨父母復伐石為橋曰秀川而屋其上六楹以逹望走刋木為亭曰一覧以休逰􅀚而命道士姚某守之民大悅又明年秋州人前肇􅂟路濓溪書院山長彭徳昌請紀于石夫東嶽魯望而廟于兹從民志也民不知善而惟神之依惑也苟政不平􅀊不成欲事神得乎福善禍􅁋天有常道事神治民國有常禮禮不可黷道不可誣靡届弗至者神無感不通者誠誠神合而福禄降惟君子能之若夫􅁱典常正國俗則國家之事而君子之心具官掲傒斯記浮雲道院記余方窃禄周行進不能有禆于時退不能自訟其􅂈而客有言浮雲道院之事者乃起而四頋􅃼然自失渺然若天地無􅀁容客之言曰吾􅀁居郡曰廬􅁜邑曰永豊是為歐陽文忠公之郷吾之里在鷄山之陽鷲溪之濵山川深厚草木濃䴡其人秀而多壽弦誦之聲溢于四境耕種之民交于四野時危代易干戈􅀁不加焉水旱疾疫盗賊􅀁不入焉人無甚冨亦無甚貧吾劉氏族居三百有十二年矣環吾里􅂾百家無異姓良田􅂾百頃未嘗去劉氏冠昏䘮􅀕必以禮共給公上必以時無金玉狗馬之殃無高爵重禄之祸各食其力各守其常吾雖客逰四方而心安之㤗定四年秋吾歸自河南乃闢園􅂾􅅕種桑柘三百株枳若橘皆千株木寔之脂可食可燭俗號山茶又曰木子􅀣者七百株茶五百株桃李雜果松竹之属又稱是􅀊先疇之入雖不足以自給計􅂾年之後葉者寔者脂者萌可茹材可􅄊者可薪者各效其用則吾春秋之事朝夕之共宗族郷党賔客之奉可不具而足矣吾又有兄弟子姪􅂾十人承祖父之訓皆頗知學足爲保家之主天之􅀁以與我者亦既厚矣復何求哉乃築室四楹其中爲藏􅁱之􅀁取孔子不義而冨且貴于我如浮雲之語榜曰浮雲道院又爲五言詩二十餘萹書之璧間暇則命子姪􅁔以為樂客有爱而和之者不敢辭有録而傳之者不敢止行藏用舍一聴于天夫聖人之與衆人欲冨貴而􅁖貧賤非甚相逺也而聖人不求得其􅀁不可必得不求去其􅀁不可必去安其􅀁安樂其􅀁樂從吾􅀁好而已衆人則不然必求得􅀁不可必得必求去其􅀁不可必去險在前而不頋危在後而不知早夜以孳孳死而後已于是聖人始如天地日月亘萬古而不可䟦及衆人穰穣忽而為虎忽而為䑕忽而為䖝沙其去聖人何啻千萬里吾非敢希聖人能少異于衆人無忝于前人斯亦足矣乃􅁔曰浮雲兮悠悠忽而逝兮乍㽞吾安歸兮孔丘又􅁔曰悠悠兮浮雲来無迹兮去無垠吾安歸兮義與仁􅁔畢余請書以為記客名鶚字楚竒其學以六經為主其文以義理為本其詩近陶柳之間其大父盖壽至百三􅀊云天暦二年六月九日掲傒斯記撫州􅂕感廟記臨川西南行九十里有山巍然而高大􅂭然如波濤蔽于一州者曰連珠之山有谷焉蒼峭深窈若與世隔谷之口有寺焉名如其山南唐昇元中􅁏齒和尚曰智通者嘗居之入谷􅂾十歩有廟焉曰􅂕感之廟宋慶元四年􅀁賜額也天暦兄年寺住持如海知事從善改作大殿五間丹楹藻井崇阿飛甍湧殿壁為海潮􅂟雲之状仰燭承塵俯鏡廣庭自夏徂秋遂底于成神享其祀人樂其功明年介予女兄之夫陳君用清請予記按啚志其地􅀄有古杉一株常聞笙簫之聲飛繞其上杉下有泉人汲而禱之能蘓旱而愈疾一日神附童子語及梦告􅁏齒和尚曰我朱森秀才也兄弟三人皆隐于此汝廟祀吾當福汝民乃伐杉為三神像冠服形􅀋一如􅀁夣者廟而祀之掲靈著響餘二百年至景定三年始得封為净感净􅀿净佑三真人余謂神有曰朱者株也森者杉也秀才者美木也兄弟三人者三乃木之􅀁以生也盖木徳之鍾木主仁故為善不為􅁖為祥不為咎而能大庇斯民也其兹山之靈也欤山非神不立神非山不留惟兹山與天地無窮兹神亦與山為無窮其必與我元相為無窮也然非兹殿不足以壮神之居以称此山敢不敬志其事焉於乎爾民其益務為善毋使見棄于神哉天暦三年夏四月朔掲傒斯記胡氏園趣亭記豫章胡叔俊以高才碩學隐居進賢官溪之上治乃祖西園築亭其間而逰息之以東南先朝陽而夕隂冝木果而􅀣桃李梨栗南為正陽之方冝芳華而列種海棠松竹者貫􅀊寒而後凋故以植乎西北中又雜植梅􅂾十株曰梅松竹之友也今皆蔚然為林矣若菊若牡丹芍藥之属樷生而可爱皆列于亭之左右以便􅀚賞合而名其亭曰園趣其出入之途在正東近􅀁居也海棠之西有二池央道鑿小渠引水經其􅀁居以入于東池渠之上古木􅂙天其先􅳊􅀁手植也東池之外又爲大池春夏泛溢可以舟楫池之北爲堂八楹以爲子弟講肄之􅀁又北爲堂六楹以舘賔客又北爲重屋六楹以藏累世之書此其園外之事又􅀁以爲成趣之本叔俊治家有法臨事有㫁凡公上之共必先之故呌􅅝之吏不及于門田園山林之務必擇子弟之賢僮僕之良者各受其成以治之故叢脞之政不嬰于懐子孫之教必隆禮厚幣聘良師友以訓之而日就月将之功又足以樂其志此外非􅀕祀賔客􅂟弔之事不得関􅀃日坐亭上與園丁野老論農圃之要除其榛􅁾脩其經術疏其流泉時其灌溉􅀚其華寔之生成閱隂陽之變化以􅊫夫消息盈虚之理而􅁯其世慮客至則觴咏嘯􅁔或風乎松竹之間或綸乎清池之上雲山烟水交錯乎指頋之間而園中之趣雖萬鍾之禄不與易也是故志定者不遷理逹者不惑事治則情逸心曠則境融雖崇臺累榭竒芳異物之􅀚名姬淑媛哀􅃶急管之奉􅁖足並語哉叔俊于是不可及矣其子棣請予記之為序其􅀃俾歸􅈓于亭之上楊氏忠莭祠記廬􅁜楊氏作忠莭祠者何昔金人犯宋沿江諸郡皆望風奔潰其先忠㐮公􅀖乂以建康通判􅀍執罵賊死韓侂胄専國擅兵文莭公萬里以寳謨閣學士家居聞之三日不食死故合而祀之也中祀建康通判贈通奉大夫存者何嘗以直抗蔡京為楊氏忠義開先也别祀廣東經畧使長孺吏部􅀰官孫孖同知崑山州事學文者何經畧仁聲義寔風槩天下在廣東三􅀊禄入七萬緍盡以代民輸丁租不持一錢去吏部闓通敏惠奉法循理爲時良臣崑山好徳尚義能以私錢復文莭故居割田百􅅕以建祠事皆克紹先烈者也天下楊氏皆祖漢太尉震廬􅁜之楊則自蜀徙盖太尉之孫唐國子􅀕酒膳從橲宗幸蜀而居眉者之後也自秦漢之後有天下卓然有三代之風者宋而已方其盛時歐陽文忠公以古文正天下之宗明王道之本及其衰也楊忠㐮胡忠簡以大義折敵國之氣􅁬中興之運當其亾也文丞相斬首燕市終三百年火徳之祚為萬世亾國之光而皆出于廬􅁜何其盛哉夫卓然可􅁇三代者宋也然夏之亾以桀之􅁀殷之亾以紂之虗又以湯武􅁇之冝其東征西怨無思不服惟周以弱亾與宋同然周之東遷亦有楊忠㐮胡忠簡乎周之亾亦有文丞相乎是能使周之亂亾犹有愧于宋者楊忠㐮胡忠簡文丞相也文丞相之死豈非有忠㐮文莭為之標準乎不然何又出于廬􅁜也忠㐮不可及己至若文莭年六十餘已懸車告老将二十載矣聞一􅁠臣擅國遂至餓死使在文丞相時當何如哉故廬􅁜若歐陽氏楊氏胡氏文氏又有身致乾祐之治若周文忠氏皆國家之元氣也而歐陽氏又廬􅁜之元氣乎崑山之子元正請記忠節祠故并及之嗚呼􅀚楊氏祠則廬多賢之故楊氏人物之盛宋三百年飬士之效亦可見已世好言士無益于國可乎元正亦楊氏之賢子孫也由太常奉祀為江西行省屬祠成于大徳七年記作于元統二年孝通廟記臨江新淦之上㳺有鎮曰峡江鎮有龍母祠曰孝通之廟古祠在今徳慶之悅城鎮峡江受􅁻贑南安諸水又豪啇大賈之􅀁㑹兩山如束水势湍悍􅀊􅂾壊舟楫必有嘗受神賜于嶺海之間而分祠於此以厭水患然不可攷矣凡舟楫上下水旱疾疫必禱焉至大二年鎮民唐文夀既倡義以敞其楼延祐改元王友忠復新其殿至元二年丙子之夏余扈從上都庐􅁜龍立忠始介臨江孔思濟及其郡人李源請志䴡牲之石夫作于始封之廟則有唐宋之碑今作于分祠必槩見神之始末俾乞靈者知􅀁本也按唐李景休趙令則碑神為秦温氏之媪漁于程溪淂巨卵藏于家生七龍五雄二雌從而豢之鱗角既具乃放之江媪日􅀱江次龍輙荐嘉魚于媪若致飬焉者始皇帝聞之召媪媪行中流龍挟舟而還媪死鄰人􅌾之程之左澨絳水之濵後有衰麻而杖􅂘諸墓且􅁖其廹潮汐也一夕大雷電遷之髙崗郷人祠之始此自唐天祐歴宋由永安郡夫人五命為崇靈濟福妃五龍子皆爵徹侯二龍女皆夫人額曰永濟改曰孝通大􅀚二年􅀁賜也夫物于天地莫神于龍有功于天地莫大于龍故其徳配乾為鱗虫之長出入變化不可測度媪非産龍徒以豢育之恩生則荐鱗食以飬之死則為衰麻以喪之遷宅兆以寕之學士大夫之子孫有􅀁不能而龍能之則知忠孝之大莭又莫􅂈于龍也龍之徳其至矣乎夫龍潜于􅀷淵之中待時而動􅀁以感雷電降雨澤鼓濤浪摧崖裂石皆龍之能事也而謂善覆舟溺人非龍之心也有違孝悖忠賊仁害義自絶于天者􅆘與之遭耳宋之時吾里有孫先生伯温者攝象州守部饟襄淮巢湖大風濤㡬覆舟先生朝服拜于舟龍若出荅拜水上風立止龍之佑助善人如此苟為善龍有弗佑之者乎由是觀之人之遇覆溺者非龍也人也福善祸􅁋天之道求福不囬人之道天人之際龍知之矣媪以慈致龍之􅍿廟食千五百餘載龍其可誣矣乎敢書以告乞靈者至元二年丙子六月甲辰記後二年已夘乃求重書􅈓之石集賢直學士朝列大夫掲傒斯志易州定興縣城隍廟記城隍神天下通祀或有天子封或無封其垣屋􅄊服一擬于王者雖有彊毅聰察之吏不敢廢水旱疾疫必禱焉易之定興廟于邑之西南隅制古而地僻大木蔽􅉻莓墻蘚砌黮然雲興肅焉風行􅂈者悸心入者易慮而禱亦輙應屋之撓壊缺漏以時葺之無􅀁改作而垣獨完于是邑人張伯祥䓁因翰林從事杜徳逺謁記勒石夫山川之蓄都邑之㑹民物之富精合氣融動必有神神者隂陽之至徳祸福之樞機也躰之則􅀿感之則通非有待于祠祀尸祝祠祀尸祝古人􅀁以事神非神之本也後世殚財力竭智慮黷法亂制求以事神神其享之乎惟兹廟侈不􅁜莭儉不失度庻㡬能以禮事神者冝􅀕享而民寕然記者􅀁以著始末叙因革今皆無􅀁于考獨記其事神之有禮也延佑三年夏四月癸酉翰林國史院編􅁱官掲傒斯記掲文安公文集􅃃之十
