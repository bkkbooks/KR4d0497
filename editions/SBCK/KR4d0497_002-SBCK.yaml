  text: 揭文安公全集卷之二
  hash: sha256:5b1c6ca5b3d38783c1cb89924c88acefa8d2475bcec74c72d25b841d8639d2f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_002-1a}
body:
  text: 揭曼碩傒斯著門生前進士爕理溥化校録獻張平章天歴肇􅀇朔坤輿集皇靈汴蔡既榛夷南海淪炎精圗書入天府􅀅帥功業成寳玉被親懿茅土列公卿庶􅀋􅁬休祥羣賢基太平明公紹鴻烈文采敵華聲岀入三十年愓然心靡寕論兵體安危􅄃轡思澄清矧宅股肱地夙夜在王庭名高徳益難位隆貴匪輕聖心誠􅀪格臣節美􅀾兢唐虞登䕫臯堯舜猶日升周召竭師保成康措王刑昌明願同濟援筆播芳馨題祝道士龍虎山先天􅀚圗聞説先天􅀚重重絶壁環鳥啼青澗裏花落白雲間稚子能長嘨居人識大還洞門無䖏認唯有水潺湲二貞詩関右有姬氏者父子皆早世姑趙婦張皆以年二十五而寡守節不嫁作二貞詩関右有姬氏父子早棄捐孀婦奉寡姑誓死各芳年膏沭誰復理羅􅃭委箧间辛苦亊蚕繅􅀕祀亦靡愆父母既莫奪媒妁徒空言鳬㕍安􅀁施幣玉視如烟寕与枯瘁没不為􅂬楽存婉婉桃李花春鳥何翩翩萬物各知時姑婦独纍然史舘独坐地夐天逾近風髙午尚寒虚庭松子落欹檻菊花乾撫卷俱千古􅁨時有萬端寂寥麟父茟才薄欲辞官周侍制致楽堂詩有堂渠渠在番之區維周寿母式燕以娱渠渠有堂在番之陽維周寿母式燕以康斯堂何有有蘭有芷垂佩橤蘂維周之子斯堂何有有蘭有蓀垂佩申申維周之孫曰烝曰嘗孔時且具維甘維㫖承于寿母母曰寕只福禄凝只升斯堂只我心平只母曰嘉只福禄遐只升斯堂只我心和只馬氏􅑐溪啚何䖏幽􅑐下復有清溪㵼霧氣散長林湍聲落平野石冝白烏憇樹想玄猨把誰獨此安居居人云姓馬山水啚幽人無世事髙卧謝浮名山崦晴時出溪流盡䖏行還聞有漁釣相問扣柴荆不埽门前路莓苔滿地生送道士薛玄卿㱕江東知君此去漸難招只在人間已廓寥市上有時逢賣薬山頭何䖏覓吹簫仙􅑐花落溪流滿􅄦谷雲開􅀣影遥未必故山安􅀮逸海天凉月夜萧蕭大明殿退朝和周待制巍巍道徳拱羲皇濟濟威儀陋漢光日射龍丈宫女扇風􅀓鷄舌侍臣香中宵景氣浮㕠阙下界􅂬謡動八􅂽詞舘小臣何以報皇圖聖寿与天長祖生詩浦城孝子身姓祖自憐性命如糞土生􅅻五􅀊遭乱離有母更􅀍官軍虜零丁二十八春秋母縱淂生何䖏求天地􅃼􅃼明月恨江山漠漠白雲愁忽淂母書驚母在㸔書未盡淚先流書云流落河南縣河南蹋遍無由見唐州境上忽相逢白髪蕭蕭霜滿面誰知喜極情轉悲傍人更問􅀄别時千生萬死到今日始為母子東南歸東南迢逓閩山路入门犹記階前􅀣居人傳説盡相㸔鷄􅁰提携竟朝暮祖生母子真可憐少壮離别老大還同時鄊井􅀍兵者幾人骨肉能生全願生母子長寿考四海升平永相保􅀌雌行為郾城莭婦作有鳥有鳥雌雄相追哺雛未飽鳴且飛雏未長雄乃􅂮子亦随朝朝暮暮唯􅀌雌長林廣野風日羙歩歩不敢離故棲燕雀揺颺差復池廽身側腦逓相欺誰憐􅀌雌心到死終不移更有許州郾城徐氏母一生􅈽恨守空閨燕氏救兄詩千金之子不死市椘人竟殺陶朱子生者可殺死可生千金為重骨肉􅁿誰謂平陽有燕氏傾家乃出而兄死弟再有兄兄見弟里闾驚嗟官吏喜鳴呼安淂天下之吏亷且循庶政如水無􅁈民送華尊師以天寿莭奉詔祀武當􅂕時􅃊漢祠神􅈐標椘甸羽人丹丘伯承詔馳嘉薦華渚曜玉虹條風舞􅀇燕長淮雨中㵼􅔬嶽雲間献涉旬歴峻阯梯􅆰荅弘願授簡香始升揭䖍帝如眷天清翼軫動地粛􅀇武見飛響逈更聞竒祥静逾絢是中有真侶蚤接諸方授胼胝􅀒畚鍤鑿翠蓄雷電金芝産齋房矞雲冠巖殿祈褫無􅀊年㑹莭方紛衍既恊時君降又楽明祀徧聖歴齊堪輿豊澤周㝢縣還帰报天子独往奚所羡真侶謂張真人有道行送馬雍古御史撫喻河西我皇属􅁨頋君子得安居孟春風且寒遺子以脩途四牡何翩翩廽首睇神都我懐正紆􅓹殽函忽巳踰積雪􅀍長巒萎者何時蘓巋彼蓮花峰上出浮雲衢白日皦以縣下視􅀂􅀇􅇕煙塵起西北原野無定株行者中顧懐居者念其廬黄河􅍅東流乃自崐崘渠四海豈不曠切􅀂䏎与膚親賢逺讒人古以致康娯君子誠多才乃用在馳驅秦隴阻関塞􅀊月浩已徂鞠躬盡明義足為世所模送周山人之遼東物變風已暄庭虚雪犹在毎與君子違偏驚􅀊年改名山先夢到靈薬隨方采明日望行人雲槎隔遼海李宫人琵琶引鄠縣亢主簿言有李宮人者善琵琶至元十九年以良家子入宫得幸上比之昭君至大中入事㒷聖宫比以足疾乃得賜帰侍母給内俸如故因亢且乞詩扵余遂作李宫人琵琶引其辞曰􅃼􅃼青􅊘春風裏􅀊􅀊春凨吹不起傳得琵琶馬上声古今只有王与李李氏昔在至元中少小辞家來入宮一見世皇称藝絶珠􅁔翠舞忽如􅆰君王豈為紅顔惜自是衆人弹不得玉觴未㪯楽乍停一曲便􅁴千金值廣寒殿裏月流輝太液池頭花􅀤時舊曲半存犹觧譜新声萬変搃相宜三十六年如一日長得君王賜顔色形容漸改病相㝷独抱琵琶􅆰歎息㒷聖宫中爱更􅀷承㤙始得遂㱕心時時尚被宫中召強理琵琶􅃶上音琵琶轉調声轉澁堂上慈親還佇立囬㸔舊賜滿床頭落花飛絮春風急題上都崇真宫陳真人屋壁李斈士􅀁􅀞墨竹走茟作玉京滦水上仙舘白雲郷虚壁数竿竹清風生滿堂微吟弄寒影静坐佇幽香有客仍無事澹然方两忘集賢大斈士趙囯公王開府慶八十􅀿制昭代雍熈日詞林賦頌時紫宸丹詔出甲第五雲垂􅁉廟青宫裏王公玉樹枝朝趋陪綺甪夕侍接龍䕫際㑹真難及飛騰巳在兹暴公􅀄繍斧方叔更藩維霜簡驚風裁天官粛羽儀還迎代邸入竟􅀍漢文知位望躋三少權衡俯百司每蒙天黼黻直許囯蓍亀鳯龡廣寒殿龍舟太液池羽觴春侍宴玉座夜覌碁德業前賢継辞華後進推髙情睎廣受餘事擬徴珪全趙山河富瀛洲日月遲九􅀸看綵服八袠表厖眉皇覧逢􅀄度殊㤙介寿祺黄封中使出玉食尚饔移囯老陳嘉􅂟李韓公作序羣工播盛辞礼非前代有施及老臣宜福禄何人並忠貞百􅀊期聖心誠念舊政用作臣規陵陽牟景陽以名祖父之子孫􅀒竒材劲氣而與世抺摋自合州教授入􅁺翰林一語不合竟棄去不顧以詩為别竒璞刖之媒娥眉妬之具悄悄君子心皇皇百王度髙風集大木日夜如吼怒不畏枝葉殘但恐本根蠧曉登荣䑓上天地一何巨白日光未􅄍羣星爛無数仙人五雲車縹緲玉清路區區隂陽忠可望那可遇忽聞金銮客􅀊暮仍南去不得与之同頓足毛髪􅆆結羊腸詞正月十六好風光京師女児結羊賜焚香再拜礼神畢剪􅁓九道尺許長撚成对綰双双結心有􅀁祈口難説為輪為鐙恒苦多忽作羊腸心自别鄰家女児聞㧾至未辨吉凶憂且畏湏臾結罷起送神滿座􅌚忻􅇎顦顇但願年年逢此日児結羊腸神降吉劉承㫖父大司徒邢囯公慶九十應制聖主尊賢遂及親邢公盛事更無倫身躋九袠曈方碧児過耆年鬢未銀鳩杖乍頒寕畏噎龍章洊拜欲忘身上公建土山河富光禄分壺雨露頻析木天清雲五色梁園花􅀤月重輪錫宴梁氏園三宫寵錫驚殊数四座称觴半老臣瑞錦斕斒迎化日兼金條脱照芳春素􅃄冉冉晴熏上白雪冷冷艶曲新先世勲庸歸琬琰名家父子映冠紳三槐已驗移居日五栁翻如􅀉傲人涧底桃花曽阅世枕中鴻宝自頥神詞臣􅁒継荘生作才薄何堪論大椿小􅀌山次韵小􅀌山前一廽盻蒼然始識孤山面隔江叠嶂開翠屏絶壁浮雲飄素練憶昔􅀄䝉翰林聘􅋈棹􅊥竒不知􅌒扪蘿陟級至絶頂目極神開氣為変大江東滙彭蠡来晝夜崩騰犇海甸笳鼓遥闻日月動㠶檣忽度乾坤轉舟人不識造物竒但趣急趂南風便蚤悟微官七載縛㡳用區區厭貧賤􅀷􅆤冷壁守編摩何異􅀭雄困雕篆重來勝地􅀊云暮短景催人疾於箭天昏一火明山半石底犹疑有雷電彭􅀰磯下寒浪湧坐客正説龍君傳人生可喜還可憐世亊堪違不堪恋明朝匡廬復入眼雖有此境何由羡武城先生独好亊名山每恨逰难偏豊城客子無一錢但當作詩乞如􅂅贈别曽編脩歸廬陵􅌾學士兄孟冬凉風厲謁告歸廬陵阿兄在九原􅀊暮豈遑寕兄昔事武皇海内希英声意氣動人主文采何從横時事一朝異長揖去躬耕令弟紹芳猷荣足在承明如何奄忽間南北隔死生方舟􅀤京囯日落烟霧青萬感縁中來愓焉如有懲羈臣恋魏闕一夕䰟九升君子㤙義重况此骨􅁏情情􅀷不可忘悠悠道路長山川日夕改我行殊未夹稍出燕兾都巳􅍱齊魯疆髙天圍四野悵望但􅃼􅃼道傍多古墳茔域逓相當􅂽草吹北風日夕下牛羊不知何代人扵此閲㒷亡自古既有死誰獨免摧傷死者雖􅀁同私懐詎能巳􅂗路犹感傷况我兄與弟世俗日衰謝常惧莫能起生者忽若遺誰復哀其死念昔賢哲人一一去為􅄦詩書􅂢篋笥采采當路子掞藻厠明庭幸與君子同矧在弱冠年巳􅀗承其風家本聖門後孝友世􅀁􅂭何意手足親一别曠音容及我南歸日舟揖復相從皦皦寒日高冥冥厲征鴻落㠶滄江際􅄅然忽西東努力慎􅀁託無為謾劳躬􅀉題臨川西磵范氏寓居蟾塘塘更西幽澗搃堪題流水花間住􅀌禽竹裏啼石稜苔自合山徑樹相齊乆客成真隱故園􅀿已迷㝷舍弟􅀅至東牢宿野店􅀊暮尋我弟山行两舍餘入雲攀磴道落日及村墟茅店溪􅁁冷松林石上踈如逢武陵客風景未應殊贈王􅀰王􅀰楚狂士意氣飛秋霜讀書一萬􅃃下筆数千行冨貴視浮雲况肯矜文章十五恥閭里掉臂辞故鄉夜宿東海月朝買西州航瞋目王公前結客少年塲一飲或一石一醉或一觴寕揖屠狗人不與俗士當千金不易􅀏􅀊暮单衣裳阮籍在窮途英声連四方鵉鵠有時鎩反愧燕雀翔世無劇孟交不及青楼倡燕趙如花人翠􅃑黄金璫不識豪俊士􅆰媚癡與狂王􅀰逺過我坐我枯藜床終夕無酒飲撫髀􅁔慨慷平明别我去極目􅆰􅃼􅃼沈逸人東􅀚招飲山舘野舘青山下晴軒積雨餘招㝷􅂪逺客寂寞愧間居􅆰翠沾盃冷殘雲度谷虚從兹結朋好隨䖏問何如􅀞鴨春草細還生春雏飬漸成茸茸毛色起應觧自呼名題聶氏陶軒開軒南山下日对南山雲青松俯前楹秋菊被中園翳翳脩竹林清泉出其間􅀊晏農務息衘盃楽餘閒時從隣曲㳺共称稼穡难逹人貴知已俗士多􅀁牽以兹謝簮􅌧委心此南軒列植既敷荣佳興日以繁讀書数児子餘事焉足言送涂雲章訪舊武昌卻入京師垂雲厲驚風萬重摩高圓蟠泥鼓巨浪豈願九重渊毛生入楚庭頴脱俄頃間粲粲一公子長嘨起丘樊朝辞豫章䑓暮􅂈匡廬山大㠶割鸚鵡極目􅆰波瀾黄鵠錦􅂁仙吹笙紫霞端相頋一咲粲青春滿南天黄金築髙䑓更斍郭隗賢聨翩楽劇軰相逐入幽燕平明九門開劍佩踰五千豈無一字薦傾倒平生言東風杏華開待我薊門前歸舟汀洲春草徧風雨独歸時大舸中流下青山两岸移鴉啼木􅀰廟人􅀕水神祠波浪争掀舞艱難乆自知小􅀌山暁􅀤和蔡思敬䪨日落霞明錦浪翻厓傾石峭白雲閒乾坤上下雄孤柱巴蜀東南壮此関神物夜移風動地仙舟曉度月漫山囬瞻絶頂登臨䖏空翠冥濛杳靄間大信晚泊呈舟中諸公千家楊桞江當門東梁西梁两㟁蹲連檣大艦集日昏樅金伐鼓海上聞小江更出采石後前人立功後人守大信花采石酒陌上相逢莫廽首白楊河㸔月白楊河上㸔眀月昔人曽見今人别茅屋数家河上村化作三山白銀闕波平風静棹􅁔来萬頃冲融鏡面開今夜江南憶逰子空瞻雲漢上昭囬􅃼􅃼萬里燕齊路北斗從横㤗階曙黄河東逝月西流眀日南風􅂈洪去􅁔風䑓和李提㪯韻萬乗東㱕火徳開漢皇曽此宴髙䑓沛中父老謳􅁔入海内英雄倒載囬湯沭空餘清泗在風雲犹似翠華来穹碑立断蒼􅃄上静閲人間幾刼􅁅題􅃊􅁜獨釣啚何亊玄纁入里閭羊裘暫脫就安車空令太史驚同寝犹把狂奴視報書一出􅂓為天子重諸公莫道故人踈朝廷自足中興士且放桐江著老􅈄題鼯䑕食􅀲啚種􅀲中園予亦勤止􅀲長而寔汝則殘止雖則殘止予敢汝􅄷天寔汝生予􅀅何􅄷汝食之甘既肆既閑寔之食矣無傷予根根存而微唯予之穷根盛而寔惟乃之功坐信州仙源􅀚徐尊師乃玄教大宗師張開府之弟子也玄霜搗罷世都遺􅁑􅋰蕉衫太古姿天上真人開府日山中仙子閉門時空林雨過金芝老深谷雲寒白鶴飢萬里馳書為永别盧敖何䖏定相期送蔡思敬還豫章有懐遼陽李提㪯来日能同去不同独携别恨向秋風眼㸔乱葉渾無㝎心与浮雲併一空黄独山中歸自斸玉梅溪上夢先通莫嗤留滯京華者更有遼陽送断鴻孔林啚詩并序集賢待制周侯能脩礼于孔林侍讀斈士商公啚之史官揭傒斯詩詠之峩峩尼山蔽于魯􅀖篤生聖人維民之綱尼山之下有洙有泗有蔚孔林在泗之涘維彼聖人教之誘之凡厥有氏則而傚之維彼聖人覆之載之凡厥有民敬而爱之既誦其言亦􅀍其服孰秣其馬于林之側既誦其言亦􅂂其武孰秣其馬于林之下六轡既同周侯之東荐之侑之聖人之宫其音洋洋其趋蹌蹌其臨皇皇聖人􅁢􅆇商氏啚之式昭其敬載瞻載思罔不由聖寿櫟山詩一首為英真人生朝作寿檪山其里山名峨峨寿檪山􅐓洞雲錦溪百里空翠合諸峰南斗齊卧斮月窟桂坐聴槫桑鷄臨深測地軸升髙􅈳天倪隂厓覆瓊蘂陽岡敷紫荑縣泉聒空響飛􅀣􅇒風嘶側畏猨鳥堕幽恐渙人迷兹山不自髙与人作丹梯赤松棲其東王􅔬憩其西浮丘前捧擁安期後提携神君領天宫出入黄金閨梅花照羽袂天書函紫泥㱕期指松檪千􅀊犹未稽飡和飬靈源伏智埽􅂽蹊木公与金丹大咲彭鏗低寿王副樞七袠懸車两府稀五朝遺老百僚師寒梅㸔足行唫䖏舊史評來坐歎時身退已􅀅心共逺名高轉斍世堪遺且陪嘉客霑春酒政待武公􅁔抑詩李􅀅軍􅁔一首送李天民赴邵武軍口廵檢李􅀅軍材且武儒冠換得兠鍪去身疑南極老人星氣食隂山雪毛虎雕弧白馬金僕姑天地昂昂此丈天五十方爲求盗使人生何用苦詩書􅀉言卲武諸官長不是尋常一腐儒時中書以吏部儒選貟多有十年不得調者奏以為閩廣諸道廵撿然多非其人而天民式称是選老人星其常自喻題桃源啚并序江左飛虎山南十里有桃源者劉王二尊師所辟也臨江范亨文為之記余為賦五言詩十七韵桃源非一䖏龍虎畵難同内外関踰鐡高低石作樷黄旛青劍北紫盖白雲東蟾形當霄逈蛾眉抱月弓六峯名千重藏曲折四面削虚空地户吟風黒天池浴日紅雪霜翻濺瀑雷雨㵼崩洪暗識猨啼逺晴聞鳥語工危龕三井秘絶澗九橋通江合仙巗怒山連􅀑谷雄刘王開闢後秦晋有無中時見㸔桃侣頻逢採藥翁丹台寒漠漠琳宇氣熊熊濟勝非無具縁源恐莫穷烟霞俄変㓕草􅀣杳蘢葱四序何勞誌羣疑倘擊䝉誰言武􅁜近十里上清宮送人帰豫章積雨霽徂夏故人今日帰手持毛生檄身着萊公衣玉􅀣桂秋月丹荑掦暁暉東湖徐孺子􅀿恠乆相違送王㽞守宣慰荆湖舟楫連檣出薊丘􅃓刀千􅀐入荆州歌翻郢雪寒暄変㤙逐岷波日夜流雲雨暝連神女宅山川晴徺仲宣楼豈無賢士堪招隐􅀿向鹿門深䖏求題張尊師畵晨登翠㣲天氣穆清白雲覆谷飛露垂纓孤猨逺響衆鳥嚶鳴牽蘿渉澗穿石度陉半􅑐華氣萬􅊤松声神宫漠漠靈戸熒熒投隂迹影叩􅄫求譍素髪老人咲而相迎弗問弗承悟彼長生玄玉流液瑶草結英浩浩犇泉出與川平宛彼下人望我􅑐扃送播州楊宣慰帰藩祗奉綸言出夜􅀰恭陳壌奠入明光嘉名宣賜黄麾外大宴㤙陪玉座傍天仗影移低日月宫懸声動下鵉皇三呼拜舞君王德永共藩臣守四方㕠旌遥指洞庭西千乗聫翩度五溪龍乕親軍兼使莭犬狼諸䝤入封提光昭廟祏㤙波逺風動藩維礼秩躋北望五雲髙魏闕亦知􅁨頋在黔􅀺􅀉題括蒼王氏東野二亭畊雨時雨布嘉澤羣物盡欣豫晨㒷集童僕東野􅀙􅀁務鴶鵴􅀿􅀱鳴􅕢黄翔髙􅀣衆草萋以出流潦􅀍行路黽勉勤微躬寕􅂧當世慮羲農不我待沮溺諧􅀁慕食力随齊民常恐負空素眷言狗兹道卒此言􅀊莫心逺窮居豈余志無营得長間醫翳三􅅕宅傾樂彼南山灌木何蒼蒼雲烏相徃還已絶嬰世念况接仁里􅂬但􅂅􅁰稌登春酒恒慰顔羲和緩其轡萬物悠然安寒夜作踈星凍霜􅆰流月􅊜林薄虚館人不眠時聞一葉落送唐尊師祠武當龍衮分香下絳霄羽衣承詔出清朝星臨翼軫南垂濶神降虚危北極遥金殿壓雲開紫氣玉䑓和月合笙䔥蕃􅁵更為吾皇祝下國時豊雨露饒送􅉟尊師㱕廬山香爐峰色紫生烟一入京華路杳然雲碓秋聞舂藥水雨犁春臥種芝田書慿海鶴来時􅀉劍自潭蛟去後懸忽报㱕期驚倦容独淹㣲禄負中年贈淳貞子蕩蕩白玉京超超淳貞子十一求神仙服事丘與李嵩洛三十載結茅白雲裏飡是􅊙谷霞飲是上池水􅄦神莫能識百念吹不起一朝忽騰化徑去不可遮飛駟服五龍角巾揺三花朝􅀤扶桑囯暮􅀫河漢槎朝食千􅀊桃暮食五色爪長揖青牛君髙􅁔渡流沙還憩金􅁜邸調笑許史家日食五侯鯖安淂厭胡麻春風長安陌落日邯郸道迎人上青天送人入秋草竦身八極外天地忽亦老􅀉謝區中人全真以為宝􅀌松萹夀王大斈士大地凍􅁒裂􅀌松髙穆清横睨㤗華嵩俯察蓬與瀛天風四浩蕩身與元氣并根深本自固霜雪空峥嶸白晝甘露䧏半夜朝陽舟飛枝䕃扶桑劲氣摩欃搶羣鳯􅀁託命百鳥徒嘲鳴㝠􅁳廣寒宫丹桂亦虚生八萬四千人何時月常盈維此天一柱千􅀊􅀁飬成自非堯舜君工垂焉敢徴漢武作建章千門照西京掄材當此時餘柯了棟楹天地既有此未必終無情蒼蒼􅀊寒心永世仰堅貞過何淂之先生故居五首可憐古井門外依旧鍾楼屋西何䖏髙唫痛飲黄花翠竹都迷先生有詩云一井當門凍寒光照四隣又我住東街比鐘楼在屋西心事巣由以上文章陶阮之間千古髙墳保下白雲明月青山軋軋機声日莫依依楊桞春柔厀下中􅀰小女曽聴唱我髙郵先生常喜余髙郵城詩相見即呼高郵城来每相对酒酣則朗誦數遍頭上鳥紗分贈篋中縞楮相醻不道别時長别誰知愁是真愁延祐五年冬十月余南㱕以中材一叚見贈予以白楮􅀍報之别時殊黯然也且手書其三代召字授予若有􅀁属然也屋上青天未老門前白日常新他日咎䕫稷禼安知不是斯人送譚仲章㱕長沙君家雲陽下忽向雲陽㱕行路有南北㸔山無是非三湘廽鴈盡􅀌劍白虹飛亦欲投簮去􅀙君采蕨􅅔我我亭詩并序殷仲堪荅桓温曰我与我周旋久寕作我冝春黄元瑜取以名其亭曰我我為賦詩一首我㳺于􅀽于龍之干有渊閑閑有環言言有構桓桓維集之安我居我䖏我笑我語有翼其􅀁而敢予侮我植孔嘉我構孔華曽莫之迎而莫我多彼馳者子亦孔劳矣既我覯矣亦莫我逑矣嗟殷氏之老犹弗桓是友我不我友􅀅誰帰咎温温其龢浏浏其清藹藹其芳煥煥其明嗟維古之人尚􅂉予聼送鄭司獄㱕衢州却赴調京師壮年执㦸事明君一日上書天下聞不恨棲遲百僚底犹堪激烈萬人羣爛柯山逺廽􅀌棹析木天清望五雲盡􅀃于公有隂德掉頭相别大江濆題山水野艇来無数山橋渡有三寒雲依古寺落木帶羸驂廽首重重變幽㝷䖏䖏堪平生㕠眼力江北􅂧江南題御馬圖朱纓金絡轡黄帕錦鞍韉神閑意更􅇣􅀄下赤墀前題山暉啚爲刘尊師作􅁜岑毓神秀草木咸光晶毎覧靈景異變態如有情内掩乍如􅇈飄浮忽相萦熊熊轉􅆰曲奕奕連増城中有幽人居燕坐朝玉京穷隂亦朝徹無月恒夜明碧桃千􅀊花金芝四時荣猶疑地愛寳随物弄華英題臨江同知问流民亊蹟江北流民七十口三十餘年在江表朋凶結􅁖四百餘白刃差差歴村保崩騰所向如投􅆰白晝攫金都市中頃由南昌入豊邑反賂守者為先容長官坐堂㓂入室妻子莫􅏉况金帛豈無鄊民敢相敵長官一揮翻辟易臨江􅏗守亷且武手縛其渠散其伍豈惟鄊民淂安堵鄰境聞之皆鼓舞其渠在獄伍四歸大府上功民俗熈乃知一念敬厥職萬亊至難皆可爲人民社稷我所有安得坐視如鷄狗人在雞狗猶爱之民社豈在雞狗後請君㸔取臨江守􅀉題朱氏真村堂􅀷居魏亭北悃愊自無華風俗似太古生涯如小家飲醇猶恐過衣帛向疑奢相与鄰人異詩書有五車送人􅀙軍妙年好文仍好武一旦􅀙軍氣如虎弯􅃓已作滿月圖㧞劍更逐廽風舞悲笳四起旌斾愁蒼山偃蹇黄雲浮陣前手繋降王􅖪馬上仍懸猛􅀅頭復􅄷義大身命小順天􅀅軍古来少一􅀾功成六合清不用黄金印如斗題渊明歸去来啚清江皮使君治南恩有恵政一日自免去而歸老焉廬􅁜王寔􅀄賞其髙莭以渊明歸去来啚求中朝學士大夫賦詩還以為夀僕用其意賦五言一首吏事乆見牽山澤曠逰盤兹辰理還策乃得􅀙􅀁歡悠悠川􅂗􅒯忽已造郊園風景一不異鄰曲皆舊觀童稚識人情犇走向我前荒草雖誕漫松菊了不干睠焉循初服常恐負昔言入室多羙酒步庭嘉􅀣繁曠然心神舒誰謂世路難出䖏各有道既倦當知還方春農事興念之每忘餐貴賤豈不殊樂此農圃安堯舜垂衣裳巢許箕潁間漢祖除暴秦黄綺在商顔彼皆贒逹士今古胡不然永與簪組辞婆娑養餘年昔聞陶彭澤今見皮南恩千􅀊仰髙軌兹圖良足歎送李都事赴湖廣省幕堂堂李通甫起家掌􅀖憲直氣横九秋神明激雷電再登蘭臺上愛􅀦心靡轉時當至治末有位日兢戰崩騰五華山鑿翠起臺殿執筆佐御史力諫明且辨斧鑕已在前獨立目不眴駸㝷􅀦多故灾異周八埏君復贊宣政赤手握銓選守法踰天官反得官長怨我皇奮江漢撥亂啟天眷乾坤再開闢日月重昭絢磊落收羣材疏戚共登薦君名一朝起亦作丞相掾丹心益傾竭婉畫勒替献好惡古難同禍福巧相禪天子憂南紀藩宣必時彥下逮曹屬微簡選亦精練君得南省佐聞者盡驚羨傴僂辭闕庭飄揺出畿甸餞送盈路衢懇􅍁陳志願去年天下旱窮蹙無貴賤賑䘏當及時本末須并見方春農事興不廢乃爲善又聞南中賊憑陵及州縣􅀺獠本吾民撫綏在方面恩信足以懷逼迫使生變況我聖天子轍迹昔所徧勗哉籌策良無使空蹂踐京城雨初過草􅀣鬰蔥蒨喬木多蚤鸎髙堂有新燕煩辭君勿誚君歌我其抃
