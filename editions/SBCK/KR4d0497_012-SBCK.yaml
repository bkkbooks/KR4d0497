body:
  text: 掲曼一碩傒斯著門生前進士爕理􅄎化校録碑大元勅賜脩堰碑江水出蜀西南徼外東至于岷山而禹導之秦昭王時蜀太守李氷鑿􅄐堆分其江以潅川蜀川蜀以饒自秦歴千数百年􅀁􅂈衝薄蕩嚙大為民害有司􅀊治隄防百三十三􅀁役兵民多者萬餘人少者千人其下犹􅂾百人人七十日不及七十日雖事治不淂休息不役者三日緡冨屈于貲貧屈于力上下交病㑹其費􅀊不下七萬緡毫髮出于民十九藏于吏㮣之出入不足以更費至今上皇帝即位之明年僉四川亷訪司事吉當普廵行周視淂要害之䖏三十有二餘悉罷之且召灌州判官張弘計曰若甃之石則役可罷民可蘓􅁦可除胡惮而莫之爲弘曰公慮及此此生民之福國家之幸萬世之利也弘請出私錢試以小堰堰成水􅁀漲堰不動乃具文書㑹行省及􅂪古軍七翼之長郡縣守宰郷遂之老各陳其便宜皆曰便復禱祠与神約昔鑿􅄐堆以冨川蜀建萬世之利神之功也今水失其道民失其利吏乗其􅁦若此而神弗之救是神之惠弗終也神克相予予治神弗予相請與神􅀙事卜之吉于是徴工􅀤徒以至元改元十有一月朔肇事于都江堰都江即禹鑿之處分水之源也塩井関限其西北水西関據其西南江南北皆東行北舊無江氷鑿以辟沬水之害中為都江堰少東為大小釣魚又東跨二江為石門以莭北江之水又東為利民䑓䑓之東南為侍􅀰楊栁三堰其水自􅄐堆分流入于南江南江東至鹿角又東至金馬口又東􅂈大安橋入于成都俗称大皂江江之正源也北江少東為虎頭山為閗鳮䑓䑓有水則尺為之畫凡十有一水及其九其民喜􅂈則􅁨沒其則則困乃書􅀷淘灘低作堰六字其傍為治水之法皆氷􅀁為也又東為􅄐堆又東􅂈􅇒虗歩雲二橋又東至三石洞釃為二渠其一自上馬􅀐東流􅂈郫入于成都古謂之内江今府江是也其一自三石洞北流􅂈将軍橋又北􅂈四石洞折而東流􅂈新繁入于成都古謂之外江此氷􅀁穿二江也南江自利民䑓有支流東南出萬工堰又東為駱駝又東為碓口繞青城而東鹿角之北涯有渠曰馬㶚東流至成都入于南江渠東行二十餘里水决其南涯四十有九􅀊疲民力以塞之乃自北涯鑿二渠與楊栁渠合東行􅂾十里復與馬㶚渠㑹而渠始安流自金馬口之西鑿二渠合金馬渠東南入于新津江罷藍綻黄水千金白水新興至三利十二堰北江三石洞之東為外􅀿顔上五斗諸堰外􅀿顔上之水皆東北流入外江五斗之水入于馬㶚渠皆内江之支流也外江東至崇寕亦為萬工堰堰之支流自北而東為三十六洞􅂈清白堰東入彭漢之間而清白堰水潰其南涯延袤三里餘有司因潰以為堰堰輙壊乃疏其北涯舊渠直流而東罷其堰及三十六洞之役嘉㝎之青神有堰曰鴻化則授成其長吏使底其功􅀿期而畢若成都之九里堤崇寕之萬工堰彭之㻚口豊潤千江石洞濟民羅江馬脚諸堰工未及施而詔亦責長吏及農􅂩為之諸堰都江及利民􅄗之役􅆟大侍􅀰楊栁外􅀿顔上五斗次之鹿角萬工駱駝碓口三利又次之而都江又居大江中流故以鉄萬六千斤鋳為大亀貫以鉄柱而鎮其源以捍其浮槎然後即工諸堰皆甃以山石範鉄以関其中取桐寔之油刀麻為絲和石之􅁅以苴罅漏禦水潦岸善崩者宻築江石以䕶之上植楊栁傍種蔓荆櫛比鱗次頼以為固盖以數百萬計􅀁至或疏舊渠而導其流以莭民力或鑿新渠以殺其势以益民用遇水之㑹則為石門以時啟閉而泄蓄之凡智力􅀁及無不為也􅀄郡縣及兵家共掌都江之政延祐七年其兵官奏請獨任郡縣乃以其民分治下流諸堰廣其増脩而大其役民苦之至是復合焉常􅀊􅀗水之用僅􅂾月堰輙壊今雖縁渠􅀁置碓磑紡績之䖏以千萬計四時流轉而無穷其始至都江水深廣莫可測忽有大洲湧出其西南方可􅂾里人淂用事其間入山伐石崩石已滿随取而足􅀁向皆然蜀故多雨自􅀄役至于工畢無雨雪故力省而功倍而民不知劳若有相之者亦其忠誠􅀁感如此致使天子賜酒之使相望于道省􅄗􅂆功之檄不絶于吏􅀁溉六洲十二縣之民皆􅁔舞焉而下至郡縣上至藩部􅁖其害已且疾且怨或决三洞之水以潅其次或毁都江之石以害其成撓之百端不㧞益固甫越五月大功告成百一恒費民永休享古未有也而吉當普㑹以監察御史召省􅄗上其功詔臣傒斯記之于碑臣聞水先五行食首八政九畴􅀁序其次可覌矣夫水者衣食之原也然􅀁以爲利亦􅀁以爲害在善導之而已禹平水土犹己溺之后稷播種犹已飢之萬世有􅁛焉是故爲政不夲于農不先于水是爲不知務不知務是謂􅁳行之臣李氷一鑿􅄐堆民受其賜􅁻當普才大而徳敏􅁨深而知逺不枉其道不屈其志臨难􅁯身爲國􅁯家安于命而勇于義而知􅀁先務故事可立而功可建其在四川若請罷塩運使司正塩井之法以去其奸利置安撫使撫四方流寓之民使安其耕鑿及居􅄗端知無不言言無不合誠國之宝也判官張弘殚智竭慮終始克相其成雖百折而不悔亦今之賢有司乎是役也石工金工皆七百人木工二百五十人徒三千九百人而􅂪古軍居其二千粮為石千有竒石之材取于山者百萬有竒石之􅁅以斥計六萬有竒油半之鉄六萬五千麻五千最其工之直物之賈以緡計四萬九千有竒皆出于民之庸積而在官者餘廿萬一千八百緡責灌守以貸于民􅀊取其息以偹􅀕祀若淘滩􅁱堰之共仍蠲潅之兵民常􅀁徭役以専其􅅯事嗚呼後之涖此􅁟者尚永鍳于兹勿怠其政􅈥其事以為民病以為國家之􅁨臣拜手稽首而作頌曰鑿􅄐堆兮江势分川蜀饒兮民􅁯為秦秦可􅁯兮國有人何後世兮􅁯吾民􅀊伐竹兮歴岩㠂載乱石兮堰江涛堰無功􅀆民孔劳民孔劳兮天不吊龍伯怒兮江妃咲豈江之為患兮惟人自厚龍莭兮繡衣煒皇皇兮不我遺召龍工兮汝為汝詎知兮予􅀁期江㴞滔兮廣且深鼋鼉出沒兮蛟龍晝吟下不可以極兮上若有臨洲澶漫兮江之心吾伐石兮石自摧吾召民兮民子來堰既作兮民無患菑此豈予之功兮神汝哀神洋洋兮功既畢堰永固矣民安佚川蜀饒兮國之寔千萬年兮功不失惟帝之力兮臣之職重建濟州㑹源牐碑皇帝元年夏六月都水丞張侯改作濟州㑹源牐成明年春二月具功状遣其属孟思敬至京師請文勒石惟我元受命㝎􅂦幽薊􅀴國体民綏和四海辨方物以定貢賦穿河渠以􅇣􅈇度乃改任城縣為濟州以臨齊魯之交據燕吴之衝道汶泗以㑹其源置牐以分其流西北至安民入于新河埭于臨清地降九十尺為牐十六以達于永濟渠南至沽頭地䧏百十有六尺為牐十又南入于河北至奉符為牐一以節泗水東北至于兖州為牐一以節汶水而㑹源之牐制于其中􅀊益乆政日弛弊日滋􅈇度用弗時先皇帝以為憂延祐六年冬詔以侯兮治東阿始脩復舊政誕布新令􅃊􅁀横之禁杜奸利之門南疏北導靡􅀁寕䖏明年冬以當代請去弗許行視濟牐峻怒狼悍􅀊数壞舟楫􅁟崩石泐岌不可持乃伐石區里之山轉木淮海之濵度功即工大改作焉明年皇帝建元至治三月甲戌朔侯朝至于河上率徒相冝導水東行堨其下上而竭其中以儲衆材徹故牐夷􅉾泓徙其南二十尺降七尺以爲基下錯植巨栗如列星貫以長松实以白石㮣視其地無有􅀁罅漏衡五十尺縦百六十尺八分其縦四爲門縦孫其南之三北之一以敵水之奔突震蕩五分其衡二爲門容折其三以爲两墉四分其容去其一以爲門崇亷其中而翼其外以附于防参兮門縱間于北之二以爲門中夹􅀣石鑿以納懸板五兮門崇去其一以爲鑿崇翼之外更爲石防以禦水之洄洑衝薄縦皆二百三十尺爰􅅣爰甃犬牙相入苴以白麻固以白膠磨礲剷磢関以劲鉄厓削砥平混如天成冠以飛梁􅅯如卧虹越六月十有三日乙夘訖功大㑹群属宴于河上以落之工徒咸在旄􅌼四集酒舉楽作揮鍤决堨艤棹魚貫水平舟行伐鼓􅂬呼進退間暇其称侯之功頌侯之徳雷動雲合且拜曰聖天子継志述事不易任以成厥功惟億萬年享天之休是役也以工計石工百六十人木工十人金工五人土工五人徒千四百二十人以材計木萬一百四十有一石五千一百二十有八甓二億一千二百有五十以斤計鉄二萬五千五百麻二千三百石之􅁅三億三萬三百三十有四以石計粟十二百有五十視他牐三之視舊倍之其出于縣官者鉄若麻木十之七石五之一粟五之三餘一以便冝調度不以煩民此其大較也􅀄侯至之明年凡河之隘者辟之壅者滌之决者塞之㧞其藻荇使舟無􅀁底禁其芻牧使防有􅀁固􅂭其防而廣其阯修其石之岩陁穿漏者築其壌之疏􅁖者延袤贏七百里防之外増為長隄以閼􅁀漲而河以安流潜為石竇以納積潦而瀕河三郡之田民皆淂耕種又募民采馬藺之寔種之新河两涯以錮其潰沙北自臨清南至彭城東至于陪尾絶者通之欎者斯之為杠九十有八為梁五十有八而挽舟之道無不夷矣乃建分司及㑹源石佛師荘三牐之署以􅃊官守􅀣河泊龍君祠八故都水少監馬之真兵部尚書李奥魯赤中書断事官􅋉速祠三以迎休報劳凡河之􅀁經命藏水以待暍者種􅀣以待休者遇流莩則男女異􅁙之餓者為粥以食之死而藏飢而活者􅂾千人是以上知其忠下信其令用克果于兹役也侯亦勤且能矣然古者三載考績三考黜陟幽明故人才淂以自見方世祖皇帝時天清地寕群賢滿朝少監馬公之徒以陳力載劳垂功無穷者慮之逺擇之審任之専也向使侯竟代去雖懐甚忠極智無能䆒于其聀是亦侯􅀁遇也惟兹牐地最要役最大馬氏之後侯之功為最盛故詳于是碑以告後之人侯名仁仲河南人辭曰昔在至元惟忠武王自南還帰請開河渠自魯渉齊以逹京師河渠既成四海率徔萬世是資朝颿夕檣垂四十年孰慢而􅈥翼翼張矦受命仁宗號令風馳徴功􅀤徒既滌既脩濟牐攸基先鳮而興既星而休觸冐炎曦疾者薬之死者槥之奚有渇飢拊循劳徕信賞必罰勿亟勿遅十旬之間遹潰于成智㒺或遺洋洋河流中有行舟若遵大逵舳艫相衘㒺敢後先亦㒺敢稽賢王才侯自北自南頋盻嗟咨曰惟京師為天下本本􅂭則固惟帝世祖既有南􅁟河渠是務四方之供于千萬里如出跬歩聖繼明承命官選材惟侯之遇昔者舟行日不􅂾里今以百􅂾昔者舟行􅀊不􅂾萬今以億慮惟公乃明惟勇乃成惟亷則怒汶泗之㑹有截其牐有菀其􅀣功在國家為在天下永世是度天華萬夀宫碑唐貞元中吉州刺史閻矦隐于城東十五里天嶽山之夫容峯後􅀓以為仙云其山世為閻氏業子孫世為郡人山高廣可十里俯覧郡中諸山或言古仙人浮丘伯及其弟子王郭二人亦嘗徃来其䖏及称山中多光怪倐忽变化甚異延祐三年矦諸孫弘毅即其地祠浮丘以其二弟子及侯配廣殿大庭髙門修廊皆合制度又割田廪有道之士以奉祠事明年郡人曽編脩巽申為請于玄教大宗師命為天華覌至順元年陞為宮明年正一教主三十九代天師加天華萬寿宫并書其顔咸謂君子作始􅆯具金石刻請為􅈓辞按庐􅁜志侯名宷􅀄隠夫容後淂道山東南三十里之洞岩臨江玉笥山志又言承天宫西南十五里南障山葆光覌有吉州閻使君别墅後淂道衡嶽學仙之人固􅉭忽不可知而戎昱集載送吉州閻使君入道詩此尤足徴者浮丘事見列仙􅀓天下高山絶境􅀋有浮丘遺跡要不可詰然古之士君子負徳行方藝不見不用于世或著書立言以􅀓其道或躬耕採拾以楽其志或依托佛老以􅀉其跡若此者世多有之後世至有因之以為冨貴利逹之途赫然与王公大人並馳争先者侯之孫自壮􅀊抱其才逰京師􅂾被荐不合去最後受知集賢諸學士荐為甘肅儒學副提舉又翩然嘆曰即見用以踰五望六之年馳􅂾千里之地逐尺寸之禄智者不為也曰天華吾故􅁟吾将老焉其犹有乃祖之風與其辞曰瞻天華之岩岩兮前青牛而後玄武乍蜿蜒而囬伏兮忽鶱騰而軒翥丹霞爛其高兮白雲縞乎在下俯城郭之鱗蓐兮覧平原之膴膴香城鬰其在望兮乃匡仙之故居枕黒潭之黕淡兮大江淘而右趋􅇍􅂕皐而造神澳兮頋列仙之攸舘浮丘既厭世而髙馳兮閻仙又擯余而不返召青鵉使駕輅兮俾鳯以調笙抗文龍之雲旗兮仍析羽以為旌兾神君之来降兮余将肅其並迎昔孔子之欲乗桴以浮海兮老聃亦度関而西逰知文武之不可作兮道凛乎其莫㽞何盛世之孔明兮亦高􅌃而逺引矧兹邑之鉅䴡兮乃英賢之􅀁藴君子固难進而易退兮亦因時而􅂋隐神君既有此灵宫兮曰高明而又􅲞塏山樷樷以四周兮繚青川之凂凂撫下人而頋懐兮歴千􅀊而犹未改起􅀝檻而浩􅁔兮将畢景而靡悔臨江路玉笥山萬夀承天宫碑天下称大名山在大江之西者三曰匡廬曰閣皂曰玉笥玉笥又為天下絶境按道書及啚志于洞天則太秀法楽于福地則郁木凡為老氏之宫二為覌二十有一而皆統于萬寿承天之宫宫在洞天之西三㑹􅄘之下玉澗之上云即梅子真隐䖏漢􅀄覆箱之麓有覌曰玉梁言􅀄為覌時天降白玉梁因以為名晋永嘉中徙號于此唐之季道士刘潜谷建老君院覌旁曹䖏明亦建精思院而王䖏士遂以覌為􅂕宝院南唐保大中徙􅂕宝又貭議合三院之田復爲玉梁覌刘傅陳紹覌王傅丁守玄姚文貭曺傅宋懐徳汪希聲皆有道者號玉梁八祖宋大中祥符元年賜覌額曰承天宣和􅀄陞爲宫宫之衆幾六千指爲友寮五十餘而唐宋之君􅂾設金籙醮于此故玉笥之名震天下大覌庚寅宫灾各出建壇埸以居寮之存者僅十有三灵宝之友曰超燕浩然水竹飬真老君曰智仁玉洞玉山夀玉精思曰清音清隐桐澗道冲雲菴建炎紹興之際管轄刘思齊知宫楊得清始復其宫何道冲何守元継之宮日以脩咸淳中􅃹轄李􅁢一之兄珏為閤門宣賛舍人淂幸上為請以甲乙􅀓次􅀙之入囯朝至元二十六年詔加萬寿承天宫給五品章以􅁢一為夲宫住持提􅀧兼夲路道録與知宫謝景巽謀大新其宫以称上賜景巽乃種􅀣積財以待之大徳三年􅀄作東西廡而􅁢一卒刘夀翁周源深刘居敬何􅀿仙䓁継之皇慶二年寿翁源深建寿春閣主宰三官三殿延祐改元建三門及正紀堂鐘楼齋堂庖庫之属至順二年居敬􅀿仙建三清殿費以鉅萬計居敬及李師周各以私錢五千緡倡之餘皆出諸宫中王宝仙䓁木惟棟材淂巨檆株于郡人鄧守一餘皆取之謝景巽􅀁手植之者于是棟宇之制金碧之餙象設之􅃊莫不度越于前矣又増飯衆之田合新舊為畝萬有竒而宫始大偹君子曰大江之西雖有三大名山惟此山兼洞天福地之重􅄘有太白雲䑓郡玉秦望之属三十有三壇有太清太一曜明白鶴之属三十有九䑓有東華赤松白雲之属十有二谷有彤霞卅陽之属五井有丹砂玉乳醴泉之属十至若三溪八池七潭六源四塢二十四澗皆勝絶之䖏髙摩天関勝入地軸載之莫䆒其名窮之莫極其源雲雨􅀁都雷電􅀁家金芝灵草之􅀁囿神龍異獸之􅀁窟宅天鍾其英地儲其灵磅礴扶輿非遺世絶俗乗虗馭景之士不䏻徧睹也古今隐居淂道于此計不可􅂾其幸知名者若秦孔丘明䓁十人漢梅子真梁杜曇永䔥子雲唐羅子房羅公逺謝脩通刘道平宋沈鱗毛淂一李思廣之徒三十有八人皆磊落竒傑世不常有其不肯名于世者不知其幾且神禹大聖也漢武英君也言皆尝􅀿符受籙于此使天下之人披啚志聼逰士談􅀃孰不延頸稽首矯然如在弱水之外信天下之絶境矣而萬寿承天宫寔統此山不亦重乎今宫庭之䴡不獨可称上賜又足以称此山不亦美乎然是宫也興于漢盛于唐燬于宋雖復于南渡又二百餘年以至于今始完且美厥惟艰㢤為之後者當何如其継也今住持提􅀧是宫者通􅀇冲素明逺法師教門高士何君應仙也宫之浩然堂卲天麟念其脩􅂧之难何刘以上諸老之勤請文刻石余與邵然又嘗識何君序已復係以詩詞云大江之西洞庭東三山鼎峙争長雄玉笥嵯峨与天通千廻萬轉重復重十人避秦入山中池飬十魚為九龍九人乗龍上虗空赤帝飛入為九嵕四海照耀何烘隆三疏不救莾賊凶曹瞞欺天塞帝聪玉梁白晝随􅂕霳夀春真人抗灵蹤玉壇佳氣常欝葱璇題翠羽開神宫九霞炤地光熊熊急澗鳴玉相撞舂群􅄘四合如朝宗承天萬年亮天功太秀幽詭郁木同重岩洞􅊤守􅄦工白猿夜唬宝氣衝我欲求之白雲封金􅆣先生碧两瞳弟子文詠敬以㳟巣雲駕霧留飛蹝玄洲長史白玉容八十二口来相􅀙一入不復世莫逄忽而見之若􅀤蒙朱宫玉堂繍􅄕櫳青童素女清而丰桃花杏花相映紅忽而不見空溟濛或聞玲玲磬与鐘或如金鳮暁啼風何刘沈謝􅂾十公遺聲􅇣响犹渢渢霓旌羽莭何當降霞衣飄飄珮琅􅋛下与世人哀􅟂恫身為風牧常先鴻上佐皇羲播時雍還淳返朴服孝忠物不疵􅸳年穀豊氣酣飛上三會􅄘周覧四極摩蒼穹前有天柱如華崧落日炤作金夫容三􅄘東出號赤松雲䑓太白相横縦群玉金扇逺更濃两􅄘相􅀝如駏蛩􅂵􅅔高閣􅂵霞冲石橋金柱争巃嵸長江外抱如白虹束以驚峡轟奔洪千今萬古聲淙淙百神歆集元氣融超􅇒􅅫莱軼崆峒仙来不来我心忡山中有艸名碧茸食之千􅀊顔如童我欲求之不可穷願珮舎景􅀙仙翁􅂵袍白馬来两􅎸奪取神君一尺銅坐閲絶景􅁯春冬勅賜漢昭烈帝庙碑燕俗庙祀漢昭烈帝関将軍羽及奉蜀郡太守李氷甚䖍昭烈関将軍皆􅃰人今州南十里楼桑村即昭烈故宅其祀昭烈羽冝以郷里故氷在蜀堰江水以灌民田又鑿石為犀五牛以厭水妖燕無洪河大川􅀊多􅁀水故􅃰之范陽礼智鄉有益者神巫王媪之子也媪爲巫五十餘年媪死益襲其業如媪之神遂合􅀁淂施与作昭烈帝及蜀太守庙于其里前遼陽行省平章政事今中政院使哈刺帖木児相以私錢若干而殿堂門廡象設􅄊物之属无不偹元統元年九月十日爲請于上降香幣以落其成明年三月六日又言之奎章閣侍書學士沙刺班使奏命臣傒斯紀其事于石而上皆従之其不絶人爲善之畧如此且天子固天下神民之主凡有功烈于民者冝不限以地使天下皆淂尸而祝之以係其尚徳慕義之心然臣聞有天地即有􅄦神􅄦神一隂陽也陽其神隂其􅄦陽変而隂化一変一化􅄦神之道著矣故􅀓曰􅄦神之為徳其盛矣乎謂􅄦神􅀎祸福人者無之作善降之百祥作不善降之百殃此􅄦神之机而善􅁖之􅀿皆人􅀁自為也雖古之巫覡祷禳祈禜亦因其人心􅀁感而為之􅀿焉尔􅀁祷非􅀁感而能福人者無之故曰皆人􅀁自為也若昭烈續漢祚于既亾関羽不事賊操而委貭刘氏李氷當秦之􅁀而拯民于溺至今人庙而祀之者豈非為善之􅀿􅁘亦其􅀁自為也神既以此而受福于千萬世其􅀁以福人者豈肯異于其􅀁受耶嗚呼隂陽也􅄦神也極天下為䏻変化者也福善祸􅁋而無􅀁容其心人可不知􅀁自為也㢤詩曰求福不囬此之謂也臣既奉詔謹拜手稽首而著其􅀃􅂧為之詩曰坎坎兮伐鼓掦揚兮合舞神之来兮如雲神之去兮如雨神福我民兮不知民望神兮􅂲神不来神不来兮心孔悲神之来兮民之依黄屋兮赤旂左諸􅁑兮右羽飛神在漢兮漢不衰漢雖衰兮神不遺神福我國兮踰漢盛時長㦸兮丹轂堰江流兮潅平陸神在蜀兮秦之福禾黍芃芃兮妖孽伏神福我兮如神在蜀􅃰鹿兮范陽神之合兮煌煌冝君冝臣兮祚灵長五風十雨兮均万方庙孔碩兮荐苾芳神永世兮兹頋享双莭庙碑皇帝元年江浙行省言漳州萬戸府知事闞文興死其君配王氏死其夫􅀖人既為之立庙請加褒􅂋以慰􅀖人心以為天下後世􅂆乃下吏部㝎封太常議謚而封闞文興為英毅侯王氏為貞烈夫人庙曰双莭之庙今右司􅀰中張侯士弘為吏部侍􅀰時􅀁力行也新安鄭玉復持張侯命請􅁀其事于䴡牲之石闞文興不知何許人王氏金􅁜民間女至元十三年􅀙萬戸賈将軍戍漳州十七年八月望劇賊陳釣眼夜率衆為乱殺招討傅全及其一家官軍死者十八九闞文興力􅀾死其配王氏有美色為賊􅀁執逼汙之紿曰我不幸至此豈敢爱其身􅂅收塟吾夫然後惟命賊義而許之淂其夫乱屍中置積薪火之遂自躍火中并焼死後十八年府始上其事連帥及部使者以逹行省又九年行省始聞于朝下礼部議部請訪王氏族里旌其門閭收卹其宗親乃以其事付史舘事下江浙求之六年無􅀁淂乃用漳守言表其故营曰烈女之坊然無及文興者又二十一年士民之言不已以有今日之請嗚呼二人之死卓卓如此犹歴五十有四年始􅀗五䓁之封双莭之􅃬且必待張侯賛之人之伏岩藪沉下僚砥名礪操欲聞于天下不亦难矣况􅂾十年之間有司之請朝廷之議皆為王氏止王氏信莫及已闞文興亦詎可少㢤天下綰符杖莭擁萬夫之衆鎮千里之地者不知其幾一旦四方有急天子之命未及于境已閉閣称疾者有矣遂委兵而迯者有矣當是時変起倉卒使闞文㒷苐守薄書期㑹之常負妻子踰垣而避之人亦孰淂而議之而臨难􅁯身見危授命􅂪凶威􅌃白刄奮萬死不頋之勇死而不悔者何則祸乱作于前忠義激于内不暇擇地而死也至于王氏决死生于俄頃不辱其身烈丈夫有弗逮矣君子曰人皆死于危二人獨死于安皆有苟􅇠之道而不為也然江浙之請雖堅中書之命雖下㣲張侯英毅必不侯貞烈之封亦不及而闞之死其君王之死其夫亦豈欲求庙食兾褒􅃂邀譽于天下㢤誠不忍棄君臣夫媍之義焉尔傅全闔門死难有司之請䎐廷之議皆不及者武臣死事囯有常典云其詞曰世道升䧏視綱与常綱常弗紊國乃吉昌仡仡闞矦夙佐戎幕匪矛匪㦸而簿書攸記婉婉王􅁎来嬪于闞夙興夜寐惟警戒是鍳元有南土爰鎮于漳閩山岩岩以海為疆謂國既平謂威德既加弗戒弗偹而内生孽芽盗夜斫营矦亦􅀾死王􅁎不辱入火如水五十四年民請弗􅁍庙有新號而封有新爵載念厥􅀄風教未立三綱如此命胡不集唯矦克齊而家而媍克配尔德生雖不融沒有遺則民心孔懐庙食孔宜式著刻辞為臣妾之規龔先生碑自周程朱張氏没天下壹資其書以為富貴利達孔孟之道闇然不明宋末科目極􅁦之餘用周程朱張氏之書以為學皇元科目復興之後能用周程朱張之書以為教吾郡南昌則有龔先生云先生没九年其門人朱志孚黄􅛽尹三以状謁銘其始至也余以􅁨在告其再至也國方有大故三至而辞益悲志益勤淂師弟子終始之道乃叙其㮣而銘之先生諱日新字中孚五歳入小學十歳通進士業十五有能聲􅇝胡氏純饒氏􅀿中吴氏􅀿期始去舊業由周程朱張氏之説以求達夫孔孟至元中以郡太守之招分教進賢日与邑賢士龔君煥講求孔孟之旨使知仁義為重富貴利達為輕而孔孟之道為大邑人翕然師尊之先生八歳時大父成已以户調督輸失期逮至邑潜徃􅀱之坐當笞徔容進曰大父耄老家君􅆘有采薪之􅁨幸少貸當代輸令大驚試以尚書禹貢盤庚諸篇誦説如注令礼而免之父鈞嘗淂􅁀疾氣己絶咸謂宜遷正寝先生曰必三日乃可時時手注善藥口中翼日忽自蘓又十二年而終媍翁􅀽大夫漸治宜黄有殺人之舅誣其甥而已証之者先生至邑亷淂寔白而正之咸淳􅀄度宗潜藩㤙試京師謁陳尚書宜中坐頃賈似道至起避旁舍中賓退尚書曰䏻一詣此人否对曰不䏻尚書嗟嘆乆之咸淳癸酉復与計偕而国亡矣吴先生疾也日往問焉其没也無以為哀己塟焉其教人也諄諄不􅌒不達不止嗚呼先生逺矣今之讀周程朱張氏之言者皆是也而先生逺矣没之日寔至治二年八月五日以某年月日塟于某夫人某氏子男三以荘立信太􅀄荘早世孫男五名与竇侍􅀰禹鈞之子同而亡其侃乃銘之曰道行以天行道以人萬変摩盪忽而磂磷惟君子人内主外賓彼德于天吾自吾身穷達一揆尊尊親親邈矣先生勒此貞珉􅃊先生碑世有朴山易説十四􅃃宋末吉之太和􅃊先生肅􅀁著也咸淳中江丞相萬里馬丞相廷鵉皆好其書為献之天子徵為秘書省較勘宋亾之歳三月二十有五日亦以疾亡皇􅂟􅀄余在京師識其曽孫有開有才藝有德行問其世則曰吾之先馮翊人也唐之季袓实為江淮轉運判官遭乱不䏻帰留居廣陵子可求事江南吴王為尚書僕射同平章事子續又事江南李主亦以門下侍􅀰同平章事是為懿公遷金陵乱孫美舉家南竄至太和家焉遂為太和􅃊氏自懿公後始去干戈事文學自秘書郎常州推官震始登宋􅂟暦壬午進士迄宋亾為世科之家又一十有八年余在奎章閣遺余書曰昔者嘗􅀗與子詳吾世家于京惟大父績學篤行著書立言以惠吾後人而墓道之石未列􅀁刻辞敢請按先生字子方曽大父諱光道朝奉郎通判潮州康元之弟也官保義郎淮東制置司幹辦公事大父諱知古父諱起予娶叚氏子男二􅋮父用父孫男四曽孫男若干人女若干人壽六十六墓在縣南之某郷隆福山之原夫易之道深逺矣世之言易者至衆矣􅃊氏之書最晚出致使名宰相献之天子藏之秘府固有以淂聖人之心乎􅃊氏両世相覇􅀦而轉徙䘮乱曽無寕歳積十有餘世乃淂先生以四聖人之心竭四十年之力其書不与􅀦俱盡宜哉先生之被徴召也到官数月即自免去曰吾豈以六十之年而不知其􅀁止乎易曰介于石不終日貞吉言知幾矣銘曰經之全惟易然言之难公淂焉子若孫尚永傳樂􅉌碑余嘗讀老聃氏書至長生乆視之説曰此世􅀁謂神仙者非耶又有䏻以術役􅀑神召雷電祷雨晹已疫癘亦曰岀老聃氏老聃氏果何道哉廬陵高敏則君者博達􅀷識之士也有􅀁善頥浩先生頥浩先生者郡之安福人也名同寅字惟寅姓陳氏宋咸淳中棄家入清真覌為道士至􅀦朝天下郡縣置道官又置南北道教􅀁以領之其教􅀁號之曰明素葆真大師教門高士以為郡道録即為之不辞厯住冲虚覌梅峯道院􅀁至祷􅀨􅊙已疫癘崇棟宇辟土田至于起居飲食莫不与人同也然今年八十矣顔如春花步履飄飄然􅅻如四五十人又善為歌詩一字作不俗下語不知何道以致之及察其􅀁讀書皆老聃氏書也覌行事皆非老聃氏􅀁嘗言者豈守其真而溷其迹耶高敏則君又嘗聞其言曰天地果無終乎則纍纍乎莾蒼之野者何為而有之天地果有終乎則炳而為日月星辰峙而為山嶽流而為河海何為而莫之易也故聖人䏻其􅀁無終不䏻存其􅀁有終衆人常􅁒其􅀁有終而不䏻存其􅀁無終彼纍纍者吾獨且柰何哉今求吾之道者曰老聃氏也求吾之行者曰老聃氏也彼烏知老聃氏者天地存亦存天地終与終天地而有不終者存焉彼又烏知老聃吾方且為樂􅉌以待天地之終也聞有揭子者䏻言孰為吾使志之高敏則君以告乃為之志而歌曰猗頥浩兮不与我好兮而使余告兮猗􅄨浩兮不与我期兮而謂余知兮天地廓廓不可以度日月爍爍不可以約吾非老聃安䏻志斯􅉌之樂大元勅賜正奉大夫江南湖北道肅政亷訪使董公神道碑元統元年十有一月月幾望奎章閣承制學士臣沙刺班召臣傒斯至學士院傳詔命臣撰故正奉大夫江南湖北道肅政亷訪使董公神道碑别勅新南臺治書侍御史臣巙巙書其丈翰林學士承㫖臣師敬􅂐其額臣窃謂自太祖皇帝應天啟運其􅀅相大臣父子孫曽􅀓百数十年称名臣者数十人或擁旄杖節出謀􅀤慮佐定海宇或安危靖乱行政施化藩屏􅀦家于外或献可替否拾遺􅀘過匡輔政理于内功不絶于信史名不染于罪藉天下庸人媍女皆䏻称説者惟董氏而已以臣傒斯􅀗偹載籍与有荣耀故不敢伏闕辞譲謹按公諱守中字子平世為真定藁城人曽大父龍虎衞上􅀅軍左副元帥知中山府事諱俊大父資德大夫僉書樞宻院事典瑞卿諱文忠龍虎公第八子上自天子皆以苐称父資德大夫御史中丞諱士珍公始入太學簡知世祖召問時政條对詳敏如素習吏事者命之仕則辞年二十二乃以世胄􅀘内供奉歴尚服院懐􅂟路判官河南行省理問典瑞丞僉典瑞院事集賢侍讀學士浙東亷訪使湖南湖廣􅂙知政事漢中湖南湖北亷訪使累階正奉大夫公入官幾四十年最其在官才十有二年以母䘮去供奉閒居十有七年以尚服院罷觧判官閒居一年以上怒有司左遷公止懐􅂟之行閒居三年以父􅁨不果赴理問及辞典瑞丞終制二年以弟守庸為御史舍浙東以疾棄河北皆間居二年遂以至順四年六月朔年六十一薨于家自同大父以下親無不在旁者薨九日塟邑西九門先茔贈某官公之居家与夫人事父母盡其孝遇宗族郷党賓客盡其礼馭􅆇􅀗盡其恩諸弟妹昏嫁皆取具夫人奩中之資父之澤則以譲其弟大父之澤則以譲其叔父諸子女無適庶視之如一公之居官潮壅􅀭州金沙河舟楫不通豪民恐奪両河地数賄有司勿濬有司亦因以爲利及公爲河南竟濬之河北飢部使者下令盡逐流民之南渡者北帰公盡止而濟之其在湖廣宋以馮文簡公故宅爲貢士院在洪山寺傍及宋亾寺燬屋仆碑而有其地公􅂧取以爲貢院江西歳給􅀩山銀冶粮四萬餘石輸銀三萬五千両㒷􅀦龍閣諸山亦多産銀有請色辨􅀩山銀者公曰此奸利之民也斥之公方㽞妻子于鄂赴漢中過汳當國家中㒷行省大臣留􅂙軍事肅清郡邑以迓新天子多用公計策独不􅃪諌止孛羅守潼関関果不守騷動三晋及新天子至召賜白金百両以爲河南亷訪使帥師守武関迄乱定無一人敢窺関者明年天下大飢武昌群豪控諸米商閉糴以徼大利城中斗米至萬錢公􅆘至杖其党与七十餘人米大賤又輟貢士荘錢入學養士恐以飢廢講􅈓朱文公戊申封事于南陽書院使學者知格君之道有司受賍聼民誣父妾􅀒財迯妾实与争溺水死公正有司及誣者罪惟公平生于朝廷無干進之櫝于权門絶私謁之迹又不幸年止中壽故上不䏻盡公之用下不自竭其志竟如是而止悲哉然臣嘗待罪􅀦史伏讀太祖以来寔録及覌董氏家傳朝野􅀁記載詢諸典刑故老董氏之先南征北伐未嘗􅄭殺一人􅄭施一政天下􅀄定諸􅀅並觧兵柄唯董氏不許以僉樞公􅀉天子腹心居中者四十年才四遷其官覌公進退可謂無忝乃祖矣公夫人名臣翰林學士承㫖王文康公鶚之孫翰林直學士之綱之女勤儉懿爱德為九族師封隴西郡夫人生三男子一女子男鎋􅉗鑰也􅁎子女各一人男鐩鎋由武偹庫使五遷而僉群玉内司事亷直貞亮為英宗文宗􅀁知及􅉗之篤行鑰之好學鐩之脩謹皆䏻守祖父之訓為孝子慈孫龍虎公累贈推忠翊運効莭功臣太傅謚忠烈僉樞累贈體仁保徳佐運功臣太師謚正獻中丞贈純誠肅政功臣太傅謚清献階並開府儀同三司勲階上柱􅀦爵皆趙國公銘曰天啟有國篤生賢哲董氏数世終始一莭人謂董氏獨保天廸匪天私董唯以不殺如漢鄼留佐命㒷劉有舉必賢有謀必酬惟滿溢是戒惟清静是修又如西平在唐之造功則譲䏻過則引咎惟善是与惟德是􅅷而子而孫半涆天下王公令僕方騖並駕人惟好德如春在物生生靡穷莫之能敢遏豈彼驕陽焮灼歊蒸歘兮凜秋為寒為氷矧兹董公翼翼其承惟祖考是訓惟德義是經進退用舍与時偕行用不盡材寿不侔德而公之嗇而後之益􅀮卒豊終爲天子之公厚本濬源惟子孫之恭臣拜稽首式掦休風以示趙人以篤世宗趙功可墓誌銘余讀太史公書至倉公扁鵲傳嘆曰功之及人深矣然其子孫無傳焉歐陽先生守道􅀁爲天和老人碑累千数百言与龎安常並称且曰子若孫皆進于學其門户􅀅大又嘆曰子孫之大也其必由學乎天和姓趙氏其始祖三衢人徔趙清献公官贑上至廬陵家焉三世至荣道盡譲田廬兄弟而自立荣道生􅂟善慶善生鶚飛是為天和博學善為文章有盛德著書百二十有六􅃃生四子惠愿贑日章日章徔老氏學惠生宋永宋強愿生宋文贑生宋庠宋安宋永字儀可宋安字功可以文章齊名號二趙先生儀可嘗三貢于郷又入太學充博士弟子員宋強亦登進士第為韶化簿尉卒功可雖不及貢他人淂其文輙与貢使宋不亾儀可必不止太學功可必貢且第及科舉復則皆老矣儀可尋没功可䘮明然儀可之文播天下功可謹自晦犹為人􅀁尊尚称郷先生泰定三年十有二月乙未功可亦没明年秋八月其􅀌靖衰絰走門泣且拜曰我大父則歐陽先生銘其墓而文丞相題其盖我伯父則翰林學士承㫖程公銘其墓而翰林學士承㫖趙公書其碑惟先人之塟願併以累子噫余敢抗諸老哉然􅀗知功可今二十七年矣其淂辞君生七歳而􅀌服除而母嫁大父鞠而教之警敏絶人貫穿諸經羅絡百家而為人温厚純慤和而不同為文䟽達雅粹豊而䏻約其教人也本之以不欺継之以不􅌒故徔之㳺者皆賢子弟其兄死諸􅀌孑立皆与教育而昏嫁之而見之未尝不以礼晩歳楼于屋之西偏揭曰吾美盖感其平生淪落不偶晚得安享太平無去􅀦懐郷之􅁨而自幸也自是賦詩飲洒無日不在兹楼矣及其没也飲酒三日無疾而殁年八十一娶胡氏子男三人初逺靖初客南海二十年父死不及歸逺為新㑹縣教官卒凡䘮紀惟靖而已女一人􅆘張元孫男六宜簡宜晦宜遜宜立宜和宜肅女一人曽孫男女各一人􅀅以閏月二十日塟􅀁居之趙山嗚呼功可已矣余覌靖之為人簡慤􅃊重且其為文甚􅀋其父諸子又􅀋歐陽先生􅀁謂大者其在兹乎儀可後易名文家復有神甑之事云銘曰趙昔有甑大比則鳴伯也三􅀿叔果弗灵甑既墜矣天開聖朝昔視為祥今視為妖温温君子弗䆒以老藹藹令德無忝祖考嗟尔振振曰子曰孫念尔祖考􅁢大尔門奔清甫墓誌銘安成有士而􅀮于醫者曰奔氏諱清甫生宋宝祐間九歳而􅀌即強學自爱視取高科都美官如指掌積勤十二年而􅀦亾科舉廢又連遭大䘮征徭風火巨室瓦解乃盡棄其田疇取神農黄帝之書日夜讀之心通理解天授神設以之察脉視疾論生死虚实寒􅀬雖世業鮮能過之四方無貴賤貧富求者如歸市遂以名醫聞自是声日起家日􅁉而無推剥糜爛之􅁨天下立醫學置吏多劝君爲之者君不􅀿然學校每頼君以爲重君平居孝友凡見父之執母之族必敬之如父母兄深甫貧事其兄如父事其嫂如母撫其子如子從父仲龍老而無家養之終身兄及􅀙父没以礼塟之徔妹之夫劉才英溺死二􅀌㷀然君爲經紀其家同居子姪有他􅆘必謹視其私雖犬承使各得其􅀁故家子弟覉􅀌淪落旁皇無􅀁帰或舘之或食之或衣之曰此名家之子也人以横逆相加未尝难焉惟讀書老不释􅃃多􅀁編校及科舉􅂧而老矣㤗定三年七月淂疾手課程文一通授其子沭浴衣冠語衆曰後三日夜半吾當死及期而卒年七十二􅀅以沒之明年九月庚申塟郭北順安鄊印山之原􅀌元凱令其子中冷以書謁銘君之先汴人七世祖仕能事宋徽宗為侍禁靖康之乱􅀙隆祐太后南幸至安成家焉仕能生成甫成甫生逸孝宗時舉直言極諌科逸生成莭􅀰子英子英生普州安居尉士同士同生志學是為君之父君三娶皆刘氏子男三元方元凱元中元方本趙氏子􅀙母帰奔故冐奔氏㒷元中世醫學惟元凱業儒文多竒女三長􅆘郷貢進士刘辰􅀤之子尚賓次許􅆘倪剛大孫男五長中冷業進士有聲餘方向學女二惟君少􅀌䏻勇自􅀣立既食于醫䏻爲善不􅌒又力以詩書教子孫没犹不􅁯以進士業勵其後且其明足以知死生之故有合于君子之道宜淂銘銘曰猗民之生汨汩营營爲之礼楽以防其情爲之藥石以和其形民犹􅃖􅃖弗念厥生善爲政者不失其􅀴善爲方者不䘮其平惟以保其真嗟嗟奔卿子孫其興䖏士楊君墓誌銘豫章先生熊氏以六經教授東湖之上燕晋齊魯関陕之士皆不逺数千里受業門下去即掇高科都􅂋官立盛名至有閉户穷經甘白首而不屈者郡人楊綬又独嶄然群弟子中其讀書務求大意不􅁄棘章句其爲文鉤􅀇抉幽非博學識字不䏻讀然反覆沉欎固􅀅就平易而未及者其力行敦六行明五教邪說不䏻乱世好不䏻惑恒居無雜言盛暑必冠􅅁与人交必敬爲人謀必忠不以利害枉其道不以毁譽屈其志三試進士三見黙不易其􅀁好熊先生深爱之同學亦皆以為不䏻及熊先生没常忽忽不自聊然益􅁬于學有一日千里之􅀔至順二年四月二十日年三十八竟以疾卒君子莫不傷之且曰使不死吾輩皆當出其下明年夏其􅀌某年月日塟于某以状介父之執至京師請銘按楊氏其先聞世家五世祖􅂋寿徙豫章遂為南昌辟邪里人􅂋寿生文貭文貭生炳及開􅂟己未進士撫州金谿主簿㑹龍炳無子以㑹龍次子惟善為之後娶信州鉛山主簿胡庭桂女生君君字宗敬早􅀌䏻服勤母教又淂名師友以成之故􅀁至有過人者惟人之生也命之脩短懸于天學之成否係于人是以君子之學常恐志未畢而年不待也孜孜勉勉死即已矣若楊君者不亦􅀷可哀耶君娶揭氏生二子成􅁢成彦二女尚㓜銘曰梗楠豫章為棟梁兮璆琳琅玕為珪璋兮才而短折君子之傷兮揭文安公文集􅃃之十二
