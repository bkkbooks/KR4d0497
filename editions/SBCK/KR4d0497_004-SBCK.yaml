  text: 掲文安公全集卷之四
  hash: sha256:52e940591760e62dfbfb8b98760a31be8960788445bb2fe057bba239645ff771
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_004-1a}
body:
  text: 掲曼碩徯斯著門生前進士爕理􅄎化校録所藏逺山圖蒼蒼兮逺山飛瀑兮潺潺思王孫兮未還蒼蒼兮逺巘飛瀑兮偃蹇思王孫兮未返白石之上青松之间上有飛雲下有流泉悵王孫􅀆留連留連兮何極望青山兮使予太息太息􅀆予独思王孫兮如玉題陳氏松巣圗雲英英􅀆承宇松庚庚兮在户問此何􅀁兮廬山之隂大江之滸雲可衣兮松可巣君何為兮不来予何為兮延竚山則有􅅔水則有魚君㱕来􅀆予与女同居題新安許氏蘭秀軒蘭生兮深谷潄流泉兮䕃喬木緑葉兮披披玉幹兮紫㽔植之􅀆堂下播芳馨兮菲菲菲菲􅀆掦揚思君子兮髙堂縆琴瑟兮會友嘉肴苾兮薦芳襲芳􅀆佩秀宜君子兮多寿桂林􅁔贈明秀才逺望兮桂林鬰蒼蒼兮窈深去無期羗君子兮劳我思皎皎兮明月桂偃蹇兮不可掇矌蕩蕩兮啇風発君思我兮湖南憲使盧學士移病歸潁舟次武昌辱問不肖姓名先奉􅀉三首大徳七年昔賢懐出䖏到䖏非一端􅁳􅁳鹿门東陵園千載有其人常在覊旅间跂予􅁒􅀙之路危不可干晨興命徒旅驅車出重门此睇嵩洛原浮雲数千里悵然㢠我轅東風起空郊草色一何鮮百鳥縱横逰孤鵠摩可冩短意誰能傳岧岧椘王䑓泯泯湘水碧湘水深客客本金闺人􅀚風戾南國漠然忽遐斊抗志箕頴跡荣華衆􅀁趍智者審損益嶔崟狐兎穴泱漭風雨色常恐衣上塵汗我林下石重華仰海宇䕫􅾽易為力去去君勿遲憧憧孰云識我本耕牧􅆆結廬章江涘㣲生属休明世尚猶典禮驚飈卷飛轍􅋁落􅀙此始三年江漢春萬事隨逝水既昧理生術􅂧慚逰方旨豈無青山㱕亦有桑與梓何為苦㽞􅆡眷眷存君子君子諒不然東臯畢耘耔黄鵠山聴雨淂清字􅀇扃息深構虗舘含餘清瀟洒松上来瑟縮花间鳴遥兼夜析警細與寒更并懐親感仳别撫物愧生成􅁟思浩方殷春聲耿逾明幸及朋知好逹此旦暮情北首非窮轅南山夢㱕耕何言託豪素􅂓用欵平生贈别李時毅淂南楼姢姢臨古戍晃晃辭烟􅀣寒通雲夢深白映蒼梧暮胡床㸔愈近椘酒愁難駐雁背􅁒成霜林梢􅀄泫露故人明夜泊相望㝎何䖏且照東湖㱕行送㱕州去送姜尚志淂官後携新妾歸省淹薄徂年􅀊離别忽在兹寒城落木後虗舘殘鐘時家在㕠井上心隨􅀌鴻飛落日布帆逺青山尊酒移蒼􅃼􅀝闾情愴怳零雨詩託身名教中固􅀿慎其儀志尚既不殊情鍾自成悲昔見已雲晚再會良無期濯足彭髙堂㱕鶴髪喜垂涕児童问牽衣野老借檄㸔隣女隔墻窺田園各成熟松竹一在眼雞􅁰相提携翻知在家楽不恨為官遅放浪乘化遷何用世俗知遊禅林寺喜淂昌上人靈皐懐独徃危軒泊间寂偶与塵事違况值禅林客深苔剥脩玉􅁿霏澹凝碧夐見飛鳥還静闻寒溜滴􅆰明會真賞漂流見良覿常恐心跡乖無由展平昔奉陪憲使程公遊麻原第三谷宴藏書山房白雪楼時三月三日明公富暇豫勝日懐登臨蹀躞騘馬行窈窕幽人心懸厓響晴雨犇流濯春隂雲门轉絶壑畫橋貫長林拂石慨徃運闻鐘知古音耆松有百圍突嶂踰萬尋小憇釣魚䑓聿瞻華子岑扪蘿入縹緲側􆁍凌蕭森白雪百尺楼下有􅀌猿吟􅀄筵俯曽顛㣲風散危􅁭語咲信忘我觥筹浩難任豈不念永㽞惘然帰思深送雷山人逰山髙人雨中至􅌽我逰山作自非冥􅄫徒孰遣紛華落方春廼􅀤軔殘雪犹映薄随雲度神臯披烟望靈嶽晞沐朝陽谷照影清氷壑淹㽞皆隐淪徃還必恬漠惟􅀿樵与牧時逢淂竒薬歸来雖未期鬢髪終如昨送孫志言逺逰志士逰四海豈拘名利牽孫子三十餘懐策靡遑安仰視流光馳千􅀊俄頃间青青鏡中髪闭阁守丘園昔者限南北放浪徒空言曠然六合中何為惜飛翻晨装既云具良友咸在门依依别老親悃悃語弟昆出門即萬里囬首惟浮雲豈無骨􅁏念身􅀒天地㤙白日出東峰緑􅀣徧平原􅂬會良未期佇情何由宣出䖏各努力還㱕􅀚􅀁敦贈髤者黄生髤飾肇有虞大樸已雕刓紛紛百代下巧宻何多端黄金间毫髪文螺錯斕斒竹􅀣冠䑓殿祥雲随鳯鵉五采􅀍牀几豈独匜与􅐻坐使圭璧暗􅀁好移􅀁􅀚黄氏檀良工出入三十年馳譽必名流迎致皆上官羙賈一朝起群工那敢班藝絶誠􅁕貴古道何由還送管録事赴東平走筆作十月燕地凍原野何蕭條征車臨長途行子去中朝濟濟同舍生載酒集河橋子當撫􅊔行役在晨朝脱葉辭髙林散漫復風飈􅄐鴻别杜渚嘹唳􅆰曽霄一觴不盡傾何䖏相招邀東魯非逺􅀖録事非冗僚矧宅夫子地餘風諒非遥眷言懋殊績夙夕佇嘉招廬山郭数授数相覓不見忽闻㱕省却赴官雲南􅆢寄五言一首為别以荅􅂅交之意蕪謬忝詞舘晨出㱕恒夕親交犹自踈况乃未甞覿誤䝉君子賞驅車数見覓暮見門间題中夜犹怵惕反愧􅀿门子時􅆢氷玉色云何心􅀁懽萬里西南役終􅆾携手好同是思親客過家君已先淹泊誰復識東風動楊桞河水流不息何以展所懷中心若金石和酬馬伯庸供奉史館間題見示二首隂沉閟􅂠館窈窕冝芳􅀣秋日透清輝晨飈翼􅁿霧飛文盡威􅃫擢質皆振鷺平生寡俦匹及此同㪚聚云胡感羇逰對酒恒不御羡君躡髙弟早聼傳臚句時􅀙鴛鴻佀縦轡驊騮路紬史吾豈堪讀書君不誤飛葉滿京華青松臨廣筵連翩集軒盖卓犖皆時賢青松豈不髙衆草自芊芊感此理文翰恒恐迷􅀁先蒐獵殘缺间終􅀊不成編矯情或傷直含辞非取妍宣尼萬世標斯道庶昭宣元功既森列群策咸牽聫終焉惧非才申旦長惕然重送曽􅀿奉及周鄒諸君子晨興戒徒旅行子即長路天衢風雨過升陽在髙􅀣􅀤軔東南门觧擢紛徃緒廽瞻彤庭阙彷彿玉堂署遺荣誠􅀁難勇退無枉歩聫翩数君子意氣更相慕文采掩春華清言敵朝露超遥去留迹曽何悋情素懿此昌時明各有丘園趣熊英徳哀辞􅂕飈戒先路叠鼓中夜􅀤旌旐􅀭廣衢輀車出城闥素緌紛前逝䟽麻森後列岡岡迷㩀依營營㑹精魄流雲冥飛盖平野一何濶慟􅂘積水濱哀歌青林樾翔鳥為廽薄我馬如頋秣農夫釋耒嘆行子憑蹊惻共隐善人䘮矧承君子列平居異山隴累别兼􅀊月規戒晞暮齡􅂬燕中道歇時哲衆􅀁属六十非短折撫物自傷摧瞻望猶慌愡南轅懌帰斾北首悽徃筏千春䮬岑趾藹餘篇帙宿草日已深聲客閟幽泬雜詩五首東風吹百草沿路一時生繁桃與夭杏徧野復盈城東隣宰肥牛西里按新聲孰不乘時節為樂快心情平明出南郭登髙望帝京大哉山河固喟然獨撫􅈾社日玄鳥至入我髙堂飛舊泥幸未拆新泥復相依豈徒安尔身復欲長其兒言語嬌且闲上下逓差池勿因秋風􅁸相逐忽還㱕嚶鳴出深谷草木皆華滋昨日悲􅃊霜爛熳􅀭光輝雞鳴車馬動日暮交横馳賤士錦鞍韉貧女金裳衣各􅂅得所欲及此艶陽時青青孤生松髙出浮雲中下無嘉􅀣林上有萬里風俯視原上草秀色何豊茸自頋豈不髙獨立難為容常恐木根蠧委此蒿與蓬城南有名園車馬何喧喧緑池夾髙栁百草朝且鮮平明集髙䑓日暮不能還美酒百壼少農厨豈論錢䴡服羅四座急管􅀿繁絃燕􅁔􅌂成行趙舞交蹁躚但得主人頋陋貭自成妍還過舊逰䖏池舘謾依然寓興五首壽大宗師吴古称神仙人乃自秦漢间由来英雄士重己􅁿人寰子房遇黃石取履非􅀁艱一朝􅀙赤松髙風安可攀後千載獨立當玄関昔有安期生本是漢竒士髙視群雄间􅀼鄙蒯徹計學道滄海上􅁍粒咀元氣一食如􅀲枣金石焉􅁕貴超􅇒八極外洞達無始際時􅀙王子喬吹笙下逰􅃧咄爾燕齊人宿㽞安可致方朔􅁸平原髙志凌紫氛上書三千牘長揖萬乗君淪跡􅀉中朝髙爵固非群繾綣縁世主諧􅀏匡國均三食王母桃不受王母嗔髙風軼萬代誰欤継清塵伯陽闵宗周西度函谷関誰令守関者再拜希一言歛容為之陳文字至五千􅂓因令尹啓本􅁒使之傳煌煌百代下継者良独難赤松隐崑崙廣成在􅆰同徳為王母㱕道与軒轅通既枉赤水駕時欵玄圃宫先天本非始後天亦無終自非玄徳人誰􅀎躡竒蹤雨中作孟夏凉風来吹我羅裳衣此服豈不􅁛炎暑方及期婉恋庭中花煌煌有光輝自信好顔色何能與時違􅁳心元化勿為後世􅅓送旌徳劉大火流坤維西風集庭柯積潦不㱕壑浮雲鬰嵳峩山東擁盗賊淛右疲征料嶺外兵不觧湘南及干戈郡縣無良材平人嬰祸羅宓氏弹鳴琴言㳺亦弦􅁔劉子宰旌徳為治當如何題渊明撫松圖抱拙辭下邑曠然􅀗􅀁安孤松臨廣園􅂓且共􅐻桓清晨散逰策日入自當還霜露不相貸時物倐殊􅀚兹植焉􅀁貴昔爲聖者嘆題趙子昂寒翠啚石潤欲生雲山寒疑有雨髙林葉盡脱低篁緑堪数因知静者要更斍王孫苦小草枯􅀣根茸茸欲華予􅀄至京師和荅友人病中見示志士􅁿􅄐别貧賤事多違秋風車馬中故人髙臥時逺客江南至塵土滿素衣既申􅄐合情中多劳苦辞歡咲未幾何感歎已乗之􅁒及田里事復恐疾疢滋亹亹流景􅁶榆桞各変衰偃息􅀉一室朝夕終在兹委運復何言人生信可疑我獨何為者日出暮来㱕重餞何太虗鷄鳴曉色動行人出南郭徘􅆦望車馬飛雪何漠漠巨野四面平中路凄以索黃狐超客過驚䲭向人落結軫赴悲笳凝酸属哀角時逢古人跡因究平生學廽首睇関山低心望􅅾藿􅄐合両不期思懷独難托贈洪􅂙軍兄弟洪氏􅁸遼海流章耀八紘孝友根世斈忠貞自天成入為帝羽儀出秉國鈞衡洋洋髙门居濟濟羅公卿籍甚澄與澜玉貭金爲聲析理貫秋豪摛藻􅃩春晴朝趋承明内暮進賢友生衣錦絡尚絅穆然含粹精􅂕風非求知出爲世􅀁驚竒璞隐崐岫采充清廟英堯湯􅄃群才聖道日光明豈惟殷膚敏祼将在周京蒼天雖云髙乃心此􅀺氓君臣両不易相期㡳隆平君徳貴并包臣道戒驕盈立賢必無方㧞茅思彚征朂㢤敬厥終両賢信國楨送馮尊師還岳陽馮公住天岳夙􅈽丹霞賞結構何威巍連延瞰髙爽飛縈帶遥甸周覧春決􅐯日落長沙明風廽洞庭響事因多病簡道与流年長郡邑費招邀賢豪畢知奨翳然庭中􅀣宴坐􅄫餘想流雲時縱横幽弄自来徃還因採靈薬相覿稽神壌悵望忽言㱕川􅂗日􅁱廣題山水卷梢梢雲木動藹藹烟􅈐乱逺浦引㱕橈㕠厓臨絶岸方思隐淪客􅁒結漁樵伴水濶山更遥幽期􅆰汗漫題清江黄氏池亭亭名玉壼氷新亭環碧池池水何􅃞深偶携塵外佀薄言此窺臨惴惴若有畏憑憑如弗任既􅈽執盈念仍懐履薄心白日䴡清暉微風在逺林洞逹忽無際徵明諧素􅁭還君玉如意理我雲门琴三月晦日送春淂詩字変化無終極形氣逓推移昨日名園中徂春忽在兹曄曄華林彩繁隂緑成帷􅀙結逰女懷祗増志士悲况此客行子風水積川坻撫壮思始榮臨芳念将衰安知盛長後不有堅凝時俯瞰江水流仰与東風期各言早還㱕母劳東山詩題陳椽菊􅏙逹士随􅀁適跡異心恒素時􅀙府中㱕问菊松下路􅀄欣碧叢長復爱繁英布􅈅以古井泉申之九秋露有酒共斟酌無人還獨歩結意常恐非㽞􅌚輙忘暮髙天遥澄穆平川澹容與落日明歸禽踈籬繞蒼􅀣懐芳諒爲羙居榮豈云慕矯首今何時孤雲爲誰去題蘆鴈四首江湖䖏䖏非况汝一身微如何却欲下只合更髙飛自不作㕠飛沙頭呌向誰碧天無限好何䖏不堪随朝飛自作行夜􅀫更成㕠誰􅀎如此鳥和月占秋江寒就江南暖飢就江南飽莫道江南􅁖須道江南好題李陵送􅂫武圖三首一與故人别死生寕􅂧親休言典属國犹淂􅀞麒麟今朝送漢莭迢逓入秦関惟有沙􅂣夢相随匹馬還惨􅌿河梁路参差塞上山誰言是死别日夜望生還題風烟雪月四梅圗逍遥芳􅀣下觧后寒花􅀤立盡晚来風明朝恐成雪髙花開幾􅀧澹靄拂成衣遥瞻􅀿不見相對尚依稀年年霜雪裏得見此花開此花元不筦一任雪霜催玉􅀣臨風好更扵明月宜􅆰山冷相照未必有人知題牧羊啚求牧既已得敗羣還復去白晝捫蝨眠清風滿髙􅀣題草虫啚二首傾陽朝莫同􅁯􅁨􅀊年改􅉕蝶耶得知側翹方采采有竹不必多有荳當自熟坐㸔蜻蜓軰日晏紛相逐再題二首種薬都防􅁨滋蘭搃為春青蛙與蜥蜴何用亦紛紛直莭冝彌堅弱蔓弱􅆰􅆞㣲霜一夕降蚱蜢亦悽然題石頭和尚草庵啚青天不可量好風亦無價試覔庵中人蕭然古松下題何尊師畫牛啚啚惟一牛並無坡岸艸􅀣人物之属莫是度関者寕非喘月時􅃼然天地内誰問復誰知題柯慱士為方叔髙􅀁􅀞墨竹蒼蒼四君子意氣侵雲端六月不敢近䔥蕭風露寒丘氏南􅁜月磯亭明月滿湾碕先生獨釣時漁人渾未識惟恐白鷗知題四梅啚一兼松竹一兼雪月一兼水仙山􅈨一兼蘭與芝小􅈳蒼松側踈籬翠竹間相逄如有約乆立不知還乱蘂逺難分寒香近却聞何人心與迹於此可同羣誰􅀅配水仙更􅁒比山􅈨試問花知否臨風􅀏不言芝草黄金色蘭心紫玉㽔忽􅀙花下見可恨不同時送阿英童㱕揚氏弱女年十三两年失母慈㸔􅕥阿婆去憶着􅀄生時野鴨詞野鳴㕠㕠没􅁿鷗两两浮人生亦如此那有别􅄐􅁨題雪竹􅀄霽啚已􅁬尚􅄐披連朝􅀍壓欹虚心與直莭唯有太陽知題蒲萄翠實􅏂􅀄熟瓊􅄴迸􅁒流向来為酒者一斗慱凉州
