front:
  text: 掲文安公全集􅃃之六
  hash: sha256:7773ed516e11f6f68291f7cae59fc1dc3d556a6e8318b3715a3bfd009e1530b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_006-1a}
body:
  text: 掲曼碩傒斯著門生前進士爕理􅄎化校録制金紫光禄大夫山東行尚書省兵馬都元帥知濟南府事特封濟南公致仕贈効忠宣力佐命功臣榮禄大夫司徒柱國追封齊國公謚忠㐮張榮加贈推忠宣力正義佐命功臣太師開府儀同三司上柱國追封濟南王仍謚忠㐮制朕纂承基緒每思創業之惟艱褒䘏勲勞常恐推㤙之未至况山東諸侯之起皆天下良将之雄既盡厥忠冝豊其報某官沈幾先物遺爱在人方保有齊民已知真主之受命及歸我太祖歴事累朝而致身秣馬南征則孱金亾走㧞劍東指則逆壇就擒握兵柄者餘四十年未嘗􅄭殺臨軍陣者凡数百􅀾動必有功故詔有張相之稱而世任元戎之􅀉雖列􅁟之封猶及扵懸車之日而漏泉之澤未䆒於盖棺之餘况在爾孫復為朕使或守藩維於外或司喉舌於中世䔍忠貞人推謹慎是用因爾山川之履増爾勲號之崇秩既陟扵三公爵仍超於五䓁乃尔自致非朕敢私於戯紫綬金章尚念􅀄来之日丹書鉄劵永膺異姓之王神其有知服此加命可妻齊國夫人宋氏進封濟南王夫人制昔國有東諸侯既封于濟今朕嗣大歴服申爵以王載求齊體之賢冝與􅀙夫之典故某官妻宋氏早以令徳相其良人舉五十萬衆以歸朝歴三百餘􅀾而盡莭分茅胙􅁟傳及子孫襲組彯纓布列中外皆尔相成於警戒用能共濟於艱難是用錫尔郷貴其爵號以䔍尔後以報爾前於戯翟茀魚軒尚服異㤙於永世虎頭燕頷􅀙懐舊􅀅於當年其廸爾家以賛皇國可諸王忽都荅児追封雲安王謚忠武制昔我丗祖親定雲安命九王以鎮之􅀅百年于兹矣乃者國家多故邉圄失宜徤􅀅驕王遂㩀城而稱亂陳師鞠旅方下詔以討平粤有忠烈之臣乃在伯叔之籍爱申褒䘏以慰死生故忽都荅児沉􅋧有謀剛勇獨断三世藩輔蔚爲磐石之宗一心朝廷不􅁯社稷之計方天暦之反正而逺人之未思中䖍則伯忽要盟即飛章而上變鳥撒則僇余既叛先率衆以抗鋒見危而􅁬不頋身力􅀾而継之以死報已後矣朕甚憫焉雖析爵以列侯王何禆地下仍賜錢以給妻子式長予哀鳴呼為子必孝為臣必忠既克承扵我祖無言不酬無徳不報尚永頋于爾􅀖䰟而有知服此休命可諸王羅今䚟追封保寕王謚昭義制臨􅀾陳而思孝必有勇功於板蕩以盡忠斯無愆義徃在諸父羅羅䚟丗鎮南詔心貫上蒼適嬰天暦之兵獨􅀾羅雄之境力竭而援不至兄死而弟亦随山川以之興悲日月為之動色有宗王而盡節冝諸􅀅之同心遂便叛亾無不爼醢非褒卹之獨後属内外之多虞故疇爾庸超五䓁而命爵載考爾行詔百世以易名申錫緡錢以給家属􅀁以昭國典􅀁以􅂆逺臣噫得猛士以守四方孰如同姓明俊徳以親九族尚監異㤙可申命三十九代天師張嗣成制朕惟老􅆅度函谷関未始􅁯於天下㽞侯􅀙赤松子豈果棄於人間式啟聖人神道設教之門遂任天子為民請福之􅀉主其法者代有功焉不逺而朝冝新厥命翊元崇徳正一教主嗣漢三十九代天師太􅀇輔徳體仁􅀿道大真人主領三山符籙掌江南道教知集賢院道教事張嗣成之裔道徳之宗自爾祖之遇丗皇盖有天意泊乃父之於仁庙益簡帝心雖有道之長實係聖明之主而無為之治庶聞清静之風誕播玄休屡昭灵􅀿卿既克承于後朕亦丕劳爾先徃者海水為灾􅂯免黔􅀺扵昏垫近而天時作慝三致雨雪之感通功成弗居禮冝有報噫神仙以忠孝為本尚丗愧於傳賢帝王以天地為心􅂚敢􅁯扵敬徳見􅀁帯職號悉如故進至大聖徳頌表皇帝福䕃裏沍南布衣臣掲傒斯言恭惟正月七日皇太子暨丞相百僚耆耋等以皇帝陛下出撫邉陲入継大統豊功盛徳髙出千古握符御極冝􅀗徽稱即日詣大明殿册上尊號十有一日躬事太室􅀗瑞雪之􅀿二月十有三日詔告天下覃㤙中外天人恊慶日月増華凡具性情莫不欣戴宜形􅁔頌以逹和氣臣傒斯誠惶誠惧頓首頓首臣聞古者聖人之謌莫先扵詩故聖主賢臣有大功􅂋行必載之詠􅁔使天下曉然知君臣之􅀁趋徳化之􅀁由見善而􅁶聞義而起去之萬里如立其朝後之萬丗如生其時􅀁以事神保民無右於此故有虞命䕫以教之周置太師以掌之君臣朝燕必有賦郊廟薦享必登䛴盖詩之為道誦其辞無鈞􅁄樷􅇎之繁聆其音有徃来䟽数之節玩其義有優柔沈藴之㫖其感於人也易其入扵人也􅀷􅆾沴之氣可變而爲祥風甘雨姦回之行可化而爲忠鯁貞良是以聖人尚之故雖反復典謨訓誥之文不若􅁔明良之賡康衢擊壌之謡周南召南之什下至農野婦監一関其耳熈熈灝灝想見其治漢魏以采騷人賦客時時間作雖不能盡追古道其抒情蓄志可興可􅀚斯義緜緜庻幾未泯聖明之丗尤􅀁冝聞欽惟統天継聖欽文英武大章孝皇帝陛下道凖天地徳䋲祖考惠澤周乎無間威稜疊乎八表學前王未究之礼叙洪範載錫之疇孝弟足以厚􅀺民剛明足以制萬幾見賢如已能聞諌如己出惡􅁖如薙草芥好善如嗜飲食􅁢文􅁢武赫赫巍巍冝其克集大勲君臨天下載膺􅂋冊彰厥大猷而耆俊如雲良士如林必有振􅀤毫楮鋪張洪業為一代之盛典若微臣者曽何足云然想像扵丘岑畎畆之中不若覩快扵輦轂之下継漏扵筐箧刀筆之末不若聲諸詠謌之間近可以風動四方逺可以流耀無窮臣自揆才薄迹微無以􅀘益毫髪幸因羇旅􅀗際盛明謹譔聖徳頌一篇繕冩投進雖不足以加天地之大日月之明載之簡牘傳之天下亦可以見聖明徳化之􅀁由也臣無任瞻天樂聖􅈭切屏營之至謹奉表以聞臣傒斯誠惶誠惧頓首頓首謹言皇太后加尊號監脩國史府賀表延祐二年聖主尊親稽先朝之盛典慈闈進號傋昭代之徽稱寳册載􅈾瑶圖永固中賀欽惟儀天興聖慈仁昭懿壽元全徳㤗寕福慶皇太后陛下徳全神厚功底泰寕福莫大扵多祥两開帝業􅂟莫隆扵至飬咸戴母儀式兼崇極之名益衍昌明之祚臣某䓁乆塵台􅂦叨緫國書興聖春融幸仰陪扵大禮含飴日永願丕贊於鴻猷天夀莭監􅁱國史府賀表一人有􅂟節肇紀扵重三萬夀無􅆠位永乗扵九五乾坤薦祉朝野騰􅂬中賀􅂟惟皇帝陛下道大徳純功崇業廣舉賢能興學校天下文明異章服同車書海内率俾􅁢極尊親之孝益􅂭致治之基臣某䓁任忝國鈞軄􅃊金匱􅅾菜宫殿幸依日月之光河圖洛書丕纉皇王之統元旦翰林國史院賀皇太后表延祐三年天子當陽八表􅆢夏時之暦皇闈献􅀊萬年稱元旦之觴雲氣􅅾菜春風宇宙中賀欽惟尊號陛下徳含坤育運啟㤗亨推福􅂟以致崇日星􅂋號􅄎慈仁而恊治雨露羣生隂教􅁱而母道􅂭孝理彰而聖功逺臣某等欣逄盛旦忝綴周行玉署日和􅂅播思齊之羙瑶圖天廣永居長樂之尊天夀莭代䝉古國子監賀表延祐三年一人受命適符上已之辰萬􅀊稱觴載恊壽星之紀照臨􅀁􅀍􅂟抃惟均中賀欽惟皇帝陛下徳猶日中飬以天下暨聲教扵四海俗羙風淳舞干羽于兩階河清嶽晏益體乾剛之用式隆震夙之祥臣某䓁學守國書班聫胄監龍顔日角仰瞻穆穆之光鶴筭亀齡俯效綿綿之祝上再即位奎章閣賀表天暦二年六龍啟運飛躍得聖人之時萬象趋新變化合太平之􅀿普天之下如日再中中賀欽惟皇帝陛下剛徤粹精聦明神武霜露􅥐更而不尖其正乾坤􅂯造而不居其功惟其有帝堯帝舜之聖仁乃能行祖甲祖庚之揖譲慎徽五典則崇孝友以率先表章六􅀴則進儒雅以為本皆天理人心之至當必明君義辟而後知冝暦数之在躬雖同軆而不易况祖宗之大統豈違道􅀁可求是以踐阼之􅀄甘露卿雲諸福畢至及夫明詔之下扶桑若木萬姓􅂬呼􅁢長馭於􅁠網斯永保夫社稷臣某䓁叨聮延閣適際清朝羲畫禹疇􅂅闡皇王之秘虞韶殷輅丕昭禮樂之隆奎章閣賀正表天暦三年大人有造治隆揖譲之餘正月始和􅂟恊􅀤生之妙車書萬國干羽两階中賀欽惟皇帝陛下道接百王統承三正逹夫郊社之禮禘嘗之義躬致其􅃊􅀚乎天地之徳日月之明益躋于聖是用格于上下莫不歸其照臨臣某䓁恭惠西清依光北極君臣父子永敦天秩之常禮樂詩書誕播皇風之盛册皇太子奎章閣賀表重明麗正作􅄐咸仰於皇文一索得男出震允冝於主噐既䟽封於玄􅁟爰正位於青宮􅀁以繫人心􅀁以本天下欽惟尊號陛下敬􅂭郊庙徳裕乾坤當春秋􅂦盛之時建宗社灵長之計惟聦明可以正百辟俾綜樞机惟元良可以貞萬􅀖足副儲􅏗重以群臣之固請聿遵累聖之宏規然監國撫軍教尤資扵四輔而問安視膳禮必謹扵三朝式飬聖功用光帝業臣某䓁婁陪大慶思贊清時迎春日之載陽益臻㤗道瞻前星之有耀永固皇家聖莭賀表陽徳方亨喜太平之有象聖人在宥宜仁夀之咸臻八表同歸萬年惟永中賀欽惟皇帝陛下誕敷文徳克纉武功既尊祖以配天比􅂭三代乃立嫡以主器用貞萬􅀖􅁢昭仁智之端是皆長乆之道臣某䓁叨陪清燕莫贊聖明多夀多男従切華封之祝是􅃔是訓􅂅敷皇極之言奎章閤賀表聖人継軆􅂯昭揖譲之􅂭天下㱕仁大慰平成之望􅂟綿宗社光􅀍華夷中賀欽惟尊號陛下徳秉純乾業承富有妙天人之恊賛􅁢暦数之攸㱕惟上有成康之君下有周召之臣而内􅀗皋䕫之佐則外􅀗唐虞之治荀日躋扵聖敬咸丗篤扵忠貞臣某䓁軄忝西清光依北闕􅀴􅀖論道自有弼於鴻猷飬老尊賢豈無俾扵昭代藝文監賀表明継明聖継聖􅀁以固皇圖長以長賢以賢􅀁以公天下一人有􅂟萬國􅌚心中賀欽惟尊號陛下仰之如天就之如日軆两朝之揖讓有丕丕基開萬丗之􅂭平惟明明后此祖宗之􅀷望亦臣庻之􅀁期臣某䓁地切㤗階㤙聮文苑周爲師而召爲保徳兾邁扵成康稷教穡而契教倫治永躋扵堯舜藝文監賀表一人受命適􅃊踐阼之儀百辟在廷已舉尊親之典孝先天下􅂟衍皇闈中賀欽惟皇太后陛下徳濟艱難功成警威每念鴻圖之重獨􅀷燕翼之謀申揖譲扵中興父而又子導継承扵成命長亦惟賢宜膺至飬之􅂭永極徽称之盛臣某䓁名慚藝苑身際熈朝長樂怡愉􅂅宻扶扵聖治大明照耀庶丕闡扵皇猷藝文監賀表成命以長惟天以啟聖人南面受朝不日而尊大母爱敬之至神明所㱕中賀欽惟尊號陛下如日東升以天下飬雖任􅀉伊霍之重足以􅀤皇明必治資任姒之賢有以基王化尚致怡愉之樂式彰孝弟之風臣某䓁學愧前脩軄􅃊内監仰陪大禮時已際於風雲共戴皇猷夀永齊扵天地掲文安公全集􅃃之六
