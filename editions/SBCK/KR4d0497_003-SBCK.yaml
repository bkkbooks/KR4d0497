front:
  text: 揭文安公全集􅃃之三
  hash: sha256:5434e3f2c1c851737c06ac1a1d2843e457f0cf01fb68d9cd8d1260bd2147e671
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_003-1a}
body:
  text: 掲曼碩傒斯著門生前進士爕理􅄎化校録題明皇出遊啚􅀿制明皇八駿争馳道還是開元是天寳長安花􅀤萬年枝不識韶華􅋨中老奎章閣下文書静冕旒端拱唐虞聖此圖莫作䓁閒㸔萬古君王作金鏡􅀞鷹文梁五色絛秋髙意氣豪怒張兩目直霄漢豈與短翮翔蓬蒿妖狐晝作猛虎嘷騶虞并與神麟逃嗟爾飽食心􅆰劳題張使君棄官學道詩卷至元天子朝萬國任丘使君謝病㱕門前未罷車馬客身上已著朝真衣致君尭舜在豪傑洗耳巢由何是非棲雲􅀚裏青松􅀣唯有白雲終日飛登祝融􅄘贈星上人洞庭南桂嶺北衡山連延瀟岸黒中有祝融如結鬟嵯峨七十二峰間祝融不自知千山萬山自廻環廻環面面芙蓉起祝融正在芙蓉裏􅌂如天仙朝紫皇千官百辟遥相望半夜每瞻東海日六月常飛滿樹霜龍拏鳯攫熊虎躑雲山霧滅何時極我來正值太平時時有山僧似畴昔憑髙一覧四海空草間培塿安足雄盤盤羅漢臺翕翕炎帝宫復恐九天上視我猶井中􅃋風日夜相騰蹙谷老崖堅松栢禿古來鉄瓦盡飄掦山上至今猶版屋山僧􅂆我􅁔我􅁔徒自傷天下五岳嵩中央此山與我俱南疆我今三十始一見北望中原天更長送何太虚南歸窮秋乍到深冬别來己俄然去忽然學士己分修史禄道人特送賣丹錢单車欲􅀤無三日幾䖏同行可百年積雪堅氷愁客路徐州城下便通􅂳憶昨四首天暦年中秘閣開授􅀴新􅕥育羣材宫門待漏常先到􅊰席収書每後囘召試時􅀩天語劳分題不待侍臣催滿頭白雪丹心在太液池􅁁只獨來宫草䓤茸禁􅀣齊日趋延顥對凝暉朝迎歩輦花間立暮送囬銮桞下㱕碧殿東浮蒼巘合金河北引玉泉肥幾廻弘􅂟門前路春氣濛濛欲􅊜衣己己羣儒映璧奎端陽侍燕寳慈西線分學士親臣送詩賜皇姑御手題注酒含春瑶露重承塵轉午錦雲低日斜共出西門道既醉猶􅀎散馬蹄奎章分署隔􅆤紗不断香風別殿花留守日頒中賜果宣徽月送上供茶諸生講罷仍畨直學士吟成每自誇五載光隂如􅂈客九疑無䖏望重華題季安中白翎雀白翎雀白翎雀毎見滦河河上飛平生未識百禽性不敢籠向江南帰􅀉題胡氏園趣亭日與世情逺學人􅂓治生畦􅂼多品􅀋􅀣果各生成野老􅂈偏数山禽近不驚詩書吾􅀁好農圃也湏明題文瑞啚常徳之龍陽居多蜀士祠事梓橦君甚􅃊祠前有池曰景星咸淳癸酉蓮兩葉並蒂者六劉􅀄登進士第延祐甲寅两花並蒂孫以忠登第天暦已已華如甲寅城東三雅湖蓮復三華並蒂海魯丁􅀗獨步丁馮天澤聨貢而􅀗獨步丁登第好事者冩以為啚􅌽予賦詩蓮花復蓮葉並蒂更蓬茎並葉已不見三花两花更有情如何與人作嘉瑞偏向龍陽水底生龍陽家事梓潼君花花葉葉梓潼神好在龍陽士汝但讀書更績文為華為葉汝莫論題南頓孔子復明詩􅃃失明非有故復眀還自然方其失眀時萬事俱棄􅂢外雖無所睹内則常淵淵如未嘗有目不喜亦不憐如明入地中明未嘗不全逍遥天地内如在天地先不助亦不􅁯一氣自周旋不敢計此生敢計時序遷剥乃復之始自坤還自乾忽如浮雲散還我蒼蒼天昔非果失之今亦固有焉如何孔氏家母子仁且賢先後俱失明其復皆十年十者数之終如月晦必圓養之苟有道何疾非􅀁痊􅂅言永保之母或忽此篇奉同柯愽士甘内􅁺下直賦暮出閶闔門觧鞍坐前庭冷冷草露白華月隔林生蟋蟀􅁬哀響鴻鴈流遺聲常恐芳景晏不知寒莭并萬物粛􅀅斂孤懷徒自盈捉衿􅈭長謠凄泊諒難徵賦淂海上雲送良上人㱕􅈳山蕩蕩無􅁁涯悠悠何􅀁之孤飛若有意羣徃更無疑稍拂摶桑􅀣還􅀴􅀂木枝迎陽成五色乘隂忽四垂作態􅄐仍合多情去􅁍追因風􅂈别島和月下蓬池且任從龍去寕知到岸時惟􅀿斈􅆰者􅌿泊與相期吴子髙悼亡㱕岳陽都門落葉滿遊子去京畿忍􅃪􅄐鵉操遙逐秋鴻飛愁霜暁入鏡淚雨夕沾衣烟􅀣黄河㟁風㠶采石磯平沙􅅆渺澷寒雨暧熹微客心閑轉切鄉書近􅁍稀夢聞児女泣行􅀅童僕依竊慕􅃮園放誰云潘岳非乘涛慣不險􅅆江望若圍武昌未易到更向岳陽㱕秋夜作露下氣逾粛月髙寒􅁒流落葉階前􅀣踈鐘城北楼衰年對急景㱕心臨莫秋當世非無意才薄徒淹㽞進士張子髙淂卭州判官㱕成都卭竹山前負努迎去年曽是一書生天寒劍閣猶車馬雪滿䋲橋正甲兵即恐徵求民力竭莫􅀅􅁨患客心并六千餘里関河路不盡􅀷期逺别情題陶渊明㱕興啚家貧無酒飲􅂓􅁒試􅁌􅁔去家百餘里邈若異山河江上日多風浩浩水増波門前五栁􅀣繁䕃􅆰婆娑秫田已収成㱕計當如何􅀉題傅尊師兄弟􅀁作寕壽道院鍾荣之山千萬􅈐琵琶麈湖相疊重两翁入谷起臺殿半亱􅆰山聞鼓鐘猛虎如逄澗􅁁石飛龍却是雲間松黄庭書罷人難見鴻寳披殘手自封度壑采芝随鹿跡登厓望曰躡雲蹤已知塵世惟堪􅀏不是神人㝎少逄辟榖有方桃更羙圍碁無地橘相容但餘一念封人祝未與人間萬事慵二月朔日雪中題歐陽少監􅀁藏宋好古􅀞竹晨朝下延閣貽我翠琅玕微霜著莭劲細霧入林寒欹枝偏􅁛逺壓葉更冝攅􅀌䂖覆逾潤横波晴不乾况兹春雪裏相對五雲端誤當裁汗簡誰擬截漁竿惟應湘浦上㱕共幽人􅀚雲錦溪棹歌七首雲錦溪中雲錦鮮好在髙秋八月天西蜀錦江􅄼得似西湖緑水更湏憐􅅻􅂈浮石是藍溪溪上青山髙復低山中泉是溪中水尋源直到􅂠山西藍溪南去到藍洲水底嶄嶄石不流廽望朱宮雲霧裏白雲􅀷䖏更髙楼宮前梨浦白􅃼茫岸上人家不似墻能到此中還有㡬行人莫厭棹歌長揚金橋望玉真臺臺下橋頭人往来崇文宮裏㸔􅂠去安仁縣裏賣薪回挹僊亭下薛公橋紛紛扺暮更連朝唯有橋西楊與栁無情長繫木蘭橈溪上層層雲錦山垂楊盡䖏是龍灘不是孤舟来逆上何人知道世途難御書雪林二字賜趙中丞􅀿制聖主揮毫臨秘閣親臣執法坐崇䑓祥雲五色􅀙天下彩鳯䨇飛映日来政欲清如林上雪已聞聲􅁬地中雷君臣千載明良㑹咫尺藢垣接上台題胡䖍汲水蕃部啚􅀿制沙磧􅃼􅃼塞草平沙泉下馬滿􅇸盛曽扵王㑹啚中見真向天山雪外行聖徳只今包宇宙􅁁庭随䖏楽農畊生綃半幅唐人茟留與君王駐逺情題辛澄蓮華􅀚音像􅀿制至人不可測宴坐青蓮華珠纓􅀍玉體白豪貫彤霞􅀙何得此相来置玉皇家杜莭婦詩結髪事夫子白首以相期諧宴方婉娈生􅂮遽分離室中無長男堂上無老姑生計日蕭條誰分心不渝良馬不乱羣仁鳥不乱行昔者為夫婦今忍遂相􅁯生為董家女􅂮作杜家婦安能若流水東流復西注春秋陳時祀蘋藻宿􅀁共一朝􅀕無主焉得不忡忡灼灼庭中花落落俱為實賤妾在􅆰閨志願􅀙此畢題内府畵四首􅀿制韓滉土星像五行􅁟居中百獸牛有功土行降為神􅀐牛􅄠翁翁有土復有牛惟神賜年豊誰知韓滉意政與皇心同曹􅀅軍下槽馬啚􅈠覇􅀞馬真是馬宛頸相摩槽􅇫下卓犖権竒果如此豈有世上無知者朱絲不是凡馬韁天閑十二皆龍驤曽従天子平四方􅀞啚仿佛餘驪黄華山之陽春草長韓幹馬韓幹畫出􅈠􅀅軍幹惟畫􅁏猶逼真昻藏囬頋􅁒飛去老奚安知馬有神想當此馬未畫時朝刷吴越莫燕秦頓轡長鳴風動地不数驊騮與騏􅂹當時用舍那知許粉墨蕭條尚雄武千金駿􅇧何􅁕論萬丗長留羣玉府宋徽宗成平殿曲宴蔡京啚御畫御記東亰諸蔡滿周行延福成平楽未央十畆松篁籠玉殿九霄風露􅊜霓裳君臣契合同尭舜礼楽光華邁漢唐明日圖成仍作記千秋留與監興亡送秘書李道濟赴峡州幕蓬莱道山芸閣裏赤甲白塩蓮幕中千載同朝君獨去三年佐政我难同大河水滿中宵雨鉅野樹凉清曉風夷􅁜江頭㡬日到迎親􅀿先南飛鴻奉送全平章赴江西聖主㤙南土明公􅁸集賢直期凋瘵後共致太平年金虎分符重文龍賜服鮮􅁠綱兼􅀅相標格近神仙天地三江外星辰北極邉丹心齊出䖏素志在陶甄請述江南事都非大德前但徼扶弱美竟坐抑強偏無復同􅁨楽徒令舞智􅁠平疇吹渤澥暗室伏戈鋋貪虣明相訓忠良黙自憐民心随日壊世態与時遷况復兵饑接仍闻疫癘􅆞誅求殊未巳蟊賊轉相挻􅀂擬寛􅁨頋先湏觧倒懸久飢寕择食多病但求痊一語堪懲􅂆㣲機足轉旋巳知平似水更道直於􅁌遥想間公至渾如望􅀊然九重天上别百丈霧中牽日月明金莭山河入畫舡四方􅀄息馬五月正鳴蝉豊樂田多􅁰生香濼有蓮岱宗標魯地廬嶽壓湖天水恠収崩浪山灵掃瘴烟􅂬呼麟鳯出踴躍吏民先笳鼓趋雄鎮旌旗覆廣川下車和氣􅀿䄂手頌聲延膏雨侵淮甸仁風扇海壖忠貞真世篤調燮有家􅀓赤子皆同体蒼生且息肩龔黄湏警䇿方召在蕃宣題青山白雲啚䔥寥青山暁迢逓白雲生衆􅀣春已暗髙原人未畊方思看桃去復儗采苓行􅅧谷無机事白􅄠枕松聲桃花鸚鵡嶺外􅀴年别花前淂意飛客来呼毎慣主爱食偏肥才子憐紅嘴佳人學緑衣貍奴亦可怕莫自恋芳菲趙孝子廬陵趙孝子四􅀊父行賈一去三十年家惟大母母大母已云􅃿而父行不帰兒長亦有婦母子􅂓相依􅀙父自北来汝父乆已死母子哭且問父死何鄊里聞汝父死時不知汝父䖏汝但􅁒往問京師多舊故􅂯􅕥别阿母行行至京師自念不見父兒死無㱕時乃有曽老者往昔與父善言汝父死䖏濵州利津縣徒跣二千里薄言至利津朱琪張文軰一一陳􅀁因死以某年月塟以某木棺姓名某􅀁題近在城南端城南􅃁叠叠翳然榛莽中極目千萬塜能誰識其蹤行􅂘七日餘􅁒死下得􅀁生者無由知死者豈能語觧􅄠繫馬鞍負之墳墳􅂈吾父倘有知􅄠觧鞍自堕俄至一墳前鞍堕􅄠自觧開墳見前和題字宛猶在既見父姓名痛􅅸心始安函􅇧陳野􅀕禽鳥聲為酸隣老四面来驚歎未曽有相帥報縣官縣官駭之乆即日上大府大府咸異之次苐聞中朝行子正南馳行子行且傷􅂘踴如􅀄䘮路遥山川阻何時至故鄊故鄊既云至塟􅀕無違礼母子永不􅄐萬事若流水聞者盡称孝見者皆感泣期爾百􅀊昌望爾百禄集兒今一無願願母長不老􅀊歳父墳前洒飯墳上草題姑蘇陸友仁􅀁藏衞青印白玉蟠螭小􅂐文姓名識淂衞􅀅軍衞􅀅軍今何在白草􅃼􅃼古時塞􅀅軍功業漢山河江南陸􅀰古意多廬山連尊師求真陽詩久諾而未作也一夕夢中得之因書以贈稽山之浸不可滅焦石之烈不可絶香炉峰頭按羽莭滿山桃花滿湖月贈項鍊詩吾聞有一士邈在呉越間􅀐虎滄海上茹芝天台山年約四十餘七里布其冠燕趙雖曠絶倐忽一徃還樵子常見之􅈳去不可攀又聞好賣藥徃徃在市闤疾者得寸􅍰立欲生羽翰吾常慕其人咫尺限河関道書讀萬􅂈不如一承顔弱志揜昏氣卑卑逐王官何為浪自苦食息扵人寰送郷人祐上人􅀙師㱕當陽學道玉泉寺􅀙師天子都流年春亊半㱕路客帆􅀌山势遥連蜀江聲不入呉故園如可到種芋有遺區送蘇尊師㱕茅山華陽隠居者聞復有蘇仙時向梅花下髙枕石頭眠劍匣出飛電琹心流暗泉閑来京闕下夜夜夢雲邉􅀉題張齊公廟東安猛將張齊公十八奪父軍囚中至元召募起亡命父子南伐􅀵竒功酒酣一躍馬上立㧞劍四顧犇雷風十年轉戰江漢上萬里直挽安南弓乾清坤夷四海一勲在旂常心帝室身封萬户傳子孫誓不偷生汙天秩天下豊盛大徳年天子明聖宰相賢小臣劉􅀷射功利上䟽自薦能開邊􅀑方寡婦號八百嫂叔操戈自爭國劉􅀷一言取大官逺帥官軍陵險阨五溪運粮数萬家􅂘聲震動湖南北發徒開道徑折節既勤其民大求索斗量金珠谷量馬谿壑之欲安可塞此時張公亦在行捐軀力諌皆莫克折節薄險㐲四起劉深夜遁張公死鳥飛不度山川愁坐看英雄化爲鬼乃知自古守邊鄙大忌邀功貴寕敉張公廟食東海頭劉􅀷梟首蛮􅃄裏張公世爲忠孝門劉􅀷萬年穢青史両家同死不同心試與題詩作臣􅁤題李安中白翎雀白翎雀白翎雀毎見滦河河上飛平生未識百禽性不敢籠向江南歸􅀉題楊教授菊荘歸人種菊處乃在東海涯幽香􅀤清直正色間竒葩百種猶未愜千株寕足多寒分石橋月晴通赤城霞特起表隂戺羅生騁陽阿門巷掩蒿菜荒徑絶經過飲露咀其英孰知年􅀊遐番昜䔥性渊携其祖將領所爱唐琴號霜鍾者還自和林求詩六月三日五門宣赦後作嵩州昔有䔥將軍讀書學劍天下聞南隨龍馬渡江去尚有􅀌琹傳子孫􅀌琹云是唐人斵昔日軍中自行樂至今猶存殺伐聲一鼓哀風振寥廓􅀅軍之孫才且良文能作賦武蹶張秦皇城下飲白馬祁連山中射白狼時平好文不好武抱琴却歎儒衣誤昭王臺上看青春彭郎矶頭夢歸路日長史館幽且閑正冠拂琴為我弹京城六月日如火霜鍾半夜鳴空山南風自有虞廷操可惜同心不同調捐琴决眼望青天今日天門有新詔送王伯循編修赴南䑓御史朝辞禁苑暮南䑓驄馬翩翩道路開佐邑巳知為治最經􅀖正頼濟時才人情好惡非相逺民力凋殘實可哀鵰鶚秋天湏􅅮擊郊原恐有鳯麟来􅀉題鄴下樊氏鍾秀園鄴都雄地理樊氏好園林庭户花陰合池臺樹色深佳時惟飲酒永日自弹琴車馬如相訪流泉可洗心題廖氏皆春堂時清日月明心和寒暑平東風扇萬物華問語流鸎農興水􅡄動􅅙起桑柘荣牛羊􅀍原隰麟鳯在郊坰少者擊壌歌老者鼓腹行不知天壌内何物異吾生常願天子聖四海無苛征䕫龍滿廊廟簫韶歌九成大􅀬疾势危甚項君子虚視之一藥而起為賦五言一首為謝天台項子虚乃是列仙俦賣薬都市中疑是韓伯休欲見不可得不見忽相求神清􅇧秀聳蒼松􅀝丹邱乂如霜空月下照千丈流時有掲子者卧病城南陬馳往施寸匕大暑生清秋人言死復生仰視行雲浮長揖忽不見思之生白頭周氏敖山驛水木清華亭周家亭子敖山上断隴連岡紫翠開晴日捲簾幽鳥下微風􅀝柱白雲来松間漁艇時俱放竹外樵歌晚獨囘咫尺紅塵車馬地已如弱水限􅅾莱題趙照磨虚舟刳木作􅀌舟乗風到處逰寕求觸無怒政用載能浮㱕共唯明月行隨只白鷗浩然江海上何惧復何􅁨送毛真人還龍虎山手綰銀章主秘祠翩然㱕去忽如遺麈湖龍井雲間上鳯曲鵉歌月下龡香逐蘅薇􅀷更入氣交梨枣静偏宜南屏風雨平坡雪争似山中夢斍時南屏山在上都南七十里􅀊扈􅀙至上都夏秋居焉平坡在大都西四十里西山之上冬春居焉盖皆所掌秘祠􅀁在故中憲大夫嶺北行省左右司郎中蘇公志道哀詩蘇公廊庙姿推擇起為吏論議動引經夅措必由義惟時方大旱謂咎在􅁈滯决獄天乃雨凶年化豊􅀊流聲滿山西憲府立羅致慷慨平生懐遂佐直指使受命按邊鄙正色行使事邊臣既威服使亦免顛躓六曹收雄材兩府資逺器激昻天下事徃徃見謀議十載拘􅁺曹弥年困文字雖云冨匡賛豈足盡材藝一命厠省僚勾稽得深􅁦銓選班爵冘出入錢榖細並縁出多門穿穴肆姦利有如水上萍驅去還復至因風一披蕩蹔得免䝉翳再命主賊􅈠持平獨丕蔽恒求情中實動究法外意功罪必誅賞善􅁖俱惕厲三命􅂙宥宻令聞益昭晣和林跨大漠肇造此根柢東際瀚海頭西控流沙裔北窮陰山外南掎兩都势連營列萬里倉庾千萬計鎮以磐石宗重以分省􅀉憶昔大德末成庙方厭世桓桓忠献王功大更多智武皇既踐阼宫闕始清閟越邸矜微劳􅃂極心乃異國有社稯臣讒乃惑聪睿遂輟股肱任往重蕃屏繫有威如雷霆有㤙若元􅂔畊鑿比中土什伍相錯置士忘逺戍苦民見太平治道路無拾遺商旅畢懐惠忠献一朝没武皇亦遐棄駸尋延祐中權相擢天位磨牙吮人血掉尾恣狂猘戕賊􅇧􅁏親迫逐見危墜天人共震怒降灾及兹地大雪深丈餘人馬相枕斃重為朝廷􅁨夙夜靡寕志除吏超五等聞者盡驚避蘇公􅕥􅀰中即日辞九陛厚禄非􅀁荣髙爵非􅀁貴彼民亦天民安得皆坐視兼程到官􅀁彂廪急周濟死者何嗟及存者􅂯生遂閭閻漸蘓息竭力􅀘黥劓飛書九重天請爲兵民傋募粟實塞下慎勿憚旁費天子賜问劳名王致金幣至今頼長䇿當時已多忌如何方賜環及囯竟長逝都人走相哭行子爲歔欷崩騰朔風迅􅆭澹浮雲曵蒼松㧞其根黄鵠鎩其翅幸哉有令子名巳注簡記千秋常山下豪傑一揮涕題羅稚川􅀁畵臨川羅益謙溪居啚迢遰臨川郡泱􅐯元献里溪上君子廬闲户青林裏連山烟景晏断岸寒沙靡日暮􅀌舟還􅂽村隔流水􅀉題武寛則湖山堂祝融九千七百丈六月飛雪灑洞庭攸與學者武寛則石鼔齊中窮六􅀴氣横瀟湘波浪白思入嵩華􅃄雲青四千餘里到京囯倒挿五色鳯皇翎河西猛将今太尉一見握手坐廣庭立呼爱子俾受業豈獨汝斈我亦聼猨肩虎頭日侍側長刀大劍羅青熒動陳忠義破肝胆衆目睒䁑開心扃丈夫乖遇豈偶尔縦不我聴我則寕嗟予官冷材力薄毎辱竒俊哀竛竮天晴風静輙􅂈我如病淂瘥􅋨得醒不為湖山劳夢寐不為冨貴疲心形始知卓識出天性豈彼狗苟蝇營營方今䕫􅆏滿廊庙洪㤙屡降無濫刑長材用世何不可大夫列卿如拾螢居如得位立行志慎勿斈我空惺惺我今老矣何􅀁称白雲深谷寒烟汀十月十八日夜南郊齋􅀫夢先帝召見便殿手賜橘花一枝有感而作淚盡烏號不可攀傳宣忽降白雲間天華拜舞君王賜夢断斋廬月滿壇􅀉題上饒鄭氏菊荘上饒多隠者鄭氏善為方移居倪陽里種菊今成荘近取徧吴椘逺求至帝郷品􅁼百十餘顔色不可常溉以玉井泉樊以柳與楊晨興即造之不􅁨露沾裳有時􅁯飢渇餐之以為粮門無催租吏家有白玉􅀰花前撫鳴琴花下列壷觴興至輙痛飲飲罷卧其傍自謂淂菊趣不知與菊忘但恐秋景晏繁露結為霜盆盛虚室中虗室仍面陽重􅄕護夕氣踈牖逗朝光乱以青蒲盆水石儼成行重淂隠者心不辱桃李場玩物焉􅁕計􅀊晚託餘芳題四清啚一清曰王右軍平生冨事業獨以能書聞遂令吳越士至今斈者猶紛紛于嗟乎王右軍二清曰軒轅弥明偶然吟石䁀狂恠使人驚遂令韓吏部至今􅄭得狂恠名于嗟乎軒轅弥明三清曰王川子忍窮吟月蝕天高呌􅁒死獨對烹茶婢白頭赤脚老無齒于嗟乎王川子四清曰林和靖周程明聖斈韓范輔王政獨對玉梅花山色湖光耿相映于嗟乎林和靖題新安許氏蘭秀軒蘭生兮深谷潄流泉􅀆䕃喬木緑葉兮披披玉􅆬兮紫㽔植之􅀆堂下播芳馨兮菲菲菲菲􅀆揚揚思君子兮髙堂縆琴瑟兮會友嘉肴苾兮薦芳襲芳兮佩秀宜君子􅀆多寿夢題墨梅霜􅆰㝠㝠江水暮江上梅花千萬􅀣無端折淂一枝㱕一㕠蝴蝶相隨飛􅀉題永豊劉氏暖翠亭􅀌亭萬竹中危坐自生風近與山光合遥連野氣通鳥啼􅀷不見泉響静偏聦束帛休相汙先生道未窮雞山俯鷲溪亭子畵堂西流水茭蒲合陽林竹樹斉畊􅃄幸外集􅀫客自中携萬事俱塵􅁟詩成手自題􅀉題信州徳元􅀚何真人林園長春亭長春亭榭􅀝雲開百里湖山入座来渌水繞階時自照好花如幄手親栽青雲每指尋真路白􅄠頻登望母䑓墓在前山六月神龍􅁸潭井人間幾䖏待風雷題信上人春蘭秋蕙四首􅀷谷暖雲飛重巖花􅀤時非因采樵者那得外人知􅀌芳不作榦奕葉自􅅤滋白石蒼苔路落花流水時山􅀷風露冷何䖏有花開直入雲林去香㳂石澗来幽樷不盈尺􅆰谷為誰芳一􅈳寒雲色滿林秋露香蔡七祖真人淂朱文公􅀁書讀書二字以名其斋諸賦今人題遍古人書孔李通家意未䟽萬箇猶嫌栽竹晚百圍曽見種松􅀄黄庭義宻􅀙心得白髪身閑對客梳近有方平消息否紅蓮成碧藕成車送隂陽蕭教授赴瀏陽青草茫茫接洞庭瀏陽江上好談􅀴遥瞻紫盖為南嶽仰見長沙是寿星日晏投書招椘客亱䦨皷瑟感湘靈下􅄕髙坐金錢滿勝買塩梅􅀉在廷賦淂春鴈送張􅀰中省覲􅀭州東風吹㱕鴈􅄐􅄐翔天側朝􅀤衡陽浦夕􅂈隂山磧嘹唳浮雲中萬里才一息眷言思親者相望有南北送聶太祝赴潮州録事聶天暦潜邸舊人三載􅀙容礼楽間糾曹新􅕥度梅関春風忍􅂈金陵道夜月重􅀴黄木湾盗賊数州相􅀿起甲兵諸道幾時還憑君細講安民策莫遣邊防一日閑題俞氏看雨軒㵕􅌿来何䖏崩騰忽滿城遥連四山黒近灑半江明可爱華間􅊜偏宜竹上聲中宵未可住髙枕􅀉餘情題江道士清虚舘遺紛極􅀇覧宴坐白玉京日月朗朝夕河漢流無聲冉冉両玉童㕠吹紫鵉笙下視九九州浮以四大瀛萬刼猶一􅕿逍遥楽太清賦淂吴歌送人㱕吴中三月酒如渑髙堂絲竹停繡筵㕠鳯影珠箔乱鶯聲疊􅀿紅牙拍辞傳金􅈁名綵雲􅊠不度芳塵暗自驚花􅀤長洲苑日照闔閭城且􅆢千金夀寕􅁯萬里情
