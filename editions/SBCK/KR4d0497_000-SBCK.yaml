body:
  text: 􅃃之一詩臨川女夏五月武昌舟中張君壽隐居送趙􅂂道虞叔常􅀉題壽安堂留别盧學士黄尊師高軒衡山縣曉渡瀟湘八景圗瀟湘夜雨逺浦㠶歸烟寺晚鐘洞庭秋月平沙落雁漁村晚照山市晴嵐江天暮雪以事如武昌女兒浦歌送尹十六送黄五舅貧交行曉坐别武昌南康夜泊春日七首夢雨夢武昌逰麻姑山雲関飛練亭湧雪亭三峽橋麻姑壇懐盧學士病夜得程翰林消息歸故園二首山行􅀉題東臯園亭宿梁安峽送趙仲逺山荘晚立哭王十雨述三首春暮閑居長風沙夜泊何􅀰失鏡詞贈青城矦尊師贈友曉出順承門京城閑居八首去婦詞四友詩賦㕠陸泊安􅂟漁父髙郵城濟州􅀄度楊栁青謡雜詩四首栢堂詩􅃃之二詩獻張平章題先天􅀚圖二貞詩史舘獨坐致楽堂詩馬氏巖溪圗山水圗送道士薛􅀇卿大明殿退朝祖生詩􅀌雌行燕氏救兄詩送華尊師送馬雍古送周山人李宫人琵琶引題墨竹王開府八十别牟景陽結羊腸詞劉大司徒九十小􅀌山贈别曽編修題范氏寓居尋舍弟贈王􅀰山水圗送道士薛􅀇卿大明殿退朝祖生詩􅀌雌行燕氏救兄詩送華尊師送馬雍古送周山人李宫人琵琶引題墨竹王開府八十别牟景陽結羊腸詞劉大司徒九十小􅀌山贈别曽編修題范氏寓居尋舍弟贈王􅀰沈􅇣人招飲􅀞鴨題聶氏陶軒送涂雲章歸舟小􅀌山曉􅀤大信晚泊白楊河㸔月歌風䑓題嚴陵獨釣鼯䑕食􅀲圗􅂘徐尊師送蔡思敬孔林圗詩壽檪山詩壽王樞宻李将軍歌題桃源圗送人歸豫章送王留守題張尊師畵送楊宣慰􅀉題畊雨亭􅀉題心逺亭寒夜作送唐尊師送詹尊師贈淳貞子􅀌松篇􅂈何得之故居五首送譚仲章我我亭詩送鄭司獄題山水題御馬圗題山暉圗題流民事蹟􅀉題真村堂送人從軍題淵明歸去來圗􅃃之三詩題明皇出逰圗􅀞鷹題棄官學道詩登祝融峰送何太虛南歸憶昨四首題白翎雀題園趣亭題文瑞圗題復明詩􅃃同人下直賦賦海上雲吴子高悼亡秋夜作張子高歸成都題淵明歸興圗􅀉題寕壽道院題宋好古墨竹雲錦溪棹歌七首御書雪林􅀿制胡䖍汲水蕃部圗辛澄蓮花觀音杜節婦詩韓滉土星像􅈠将軍下􅵝馬圗韓幹馬宋徽宗宴蔡京圖送秘書李道濟送全平草題青山白雲圖桃花鸚鵡趙孝子題衛青印真陽詩贈連尊師贈項錬詩送祐上人送蘓尊師􅀉題張齊公庙題白翎雀􅀉題菊庒題霜鍾琴送王伯楯題鍾秀園題皆春堂謝項子虛周氏水木清華亭題虛舟送毛真人蘓志道哀詩題溪居圗寄題湖山堂夢先帝賜橘花􅀉題鄭氏菊庒題四清圗題蘭秀軒夢題墨梅􅀉題暖翠亭二首􅀉題長春亭題春蘭秋蕙四首題讀書亭送蕭教授送張􅀰中送聶太祝題㸔雨軒題清虛舘吴􅁔送人歸呉中􅃃之四詩續􅀁藏逺山圗題陳氏松巢圗桂林􅁔湖南憲使盧學士移病歸潁舟次武昌辱問不肖姓名先奉􅀉三首大徳七年黄鵠聼雨贈别李時毅送姜尚志逰禅林寺逰麻原苐三谷送雷山人送孫志言贈髤者黄生送管録事􅀉别郭教授和馬伯庸二首重送曽應􅆢諸君子熊英德哀詞雜詩五首寓興五首雨中作送劉旌德題淵明撫松圗趙子昂寒翠圗􅀄至京答友人重餞何太虗贈洪􅂙軍兄弟送馮尊師題山水􅃃題玉壺氷亭三月晦日題陳椽菊逕題蘆鴈四首李陵蘓武圗風烟雪月四梅圗題牧羊圗題草䖝圗二首再題草䖝二首題草庵圗題􅀞牛題何博士墨竹邱氏月磯亭題四梅圗送阿英野鴨詞題雪竹􅀄霽題蒲萄􅃃之五詩續飲酒萹從他痛詞吴􅁔贈許道士題小􅅾莱黄母呉氏挽􅁔送墨工潘生送純真子還山漁樵問答圗題劉商􅀚奕圗題㕠龍圗題玉笥少題禱雨詩􅃃􅀞鷹送張使君題春龍聴雷圗蔡氏四適堂題山水圗送黄判官和十二辰詩􅀤臨湘得風聞西師㨗二首漢荼陵矦庙泉水嶺作二首北楼雪後聞熊從嘔血亡待潮題吴越王手帖􅃃之六制表齊􅀦公謚忠衮張榮追封濟南王仍謚忠衮制妻齊􅀦夫人宋氏追封濟南王夫人制諸王忽都荅兒追封雲安王謚忠武制諸王羅今觸追封保寕王謚昭義制申命三十九代天師張嗣成制進至大聖徳頌表皇太后加尊號監修􅀦史府賀表天壽節監修􅀦史府賀表元旦翰林􅀦史院賀皇太后表天壽節代蒙古􅀦子監賀表上再節位奎章閣賀表奎章閣賀正表册皇太子奎章閣賀表聖節賀表奎章閣賀表藝文監賀表藝文監賀表􅃃之七書上李秦公書與尚書右丞相書荅胡伋仲書與蕭維斗書􅃃之八序吴清寕文集序豊水續志序䔥孚有詩序孔氏譜序重修揭氏族譜序送劉旌德序通鑑綱目書法序范先生詩序書王􅂦翁文集序城南宴集詩後序送胡伯友拜孔林序送張椽序送陳文學序贈醫士湯伯高序夷白先生集序純德先生梅西集序送陳叔永南歸序送族子時益赴南康主簿序送李克俊赴長興州同知序送劉真叟赴廣東憲幕詩序宋史論序􅃃之九序送劉以徳赴化州學正序送張都事序送藝林庫提􅀧畢申逹棄官歸飬詩序送也􅄩荅兒赤序沇溪先生文集序無底書囊序臨江路張同知自然頌序送欒元溥序送彭仲賓赴水廵檢序􅃃之十記富州重修學記一全州學記舒城縣龍眠書院記􅃰州孔子廟禮器記增城三皇廟記建都水分監記安福州東嶽廟記浮雲道院記撫州靈感廟記胡氏園趣亭記楊氏忠節祠記孝通庙記易州定興縣城隍庙記􅃃之十一記廬江縣學明倫堂記靖州廣徳書院記廣州增城縣學記陟亭記善餘堂記進德堂記常州通真􅀚修道記􅀽州宜春縣逢溪山聖壽寺記廬陵縣丞馮君修造記昭勇庙巷雪楼記法印寺記冲􅀇􅀚記彭州學記􅃃之十二碑墓誌大元􅃯賜修堰碑重建濟州會源牐碑天華萬壽宫碑臨江路玉笥山萬壽承天宫碑􅃯賜漢昭烈帝庙碑㕠節庙碑龔先生碑嚴先生碑楽邱碑􅃙賜正奉大夫江南湖北道肅政廉訪使董公神道碑趙功可墓誌銘奔清甫墓誌銘䖏士楊君墓誌銘􅃃之十三墓誌銘饒隐君墓誌銘蕭景能墓誌銘鄭隐君墓碣楊隐叔方墓誌銘楊隐君叔宏墓誌銘甘景行墓銘故荣禄大夫陜西等䖏行中書省平章政事吕公墓誌銘奉議大夫平江路嘉定州知州甘公士亷墓誌銘故贈奉訓大夫滕州知州飛􅀐尉追封滕縣男文君墓銘逸士徐君墓誌銘逸士陳君墓誌銘何先生墓誌銘靖逸䖏士熊公墓誌銘劉先生墓誌銘劉福墓誌銘吾讀吾書齋銘孝友堂銘潭心齋銘思無邪齋銘讀書䖏銘忍恕堂銘方寸間銘􅃃之十四雜文天馬賛仙茅述静虚觧楊楚經字説題昔刺史宋啚後題邹福詩後幽憂賦故叔父常軒五府君哀辞九招一首為故嗣漢三千八代天師張留公作􅀕趙供奉文附李節婦􅀓桂陽縣尹范君墓誌銘
