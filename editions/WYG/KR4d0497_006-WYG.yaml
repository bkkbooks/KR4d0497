body:
  text: 文安集卷六元揭傒斯撰制表金紫光禄大夫山東行尚書省兵馬都元帥知濟南府事特封濟南公致仕贈効忠宣力佐命功臣榮禄大夫司徒柱國追封齊國公謚忠襄張榮加贈推忠宣力正義佐命功臣太師開府儀同三司上柱國追封濟南王仍謚忠襄制朕纂承基緒每思創業之惟艱褒䘏勲勞常恐推恩之未至况山東諸侯之起皆天下良將之䧺既盡厥忠宜豐其報某官沈㡬先物遺愛在人方保有齊民已知真主之受命及歸我太祖歴事累朝而致身秣馬南征則孱金亡走拔劒東指則逆璮就擒握兵柄者餘四十年未甞妄殺臨軍陣者凡數百戰動必有功故詔有張相之稱而世任元戎之寄雖列土之封猶及於懸車之日而漏泉之澤未究於葢棺之餘况在爾孫復為朕使或守藩維於外或司喉舌於中世篤忠貞人推謹慎是用因爾山川之履増爾勲號之崇秩既陟於三公爵仍超於五等乃爾自致非朕敢私於戱紫綬金章尚念初來之日丹書鐵劵永膺異姓之王神其有知服此加命可妻齊國夫人宋氏進封濟南王夫人制昔國有東諸侯既封於濟今朕嗣大歴服申爵以王載求齊體之賢宜與從夫之典故某官妻宋氏早以令德相其良人舉五十萬衆以歸朝歴三百餘戰而盡節分茅胙土傳及子孫襲組彯纓布列中外皆爾相成於警戒用能共濟於艱難是用錫爾鄉閭貴其爵號以篤爾後以報爾前於戲翟茀魚軒尚服異恩於永世虎頭燕頷從懐舊將於當年其廸爾家以贊皇國可諸王呼圖克岱爾追封雲安王謚忠武制昔我世祖親定雲安命九王以鎮之將百年於兹矣乃者國家多故邊圉失宜健將驕王遂據城而稱亂陳師鞠旅方下詔以討平粤有忠烈之臣乃在伯叔之籍爰申褒䘏以慰死生故呼圖克岱爾沉鷙有謀剛勇獨斷三世藩輔蔚為磐石之宗一心朝廷不忘社稷之計方天厯之反正而逺人之未思中慶則巴古要盟即飛章而上變烏撒則僇余既叛先率衆以抗鋒見危而奮不顧身力戰而繼之以死報已後矣朕甚憫焉雖析爵以列侯王何禆地下仍賜錢以給妻子式表予哀嗚呼為子必孝為臣必忠既克承於我祖無言不酧無德不報尚永顧于爾邦魂而有知服此休命可諸王羅羅岱追封保寧王謚昭義制臨戰陳而思孝必有勇功於板蕩以盡忠斯無愆義往在諸父羅羅岱世鎮南詔心貫上蒼適嬰天厯之兵獨戰羅䧺之境力竭而援不至兄死而弟亦隨山川以之興悲日月為之動色有宗王而盡節宜諸將之同心遂使叛亡無不爼醢非褒䘏之獨後屬内外之多虞故疇爾庸超五等而命爵載考爾行詔百世以易名申錫緡錢以給家屬所以昭國典所以勸逺臣噫得猛士以守四方孰如同姓明俊德以親九族尚監異恩可申命三十九代天師張嗣成制朕惟老􅆅度函谷關未始忘於天下留侯從赤松子豈果棄於人間式啓聖人神道設教之門遂任天子為民請福之寄主其法者代有功焉不逺而朝宜新厥命翊元崇德正一教主嗣漢三十九代天師太元輔德體仁應道大真人主領三山符籙掌江南道教知集賢院道教事張嗣成神明之裔道德之宗自爾祖之遇世皇蓋有天意洎乃父之於仁廟益簡帝心雖有道之長實係聖明之世而無為之治庶聞清靜之風誕播元休屢昭靈應卿既克承於後朕亦丕勞爾先往者海水為災再免黔黎於昏墊近而天時作慝三致雨雪之感通功成弗居禮宜有報噫神仙以忠孝為本尚毋愧於傳賢帝王以天地為心曷敢忘於敬德見所帯職號悉如故進至大聖德頌表皇帝福䕃裏江南布衣臣揭傒斯言恭惟正月七日皇太子暨丞相百僚耆耋等以皇帝陛下出撫邊陲入繼大統豐功盛德高出千古握符御極冝獲徽稱即日詣大明殿册上尊號十有一日躬事太室獲瑞雪之應二月十有三日詔告天下覃告中外天人協慶日月増華凡具性情莫不欣戴冝形歌頌以達和氣臣傒斯誠惶誠懼頓首頓首臣聞古者聖人之謌莫先於詩故聖主賢臣有大功顯行必載之詠歌使天下曉然知君臣之所趨德化之所由見善而遷聞義而起去之萬里如立其朝後之萬世如生其時所以事神保民無右於此故有虞命䕫以教之周制太師以掌之君臣朝燕必有賦郊廟薦享必登謌蓋詩之為道誦其辭無鈎棘叢雜之繁聆其音有往來䟽數之節玩其義有優柔沈藴之㫖其感於人也易其入於人也深乖沴之氣可變而為祥風甘雨姦回之行可化而為忠鯁貞良是以聖人尚之故雖反覆典謨訓誥之文不若歌明良之賡康衢擊壤之謡周南召南之什下至農野婦豎一闗其耳熈熈灝灝想見其治漢魏以來騷人賦客時時間作雖不能盡追古道其抒情蓄志可興可觀斯義緜緜庶㡬未冺聖明之世尤所宜聞欽惟統天繼聖欽文英武大章孝皇帝陛下道凖天地德䋲祖考惠澤周乎無間威稜疊乎八表舉前王未究之禮叙洪範載錫之疇孝弟足以厚黎民剛明足以制萬㡬見賢如已能聞諌如已出去惡如薙草芥好善如嗜飲食允文允武赫赫巍巍冝其克集大勲君臨天下載膺顯册彰厥大猷而耆俊如雲良士如林必有振發毫楮鋪張洪業為一代之盛典若微臣者曽何足云然想像於丘岑畎畆之中不若覩快於輦轂之下繼漏於筐箧刀筆之末不若聲諸詠歌之間近可以風動四方逺可以流耀無窮臣自揆才薄迹微無以補益毫髮幸因覉旅獲際盛明謹譔聖德頌一篇繕寫投進雖不足以加天下之大日月之明載之簡牘傳之天下亦可以見聖明德化之所由也臣無任瞻天樂聖激切屏營之至謹奉表以聞臣傒斯誠惶誠懼頓首頓首謹言皇太后加尊號監脩國史府賀表延祐二年聖主尊親稽先朝之盛典慈闈進號備昭代之徽稱寶册載膺瑶圖永固中賀欽惟儀天興聖慈仁昭懿壽元全德泰寧福慶皇太后陛下德全坤厚功底泰寧福莫大於多祥兩開帝業慶莫隆於至養咸戴母儀式兼崇極之名益衍昌明之祚臣某等久塵台鼎叨總國書興聖春融幸仰陪於大禮含飴日永願丕贊於鴻猷天壽節監修國史府賀表一人有慶節肇紀於重三萬壽無疆位永垂於九五乾坤薦祉朝野騰歡中賀慶惟皇帝陛下道大德純功崇業廣舉賢能興學校天下文明異章服同車書海内率俾允極尊親之孝益隆致治之基臣某等任忝國鈞職嚴金匱蓬萊宫殿幸依日月之光河洛圖書丕纉皇王之統元旦翰林國史院賀皇太后表延祐三年天子當陽八表奉夏時之厯皇闈獻歲萬年稱元日之觴雲氣蓬萊春風宇宙中賀欽惟尊號陛下德含坤育運啓泰亨推福慶以致崇日星顯號溥慈仁而洽治雨露羣生隂教修而母道隆孝理彰而聖功逺臣某等欣逢盛旦忝綴周行玉署日和願播思齊之美瑶圖天廣永居長樂之尊天壽節代蒙古國子監賀表延祐三年一人受命適符上已之辰萬歲稱觴載協壽星之紀照臨所被慶抃惟均中賀欽惟皇帝陛下德猶日中養以天下暨聲教於四海俗美風淳舞干羽於兩階河清嶽晏益體乾剛之用式隆震夙之祥臣某等學守國書班聫胄監龍顔日角仰瞻穆穆之光鶴筭龜齡俯效綿綿之祝上再即位奎章閣賀表天厯二年六龍啟運飛躍得聖人之時萬象趨新變化合太平之應普天之下如日再中中賀欽惟皇帝陛下剛健粹精聰明神武霜露洊更而不失其正乾坤再造而不居其功惟其有帝堯帝舜之聖仁乃能行祖甲祖庚之揖讓慎徽五典則崇孝友以率先表章六經則進儒雅以為本皆天理人心之至當必明君義辟而後知宜厯數之在躬雖同體而不易况祖宗之大統豈違道所可求是以踐阼之初甘露卿雲諸福畢至及夫明詔之下扶桑若木萬姓歡呼允長馭於權綱斯永保夫社稷臣某等叨聫延閣適際清朝羲畫禹疇願闡皇王之秘虞韶殷輅丕昭禮樂之隆奎章閣賀正表天厯三年大人有造治隆揖讓之餘正月始和慶協發生之妙車書萬國干羽兩階中賀欽惟皇帝陛下道接百王統承三正達夫郊社之禮禘甞之義躬致其嚴觀乎天地之德日月之明益躋於聖是用格於上下莫不歸其照臨臣某等忝惠西清依光北極君臣父子永敦天秩之常禮樂詩書誕播皇風之盛册皇太子奎章閣賀表重明麗正作離咸仰於皇文一索得男出震允冝於主噐既䟽封於元土爰正位於青宮所以繫人心所以本天下欽惟尊號陛下敬隆郊廟德洽乾坤當春秋鼎盛之時建宗社靈長之計惟聰明可以正百辟俾綜樞機惟元良可以貞萬邦足副儲貳重以羣臣之固請聿遵累聖之宏規然監國撫軍教尤資於四輔而問安視膳禮必謹於三朝式養聖功用光帝業臣某等屢陪大慶思賛清時迎春日之載陽益臻泰道瞻前星之有耀永固皇家聖節賀表陽德方亨喜太平之有象聖人在宥宜仁壽之咸臻八表同歸萬年惟永中賀欽惟皇帝陛下誕敷文德克纉武功既尊祖以配天比隆三代乃立嫡以主噐用貞萬邦允昭仁智之端是皆長久之道臣某等叨陪清燕莫賛聖明多壽多男徒切華封之祝是彛是訓願敷皇極之言奎章閣賀表聖人繼體再昭揖讓之隆天下歸仁大慰平成之望慶綿宗社光被華夷欽惟尊號陛下德秉純乾業承富有妙天人之協賛允厯數之攸歸惟上有成康之君下有周召之臣而内獲臯䕫之佐則外獲唐虞之治苟日躋於聖敬咸世篤於忠貞臣某等職忝西清光被北闕經邦論道自有弼於鴻猷養老尊賢豈無禆於昭代藝文監賀表明繼明聖繼聖所以固皇圖長以長賢以賢所以公天下一人有慶萬國歡心中賀欽惟尊號陛下仰之如天就之如日體兩朝之揖讓有丕丕基開萬世之隆平惟明明后此祖宗之深望亦臣庶之所期臣某等地切泰階恩聫文苑周為師而召為保德兾邁於成康稷教穡而契教倫治永躋於堯舜藝文監賀表一人受命適嚴踐阼之儀百辟在廷已舉尊親之典孝先天下慶衍皇圖中賀欽惟皇太后陛下徳濟艱難功成警畏每念鴻圖之重獨深燕翼之謀申揖讓於中興父而又子導繼承於成命長亦惟賢宜膺至養之隆永極徽稱之盛臣某等名慚藝苑身際熙朝長樂怡愉願宻扶於聖治大明照耀庶丕闡於皇猷藝文監賀表成命以長惟天以啓聖人南面受朝不日而尊大母愛敬之至神明所歸中賀欽惟尊號陛下如日東升以天下養雖任寄伊霍之重足以發皇明必治資任姒之賢有以基王化尚致怡愉之樂式彰孝弟之風臣某等學愧前修職嚴内監仰陪大禮時已際於風雲共戴皇猷壽永齊於天地文安集卷六
