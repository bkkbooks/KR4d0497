body:
  text: 文安集卷九元揭傒斯撰序送劉以德赴化州學正序學校非三代之教久矣然猶幸學校未廢儒者知有所依歸况窮荒遐徼使無學校安知有所謂聖人之教哉故學校者教化之原而人心之所係也我元建國餘六十載矣崇儒之意非不至興學之令非不加俊造之士非不舉而用之而猶未能浸淫乎三代之教者旬宣之道未盡亷恥之化未興詬病之風未除也職教之徒擁腫腆䏰孳孳焉䂓錙銖計升斗是急使夤縁之吏間窺隙伺日相與為欺安敢望有三代之教哉幸而學無廩稍又幸而遇賢有司又幸而近大府或知所自愛此外所甚大幸者教官能自賢能自賢或不遇有司又不能以自立若今廬陵劉君以德所得化州者廩稍之有無有司之賢否不可知既不近於大府而逺在數千里外然俗無美惡地無逺近教之化之在我而已况君有學有行家足以自給稍得一賢守令自拔於上他日五嶺之外窮海之濵有善教者必自君始愛之慎之吾將洗耳於北闕之下送張都事序天子既建奎章閣置大學士二人侍書學士二人承制學士二人供奉學士二人參書二人非甞任省䑓翰林及名進士不得居是官明年増置大學士二人典籖二人典籖秩從六品初命英宗龍飛進士第一人台哈巴哈兼善丞相掾張景先希哲為之希哲尋去為禮部主事又以丞相掾張中立惟正繼之居一年兼善拜南䑓監察御史惟正以遷江西行省都事天下之選莫重於省䑓或由省䑓入為閣官或由閣官出居省䑓則閣官之選與省䑓等而又必天子親擢之惟正一歳中兩被擢皆得天子所重地其日夜求所以稱塞固宜余與惟正同僚同與修皇朝經世大典惟正無一言不及於仁義無一事不致其精詳余常謂惟正居職任事無不及者江西號繁劇難治然繁劇在郡縣無在行省行省苟得其人雖使郡縣皆務為簡靜猶反掌耳江西難治莫甚吉安然以前江西亷訪使馮君輔今揚州總管納懐治之政未甞不行訟未甞不簡吏民未甞不心恱誠服非惟不能欺至不忍欺是故為政係其人不係其地而君輔納懐之在郡也上之人惡其異已也沮之抑之不遺餘力卒不能安其身以去江西之政日益弊民日益困加之以饑饉重之以疾癘有司恬然莫之恤者果誰為之耶故天下郡縣不患無賢守令患上之人不能正其好惡以示其嚮方公其衡鑑以别其淑慝扶其善類以激昂其志氣耳故行省者郡縣之標凖也苟標不正凖不平欲其影之直鈞石之和得乎今惟正之佐江西也以平章全公之簡重亷正惟正之精實謹敏相與存大體略細故先人而後已使君子得以行其道小人無以騁其姦民之有瘳也必矣惟正敬之勉之其毋忘天子親擢之意他日有論奎章人物曰惟正惟正則僕也與有榮耀焉送藝林庫提㸃畢申達棄官歸養詩序世言忠孝不兩立忠孝亦有二乎見於事君謂之忠見於事親為之孝人見其孝也而不知有忠之道存焉曰孝而已矣人見其忠也而不知有孝之道存焉曰忠而已矣一行非孝非忠也一念非忠非孝也天地之大也日月之明也人物之衆也其可感而通者莫疾乎忠與孝也雖庸人孺子一行其孝而風俗為之變世之行政施化有弗能焉雖孱卒賤𨽻一行其忠而天地為之重世之守職任事有弗及焉况身為名父之令子聖天子之賢臣者乎一出一處豈無所係哉藝林庫提㸃樵隠君兼才德之名懐忠孝之實昔者天子既奪其養而寘之藝林矣君不以筦庫為卑而怠其事又命攝授經而列於奎章矣君不以師道為尊而貪其榮一旦棄官歸養如孤雲之遇飄風瞬息而不可留也雖賁育之勇不能過焉濟南之士豈無所動其心哉即使君日居朝廷之上奉一職效一官其忠亦如是止耳今退居庭闈之間盡甘㫖之奉謹温凊之禮父母樂之鄉黨稱之使天下聞者父以教其子兄以訓其弟相率而歸於孝弟之化以相隆平之治其為忠也不亦大乎故君子處亦一忠孝出亦一忠孝烏可岐而二之哉昔親之壯也而不知事其君是不孝於親者也親既老矣而不知事其親是不忠於君者也天下豈有不忠之孝不孝之忠哉則樵隠君之出處交得其道矣君行矣余欲歸養而無所用吾情焉車既膏馬既秣凡工為文辭者皆詩以送之而奎章閣承制學士李公命余為之序送伊蘇達爾齊序自科舉廢而天下學士大夫之子弟不為農則為工為商自科舉復而天下武臣氓𨽻之子弟皆為士為儒非昔之人無聞知而今之人獨賢也顧在上之人所以導之者何如耳國家臣妾萬邦南北為一餘六十年而教化不興風俗日壊奸宄屢作者任法律而務財用也仁宗皇帝赫然奮起賔興天下賢能而用之雖刀筆筐箧之末并欲傳之於士天下孰不釋耒耜而談詩書投干戈而從筆硯行之二十餘年孔孟之道卒未能大洽於天下者仁宗皇帝在位日淺得人未衆作養之士未成新荑稚蘖不足以勝夫深根固蒂牛羊日夜又從而牧之信道篤者類指為迂濶稍出芒角為國家分憂者盡格之下位急功利者遂從而彌縫附㑹覬旦夕之餘景而不知已為他人所銜轡矣自是法律愈重儒者愈輕羣然鼓簧謂士不足用科舉無補於國計不罷不止嗚呼果孰為國計哉至元初從軍襄樊有察爾齊者哈喇婁人也以功為千夫長察爾齊傳圖嚕罕圖嚕罕傳圖琳台三世皆戍建昌而三世皆賢圖琳之子伊蘇達爾齊從郡人李宗哲學進士業有聲今年夏從其婦翁増城左君至京師拜余程文憲公故宅貎粹而氣和才清而志鋭他日必為名進士然君子之學非所以為冨貴利達之媒也所以進其德而達其才者也故其學不止於為進士夫文以制治武以定亂法律以輔治財用以立國皆君子之事所當學者且文武非兩途也用之制治則文用之定亂則武非文之外有武武之外有文也法律非不任也任之以為輔治之具非為治之本也財用非不務也生之有道而用之有節非瘠民以肥國也故君子之學也用以致其君則為堯舜之君用以治其民則為堯舜之民非徒學以自别於農工商賈而已國家養之必以其道待之必以其誠任之必盡其才非徒用以竊任賢之名而已然學在我養不養用不用非所計也而用不用實闗天地之否㤗國家之盛衰吾道之通塞此君子之所憂不敢計焉者子歸第務學焉勿以科舉廢興為去就當天下任者倘有仁人之心不忍坐視淪胥於苛暴慘刻必有為國家計者也幸勉旃毋自畫沇溪先生文集序豐城文物之盛自漢徐孺子以高士之節讀書龍澤山中為太守所禮唐王中丞以風后力牧之望㽞滯江湖為詩人所嘆至宋彬彬不可勝載矣而黄氏居沇溪之上相望數世以文章學術顯名天下葢自柳州公始公諱得禮字執中由元祐三年進士三遷而為柳州推官年三十九以卒其享年少其歴官未乆故其行事不能大暴於天下觀其遺文則可得而論矣公之詩沉鬱䧺健有矯齊梁晚唐之意公之文辯博閎大有憂天下之心蓋當國家盛時其氣渾其政平故其發於文也和而莊直而不遷至若論唐大宗遺憾於魏徴有恥不及其臣之失牛李之禍罪在德裕不能以公滅私陽城愛弟不娶甘棄父子兄弟夫婦之大倫為素隠行怪其志於世為何如也紹興初公之𤣥孫原編其遺藁得詩九十二長短句五史論十雜著九拾遺詩二長短句一及附録四首離為四卷至淳祐中其子脩紀始刻之已而燬於兵今公七世孫璧將復刻焉而屬余為之序惟黄氏由金華徙豐城蓋數百餘年矣訖宋之世登進士第者十有三人而公之子吏部郎中次山公之孫禮部尚書疇若為最顯其行事則載之國史其文章則吏部三餘集尚書竹坡集世多有之故不復論無底書囊序無底書囊二卷故族父竹泉先生所著之書也先生諱垚翁字汝和世為豫章豐城人父諱涇伯父諱士林皆受學清江張文憲公之門文憲公噐之稍不及之即以書詗先生十歳而孤惟母育養之而母性方嚴聲色不少假先生亦強學力行事母極孝自為子弟以至没齒人未甞見其過踈髯廣顙眉目聳秀癯然若不勝衣居碧山之下萬竹之間竹間有泉甘冽不竭每清風徐至幅巾藜杖臨於泉上望之若仙早從大人先生㳺如鄉之翰林學士徐公經孫戸部郎官李公義山臨江蕭左史山則監察御史泰來兵部侍郎徐公卿孫廬陵秘書監丞歐陽公守道湖南安撫使李公芾每與言論引據經史慷慨激烈風概凛然故莫不折節下之晚歳教授鄉里凡經指授皆尚氣節不碌碌隨人後望而知為揭先生門人平生所讀書皆手自編校其所論著必以扶樹世道為本此書特其聞見緒餘猶鑿鑿精實如此况其他哉元貞元年冬十有二月寢疾明年正月十四日早作沐浴易衣冠謁先祠畢還坐堂上手為書數通别親故賦五言詩八句示其子載且戒之毋以釋老汙我端坐而没後三十有六年其嗣子將刻是書以傳而命傒斯為之序臨風開卷灑灑若睹其風儀歴歴若聞其平生之言而終古不可作矣嗚呼悲夫謹序其槩如上至順三年七月日序臨江路張同知自然頌序自然道之極也因而品節之聖人之教也老莊明自然而不可入於聖人故儒者所弗道河南張侯之貳臨江也其言曰是其所是非其所非是非非有於我也賞所當賞刑所當刑刑賞非有於我也皆自然之道也行之三年政果有聞遂名其所居之室曰自然其民之賢而文者陳宗元倡其友前鄉貢進士易方猷等若干人為之頌而請余序夫張侯因自然之道而為之政不騁奇以取名宗元等因自然之政而為之頌不溢美以為説惟不騁奇故民得遂其性而樂其業不溢美故文得盡其辭而信於逺皆可嘉也且以張侯之賢而得宗元以為之氓必能導之以親親長長之義使侯之政易行以宗元之賢而得張侯以為之上必能後其奔走力役之征使元之教益申是又皆可賀也惟其知自然是以合自然是為張侯自然頌序送燮元溥序廬州舒城長燮元溥泰定四年進士也元溥蒙古人名燮理布哈無氏姓故人取名之首字加其字之上若氏姓云者以便稱謂今天下之通俗也元溥治舒城亷敏明恕見許於士君子賑飢興學有㤙惠予民時郡縣吏初到官㕘所部必舉元溥以為勸余甞載其槩於龍眠書院記中今遷撫之樂安其民慕亷吏思惠政與舒民同又多文而好學易以禮義化然撫五縣皆無公田之入可以自養非痛自節縮去冗食之人鮮能自固者况元溥名進士人望之也尤深責之也尤嚴决不敢以他吏自恕自易其常今天下所共聞知者海南治公田之入十倍常賦民不堪命遂起而益擁衆數萬破州略縣賊殺將吏屠戮士民兵連禍結數年不解為朝廷之憂彼有田而賦之不以其道害猶如此况當天下兵飢疫癘之後誅求割剥之餘民力耗竭之極又無田而殘民以逞將無海南之事乎此吾與元溥所深憂而極慮者而天下行之若素漠然不以為意吾不知其何心也嗟夫元溥士不為仕則已仕則必盡其道毋貽父祖之羞為天下後世之僇笑也送彭仲寶赴水北廵檢序臨川彭仲寶以温厚之德深潛之學雅正之文佐修皇朝經世大典於奎章閣以㤙借授衢州龍㳺水北寨廵檢將行謂余曰余儒者也釋爼豆而弓刀非素所從事也非所從事而從事焉去親逺且困不可久也以去親逺困不可久從事於非所從事如曠官何曰天下治以禮讓為郛郭而莫能破以詩書為甲胄而莫能入以仁義為干櫓而莫能犯故守之以謹勅之士而有餘天下亂髙城深池不為固長刀大劍不為利強弓致矢不為威故守之以熊虎之將而不足今天下之民涵㤙而沐化好善而惡惡安耕而忌戰争者五六十年雖有強王叛將屈強於數千里之外不過馳一介之使手數寸之革即縛致闕下視區區狗偷鼠竊曽蚍蜉蠛蠓之不若是故夷城塞塹束兵卷甲偃然有萬億年固安之勢君以數十里之地善惡不掩乎耳強弱不逃乎目是非不惑乎心輕裘緩帶足以坐鎮之何曠官之足懼哉吾惟憂其所不憂慮其所不慮備其所不備仁言而義動雖守數十城可也何有於數十里哉仲寶以為然遂書以贈之文安集卷九
