body:
  text: 文安集别集類四元提要臣等謹案丈安集十四卷元掲傒斯撰傒斯字曼碩龍興富州人延祐初以薦授國史院編修官應奉翰林文字遷國子助教告歸復召還天厯初開奎章閣首擢為授經郎與修經世大典累官翰林侍講學士總修遼金宋三史卒於官追封豫章郡公謚文安事蹟具元史本傳傒斯與虞集范梈楊載齊名其文章叙事嚴整語簡而當凡朝廷大典冊及碑版之文多出於其手一時推為鉅製獨於詩則清麗婉轉别饒風韻與其文如出二手然神骨秀削寄託自深要非嫣紅姹紫徒矜姿媚者所可比也虞集嘗目其詩如三日新婦而自目所作如漢庭老吏傒斯頗不平故作憶昨詩有學士詩成每自誇句集見之答以詩曰故人不肯宿山家夜半驅車踏月華寄語旁人休大笑詩成端的向誰誇且題其後曰今日新婦老矣是二人雖契好􅇰深而甲乙間乃兩不相下考楊維禎竹枝詞序曰掲曼碩文章居虞之次如歐之有蘇曽其殆定論乎顧嗣立元詩選載傒斯詩題曰秋宜集今未見焦竑國史經籍志載徯斯集一卷今亦未見此本凡詩四卷又續集二巻制表書序記碑誌雜文八卷乃其門人錫喇布哈原作爕理􅄎化今改正所編錫喇布哈字元普泰定四年進士第九卷有送錫元普序即其人也所編雖不足盡傒斯之著作然師弟相傳得諸親授終較他本為善觀元詩選所載秋冝集中曉出順承門有懐太虚絶句曰歩出城南門遥望江南路前日風雪中故人從此去乃割裂漢樂府半首為傒斯之詩則所收必不甚精矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書
