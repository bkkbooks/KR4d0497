body:
  text: 文安集卷七元揭傒斯撰書上李秦公書五月吉日豫章揭傒斯謹再拜奉書平章國公閣下夫士志為上時次之位次之農不以水旱怠其耕商不以寒暑輟其負販故能致千金之產登百榖于場况士之致於道者乎不逢於今必顯於後有其時有其位道行於天下天也無其時無其位道不行於天下亦天也君子無與焉故士之所患者志不立道不明不敢計其時與位也因其時求其位以行其道此士之志也而不敢必乎天也士苟志於道生乎今之世可謂得其時矣然猶往往以不得其位為患其信之不篤而欲必於天者從而為之言曰上之人不能用夫士且怨且憤嗚呼過矣甞觀夫用舎之際矣或一人薦之而百人阻之不能使之不用且大明其道於天下或百人舉之而一人抑之卒罷而歸致老死而無聞夫一人至寡也百人至多也用舎繫焉而無所容於力非天也耶上之人苟能知其力之所至不能奪天之所與不能畀天之所不與賢者進而用之不賢者退而黜之不置一毫踈戚愛憎薄厚之心於其間惟以國家得人為務如是而猶有不信乎道上猶有遺才之恨者未之聞也甞觀士之志立矣道明矣得其時與位矣而不能見知於其君道終莫能以行雖行而不逺噫何其道之難行也耶伏惟閣下學冨而德廣志勤而行實不以摧困拆辱而易其節不以冨貴顯榮而改其度尊為天子之舊學信為天子之腹心位崇乎公相功施乎社稷名聲昭乎四海可謂得其時與位而道信行矣又力能進退天下之士而無一毫踈戚薄厚愛憎之心置其間一務於為國而得人天下之士莫不顒顒然厲其志修其道以待時之用已然以一人之明籠天下之士豈必能保其固無遺才耶亦舉其所知倡於其上而已耳僕少貧粗襲祖父業年十五六即挾其所有奔走衣食於四方乗驚湍絶峻崿觸冒乎炎埃雨雪之間或過午而未食或既夕而猶邁人情物態之變風俗政化之異本末逆順之由葢備甞而畢覽之矣至於國家内外之體補偏救弊之術亦甞求其説而熟慮之矣然未始敢以告之人者踈逺鄙賤之士雖告而不信徒取詬病焉耳既無上下之援可自取爵位而力行之又無知己之人可相告語事苟利於時不必由已出然終黙黙自悼行年三十有九蠢然而無聞近始因縁親戚計可無旅食之憂遂自豫章附舟五千里而至京師雖童僕不敢携一人恐重以累諸人也凡平生寓之目屬之耳體於身藏於心不敢以告之人者閣下皆已行之矣其未行者必次苐而行之僕何敢踰涯越分而進以貽教玉人之譏夫翰林皆極天下之選不以愚不肖過相薦引私竊自幸事苟有集庶㡬由是而至於可為之地以自見其平生之所志萬一不然亦可藉手以歸曰吾甞獲薦於翰林矣吾甞獲登李公之門矣益厲其志修其道垂之簡帙傳之子孫樂夫天之所以命我者用之舎之不敢求必於天也惟閣下少垂察焉傒斯恐懼再拜與尚書右丞相書傒斯再拜尚書右丞相閣下傒聞因衆者可以顯立功忘已者可以廣得賢千尺之松不蔽其根者獨立無輔也森木之林鳥獸羣聚者衆材咸濟也是故自用無朋專欲無成得衆者昌寡助者亡此賢愚同智古今一軌者也易曰㧞茅茹以其彚征吉夫泰之為卦君子道長之時也君子當道長之時其進尤必引其類則吉是進而不引其類雖當泰之時猶㓙也人方安居暇食若無事於賢一旦風飛雲㑹加之百官之上立於廟堂之内以數尺之身任天下之責方寸之心闗天下之慮雖有周孔之智賁育之勇未聞能獨成其功也此僕與閣下不能無情伏惟閣下聰明強毅卓犖宏大誦聖人之書行古人之事為政知王道之本好賢有虛已之實生民之所仰望君子之所依歸又當天子鋭精求治之時身任鼎鉉之寄以求治之時當鼎鉉之地而生民有仰望之情君子有依歸之心誠閣下垂名立功報國顯親之秋也然方今進賢用能之當否在閣下冨民理財之能否在閣下斟酌庶務之冝否在閣下天子之所属寄生民之所責望在閣下其任亦甚重且難矣夫上有宰相下有參佐百官而獨責任於閣下者以閣下明王道識治體知本末之所先後經權之所異宜也此春秋所以責備於賢者耳由今觀之孰若一上下齊彼已旁羅俊乂廣覽英賢因其材而分任之而坐居其成功則功可大名可久福可致而禍可銷也不然一身且未知所計况為朝廷計哉然鳯凰鸑鷟非凡木可棲絶奇異能非常調可致懸千金之賞不患無徙木之人市千里之骨何憂無絶足之馬誠能推誠折節激昂鼓舞則士必樂為用士樂為用何功不成且進賢者非所以市私恩也將以佐天子理萬民也忠以出之信以行之忠信之人天必祐之毋患乎賢之不為用但盡其求賢之道而已牛之肯綮逢庖丁之刄則觧木之盤錯遇匠石之斤則離毋患乎事之難行但盡其用賢之道而已進一君子則君子之類應任一小人則小人之類應此善敗禍福之由不可不審且慎也惟閣下察焉傒斯再拜答胡汲仲書傒斯頓首汲仲簿公執事傒斯比猥以陋薄之見汎浮之辭凟冒於執事意甚悔之既無及已連月滯留於外不得朝夕訪問不圖宏大更枉還答又以俗廹雨坐山疃者連旬不得上謝知執事於我如何哉然賢者之待不肖不肖之望於賢皆不可謂之無意也苟有忠告則肝胆相呈心口相宣不當蓄嫌畏挾蒙背若市井塗路之人也故有所祈不敢黙黙遂止以執事好古之敏信道之篤知足以知之勇足以行之可謂魁傑特達出羣之士至於商畧人物言論風采頗若無人來書有云為衆所推謬當斯文之託僕竊以為過矣夫衰周之世文武㡬墜孔子以天縱之聖出為天下萬世之宗且曰十室之邑必有忠信其自居者好學而已孟子當戰國之時闢楊墨排縱横揭孔氏之道而明之若掃穢翳開日月之光䟽百川益河海之深及其辯也曰不得已今幸與執事居休明之世吾道光盛賢士軰出禮樂非甚崩大壊際天所覆無不順軌雖有孔孟猶不當驁然自任畧無辭讓之色使執事所學之道所居之世誠當孔孟之任必待後世之人推尊而光顯之不當自道若此且以執事自處為何如時哉今年夏見青田陸如山謂執事自許直繼孟子非知道之士不能為是言者猶或不識執事所言之㫖由今而言則信有之矣夫孔孟大聖也大賢也當斯文之託者若孔孟可矣而孔子曰攻乎異端斯害也已孟子曰能言距楊墨者聖人之徒也然每與執事商論則甚尊信佛老氏至欲合三氏而為一則當斯文之託者道固應如是乎此皆甚不可者也或謂執事有師道而無友道誠知言哉傳曰如有周公之才之美使驕且吝其餘不足觀也已此之謂也來書又云前乎千古聖賢相傳之道由詩若文而知後乎千古亦將由詩若文而知今之道予讀其言而悲之自漢以來繼述之文多可讀之文少夫道有本文有體尊卑大小長短踈戚華實正偽截乎若天地山川之不可相陵昭乎若日月星辰之不可相踰離乎若飛潜動植之不可相移惟適當而已耳近見執事序黄成性文章言辭夸大皆非事實其所稱舉皆公卿大臣之事非學道在下者所宜言抑亦自任之素不知其言之過也且文者古聖賢不得已者之所託也而今世行道之士不惟其事尚欲託之此而垂後不亦甚可悲夫僕之才不足以知執事僕之言不足以曉左右所以聞之父師之訓有與執事戾者聊為僣越申言之前言敢以為執事之忠後之言敢以為執事之望尚冀致之用以幸學者以示來世則大願也優柔之教敢不敬承聞將就天台之闕不知何時定行當於江滸一别與蕭維斗書傒斯再拜論德蕭公閣下僕性分麄謬昏戅絶不通時事與人交不計隆薄能否輙以古道相期待俗下詬病日甚不止終愧悔今復妄有謁於閣下焉惟天生賢哲常曠數百載不一二見及有其人或又廢於庸主格於讒忌盡於懦怯畏慎弗克卒其大業僕甚痛之自來京師目覩耳聽口誦心語惟公全才學冨義精仁熟謙讓克謹去就有節名與實侔位與德稱有古大賢之風束帛之聘累光丘園每聘必増其帙每召必優其禮其尊德樂道右賢尚能崇信慕向若漢高帝之於四皓可謂隆矣然四皓不出則已一出則能割至尊之愛定天下之本建萬世之名翛然而來浩然而歸來不見其所難去不見其所窮何其裕哉且今天下非漢髙之草創皇太子聰明仁孝過於惠帝上親信篤愛無高帝之惑溺昔之儲貳不得與國家之政今則無所不領冝若公者知無不言言無不從然天下之賢士未振者不聞有所舉天下之政令有闕者不聞有所陳愔愔黙黙日以懐去為務又不能借一事决去就使天下有識之士蹀足㩜掔裴徊四顧而失望僕誠愚鄙未達其故抑嘗舉之而未用陳之而未行邪則去就可以兆矣道行於天下謂之達道不行於天下謂之窮孟子曰窮則獨善其身達則兼善天下今公居達之時行窮之事尤所未喻且天之生斯人也豈徒欲寵榮其身體利澤其子孫而已亦欲使生民之有知也公誠能高卧空山逺引遐陬則為巢許務涓之徒可為嚴陵魯連之徒亦可雖欲驂風駟霞談詭變眩如偓佺安期羨門盧敖徐福之徒亦可今業已出矣食其禄而居其位矣何乃若是恝恝邪竊為公計莫若攄肝瀝胆激昂慷慨極論天下之賢士求當今政令之得失典章文物之損益君儲切身之急務䟽而陳之苟其說行則從容可為二䟽之事不行則掛冠神武拂衣而去矣上不負朝廷之知下不觖天下之望天下之士莫不想望風槩咨嗟太息曰蕭公真賢矣哉朝廷之尊賢下士必自公始則公進為國家之榮退為斯道之隆生為萬全之人没有無窮之名不亦休乎又不得已則引年謝病而去耳或曰公不得已而起而身冒大名被至㤙夙夜戰掉兢慓猶懼不持若夫進賢補過則揆諫之司吾所職者輔廸是宜且言之而中則吾之歸未可期言而不中則僇辱所歸况若公者進退語黙必有其時豈庸豎賤走所能察識哉僕益惑焉夫公之出處非若彼旅進旅退之人旅進旅退之人雖千萬不為天下輕重公實有萬世之繫焉不可不暴白於天下後世後世使之有則也念之念之時不再矣僕近行河濟之間有過而歌者曰我行河濟兮瞻彼泰山聖人之不待兮我道孔艱進不汝信兮退即汝諼河兮濟分道靡靡兮乃撫栧送而和之曰泰山巍巍吾其跂而河水瀰瀰吾其濟而聖人雖逺吾斯軌而因録其詞并書以獻惟公念生才之難遭時之不易憫斯民之無知貸狂瞽之不察視中道而導之歸幸甚幸甚傒斯再拜文安集卷七欽定四庫全書文安集卷八元揭傒斯撰序呉清寧文集序廬陵代為文獻之邦自歐公始而天下為之歸溪作而江西為之變故江漢被文王之化無思犯禮華周感杞妻之哭而變國俗其所感雖殊而人心之變一也溪没一十有年學者復靡然棄哀怨而趨和平科舉之利誘之也永
