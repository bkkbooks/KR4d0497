  text: 文安集卷一
  hash: sha256:8cd54609b02a0f3200679f867d16d0a8049cbce6f995de743f901ba26de4f734
body:
  text: 元揭傒斯撰臨川女我本朱氏女住在臨川城家世事趙氏業惟食農耕五嵗父乃死天復令我盲莫知朝與昏所依母與兄母兄日困窮何以資我身一朝聞密言與盲出東門阿母送我出阿兄抱我行不見所向途但聞風雨聲行行五里餘忽有呼兄名兄乃棄我走客前撫我言我與趙世親復與汝居鄰聞汝即赴死扶服到河濱我身盡沾濡不復知我身汝但與我歸養汝不記年涔涔遵旋路咽咽還入城城中盡驚問戚促不能言望門喚易衣恐我身致患再呼我母來汝勿憂飢寒汝但與盲居保汝母女全我母為之泣我鄰為之歎喜我生來歸疑我能再明况得與母居不異我父存我今已十三温飽兩無營我母幸康强不知兄何行我母本慈愛我兄亦艱勤所驅病與貧遂使移中情當日不知死今日豈料生我死何足憾我生何足榮所恨天地生不如主翁仁誰能為此徳婁公名起莘夏五月武昌舟中觸目兩髯背立鳴雙㯭短蓑開合滄江雨青山如龍入雲去白髪何人並沙語船頭放歌船尾和篷上雨鳴篷下坐推篷不省是何鄉但見雙雙白鷗過張君壽先生鵠山隠居當日自期顔杲卿莫年羞見魯諸生膝兼多病終難屈身為長愁視轉輕日晏典衣留客醉雨餘開户㸔兒耕淮雲楚樹晴如掃卧送年年江水聲送趙履道虞叔常還江右趙子我同里虞郎我同年手折武昌栁送上西江船買魚沽酒燒荻鞭夜下西塞寒山前西塞山碧如苔君今去㡬時來東風花開春水漲待君黄鶴磯頭望君庾公樓上寄題九江義門陳氏壽安堂匡廬之隂彭蠡涯七百餘載真良家宋御書表其門曰真良家冲和鬱勃吹不散飛落南山萱草花往時冠葢如流水撞鐘鼎食三萬指詔書十度復租庸每嵗朝廷仍貸米父慈子孝則四方紀淨綱明照閭里蓬萊水淺昆明空天開地闢元氣通張公百忍澤未竭王母千年桃始紅南山築堂三百歩翠竹屯雲森玉樹忠厚必有神明扶淳樸自是期頥具方瞳緑鬢紅氍毹春酒摇蕩香扶踈公侯子孫始必復日為太夫人起居正月十二日尋盧學士船至漢口留詩為别晴江澹微瀾洩雲在層巘參差連舫出散漫羣鷗逺始知遵漢廣遙睇髙斾卷懷賢每忘賤臨流亦忘蹇蒼茫景将入窈𦕈春猶淺新知遽相違餘悰何由展黄尊師髙軒觀鵞因留宿開軒南嶽下世事未曾聞落葉常疑雨方池半是雲偶尋騎鶴侣來此看鵞羣一夜潺湲裏秋光得細分衡山縣曉渡古縣依江次輕輿落岸隈鳥衝行客過山向野船開近嶽皆雲氣中流忽雨來何時還到此明月照沿洄題王山仲所藏瀟湘八景圖卷走筆作瀟湘夜雨涔涔暗江樹荒荒楚天路稳繋渡頭船莫放流下去逺浦帆歸㝠㝠何處來小樓江上開長恨風帆色日日誤郎囘煙寺晚鐘朝送山僧去莫喚山僧歸相喚復相送山露濕人衣洞庭秋月顥氣自澄穆碧波還蕩漾應有淩風人吹􅅇君山上平沙落雁天寒關塞逺水落洲渚闊已逐夕陽低還向黄蘆沒漁村晚照定從海底出且向平沙照漁網未全收漁舟還下釣山市晴嵐近樹參差出行人取次多板橋雙路口此世幾迴過江天暮雪孤舟三日住不見有人家昏昏竹籬處却恐是梅華以事蹔如武昌發臨川江轉欲無路山迴忽似圍客程秋共逺物色晚多疑稍稍沙鷗集葱葱野樹稀武昌今夜夢定有故人知女兒浦歌女兒浦前湖水流女兒浦前過湖舟湖中日日多風浪湖邊人人還白頭大孤山前女兒灣大孤山下浪如山山前日日風和雨山下舟輕自往還送尹十六善叟謁告歸茶陵㑹𦵏賢兄處士十韻八嵗賴賢兄未埋猶望生旋聞日下𦵏敢戀世間榮得告如無及嚴期况有程意長看路短義重覺身輕鄉樹迎船出江雲入暮横望山占驛堠聽鴈作城更但使能臨穴猶堪畧慰情死生今古異去住别離并尚足醻知已非貪美俗評匆匆不可盡迴首各沾纓送黄五舅得武陵校官還辰州寓居省侍寧上山頭種禾黍莫向他鄉作羈旅山田得雨尚有年他鄉顦顇何人憐一身千里家何在全家更在沅湘外獨樹鷄鳴楓葉飛荒村鴈沒蘆花碎親在窮邊望子還子在長途衣復單居無寸田出無僕明年作音佐官當食禄貧交行驅車渉廣川揚帆陟崇丘結交四海内中道多愆尤朔風厲苦節獨鶴横九州朝拂三島樹夕過五城樓兩翅偶寒影曠然何所求登髙臨大江日暮萬里流時哉䟽鑿人八年忘外留出必益稷俱歸與䕫龍儔進退兩不疑功成垂千秋萬事日相敓恩情若雲浮吾心苟不渝反覆安足仇自非天地外何能獨忘憂曉坐張先生朝陽軒朝日照髙樹幽人方啓關蕭寥塵外事風葉滿窻間别武昌欲歸常恨遲將行反愁遽殘年念骨肉乆客多親故佇立望江波江波正東注南康夜泊聞廬阜鐘聲廬山三百寺何處扣曾雲宿鳥月中起歸人湖上聞入空應更迥近瀑正難分遙想諸僧定香爐上夕熏春日雜言七首日月朝朝新何物能獨乆常恐天與地變化亦已朽東風闖然來茫茫浩無首起視桃李樹晱艷一非舊如何揚子雲泯然空自守朝出城西門孤墳何穹窿雄狐竄其西脩蛇出其東云昔有狂士七尺才且雄平生無所頼屠狗涉春冬一朝際風雲身貴位益崇死生好惡間咄唶生秋風氣驕日憑陵家國兩蒿蓬子孫分散盡空有牛羊蹤羃䍥楊栁枝䝉茸春草齊夭夭誰家婦采桑臨路岐零露沾其裳蛛絲卷其衣樹髙身苦弱蠶饑行復遲辛苦事姑嫜宿昔減容輝見者皆歎息此心知獨誰良人日暮至醉問爾何為啁啁田間雀啄啄常不給春水日已深網羅復相及既無養生具日夕湯火急多謝雲間禽無為自羈縶祝融九千丈瀟湘地底流洶湧洞庭野崩騰江漢秋上有飛仙人身披紫雲裘昔者嘗相遇緲若乗丹丘同歌黄鶴渚共醉岳陽樓思之忽不見獨立悵悠悠我有琅玕草欲贈江東客出門道路長卷袂空歎息靈苖世所尚良士余所惜神仙無千年耿耿誰復識五歳能讀書十歳能賦詩十五事逺逰三十無所為既􅆾俯仰責復為鄰里欺生計日已踈世態多瑕疵煌煌金張門徒𨽻皆光輝日宴賔客集軒車如風馳一笑擲千金片言委黄泥齊生獨抱琴來徃何迤迤夢兩離阿英十二能辟纑阿牛五歳貪讀書辟纑成縷無人識讀書有志令人惜汝父飄零汝母休吾親雖健俱白頭雨聲斷道風驚屋阿婆獨抱諸孫哭夢武昌黄鶴樓前鸚鵡洲夢中渾似昔時逰蒼山斜入三湘路落日平鋪七澤流鼓角沈雄遥動地帆檣髙下亂維舟故人雖在多分散獨向南池看白鷗遊麻姑山五首并序湖北憲使程公閒居盱上二年矣五月二十日詔拜翰林學士又十日公與使者及諸客同遊麻姑山輒以覽厯所止賦詩五首雲關君子荷初服思至若無榮穆穆芳雨散悠悠蒼山行危關擁霧黒飛衢緣雲青苔蘚滑如積杉松窅㝠㝠時逢負苓翁忽聞流水聲舉足向益髙矯然欲遐征徒𨽻各忘倦矧彼髙人情飛練亭神工擲天紳挂之兩崖間萬古輸不盡誰能測其端勢割山石愁氣挾草木寒安得天風吹繫彼日月還麻姑緑雲髪黝黝長不殘湧雲亭泉源出地底仰向雲中行擘厓㵼千丈亂石皆騰獰風霆日夜急雨雪虚空明不有神物扶兹山應乆傾噴薄側飛鳥砰鍧愁百靈仙家信為好喧聒何由平三峽橋兩山束飛梁下塹不測淵誰開萬尋鐵逗此無窮泉淙淙輥空曲洶洶投奔川陽光下照之忽作龍騰天常恐桑田變中有瞿唐舡麻姑壇嵯峨仙都觀遙望丹霞天後有千歳松前有百頃田風日夏颯沓烟雲晝葱芊羣彦一時集安知非列仙持觴起相醻罷琴抗髙言天道信悠邈人情何拘攣靈君不可致落景詎少延仰雖慙㝠㝠俯實憂元元主人顧坐客此中可忘年盧學士奉㫖南祀海嶽繇鍾陵相别聞尚宿留㑹稽有懷奉寄鍾陵一分手㡬日過錢唐五日山隂路千峰海上凉烟霞含景氣草木識天香夙昔經行處風深轉不忘病夜素壁深藏獨客身桃枝薑胯只為鄰極慙供給煩賢友尚恐傳聞及老親蛬響戒寒相應起燭花連夜為誰新多情造物真豪縱盡力相驅病與貧得程翰林揚州消息皇明屬休期側席佇貞良游麟既集藪鳴鳯亦在岡君子乗時興出餞何輝光車馬塞江介笳鼓凝羽觴時秋風雨交四顧野茫茫晨鉦激中流飛斾忽異方蓄思遵旋軌浮雲紛北翔道路間邦畿草木隕寒霜晷景倐易流悲來但徊徨君懷經綸憂我負灾疾妨鶱沉固異趣情誼結中腸居下衆所夷在賤誰不忘宛緬廣陵翰胡獨置我傍鬰悒憎愁思投袂睇莽蒼自顧匪茅茹委跡任空墻淵淵賢逹心悢悢情内傷歸故園新居落成後作親老身仍苦家貧歳更凶掄材斤斧後發地草萊中面勢㸔前跡歡呼集衆功聊存今日意敢望昔時同漂轉何多歳艱難且定居隣人供菜菓穉子進詩書稍覺牛羊逺兼知蔓草除此園三百載亦復返吾初山行稍出羣山復渉溪溪光山色冷相輝青裙獨踞溪邊石不顧行人自濯衣寄題馮掾東臯園亭時雨散繁緑緒風滿平原興言慕君子退食在丘園出應當世務入詠幽人言池流澹無聲畦蔬蔚葱芊髙林麗陽景羣山若浮烟好鳥應候鳴新聲和且閒時與文士俱逍遥農圃間理逹自知簡情忘可避喧庻云保貞和歳暮委周旋宿梁安峽夢故室有感時還盱江梁安峽裏杜䳌啼絶壁蒼蒼北斗低雲氣倒連山影合石稜斜鬬浪聲齊南風盡日迎歸客落月空江夢故妻一室十人分數郡百年幾處候晨鷄送趙仲逺甌寜仍為令尹去如送武夷仙舊政閩人説新詩海客傳度關風散暑下瀬月依船不奪循良意因知幕府賢山莊晚立有懷舍姪沆督穫臨川䔩䔩黄桑葉蒼蒼白竹峰居人争野碓歸客背村鐘路暗縁溪濕山寒著霧濃阿咸收稻未辛苦闕相從哭王十良仲深谷可為陵大海可為田唯有死者窮無由覩青天千古黄壤間萬古黄泉下精神與時息形質隨日化日落朝復生月缺望已盈不知死者别何時見形聲悲哉復悲哉已矣復已矣我友初五人今焉忽成四死者不復見生者别離多人生如春花美好知幾何欲為生者歡須念死者苦死生日相尋歡樂如糞土雨述三篇江南臈月天未雪居者單衣行苦熱連山郡邑瘴盡行豈獨嶺南與閩越逋民穰穰度閩山十人不見一人還明知地惡去未巳可憐生死相追攀近聞閩中瘴大作不間村原與城郭全家十口一朝空忍飢種稻無人穫共言海上列城好地冷風清若蓬島不見前年東海頭一夜潮來跡如埽冬來一晴四十日三日南風當有雪不知閩嶺今何如念我故人書斷絶劍南判官心所親甌寧大夫政有神腐儒多事浪憂喜安得貽書兩故人春暮閒居寄城西程漢翁十五韻迢迢曾城阿峨峨鳯凰山下有隠淪士能為淮漢言兩日一寓音五日一承顔每談經濟事恒及離亂間言辭多忼愾文字少凋殘不歎東逝川但憶南山田寜與無心遊不受衆目憐褰衣必峻崿散歩亦名園舒卷信在襟蕭寂固所安經春僒疾痗撫時增懦孱羣書亂藥裹髙卧掩荆關蹇余屬乆要朝詣常暮還醜劣愧高情焉知君所觀日出衆鳥語蒼岑滿樓端申章寫深誼謭薄何由宣長風沙夜泊長風沙風沙不斷行人嗟行人嗟柰君何南風正髙北風起大船初灣小船喜移船更近大船頭不獨風沙夜可憂但祝行人好心事長江何處是安流茅屋参差數株栁時平尚置官軍守青裙老嫗詫鮮魚白髪殘兵賣私酒魚賤可買酒可沽他人心事知如何何郎失鏡詞團團如月不曾虧家人親置枕中時朝朝將正頭上幘時時攜鑷鬢邊絲古文宛轉何人造失來始覺今難討街頭不値半緡錢古銅終較今銅好向人不敢再三尋客裏空疑同舍心萬里相隨一朝别夜夜還瞻天上月贈青城侯尊師次人韻聞説名山采藥蹤多從雲去少人逢蜀江春老歸難定燕谷寒來望轉濃案上僊經新長蠧匣中雄劍舊降龍不知少日尋真處還在青城第幾峰贈友天道有恒運君子蹈其常時物自熈洽庻心亦惟康鄙人寡慮思沴氣冐隂陽霜霰中夏零焉得不摧傷先聖有遺訓血氣戒方剛懿彼老氏言舌齒分存亡反躬實明哲觀色屢廻翔正徳詎云害率欲乃非祥勿謂曐空明不足輸景光勿謂徑寸莖不足載春芳推餘暨昏朝懷哉安能忘曉出順承門有懷大虗歩出城南門悵望江南路前日風雪中故人從此去京城閒居雜言八首都城列萬雉樓觀切飛霞太液深蕩潏廣寒髙嵯峨重譯踰萬國流聲竟四遐既寵瑰異才復保勛舊家忠厚企行葦明照徹羲娥永惟皇上徳世世襲亨嘉冀北多良馬漁陽多壯士馬休伏槽􅌴壯士習農器桑棗竟中州朝貢四方至外無烽燧警内有耳目寄逍遥放良時歡樂永不替濟濟從臣内赫赫公與侯伊昔從我皇守邊瀚海頭荷戈十餘載力戰如己憂寸䇿無遺用長智少淹留勞多必重賞功大靡輕酬意氣相傾動恩深身若浮天子乗六龍垂衣臨九州茅土亘河山甲第隘莊馗四海仰光耀出入擁華騶富貴欲如此寵禄信難侔從軍亦云苦眷言享斯丘朝從獵城南暮從獵城北白馬喻飛翰輕裘如膏澤塵起如獸駭風髙如鳥疾隻箭落雙鶖千金出俄刻歸來拜恩寵樂飲過一石僮奴增意氣賔客改顔色常恐文逹士輕薄多瑕擿髙門臨廣衢秋風上荆棘朔土髙且厚民生勁而彊榆栁雖弱質生植益繁昌桃李大於拳棗栗充餱糧誰謂苦寒地百物莫得傷青青雲夢竹宿昔傲雪霜移植於此庭不如芥與楊竹性豈有改由來非本鄉𦕈𦕈寒門士客途困臺城上無公卿故下無舊友朋裘褐不自蔽藿食空營營四顧烖沴餘但聞號苦聲日負道徳懿敢懷軒冕榮節食慎所欲聊以厚我生髙歩覽九州誰獨無與親同室不相喻矧彼途路人誘訹更驅迫巧詐日眩真共美為善樂莫知與善鄰未足保厥躬已謂貽子孫一言易為義一恩易為仁世無魯東叟何以慰心神衆飈驚野草日夜委鮮腴嗟哉白楊樹髙髙淩𤣥虗朝遊車馬中夕息思故廬塵衿難為潔野性非京都貧賤不自保焉能戀簮裾頼有死與生可齊賢與愚去婦詞并序江東有一士子留都下三年適娶一貴人女為妻乆乃知其已有妻子矣一夕逃去因託去婦為之詩非徒欲傳其事抑以示風戒云爾輕合鮮義終苟容希禮遇逺結萬里昏多為才名誤始與君結好不知君有婦有女嫁他人俱懐託遲暮青青牆下草生死牆下路姢姢道傍華零落無處所女子失其身何以保貞素既乖百年意百年誰能度對鏡空悲唶中心良難訴浮萍難為託一木無兩附棄舊屬新歡新歡漸成故寧當中路析莫被他人去寧老阿母傍不受他人妬騰身出房闥兩絶無復顧所願嫁他人甘心西山樹四友詩并序四友者廣信王庭鈺良仲李商弼良佐武昌盧廷鸞子儀同里熊坦從正也李亡已七年餘亦亡二三年余索居京師毎夕夢寐與四友相接傷其皆賢而無夀又與予篤好迺作四友詩一以志余哀一以槩見其平生云李得年二十三盧二十九熊三十四王四十有九王兄負竒偉十四已應門倉卒遘閔凶盗賊蔽丘原衰絰從伯父慷慨安其人豪横劇狼虎瞋目莫敢干降心相欵宻共稱孺子賢時應州縣役調笑官長尊酬接雖靡盬講習日多聞激烈忠憤際委曲禮法間時平俗益康放志農圃言有集曰圃課浮湖感龍變嘗汎彭蠡見龍見遂肆意墨龍悟觧夐絶陟巘思鳶鶱古笛振哀鐵清琴繁素絃每傷古人逝迸淚尊酒前與我初識面已誓為弟昆雖謂天不仁中路遂離分寥寥昻山阿黝黝硯井泉賔客一以散託夢與招魂嘉木不叢生猶為造化欺繁霜凋其葉震風蕩其枝利蟲齧其根飢禽啄其皮豈無雨露滋不得干雲霓李氏年弱冠博通三氏詞援毫㨗飛電吐氣裂豹螭信如海上潮直若琴上絲朗如九秋月温比三春暉志在躋聖賢寧復顧所私一悟生滅理天地忽若遺君卒時一日晨興有數道人叩門謁求作白蓮庵記君援筆而就大為得意有頃忽奄然坐逝父母聞而趨哭之迎謂父母曰某兄弟幸多死生命也勿以為憂既瞑一道人撫其背曰檀越檀越生好處生好處復瞪目視道人厲聲曰佛法本無生滅卒癸夘二月也􅌾時衆轝出城初不能勝忽輕如羽顔回蚤聞道短折非所悲茫茫後死者中夜獨漣洏武昌故舊中盧生亦竒傑雄才傲當世髙誼凌白日貧賤有相知富貴莫能折冠葢如雲霧而獨與余宻大徳七年夏予有長沙役臨河與余分攬袂乆嗚咽知心託生死誰能此離别千里竟相從風浪復炎熱青天入杯酒歌嘯中夜激便欲乗滄溟超遙送華髪行行亦云至終當與君拆捨棹即長途惆悵如永訣謂余平生懷時俗莫能逹學不追古人終不願有室還聞起分教小邑傍蕭瑟始為賢者哀那知遽淪没樊山罷歡讌赤壁空流月佇立想音形音形一何濶親友日凋謝况我情所鍾熊子三十餘亦在九原中髙才祇促齡積善適為凶天道不可依人命如飛蓬夢寐常相見烱若生相從亦知心不異矧復里閈同始君掾韶學我心實忡忡歸來已三年微疾竟永終薄禄不救飢一官非髙崇獨令君子亡碧血冷秋風鄰曲恩愛絶山川談笑空名家失金匱樗櫟入公宫誰復繼粹温徒用相舂容千秋瓘山路繚繞劍池東賦雙陸三五對參差髙呼得采時猶疑雙出早毎恨獨歸遲散地偏難入全功或誤竒極知妨日力聊足審安危泊安慶時再北逰夜泊淮西郡寒生客子衣酒家臨岸閉野燒暎江飛雲盡月初出潮平風漸微前年城下路此際正南歸漁父夫前撤網如飛輪婦後搖艫青衣裙全家託命烟波裏扁舟為屋鷗為鄰生男已解安貧賤生女已得供炊爨天生網罟作田園不教衣食㸔人面男大還娶􅈄家女女大還作􅈄家婦朝朝骨肉在眼前年年生計大江邊更願官中減征賦有錢沽酒供醉眠雖無餘羡無不足何用世上千鍾禄髙郵城髙郵城城何長城上種麥城下種桑昔日鐵不如今為耕種場但願千萬年盡四海外為封疆桑隂隂麥茫茫終古不用城與隍濟州初度辭家計日逢初度遲日暄風在帝京曉起慈親望天北行行初泊濟州城楊栁青謡楊栁青青河水黄河流兩岸葦籬長河東女嫁河西郎河西燒燭河東光日日相迎葦檐下朝朝相送葦籬傍河邊病叟長迴首送兒北去還南走昨日臨清賣葦囬今日販魚桃花口連年水旱更無蠶丁力夫徭百不堪惟有河邊守墳墓數株髙樹曉相参雜詩四首寄彭通復日月麗中天列宿爛昭昭河漢髙且深烏鵲以為橋寒霜昨夜降時菊委嘉苖地勢西北雄終歳皆風飈𤣥工宰萬物時至有榮消常恐光景遲不得與逍遥區區九州内横從數千里誰設山與河愚者分表裏京師天下本萬國赴如水珠犀從南來狗馬由西止浩浩荆呉船日夜行不已生材無定所一物孰非已皇天仁且廣君道亦如此我思古唐虞當日誰共理巢由伏箕潁園綺居商顔洗耳甘自潔茹芝竟不還三傑足為理五臣安可攀髙尚誠所貴孔轍奚獨環吾聞有隠淪多在衡霍間飯牛腹長饑百結淒以寒懷寳羞自獻邈然老空山脉脉我所思彭氏躡遐蹤婉婉若處子未曾出房櫳相望四千里踰年闕相從五月君寄書九月逹京中我書欲報君書到歳已窮豈不懷繾綣無由覿君容参差天際雲縹緲乗朔風羽翼不吾施翩彼南飛鴻君有髙世行我無適時功天命人得違出處諒非同栢堂詩并序栢堂為劉母熊夫人作也夫人有淑徳年二十五而寡守志不嫁有子曰觀又賢作堂以奉其母請名於太史氏謂之栢堂而作是頌鬱彼北堂言樹其栢其栢嶷嶷維木之特栢之始生于彼髙陵雨露其凝金石其貞栢之既成鳯臆鸞膺言樹斯庭霜雪是憑雪霜浩浩其栢矯矯有美君子而弗偕老其葉欒欒其節桓桓其居安安永世式觀我堂既構我栢既茂天錫眉壽保艾爾後
