body:
  text: 文安集卷十三元揭傒斯撰銘饒隠君墓誌銘臨川饒國華卒之明年其孤得正馳書京師請銘曰先子且屬纊曰吾生無所成名沒必得故人揭君銘余十五年前過臨川遭國華於道要余至舍行二三里至大原之谷其山四髙環合如城中有良田美木水聲淙淙與禽鳥之聲相亂坐予屋西别墅悠然之亭諸子玉立觴酌屢行復裵徊濯清釣雪諸軒亭之間花氣襲衣竹陰滿地使人泠然忘歸為留一日而去自是嘗一再過之不謂奄然死矣悲夫君早孤事母鄭孝謹為人端重和粹好讀春秋左氏傳能通諸史始末重賓客樂施予浮沈鄉里與時髙下及諸子既長皆讀書有守足持其家乃泛大江浮雲夢弭楫漢水之上入鹿門求龎公遺迹登峴首訪羊公墮淚之碑於是扁舟東下觀六朝故都泝彭蠡而還方謀歴齊魯燕之郊而不待矣嗚呼遽如是已乎君長余一嵗耳余雖生何益忍不銘君哉君諱應舉其先南豐人曽祖志通祖宗父文祖配呉氏子男三得正得真益女二長適劉次適余孫男一瑞生女一君卒以至順元年十月七日年五十八葬以某年月日墓在某原君嘗買書數千卷割田建義塾以教鄉里子弟未遂而殁是尚在後之人銘曰不角而勝不求而足悠然大原之谷庸非斯人之福蕭景能墓誌銘泰定三年九月五日廬陵蕭祥嘉景能以疾卒將葬矣其妻之兄鄉貢進士劉性粹衷告所知揭傒斯曰女弟之夫蕭祥嘉生而甚賢不幸年二十六以殁生而無所成名殁無以表顯於世女弟甚哀之願得為之銘庶幾為不殁也敢請問其善狀則曰祥嘉少有志操常以古人自期篤學好問未嘗有子弟過父早䘮事其母劉生母張及二兄盡禮與人交和易簡諒言必可復諸經皆通大義諸子史方術百家皆能提其綱領其要雖進士程文未嘗苦學下筆出輒人上尤喜為歌詩以漢魏晉為宗下此惟陳子昻李太白韋應物以為稍近於古長短句則曰周美成秦少游姜堯章吾師也又多藏三代彞鼎罍洗漢魏金石刻唐宋名人圖畫墨蹟之屬客至賦詩彈琴圍棋賭酒連日不厭平居焚香黙坐不知斯世為何如時其父在京師為翰林曹承旨勛及其弟監察御史都賢所知聞其學薦充博士弟子員念其母不果行湖廣行省舉茂材籍教官中亦不就不知者往往誚其闊迂弗顧也沒之日弔者皆為之慟以為使不即死學不至古人不止必且舉進士否亦必不肯睢盱噂沓以媒其身以辱其親此女弟之所甚哀而願銘之也幸終賜之銘夫良人者婦人之所天也不幸不與偕老愛之而不改哀之而不忘古有之矣未有能圖不朽於金石又有賢如粹衷者能成其志敢不述而銘曽祖超祖子貴父均衡以賑粟致位贑州平準庫使漢陽府漢川縣河濼使俄以近臣薦授奉訓大夫瀋陽王傳府㫁事官尋以例罷娶劉氏繼亦劉氏即粹衷之妹也皆無子有女二人次則君沒三月始生以兄之孫繼善為之後葬以卒之明年某月日墓在某鄉某原有文集三卷藏於家銘曰生惟古兮是求沒追古兮與游嗟今古之人兮不使之子而少留鄭隠君墓士莫貴於知禮然貧而知禮易富而知禮難富者驕吝之原禍福之樞也故貧而知禮不失其身富而知禮不失其家豫章之新建侯溪里鄭君季明其富而知禮者乎君字明仲兄弟三人君為仲叔父早世以為叔父後然未嘗去父母之側其習詩禮執孝友甚謹父母嘗曰爾為叔父後他日分財固不爾殊也及父母終兄弟異財欲出分君辭曰夫既有所受矣卒辭而兄弟情好益篤事其兄如父視兄弟之子如子每食一人未至筯不先舉人不知其異爨也與人交必誠必信稱人之善人不以為諂折人之過人不以為怨簡而周直而和臨事無留難吾直也雖摧山倒海之勢不以為撓吾詘也雖蜂蠆之毒莫之或攖人有園田雖接壤未嘗敢利將不守猶委曲扶持之必不守乃倍價償之人有患難必身救之人有忿爭必理解之嵗豐必積粟以備水旱嵗饑必不貴糶以先鄉里年踰四十即獨處一室或與二子同寢齋閣以督其學褒衣博帶望之翼然知為古之有禮者會嵗賓興語親故曰先子在宋固嘗試補博士弟子員矣而降年不永弗終厥志余雖老敢忘之乎遂躬率子弟使試有司尚繼先志至治二年秋七月得末疾五日而殁是月十一曰也年七十有六十有二月二十日葬邑之盡忠鄉華表峯之麓後六年乃以龔先生道原所為狀請銘余自從太史後執論撰之事多矣富而好禮未有若龔先生所陳者可不為之銘君之先徙自臨川曽大父珉大父璇父文富所後父曰夢發配夏氏先十二年卒子男二元昇元麒女一適熊元恭孫男四大同大觀許州定孫女五長適夏肅次許適揭頑閭曽孫男二顯孫虎生銘曰物之隆封必崇家之豐禮必恭殖有禮天所視貽孫子視所履噫吾其跂而楊隠君叔芳墓誌銘清江楊天芳字叔芳抱疾且十載將沒自誌其墓曰世無昌黎公誰知我者葢自傷也沒且葬其子觀奉乃祖之命來請銘余雖不足追蹤古人不可謂不知君者忍不銘以慰其父若子之悲乎其世曾大父諱必通大父諱允成父名辰龍皆為儒其容秀整清峻進退有度其行事親孝不妄交母聶氏䘮致客數郡其學以禮義為本博而不雜其文黎司業立武李舍人珏呉學士澄皆稱道之其配熊氏其子觀其女長適甘惟逸仲適蕭鑑季適黄升其生至元丙子十有二月二十有七日其沒延祐甲寅九月十日其葬泰定四年十月某日邑之茂材鄉鍾山原其葬處也嗚呼君負髙才生盛時又有科舉可以取禄位沒猶拳拳焉恨無昌黎公託其名不亦大可哀耶銘曰父甚慈老而哭其子子甚賢弱而䘮其父沒十有四年始復于土祖孫依依兮尚其歸輔楊隠君叔宏墓誌銘𢎞農楊氏遍天下多賢而好文其世居清江之水南者傳至宋登仕郎允成新塗杯山巡檢應斗皆負奇才實學不獲志以沒為當世所恨而杯山君有子曰繼孫字叔宏甫知學即慨然以歎穆然以思題其讀書之室曰學軒曰吾之學將何學乎學吾先世之所學而已先世之學果何學乎學為聖人之事而已聖人之事果何學乎忠君事親敬兄友弟皆聖人之事也吾富貴利達之不知遑恤他為於是朝夕是軒身益脩家益齊鄉邑之譽益歸而君子皆謂楊氏之必興矣年五十三竟奄然以死天道竟如何哉君孝友和裕好賓客能為詩不求甚工往往道人意中事其學守家法娶張氏子四人徳方直方義方正方皆脩飭謹篤孫四神明顯貴方力學君生以宋咸淳八年壬申九月十有三日卒以元泰定二年乙丑七月二十有五日葬以天厯二年己巳四月九日墓在邑之茂材鄉升平里小溪山之原銘曰人知其學天知其命命與學違我則有定嗟叔宏甫學乃其性而命之微孰敢不敬甘景行墓銘豐城甘君諱果字景行早以郡學諸生受業熊先生朋來之門及長好為詩至元之末與邑人蔡黻熊坦等十人結社龍澤山中方是時國家取士非一途或以藝或以資或以功或以法律其最上者以文章薦可立置館閣然皆不好唯以治田園躬孝養奉䘮祭給公上禮賓客䘏貧乏暇則讀書教子而已天厯至順之間天下大旱蝗民相食天子下詔賑粟五百石以上與秩有差三百石旌其門君出粟或賑或貸或為粥以食日所活以百計而不受賞未幾家人失火尺椽不留人皆弔之笑曰昔有非有今無本無君何弔焉新構既定以至元改元十有二月八日卒年六十七將以某年月日葬于某其友熊君椅以書致其孤之意請銘君之先丹陽人南唐時有曰從矩者為豐城兵馬鈐轄因家焉其子稹在宋初為監察御史稹孫令詢始居邑東功曹山之下榮場之里逮君葢十五世云曽大父文昭大父應欽父一清宋登仕郎君兄弟四人君次居三兄曰槃曰榘弟曰栗娶周氏生子熹燮繼黄氏生三子堅垕塤他姬子二圻丁生丁為兄槃後余與君居同邑生後先才五嵗常讀君之詩慕君之為人而未及識今竟不可復識矣而得銘君墓幸已銘曰世貴以位君以徳義世富以利君以施惠龍澤之山髙與天連君去不回君詩在焉故榮禄大夫陜西等處行中書省平章政事吕公墓誌銘陜西等處行中書省平章政事吕公賜還之六年薨三月而葬未葬旬有五日請銘公諱天禖字吉卿世家遼東之咸平今為燕人曽大父諱元仕金為監軍太祖建帝號之八年以其衆北歸從光獻皇后弟入事上承光寵者餘二十載大父諱惠堅及夫人董氏以順聖皇后媵臣為皇子北安王保傅能恭慎純慤得幸上沒諡恂恪父諱哈喇廉直多巧思為初建金玉局使奏釋所獲宋間諜鉗􅎂輸作者及渡江所俘童男皆教以工事世守其業歴工部侍郎尚書將作使中書㕘知政事拜大司徒獨立不阿權臣阿哈瑪特數欲害之不能僧格誣陷丞相安圗則力為之辨為天子心膂沒贈金紫光禄大夫諡忠惠生五男子公次居四兄天麟天祐皆至大司徒至元二十有九年公從忠惠公入見上即以公可大任忠惠方選將作僚屬上詔用公忠惠不可遂以奉訓大夫同知異樣摠管府事奏免所負金帛甚夥成宗時自秘書監為將作使八年人未嘗見毫髮私進集賢侍讀學士遷大都留守兼少府非上共必節雖權貴莫敢干以私至大之末擢河東山西道肅政廉訪使以母老辭改禮部尚書又以母憂去數詔起固辭後四年用為夀福院使乃起仁宗四年上思其祖父勲勞嘉其誠篤特拜集賢大學士與聞國政自奉訓大夫至是六遷為榮禄大夫每議論朝廷之上慷慨切直不為詭隨大臣多不便之遂稱疾家居泰定之際關陜連嵗大旱父子相食死徙者十九文宗即位詔起公為陜西等處行中書省平章政事以撫其民公曰民急矣即日就道晝夜兼行及到官宣布天子徳意發楮幣百萬緡米萬斛命有司賑之公乃齋不食三日以哀籲天其言曰天欲降大癘于民民乃能力作佐國家以事天地神祇臣老不能力作佐國家以事天地神祇而受天子命以撫寧其民民有罪宜悉加臣身毋久亢旱以盡殺吾民天乃大雨一雨五日是嵗大熟民始稍稍有復業者至順二年冬以疾奏乞還京詔許之父老聞之相聚而哭於庭曰凡吾民之有今日者皆公之賜也故吾民得公則生不得則死公何忍遽棄吾民而歸也復大哭公力疾厚撫喻之强留至明年出關未至京工數問李平章至否既至入見上上迎勞之曰朕久不見卿思卿甚勤聞卿在關中天格其誠民被其澤凡使關陜還者皆誦卿之徳良用嘉歎故召卿還因賜之酒且曰卿病愈當大用卿公稽首謝曰臣素無行能陛下寄以方面常懼弗稱況敢當大任乎至元三年春三月三日公疾殆將屬纊且戒令薄葬屬子孫世世以忠孝報國言訖而薨年七十將以四月三日葬城西岡子原先塋惟吕氏自公之曽大父帥衆歸國今百二十有五年矣世以忠謹事上父兄繼㕘大政繼以大司徒開府至公四世益謙讓廉退如漢萬石君家既閒居十有餘年及以關中之饑起公則如救水火其憂國愛民之志為何如也臨終猶以薄葬忠孝為屬嗚呼賢哉公娶曹氏生大都人匠摠管府達嚕噶齊某同知異様摠管府事延夀而卒繼鞏氏無子卒繼康里氏有子曰額森他姬子二曰大都博囉孫男四曰靈童今宿衞士曰烏魯斯布哈諤勒哲特穆爾巴延特穆爾銘曰自古為國罔不以臣豈曰以臣惟老成人而無老成何以為國如彼䝉叟㝠行擿埴蒼蒼者天胡不憗遺瞻彼晨星日既烜之嗟嗟吕氏世忠世厚孰謂伊人弗與國夀望而不見聴而不聞國豈無人而公不存我觀四方饑饉薦臻孰與濟之如公在秦公既逝矣不我作矣雖不我作無忘國矣有子有孫有繹其承岡子之塋公其永寧奉議大夫平江路嘉定州知州甘公士廉墓誌銘宋建隆二年江南李主遷都南昌其臣有甘從矩者以丹陽兵從開寳中子禎遂以列侯居豐城李主入宋乃為宋人禎生宗宗生十子其一曰椐居邑中後三百餘年有諱朝舉字士廉者沈鷙廉敏以功業自許會朝廷以法律治天下其故人官嶺南乃往求為郡吏得補韶州太守信其廉郡吏服其能部使者聞之辟以為掾居久之遷海北海北方大治威嚴任煩苛君一裁以正海帥獲諸叛黎無輕重皆下獄當死君閱其獄出脅從者五百餘人民為立祠廣西帥思得强明吏以自佐復辟掾其府尋丁父艱服闋還府藤容二州山猺為亂佐元帥萬奴擊之帥聞民多與猺通欲盡殺之君力諫不可且曰民居近猺猺暴其民吏不能制姑從猺保妻子以待官軍也令欲并罪其民而誅之是驅民以資猺也若舍民而專事猺民必并力而誅猺破可必矣帥從之即督兵進擊其酋聞之果大恐自縛詣轅門降不戰而定帥及部使者交上其功不報遷湖南復以母憂去泰定初起掾湖廣行省時髙昌王行平章問疑發難辨答如響大器重之秩滿朝廷遣使與南臺監察御史銓廣選首用為廣西帥府經歴葢嶺海之間嵗薦饑賓栁慶猺為冦亂不止故選任之也即下車廣儲待簡傳省征歛以養兵息民居嵗餘請討諸猺事聞詔遣湖廣行省平章劉脱歡總河南浙江江西湖廣四省兵四萬人討之君迓境上固言攻討之䇿必自近始近者服則逺者自從今近而狂猘莫若古縣猺栁州皁洞首李氏者有衆數千本吾撞義兵强勁可用而有司貪暴激使為亂今大軍甫至至則以古縣猺責之威亂方張遣一信義素孚者招之必至可計日而滅古縣之猺滅諸逺猺必自解而歸劉愎諫自用不聴未幾誘至李首及其親黨六人皆下獄皁衆聞之大怒殺柳州萬户與諸猺不可制矣劉駐兵數年卒無功至順二年春詔班師君亦以病滿三月謝歸而廣西部使者馮麟卿舉治最湖南部使者管不八舉才任風憲元統元年調官京師授奉議大夫平江路嘉定州知州兼勸農事命未下而卒是嵗七月二十四日也得年五十五其甥曽利用䕶䘮南歸子九成等以至元四年二月八日葬廣豐鄉食禄里邵坊之原夏九成以南安路總管府照磨鄭徳中所為狀請銘曽祖諱露祖諱發父諱叔良贈承直郎龍興路總管府判官母聶氏贈恭人娶于氏封恭人子男三長即九成將仕佐郎韶州路樂昌縣主簿廉尉次九思南寧軍史次九萬女一適楊脩惟君與余同里而君仕越余仕燕邈然不相聞葢二十餘年矣泰定三年余試進士湖廣君實以行省掾馳驛迓余始一見後八年余任藝文監丞君調官京師始再見不謂見不數月而君竟以䘮歸可哀也哉銘曰堂堂其英烈烈其聲有言必徵有施必行懷抱利器惟所剸治弗顧以畏有倫有義鄉黨非戚嶺海非疏爾毁爾譽我廉我愚以公為忠以守為孝以勤為政以肅為教出無所資入無所歸生一布韋沒一布韋有臣如此弗考以死何以銘之清白遺子故贈奉訓大夫滕州知州飛騎尉追封滕縣男文君墓銘太傅掾呉文温介新深州判官周紀致其外舅武昌治中文君淵之辭曰淵早賴父祖之訓起田里習國書由國子生歴髙郵鹽官兩郡教授平江平凖行用庫使湖州録事溧陽州判官呉縣尹知昌國州武昌治中凡七遷其官致位五品幸無大􅏱在昌國時朝廷推恩贈先父奉訓大夫滕州知州飛騎尉追封滕縣男母追封滕縣君淵今年六十有七矣亦既請老于世不知當復幾何年而先君墓道未有所表夙夜是懼敢請紀文温皆滕人文温又文氏壻問滕州君所為狀則曰滕州君之為人也勤儉樸素既辱在田野不得列名仕版效才當時渾渾乎若無異於常人也然里中緩急苟有所請無不應其求其家人或以他辭拒輒詬曰苐願我常有何得不與人共之若等將舉無求於天地間耶吾知滕州君者如此復問淵為政何若曰在溧陽時州民蔡有一孫為某寺僧他惟一僧居孫上計去是僧其孫即得為主寺未有間會有以博訐于州者賂訐者楮幣千緡令引僧又許賂君千五百緡淵疑之廉得實又知同列皆受賂明日故晚出出則獄已具吏抱牘請補署淵不可歴問皆稱實無僧訐者具服僧得免在昌國獲海冦數十其渠言奉化州尚十餘人具言某人居某所歴歴可畫如所指移奉化捕之悉械送無遺淵察之皆畏慎慈順人也必非盜乃使皁卒易服詐為所獲盜歴引羣盜辨之言非盜人人同且各言某盜為某狀此名是而人非亦人人同詰其渠果挾仇誣之也悉縱之繼又舉最於呉吾知淵之為政者如此然後知滕州君之為徳人滕州君之宜有後而淵又能推孝以為忠而紀文温且善志人之志余得以為銘滕州君諱順字某父諱郁世為滕州滕縣人君以某年月日卒年若干以某月日葬縣東北胡山漷水之間洪邨之原縣君丘氏子男四曰某某某季淵也孫男若干人女三壻即文温餘未行銘曰不曰髙乎積壤成山張而為屏翰翕而為重關不曰深乎積流成河蒸而為雲雨鼓而為濤波一人重義百世䝉利一人好善百世錫羨有髙者胡有深者漷文氏積之百世允鑠逸士徐君墓誌銘吾鄉之士以好善為貴不辱為榮父賢子孝兄友弟敬累數世而不厭者有隠溪徐氏溪出所居之東龍澤山中即其祖漢孺子讀書之處溪之上有諱輿字徳載者尤徐氏之賢者幼而篤學長而更事外圓而内方上敬而下順不遺邇不忘逺不矜小智不忽小善急人之難憫人之窮勇與義俱不待勉强後至元五年三月二十有六日年五十四竟以疾終婣族茹悲閭里増歎載念國初盜起鄉境其祖友諒奮義庇民萬死一生執其羣醜室家相慶世保子孫厥父以莊承忠襲厚年將八袠好徳弗諼宜膺敬養遽哭乃子天道悠邈實竊惑焉然有四子文箱楫駟檢身力學將世其美孫支擢秀一男六女依依膝下足慰目前將以十月己酉葬佛嶺之盧岡其弟珏狀其行請銘余昔嘗聞君有美地卜葬者睨焉卜宅者規焉因以與之不以為徳嘗市大木築室將伐貪夫徇利造辭以爭因以讓之不以為弱心有所嫉人因毁之事有所仇人因短之目為佞諛終身薄之最其善行斯可銘已其配呉氏葢先十二年卒銘曰隠之水兮其流沄沄爰匊衆芳于溪之濆匪以娱人于以怡親親今獨來身去為墳親匪獨來亦有諸孫諸孫日長親日以老墳今惟新忽焉宿草我思其人隠溪之道惟徳之行惟善是寳有才弗用身之隠也有徳弗報命之殞也展矣若人邦之彦也逸士陳君墓誌銘逸士陳君諱殷字嘉靖世居豫章之豐城故邑晉雷煥掘劒處曰營塘里里故家莫尚陳氏陳氏之賢莫尚嘉靖其曽大父亨大父世興父應軾皆事髙尚而家範齊肅如素宦君少孤母王氏教育之年十五而天下易代辟地母家因受學舅氏博學强記尤好讀梁太子統文選故下筆為文章皆有規矩事定而歸始與世相酬酢應機合變動無遺䇿伯氏嘉謀每讓其能才與學躋徳與年長宗族鄉黨咸屬望焉伯氏早世撫孤育幼如見伯氏田園第宅中嵗載斥乃法朱氏家禮改作先祠冬至以少牢祠始祖春秋祀先祖悲哀涕泗如見所祭凶年饑嵗發廩賑貸不待勸分新知舊好交際以義不事姑息晚重構所居堂署曰樂善大書其門曰當平世遂安居以示終焉之志元統復改至元之嵗正月朔旦又大書其兩楹曰行仁自孝悌始起家勤儉中以垂訓子孫三月二十日以疾卒年七十三且屬纊子若姪皆涕泣固求一言以自克乃瞪目而言曰可以終身行之者和而已遂卒三年九月庚申葬折桂鄉禄城里其配王氏墓南又明年其孤植以所親熊君椅所為狀請銘余嘗聞君嘗有奴死仇家者仇大恐祈哀于門君曰吾豈以此報仇者謝去之又有商糴粟誤持賈嬴而君弗知商頃自覺與其徒更相怨君聞故得實曰吾豈以此為利者立還之君葢盛徳人也足以法於後世矣君娶王氏為婦為母内外皆儀之先二十年卒得年四十二繼雷氏亦有淑徳先三年卒得年六十四子男三果迪植果為伯氏後迪先九年卒孫男三伯庸伯寧受生女四曽孫男二普奴徳奴女一銘曰時俗之日墮兮忠厚之日衰兮嗟若人而天不憗遺予倀倀其何之已而已而庶其後之可期兮何先生墓誌銘至順二年夏詔以集賢大學士全公嶽除平章江西行省事秋具書幣遣使帥撫州太守即隠所聘孫先生轍何先生中而孫不起何先生既至以為龍興郡學東湖宋濂二書院賓師明年春與其子渡江遊西山主丁氏夏六月二十有三日以疾卒丁氏為具棺殮其命子為位受弔諸大夫士皆㑹哭後三日子成孫奉柩以歸明年十月十有三日葬邑之清原妣夫人唐氏之北其門人李肅以狀至京師請銘於先生所與遊者揭傒斯曰何先生海内故人執論撰之事而相知深者惟子舍子無宜銘者噫余以兄事之者葢三十餘年矣余不銘誰宜銘先生諱中字太虚一字養正世為撫州樂安官族曽祖諱詵伯祖諱夢龍父諱天聲登宋咸淳辛未進士第官至主管刑工部架閣文字以才畧與伯兄兵部郎中時齊名文丞相建都督府皆置幕下先生少頴拔以古學自任天下載籍靡不貫穿藏書萬卷皆手自校讎廣平程公鉅夫清河元公明善負天下知人之鑒皆器遇之至大初二公及栁城姚公燧東平王公構皆在朝遂北入京師以文章自通會諸權臣用事内外翕翕居兩月天大雪竟不别而去歸與諸門弟子講易書詩春秋大江之西同郡呉先生澄號天下儒宗又為中表兄然每推讓不敢置弟子列積所著書曰易類象一卷書傳補遺十卷通鑑綱目測海二卷通書問一卷韻補疑一卷六書綱領一卷補校六書故三十一卷知非堂槀十卷支熙録二卷薊丘述遊録一卷其門人潘懋類聚刻之先生之學可謂𢎞肆深博矣然生世六十有八年連蹇愁悴者十八九書幣一入谷而客死三百里外不知天之恝然於斯人者獨何哉豈其多學善著書亦天之所忌邪此固窮士之所自託者吾不知其何故先生娶陳氏有三男子曰長孫在孫成孫四女嫁士族孫男十人銘曰夫容之髙吾其跂而鰲溪之深吾其厲而先生之沒曷其起而靖逸處士熊公墓誌銘集賢所號靖逸處士熊公豫章豐城善源里人也諱召子字南翁少豫章先生朋來十二嵗先生世與公連牆以居後家郡中先生每歸里必舍公所公至郡中必舍先生所兄弟自為知己公博覽載籍好論古今事如生其時性抗直辨是非枉直如别黑白雖大官豪吏一語失度即面折語琅琅不少衰然卒如公言人有言論失實舉措無節于名義或有所闕必詬辱之人亦莫之敢怨退自悔艾而已葢皆出乎正也故鄉之人倚之以為安視之以為去就雖紛爭辨訟可一言而解公早以儉勤起家而以儉勤終身不少易其常後至元五年十有一月十六日卒年八十三將以十二月十八日葬富城鄉交陽之原其諸孫請銘系之曰曽大父諱海大父諱英父諱誠孫娶雷氏生子男二雅先十九年死盜京先五年以疾卒女二長適范希驥次適范世隆繼黄氏孫男二克愛績克愛早世無子以嗣祖為之後女六曽孫男二長即嗣祖次普福女二𤣥孫男一長夀公之葬實與子京同其兆云嗚呼余與公居相隣世相好情義之相與殆未有過於吾二家者然自余竊禄於朝不相見者動十餘嵗余間每一書還公必杖䇿詣門訪出處余書中亦往往問公安否葢跡雖疏而情則至親也又聞余未還時公數向人言吾苐得與揭曼碩一見而死吾不恨矣吾當忍死待之及余還即買羊載酒躬相慶勞其喜見顔色猶親子姪不知余之不肖何能得此於公也其亦以先世之故與公未沒前一日余猶及坐公榻前相與劇論當世事不知竟為永訣也悲夫銘曰鬱交陽兮窈深結重雲兮愁陰望君子兮不見渺千古兮傷心傷心兮何極鄉誰歸兮里誰式孫既子兮子又孫承惠澤兮其無斁劉先生墓誌銘吉之永新儒師劉先生諱友益字益友是為清江公非先生九世孫曽祖諱宗信父諱繹世以家學為邑人師父剛嚴介特獨立無朋而以先生為之子故少與物忤先生少好學貧不能得書從里之多書者借而讀之朝借暮易暮借朝易窮晝夜讀不絶聲過目輒記間為人傭書以給膏火父母憐而禁止之乃掃别室羃牕戸竟坐黙誦如是數年貫穿六經包羅百氏至天文地志律厯象數山川聨落郡縣廢置皆可指畫而談毫髪無遺也宋之亡鄉里豪猾並起為亂與伯兄真長從弟人暐皆遇害先生絶而復蘇饑困踰年乃卜築髙山之間杜門著書不與世接以聖人之志莫大於春秋繼春秋之迹莫大於通鑑綱目凡司馬氏冝書而未書者朱子書之冝正而未正者朱子正之恐朱子之意不白於天下後世乃著通鑑綱目書法五十九卷葢歴三十年而後成天厯中邑進士馮君翼翁傳其書至京師國子先生得之大驚曰昔者王道衰而春秋作春秋隠而綱目興書法不作綱目之義又將微矣故聖人之述作雖殊所以扶天綱立人極一也遂録副在官俾六館諸生傳習之至順三年三月三日昧爽先生疾作猶正衣冠危坐至午而卒年八十五以某月日葬邑之禾山鄉大豐之原娶陳氏繼段氏子男三矩衡節皆克紹先業孫男十曽孫男一又明年夏馮君調官京師矩具狀介以請銘馮君曰先生外和而内剛外通而内介言簡而要不迂濶於事其誨人也諄諄善誘白鬚丹頰神情蕭然真有道者嗚呼若先生者苟見於用當何如哉銘曰百圍之木不為斧柯蹄涔之水不為江河元有天下先生在野先生在野志在天下百世之上先生此心百世之下先生此心先生不作山髙水深劉福墓誌銘廬陵劉福字孟介五嵗好學日記千言不知有童子之樂父母每憐之十嵗聞科舉行即大喜忘晝夜廢寢食蒐獵經史旁入㨗出務為無所不知聞有學出己上便往與交聞有大人先生便往質其所疑祈寒極暑不懈人亦莫不樂告之以道然一資以為進士之文如是數年學大進雖宿學有不逮又限以年不得試於有司或曰今天下州郡以國書設教官可得遂因言者求之三年而後得然卒不好數數語人曰吾不能取一第為父母榮不數為人聞有以進士及第者輒俯首終日食則嘆寢則寤語父母曉之百端終不釋或又曰子欲為甚可隠年以即事世若此多不可數乃瞋目訶曰子教我以欺君耶去然怏怏日益甚父母及其從父皆以為憂鄉先達劉嶽申彭士奇羅曽深愛之亦皆以為憂未幾果得疾疾且革猶手不釋卷未嘗就牀泰定三年十有二月八日嘔血死將死歎曰吾生不在科舉後沒不在科舉前命也然世必有知我者銘我得銘吾不恨矣言絶而卒卒年二十四明年夏余至廬陵其父及其從父偕其友以銘請嗟夫忍不銘哉惟古者士生八嵗入小學十五入大學而教之必時故傳曰春秋教以禮樂冬夏教以詩書又曰春誦夏絃秋學禮冬讀書因其時順其氣協之以陰陽動靜之道和之以藏脩游息之節以成其學由司徒大學正以登於天子而爵禄之故人無夭札而器可閎也今也教之不以其時學不以其序及為之選舉則又限之以年嵗使奇才英銳出類拔萃之士恒鬱鬱而不得竟伸其志愚鹵鄙陋者或媮慢優游得以玩嵗愒時此劉孟介至於嘔血而死也雖命焉其志有足悲者乃志而銘之使其英邁勃勃之氣常得以振頑奮懦為有志之所深恤也曽祖紹明祖惠可父國瑞母曠氏娶歐陽氏無子女一人方七嵗以沒之明日葬里西溪之上太平原銘曰名不建兮心不摧身不殞兮時不來吾銘汝兮吁可哀吾讀吾書齋銘惟皇降衷萬物備我或昏以迷或岐而左煌煌六籍如日麗天由之斯聖希之則賢而倀何之而思孔悲孰之子歸而有餘師伊予云遘蕭氏克有日就月將誰掖誰誘曰諺有之吾讀吾書亦既從政惟書之劬吾書伊何匪聖弗讀成已成物惟日不足于以名齋于以表志凡百君子尚迪弗替孝友堂銘孝首百行友列五常為仁之本為政之綱學由兹始行由此推善由兹長慶由此基是以孝友著乎詩書君子述之為世之模不求父慈而責子孝不求弟恭而責兄友父無不是其責在子弟有不恭或自兄始子知盡孝敢望父慈兄知盡友弟恭敢期父無不慈弟無不恭惟孝惟友克誠於中一有弗誠必致怨尤日復一日化為冦仇范則有匡雁則有行而況為人敢不自强孝盡生慈友恭亦爾孝慈友恭百世之祉子復為父子必紹之弟復為兄弟必效之父父子子兄兄弟弟惟贑孫氏以克永世何以克之勝私窒欲家為一人族為一族既貴弗驕既富有禮一家興仁里為之美蘇子説剛乃祖是敬子孫孝友鄂國是命我作銘詩式篤爾慶神之聴之有永無竟潭心齋銘金溪洪君王純其先府君號碧潭遂取翰林學士呉先生賦碧潭詩語名其齋曰潭心為之銘山下出泉混混其源流而為川瀦而為淵淵淵其淵潭潭其碧含星為珠沈月為璧其止非息其應不留溶溶而春湛湛而秋觀靜於動知靜之用用無不周若未嘗動觀動於靜知動之靜廓乎有容表裏交映惟淵之深又名曰潭視潭之碧于彼潭心思無邪齋銘為學至難莫微于思一出一入或公或私其思伊何曰誠而己思有弗誠毫釐千里其誠伊何恐懼戒慎莫顯乎微莫見乎隠暗室屋漏上帝是臨一動之微敢有弗欽誦詩三百一言以蔽曰思無邪乃義之至熊氏力行而以名齋俯仰周旋涵泳聖涯大而化之堯舜執中朂哉思乎罔或弗恭讀書處銘古者讀書學之一事力行是務記誦其次苟非讀書孰稽古典讀而弗學去聖逾逺古之讀書於以明道今之讀書資以為暴生皆厚也遷乃去之人不知學若之何其其書伊何易書詩禮春秋筆削日星垂紀秦漢以前傳注未立學必專門難學易入秦漢以後濂洛並起著述紛紜易學難至學之而至匪由他人學而弗至何有於身其學伊何由䝉而聖灑埽應對窮理盡性毫釐靡間徳乃日新一日復禮天下歸仁羲皇之上唐虞之際若友其人若共其治動之斯應為乃有功三綱既立五典克從求之非艱其在方册行之非艱中道勿畫欲知詩書於此其處趙氏行之名齋其寓既脩於身復齊其家始施於邦如玉靡瑕好正嫉邪崇本抑末制財以寛用刑以活擴而充之儀於天朝惟是正人萬世之標我作銘詩以規以頌凡厥讀書朂哉體用忍恕堂銘古之學者有紀有倫忍以定性恕以求仁維忍伊何存仁存禮維恕伊何推人以己忍為恕用恕為忍基凡忍之道惟恕之思忍不由恕宿怨藏怒惟忍而恕毋我毋固以聖而忍耕稼陶漁以賢而忍九世同居苟不思恕亦豈克久舜有大焉為孝之首有美袁氏兄弟怡怡合堂以居忍恕是師我田我廬先君之有我兄我弟先君之子惟忍惟恕維徳之實子子孫孫永保勿失方寸間銘察日月於孤竹之竅寄天地于秋毫之杪萬物皆備吾不知其多一物不留吾不見其少是曰方寸間者臨通衢俯深沼外有幽花芳草之植内有圖書琴瑟之繞容坐客十數而有餘閱朝暮萬變而未了吾方以為大人猶以為小是未能遊乎方寸之表也
