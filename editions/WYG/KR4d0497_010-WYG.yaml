body:
  text: 文安集卷十元掲傒斯撰記冨州重修學記上御經筵之明年夏六月濟南姚侯來為富州以舍菜禮見於先聖先師祝曰惟夫子之道參天地配日月用中罔敢知而用中實生齊魯之交宻邇夫子之訓欽承明命來守是州今之州古千乗之國也敢不敬恭朝夕惟是顧瞻廟學摧陋弗稱曰余之責也㑹教授清江陳明之繼至議與志合明年秋大修孔子廟仍其舊者惟殿若明倫中庸二堂江山秀傑樓惟一改作而有加規制必裁就法度出入必限由正途凡為屋幾七十二楹又刻銅為七十二弟子及諸賢像以嚴祀事鑿半池其前倣古泮宫侯載經載度是董是勞吏忘其私工勸其勤涉冬徂春用告厥成而命傒斯為之記在至元二十有三年陞豐城縣為富州以河東陳侯元凱為之尹時科舉廢十有五年矣士失其業民墜其教盜賊滿野竟數十里不聞雞犬聲陳侯大懼遂修孔子廟建小學日集文儒故老講求治要悉資以為政不數月境内大治知所務也今科舉既復亦十有三年而侯實來當天下文明人復其業猶皇皇焉汲汲焉以興學校明教化為先務者其守同其志亦同也夫兼有天下父師之責者君也承君之志行君之化者宰相與太守也宰相布於上太守奉於下故人之生也為之學校以教之設科以舉之必使士有恒業民有恒志然後聖人之道可明賢材可得而治可成也古之有天下者莫盛於唐虞三代而不能去學校廢選舉以為治秦能去之廢之二世而亡雖然君子之學視學校為汚隆以科舉為去就亦異乎夫子之教矣夫善學聖人者在畎畆則行乎畎畆在魚鹽版築則行乎魚鹽版築豈待學校之教科舉之勸哉然世豈能皆伊傅其人哉而不為之教與勸也此上之志而侯所以力行之者况上方親御講筵詳求聖人之治愚雖不敏願與學孔子者共勉之侯亷慎簡正不為盛名而人敬畏之葢賢守云全州學記皇元制治舉法周孔元徼絶壤同風鄒魯一郡一邑必謹學校以為教基在仁宗時太子太傅府長史郭侯履治靖五年俗興民和克信其道泰定元年春移貳於全全居湖南九郡之極地小而嚴風氣啙窳郡西湘山又稱無量壽佛入滅之所世奉遺骸奔走萬姓而夫子之廟荒圯穿漏曽莫顧者罷輭者以民勞為解貪墨者以廩薄而辭講誦不興薦祼無所侯至㑹缺太守侯總學事教授黄潤以為請於是侯率僚佐倡於上士民勸於下明年二月即工前清湘長法赫進拜元侯知邑士鄧桂能狀命董其事遂斬木隂谷伐石陽崕食功傭力人不知役太守何公潤繼至朝勸夕勞休威並行及期而廟成乃易夫子十哲像分祠先儒及賢守於講堂之左右翼門序軒陛以次咸畢又辟廟南廢地為杏壇三成以擬闕里建明倫堂四檻以館諸生既告成於廟教授謁告還江西㑹予廬陵曰郭侯每以不得君記為恨敢請乃述其事且俾告於衆昔靖之鄙為羣獠刼以自附者八百餘家數自請吏吏不能討而王賦之供不敢怠遑及郭侯為守天子出使督兵討之八百餘家咸在夷㓕侯以死争乃去刑書復為齊民侯非力能生之也以其民恪遵魏文靖公之教知有君臣之分身雖僻䖏而王共不闕故也全之四境盡為中邦又宻邇周元公之里父傳子習皆聖人之道民之情性豈獨異乎夫殚財浚力以奉無益未必蒙福耕田鑿井以服聖賢之教未必被禍且一絲一粟得以養生送死又使父子有親君臣有義夫婦有别長㓜有序朋友有信君子登於俊選野人免於刑僇果何惮而不為哉亦教化使之然耳為民上者曷敢不敬學在郡治之陰鳯凰山之陽宋紹興十三年之所遷也東南諸山秀麗奇詭湘灌灕水合流其下蓋為一郡之勝云泰定四年八月丁亥記舒城縣龍眠書院記治民之道使民知禮義而已使民知禮義先示其所尚而已民知所尚則知所向方哉廬陵舒城長燮理溥化用湖廣舉首取泰定四年進士第得兹邑首理學政咸用其學以教道民民始益知人之所以為貴儒之所以為重而復知所以養生而送死居二年曰民其可教矣乎於是又治地邑東得李公伯時龍眠山莊故基於東禪寺東舒王祠西甞沒於寺者據山川之㑹想昔賢之游處乃㑹其禄入募工度功作書院以奉先聖先師以為出治立政之本不踰時而成凡殿堂門廡齋舎庖庫及李公之祠為屋三十有六楹以其面龍眠之山端麗奇峻能出雲雨膏澤天下榜之曰龍眠書院且示不忘李公之故而邑賢范鳯瑞割田二百畆以供祭養既告成於廟遂立之師進諸生而教之凡民有來觀者必勸之以學是時上既撥亂集大命兵革未息飢疫未復郡縣長吏能以荒政自任且不足遑知禮樂之教哉而舒城勸分則出粟之家惟恐後民之強暴子弟一有弗若則父兄長老呵責詬怒惟恐見絶於長吏休休焉方日以興學為事舒之民卒無一人携離轉徙者長吏豈獨賢民得其所以生者也舒著於春秋故山有春秋之山水有舒水始入於隨後并於楚其民勇而好義非獨舒為然楚之地皆然故楚常為強國最後宋室南遷頼其民蔽遮江淮㡬二百年然當時民雖欲為學其可得乎自國家有宋民不知兵者五十餘載又有好文之君繼出而學校之教欎而不興仁義之政尼而不行養生者不得盡其歡䘮死者不能究其禮此非上之過長吏之責也今吾君既畀爾以賢長吏一以詩書禮義覺爾民民亦知所尚乎若曰升其堂敶其噐設其牲齊而行其典禮如是而已此事聖人之䟽節也非作書院意也舒之人尚其朂哉李公名公麟邑人博學好古舉進士歴删定及檢法官未老致仕蘇文忠黄文節二人嘗過其山莊故合祠於堂之北是役也建始於天厯三年之春工畢而改元至順縣學之明倫堂亦其所建也是歳冬十月朔記涿州孔子廟禮器記古者祭噐犧象罍洗登豆之屬皆以木簠簋籩篚之屬皆以竹後世懼其速朽也不能以時易也範之以銅取便於有司而古先聖王之制僅存其名號焉耳惟涿州孔子廟噐皆尚陶殘缺苦窳將事者恥焉觀者議焉有司莫以異泰定四年秋廬陵曺君明則來領教事始白於有司馳數千里還廬陵範銅以易之及有事於先聖先師齊肅秩栗昔之恥者誠敬之心生焉昔之議者慢易之心冺焉逺邇來觀俯仰嘆玩雖非古先聖王之制有不暇計於是州太守命范陽令杜肅府而藏之屬奎章閣授經揭傒斯文而志之或曰範金非古也其亦必有所受矣胡莫之或改以從古也禮有損益噐有宜然况世所寶三代彛鼎罍斚尊卣之屬皆範銅為之也皆自天子至於公卿大夫所作以貽子孫者也雖不可盡信然其來固已久矣謂範銅之非禮古人亦且為歟彼皆欲為長久計也皆欲為法於後世者也且觚不觚固非觚矣謂木之觚為觚金之觚為非觚可乎學至於孔子可謂知禮矣然逢掖於魯章甫於宋舎麻冕而從純非歟必以古為是而今非則涿之用陶葢有虞氏之所尚也以木以竹皆非禮也而可乎夫敬者禮之本噐者敬之輿也嚴其噐所以存乎禮也而恥焉而議焉則敬何由生禮何由行歟故泥乎古者不足以適今膠乎噐者不足以言禮故記曰禮從宜傒斯曰祭噐者所以交於神明者也非飲食之謂也苟知禮之本矣雖從宜可也嗚呼曺君其可謂達於禮矣是噐也有司謹藏而時出之仍刻其目於左方増城三皇廟記三皇古無廟唐天寶中始置祀以春秋配以勾芒祝融風后力牧五代宋並因之國朝始詔天下以郡縣皆立廟以醫者主祠建學置吏設教一視孔子廟學大德三年太常言三皇開天建極創物垂範為萬世帝王傳道之首今太醫院請以黄帝臣俞跗桐君鬼臾區岐伯之屬十大名醫視孔子十哲配享廟廷是欲以三皇為醫家專門之祖非禮經宜從唐制中書下禮部議議如太常至大元年中書又以湖廣行省言如太醫院所請配享事下禮部議請以十名醫視孔廟諸大儒列祀兩廡遂著為令廣州之増城未置廟歳春秋有司設主寄祀叢祠中至順二年秋九月旴江左祥由翰林從事廣州香山縣尹湖州路經歴以奉議大夫治増城既新孔子廟學於城西冲霄門外之故址而以舊學為三皇廟壊撓者易之隘者闢之漫漶缺漏者塗塈而黝堊之自殿堂徂門凡為屋五十有二楹巍焉煥焉如初建然後三皇之祀始尊醫學之教始行夫以醫學專祠三皇非古制然猶足以見國家尊古聖仁賢重民命如此有司知守國家常制修其祭禮嚴其教道竭其所職而已他非敢置議醫家既得專祀三皇可謂甚尊寵矣而輒慢其祀事怠其學政不知民命之所以重所謂失禮之中重失禮焉其咎大矣凡若是者可不慎哉左君闓䟽平恕所至有善政且知所先務是役也能究其力以贊其成者醫學教諭鄧友益也南䧺路儒學教授李顯以左君之命請記乃為之書建都水分監記㑹通河成之四年始建都水分監於東阿之景德鎮掌凡河渠壩牐之政今以通朝貢漕天下實京師地高平則水疾泄故為堨以蓄之水積則立機引繩以輓其舟之下上謂之壩地下迤則水疾涸故為防以節之水溢則繩起懸板以通其舟之往來謂之牐皆置吏以司其飛輓啓閉之節而聼其獄訟焉雨潦將降則命積土壤具畚揷以備奔軼冲射水將涸則發徒以道淤閼塞崩潰時而廵行周視以察其用命不用命而賞罰之故監之責重以煩延祐六年秋九月河南張侯仲仁以歴佐詹事翰林太醫二院皆能其官且周知河渠事選任都水丞冬十有一月分司東阿詔凡河渠之政毋襲故狃私毋沮勢怛威惟宜適從敢有撓法亂政雖天子使五品以上以名聞其下隨以輕重論刑毋有所貸侯北自承濟渠南至河東極汶泗之源滯䟽决防凡千九百餘所咸底於理退即所署治文書庫冗儉陋吏側立無所爰告於衆曰予承命來此惟恪恭是圖顧以函丈之室制千里之政役徒百工何所受職下走羣吏何所聽令鄉遂之老州邑之長何所禀政荆揚益兖豫數千里共億之吏何所視禁山戎島夷遐徼絶域朝貢之使何所為禮朝廷重使何所止舎乃㑹財於庫協謀於吏攻石選材為堂於故署之西偏隅隩廓深周阿崇穹藻繢之麗文不勝質几席之美物不踰矩左庖右整宻峻完前列吏舎於兩廂次樹洺魏曺濮三役之肆於重門之内後置使客之館皆環拱内向有翼有嚴外臨方池長堤隠虹又折而西達於大逵高柳布隂周垣繚城遐邇縱觀仰愕俯嘆其言曰惟侯明慎周敏于公罔私故役大而民弗知功成而監益尊監益尊而政益行斯河渠之利永世攸頼爰稽在昔自丞相忠武王建議於江表初平之日少監馬之貞奏功於海内一家之時自時厥後分治於兹者鮮不著勤焯勞載於簡書而公署之役乃以待侯非樂侈其名以夸其民所以正官守肅上下崇本而立政也誠冝為而不敢惟國家一日不可去河渠之利河渠之政一日不可授非其人若侯者其人矣是役也首事於侯至之明年某月日卒事於至治元年某月日合内外之屋餘八十楹是歳九月朔具官揭傒斯為之記安福州東嶽廟記五嶽自古皆秩祀於天子而東嶽獨為天下宗今郡縣不置廟則以為闕延祐四年冬吉安路安福州達嚕噶齊哈喇丹始建東嶽廟於城東門外之秀嶺知州郭恢台等協其謀佐吏及州民之樂善者相其財地利材良工胥勸功明年秋廟成重門複殿高廣麗深翼以列祠七十有二象設嚴畏軒陛崇隆上巢飛雲下瞰湍瀬旁引羣山俯視檻井朝陽夕隂如神往來稚耋男女蛾行而上俯視拜跪如臨父母復伐石為橋曰秀川而屋其上六楹以達望走刋木為亭曰一覧以休游觀而命道士姚某守之民大悦又明年秋州人前肇慶路亷溪書院山長彭德昌請紀於石夫東嶽魯望而廟於兹從民志也民不知善而惟神之依惑也苟政不平歳不成欲事神得乎福善禍淫天有常道事神治民國有常禮禮不可黷道不可誣靡届弗至者神無感不通者誠誠神合而福禄降惟君子能之若夫修典常正國俗則國家之事而君子之心具官揭傒斯記浮雲道院記余方竊禄周行進不能有禆於時退不能自訟其過而客有言浮雲道院之事者乃起而四顧茫然自失渺然若天地無所容客之言曰吾所居郡曰廬陵邑曰永豐是為歐陽文忠公之鄉吾之里在雞山之陽鷲溪之濵山川深厚草木濃麗其人秀而多壽絃誦之聲溢於四境耕種之民交於四野時危代易干戈所不加焉水旱疾疫盗賊所不入焉人無甚冨亦無甚貧吾劉氏族居三百有十二年矣環吾里數百家無異姓良田數百頃未甞去劉氏冠昏䘮祭必以禮共給公上必以時無金玉狗馬之殃無高爵重禄之禍各食其力各守其常吾雖客逰四方而心安之泰定四年秋吾歸自河南乃闢園數畆種桑柘三百株枳若橘皆千株木實之脂可食可燭俗號山茶又曰木子樹者七百株茶五百株桃李雜果松竹之屬又稱是歳先疇之入雖不足以自給計數年之後葉者實者脂者萌可茹材可噐者可薪者各效其用則吾春秋之事朝夕之共宗族鄉黨賔客之奉可不具而足矣吾又有兄弟子姪數十人承祖父之訓皆頗知學足為保家之主天之所以與我者亦既厚矣復何求哉乃築室四楹其中為藏修之所取孔子不義而冨且貴於我如浮雲之語榜曰浮雲道院又為五言詩二十餘篇書之壁間暇則命子姪歌以為樂客有愛而和之者不敢辭有録而傳之者不敢止行藏用舎一聽於天夫聖人之與衆人欲富貴而惡貧賤非甚相逺也而聖人不求得其所不可必得不求去其所不可必去安其所安樂其所樂從吾所好而已衆人則不然必求其所不可必得必求去其所不可必去險在前而不顧危在後而不知早夜孳孳死而后已於是聖人始如天地日月亘萬古而不可䟦及衆人穰穰忽而為虎忽而為鼠忽而為蟲沙其去聖人何啻千萬里吾非敢希聖人能少異於衆人無忝於前人斯亦足矣乃歌曰浮雲兮悠悠忽而逝兮乍㽞吾安歸兮孔丘又歌曰悠悠兮浮雲來無迹兮去無垠吾安歸兮義與仁歌畢余請書以為記客名鶚字楚奇其學以六經為主其文以義理為本其詩近陶柳之間其大父葢壽至百三歳云天歴二年六月九日揭傒斯記撫州靈感廟記臨川西南行九十里有山巍然而高大隆然如波濤蔽於一州者曰連珠之山有谷焉蒼峭深窈若與世隔谷之口有寺焉名如其山南唐昇元中肉齒和尚曰智通者甞居之入谷數十歩有廟焉曰靈感之廟宋慶元四年所賜額也天歴元年寺住持如海知事從善改作大殿五間丹楹藻井崇阿飛甍湧殿壁為海潮慶雲之狀仰燭承塵俯鏡廣庭自夏徂秋遂底於成神享其祀人樂其功明年介予女兄之夫陳君用清請予記按圖志其地初有古杉一株常聞笙簫之聲飛繞其上杉上有泉人汲而禱之能蘇旱而愈疾一日神附童子語及夢告肉齒和尚曰我朱森秀才也兄弟三人皆隠於此汝廟祀吾當福汝民乃伐杉為三神象冠服形類一如所夢者廟而祀之揭靈著饗餘二百年至景定三年始得封為凈感凈應凈佑三真人余謂神有曰朱者株也森者杉也秀才者美木也兄弟三人者三乃木之所以生也蓋木德之種木主仁故為善不為惡為祥不為咎而能大庇斯民也其兹山之靈也歟山非神不立神非山不㽞惟兹山與天地無窮兹神亦與山為無窮其必與我元相為無窮也然非兹殿不足以壯神之居以稱此山敢不敬志其事焉於乎而民其益務為善毋使見棄於神哉天歴三年夏四月朔揭傒斯記胡氏園趣亭記豫章胡叔俊以高才碩學隠居進賢官溪之上治乃祖西園築亭其間而㳺息之以東南先朝陽而夕隂宜木果而樹李梨栗為正陽方之宜芳華而列種海棠松竹者貫歳寒而後凋故以植乎西北中又雜植梅數十株曰松竹之友也今皆蔚然為林矣若菊若牡丹芍藥之屬叢生而可愛皆列於亭之左右以便觀賞合而名其亭曰園趣其出入之途在正東近所居也海棠之西有二池夾道鑿小渠引水經其所居以入於東池渠之上古木參天其先祖所手植也東池之外又為大池春夏泛溢可以舟楫池之北為堂八楹以為子弟講肄之所又北為堂六楹以館賔客又北為重屋六楹以藏累世之書此其園外之事又所以為成趣之本叔俊治家有法臨事有斷凡公上之共必先之故叫囂之吏不及於門田園山林之務必擇子弟之賢僮僕之良者各受其成以治之故叢脞之政不嬰於懐子孫之教必隆禮厚幣聘良師友以訓之而日就月將之功又足以樂其志此外非祭祀賔客慶弔之事不得闗說日坐亭上與園丁埜老論農圃之要除其榛穢脩其經術䟽其流泉時其灌溉觀其華實之生成閲隂陽之變化以詧夫消息盈虛之理而忘其世慮客至則觴咏嘯歌或風乎松竹之間或綸乎清池之上雲山烟水交錯乎指顧之間而園中之趣雖萬鍾之禄不與易也是故志定者不遷理達者不惑事治則情逸心曠則境融雖崇䑓累榭奇芳異物之觀名姬淑媛哀絃急管之奉惡足並語哉叔俊於是不可及矣其子棣請予記之為序其說俾刻於亭楊氏忠節祠記廬陵楊氏作忠節祠者何昔金人侵宋沿江諸郡皆望風奔潰其先忠襄公邦爻以建康通判被執大罵死韓侂胄專國擅政柄文節公萬里以寶謨閣學士家居聞之三日不食死故合而祀之也中祀建康通判贈通奉大夫存者何甞以直抗蔡京為楊氏忠義開先也别祀廣東經畧使長孺吏部郎官孫子同知崑山州事學文者何經畧仁聲義實風槩天下在廣東三歳禄入七萬緡盡以代民輸丁租不持一錢去吏部闓通敏惠奉法循理為時良臣崑山好德尚義能以私錢復文節故居割田百畆以建祠事皆克紹先烈者也天下楊氏皆祖漢太尉震廬陵之楊則自蜀徙葢太尉之孫唐國子祭酒膳從僖宗幸蜀而居眉者之後也自秦漢之後有天下卓然有三代之風者宋而已方其盛時歐陽文忠公以古文正天下之宗明王道之本及其衰也楊忠襄胡忠簡以大義折敵國之氣奮中興之運當其亡也文丞相斬首燕市終三百年火德之祚為萬世亡國之光而皆出於廬陵何其盛哉夫卓然可繼三代者宋也然夏之亡以桀之暴殷之亡以紂之虐又以湯武繼之宜其東征西怨無思不服惟周以弱亡與宋同然周之東遷亦有楊忠襄胡忠簡乎周之亡亦有文丞相乎是能使周之亂亡猶有愧於宋者楊忠襄胡忠簡文丞相也文丞相之死豈非有忠襄文節為之標凖乎不然何又出於廬陵也忠襄不可及已至若文節年六十餘已懸車告老將二十載矣聞一權臣擅國遂至餓死使在文丞相時當何如哉故廬陵若歐陽氏楊氏胡氏文氏又有身致乾淳之治若周文忠氏皆國家之元氣也而歐陽氏又廬陵之元氣乎崑山之子元正請記忠節祠故并及之嗚呼觀楊氏祠則廬陵多賢之故楊氏人物之盛宋三百年養士之效亦可見已世好言士無益於國可乎元正亦楊氏之賢子孫也由太常俸祀為江西行省屬祠成於大德七年記作於元統二年孝通廟記臨江新淦之上㳺有鎮曰峽江鎮有龍母祠曰孝通之廟古祠在今德慶之悦城鎮峽江受吉贑南安諸水又豪商大賈之所㑹兩山如束水勢湍悍嵗數壊舟楫必有甞受神賜於嶺海之間而分祠以厭水患然不可考矣凡舟楫上下水旱疾疾必禱焉至大二年鎮民廣文壽既倡義以敞其樓延祐改元王友忠復新其殿至元二年丙子之夏余扈從上都廬陵龍立忠始介臨江孔思濟及其郡人李源請志麗牲之石夫作於始封之廟則有唐宋之碑今作於分祠必槩見神之始末俾乞靈者知所本也按唐李景休趙令則碑為秦温氏之媪漁於程溪得巨卵藏於家生七龍五䧺二雌從而豢之鱗角既具乃放之江媪日候江次龍輙薦魚於媪若致養焉者始皇帝聞之召媪媪行中流龍挟舟而還媪死鄰人𦵏之程之左澨絳水之濵後有衰麻而杖哭諸墓且惡其廹潮汐也一夕大雷電遷之高岡鄉人祠之始此自唐天祐歴宋由永安郡夫人五命為崇靈濟福妃五龍子皆爵徹侯二龍女皆夫人額曰永濟改曰孝通大觀二年所賜也夫物於天地莫神於龍有功於天地莫大於龍故其德配乾為鱗蟲之長出入變化不可測度媪非產龍徒以豢育之恩生則薦鱗食以養之死則為衰麻以䘮之遷宅兆以寧之學士大夫之子孫有所不能而龍能之則知忠孝之大節又莫過於龍也龍之德其至矣乎夫龍潜於深淵之中待時而動所以感雷電降雨澤鼓濤浪摧崖裂石皆龍之能事也而謂善覆舟溺人非龍之心也有違孝悖忠賊仁害義自絶於天者適與之遭耳宋之時吾里有孫先生伯温者攝象州守部饟襄淮渡巢湖大風濤㡬覆舟先生朝服拜於舟龍若出答拜水上風立止龍之佑助善人如此苟為善龍有弗佑之者乎由是觀之人之遇覆溺者非龍也人也福善禍淫天之道求福不回人之道天人之際龍知之矣媪以慈致龍之孝廟食千五百餘載龍其可誣矣乎敢書以告乞靈者至元二年丙子六月甲辰記後二年已夘乃求重書刻之石集賢直學士朝列大夫揭傒斯志易州定興縣城隍廟記城隍神天下通祀或有天子封或無封其垣屋器服一擬於王者雖有強毅聰察之吏不敢廢水旱疾疫必禱焉易之定興廟於邑之西南隅制古而地僻大木蔽虧莓墻蘚砌黮然雲興肅焉風行過者悸心入者易慮而禱亦輙應屋之撓壊缺漏以時葺之無所改作而垣獨完於是邑人張伯祥等因翰林從事杜德逺謁記勒石夫山川之蓄都邑之㑹民物之冨精合氣融動必有神神者隂陽之至德禍福之樞機也體之則應感之則通非有待於祠祀尸祝祠祀尸祝古人所以事神非神之本也後世殚財力竭智慮黷法亂制求以事神神其享之乎惟兹廟侈不陵節儉不失度庻㡬能以禮事神者宜祭享而民寧然記者所以著始末叙因革今皆無所於考獨記其事神之有禮也延祐三年夏四月癸酉翰林國史院編修官揭傒斯記文安集卷十
