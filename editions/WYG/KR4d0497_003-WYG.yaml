body:
  text: 文安集卷三元掲傒斯撰題明皇出遊圖應制明皇八駿争馳道還是開元是天寶長安花發萬年枝不識韶華醉中老奎章閣下文書静冕旒端拱唐虞聖此圖莫作等閒看萬古君王作金鏡畫鷹文梁五色絛秋髙意氣豪怒張兩目直霄漢豈與短翮翔蓬蒿妖狐晝作猛虎嘷騶虞并與神麟逃嗟爾飽食心空勞題張使君棄官學道詩卷至元天子朝萬國任丘使君謝病歸門前未罷車馬客身上已著朝真衣致君堯舜在豪傑洗耳巢由何是非棲雲觀裏青松樹惟有白雲終日飛登祝融峯贈星上人洞庭南桂嶺北衡山連延瀟岸黒中有祝融如結鬟嵯峨七十二峯間祝融不自知千山萬山自迴環迴環面面芙蓉起祝融正在芙蓉裏儼如天仙朝紫皇千官百辟遥相望半夜每瞻東海日六月常飛滿樹霜龍拏鳯攫熊虎躑雲山霧滅何時極我來正值太平時時有山僧似疇昔憑髙一覽四海空草間培塿安足雄盤盤羅漢臺翕翕炎帝宫復恐九天上視我猶井中朔風日夜相騰蹙谷老崖堅松栢秃古來鐵丸盡飃揚山上至今猶版屋山僧勸我歌我歌徒自傷天下五岳嵩中央此山與我俱南疆我今三十始一見北望中原天更長送何太虚南歸窮秋乍到深冬别來只俄然去忽然學士已分修史禄道人特送賣丹錢單車欲發無三日幾處同行可百年積雪堅氷愁客路徐州城下便通船憶昨四首天厯年中秘閣開授經新拜育羣才宫門待漏常先到講席收書每後囘召試時蒙天語勞分題不待侍臣催滿頭白雪丹心在太液池邊只獨來宫草葱茸禁樹齊日趨延顥對凝暉朝迎歩輦花間立暮送囘鑾栁下歸碧殿東浮蒼巘合金河北引玉泉肥幾迴𢎞慶門前路春氣濛濛欲濕衣己巳羣儒映璧奎端陽侍燕寶慈西線分學士親臣送詩賜皇姑御手題注酒含春瑶露重承塵轉午錦雲低日斜共出西門道既醉猶能散馬蹄奎章分署隔窻紗不斷香風别殿花留守日頒中賜果宣徽月送上供茶諸生講罷仍番直學士吟成每自誇五載光陰如過客九疑無處望重華題李安中白翎雀白翎雀白翎雀每見灤河河上飛平生未識百禽性不敢籠向江南歸寄題胡氏園趣亭日與世情逺學人聊治生畦蔬多品類樹果各生成野老過偏數山禽近不驚詩書吾所好農圃也須明題文瑞圖并序常德之龍陽居多蜀士祠事梓潼君甚嚴祠前有池曰景星咸淳癸酉蓮兩葉並蒂者六劉初登進士第延祐甲寅兩花並蒂孫以忠登第天厯己巳花如甲寅城東三雅湖蓮復三花並蒂哈喇丹獲獨步迪音馮天澤聨貢而獲獨步迪音登第好事者冩以為圖邀余賦詩蓮花復蓮葉並蒂更連莖並葉已不見三花兩花更有情如何與人作嘉瑞偏向龍陽水底生龍陽家事梓潼君花花葉葉梓潼神好在龍陽士汝但讀書更績文為花為葉汝莫論題南頓孔氏復明詩卷失明非有故復明還自然方其失明時萬事俱棄捐外雖無所睹内則常淵淵如未嘗有目不喜亦不憐如明入地中明未嘗不全逍遥天地内如在天地先不助亦不忘一氣自周旋不敢計此生敢計時序遷剥乃復之始自坤還至乾忽如浮雲散還我蒼蒼天昔非果失之今亦固有焉如何孔氏家母子仁且賢先後俱失明其復皆十年十者數之終如月晦必圓養之固有道何疾非所痊願言永保之母或忽此篇奉同柯博士甘内掾下直賦暮出閶闔門解鞍坐前庭泠泠草露白華月隔林生蟋蟀奮哀響鴻鴈流遺聲常恐芳景晏不知寒節并萬物肅將斂孤懐徒自盈捉衿激長謡棲泊諒難徴賦得海上雲送良上人歸徑山蕩蕩無邊涯悠悠何所之孤飛若有意羣徃更無疑稍拂扶桑樹還經若木枝迎陽成五色乗陰忽四垂作態離仍合多情去却追因風過别島和月下蓬池且任從龍去寜知到岸時惟應學空者澹泊與相期呉子髙悼亡歸岳陽都門落葉滿遊子去京畿忽聽離鸞操遥逐秋鴻飛愁霜曉入鏡淚雨夕沾衣烟樹黄河岸風帆采石磯平沙迴𣺌漫寒宇曖熹微客心閒轉切鄉書近却稀夢聞兒女泣行將童僕依竊慕漆園放誰云潘岳非乗濤慣下險迴江望若圍武昌未易到更向岳陽歸秋夜作露下氣逾肅月髙寒欲流落葉階前樹踈鐘城北樓衰年對急景歸心臨暮秋當世非無意才薄徒淹留進士張于髙得邛州判官歸成都邛竹山前負弩迎去年曽是一書生天寒劍閣猶車馬雪滿繩橋正甲兵即恐徴求民力竭莫將憂患客心并六千餘里闗河路不盡深期逺别情題陶淵明歸興圖家貧無酒飲聊欲試弦歌去家百餘里邈若異山河江上日多風浩浩水増波門前五栁樹繁蔭日婆娑秫田已成收歸計當如何寄題傅尊師兄弟所作寜壽道院鍾榮之山千萬峯琵琶塵湖相疊重兩翁入谷起臺殿半夜空山聞鼓鐘猛虎時逢澗邊石飛龍却是雲間松黄庭書罷人難見鴻寶披殘手自封度壑采芝隨鹿跡登厓望日躡雲蹤已知塵世惟堪笑不是神人定少逢辟榖有方桃更美圍碁無地橘相容但餘一念封人祝未與人間萬事慵二月朔日雪中題歐陽少監所藏宋好古畵竹晨朝下延閣貽我翠琅玕微霜著節勁細霧入林寒欹枝偏稱逺壓葉更宜攅孤石覆逾潤横波晴不乾况兹春雪裏相對五雲端誤當裁汗簡誰擬截漁竿惟應湘浦上歸共幽人觀雲錦溪棹歌七首雲錦溪中雲錦鮮好在髙秋八月天西蜀錦江那得似西湖緑水更須憐纔過浮石是藍溪溪上青山髙復低山中泉是溪中水尋源直到華山西藍溪南去到藍州水底嶄嶄石不流迴望朱宫雲霧裏白雲深處更髙樓宫前棃浦白茫茫岸上人家不似墻能到此中還有幾行人莫厭棹歌長揚金橋望玉真臺臺下橋頭人徃來崇文宫裏看華去安仁縣裏賣薪囘挹僊亭下薛公橋紛紛抵暮更連朝唯有橋西楊與栁無情長繫木蘭橈溪上層層雲錦山垂楊盡處是龍灘不是孤舟來逆上何人知道世途難御書雪林二字賜趙中丞應制聖主揮毫臨秘閣親臣執法坐崇臺祥雲五色從天下彩鳯雙飛映日來政欲清如林上雪已聞聲奮地中雷君臣千載明良㑹咫尺微垣接上台題胡䖍汲水蕃部圖應制沙磧茫茫塞草平沙泉下馬滿囊盛曽於王㑹圖中見真向天山雪外行聖徳只今包宇宙邊庭隨處樂農畊生綃半幅唐人筆留與君王駐逺情題辛澄蓮華觀音像應制至人不可測宴坐青蓮華珠纓被玉體白豪貫彤霞從何得此相來置玉皇家杜節婦詩結髪事夫子長言兩相期語宴方婉孌生死遽分離室中無長子堂上無翁姑生計日蕭條誰能心不渝良馬不亂羣仁鳥不亂行昔者為夫婦今忍遂相忘生為董家女死作杜家婦安能若流水東流復西注春秋陳時祀蘋藻宿所供一朝祭無主焉得不忡忡灼灼庭中花落落俱為實賤妾在空閨志願從此畢題内府畵四首應制韓滉土星像五行土居中百獸牛有功土行降為神騎牛白髪翁有土復有牛惟神賜年豐誰知韓滉意政與皇心同曹將軍下槽馬圖曹霸畵馬真是馬宛頸相摩槽櫪下卓犖權竒果如此豈有世上無知者朱絲不是凡馬韁天閑十二皆龍驤曽從天子平四方畵圖彷彿餘驪黄華山之陽春草長韓幹馬韓幹畵出曹將軍幹惟畫肉猶逼真昻藏囘顧欲飛去老奚安知馬有神想當此馬未畫時朝刷呉越莫燕秦頓轡長鳴風動地不數驊騮與騏驥當時用舍那知許粉墨蕭條尚雄武千金駿骨何足論萬世長留羣玉府宋徽宗成平殿曲宴蔡京圗御畫御記東京諸蔡滿周行延福成平樂未央十畝松篁籠玉殿九霄風露濕霓裳君臣契合同堯舜禮樂光華邁漢唐明日圖成仍作記千秋留與監興亡送秘書李道濟赴峽州幕蓬萊道山芸閣裏赤甲白鹽蓮幕中十載同朝君獨去三年佐政我難同大河水滿中宵雨鉅野樹凉清曉風夷陵江頭幾日到迎親應先南飛鴻奉送全平章赴江西聖主恩南土明公起集賢直期凋瘵後共致太平年金虎分符重文龍賜服鮮權綱兼將相標格近神仙天地三江外星辰北極邊丹心齊出處素志在陶甄請述江南事都非大德全但徼扶弱美竟坐抑强偏無復同憂樂徒令舞智權平疇吹渤澥暗室仗戈鋋貪虣明相訓忠良黙自憐民心隨日壊世態與時遷况復兵饑接仍聞疫癘纒誅求殊未巳蟊賊轉相挻若擬寛憂顧先須解倒懸乆饑寜擇食多病但求痊一語堪懲勸微機足轉旋已知平似水更道直於弦遥想聞公志渾如望嵗然九重天上别百丈霧中牽日月明金節山河入畵船四方初息馬五月正鳴蟬豐樂田多黍生香濼有蓮岱宗標魯地廬嶽壓湖天水怪收崩浪山靈掃瘴烟歡呼麟鳯出踴躍吏民先笳鼓趨雄鎮旌旗覆廣川下車和氣應袖手頌聲延膏雨侵淮甸仁風扇海壖忠貞真世篤調燮有家傳赤子皆同體蒼生且息肩龔黄須警䇿方召在蕃宣題青山白雲圖蕭寥青山曉迢遞白雲生衆樹春已暗髙原人未畊方思看桃去復擬采苓行深谷無機事白髪枕松聲桃花鸚鵡嶺外經年别花前得意飛客來呼每慣主愛食偏肥才子憐紅嘴佳人學緑衣貍奴亦可怕莫自戀芳菲趙孝子廬陵趙孝子四嵗父行賈一去三十年家惟大母母大母已云沒而父行不歸兒長亦有婦母子聊相依從父自北來汝父乆已死母子哭且問父死何鄉里聞汝父死時不知汝父處汝但欲徃問京師多舊故再拜别阿母行行至京師自念不見父兒死無歸時乃有曽老者徃昔與父善言汝父死處濱州利津縣徒跣二千里薄言至利津朱琪張文輩一一陳所因死以某年月塟以某木棺姓名某所題近在城南端城南冡纍纍翳然榛莽中極目千萬塜能誰識其蹤行哭七日餘欲死不得所生者無由知死者豈能語解髪繫馬鞍負之墳墳過吾父倘有知髪解鞍自墮俄至一墳前鞍墮髪自解開墳見前和題字宛猶在既見父姓名痛絶心始安函骨陳野祭禽鳥聲為酸隣老四面來驚歎未曽有相帥報縣官縣官駭之乆即日上大府大府咸異之次第聞中朝行子正南馳行子行且傷哭踴如初䘮路遥山川阻何時至故鄉故鄉既云至塟祭無違禮母子永不離萬事若流水聞者盡稱孝見者皆感泣期爾百嵗昌望爾百禄集兒今一無願願母長不老嵗嵗父墳前灑飯墳上草題姑蘇陸友仁所藏衛青印白玉蟠螭小篆文姓名識得衛將軍衛將軍今何在白草茫茫古時塞將軍功業漢山河江南陸郎古意多廬山連尊師求真陽詩乆諾而未作也一夕夢中得之因書以贈稽天之浸不可滅焦石之烈不可絶香爐峯頭按羽節滿山桃花滿湖月贈項鍊師吾聞有一士邈在呉越間騎虎滄海上茹芝天台山年約四十餘七星布其冠燕趙雖曠絶倐忽一徃還樵子常見之徑去不可攀又聞好賣藥徃徃在市闤疾者得寸匕立欲生羽翰吾常慕其人咫尺限河闗道書讀萬過不如一承顔弱志揜昏氣卑卑逐王官何為浪自苦食息於人寰送鄉人祐上人從師歸當陽學道玉泉寺從師天子都流年春事半歸路客帆孤山勢遥連蜀江聲不入呉故園如可到種芋有遺區送蘇尊師歸茅山華陽隠居者聞復有蘇仙時向梅花下髙枕石頭眠劍匣出飛電琴心流暗泉閒來京闕下夜夜夢雲邊寄題張齊公廟東安猛將張齊公十八奪父軍囚中至元召募起亡命父子南伐收竒功酒酣一躍馬上立㧞劍四顧犇雷風十年轉戰江漢上萬里直挽安南弓乾清坤夷四海一勲在旗常心帝室身封萬户傳子孫誓不偷生汙天秩天下豐盛大德年天子明聖宰相賢小臣劉深射功利上疏自薦能開邊鬼方寡婦號八百嫂叔操戈自争國劉深一言取大官逺帥官軍臨險阨五溪運糧數萬家哭聲震動湖南北發徒開道徑折節既勤其民大求索斗量金珠谷量馬谿壑之欲安可塞此時張公亦在行捐軀力諫皆莫克折節薄險伏四起劉深夜遁張公死鳥飛不度山川愁坐看英雄化為鬼乃知自古守邊鄙大忌邀功貴寜敉張公廟食東海頭劉深梟首蠻烟裏張公世為忠孝門劉深萬年穢青史兩家同死不同心試與題詩作臣軌寄題楊敎授菊莊歸人種菊處乃在東海涯幽香發清真正色間竒葩百種猶未愜千株寜足多寒分石橋月晴通赤城霞特起表陰戺羅生騁陽阿門巷掩蒿莱荒徑絶經過飲露咀其英孰知年嵗遐番陽蕭性淵攜其祖將領所愛唐琴號霜鐘者還自和林求詩六月三日午門宣赦後作嵩州昔有蕭將軍讀書學劍天下聞南隨龍馬渡江去尚有孤琴傳子孫孤琴云是唐人斵昔日軍中自行樂至今猶存殺伐聲一鼓哀風振寥廓將軍之孫才且良文能作賦武蹶張秦皇城下飲白馬祈連山中射白狼時平好文不好武抱琴却歎儒衣誤昭王臺上看青春彭郎磯頭夢歸路日長史館幽且閒正冠拂琴為我彈京城六月日如火霜鐘半夜鳴空山南風自有虞廷操可惜同心不同調捐琴决眼望青天今日天門有新詔送王伯循編修赴南臺御史朝辭禁苑暮南臺驄馬翩翩道路開佐邑已知為治最經邦正頼濟時才人情好惡非相逺民力凋殘實可哀鵰鶚秋天須搏擊郊原恐有鳯麟來寄題鄴下樊氏鍾秀園鄴都雄地里樊氏好園林庭户花陰合池臺樹色深佳時惟飲酒永日自彈琴車馬如相訪流泉可洗心題廖氏皆春堂時清日月明心和寒暑平東風扇萬物華開語流鸎農興水泉動蠶起桑柘榮牛羊被原隰麟鳯在郊坰少者擊壤歌老者鼓腹行不知天壤内何物異吾生常願天子聖四海無苛征夔龍滿廊廟簫韶歌九成大熱疾勢危甚項君子虚視之一藥而起為賦五言一首為謝天臺項子虚乃是列仙儔賣藥都市中疑是韓伯休欲見不可得不見忽相求神清骨秀聳蒼松倚丹丘又如霜空月下照千丈流時有揭子者卧病城南陬馳徃施寸匕大暑生清秋人言死復生仰視行雲浮長揖忽不見思之生白頭周氏敖山驛水木清華亭周家亭子敖山上斷隴連岡紫翠開晴日巻簾幽鳥下微風倚柱白雲來松間漁艇時俱放竹外樵歌晚獨囘咫尺紅塵車馬地已知弱水限蓬萊題趙照磨虚舟刳木作孤舟乗風到處遊寜求觸無怒政用載能浮歸共唯明月行隨只白鷗浩然江海上何懼復何憂送毛真人還龍虎山手綰銀章主秘祠翩然歸去忽如遺塵湖龍井雲間上鳯曲鸞歌月下龡香逐蘅薇深更入氣交梨棗静偏宜南屏風雨平坡雪争似山中夢覺時南屏山在上都南七十里嵗扈從至上都夏秋居焉平坡在大都西四十里西山之上冬春居焉葢皆所掌秘祠所在故中憲大夫嶺北行省左右司郎中蘇公志道哀詩蘇公廊廟姿推擇起為吏論議動引經舉措必由義惟時方大旱謂咎在寃滯决獄天乃雨凶年化豐嵗流聲滿山西憲府立羅致慨慷平生懐遂佐直指使受命安邊鄙正色行使事邊臣既威服使亦免顛躓六曹收雄材兩府資逺器激昻天下事徃徃見謀議十載拘掾曹彌年困文字雖云富匡賛豈足盡材藝一命厠省僚鈎稽得深弊銓選班爵冗出入錢榖細並縁出多門穿穴肆姦利有如水上萍驅去還復至因風一披蕩蹔得免䝉翳再命主賊曹持平獨丕蔽恒求情中實動究法外意功罪必誅賞善惡俱惕厲三命參宥宻令聞益昭晰和林跨大漠肇造此根柢東際瀚海頭西控流沙裔北窮陰山外南掎兩都勢連營列萬里倉庾千萬計鎮以磐石宗重以分省寄憶昔大德末成廟方厭世桓桓忠獻王功大更多智武皇既踐阼宫闕始清悶越邸矜微勞寵極心乃異國有社稷臣䜛巧惑聰睿遂輟股肱任徃重藩屏繫有威如雷霆有恩若元氣畊鑿比中土什伍相錯置士忘逺戍苦民見太平治道路無拾遺商旅畢懐惠忠獻一朝沒武皇亦遐棄駸尋延祐中權相擢天位磨牙吮人血掉尾恣狂猘戕賊骨肉親迫逐見危墜天人共震怒降灾及兹地大雪深丈餘人馬相枕斃重為朝廷憂夙夜靡寜志除吏超五等聞者盡驚避蘇公拜郎中即日辭九陛厚禄非所榮髙爵非所貴彼民亦天民安得皆坐視兼程到官所發廩急周濟死者何嗟及存者再生遂閭閻漸蘇息竭力補黥劓飛書九重天請為兵民備募粟實塞下慎忽憚勞費天子賜問勞名王致金幣至今頼長䇿當時已多忌如何方賜環及國竟長逝都人走相哭行子為歔欷崩騰翔風迅慘淡浮雲曳蒼松㧞其根黄鵠鎩其趐幸哉有令子名已注簡記千秋常山下豪傑一揮涕題羅稚川所畵臨川羅益謙溪居圖迢遞臨川郡泱漭元獻里溪上君子廬閉户青林裏連山烟景晏斷岸寒沙靡日暮孤舟還荒村隔流水寄題武寛則湖山堂祝融九千七百丈六月飛雪灑洞庭攸輿學者武寛則石鼓齋中窮六經氣横瀟湘波浪白思入嵩華烟雲青四千餘里到京國倒揷五色鳯皇翎河西猛將今太尉一見握手坐黄庭立呼愛子俾受業豈獨汝學我亦聽猨肩虎頭日侍側長刀大劍羅青熒動陳忠義破肝膽衆目睒䁑開心扄丈夫乘遇豈偶爾縱不我聽我則寜嗟予官冷材力薄每辱竒俊哀竛竮天晴風静輙過我如病得瘥醉得醒不為湖山勞夢寐不為富貴疲心形始知卓識出天性豈彼狗苟蠅營營方今䕫皋滿廊廟洪恩屢降無濫刑長材用世何不可大夫列卿如拾螢君如得位立行志慎勿學我空星星我今老矣何所稱白雲深谷寒烟汀十月十八日夜南郊齋宿夢先帝召見便殿手賜橘花一枝有感而作淚盡烏號不可攀傳宣忽降白雲間天花拜舞君王賜夢斷齋廬月滿壇寄題上饒鄭氏菊莊上饒多隐者鄭氏善為方移居倪陽里種菊今成莊近取徧呉楚逺求至帝鄉品類百十餘顔色不可常溉以玉井泉樊以栁與楊晨興即造之不憂露沾裳有時忘飢渴餐之以為糧門無催租吏家有白玉郎花前撫鳴琴花下列壺觴興至輙痛飲飲罷卧其傍自謂得菊趣不知與菊忘但恐秋景晏繁露結為霜盆盛虚室中虚室仍面陽重簾䕶夕氣踈牖逗朝光亂以青青蒲水石儼成行重得隠者心不辱桃李場玩物焉足計嵗晚託餘芳題四清圖一清曰王右軍平生富事業獨以能書聞遂令呉越士至今學者猶紛紛于嗟乎王右軍二清曰軒轅彌明偶然吟石鼎狂怪使人驚遂令韓吏部至今妄得狂怪名于嗟乎軒轅彌明三清曰玉川子忍窮吟月蝕天髙叫欲死獨對烹茶婢白頭赤脚老無齒于嗟乎玉川子四清曰林和靖周程明聖學韓范輔王政獨對玉梅花山色湖光耿相映于嗟乎林和靖題新安許氏蘭秀軒蘭生兮深谷潄流泉兮蔭喬木緑葉兮披披玉榦兮紫蕤植之兮堂下播芳馨兮菲菲菲菲兮揚揚思君子兮髙堂縆琴瑟兮㑹友嘉肴苾兮薦芳襲芳兮佩秀宜君子兮多壽夢顯墨梅霜空㝠㝠江水暮江上梅花千萬樹無端折得一枝歸一雙蝴蝶相隨飛寄題永豐劉氏暖翠亭孤亭萬竹中危坐自生風近與山光合遥連野氣通鳥啼深不見泉響静偏聰束帛休相汙先生道未窮鷄山俯鷲溪亭子畵堂西流水茭蒲合陽林竹樹齊畊桑烟外集賓客雨中攜萬事俱塵土詩成手自題寄題信州德元觀何真人林園長春亭長春亭樹倚雲開百里湖山入座來渌水繞階時自照好花如幄手親栽青雲每指尋真路白髮頻登望母臺墓在前山六月神龍起潭井人間幾處待風雷題信上人春蘭秋蕙四首深谷暖雲飛重巖花發時非因采樵者那得外人知孤芳不足幹奕葉自含滋白石蒼苔路落花流水時山深風露冷何處有花開直入雲林去香沿石澗來幽樷不盈尺空谷為誰芳一徑寒雲色滿林秋露香蔡七祖真人得朱文公所書讀書二字以名其亭請賦今人題遍古人書孔李通家意未疎萬箇猶嫌栽竹晚百圍曽見種松初黄庭義宻從心得白髪身閒對客梳近有方平消息否紅蓮成碧藕成車送陰陽敎授赴瀏陽青草茫茫接洞庭瀏陽江上好談經遙瞻紫葢為南嶽仰見長沙是壽星日晏投書招楚客夜䦨鼓瑟感湘靈下簾髙坐金錢滿賸買鹽梅寄在庭賦得春鴈送張郎中省覲揚州東風吹歸鴈離離翔天側朝發衡陽浦夕過陰山磧嘹唳浮雲中萬里才一息眷言思親者相望有南北送聶太祝赴潮州録事聶天厯潜邸舊人三載從容禮樂間仙曹新拜度梅闗春風忍過金陵道夜月重經黄木灣盗賊數州相應起甲兵諸道幾時還憑君細講安民䇿莫遣邊防一日閒題俞氏看雨軒慘澹來何處崩騰忽滿城遙連四山黒近灑半江明可愛華間濕偏宜竹上聲中宵未可住髙枕寄餘情題江道士清虚館遺紛極𤣥覽宴坐白玉京日月朗朝夕河漢流無聲冉冉兩玉童雙吹紫鸞笙下視九九州浮以四大瀛萬刼猶一瞬逍遥樂太清賦得呉歌送人歸吳中三月酒如澠髙堂絲竹停繡筵雙鳯影珠箔亂鶯聲疊應紅牙拍辭傳金縷名綵雲低不度芳塵暗自驚花發長洲苑日照闔閭城且奉千金壽寜忘萬里情
