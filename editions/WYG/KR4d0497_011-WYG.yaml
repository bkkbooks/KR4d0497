body:
  text: 文安集卷十一元揭傒斯撰記廬江縣學明倫堂記廬江縣古廬江都治焉今𨽻無為州東有巢白黄陂之浸西有桐舒之蔽前臨大江北界合肥山高而水深邑大而土饒風俗淳古民習禮讓故易治而速化延祐三年邑令史伯杲新孔子廟後九年邑令張導禮更為神像及禮器至順二年春二月碭山成君克敬繼為兹邑祗謁先聖師退即明倫堂教官以下以序列坐歴問風俗臧否吏民所疾苦古今賢士孰忠孰孝各以所聞知敬對起瞻棟宇摧撓腐敗蹙然曰是固出治之本乃爾而緩乎即日出私錢為民倡合所得緡錢七千五百有奇三月丙戌即工至七月戊子落成凡為屋六楹丹墨藻繢高壯宏麗始與廟稱於是人皆知君所以為治之意不待教令日趨於善明年夏屬舒城宰燮理布哈請予記夫明倫之説具在六經其要君君臣臣父父子子而已若堯之惇叙九族舜之敬敷五教禹湯文武周公之所以化民成俗孔孟之所以垂世立教皆是道也是故君不君則天道乖臣不臣則地道暌父不父子不子則人道絶其故亦大矣孔子曰斯民也三代之所以直道而行也以其道治其民夫焉有古今之間哉君子受於天承於師備於身施於家行之於鄉居一邑則以之治一邑居一州則以之治一州任天下之責則以之盡天下之責不以上不知而慢其政不以下不從而怠其教彼方以去禮絶義為悦我則曰天叙天秩不敢廢也彼方以殚財毁質為欺我則曰福善禍淫不敢誣也夙夜孜孜求夫在我孟子曰三代之學皆所以明人倫也君子之學也求以明之而已君子之行也求以推之而已此非獨為成君有民社之告所以為升其堂立其庭為師弟子者之告吾聞邑有文翁者有周瑜者有毛義者雖不足以上方三代盛時之士然其所以事親事君之道有能企而充之亦庻㡬焉是役也相其成者主簿盧廷瑞董其事者邑士洪琮薛興宗成君字簡卿葢賢大夫云靖州廣德書院記靖州居楚極壤洞庭渚其左巴蜀據其右狑獠與隣猨鳥與㳺而兵革之所狃藉也然其民好闘而勇於為義雖寡學而易感猶有屈賈之遺風焉自魏文靖公竄靖州士始知學近來有粟朝儀者靖之㑹同之賢者憂其土地僻陋去上國遐逺士不典於學惴惴然恐王化之不流廼築書院於居之里因其鄉名曰廣德厚歳幣以聘良師高廩稍以養生徒凡鄉之子弟俊茂者窶不給者咸得來學其中絃歌之音甫作而隣儌警報當大兵督餉道學遂瓦觧事定凢園田進取之務悉置益廣棟宇豐聚蓄招􅝘生徒繇是復振且欲示子孫毋替厥服介其友謁文於余夫民之降衷秉彛雖有居天地之外未能或之違也故三苗負固舜舞干羽而來格越裳肅慎去中國萬里慕周德重譯而來朝至於文翁之在蜀韓柳之潮與柳皆能一旦燮文身椎結之俗千載稱文獻之邦葢可驗矣然彼皆大賢之所為德盛而化博道高而名流其入於人也易今粟氏以窮邦韋素之士奮然鼓義以韓柳文魏之責自任亦可謂難也已嗚呼士之居是鄉㳺是鄉以及粟氏之子子孫孫而有違其志背其道壅文教而不宣而惟暴棄之歸復何顔以自顧其身耶可無念哉其為屋椽礎之數若干工匠之計若干自相攸訖成之歳月廩給之寡夥咸俾刻於碑陰焉廣州増城縣學記入其邑人民聚田野闢學校修其政可知矣國初廣之増城孔子廟火於兵進士李肖龍刻木主祠於士人鄭聰老家鄭遂以宅為學歴五十餘年未有能復之者至順二年前翰林從事盱江左祥繇廣州香山令潮州經歴加奉議大夫尹増城得故址城西冲霄門外百八十歩面鳯䑓負龜山水縈廻如帶始合謀遷之於是列士輸幣羣工效能顧濟陽復選其材顧宗興張悟道李壽李惟佑鄭元善董其役始是年冬訖明年秋凡為殿六楹崇四尋有三寸廣六筵有五尺深如廣而去其筵有八尺堂四楹崇三仞七寸有半廣十有一筵七尺有五寸深視廣而去其八筵六尺有五寸門之楹如堂之數崇不及仞三尺四寸有半廣如之深不及筵二尺有五寸左右為廡皆十有二楹崇二仞有一尺深二筵有二尺堂之東為鄉先賢崔清獻公祠四楹崇二仞有一尺廣二筵有八尺深如廣而去其二尺内環崇墉外繚松竹堂之北有山又植松五千餘株而亭其上可俯覽一邑之勝乃休工息徒以舎菜禮告成於廟崇儒師使申其教復諸生使修其業和民人使獲其所而政聲作矣又因南䧺教授李顯求刻石之文於余著久逺遂告之曰學校者所以明道設教之地也道非聖人所獨得非有愚智逺邇古今之間學則至焉増城雖僻在嶺表聲明文物與中州等而不能以聖人之學立身棄其身者也不能以聖人之治治民棄其民者也棄身者殃棄民者亡故立身莫先於學治民莫先於興學左君治香山既能以興學為首務今又以治增城弗棄其民矣二邑之士亦皆有以立其身矣乎重為告曰夫子萬世南面享天子之禮樂天下皆知為聖増城既廟祀夫子又祠崔公豈不以為賢乎賢如崔公則祀之况有不止如崔公者乎君子亦務學哉至順三年十月具官揭傒斯記陟亭記泰定四年夏六月余自清江鎮買舟泝流而上未至廬陵二十里有巨石如夏屋嵌立江右漁舟賈舶膠葛其下前挹二洲人烟雞犬出没誕漫又挐舟前行數百歩有小溪出谷中仰見層巒茸擁雲木森恱遂舎舟循溪而入越五里劃然開朗左右環合風氣蓄宻有巨塜隆然在山半由塜之右又入小谷有屋數間題曰陟亭乃坐亭上召守塜者而問曰地為何曰為書堂原塟為誰曰為阮氏何字曰民望曰吾知其為人矣是甞以年十三風雪徒歩求書福建憲使出其父於獄者是甞佐其父連山薄尉攝兵馬鈐轄撫洞獠有方者是甞㧞俘虜之子於軍中以還其友贖俘虜之母於邑大夫以還淮僧責名家之女於歌筵以還其夫且給其家使改過易行者是甞為郡曹又為縣都曹寛海艘之役罷坑冶之害者是甞受知滕國李武愍公恒及其子平章公世安楚國程文獻公鉅夫南臺薛中丞居敬孫御史世賢者是甞為翰林潘侍讀昂霄為監察御史時舉為江西憲掾不果用廣東帥達喇海朝京時湖廣燕石丞公楠為司農時欲舉為掾不就者遂升高而望青原天容天玉諸峯如劒如㦸如屏如帷如卓筆者陳乎其前東山墨潭蛇山之屬如騫如倚如據如伏如黝如紺者繚乎其後飄然如匹素渺然如白蛇自天南下千里不息而横截乎黨灘者贛江也朝暉夕景長雲廣霧明滅變化不可殚紀宜乎孝子慈孫於此興屺岵之悲而無窮也於是愴然而下復坐亭上拊髀而歌曰山川信美兮心孔悲往者不可作兮來不可期左右皆欷歔不自禁乃就舟至郡以其狀告知往來者曰然是其仲子清江教諭浩甞廬墓其中且將𦵏其父於山之左腋他日為投老之地者也居數日浩來見戚乎其容懇乎其言與語陟亭事泫然流涕曰先子之藏也再閲月乃請記夫父子者人之大倫也生死者人之大故也子雖甚愛其親不能使其親之長存父雖甚愛其子不能使其子之皆孝及夫登高丘臨墟墓不必其親之所藏未有不悄然傷懐彷徨躑躅者人之至情也况浩兄弟之孝臨其親之所藏者乎然孝於親莫大於敬其身敬其身莫大於勵其行雖歌管盈耳獻酧交錯常如陟屺陟岵之時庶毋負兹亭之所以名也烏乎當至元風虎雲龍之世使民望少自損何所不至而寧為鄉善人以終撫其山川天固將啓其後之人矣民望諱霖號石峯居士好學而尚義晚尤嗜佛老之書娶呉氏有四子曰均浩鐸煥女四嫁士族孫男七人是歳九月記善餘堂記饒有善人居安仁華蘂峰之西玉真臺之東華山之陽張果峰之北曰胡君茂卿治獄多隂德其祖父皆好善鄉之長老大夫士相謂曰易大傳不云乎積善之家必有餘慶請以善餘名胡氏之堂又購昭文館大學士李溥光書以遺之至順元年其子式入史館與余深相好又明年請記於余余曰夫善人孔子猶嘆其不得見孟子猶聞之喜而不寐况治獄平尤人所難者乎茂卿之生父葢年四十有五矣甚愛之未成童好學孝謹父愈愛之我元有天下所與共治出刀筆吏十九卿亦起為縣曺然在諸曺中獨異其治獄情可貸者無不貸之死可生者無不生之民亦莫不自輸其情而刑以不濫縣長貳及同列多嫉怒怨惡之而不敢言久乃服其為人元貞末縣有盗捕久不得尉輙以疑似捕齊民七日搒掠鍜鍊之獄具移縣縣長貳皆喜且得盗立闗三木置獄中上遣使决且至卿入獄語七人曰人皆言汝等非盗何不自言衆涕泣死不敢異卿曰汝第言當助汝否即旦夕死七人遂極言寃狀令怒不聽卿前爭曰七人一邑之人皆知為非盗以為盗者獨尉與令耳奈何欲殺七無罪以逭失盗之責失盗之責亦至死耶令默然竟釋之七人歸皆祠卿於家頃之以郡曺攝縣諸曺長有為縣豪主錢糓致富饒者豪常欲坐以事殺而并之未得間聞與妻前夫女姦乃大喜曰即坐與親女姦罪至死遂白縣治其事縣得重賂皆許諾卿亦佯許之及捕治事有實然非親女故匿不發豪曰求閲其獄盡如指意無異獄既具上府卿宻疏女族姓及祖父名牘中府閲獄見所引女族姓祖父名召謂卿曰卿真長者當為卿成此名竟以異姓女杖而出之卿為德類此名至不可數此其尤彰明較著人所常道之者後生五男子皆秀穎出羣曰吾父積善惟吾一人吾今有五子天與我厚矣即日免歸田里飬親教子縣長吏就問政事得失隨事誠告不及於他父年八十一終卿今亦七十餘矣教五子皆為儒闔門雍睦人取以為法可謂善人也已矣夫善者天地之心天之於物無所不愛善亦無所不愛故曰順天者昌逆天者亡昔于公治獄有陰德高其門閭令容駟馬車曰後必有興者其度淺矣然其報不爽如取諸券胡茂卿為吏治獄平身未出曺掾之間得五子即自貶損罷歸若欲以其餘遺子孫者固自有逕庭哉余嘗過善人之鄉問其名則皆喜而對問其人則莫不且言且頌望其居則竹樹葱欎禽鳥之聲喈喈及其門則雞犬不驚童僕間暇皆充充然有自得之意升其堂則尊者不嚴而威卑不令而從凡如是其後未有不昌者有過番君之區行雲錦溪之上望玉真華蕋諸峯求善人胡氏之家其居人有如是者必其處也至順三年八月日記進德堂記彭氏之堂曰進德立訓也上念乃祖之令德下憫時俗之日替將納其子孫於善也初彭氏世居武夷宋之時其祖蔚與李丞相綱同學李丞相貴顯即謝不見李丞相鎮江西書數往乃肯來裵徊東湖上因留不去然終不應其辟遂隠居郡之新呉山中其七世孫敬則以文學宦逰四方觀四方之俗強相併衆相陵智相傾卑尊易序䟽戚易位廢禮義違政教日甚懔然懼曰吾子孫亦將有一於是乎乃歸作是堂以示訓故去華就樸以教儉高亷重階以教嚴歳時奉烝甞以教孝序尊卑以教敬存孤弱以教慈合宗族以教和譚禮樂敦詩書以教學又懼近之弗察逺之弗明也屬余疏其義以廣其訓刻石屋漏朝夕俾觀省焉余乃言曰儉者德之節嚴者德之制孝者德之本敬者德之基慈者德之愛和者德之順學者德之聚儉則財用足嚴則上下辨孝則仁義生敬則禮讓興慈則㤙惠長和則九族親學則萬善明德雖美非儉無以定其制故為訓之始德雖備非學無以約其禮故為訓之終由之則昌舎之則亡不可湏臾出乎訓之外故表名以著逺服之若華衮佩之若瓊琚嗜之若膏粱處窮約而弗濫履貴盛而弗泰蹈危亂而弗懾仰不愧俯不怍然後可以充乎德之實以進乎君子之域而為彭氏賢子孫夫如是豈惟新呉之俗將化之推而放之四海而凖國家之求忠臣良士必集彭氏之門矣敬之哉毋忝乃祖余聞彭氏之先出籛氏固慎德之𦙍也夫盛德者必有後以李丞相之賢而不能屈乃祖之高是必在後之人余於斯堂卜之矣夫作堂以立訓述訓以發德本乎志也故不著其歳月始末及楹礎筵几之類蔚字子革自號石溪先生則字靜中云常州通真觀修造記保和通妙崇正真人徐公懋昭住常州路宜興州通真觀之十有八年重建三清殿又十有三年為皇慶元年建玉皇閣閣崇十二尋有半其材皆出於江東故山其始也材大而匠弗勝其成也不二紀而棟已撓延祐七年龍虎山道士張君德隆嗣主觀事廼量歳之入節浮縮濫為東西方丈以翼之使危有持而顛有扶以永徐公之績為三門以蔽之使内益尊而外益固以嚴神明之居財用既足經制既定㑹𤣥教大宗師特進呉公入奉内祠請以郡之天申宫都監陳景懋提舉觀事以董之凡錢榖之計一聼其出入焉大宗師從之於是陳君惟大宗師之教是承大宗師惟張君之託是重趨事赴功夜以繼日渉時歴月遹潰於成内則閣遂其安地表其靈重軒洞戸巖􅃉深靚冬無烈風之憂夏無熇日之苦談經論道坐以忘疲外則高甍崇阿巍巍堂堂入者心動過者額手亷陛不加而峻面勢不改而䧺而徐之功立矣大宗師樂其有成也進陳君提㸃以昭其勤張君亦再被璽書賜號冲真明逺元靜法師以重其山夫閣雖高有翼焉則不扶而自正宫雖閎有蔽焉則不守而自固吾於是得治國之要焉觀得徐公而地以興徐公得張君而業以隆張君得陳君而志以成而又得大宗師旌善報勞而繼者知所勸吾於是又得任人之道焉是役也一舉而衆美具斯亦足矣閣之前有井極甘冽相傳吕洞賔甞浴丹於此井之上有二古栢高十丈大數十圍一夕飛去觀始於陳大建中額由宏道三錫為今名天厯二年六月二日戊子記袁州宜春縣逢溪山聖壽寺記袁之宜春有逢溪山者以逢溪禅師得名或曰逢本作濛傳燈録失之山有寺曰聖壽即逢溪禅師所建也名與萍鄉之陽岐南原相伯仲初馬祖以佛法振江西逢溪禅師與楊岐甄叔南源道明同事之於八十四人之中故歸皆建壇塲以闡其師之道唐武宗廢天下佛寺獨逢溪寺以聖壽名獲存入國朝多郡之南泉山慈化寺僧主之至順元年冬寺灾長老妙愈即日發公庫錢鳩工度程斬大木伐堅石大改作之再歳而畢視舊有加焉愈闓䟽敏給亦南泉普蓮宗主明照慧覺圓應大禅師慈昱之徒也普蓮建造為天下最故愈亦稱能事云請著其事於碑辭曰有蔚蓬溪馬祖之徒實開此山數百載餘楊岐南源鼎足以居堂堂愈師是纉是圖欎攸降灾忽焉為墟愈顧而嘆激烈奮揚畚焦輦燼正位定方經工程力攻堅擇良罔敢或易罔敢不臧廼基廼搆廼指廼授孰前孰後孰左孰右殿堂門亷庖庾庫廐高者雲覆深者谷授櫛比鱗次壯麗完厚煥若天作儼若神造世尊穆穆列衛肅肅逢溪有覺是顧是復愈帥其徒載祈載祝天子萬壽庶民五福山増其高水益其深逢溪有覺是顧是臨愈帥其徒載祝載欽天子萬壽庶民一心廬陵縣丞馮君修造記吉安於江西為劇郡廬陵於吉安為劇縣古號難治急則怨緩則怠怨則身危怠則政弛日惴夕惕僅免於戾然亦未甞無名守令也延祐六年冬十月之望監察御史部行至郡視故醫學前直囂市傍切獄垣以為非冝喻郡亟遷之十有二月郡曹上言故廬陵縣治夷衍爽塏可遷初廢其地以為文錦院機絡之局而縣寄棲郡治之西五萬倉至是乃命増築紋錦院以處機絡而以其地為學徙縣治舊學而復故倉三役並興悉以縣丞馮君克敏董之君慨然受命而不辭曰吾弗為必有病吾民者至矣會是嵗君當督輸即風輸者出力佐之得楮幣數千緡遣吏市木諸縣皆與木返幣木石既集乃擇亷敏吏任其事明年春正月新紋錦院堂亷坊局及諸傍舎餘八十楹二月己未局乃遷是月建醫學為開天之殿以祠三皇六楹為兩廡以列從祀皆十有三楹門十楹外為靈星之門以備制度殿之後為講學堂六楹及庖庫之次十有八楹西為教官之署凡為屋十有二楹秋八月戊申學乃遷是月建廬陵縣為聼事之堂四楹有二榮左右有次皆四楹為兩廡以居六曺皆十楹門八楹其東為都曺之署凡為屋二十楹冬十有二月庚午縣乃遷凡三役工徒之費出於寓公大家及寮佐之所助者萬二千緡有奇不足皆君自更之自經始以迄於成或完舊而益新或更剏而改作一木一石必量其材而用之一錢一粟必度其宜而給之寛不至弛猛不至殘調其燠寒時其飢渴吏無奸欺民不告勞故其成功敏而無怨言夫為政不難毋輕民力而已傳曰不傷財不害民又曰節用而愛人使民以時夫節用故不傷以時故不害惟君力行之故其為政平易明信民歌頌焉大德中金華胡君長孺分教盱江攝録事視其屋懔然壓曰是將病吾民矣不踰月而新之或曰此非攝職也君笑而不言嗟乎惟君子為能憂民之憂樂民之樂况馮君身居其任者乎雖然有二君之心之才則可不然均為怨府矣豈必廬陵哉醫學教授嚴君壽逸剛正人也美其事請書於石以示後之為政者且以見郡之能使人也君字彦達濮人歴宜春高安彭澤三縣皆有名昭勇廟卷雪樓記呉折衝將軍西陵太守寧既與周瑜魯肅吕蒙陸遜之徒並立大功世廟食興國之東六十里富池之口龍光山之下後千餘年宋有天下録前代忠臣義士復賜將軍爵一命而公再命而王七命而數物備號其廟曰昭勇門曰表忠而將軍之靈以益著自始封百七十有八年而建樓於廟之北名曰卷雪又百十有二年而燬於景定元年之兵又六十有三年為皇元至治之二年祠官九宫山道姜守夷與里人劉舜元及其徒子如淵爰謀爰度筮日庀事即樓故基為屋八楹中為重屋六楹崇七尋有半仍命曰卷雪之樓左顧舒蒲之渚右據黄龍之灣前俯大江後控衡廬北望長淮之外以天為際方其驚風忽起白浪晝立天低地昂川谷吐吞則思將軍之在呉也威名動山岳謀慮出鬼神奮百騎而曺瞞夜驚戰孤軍而張遼早却臨夏口而黄祖授首搤益陽而闗侯退師指􅔉城而朱張擒入夷陵而曺仁破何其忠且勇也及夫風霽浪攝上下一碧長空冥冥白鳥孤没則思將軍之既没也三國為墟五運迭興南北紛紜或離或合將軍猶以餘忠遺惠隂隲下民馮大江而揚靈儼南面以顧享又何仁也登斯樓也豈不念曰以區區之呉而有江表數州之地僅足以抗蜀魏將軍一輸其忠而廟食百世况戴天履地美衣豐食倓然臣子於今之世者乎故君子立功立事必思以顯當世而垂無極斯樓之作亦非徒欲觀濤浪窮勝概而已葢所以勸忠也以三子興復之心而屬余記不可以不書神姓甘氏字興覇巴郡臨江人累號為昭毅武惠遺愛靈顯王云法印寺記豐水之東鳯池之西有寺曰泉林宋治平三年改賜法印木有豫章楓楮松栢之茂水有錢塘美泉之注脩竹萬箇崇墉百堵自江禅師至濟十有二傳而中微自覺昇至心日十傳而復振初昇偕其從德之廣慈撫廢虚圖前規起嘉泰訖開禧力復舊貫德再傳曰繼澄始買飯衆之田十畆有奇澄之徒慧明復得田二十畆以為長明燈供宋律寺觀母買民田而明以高行絶學善為方主翰林學士徐公經孫禮部尚書雷公宜中故得請長明燈至於今不廢明之徒永慶慶之徒祖榮復廣田百畆而寺之計益滋又三傳是為心日心日既嗣百廢修舉效獻力者争盡其用大德六年重覆佛殿祠后土殿東先師及諸長者殿西明年重覆三門又明年兩廡及庫庾庖湢皆撤而新之皇慶元年建法堂四楹中奉觀音大士延祐六年樓於堂之北東上庋佛書下列僧寮明年又樓於堂之東南虚中以為齋堂其東以館賓客若山門若縣鐘之樓方程材度地而申為之自大德以來凡所修營或資於人或出乎已皆日之孫福權之力也權既能盡瘁以成其祖及其師圓照之志而權之徒惟勝復能屈身貿易佐匠計勝之徒宏易日誦華嚴歸質田以相權之功是皆儒門所謂孝子慈孫者也方今上自京師下逮郡邑致崇極於佛者莫不因物產之盛慿國家之力猶恒若不及况泉林不仰縣官不資常住振法基於未墜紹宗緒於無窮者乎宜為刻辭著在金石其辭曰佛入中國餘二千載厥象伊皇高視六合横敷四海其流湯湯河汾著書佛乃聖人教則西方明明我朝並建三氏奄有萬國列刹相望照地燭天前無古昔割腴錫衎跨州連縣寶衣玉食式名休祥保合太和孰臻其極懿此泉林扶顛持危僻在東湖畢力殚慮祇率乃事有抗厥初廣殿重樓高壯䆳嚴弗儉弗踰瀏瀏清泉落落長松樂是幽居有詵其徒有秩其儀趾德濟美羣經在几鐘鼓在虡以祝天子永遵其道傳燈經祖以作教軌冲元觀記皇慶二年春二月始作冲元觀夏六月觀成實在富州之南第三十七福地豐山之陽五里所雕峯之下因黄氏之故祠也西南維黄氏世盛宋慶元初朋黨論起朝奉郎幹辦行在諸司審計司瀛進讜議十二篇歴詆外戚韓侂胄蠧國亂政天下誦其名嘉定初以壽終其子通直郎知衡州常寧縣直方𦵏於峯之南雙井原因建祠曰雙井菴命始豐之仙林觀道士靈寶大師賜紫歐陽某奉祠事且約世守之未㡬常寧之夫人徐氏卒𦵏峯之東白竹原亦建祠曰白竹菴皇慶二年常寧四世孫征東儒學副提舉司自雙井菴延禮聶爰靜主之師至即撤舊祠闢地為觀不數月而工畢飛殿壯麗高廣䧺深門廡端直庖廩完固飛雲之樓矗其西黄氏及后土氏之祠翼其東文梁藻井之制雲房齋廬之次煌扈於其内鐘鼓之聲笙磬之音鏜􅝅乎其外於是晝霧出楹夕溜殷砌悦栢拒冬長松無夏神君仙人儵忽往來山川不改其舊而十倍故祠矣請名曰冲元之觀又甞與其師歐陽維新買田五頃有奇至是盡歸於觀以養學徒奉釐事君子曰惟不貪故能忘其利惟不私故能成其功忘利而有成功非信道而勇於立者不能也使聶君不為老而為孔氏得志當世所至宜何如黄氏其知人矣延祐七年春征東之子尚敬尚忠請伐石紀功因推道德之端極内外之辨而為之辭以授其徒黄晞平孫誠則等刻之其辭曰猗歟邈哉五千之文上探無始下酌黄軒達性立命執經御權剛柔存亡進退後先糠粃天下道德之源𤣥門既闢教道滋盛水旱疾疫禱祠禳禜一呼一吸一動一靜奔走雷風鬼神受令上好下效此求彼應乃道之文匪道之性志士長往獨善其身鍊形制魄守精馭神蝉蛻宇内飛翔天津匪道之隆乃道之屯孰行罔至孰用罔治蕭曺以臣漢文以帝慈儉為寶敦樸是貴雖慙三五終邁七制迨於我元總攬萬國國既殊俗治亦異術既尊素王亦兼老釋或齊以禮或道以德化成天下立治之極豫章南境豐城故邑崇崇始豐神明所集跂彼雕岑雲蒸霧濕有屋渠渠有阯岌岌偉哉聶君有此駿功黄氏以祠老氏以宫居有所養學有所宗敬哉學人罔或不恭執德之恒守道之中祈天永命萬世攸同彭州學記蜀彭州孔子廟學燬於兵九十餘載有司偹位因弊承簡春秋有事綿蕝行禮治具弗張民習於野至治中太守劉隆畏上威德思本政教爰謀爰度廼復其舊而教養之道猶闕今太守則曰興學而不知教養與無學同於是縮濫節浮舉俸稱貸月計其息墾廢辟荒時值嘉榖歳取其入以具祭養以為經常合凡民子弟之俊秀者三十人立師以教故入其廟則棟宇䧺麗禮樂備舉聖師洋洋不動而應入其學則堂字修㓗弦誦洋溢民吏觀感不令而化其文學姓某㳂牒京師請紀金石乃告之曰惟蜀與宋終始聲教淪洽民心固結故國朝用兵積數十年乃克有定土著之姓十亡七八五方之俗更為賔主治者狃聞襲見以遺風舊俗為可鄙前言往行為可陋至有鴻儒宿學林潜谷逝其道莫聞况復有知學校哉故學校與道興廢上不知學則失其教下不知學則失其政學校廢政事失治道微矣而彭前守克興後守克承繼善趾美作民父母諸生其有思乎夫蜀學有揚䧺文有相如治有文翁諸葛下迨唐宋羣儒迭興徽言懿行著在簡册舎疵取醇使合孔子之道父以教子兄以教弟朋友相講里巷相習以翼聖人之治則蜀之人父父子子君君臣臣劒閣無所用其闗瞿塘無所用其險必自彭始諸生朂之毋負諸守之意與聖天子之望元統二年八月日記
