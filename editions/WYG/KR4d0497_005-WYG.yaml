body:
  text: 文安集卷四欽定四庫全書文安集卷五元掲傒斯撰飲酒篇悼亡後作昨日飲酒酒苦薄今日飲酒必不樂未知明日還如何枝上落花能許多胡蝶飛飛春草草對語黄鸝清且好有酒有酒且莫沽庭前獨宿鴛鴦雛從他痛辭并序江少虞類苑載開寶中金陵人修故營得石記𨽻書從他痛凡數百字末復云不為石子盡更書千萬箇從他痛未幾王師渡江余謂此必埋恨者非渡江䜟也作從他痛辭石可絶恨不滅日月雖光明不照石上情情深化作秦淮水水流成血波濤起流入東方大海中風吹復向秦淮裏秦淮裏深復深土囓石上字字字痛連心痛連心從他痛秦淮水空相送除是相逢話痛時始是此心無恨期吳歌一首送張清夫提舉征東校官先還呉中呉中女兒白如華呉江燕燕拂波斜呉中魚肥米可束夫君無事乆忘家夫君自别呉江水聲名籍籍京華裏家家屏幛待新詞日日王侯置酲醴呉中之居不可踰京華之樂天下無髙官厚禄不願有上疏乞官還海隅秋風髙吹燕山樹扁舟且向吳中去呉中兒女白如玉看着新袍入華屋贈許道士廬山道士許自然二十武當學飛仙白雲㝠㝠不可見天際時聞清嘯傳虎將乳子共遊戯龍化老人同食眠無求始悟身非患有道方知世可捐忽聞賣藥入都市便欲乗風凌紫烟紫烟之中曠邈邈下視人世真堪憐爾曹齷齪塵埃下何日南山歸種田題見心李公小蓬萊媧皇狡獪弄餘智手揷神山滄海裏不敎寸碧落人間弱水更環三萬里何人摶土為此竒太乙真人謫仙子芙蓉為舟桂為楫碧玉連環白雲履山根植棗漸如𤓰山頭種玉今成髓平生九州視一豪秦皇漢武空勞勞山林㝠杳百鳥號明月飛出琴聲髙黄母呉氏挽歌新安之水清且深深深如見黄母心新安之水髙且烈烈烈如見黄母節母也不幸早嫠居三十未有二十餘六十餘載一日如子又能孝孫詩書嗟母之德靡不宜人歌不足國旌之爾今死矣歸何時新安之山可鏟而夷新安之水可陸而馳黄母之德不可思送墨工潘生還臨江豫章朱氏以墨名直與郭玘争豪英臨江潘氏得墨法乃自柯山翁彦卿朱氏親承天子詔墨入奎章獨稱妙潘氏近日來京師羣公得之惟恐後潘云吾墨猶草草盡藝為之當更好明年此際來京師始知吾墨堪為寶東風蕩蕩吹燕山行人苒苒掉臂還明年獻墨奎章閣却與朱氏分朝班武岡扶丘山紫府延夀宫宋張真人守静所居也至今禱雨暘輙應其徒純真子饒君禮誠延祐中入京師為今𤣥教大宗師吳公所知居太乙延福宫十五年將南還山中詩以送之洞庭之南扶丘之山綿連九疑控百蠻昔在嘉定之世真人張氏隠居學道於其間祈晴即晴祈雨即雨犇走郡縣勞躋攀鋤雲架霧開紫府采芝種术留朱顔夜驅猛虎守庭户晝役鬼物除榛菅真人乗雲上天去但有青鸞白鶴長徃還雲霆尚與司豐艱爾來一百五十嵗弟子饒君通道氣一住京華十五年太乙宫中獨超異不求逸少冩黄庭欲逐浮丘攬香袂南望悽其憶故宫黄河日與夢俱東河流到海不復返故宫長在白雲中天地無停機日月無淹軌歸去來白雲裏題漁樵問答圖我在孤舟爛醉來君從何處看棋囘髙山流水元同調明月清風不用媒江上栁早先摧天上鴈正裴徊富貴何如歌一曲功名争似酒三杯我但負薪君但釣百年誰喜復誰哀題劉商觀奕圖李伯時臨蘇子瞻䟦茅君彦刻劉商畵手神運筆龍眠臨之如已出不知弈者何代人雖無名姓若有神神凝志定萬縁息觀者亦復遺秋春松風吹衣石泉響朱草樷生玉芝長眉陽仙客最相知更託茅君寄心賞題所翁雙龍圖為寅上人作雙龍畵擘𤣥淵開萬物顛倒隨雲雷龍公被髪向空冩身是真龍非畵者鐵作鬚鬛玉作鱗電出兩目雲繞身偶然㑹合此何處仰面向天天不嗔世間眩轉空形影倐忽變化那能省髙僧説法夜來聴誰道相逢非夢境斗牛蒼蒼風雨暮泉阿豈識延平路當時縱無雷煥與張華未必終藏不飛去題玉笥山邵道士所藏宋方奉使贈劉道士紫帽山人方孚若臨江謫居亦行樂二十四磵縁源行三十三峯看月明奉使不愧蘇子卿招隐更遇劉佺平劉郎彈琴震金石方公作歌酒和墨一時意氣傾座人千載風流寄仙籍兩公一去無消息竹下松間盡行跡遺墨蕭條鎻白雲山中嵗嵗桃華春宋金徃事無勞問夜夜虚壇候子真題彭尊師禱雨詩卷道人役雷如小兒顛倒鬼物愁蛟螭祈晴得晴雨得雨身不勝衣膽如虎東通呉越北淮漢到處逢人憂水旱手提豐嵗與疲甿金帛盈庭未曽看閩山疊疊躋金峯蘄山樷樷碧玉宫洗劍長留雙澗月彈琴尚憶萬松風大臣無端薦天子十年留滯京華裏悠悠扈從春復秋歸心已逐東流水去年天下旱且蝗流殍滿道無人藏安得君等遍八荒不使水旱憂堯湯題春龍聴雷圖雷馮神龍興雲雲行雨施四海清雷之震神龍奮雲行雨施四海潤雷之令神龍聽雲行雨施四海慶聖君在上賢臣在下我無事而觀化蔡氏四適堂君不見車轆轆長安陌上争馳逐朝出遊暮還宿問何所得榮與辱又不見或漁于淵或樵于山或耕或牧其心和且閒我欲從之生羽翰豐之東麗之陽有美一人大溪之旁水竹兮蕭蕭雲木兮蒼蒼彈鳴琴兮不下堂禾在囷薪在屋黄鷄皮白魚腹嘉客來新酒熟君之樂兮惟日不足題邢先輩西壁山水圖邢家蒼蒼西屋壁萬壑千厓動寒色大江忽轉天地迴浮雲孤飛日月白參差樓殿照林紅松檜悽迷起朔風崑崙蓬萊不可到赤城白帝遥相通賤子平生尚竒偉南極衡湘北幽冀復從大駕上灤京始接邢君多意氣君昔扈從戎馬間少壯不知行路難月明飲馬長城窟雪深射虎祈連山萬里歸來太平日坐我江山百憂失平明萬騎出天門又駕官車就行役送黄判官歸江西西辭夜郎國北上邯鄲道方厭東華塵又説黄平好黄平遥遥度五溪五溪更在洞庭西十年世事浮雲裏一日孤舟萬里歸桃花流水孤舟客白髮青山五色衣堂上慈親稱夀處堂前新婦拜姑時隣人邀種南山豆野老同尋北谷芝人生出處須經意富貴悠悠差是非和劉修撰十二辰詩掘鼠可以充飢飯牛可以待時何須入穴求虎子更學狡兎三穴為我生誤逐攀龍者嵗蛇冉冉那堪把又無筋力騎快馬日射黄羊陰山下空餘野性獼猴同但求歸作祝鷄翁柴門狗吠閉閣睡萬事渾如牧猪戯發臨湘得風臨湘縣前江水流葫盧沽酒大如舟莫道天風不相待一時吹上岳陽樓聞西師㨗口號二首聞道西南掃蟻封何時雨露洗妖兇必行徃代羈縻䇿肯倚窮荒戰伐功萬里春風送㨗書千年王氣拱皇居越裳白雉應頻入浪泊飛鳶正念渠漢茶陵侯廟髙帝安劉慮未危賈生可恨不同時長沙更有囘旋地千載荼陵無古祠泉子嶺作已過泉子嶺頭路荒甸茫茫碧草乾日落不收牛馬亂青烟起處是營盤金衣翠帽路傍女蹋足連聲駕犢車車下晝眠車上宿每逢水草便為家北樓雪後酒醒獨吟幾㸃微雲翳曉晴半峯殘雪隔江明小樓獨對春城北酒醒匡牀聞鵲聲聞熊從嘔血亡碧血凝秋萬事空此生無復一尊同到家又近重陽節應是哭君風雨中待潮扁舟夜閣寒沙際欹枕待潮紅日髙無數征帆背人去海門何處水滔滔題吳越王答周克儉謝賜物及陳事宜狀手帖呉越山川畫不如古今人物半能書從容霸國君臣禮猶見錢王翰墨餘文安集卷五
