body:
  text: 文安集卷三欽定四庫全書文安集卷四元掲傒斯撰所藏逺山圖蒼蒼兮逺山飛瀑兮潺潺思王孫兮未還蒼蒼兮逺巘飛瀑兮偃蹇思王孫兮未返白石之上青松之間上有飛雲下有流泉悵王孫兮留連留連兮何極望青山兮使予太息太息兮予獨思王孫兮如玉題陳氏松巢圖雲英英兮承宇松亭亭兮在户問此何所兮廬山之陰大江之滸雲可衣兮松可巢君何為兮不來予何為兮延竚山則有薇水則有魚君歸來兮予與女同居桂林歌贈明秀才逺望兮桂林鬰蒼蒼兮􅆼深去無言兮來無期羌君子兮勞我思皎皎兮明月桂偃蹇兮不可掇曠蕩蕩兮商風發君思我兮逺百越蕭生歸潁奉寄三首昔賢懐出處到處非一端冥冥鹿門子悠悠東陵園千載有其人常在羇旅間跂予欲從之路危不可干晨興命徒旅驅車出重門出門何所適北睇嵩洛原浮雲數千里悵然迴我轅東風起空郊草色一何鮮百鳥縱横遊孤鵠摩髙天援筆不可冩短意誰能傳岧岧楚王臺泯泯湘水碧湘水深復深逺送千里客客本金閨人觀風戾南國漠然忽􅜯舉抗志箕潁跡榮華衆所趨知者審損益嶔崟狐兎穴泱漭風雨色常恐衣上塵汙我林下石重華仰海宇䕫卨易為力去去君勿遲憧憧孰云識我本耕牧豎結廬章江涘微生屬休明世尚猶典禮驚飈卷飛轍􅋁落從此始三年江漢春萬事隨逝水既昧理生術復慚遊方旨豈無青山歸亦有桑與梓何為苦留滯眷眷存君子君子諒不然東臯畢耘耔黄鵠山聽雨得清字𤣥扃息深構虚館含餘清瀟洒松上來瑟縮花間鳴遥兼夜柝警暗與寒更并懐新感仳别撫物愧生成土思浩方殷春聲耿逾明幸及朋知好逹此旦暮情北首非窮轅南山夢歸耕何言託毫素聊用欵平生贈别李時毅得南樓月姢姢臨古戍晃晃辭烟樹寒通雲夢深白映蒼梧暮胡牀看愈近楚酒愁難駐鴈背欲成霜林梢初泫露故人明夜泊相望定何處且照東湖歸行送歸舟去送江尚志得官後携新妾歸省淹薄徂年嵗離别忽在兹寒城落木後虚館殘鐘時家在雙井上心隨孤鴻飛落日布帆逺青山尊酒移蒼茫倚閭情愴怳零雨詩託身名敎中固應慎其儀志尚既不殊情鍾自成悲昔見已云晚再㑹良無期濯足彭蠡瀦省侍髙堂歸鶴髪喜垂涕兒童問牽衣野老借檄看隣女隔墻窺田園各成熟松竹䕃菊籬淳俗一在眼鷄黍相提携翻知在家樂不恨為官遲放浪乘化遷何用世俗知遊禪林寺喜得昌上人靈臯懐獨徃危軒泊閒寂偶與塵事違况值禪林客深苔剥修玉輕霏澹凝碧夐見飛鳥還静聞寒溜滴空明㑹真賞漂流見良覿常恐心跡乖無由展平昔奉陪憲使程公遊麻源第三谷宴藏書山房白雲樓時三月三日明公當暇豫勝日懐登臨蹀躞驄馬行窈窕幽人心縣厓響晴雨犇流濯春陰雲門轉絶壑畵橋貫長林掃石慨徃運聞鐘知古音耆松有百圍突嶂踰萬尋小憇釣魚臺聿瞻華子岑捫蘿入縹緲側逕凌蕭森迢迢百尺樓下有孤猿吟初筵俯曽顛微風散危襟語笑信忘我觥籌浩難任豈不念永留惘然歸思深送雷山人遊山髙人雨中至邀我遊山作自非㝠寂子肯耐紛華落方春迺發軔殘雪猶映薄隨雲度神臯披烟望靈嶽晞沐朝陽谷照影清水壑淹留皆隐淪徃還必恬漠惟應樵與牧時逢得竒藥歸來雖未期鬢髪終如昨送孫志言逺遊志士遊四海豈拘名利牽孫子三十餘懐䇿靡遑安仰視流光馳千嵗俄頃間青青鏡中髪閉閤守丘園昔者限南北放浪徒空言曠然六合中何為惜飛翻晨裝既云具良友咸在門依依别老親悃悃語弟昆出門即萬里囘首惟浮雲豈無骨肉念身負天地恩白日出東峯緑樹徧平原歡㑹良未期佇情何由宣出處各努力還歸觀所敦贈髤者黄生髤飾肇有虞太樸已雕刓紛紛百代下巧宻何多端黄金間毫髪文螺錯斕斒竹樹冠臺殿祥雲隨鳯鸞五采被牀几豈獨匜與盤坐使圭璧暗所好移所觀黄氏擅良工出入三十年馳譽必名流迎致皆上官美賈一朝起羣工那敢班藝絶誠足貴古道何由還送管録事赴東平走筆作十月燕地凍原野何蕭條征車臨長途行子去中朝濟濟同舍生載酒集河橋子當撫㷀嫠行役在晨朝脱葉辭髙林散漫復風飈離鴻别枉渚嘹唳空層霄一觴不盡傾何處相招邀東魯非逺邦録事非冗僚矧宅夫子地餘風諒非遥眷言懋殊績夙夕佇嘉招廬山郭敎授數相覔不見忽聞歸省却赴官雲南奉寄五言一首為别以答願交之意蕪謬忝詞館晨出歸恒夕親交猶自踈况乃未嘗覿誤蒙君子賞驅車數相覔暮見門間題中夜猶怵惕反愧應門子時奉氷玉色云何心所懽萬里西南役終乖携手好同是思親客過家君已先淹泊誰復識東風動楊栁河水流不息何以展所懐中心著金石和酬馬伯庸供奉史館閒題見示二首陰沈悶華館窈窕宜芳樹秋日透清輝晨飈翼輕霧飛文盡威鳯擢質皆振鷺平生寡儔匹及此同散聚云胡咸羇遊對酒恒不御羡君躡髙第早聽傳臚句時從鴛鴻侣縱轡驊騮路紬史吾豈堪讀書君不誤飛葉滿京華青松臨廣筵連翩集軒葢卓犖皆時賢青松豈不髙衆草自芊芊感此理文翰恒恐迷所先蒐獵殘缺間終嵗不成編矯情或傷直含辭非取妍宣尼萬世標斯道庶昭宣元功既森列羣䇿咸牽聨終焉懼非才申旦長惕然重送曽應奉及周鄒諸君子晨興戒徒旅行子即長路天衢風雨過升陽在髙樹發輛東南門解櫂紛徃緒迴瞻彤庭闕彷彿玉堂署遺榮誠所難勇退無枉歩聨翩數君子意氣更相慕文采掩春華清言敵朝露超遥去留迹曽何悋情素懿此昌明時各有丘園趣熊英德哀辭靈飈戒先路疊鼓中夜發旌旐揚廣衢輀車出城闥素緌紛前逝䟽麻森後列罔罔迷據依營營㑹精魄流雲㝠飛葢平野一何濶慟哭積水濱哀歌青林樾翔鳥為迴薄我馬如顧秣農夫釋耒嘆行子憑蹊惻共隐善人䘮矧承君子列平居異山隴累别兼嵗月規戒晞暮齡歡燕中道歇時哲衆所屬六十非短折撫物自傷摧瞻望猶慌惚南轅懌歸斾北首悽徃筏千春驥岑趾流藹餘篇帙宿草日已深聲容閟幽泬雜詩東風吹百草沿路一時生繁桃與夭杏徧野復盈城東隣宰肥牛西里按新聲孰不乗時節為樂快心情平明出南郭登髙望帝京大哉山河固喟然獨撫膺社日𤣥鳥至入我髙堂飛舊泥幸未拆新泥復相依豈徒安爾身復欲長其兒言語嬌且閒上下遞差池勿因秋風起相逐忽還歸嚶鳴出深谷草木皆華滋昨日悲嚴霜爛漫揚光輝鷄鳴車馬動日暮交横馳賤士錦鞍韀貧女金裳衣各願得所欲及此艷陽時青青孤生松髙出浮雲中下無嘉樹林上有萬里風俯視原上草秀色何豐茸自顧豈不髙獨立難為容常恐本根蠧委此蒿與蓬城南有名園車馬何喧喧緑池夾髙栁百草朝且鮮平明集髙臺日暮不能還美酒百壷少豐厨豈論錢麗服羅四座急管應繁絃燕歌儼成行趙舞交蹁躚但得主人顧陋質自成妍還過舊遊處池館謾依然寓興五首夀呉大宗師古稱神仙人乃自秦漢間由來英雄士重已輕人寰子房遇黄石取履非所艱一朝從赤松髙風安可攀我生後千載獨立當𤣥闗昔有安期生本是漢竒士髙視羣雄間竊鄙蒯徹計學道滄海上却粒咀元氣一食如𤓰棗金石焉足貴超凌八極外洞逹無始際時從王子喬吹笙下遊戯咄爾燕齊人宿留安可致方朔起平原髙志凌紫氛上書三千牘長揖萬乘君淪跡寄中朝髙爵固非羣繾綣縁世主諧笑匡國均三食王母桃不受王母嗔髙風軼萬代誰歟繼清塵伯陽閔衰周西度函谷闗誰令守闗者再拜希一言斂容為之陳文字至五千聊因令尹啟本欲使之傳煌煌百代下繼者良獨難赤松隐崑崙廣成在空同德為王母歸道與軒轅通既枉赤水駕時欵𤣥圃宫先天本非始後天亦無終自非𤣥德人誰能躡竒蹤雨中作孟夏凉風來吹我羅裳衣此服豈不稱炎暑方及期婉婉庭中花煌煌有光輝自信好顔色何能與時違㝠心委元化勿為後世嗤送劉旌德大火流坤維西風集庭柯積流不歸壑浮雲鬰嵳峩山東擁盗賊淛右疲征科嶺外兵不解湘南及干戈郡縣無良材平人嬰禍羅宓氏彈鳴琴言游亦弦歌劉子宰旌德為治當如何題淵明撫松圖抱拙辭下邑曠然獲所安孤松臨廣園聊且共盤桓清晨散遊䇿日入自當還霜露不相貸時物倐殊觀兹植焉所貴昔為聖者嘆題趙子昻寒翠圖石潤欲生雲山寒疑有雨髙林葉盡脱低篁緑堪數因知静者要更覺王孫苦小草枯樹根茸茸欲華予初至京師和答友人病中見示志士輕離别貧賤事多違秋風車馬中故人髙卧時逺客江南至塵土滿素衣既申離合情中多勞苦辭歡笑未幾何感嘆已乗之欲及田里事復恐疾疢滋亹亹流景遷榆栁各變衰偃息寄一室朝夕終在兹委運復何言人生信可疑我獨何為者日出暮來歸重錢何太虚鷄鳴曉色動行人出南郭裴徊望車馬飛雪何漠漠巨野四面平中路凄以索黄狐超客過驚鴟向人落結軫赴悲笳凝酸屬哀角時逢古人跡因究平生學迴首睇闗山低心望蓬霍離合兩不期思懐獨難託贈洪參軍兄弟洪氏起遼海流章耀八紘孝友根世學忠貞自天成入為帝羽儀出秉國鈞衡洋洋髙門居濟濟羅公卿籍甚澄與瀾玉質金為聲析理貫秋豪摛藻艷春晴朝趨承明内暮進賢友生衣錦務尚絅穆然含粹精靈鳯非求知出為世所驚竒璞隐崐岫采充清廟英堯湯攬羣才聖道日光明豈惟殷膚敏祼將在周京蒼天雖云髙乃心此黎氓君臣兩不易相期底隆平君德貴并包臣道戒驕盈立賢必無方㧞茅思彚征朂哉敬厥終兩賢信國楨送馮尊師還岳陽馮公住天岳夙抱丹霞賞結構何威巍連延瞰髙爽飛縈帯遥甸周覽春泱漭日落長沙明風迴洞庭響事因多病簡道與流年長郡邑費招邀賢豪畢知奬翳然庭中樹宴坐寂餘想流雲時縱横幽弄自來徃還因採靈藥相覿稽神壤悵望忽言歸川塗日脩廣題山水卷梢梢雲木動藹藹烟峯亂逺浦引歸橈雙厓臨絶岸方思隠淪客欲結漁樵伴水濶山更遥幽期空汗漫題清江黄氏池亭亭名玉壺氷新亭環碧池池水何漾深偶携塵外侣薄言此窺臨惴惴若有畏憑憑如弗任既抱執盈念仍懐履薄心白日麗清暉微風在逺林洞逹忽無際澂明諧素襟還君玉如意理我雲門琴三月晦日送春得詩字變化無終極形氣遞推移昨日名園中徂春忽在兹􅁮􅁮華林彩繁陰緑成帷徒結遊女懐秪増志士悲况此客行子風水積川坻撫壯思始榮臨芳念將衰安知盛長後不有堅凝時俯瞰江水流仰與東風期各言早還歸毋勞東山詩題陳掾菊逕逹士隨所適跡異心恒素時從府中歸問菊松下路初欣碧樷長復愛繁英布灌以古井泉申之九秋露有酒共斟酌無人還獨歩結意常恐非留懽輙忘暮髙天遥澄穆平川澹容與落日明歸禽踈籬繞蒼樹懐芳諒為美居榮豈云暮矯首今何時孤雲為誰去題蘆鴈四首江湖處處非况汝一身微如何却欲下只合更髙飛自不作雙飛沙頭叫向誰碧天無限好何處不堪隨朝飛自作行夜宿更成雙誰能如此鳥和月占秋江寒就江南暖飢就江南飽莫道江南惡須道江南好題李陵送蘇武圖一與故人别死生寜復親休言典屬國猶得畵麒麟今朝送漢節迢遞入秦闗惟有沙場夢相隨匹馬還慘澹河梁路參差塞上山誰言是死别日夜望生還題風烟雪月四梅圖逍遥芳樹下解后寒花發立盡晚來風明朝恐成雪髙花開幾㸃澹靄拂成衣遥瞻應不見相對尚依稀年年霜雪裏得見此花開此花元不筦一任雪霜催玉樹臨風好更於明月宜空山冷相照未必有人知題牧羊圖求牧既已得敗羣還復去白晝捫蝨眠清風滿髙樹題草蟲圖二首傾陽朝莫同忘憂嵗年改蜂蝶那得知側翹方采采有竹不必多有荳當自熟坐看蜻蜓輩日晏紛相逐再題二首種藥都防憂滋蘭總為春青蛙與蜥蜴何用亦紛紛直節直彌堅弱蔓弱空纒微霜一夕降蚱蜢亦悽然題石頭和尚草庵圖青天不可量好風亦無價試覔庵中人蕭然古松下題何尊師畵牛圖圖惟一牛並無坡岸草樹人物之屬莫是度闗者寜非喘月時茫然天地内誰問復誰知題柯博士為方叔髙所畵墨竹蒼蒼四君子意氣侵雲端六月不敢近蕭蕭風露寒丘氏南陵月磯亭明月滿灣碕先生獨釣時漁人渾未識惟恐白鷗知題四梅圖一兼松竹山礬一兼水仙一兼雪月芝草一兼蘭與小徑蒼松側疏籬翠竹間相逢如有約乆立不知還亂蘂逺難分寒香近却聞何人心與迹於此可同羣誰將配水仙更欲比山礬試問花知否臨風笑不言芝草黄金色蘭心紫玉㽔忽從花下見可恨不同時送阿英童歸揚氏弱女年十三兩年失母慈看拜阿婆去憶着初生時野鴨詞野鴨雙雙沒輕鷗兩兩浮人生亦如此那有别離憂題雪竹初霽圖已奮尚離披連朝被壓欹虚心與直節唯有太陽知題蒲萄翠實肥初熟瓊漿迸欲流向來為酒者一斗博凉州
