front:
  text: 新呉清寧以英妙之年際休明之運方䇿名進士而獨好古文已可謂豪傑之士矣然方今以明經取士所謂程文又皆復乎古以其所好固無害於所求也讀清寧五七言詩已清潤明快古賦已瀏亮純雅記序已宛委有法而予竊有獻焉清寧廬陵人也姑以廬陵言之歐公天下之宗也百世之師也冝以為歸溪衰世之作也然其評詩數百年之間一人而已獨非子之師乎因二公之盛浚六經之源益溯而求之海内之名必歸子矣
  hash: sha256:4af981ef4ed951e0e602d281bfecd7e4a33cb438d4c93be577b3d36701249588
