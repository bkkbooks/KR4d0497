body:
  text: 豐水續志序王順伯修豐水志之六十有三年邑陞為富州又二十有五年李君肖翁典鄉校居五年乃輯淳祐以來城池人物時政之蹟及前志所未備者為續志六卷條敷類析窮蒐極簡將以垂信方來惟東南物產豫章為下故班孟堅曰物之所有取之不足以更費蓋自古然矣是書於貢賦之變未甞不再三深致其意使為政者少有仁恕必能戚焉有動乎中思復其舊其於政教所書必録其善而遺其不善此居其鄉不非其大夫之意亦作志者之法也君以碩學粹德起文獻之家居儒師之位祠先賢尊景行育人才無所不用其道猶惓惓是書而豈徒哉後之君子尚求李君之志蕭孚有詩序廬陵蕭氏世為達官為能臣至臨江從事煖有復以政事稱而其季弟孚有乃以能詩聞夫為政與詩同心欲其平也氣欲其和也情欲其真也思欲其深紀綱欲明法度欲齊而温柔敦厚之教常行其中也孚有之詩韋出也讀蘇州韋公之詩如單父之琴武城之絃歌不知其政之化而俗之遷也海内之學韋者吾識二人焉涿郡盧處道臨川呉仲谷處道有爵位於朝有聲名在天下其氣完故獨得其深厚而時發以簡齋仲谷隠者也其氣孤故獨得其幽茂踈淡而時振以岑參崔正言今復得孚有焉孚有生文獻之家襲冨貴之業而性情温厚辭氣閒雅故其為詩周旋俯仰舉相似焉此非獨善學韋也亦居相似而性相近也使他日推以為政民有不忍欺者蕭氏之未艾於此可卜焉予聞其師劉君桂翁亦深造於韋豈其固有所自耶孔氏譜序孔氏世家一卷其派之在江西而顯者是為臨江三孔孔之子孫曰克已者是為先聖五十五世孫由江西不逺千里拜曲阜陵廟且因以考訂其譜牒而收其所未續者傒斯得與觀焉於是悚然敬肅然懼進而告之曰凡天下之受姓命氏未有非聖賢之後者也凡有尊祖敬宗之心未有不知重其譜牒者也然徒知重其譜牒而不知求夫尊祖敬宗之實猶無譜牒也猶非其子孫也而况孔子之世家乎夫孔子魯之陪臣也去年千七百有餘歲矣天下至今誦其書講其道祀之以天子之禮樂戴之如天地仰之如日月親之如父母者果何以致是乎衢路庸衆尋常之人一有不合於孔子之教者猶得指而議之而况其子孫乎其為孔子之子孫亦難矣故籠天下之陸海不足以為其冨極天下之爵禄不足以為其貴窮天下之奇珍異噐不足以為其寶其可富可貴可寳者在聞乃祖之道而凡學孔子者猶必是為務而况其子孫乎夫譜其譜者尊祖之噐也道其道者尊祖之實也敬之勉之勿徒抱其虛噐而號於衆曰吾先聖之子孫也吾懼其有議其後者矣子其慎之天歴二年二月丁酉後學揭傒斯敬書重修揭氏族譜序揭氏稱漢安道侯之後者我桂陽府君據夾漈通志而言也旴江之族與我同出乃祖楚司揭氏汝寧之族則又祖漢陽信侯三者政未知所定也旴江與豐城之始祖兄弟也今豐城稱始祖為旴江府君誤矣唐乾寧二年僕射鎮以敗上官逢之功加銀青光禄大夫持節袁州諸軍事守袁州刺史兼御史大夫上柱國有勞績於袁子孫世居袁於豫章旴江為近且我始祖府君其名政與僕射類豈其兄弟遭五季之亂遂㪚處諸郡耶是未可知也然吾先世之䧺文盛德在宋由進士而入者科不乏人自足著白於無窮又豈敢重貽拜汾陽之譏大德中族兄允中合諸譜而修之今則以寧兄復續而廣之讀此者油然孝弟之心凄然霜露之感必有不待喻而興者凡我子子孫孫尚敬之哉送劉旌德序凡為進士有謁於予者余必有以告之余亦忝進士之名也至於廬陵劉君粹衷余知己也方擢高科拜新安之命而去余乃未有以告之粹衷亦以憂不果上今再調宣之旌德宰而終不有以告之何也粹衷之所受學皆賢師所與游皆良友所言皆仁義道德之懿所行皆孝弟忠信之實舉於卿而無忝選於有司而無慚余不及則有之矣未有能過之者誠無以告之也然上之取士先德行次經學次文藝次政事其法甚叙其道甚備歴二十餘年非不久累七科之士非不多而天下政煩教弛民情壅塞風俗不興上之澤不下流日甚一日其故何哉豈學無賢師游無良友以仁義道德為虛説以孝弟忠信為曲行特竊其言以取禄位非有躬行之實歟豈猜賢忌能者尚多懐奸挾詐者益衆附之則安冨尊榮違之則貧賤憂辱雖儒者亦委而從之歟抑𤨏𤨏州縣上廹大府震以不仁之威壓以非理之勢雖欲自竭有所不能雖能有所不容者歟抑任小者不可以謀大任輕者不可以圖重守一官則治一官居一職則治一職非宰相不足以變天下之化易天下之俗雖更七科柄用者尚寡歟夫何儒者之無益於國也非儒者之無益於國也不能盡儒者之用焉耳今粹衷之為旌徳也有君子之譽挾進士之號居一邑之長寄百里之命得於已者有躬行之實待於人者無越分之望是非聽乎理屈伸由乎道乗饑渴之餘反貪暴之風政教之流必浩浩乎若奔川東注風俗之變必靡靡乎若長風偃草儒者之效吾睹之有日矣余何以告之雖然粹衷所治一邑耳由一邑而天下是在天子與宰相能用不能用耳勉哉粹衷無畫乎世之不能容不能知不能用也通鑑綱目書法序孔子因魯史作春秋以為萬世之法朱子因司馬氏通鑑作綱目以正百王之綂此天地之經君臣之義而聖賢之心也世之言春秋者自公羊榖梁左氏以下無慮數十家而義猶有所未明疑猶有所未觧者魯史不可復見且聖人之制作也後之羽翼六經者宜莫如朱子猶不敢言春秋然綱目之作非深得聖賢之㫖者不能也故朱子不言春秋而知春秋者莫如朱子世之言綱目亦無慮數十家既有春秋為之義例又有諸史可以究其始末且去朱子之世為未逺而又有親及其門者然言愈煩而義愈宻非深得朱子之意如朱子之知春秋者不能言也能言未有若廬陵劉氏綱目書法者其辭則公羊榖梁其義則春秋而其志則朱子也古之有天下者莫若舜禹湯武然湯有慚德武未盡善舜禹之後得天下者莫如漢曺氏親受漢禅威加中國卒不能奪諸葛孔明漢賊之分元魏據有中國行政施化卒不能絶區區江左之晋而繼之此萬世之至公而不可易焉者而猶或易之此綱目不得不繼春秋而作此書法不得不為綱目而發也此朱子之志也劉氏諱友益字益友遭宋訖録閉門讀書既深於經復長於史其為此書㡬三十年寸寸而較銖銖而積微詞隠義高見特識既足以啓發千載而中有無窮之憂余故曰非深知朱子之意如朱子之知春秋者不能言能言未有若劉氏綱目書法者而又曰此朱子之志也於乎後之覽是書者尚求其志哉天厯二年六月十日序范先生詩序范先生者諱梈字德機臨江清江人也少家貧力學有文章工詩尤好為歌行年三十餘辭家北逰賣卜燕市見者皆驚異之相語曰此必非賣卜者已而為董中丞所知召置館下命諸子弟皆受學焉由是名動京師遂薦為左衞教授遷翰林國史院編修官與浦城楊載仲宏蜀郡虞集伯生齊名而余亦與之遊伯生甞評之曰楊仲宏詩如百戰健兒范德機詩如唐臨晋帖以余為三日新婦而自比漢廷老吏也聞者皆大笑余獨謂范德機詩以為唐臨晉帖終未廹真今故改評之曰范德機詩如秋空行雲暗雨卷雷縱横變化出入無朕又如空山道者辟糓學仙疲骨崚嶒神氣自若又如豪鷹掠野獨鶴呌羣四顧無人一碧萬里差有可彷彿耳晚尤工篆𨽻呉興趙文敏公曰范德機漢𨽻我固當避之若其楷法人亦罕及其居官廉直門不受私謁歴佐海北江西閩海三憲府三棄官養母天下稱之甞一拜應奉翰林文字而有閩海之命不果行至順元年年五十九卒其詩道之傳廬陵楊中得其骨郡人傅若金得其神皆有盛名其生平交友之善終始不變者郡人熊輈也楊中將刻其詩命其子繼文請序為書其始末如此嗚呼若德機者可謂千載士矣楊中字伯允傅若金字與礪熊輈字敬輿詩凡若干卷書王鼎翁文集序余舊聞宋太學生廬陵王鼎翁作生祭文丞相文每嘆曰士生於世不幸當國家破亡之時欲為一死而無可死之地又作為文章以望其友為萬世立綱常其志亦可悲矣然當是時文丞相興師勤王非不知大命已去天下已不可為廢數十萬生靈為無益誠不忍坐視君父之滅亡而不救其死國之志固已素定必不待王鼎翁之文而後死使文丞相不死雖百王鼎翁亦末如之何况一王鼎翁耶且其文見不見不可知而大丈夫從容就義之意亦有衆人所不能識者近從其邑劉省吾得王鼎翁集始見所謂生祭文丞相文既歴陳其可死之義又反復古今所以死節之道激昂奮發累千五百餘言大意在速文丞相死國使文丞相志不素定一讀其文稍無苟活之心不即伏劒必自經於溝瀆豈能間闗顛沛至於見執又坐燕獄數年百計屈之而不可然後就刑都市使天下之人共覩於青天白日之下曰殺宋忠臣文丞相何其從容若此哉故文丞相必死國必不係王鼎翁之文其文見不見又不可知而鼎翁之志則甚可悲矣即鼎翁居文丞相之地亦豈肯低首下心含垢忍辱立他人之朝廷乎鼎翁德之粹學之正才之䧺詩文之奇古則劉㑹孟先生言之備矣茲不復論獨論文丞相之心與鼎翁之志云爾城南宴集詩後序京師天下游士之滙其適然覯晤為千載談者之資定百世通家之本代有之矣或以情附或以義感或以言求其取友雖岐苟軌於道均可以著簡書而託子孫也城南兹集得朋之義蓋備焉以僕愚戅亦俾在列肴核維旅酒醑惟㫖威儀有數長㓜有節舉盞更屬以親以友比往風後若勸若懲雜以談諧終歸雅則殘月既墮白露在庭觴酌未闌賦詩斯舉飲者既不知其醉而不飲者若素嗜焉賔既不知其主而主者亦自忘焉居而殊方出乃合轍新知舊好脗然靡間則斯㑹也不已難乎白頭如新傾蓋如故昔聞其語今見其人特未知所以資千載本百世者果安在耳廬山鄭君直卿既序其㑹集之詳於前余復申其交友之樂於後君子所命不敢廢焉送胡伯友拜孔林序胡某伯友吾鄉之賢而秀者也好學而篤志甞謂吾受夫子罔極之㤙欲一拜孔林而不獲焉至順三年夏以職事上計京師過任城距曲阜九十里欲往不可得及竣事將還告予曰吾必一至孔林遂所願焉幸有以教我予進而告之曰夫能使我知所以為人之道而盡心焉者夫子之教也此所謂罔極之恩也服夫子之教盡為人之道所以報夫罔極之㤙也非必造其居里謁其林廟而後為盡報夫子之道譬之其親其生養之盡其樂其没也葬之盡其禮祭之盡其誠其服於身也惟父母之訓是承可為真孝子矣其養也葬也祭也其服於身也悉反是曰必一造其親之墓而致其哀焉得謂之孝子矣乎其事聖人也亦然非聖人之學不學非聖人之言不言非聖人之行不行其服於身也悉反是而歲必一至孔林而展其禮焉得謂聖人之徒矣乎吾既知所以為聖人之教所以為人之道吾盡吾知而行吾所知其報夫子罔極之㤙孰大於是舎是人必謂要譽於鄉黨朋友而已夫讀聖人之書求聖人之學能思其罔極之恩必求其居里謁其林廟斯過人亦逺矣雖然吾子其勉之秋八月六日揭傒斯序送張掾序張君用以吏起南陽歴澧州升憲府一旦又掾於監察之庭君用亦榮矣而余竊有言焉夫今之號稱風憲者下而肅政上而䑓察皆朝廷耳目之寄四海生民之命以伐姦立善扶網振紀其為職任而得揚揚言天下得失抉智巧之所諱避莫如監察御史得與監察御史執簡牘必可否持是非又莫若為其掾則㞐其任者其責不既重矣乎以至重之責而惟招人毫髪之不慎報其草芥之私顧以售其黜陟之威以逞快其欲心其為害亦大矣然君用之為人高明果毅人也公而忘私人也夫高明則情無不察果毅則事無不斷公則理無不得持是以往何憂其不名之立功之成哉然余竊又有獻焉傳曰宥過無大刑故無小又曰舉直錯諸枉能使枉者直故以小善而掩大惡則為惡者滋以小過而棄大善則為善者懼舉不當賢罰不及罪謂之不任故君子平其心而直其氣思其職而竭其力樂其效不計其報君用其慎之哉君行見吾故人朱仲章亦稱高明果毅公而忘私人也其為我謝焉送陳文學序新授靖州㑹同縣文學旴江陳君將行而通國之人皆笑之巧者笑之以拙愚者笑之以狂彊者笑之以不奮揚弱者笑之以不自愛其身其言曰繇旴而靖水陸行㡬三千里高如梯蒼天深若航大海穿虎豹摩虬龍又何必弊弊焉為一文學哉君方趣裝具糗糧倓然若不聞覔覔然笑且咍行有日矣告余别余曰人之笑子者衆矣子無以人之笑而自䘮也人之笑子者不知子者也人之笑子者官卑而地遐也不聞笑子之學也夫文學雖卑王官也㑹同雖僻小王邑也吾守王官居王邑食王禄而行吾之道夫何不可之有子行矣其篤爾行謹爾言敬爾儀毋蔽爾私毋徇爾財求其可事者事之可友者友之可教者教之以無替王官尼王化竭吾職而已又安知官之卑地之遐乎且子方盛年而親未老政自樹立之日苟可以行其道雖寒荒窮髮之外將不暇顧况㑹同哉子行矣勉旃善自樹立官卑地遐非子之病也今之笑子者將拜子矣贈醫氏湯伯高序楚俗信巫不信醫自三代以來為然今為甚凡疾不計久近淺深藥一入口不效即屏去至於巫反覆十數不效不悔且引咎痛自責殚其財竭其力卒不效且死乃交責之曰是醫之誤而用巫之晚也終不一語加咎巫故功恒歸於巫敗恒歸於醫效不效巫恒受上賞而醫輙後焉故醫之稍欲急於利信於人又必假邪魅之候以為容雖上智鮮不惑甚而沅湘之間用人以祭非鬼求利益被重刑厚罰而不怨悔而巫之祸盤錯深固不觧矣醫之道既久不勝於巫雖有良醫且不得施其用以成其名而學者曰以怠故或曠數郡求一良醫不可致烏乎其先王之道不明歟何巫之禍至此也人之得終其天年不其幸歟吾里有徐先生若虛者郡大姓也年十五舉進士即謝歸業醫人有一方之良一言之善必重幣不逺數百里而師之以必得乃止歴數十年其學大成著易簡歸一數十卷辨疑補漏博約明察通徹融敏咸謂古人復生其治以脉不以證無富貴貧賤不責其報信而治無不效其不治必先知之惟一用巫乃去不顧自是吾里之巫稍不得專其巧矣余行數千里莫能及間一遇焉又止攻一門擅一技而已無兼善之者來旴江得湯伯高該明靜深不伐不矜深有類於徐余方憂巫之禍醫之道不明坐視民命之天閼而莫救而愛高學之有類於徐且試之輙效故并書巫醫之行利害及徐之本末以贈之嗟夫使世之醫皆若虛伯高信之者皆吾里之人巫其能乆勝矣乎伯高名垚自號常靜處士若虛名棪聞廬山有郭氏號南寄者亦有名夷白先生集序靖州史君郭履以外舅夷白先生鄭氏所著須堂集若干卷請序於豫章揭傒斯序曰莆田鄭氏自夾漈先生以博學聞天下其後百餘年有夷白先生夷白先生早孤窮學於林臯父先生林臯父先生大奇之年十五六即棄去日縱飲博豪游市肆間林先生患之一日適過林先生門先生出遇之召閉齋閣中數月日夜切責詬辱遂大感悔悉謝絶游從研極經史下至百家外説無所不渉放筆為文厓崩崖豁幽詭變眩赫然如臨百萬之兵謀勇㨗出宋末以鄉賦與計偕不第大臣薦有史才得召試史館去之淮漢間與諸健帥豪士游氣益横厲多憾激慷慨之言入國朝辟聘交至杜門不起著古易觀玩等書探聖人之㣲立後世之的子孫賔客相對竟日聞一語輙汗下其學行大抵類夾漈先生或謂其詩文之奇古過之悲夫世復有奇偉博達之士若夷白先生者乎使先生所遭皆合乎志少盡其用則英光盛烈不與古人飛馳於汗簡哉而林臯父先生亦不冺然於世交稱道之矣顧以是託余不亦重可歎哉先生名鉞字偉節云純德先生梅西集序純德先生郭君諱隚字德基長樂人也世以明經顯號書橱郭家父正子宋名進士好春秋著春秋傳論由是治春秋者多師郭氏春秋先生少孤母林教育之長通六經尤長於易著易述治易者復師郭氏易而素尚高潔登山臨水雅歌投壺賔饌無虛日酒酣為文下筆不少休每一篇出爭相傳冩皆效其體閩中居士莫敢與比先生亦未甞少自矜衍人有一善稱之不極不置故人樂出其下初補太學生宋亡居鄉教授至元中以遺逸起家三為郡文學所至相賀以為得師先生之文益高道益尊而亦以是終焉閩之賢者黄監簿仲元論先生曰動靜可識近乎時人不絶俗近乎知奬士成名近乎仁其有道者與鄭國史鉞曰先生之文流出肺腑詩有開元元和風致長短句妙處逼秦晏今翰林學士承㫖程公亷問閩海時尤相雅愛亦曰其談經明白統貫不刻鑿以為異其詩若文和平沉深不琢鏤以為工其為人踈通慷忼謹簡易直不矯亢以為高其為子為父孝以慈其與人交彌久而孚益逺而不可忘蓋先生之質全於天先生之文粹於學不求敬而人敬之不求愛而人愛之不求知而人知之不求傳而人傳之烏乎此所以為先生也耶皇慶二年夏先生之子履由太子太傅府長史出知靖州其行也集先生之詩若文若干卷曰梅西集屬余序余能序先生之文耶然余樂其人慕其道好其文庶㡬可以託不冺遂序之純德其門生故友之所謚云是歲六月朔豫章揭傒斯序送程叔永南歸序翰林程公以儒術起家出入三朝徳盛望隆為國名臣為江南第一今天子即位加恩近臣佩相印者以百數惟公屹然嶽立不倚不阿繇是名日登天子以為有大臣體特超遷三官追贈其考妣官其一子同知南豐州事賜七品服於是寵榮至矣咸以為宜而公惕然踖然如不勝人益以為難南豐君行且有日又屬禁時不得奉尊酒冩萬里之懐乃為之辭曰君為郢公之孫翰林公之子日連衽結鞅而來者非名卿大臣則高人俊士凡修齊經濟之道進退揖讓之節忠孝亷恪之本冝皆飫聞而熟見之矣君藉旴南豐旴屬邑今雖别為州猶鄉邦也凡地之險易民之情偽務之緩急得失亦素講而深喻之矣君又才高而識逺氣和而節下機未發而彀釋聲未振而響應以之剸繁劇解盤錯事上而接下莫不宜惬吾惡能言之君見巷列之樹乎其初也既宜其地而封植之矣又灌以液之援以周之剔其蠧而時視之靡不曰吾將夏息其隂冬取其材以成室屋矣而往往不相待焉幸而後之人愛而有之否則撒其藩垣肆其狂馳牛馬觸劘樵牧扳援先披其枝後撥其根見者傷嗟聞者憤惋不亦悲夫人之積德累行食勤衣苦逺者數十世近者百數十年所以厚其子孫厥惟艱哉故周公有鴟鴞之遺魯人貽閟宫之頌誠知機搆之難承繼之甚不一也今若君之家者亦已寡矣而君又將有民社之寄焉夫世降不古者亦已久矣吏民之憸巧豪横之伺候利誘之蕩泊臧獲之貪黷驕慢小有不誡則祖宗為辱不亦甚可畏哉伐柯伐柯其則不逺能如翰林之於郢公則善矣雖然吾何以為君言哉位已髙而意益下官已大而心益小禄已厚而慎不取此孫叔所以治楚也以是三者而行之以誠亦庶乎其善也敢書以引送族子時益赴南康主簿序古者内自御史府諸監寺外及郡縣皆置主簿内掌印勾檢稽失外闗録諸事省署文書今惟縣置之然得與令丞列坐聮署相可否闗决事其職乃與令等令曰可主簿曰不可不可行也主簿曰可令曰不可不可行也凡獄訟期㑹署文書又必自主簿始以次至於丞若令主簿不可即尼不行令雖尊亦有所不得專者故令主簿必惟其人族子時益性亷而平氣和而清好友行於家忠孝著於宗族鄉黨通經學古敏而能下甞以國書教授臨江上下交稱其賢今又主簿南康吾知必得其職矣然子雖賢令非其人則不能以行令賢郡太守佐非其人亦將有所不行余聞新邑令則蔣君也余甞與之友讀書習律和一平恕賢令也郡太守趙公余亦甞接言論於朝好古博雅賢守也其佐幕則一君為元僚一君以憲掾起家亷直明慎賢佐也余知之最有年夫令賢郡守佐又賢子雖有不及猶將容之况以子之賢乎余不獨為子之幸實為南康民之幸吾聞南康有八百毒龍不深潜逺逝則將化其德而從之矣古者主簿之職勾稽得其當猶有去為御史為卿監令僕者子其朂之送李克俊赴長興州同知序夫今之所謂善政者亦曰亷而已矣亷非為政之極而為政必自亷始惟亷則欲必寡欲寡必公公則不匱然天下皆知亷之為貴也而莫知為之何也禄薄而任重内不足以給其妻子外不足以應其誅求孰能不為之動哉設有一人焉則自以為度越恒人且萬萬矣遂乃傲大府慢同列奴視胥吏而草芥其民及夫怨怒並興禍釁交作又自咎曰亷不可為如此人亦曰亷不可為如此於是改行易節售私騁欲波蕩而火焮亷恥之道無遺矣不敗不知夫如是政何由善民何由生哉故知貴亷而能保其名者恒求一二於千萬也吾獨於河東李君克俊之貳長興也躍然為之善君之先人是為集賢侍讀學士􅆒歴中外餘四十年天下號為能臣凡為政之道必講之有素君又饜飫於詩書沉酣於禮義其平易足以近民長興又為浙右上腴食公田之入足以自給也他日稱亷循者實於君有望焉夫亷者固君子之事也不可以多上人送劉真叟赴廣東憲幕詩序淮西有賢士曰劉君真叟初從諸生間有能諸聲至大初部使按行至郡其掾方端甫剛直亷正人也雅知人聞君名即言部使者命有司貢焉將用為掾㑹有令君以南士罷僉事鄭公善明獨深惜其才不得用君方閉門讀書大肆於學將就試有司延祐七年春鄭公持節南海道遇故掾張信卿語劉君甚悉召與俱君歎曰士為知己用用不用命也吾不可以負鄭公乃杖䇿踰梅闗下韶水不逺二千里往從之適余遇於章江之上諸士友為詩以艶其行復請余序所由來然余觀劉君以粹德實學長才修名政恐區區一掾不足以辱劉君而鄭公能知人如此能下士如此劉君固不得辭是行也夫公卿下士可以觀其政矣君子見賢人出可以占其時矣故余不以劉君受知鄭公為喜而以鄭公能知人下士為喜不以劉君得一掾為喜而以賢人君子出應其時為喜劉君勉乎哉余望子於青雲之上復繫以詩曰新裁桂楫發龍舒南度梅闗謁使車霜氣春隨五色筆虹光夜入滿船書天涵聖澤鯨波澹雨洗蠻荒瘴霧虛日晏從容蓮幕裏知君隨地有安居宋史論序傳曰五帝異樂三王不相襲禮聖人非惡同而好異也勢不能也是故聖人執經以達道君子因時勢以立業經有定位權無常勢變化消息與時皆極知此則可以明古今之故而制當世之務矣集賢大學士樞宻院使大梁王公歴觀先儒論前史之得失必責以五帝三王之事乃本司馬氏通鑑作歴代論史一本陳均宋編年備要作宋史論凡十數萬言不為甚高之論而求中行之實不務辭藻之富而求理義之當執經達權得易隨時之義彰善黜惡有春秋責備之法所以求當於古人垂訓於將來也而於宋論尤加詳焉其稱太祖之得天下也無異前代而能建過唐之祚接繼堯之統者立國以仁設教以儒此有道之長也所深惜者太祖無婁敬之臣太宗有魯桓之行神宗首用王安石以啓宗室衰削之深根哲宗起章惇徽宗任蔡京以致播遷之極辱高宗為中興之主而李綱張浚廢痼宗澤憂死岳飛殺黄潜善汪伯彥秦檜之徒彚征旅進更為腹心拒絶和之議棄恢復之㡬甘宴安於窮陬忘祖宗之大恥孝宗既非剛明之主徒聲北伐之辭寧宗之疾委柄侂胄理宗之立歸德彌逺羣邪輻輳善類日消不顧唇齒之謀竊取復讎之美馴至度宗權歸似道欺君敗國卒至覆亡三黨之禍成於三變四凶之毒繼於五鬼反覆小人之情狀痛悼君子之椓䘮讀之千載之下猶當拊膺扼腕流涕而永歎也至論其家法規制人才文物則薄唐而陋漢南北並國則帝宋而黜金以王欽若収濕榖蠲旱租放逋責吕惠卿却西夏丁謂經制施黔雖小人猶有所取趙普修私怨韓琦刺義勇司馬光改助役范純仁復青苗劉摯等議調停文彥博吕大防主回河冦凖薦丁謂張浚抑李綱殺曲端引秦檜雖君子而猶有所憾若此之類不可殚陳皆矯然出於羣思衆見之中嶷然立於大公至正之表所謂聖人復起不易吾言矣嗚呼讀詩書而不知經權之道時勢之宜孔子曰雖多亦奚以為夫國以賢興以諛衰君以忠安以忌危何自古人主之悟者恒鮮也以公文學行藝才識噐度直内而方外憂國如憂家身事五朝位歴二府䧺名碩望將五十年猶以餘忠遺智託之空言使天下後世之為人君為人臣者知所龜鑑而為宋成書者亦有所折衷焉雖然今天下之望於公者其止是哉敢書以為宋史論序文安集卷八
