body:
  text: 掲曼碩傒斯著門生前進士爕理溥化校録記廬江縣學明倫堂記廬江縣古廬江郡治焉今􅊢無爲州東有巢白黄陂之浸西有桐舒之蔽前臨大江北界合肥山髙而水深邑大而土饒風俗淳古民習礼譲故易治而速化延祐三年邑令史伯杲新孔子庙後九年邑令張導礼更爲神像及礼器至順二年春二月碭山成君克敬継為兹邑祗謁先聖先師退即明倫堂敎宫以下以序列坐歴問風俗臧否吏民所疾苦古今賢士孰忠孰孝各以所聞知敬對起瞻棟宇摧撓腐販蹙然曰是固出治之夲乃尔而緩乎即日出私錢為民倡合所淂緡錢七千五百有竒三月丙戍即工秋七月戊子落成凡為屋六楹丹墨藻繢髙壮宏嚴始于庙称子是人皆知君所以為治之意不待教令日趋于善明年夏属舒城宰爕理溥請予記夫明倫之說具在六經其要君君臣臣父父子子而已若堯之惇叙九族舜之敬敷五教禹湯文武周公之所以化民成俗孔孟之所以垂世立教皆是道也是故君不君則天道乖臣不臣則地道暌父不父子不子則人道絶其故亦大矣孔子曰斯民也三代之所以直道而行也以其道治其民夫焉有古今之間哉君子受于承于師偹于身施于家行之于鄉居一邑則以之治一邑居一州則以之治一州任天下之責則以之盡天下之責不以上不知而慢其政不以下不從而怠其教彼方以去礼絶義爲恱我則曰天叙天秩不敢廢也彼方以殚財毁質為欺我則曰福善祸淫不敢誣也夙夜孜孜求夫在我孟子曰三代之學皆所以明人倫也君子之學也求以明之而已君子之行也求以推之而已此非獨為成君有民社之告所以為升其堂立其庭為師弟子者之告吾聞邑有文翁者有周瑜者有毛義者雖不足以上方三代盛時之士然其所以事親事君之道有能跂而充之亦庶几焉是役也相其成者主簿盧廷瑞董其事者邑士洪琮薛興宗成君字簡卿盖賢大夫云靖州廣徳書院記靖州居椘極壌洞庭潴其左巴蜀據其右狑獠與隣猨鳥與逰而兵革之所狃習也然其民好闘而勇于為義雖寡學而易感犹有屈賈之遺風焉自魏文靖公竄靖州士始知學近来有粟朝儀者靖之㑹同之賢者憂其土地僻陋去上國遐逺士不典于學惴惴然恐王化之不流廼築書院于居之里因其郷名曰廣徳厚歲幣以聘師髙廪稍以飬生徒凡郷之子弟俊茂者寠不給者咸得来學其中弦歌之音甫作而隣􅗲警當報大兵督餉學遂瓦觧事㝎凡園田進取之務悉置益廣棟宇豊聚蓄招徕生徒由是復振且欲示子孫母替厥服介其友謁文于余天民之降衷秉彛雖有居天地之外未能或之違也故三苗負固舜舞干羽而来格越裳肅慎去里萬里慕周徳重繹而来朝至于文翁之在蜀韓栁之潮與栁皆能一旦変文身椎結之俗千載称文献之邦盖可騐矣然彼皆大賢之所為徳盛而化溥道髙而名流其入于人易今粟氏以窮邦韋素之士奮然鼓舞義以韓栁文魏之自任亦可謂難也巳嗚呼士之居是卿㳺是郷以及粟氏之子子孫孫而有違其志背其道壅文教而不宣而惟暴棄之㱕復何顔以自頋其身耶可無念哉其爲屋椽礎之数若干工匠之計若干自相攸乞成之歳月廪給之寡夥咸俾刻于碑隂焉廣州增城學縣記入其邑人民聚田野闢學校脩其政可知矣在國𥘉廣之增城孔子庙火于兵進士李肖龍刻木主祠于士人鄭聪老家鄭遂以宅爲學歴五十餘年未有能復之者至順二年前翰林從事盱江左江由廣州香山令湖州經歴加奉議大夫尹增城淂故址城西沖霄門外百八十步面鳳䑓負亀山水縈廽如帶始合謀遷之于是列士輸幣群工效能頋濟陽復選其材頋宗興張悟道李夀李惟佑鄭元善董其役始是年冬訖明年秋凡爲殿六楹崇四尋有三寸廣六筵有五尺深如廣而去其筵有八尺堂四楹崇三仞七寸有半廣十有一筵七尺有五寸深視廣而去其八筵六尺有五寸門之楹如堂之数崇不及仭三尺四寸有半廣如之深不及筵二尺有五寸左右為廡皆十有二楹崇二仭有一尺深二筵有二尺堂之東為郷先賢崔清献公祠四楹崇二仭有一尺廣二筵有八尺深如廣而去其二尺内環崇墉外繚松竹堂之北有山又植松五千餘株而亭其上可俯覧一邑之乃勝休工休徒以舍菜礼告成于庙崇儒師使申其教𣸪諸生始修其業和民人使獲其所而政聲作矣又因南雄教授李顯求刻石之文于余以著乆逺遂告之曰學校者所以明道設教之地也道非聖人所獨得非有愚智逺迩古今之間學則至焉増城雖僻在領表聲明文物與中州䓁而不能以聖人之學立身棄其身者也不能以聖人之治治民棄其民者也棄身者殃棄民者亾故立身莫先于學治民莫先于興學左君治香山既能以興學為首務今又以治增城弗棄其民矣二邑之士皆能有以立其身矣乎重為告曰夫子萬世南面享天子之礼楽天下皆知為聖增城既庙礼夫子又祠崔公豈不以為賢乎賢如崔公則祀之况有不止如崔公者乎君子亦務學哉至順三年十月具官掲傒斯記􅕾亭記泰㝎四年夏六月余自清江鎮買舟泝流而上未至廬陵二十里有巨石如夏屋嵌立江右漁舟賈舶膠葛其下前挹二洲人烟鷄犬出没誕漫又拏舟前行数百里有小溪出谷中仰見層峦葺擁雲木森恱遂舍舟循溪而入越五里劃然開朗左右環合風氣蓄宻有巨塜隆然在山半由塜之左又入小谷有屋数間題曰􅕾亭乃坐亭上召守塜者而問曰地爲何曰爲書堂原塟爲誰曰爲阮氏何氏曰民望曰吾知其爲人矣是尝以年十三風雪徒步求書福建憲使出其父于獄者是嘗佐其父連山簿尉攝兵馬鈐轄撫洞獠有方者是嘗㧞俘虜之子于軍中以還其友贖俘虜之母于邑大夫以還淮僧責名家之女于歌筵以還其夫且給其家使改過易行者是常爲郡曺又爲縣都曹寛海艘之役罷坑治之害者是尝受知滕國李武愍公恒及其子平章公世安椘国程文憲公鉅夫南䑓薛中丞居敬孫御史世賢者尝為翰林潘侍讀昻霄為監察御史時舉為江西憲椽不果用廣東帥荅刻海朝京時湖廣燕右丞公揇為司農時欲舉為椽不就者遂升髙而望青原天容天玉諸峯如劍如㦸如屏如帷如卓茟者陳乎其前東山墨潭蛇山之属如騫如倚如據如伏如􅉳如紺者繚乎其後飄然如匹素渺然如白蛇自天南千里不息而横截乎党灘者贛江也朝暉夕景長雲廣霧明滅変化不可殚紀冝乎孝子慈孫于此興屺岵之悲而無窮也于是愴然而下復坐亭上拊髀而歌曰山川信美兮心孔悲往者不可作兮来不可期左右皆欷歔不自禁乃就舟至郡以其状告知徃来者曰然是其仲子清江教諭浩嘗庐墓其中且將葬其父于山之左腋他日為投老之地者也居数日若来見戚乎其容懇乎其言與語􅕾亭事泫然流涕曰先子之藏也再閱月乃請記夫父子者人之大倫也生死者人之大故也子雖甚爱其親不能使其親之長存父雖甚爱其子不能使其子之皆孝極夫登髙丘臨塘墓不必其親之所藏未有不悄然傷懐彷徨躑躅者人之至情也况浩兄弟之孝臨其親之所藏者乎然孝于親莫大于敬其身敬其身莫大于勵其行雖𬋩歌盈耳献酬交錯常如􅕾屺􅕾岵之時庶毋負兹亭之所以名也烏乎當至元風乕雲龍之世使民望少自損何所不至而寕為郷善人以終撫其山川天固將啟其後之人矣民望諱霖號石峯居士好學而尚義晚尤嗜佛老之書娶吴氏有四子曰均浩鐸煥女四嫁士族孫男七人是歳九月記善餘堂記饒有善人㞐安仁華蘃峰之西玉真臺之東華山之陽張果峰之北曰胡君茂卿治獄多隂徳其祖父皆好善郷之老長大夫士相謂曰易太傳不云乎積善之家必有餘慶請以善餘名胡氏之堂又購昭文舘大學士李博光書以遺之至順元年其子式入史舘與余深相好又明年請記于余余曰夫善人孔子犹嘆其不淂見孟子犹聞之喜而不寐况治獄平尤人所难者乎茂卿之生父盖年四十有五矣甚爱之未成童好學孝謹父愈爱之我元有天下所與共治出刀茟吏十九卿亦起為縣曹然在諸曹中獨異其治獄情可貸者無不貸之死可生者無不生之民亦莫不自輸其情而刑以不濫縣長貳及同列多嫉怒怨悪之而不敢言乆乃服其為人元貞末縣有盗捕人不淂尉輙以疑似捕齊民七人日搒掠鍜練之獄具移縣縣長貳皆喜其淂盗立関三木置獄中上遣使決且至卿入獄語七人曰皆言汝䓁非盗何不自言衆涕泣死不敢異卿曰汝弟言當助汝否即旦夕死七人遂極言冤状令怒不聼卿前争曰七人一邑之人皆知為非盗以為盗者獨尉與令耳奈何欲殺七無罪以逭失盗之責失盗之責亦至死耶令黙然竟释之七人歸皆祠卿于家頃之以群曺攝縣諸曺長有為縣豪主錢榖致冨饒者豪常欲坐以事殺而并之未淂間聞与妻前夫女姦乃大喜曰即坐与親女姦罪至死遂白縣治其事縣淂重賂皆許諾卿亦佯許之及捕治事有寔然非親女故匿不發豪曰求閱其獄盡如指意無異獄既具上府卿宻疏女族姓及祖父名牘中府閲獄見所引女族姓祖父名召謂卿曰卿真長者當為卿成此名竟以異姓女杖而出之卿為徳類此名至不可敷此其尢彰明較著人所常道之者後生五男子皆秀穎出群曰吾父積善惟吾人一吾今有五子天與吾厚矣即自免帰田里飬親教子縣長吏就問政事淂失随事誠告不及于他父年八十一終卿今亦七十餘矣教五子皆為儒闔門雍睦人取以為法可謂善人也巳矣夫善者天地之心天之于物無所不爱善亦無所不爱故曰順天者昌逆天者亾昔于公治獄有隂徳髙其門閭令容駟馬車曰後必有興者其度淺矣其報不丧如取諸劵胡茂卿為吏治獄平身未出曹椽之間淂五子即自貶損罷㱕若欲以其餘遺子孫者固自有逕庭㢤余嘗過善人之郷問其名則皆喜而对問其人則莫不且言且頌望其居則竹樹䓗欝禽鳥之聲喈喈及其門則鳮犬不驚童僕閒暇皆充充然有自淂之意升其堂則尊者不嚴而威卑者不令而從凡如是其後未有不昌者有過畨君之區行雲錦溪之上望玉真華蕋諸峰求善人胡氏之家其㞐人有如是者必其䖏也至順三年八月日記進徳堂記彭氏之堂曰進徳立訓也上念乃祖之令徳下憫時俗之日替将納其子孫于善也𥘉彭氏世居武夷宋之時其祖蔚與李丞相絧同學李丞相貴顯即謝不見李丞相鎮江西書数往乃肎来裵徊東湖上因㽞不去然終不應其辟遂隱居郡之新吴山中其七世孫敬則以文學官逰四方覌四方之俗疆相并衆相陵智相傾卑尊易序疏戚易位廢礼義違政教日甚懔然惧曰吾子孫亦将有一于是乎乃㱕作是堂以示訓故去華就樸以教儉髙亷重階以教嚴歳時奉烝嘗以教孝序尊卑以教敬存孤弱以教慈合宗族以教和撢礼楽敦詩書以教學又惧近之弗察逺之弗明也属余疏其義以廣其訓刻石屋滿朝夕俾覌省焉余乃言曰儉者徳之莭嚴者徳之制孝者徳之本敬者徳之基慈者徳之爱和者徳之順學者徳之聚儉則財用足亷則上下辨孝則仁義坐敬則礼譲興慈則恩恵長和則九族親學則萬善明徳雖美非儉無以㝎其制故為訓之始徳雖偹非學無以約其礼故為訓之終由之則昌舍之則亾不可湏臾出乎訓之外故表名以著逺服之若華衮佩之若瓊琚嗜之若膏梁䖏穷約而弗濫履貴盛而弗泰蹈危难而弗懾仰不愧俯不怍然後可以充乎徳之寔進乎君子之域而為彭氏賢子孫夫如是豈惟新吴之俗将化之推而放之四海而準國家之求忠臣良士必集彭氏之門矣夫徳盛者必有後以李丞相之賢而不能屈乃祖之髙是必在後之人余于斯堂卜之矣夫作堂以立訓𫐠訓以發徳夲乎志也故不著其歲月始末及筵楹礎筵几之類蔚字子革自號石溪先生敬則孛静中云常州通真觀脩造記保和通妙崇正真人徐公𢡟昭住常州路冝興州通真覌之十有八年重建三清殿又十有三年為皇慶元年建玉皇閣閣崇十二尋有半其材皆出于江東故山其始也材大而匠弗勝其成也不二紀而棟已撓延祐七年龍虎山道士張君徳隆嗣主觀事廼量歲之入莭浮縮濫為東西方丈以翼之使危有持而顛有扶以永徐公之績為三門以蔽之使内益尊而外益固以嚴神明之㞐財用既足經制既㝎㑹玄教大宗師特進吴公入奉内祠請以郡之天申宫都監陳景𢡟提舉觀事以董之凡錢榖之計一聴其出入焉大宗師從之于是陳君惟大宗師之教是承大宗師惟張君之託是重趋事赴功夜以継日􅍱時歴月道潰于成内則閣遂其安地儀其靈車軒洞户岩䆳深靘冬無烈風之憂夏無熇日之苦談經論道坐以忘疲外則髙甍崇阿巍巍堂堂人者心動過者額手亷陛不加而峻面勢不改而雄而徐之功立矣大宗師楽其有成也進陳君提點以昭其勤張君亦再𬒳玺書賜號冲真明逺玄静法師以重其山夫閣雖髙有翼焉則不扶而自正宫雖閎有蔽焉則不守而自固吾于是淂治國之要焉覌淂徐公而地以興徐公淂張君而業以隆張君得陳君而志以成而又淂大宗師旌善報劳而継者知所勸吾于是又淂任人之道焉是役也一舉而衆美具斯亦足矣閣之前有井極甘冽相傳李洞賓嘗浴丹于此井之上有二古栢高十丈大数十圍一夕飛去觀始于陳大建中額由弘道三錫為今名天厯二年六月二日戊子記袁州冝春縣逄溪山聖夀寺記袁之冝春有逄溪山者以逄溪禅師得名或曰逄本作濛傳燈録失之山有寺曰聖壽即逄溪禅師所建也名與萍郷之楊岐南源相伯仲𥘉馬祖以佛法振江西逄溪禅師與楊岐甄叔南源道明同事之于八十四人之中故帰皆建壇塲以闡其師之道武宗廢天下佛事獨逄溪寺以聖壽名獲存入國朝多郡之南泉山慈化寺僧主之至順元年冬寺灾長老妙愈即日發公庫錢鳩上度程斬大木伐堅石大改作之再歲而畢視舊有加焉愈闓疏敏給亦南泉普蓮宗主明炤慧覺圓應大禅師慈昱之徒也普蓮建造為天下最故愈亦称能亊云請著其事于碑辭曰有蔚逢溪馬祖之徒寔開此山数不載餘楊岐南源鼎足以居堂堂愈師是纉是啚欝攸降灾忽焉為墟愈頋而歎激烈奮楊畚焦輦燼正位㝎方經工程力攻堅擇良罔敢或易㒺敢不臧廼基廼構廼指廼授執前執後執左執右殿堂門亷庖庾庫廐髙者雲覄深者谷授􅌨比麟次壮䴡完厚煥若天作儼若神造世尊穆穆列衞肅肅逄溪有覺是頋是復愈帥其徒載祈載祝天子萬夀庻民五福山增其髙水益其深逄溪有覺是頋是臨愈帥其徒載祝載欽天子萬夀庻民一心廬陵縣丞馮君脩造記吉安于江西為劇郡廬陵于吉安為劇縣古號難治急則怨緩則怠怨則身危怠則政弛日惴夕惕僅免于戾然亦未嘗無名守令也延祐六年冬十月之望監察御史部行至郡視故醫學前直囂市傍切獄垣以爲非冝喻郡亟遷之十有二月郡上曹言故庐陵縣治夷衍爽塏可遷𥘉廢其地以爲紋錦院机絡之局而縣寄棲郡治之西五萬倉至是乃命増築紋錦院以䖏机絡而以其地爲學徙縣治舊學而復故倉三役並興悉以縣丞馮君克敏董之君慨然受命而不辞曰吾弗爲必有病吾民者至矣㑹是歳君當督輸即風輸者出力佐之淂楮弊数千緡遣吏治木諸縣皆與木返幣木石既集乃择亷敏吏任其事明年春正月新紋錦院堂亷坊局及諸傍舍餘八十楹二月已未局乃遷是月建醫學為開天之殿以祠三皇六楹為两廡以列從祀皆十有三楹門十楹外為靈星之門以偹制度殿之後為講學堂六楹及庖庫之次十有八楹西為教官之署凡為屋十有二楹秋八月戊申學乃迁是月建廬陵縣為聴事之堂四楹有有荣左右有次皆四楹為两廡以居六曹皆十楹門八楹其東為都曺之署凡為屋廿楹冬十有二月庚午縣乃迁凡三役工徒之費出于寓公大家及寮佐之所助者萬二千緡有竒不足皆君自更之自經始以迄于成或完舊而益新或更剏而改作一木一石必量其材而用之一錢一粟必度其冝而給之寛不至弛猛不至殘調其寒燠時其飢渇吏無奸欺民不告劳故其成功敏而無怨言夫為政不难母輕民力而巳傳曰不傷財不害民又曰莭用而爱人使民以時夫莭用故不傷以時故不害惟君力行之故其爲政平易民信民歌頌焉大徳中金華胡君長孺分教盱江攝録事視其屋懔将壓曰是将病吾民矣不喻月新之或曰此非挕職也君笑而不言嗟乎惟君子爲能憂民之憂楽民之楽况馮君身居其任者乎雖然有二君之心之才則可不然均爲怨府矣豈必廬陵㢤醫學教授嚴君夀逸剛正人也美其事請書于石以示後之爲政者且以見郡之能使人也君字彦逹濮人歴宜春髙安彭澤三縣皆有名昭勇庙卷雪楼記吴折衝将軍西陵太守寕既與周瑜魯肅吕䝉陸遜之徒並立大功世庙食興國之東六十里冨池之口龍光山之下後千餘年宋有天下録前代忠臣義士復賜将軍爵一命而公再命而王七命而数物偹號其庙曰昭勇門曰表忠而将軍之靈以益著自始封百七十有八年而建楼于庙之北名曰卷雪又百十有二年而燬于景㝎元年之兵又六十有三年為皇元至治之二年祠官九宫山道姜守夷與里人刘舜元及其徒子如渊爰謀爰度筮日他事郎楼故基為屋八楹中為重屋六楹崇七尋有半仍命曰卷雪之樓左頋舒蒲之渚右據黄龍之湾前俯大江後控衡庐北望長淮之外以天為際方其驚風忽𧺫白浪晝立天地低昻川谷吐吞則思将軍之在吴也威名動山岳謀慮出鬼神奮百騎而曹瞞夜驚戦孤軍而張遼早却臨夏口而黄祖授首搤益陽而関羽退師指皖城而朱張擒入夷陵而曺仁破何其忠且勇也及夫風霽浪弭上下一碧長空冥冥白鳥孤沒則思将軍之既沒也三國為墟五運迭興南北紛紜或離或合将軍犹以餘忠遺惠隂隲下民馮大江而揚靈􅌂南面以頋享又何仁也登斯楼也豈不念曰以區區之吴而有江表数州之地僅足以抗蜀魏将軍一輸其忠而庙食百世况戴天履地美衣豊食倓然臣子于今之世者乎故君子立功立事必思以顯當世而垂無極斯楼之作亦非徒欲覌涛浪窮勝槩而已盖所以劝忠也以三子興復之心而属余記不可不以書神姓甘字興覇巴郡臨江人累號爲昭毅武恵遺爱顯灵王云法印寺記豊水之東鳳池之西有寺曰泉林宋治平三年改賜法印木有豫章楓櫧松栢之茂水有錢塘美泉之注脩行萬箇崇墉百堵自江禅師至齊十有二傳而中徽自覺昇至心日十傳而復振𥘉昇偕其徒徳之廣慈撫廢虗啚前規起嘉泰開禧力復舊貫徳再傳曰継澄始買飯衆之田十畝有竒澄之徒慧明復淂田二十畝以爲長明灯供宋律寺覌母買民田而明以高行絶學善爲方主翰林學士徐公經孫礼部尚書雷公宜中故淂諸長明灯至于今不廢明之徒永慶慶之徒祖荣復廣田百畝而寺之計益滋又三傳是為心日心日既嗣百廢脩舉效献力者争盡其用大徳六年重覆佛殿祠后土殿東先師及諸長者殿西明年重覆三門又明年两廡及庫庾庖湢皆撒而新之皇慶元年建法堂四楹中奉覌音大士延祐六年楼于堂之北東上庋佛書下列僧寮明年又楼于堂之東南虗中以為齋堂其東以舘賔客若山門若縣鍾之楼方程村度地而申為之自大徳以来凡所修营或資于人或出乎已皆日之孫福權之力也权既能盡瘁以成其祖及其師圎炤之志而权之徒惟勝復能屈身貿易佐匠計勝之徒弘易日誦華嚴帰質田以相权之功是皆儒門所謂孝子慈孫者也方今上自京師下逮郡邑致崇極于佛者莫不因物産之盛􅑀國家之力犹恒若不及况泉林不仰縣官不資常住振法基于未墜招宗緒于無窮者乎冝為刻辞著在金石其辞曰佛入中國餘二千載厥象伊皇髙視六合横敷四海其流湯湯河汾著書佛乃聖人教則西方明明我朝並見三氏奄有萬國列刹想望照地燭天前無古昔割腴錫衎跨州連縣宝衣玉食式名休祥保合太和孰臻其極㦤此泉林扶顛持危僻在東湖畢力殫慮祇率乃亊有抗厥𥘉廣殿重楼高壮邃嚴弗儉弗踰瀏瀏清泉落落長松楽是幽居有詵其徒有秩其儀趾徳済美群經在几鐘鼓在􅽈以祝天子永遵其道傳灯經祖以作教軌冲玄觀記皇慶二年春二月始作冲玄覌夏六月覌成寔在冨州之南第三十七福地豊山之陽五里所雕峯之下因黄氏之故祠也西南維黄氏世盛宋慶元𥘉朋党論起朝奉郎幹办行在諸司審計司瀛進讜議十二萹歴詆外戚韓侂胄蠧國乱政天下誦其名嘉㝎𥘉以夀終其子通直郎知衡州常寕縣直方葬于峯之南双井原因建祠曰双井庵命始豊之仙林覌道士靈宝大師賜𬗋歐陽某奉祠事且約世守之未几常寕之夫人徐氏卒􅌾峯之東白竹原亦建祠曰白竹菴皇慶二年常寕四世孫征東儒學副提舉可自双井巷延礼聶爰静主之師至即撒舊祠闢地為覌不数月而工畢飛殿壮䴡高廣雄深門廡端直庖廪完固飛雲之楼矗其西黄氏及后土氏之祠翼其東文梁藻井之制雲房齋庐之次煌扈于其内鍾鼔之聲笙磬之音鏜鎝乎其外于是晝霧出楹夕淄殷砌帨栢拒冬長松無夏神若仙人儵忽来徃山川不改其舊而十倍故祠矣請名曰冲玄之覌又嘗与其師歐陽維新買田五頃有竒至是盡帰子覌以飬學徒奉釐事君子曰惟不貪故能忘其利惟不私故能成其功忘利而有成功非信道而勇于立者不能也使聶君不爲老而爲孔氏淂志當世所至冝何如黄氏其知人矣延祐七年春征東之子尚敬尚忠請伐石紀功因推道徳之端極内外之辨而爲之辞以授其徒黄晞平孫誠則䓁刻之其辞曰猗欤邈㢤五千之文上探無始下酌黄軒逹性立命執經御权剛柔存亾進退後先糠粃天下道徳之源玄門既闢教道滋盛水旱疾疫禱祠禳禜一呼一吸一動一静奔走雷風鬼神受令上好下效此求彼應乃道之文匪道之性志士長徃獨善其身錬形制魄守精馭神蝉蛻守内飛翔天津匪道之隆乃道之屯孰行罔至孰用㒺治蕭曹以臣漢文以帝慈儉為宝敦樸是貴雖慙三五終邁七制迨于我元搃攬萬囯囯既殊俗治亦異術既尊素王亦兼老释或齊以礼或道以徳化成天下立治之極豫章南境豊城故邑崇崇始豊神明所集跂彼雕岑雲蒸霧􅊜有屋渠渠有阯岌岌偉哉聶君有此駿功黄氏以祠老氏以宫居有所飬學有所宗敬哉學人罔或不恭執徳之恒守道之中祈天永命萬世攸同彭州學記蜀彭州孔子庙學燬于兵九十餘載有司偹位因弊承簡春秋有亊綿蕝行礼治具弗張民習于野至治中太守刘隆畏上威徳思夲政敎爰謀爰度廸復其舊而教飬之道猶闕今太守則日興學而不知教飬与無學同于是縮溢莭浮舉俸稱貸月計其息懇廢辟荒時值嘉榖歲取其入以其祭飬以為經常合凡民子弟之俊秀者三十人立師以教故入其庙則棟宇雄䴡礼楽偹舉聖師洋洋不動而應入其學則堂宇脩㓗絃誦洋溢民吏觀感不令而化其文學姓某㳂牒京師請紀金石乃告之曰惟蜀與宋終始聲教淪洽民心固結故國朝用兵積数十年乃克有㝎土著之姓十亾七八五方之俗更爲賔主治者狃聞襲見以道風舊俗爲可鄙前言徃行爲可陋至有鴻儒宿學林潜谷逝其道莫聞况𣸪有知學校㢤故學校与道興廢上不知學則失其教下不知學則失其政學校廢政教失治道㣲矣而彭前守克興後守克承継善趾美作民父母諸生其有思乎夫蜀學有楊雄文有相如治有文翁諸葛下迨唐宋群儒迭興徽言㦤行著在簡册舍疵取醇使合孔子之道父以教子兄以教弟朋友相講里巷相習以翼聖人之治則蜀之人父父子子君君臣臣劔閣無所用其関瞿塘無所用其險必自彭始諸生朂之母負諸守之意與聖天子之望元統二年八月日記
