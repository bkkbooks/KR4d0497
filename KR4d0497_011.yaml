  text: 揭文安公文集卷之十一
  hash: sha256:f6f3ee1819b2ab3186971198d862ec06258b2c8fb38154612f597bc2f7519720
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0497_SBCK_011-1a}
body:
  text: 揭曼碩傒斯著門生前進士燮理溥化校録記廬江縣學明倫堂記廬江縣古廬江郡治焉今􅊢無為州東有巢白黃陂之浸西有桐舒之蔽前臨大江北界合肥山髙而水深邑大而土饒風俗淳古民習禮讓故易治而速化延祐三年邑令史伯杲新孔子廟後九年邑令張導禮更為神像及禮器至順二年春二月碭山成君克敬繼為兹邑祗謁先聖先師退即明倫堂教宫以下以序列坐歷問風俗臧否吏民所疾苦古今賢士孰忠孰孝各以所聞知敬對起瞻棟宇摧撓腐販蹙然曰是固出治之夲乃爾而緩乎即日出私錢為民倡合所淂緡錢七千五百有竒三月丙戍即工秋七月戊子落成凡為屋六楹丹墨藻繢髙壯宏嚴始于廟稱子是人皆知君所以為治之意不待教令日趨于善明年夏屬舒城宰燮理溥請豫記夫明倫之説具在六經其要君君臣臣父父子子而已若堯之惇敘九族舜之敬敷五教禹湯文武周公之所以化民成俗孔孟之所以垂世立教皆是道也是故君不君則天道乖臣不臣則地道暌父不父子不子則人道絶其故亦大矣孔子曰斯民也三代之所以直道而行也以其道治其民夫焉有古今之間哉君子受于承于師偹于身施于家行之于鄉居一邑則以之治一邑居一州則以之治一州任天下之責則以之盡天下之責不以上不知而慢其政不以下不從而怠其教彼方以去禮絶義為恱我則曰天敘天秩不敢廢也彼方以殫財毁質為欺我則曰福善禍淫不敢誣也夙夜孜孜求夫在我孟子曰三代之學皆所以明人倫也君子之學也求以明之而已君子之行也求以推之而已此非獨為成君有民社之告所以為升其堂立其庭為師弟子者之告吾聞邑有文翁者有周瑜者有毛義者雖不足以上方三代盛時之士然其所以事親事君之道有能跂而充之亦庶几焉是役也相其成者主簿盧廷瑞董其事者邑士洪琮薛興宗成君字簡卿蓋賢大夫云靖州廣德書院記靖州居椘極壤洞庭潴其左巴蜀據其右狑獠與鄰猿鳥與逰而兵革之所狃習也然其民好鬪而勇于為義雖寡學而易感猶有屈賈之遺風焉自魏文靖公竄靖州士始知學近來有粟朝儀者靖之會同之賢者憂其土地僻陋去上國遐逺士不典于學惴惴然恐王化之不流乃築書院于居之里因其鄉名曰廣德厚歲幣以聘師髙廪稍以飬生徒凡鄉之子弟俊茂者寠不給者咸得來學其中弦歌之音甫作而鄰􅗲警當報大兵督餉學遂瓦解事㝎凡園田進取之務悉置益廣棟宇豐聚蓄招徠生徒由是復振且欲示子孫母替厥服介其友謁文于余天民之降衷秉彛雖有居天地之外未能或之違也故三苗負固舜舞干羽而來格越裳肅慎去里萬里慕周德重繹而來朝至于文翁之在蜀韓栁之潮與栁皆能一旦變文身椎結之俗千載稱文獻之邦蓋可驗矣然彼皆大賢之所為德盛而化溥道髙而名流其入于人易今粟氏以窮邦韋素之士奮然鼓舞義以韓栁文魏之自任亦可謂難也巳嗚呼士之居是卿遊是鄉以及粟氏之子子孫孫而有違其志背其道壅文教而不宣而惟暴棄之歸復何顔以自顧其身耶可無念哉其為屋椽礎之數若干工匠之計若干自相攸乞成之歲月廪給之寡夥咸俾刻于碑隂焉廣州增城學縣記入其邑人民聚田野闢學校修其政可知矣在國𥘉廣之增城孔子廟火于兵進士李肖龍刻木主祠于士人鄭聰老家鄭遂以宅為學歷五十餘年未有能復之者至順二年前翰林從事盱江左江由廣州香山令湖州經歷加奉議大夫尹增城淂故址城西沖霄門外百八十步面鳳臺負龜山水縈廽如帶始合謀遷之于是列士輸幣群工效能顧濟陽復選其材顧宗興張悟道李夀李惟佑鄭元善董其役始是年冬訖明年秋凡為殿六楹崇四尋有三寸廣六筵有五尺深如廣而去其筵有八尺堂四楹崇三仞七寸有半廣十有一筵七尺有五寸深視廣而去其八筵六尺有五寸門之楹如堂之數崇不及仭三尺四寸有半廣如之深不及筵二尺有五寸左右為廡皆十有二楹崇二仭有一尺深二筵有二尺堂之東為鄉先賢崔清獻公祠四楹崇二仭有一尺廣二筵有八尺深如廣而去其二尺內環崇墉外繚松竹堂之北有山又植松五千餘株而亭其上可俯覽一邑之乃勝休工休徒以舍菜禮告成于廟崇儒師使申其教𣸪諸生始修其業和民人使獲其所而政聲作矣又因南雄教授李顯求刻石之文于余以著久逺遂告之曰學校者所以明道設教之地也道非聖人所獨得非有愚智逺邇古今之間學則至焉增城雖僻在領表聲明文物與中州等而不能以聖人之學立身棄其身者也不能以聖人之治治民棄其民者也棄身者殃棄民者亡故立身莫先于學治民莫先于興學左君治香山既能以興學為首務今又以治增城弗棄其民矣二邑之士皆能有以立其身矣乎重為告曰夫子萬世南面享天子之禮樂天下皆知為聖增城既廟禮夫子又祠崔公豈不以為賢乎賢如崔公則祀之况有不止如崔公者乎君子亦務學哉至順三年十月具官揭傒斯記􅕾亭記泰㝎四年夏六月余自清江鎮買舟泝流而上未至廬陵二十里有巨石如夏屋嵌立江右漁舟賈舶膠葛其下前挹二洲人煙雞犬出沒誕漫又拏舟前行數百里有小溪出谷中仰見層巒葺擁雲木森恱遂舍舟循溪而入越五里劃然開朗左右環合風氣蓄密有巨塜隆然在山半由塜之左又入小谷有屋數間題曰􅕾亭乃坐亭上召守塜者而問曰地為何曰為書堂原葬為誰曰為阮氏何氏曰民望曰吾知其為人矣是嘗以年十三風雪徒步求書福建憲使出其父于獄者是嘗佐其父連山簿尉攝兵馬鈐轄撫洞獠有方者是嘗拔俘虜之子于軍中以還其友贖俘虜之母于邑大夫以還淮僧責名家之女于歌筵以還其夫且給其家使改過易行者是常為郡曺又為縣都曹寬海艘之役罷坑治之害者是嘗受知滕國李武愍公恆及其子平章公世安椘國程文憲公巨夫南臺薛中丞居敬孫御史世賢者嘗為翰林潘侍讀昻霄為監察御史時舉為江西憲椽不果用廣東帥答刻海朝京時湖廣燕右丞公揇為司農時欲舉為椽不就者遂升髙而望青原天容天玉諸峯如劍如戟如屏如帷如卓茟者陳乎其前東山墨潭蛇山之屬如騫如倚如據如伏如􅉳如紺者繚乎其後飄然如匹素渺然如白蛇自天南千里不息而橫截乎黨灘者贛江也朝暉夕景長雲廣霧明滅變化不可殫紀冝乎孝子慈孫于此興屺岵之悲而無窮也于是愴然而下復坐亭上拊髀而歌曰山川信美兮心孔悲往者不可作兮來不可期左右皆欷歔不自禁乃就舟至郡以其狀告知往來者曰然是其仲子清江教諭浩嘗廬墓其中且將葬其父于山之左腋他日為投老之地者也居數日若來見戚乎其容懇乎其言與語􅕾亭事泫然流涕曰先子之藏也再閲月乃請記夫父子者人之大倫也生死者人之大故也子雖甚愛其親不能使其親之長存父雖甚愛其子不能使其子之皆孝極夫登髙丘臨塘墓不必其親之所藏未有不悄然傷懷倣徨躑躅者人之至情也况浩兄弟之孝臨其親之所藏者乎然孝于親莫大于敬其身敬其身莫大于勵其行雖𬋩歌盈耳獻酬交錯常如􅕾屺􅕾岵之時庶毋負兹亭之所以名也烏乎當至元風乕雲龍之世使民望少自損何所不至而寧為鄉善人以終撫其山川天固將啓其後之人矣民望諱霖號石峯居士好學而尚義晚尤嗜佛老之書娶吳氏有四子曰均浩鐸煥女四嫁士族孫男七人是歲九月記善餘堂記饒有善人居安仁華蘃峰之西玉真臺之東華山之陽張果峰之北曰胡君茂卿治獄多隂德其祖父皆好善鄉之老長大夫士相謂曰易太傳不云乎積善之家必有餘慶請以善餘名胡氏之堂又購昭文館大學士李博光書以遺之至順元年其子式入史館與余深相好又明年請記于余余曰夫善人孔子猶嘆其不淂見孟子猶聞之喜而不寐况治獄平尤人所難者乎茂卿之生父蓋年四十有五矣甚愛之未成童好學孝謹父愈愛之我元有天下所與共治出刀茟吏十九卿亦起為縣曹然在諸曹中獨異其治獄情可貸者無不貸之死可生者無不生之民亦莫不自輸其情而刑以不濫縣長二及同列多嫉怒怨惡之而不敢言久乃服其為人元貞末縣有盜捕人不淂尉輒以疑似捕齊民七人日搒掠煆練之獄具移縣縣長二皆喜其淂盜立關三木置獄中上遣使決且至卿入獄語七人曰皆言汝等非盜何不自言衆涕泣死不敢異卿曰汝弟言當助汝否即旦夕死七人遂極言冤狀令怒不聼卿前爭曰七人一邑之人皆知為非盜以為盜者獨尉與令耳奈何欲殺七無罪以逭失盜之責失盜之責亦至死耶令默然竟釋之七人歸皆祠卿于家頃之以群曺攝縣諸曺長有為縣豪主錢榖致冨饒者豪常欲坐以事殺而并之未淂間聞與妻前夫女姦乃大喜曰即坐與親女姦罪至死遂白縣治其事縣淂重賂皆許諾卿亦佯許之及捕治事有實然非親女故匿不發豪曰求閲其獄盡如指意無異獄既具上府卿密疏女族姓及祖父名牘中府閲獄見所引女族姓祖父名召謂卿曰卿真長者當為卿成此名竟以異姓女杖而出之卿為德類此名至不可敷此其尢彰明較著人所常道之者後生五男子皆秀穎出群曰吾父積善惟吾人一吾今有五子天與吾厚矣即自免歸田里飬親教子縣長吏就問政事淂失隨事誠告不及于他父年八十一終卿今亦七十餘矣教五子皆為儒闔門雍睦人取以為法可謂善人也巳矣夫善者天地之心天之于物無所不愛善亦無所不愛故曰順天者昌逆天者亡昔于公治獄有隂德髙其門閭令容駟馬車曰後必有興者其度淺矣其報不喪如取諸劵胡茂卿為吏治獄平身未出曹椽之間淂五子即自貶損罷歸若欲以其餘遺子孫者固自有徑庭哉余嘗過善人之鄉問其名則皆喜而對問其人則莫不且言且頌望其居則竹樹蔥鬱禽鳥之聲喈喈及其門則雞犬不驚童僕間暇皆充充然有自淂之意升其堂則尊者不嚴而威卑者不令而從凡如是其後未有不昌者有過畨君之區行雲錦溪之上望玉真華蕊諸峰求善人胡氏之家其居人有如是者必其處也至順三年八月日記進德堂記彭氏之堂曰進德立訓也上念乃祖之令德下憫時俗之日替將納其子孫于善也𥘉彭氏世居武夷宋之時其祖蔚與李丞相絧同學李丞相貴顯即謝不見李丞相鎮江西書數往乃肯來裴徊東湖上因留不去然終不應其辟遂隱居郡之新吳山中其七世孫敬則以文學官逰四方觀四方之俗疆相并衆相陵智相傾卑尊易序疏戚易位廢禮義違政教日甚凛然懼曰吾子孫亦將有一于是乎乃歸作是堂以示訓故去華就朴以教儉髙亷重階以教嚴歲時奉蒸嘗以教孝序尊卑以教敬存孤弱以教慈合宗族以教和撢禮樂敦詩書以教學又懼近之弗察逺之弗明也屬余疏其義以廣其訓刻石屋滿朝夕俾觀省焉余乃言曰儉者德之莭嚴者德之制孝者德之本敬者德之基慈者德之愛和者德之順學者德之聚儉則財用足亷則上下辨孝則仁義坐敬則禮讓興慈則恩惠長和則九族親學則萬善明德雖美非儉無以㝎其制故為訓之始德雖偹非學無以約其禮故為訓之終由之則昌舍之則亡不可須臾出乎訓之外故表名以著逺服之若華衮佩之若瓊琚嗜之若膏梁處窮約而弗濫履貴盛而弗泰蹈危難而弗懾仰不愧俯不怍然後可以充乎德之實進乎君子之域而為彭氏賢子孫夫如是豈惟新吳之俗將化之推而放之四海而準國家之求忠臣良士必集彭氏之門矣夫德盛者必有後以李丞相之賢而不能屈乃祖之髙是必在後之人余于斯堂卜之矣夫作堂以立訓𫐠訓以發德夲乎志也故不著其歲月始末及筵楹礎筵几之類蔚字子革自號石溪先生敬則孛靜中云常州通真觀修造記保和通妙崇正真人徐公𢡟昭住常州路冝興州通真觀之十有八年重建三清殿又十有三年為皇慶元年建玉皇閣閣崇十二尋有半其材皆出于江東故山其始也材大而匠弗勝其成也不二紀而棟已撓延祐七年龍虎山道士張君德隆嗣主觀事乃量歲之入莭浮縮濫為東西方丈以翼之使危有持而顛有扶以永徐公之績為三門以蔽之使內益尊而外益固以嚴神明之居財用既足經制既㝎會玄教大宗師特進吳公入奉內祠請以郡之天申宫都監陳景𢡟提舉觀事以董之凡錢榖之計一聽其出入焉大宗師從之于是陳君惟大宗師之教是承大宗師惟張君之託是重趨事赴功夜以繼日􅍱時歷月道潰于成內則閣遂其安地儀其靈車軒洞户岩邃深靘冬無烈風之憂夏無熇日之苦談經論道坐以忘疲外則髙甍崇阿巍巍堂堂人者心動過者額手亷陛不加而峻面勢不改而雄而徐之功立矣大宗師樂其有成也進陳君提點以昭其勤張君亦再𬒳璽書賜號沖真明逺玄靜法師以重其山夫閣雖髙有翼焉則不扶而自正宫雖閎有蔽焉則不守而自固吾于是淂治國之要焉觀淂徐公而地以興徐公淂張君而業以隆張君得陳君而志以成而又淂大宗師旌善報勞而繼者知所勸吾于是又淂任人之道焉是役也一舉而衆美具斯亦足矣閣之前有井極甘冽相傳李洞賓嘗浴丹于此井之上有二古柏高十丈大數十圍一夕飛去觀始于陳大建中額由弘道三錫為今名天厯二年六月二日戊子記袁州冝春縣逄溪山聖夀寺記袁之冝春有逄溪山者以逄溪禪師得名或曰逄本作濛傳燈録失之山有寺曰聖壽即逄溪禪師所建也名與萍鄉之楊岐南源相伯仲𥘉馬祖以佛法振江西逄溪禪師與楊岐甄叔南源道明同事之于八十四人之中故歸皆建壇場以闡其師之道武宗廢天下佛事獨逄溪寺以聖壽名獲存入國朝多郡之南泉山慈化寺僧主之至順元年冬寺災長老妙愈即日發公庫錢鳩上度程斬大木伐堅石大改作之再歲而畢視舊有加焉愈闓疏敏給亦南泉普蓮宗主明照慧覺圓應大禪師慈昱之徒也普蓮建造為天下最故愈亦稱能事云請著其事于碑辭曰有蔚逢溪馬祖之徒實開此山數不載餘楊岐南源鼎足以居堂堂愈師是纘是啚鬱攸降災忽焉為墟愈顧而歎激烈奮楊畚焦輦燼正位㝎方經工程力攻堅擇良罔敢或易罔敢不臧乃基乃構乃指乃授執前執後執左執右殿堂門亷庖庾庫廄髙者雲覄深者谷授􅌨比麟次壯麗完厚煥若天作儼若神造世尊穆穆列衛肅肅逄溪有覺是顧是復愈帥其徒載祈載祝天子萬夀庶民五福山增其髙水益其深逄溪有覺是顧是臨愈帥其徒載祝載欽天子萬夀庶民一心廬陵縣丞馮君修造記吉安于江西為劇郡廬陵于吉安為劇縣古號難治急則怨緩則怠怨則身危怠則政弛日惴夕惕僅免于戾然亦未嘗無名守令也延祐六年冬十月之望監察御史部行至郡視故醫學前直囂市傍切獄垣以為非冝喻郡亟遷之十有二月郡上曹言故廬陵縣治夷衍爽塏可遷𥘉廢其地以為紋錦院機絡之局而縣寄棲郡治之西五萬倉至是乃命增築紋錦院以處機絡而以其地為學徙縣治舊學而復故倉三役並興悉以縣丞馮君克敏董之君慨然受命而不辭曰吾弗為必有病吾民者至矣會是歲君當督輸即風輸者出力佐之淂楮弊數千緡遣吏治木諸縣皆與木返幣木石既集乃擇亷敏吏任其事明年春正月新紋錦院堂亷坊局及諸傍舍餘八十楹二月已未局乃遷是月建醫學為開天之殿以祠三皇六楹為兩廡以列從祀皆十有三楹門十楹外為靈星之門以偹制度殿之後為講學堂六楹及庖庫之次十有八楹西為教官之署凡為屋十有二楹秋八月戊申學乃遷是月建廬陵縣為聽事之堂四楹有有榮左右有次皆四楹為兩廡以居六曹皆十楹門八楹其東為都曺之署凡為屋草楹冬十有二月庚午縣乃遷凡三役工徒之費出于寓公大家及寮佐之所助者萬二千緡有竒不足皆君自更之自經始以迄于成或完舊而益新或更創而改作一木一石必量其材而用之一錢一粟必度其冝而給之寬不至弛猛不至殘調其寒燠時其飢渴吏無姦欺民不告勞故其成功敏而無怨言夫為政不難母輕民力而巳傳曰不傷財不害民又曰莭用而愛人使民以時夫莭用故不傷以時故不害惟君力行之故其為政平易民信民歌頌焉大德中金華胡君長孺分教盱江攝録事視其屋凛將壓曰是將病吾民矣不喻月新之或曰此非挕職也君笑而不言嗟乎惟君子為能憂民之憂樂民之樂况馮君身居其任者乎雖然有二君之心之才則可不然均為怨府矣豈必廬陵哉醫學教授嚴君夀逸剛正人也美其事請書于石以示後之為政者且以見郡之能使人也君字彥逹濮人歷宜春髙安彭澤三縣皆有名昭勇廟卷雪樓記吳折衝將軍西陵太守寧既與周瑜魯肅吕蒙陸遜之徒並立大功世廟食興國之東六十里冨池之口龍光山之下後千餘年宋有天下録前代忠臣義士復賜將軍爵一命而公再命而王七命而數物偹號其廟曰昭勇門曰表忠而將軍之靈以益著自始封百七十有八年而建樓于廟之北名曰卷雪又百十有二年而燬于景㝎元年之兵又六十有三年為皇元至治之二年祠官九宫山道薑守夷與里人劉舜元及其徒子如淵爰謀爰度筮日他事郎樓故基為屋八楹中為重屋六楹崇七尋有半仍命曰卷雪之樓左顧舒蒲之渚右據黃龍之灣前俯大江後控衡廬北望長淮之外以天為際方其驚風忽起白浪晝立天地低昻川谷吐吞則思將軍之在吳也威名動山嶽謀慮出鬼神奮百騎而曹瞞夜驚戰孤軍而張遼早却臨夏口而黃祖授首扼益陽而關羽退師指皖城而朱張擒入夷陵而曺仁破何其忠且勇也及夫風霽浪弭上下一碧長空冥冥白鳥孤沒則思將軍之既沒也三國為墟五運迭興南北紛紜或離或合將軍猶以餘忠遺惠隂隲下民馮大江而揚靈􅌂南面以顧享又何仁也登斯樓也豈不念曰以區區之吳而有江表數州之地僅足以抗蜀魏將軍一輸其忠而廟食百世况戴天履地美衣豐食倓然臣子于今之世者乎故君子立功立事必思以顯當世而垂無極斯樓之作亦非徒欲觀濤浪窮勝槩而已蓋所以勸忠也以三子興復之心而屬余記不可不以書神姓甘字興霸巴郡臨江人纍號為昭毅武惠遺愛顯靈王云法印寺記豐水之東鳳池之西有寺曰泉林宋治平三年改賜法印木有豫章楓櫧松柏之茂水有錢塘美泉之注修行萬箇崇墉百堵自江禪師至齊十有二傳而中徽自覺升至心日十傳而復振𥘉升偕其徒德之廣慈撫廢虗啚前規起嘉泰開禧力復舊貫德再傳曰繼澄始買飯衆之田十畝有竒澄之徒慧明復淂田二十畝以為長明燈供宋律寺觀母買民田而明以高行絶學善為方主翰林學士徐公經孫禮部尚書雷公宜中故淂諸長明燈至于今不廢明之徒永慶慶之徒祖榮復廣田百畝而寺之計益滋又三傳是為心日心日既嗣百廢修舉效獻力者爭盡其用大德六年重覆佛殿祠后土殿東先師及諸長者殿西明年重覆三門又明年兩廡及庫庾庖湢皆撒而新之皇慶元年建法堂四楹中奉觀音大士延祐六年樓于堂之北東上庋佛書下列僧寮明年又樓于堂之東南虗中以為齋堂其東以館賔客若山門若縣鍾之樓方程村度地而申為之自大德以來凡所修營或資于人或出乎已皆日之孫福權之力也權既能盡瘁以成其祖及其師圎照之志而權之徒惟勝復能屈身貿易佐匠計勝之徒弘易日誦華嚴歸質田以相權之功是皆儒門所謂孝子慈孫者也方今上自京師下逮郡邑致崇極于佛者莫不因物産之盛􅑀國家之力猶恆若不及况泉林不仰縣官不資常住振法基于未墜招宗緒于無窮者乎冝為刻辭著在金石其辭曰佛入中國餘二千載厥象伊皇髙視六合橫敷四海其流湯湯河汾著書佛乃聖人教則西方明明我朝並見三氏奄有萬國列剎想望照地燭天前無古昔割腴錫衎跨州連縣寶衣玉食式名休祥保合太和孰臻其極懿此泉林扶顛持危僻在東湖畢力殫慮祇率乃事有抗厥𥘉廣殿重樓高壯邃嚴弗儉弗踰瀏瀏清泉落落長松樂是幽居有詵其徒有秩其儀趾德濟美群經在几鐘鼓在􅽈以祝天子永遵其道傳燈經祖以作教軌沖玄觀記皇慶二年春二月始作沖玄觀夏六月觀成實在冨州之南第三十七福地豐山之陽五里所雕峯之下因黃氏之故祠也西南維黃氏世盛宋慶元𥘉朋黨論起朝奉郎幹辦行在諸司審計司瀛進讜議十二萹歷詆外戚韓托胄蠧國亂政天下誦其名嘉㝎𥘉以夀終其子通直郎知衡州常寧縣直方葬于峯之南雙井原因建祠曰雙井庵命始豐之仙林觀道士靈寶大師賜𬗋歐陽某奉祠事且約世守之未几常寧之夫人徐氏卒􅌾峯之東白竹原亦建祠曰白竹菴皇慶二年常寧四世孫征東儒學副提舉可自雙井巷延禮聶爰靜主之師至即撒舊祠闢地為觀不數月而工畢飛殿壯麗高廣雄深門廡端直庖廪完固飛雲之樓矗其西黃氏及后土氏之祠翼其東文梁藻井之制雲房齋廬之次煌扈于其內鍾鼓之聲笙磬之音鏜鎝乎其外于是晝霧出楹夕淄殷砌帨柏拒冬長松無夏神若仙人倏忽來往山川不改其舊而十倍故祠矣請名曰沖玄之觀又嘗與其師歐陽維新買田五頃有竒至是盡歸子觀以飬學徒奉釐事君子曰惟不貪故能忘其利惟不私故能成其功忘利而有成功非信道而勇于立者不能也使聶君不為老而為孔氏淂志當世所至冝何如黃氏其知人矣延祐七年春征東之子尚敬尚忠請伐石紀功因推道德之端極內外之辨而為之辭以授其徒黃晞平孫誠則等刻之其辭曰猗歟邈哉五千之文上探無始下酌黃軒逹性立命執經御權剛柔存亡進退後先粳粃天下道德之源玄門既闢教道滋盛水旱疾疫禱祠禳禜一呼一吸一動一靜奔走雷風鬼神受令上好下效此求彼應乃道之文匪道之性志士長往獨善其身錬形制魄守精馭神蟬蛻守內飛翔天津匪道之隆乃道之屯孰行罔至孰用罔治蕭曹以臣漢文以帝慈儉為寶敦朴是貴雖慙三五終邁七制逮于我元總攬萬國國既殊俗治亦異術既尊素王亦兼老釋或齊以禮或道以德化成天下立治之極豫章南境豐城故邑崇崇始豐神明所集跂彼雕岑雲蒸霧􅊜有屋渠渠有址岌岌偉哉聶君有此駿功黃氏以祠老氏以宫居有所飬學有所宗敬哉學人罔或不恭執德之恆守道之中祈天永命萬世攸同彭州學記蜀彭州孔子廟學燬于兵九十餘載有司偹位因弊承簡春秋有事綿蕝行禮治具弗張民習于野至治中太守劉隆畏上威德思夲政教爰謀爰度迪復其舊而教飬之道猶闕今太守則日興學而不知教飬與無學同于是縮溢莭浮舉俸稱貸月計其息懇廢辟荒時值嘉榖歲取其入以其祭飬以為經常合凡民子弟之俊秀者三十人立師以教故入其廟則棟宇雄麗禮樂偹舉聖師洋洋不動而應入其學則堂宇修潔絃誦洋溢民吏觀感不令而化其文學姓某沿牒京師請紀金石乃告之曰惟蜀與宋終始聲教淪洽民心固結故國朝用兵積數十年乃克有㝎土著之姓十亡七八五方之俗更為賔主治者狃聞襲見以道風舊俗為可鄙前言往行為可陋至有鴻儒宿學林潛谷逝其道莫聞况𣸪有知學校哉故學校與道興廢上不知學則失其教下不知學則失其政學校廢政教失治道微矣而彭前守克興後守克承繼善趾美作民父母諸生其有思乎夫蜀學有楊雄文有相如治有文翁諸葛下逮唐宋群儒迭興徽言懿行著在簡册舍疵取醇使合孔子之道父以教子兄以教弟朋友相講里巷相習以翼聖人之治則蜀之人父父子子君君臣臣劔閣無所用其關瞿塘無所用其險必自彭始諸生朂之母負諸守之意與聖天子之望元統二年八月日記
